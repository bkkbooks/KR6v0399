body:
  text: 神京妙心龍華沙悶道忠無著甫輯第一類區界門叢林智度論云僧伽秦言衆多比丘一處和合是名僧伽譬如大樹叢聚是名為林一一樹不名為林除一一樹亦無林如是一一比丘不名為僧除一一比丘亦無僧諸比丘和合故僧名生祖庭事苑云梵語貧婆那此云叢林大論云如上所引又大莊嚴論云如是衆僧者乃是勝智之叢林一切諸善行運集在其中又雜阿含二十五佛告阿難汝遙見彼青色叢林否唯然已見是處名曰優留曼荼山如來滅後百歲有商人子名優波掘多當作佛事教授師中最為第一即四祖優波毱多梵音楚夏爾以祖師居之今禪庭稱叢林也忠曰優留曼荼山在摩偷羅國見雜阿含又以優波毱多所居青色叢林今禪庭稱叢林者睦菴附會也固無根據矣寶積經菩薩見實會云過去有王名曰尼彌了達諸法如法為王乃至三十三天欲得見彼尼彌王帝釋天主即告御臣名摩多梨莊嚴千馬寶車往閻浮提鞞提呵國迎尼彌王乃至爾時摩多梨又復將王到須彌頂爾時尼彌王遙見青茂叢林告摩多梨言彼林定是不顛倒衆生所居之處摩多梨言大王此是忉利諸天善法之堂廣説如彼宋高僧傳石霜諸禪師傳云諸得石霜山便議終焉之志云云堂中老宿長坐不臥屹若椔杌天下謂之石霜枯木衆是也南方謂之叢林者翻禪那為功德叢林也大乘義章云禪者是其中國之言此翻名為思惟修習亦云功德叢林乃至功德叢林者從果為名智慧神通四無量等是其功德衆德積聚説為叢林定能生之因從果目是故説為功德叢林中峯本禪師東語西話云世稱叢林者蓋取喻於草木也法道之所寄材器之所從出焉然草木培植則豐沾濡則榮霜雪則雕斧斤則敗叢林以無上大道為培植以慈悲喜捨為沾濡以偷安利養為霜雪以貪欲瞋恚為斧斤主叢林者不諳其培植之道沾濡之理則草木病矣况偷安利養之霜雪貪欲瞋恚之斧斤時時斫伐而殞穫之故其草木區萌芽蘖猶不暇而欲望叢林之盛材器之萃難矣哉聯燈會要智門光祚禪師章云示衆云汝等諸人橫擔拄杖出一叢林入一叢林儞道叢林有幾種或有栴檀叢林栴檀圍繞或有荊棘叢林荊棘圍繞或有荊棘叢林栴檀圍繞或有栴檀叢林荊棘圍繞只如四種叢林是汝諸人在阿那箇叢林裏安身立命若無安身立命處虗踏破草鞋閻羅王徵儞草鞋錢有日在忠按四種叢林出智度論説彼荊棘作伊蘭智度論云如栴檀譬喻經中説有栴檀林伊蘭圍之有伊蘭林栴檀圍之有栴檀栴檀以為叢林有伊蘭伊蘭自相圍繞佛諸阿羅漢亦復如是佛住善法解脫中諸阿羅漢亦住善法解脫中住法相應眷屬莊嚴佛以大衆圍繞如須彌山王十寶山圍繞如白香象王白香象圍繞如師子王師子衆圍繞佛亦如是佛為世間無上福田與諸弟子圍繞共住華嚴經淨行品云若見叢林當願衆生諸天及人所應敬禮長阿含經世記經閻浮提洲品説閻浮樹邊空地種種叢林名五山支那五山者一徑山興聖萬壽寺在杭州臨安府二阿育王山鄮峯廣利寺在明州慶元府三太白山天童景德寺在明州慶元府四北山景德靈隱寺在杭州臨安府五南山淨慈報恩光孝寺在杭州臨安府武林縣宋濂護法録覺原禪師遺衣塔銘序曰浮圖之為禪學者自隋唐以來初無定止惟借律院以居至宋而樓觀方盛然猶不分等第惟推在京巨剎為之首南渡後始定江南為五山十剎俾其拾級而升黃梅曹溪諸道場反不與其間則其去古也益遠矣元氏有國文宗潛邸在金陵及至臨御詔建大龍翔集慶寺獨冠五山蓋矯其弊也國朝因之錫以新額就寺建官總轄天下僧尼虎關鍊和尚曰唐土五山起於大慧已後當時靈隱寺兄弟會于直指堂在法堂傍議定五山非朝廷之制矣一徑山二靈隱等也或問靈隱何因得獨議定耶答曰靈隱之在京都內也如日本平安城有北山徑山則隔遠如平安於東大寺故靈隱兄弟得專定之又徑山本小剎至大慧初為巨剎此時王都在杭州也中峯本禪師山房夜話云及達磨東邁百丈未生牛頭橫出一枝南北宗分兩派皆腰鎌荷鍤火種刀耕執爨負舂鶉衣丐食鐵石身心氷霜懷抱以佛祖大事因緣一肩負荷了無畏怯蓋行處既親所到必的矣彼時安有五山十剎之廣居三玄五位之奇唱放收殺活之異作拈頌判別之殊音不加雕琢而玉本無瑕安用規模而眼元自正自百丈建叢林已來廣田大宅指顧如意其奈正因日墜謬妄日滋紀綱日繁禮義日削敕修清規遊方參請云住持遇名勝相看就送客位回禮云云而五山大方則不回禮日本皇都五山者一靈龜山天龍資聖寺五山第一開山夢窗疏石嗣高峯號正覺心宗普濟玄猷佛統大圓國師二萬年山相國承天寺勸請夢窗為開山春屋妙葩嗣夢窗為第二世號智覺普明國師三東山建仁寺開山明菴榮西嗣虗菴號千光祖師四慧日山東福寺開山圓爾辨圓嗣無準號聖一國師五京師山又名九重山萬壽寺兩開山十地覺空上人及東山湛照寶覺禪師同嗣聖一瑞龍山太平興國南禪寺五山之上開山無關普門嗣聖一號大明國師此山為五山之冠矣蓋準中華天界大龍翔集慶寺冠於五山也日本鐮倉五山者一巨福山建長興國寺開山蘭溪道隆嗣無明號大覺禪師二瑞鹿山圓覺興聖寺開山子元祖元自號無學嗣無準號圓滿常照國師佛光禪師三龜谷山金剛壽福寺開山明菴榮西嗣虗菴四金峯山淨智寺開山大休正念嗣石沒號佛源禪師準開山南洲宏海嗣兀菴號真應禪師五稻荷山淨妙寺開山退耕行勇嗣明菴夢巖應和尚旱霖集云應子從容曰二三子欲聞五山十剎之故乎五山之稱古無今有今有何貴寺不貴人也古無何貴人不貴寺也古者雖窮鄉遠地蟒巖虎穴有有道之人處則有志之士四方萬里麇至王公大人望山而拜過者不敢唾其地如佛之所住何寺院大小之問乎厥後檀信競造大寺擇名德主之人以為道德之所在而食之豐約衆之多寡不較矣今者乃官差住持僧園加富而費用殷繁五山之稱由此而著彼方乃吳越錢王置之後世沿焉不革此方乃關東平元師置之平氏亡南朝先皇升南禪為第一近代又加天龍餘並如舊法運將季外衛者不視不擇由此妄庸之徒埀涎聲利以機巧以狐媚濫膺竊據紛焉沓然成風成俗也雖謂聚學者但以濡沫小惠羈縻其心學者又貌敬腹非上下交相欺蓋牙儈履狶之不如也遂使古佛叢林忍詬于柳柳州鐵爐步志者蓋斯輩歟不思五山位名之弊臻于此極嗚呼堯舜如在井則以為蛙黽乎蛙黽如在天則以為蛟龍乎果無此理則託物焉欲身之立名之揚者不亦甚惑乎浮光幻影須臾變謝來報之説不誣則吁可恐哉二三子一日意行出通衢偶見禪衲有遠行之色者問之何往曰京師南禪或曰相陽建長住持者誰歟曰不知或曰某人某人言可為法行可為師否三種住持十科僧業具闕何如曰不知且其人與子親舊而省覲耶又以富囊褚好施豫有所于求耶曰並無之若爾遠趨奚為曰天下之望剎也濫厠僧倫不一日挂錫於其間不亦恨乎主人賢否何恤遂行余自語曰甚哉後生之無識也假如嘯此等之族千百圍繞鐘鼓闛鞳飯氣饙餾但是一閧之市而住持蓋其平也豈佛祖建立永延慧命之本意也耶忠曰天竺亦有五山名或言準之立支那五山我未見其本説今且録於茲智度論云問曰佛何以多住王舍城答曰以坐禪精舍多故餘處無有如竹園鞞婆羅跋恕薩多般那求呵因陀世羅求呵薩簸恕魂直迦鉢婆羅耆闍崛五山中有五精舍竹園在平地法華文句云有五精舍鞞婆羅跋恕此云天主穴薩多般那求訶此云七葉穴因陀世羅求訶此云蛇神山薩簸恕魂直迦鉢婆羅此云少獨力山五是耆闍崛山又云耆闍崛山者此翻靈鷲亦曰鷲頭云狼迹十剎忠曰剎者剎竿之義寺前樹剎竿故稱寺為剎也剎竿見器物門支那十剎者一中天竺山天寧萬壽永祚寺在杭州臨安府二道場山護聖萬壽寺在湖州烏程縣三蔣山太平興國寺在建康上元府四萬壽山報恩光孝寺在蘇州平江府五雪竇山資聖寺在明州慶元府六江心山龍翔寺在溫州永嘉縣七雪峯山崇聖寺在福州侯官縣八雲黃山寶林寺在婺州金華縣九虎丘山雲巖寺在蘇州平江府十天台山國清教忠寺在台州天台縣日本十剎者曆應五年所定一淨智寺在相模二禪興寺在相模三聖福寺在築前四萬壽寺在山城五東勝寺在相模六萬壽寺在相模七長樂寺在上野八真如寺在山城九安國寺在山城十萬壽寺在豐後康曆年中重議定一萬年山等持寺在山城一山號鳳凰開山夢窗疏石二靈龜山臨川寺在山城開山夢窗疏石三安國山聖福寺在築前博多開山明菴榮西四萬年山真如寺在山城開山子元祖元五神雞山安國寺在山城舊號北禪寺開山大同六蔣山興聖萬壽寺在豐後開山直翁智侃七巨鰲山興國清見寺在駿河開山關聖八瑞雲山定林寺在美濃開山高峯顯日九覺雄山大福田寶幢寺在山城開山春屋妙葩十龍嵨山崇禪寺在出羽開山春屋妙葩爾後歷代沿革不得悉記甲剎十剎之外甲於禪剎者為甲剎支那甲剎有龍翔山集慶寺華藏山顯報寺等不得盡録日本甲剎有平安山佛心寺靈龜山景德寺等不得盡録鄰封忠曰鄰寺鄰山言鄰封封者封疆也敕修清規尊宿遷化有鄰封遺書山鄰忠曰大德寺妙心寺稱山鄰矣吾聞諸先師蓋為其在五山之鄰封也或曰五山僧自稱叢林貶大德妙心稱山林故五山僧製大德妙心長老入寺疏多用山林兩字意在輕侮謂我輩居公方官寺渠自居山林也余謂此説差矣夫大德妙心天子敕願寺豈可貶稱哉五山亦各有山號而各稱叢林豈非山林耶故支那五嶽亦有以山林稱之者居頂圓菴集木菴再住天童京城方外交疏云聖人同一心豈分竺乾洙泗天下無二道何論鐘鼎山林止此蓋鐘鼎謂儒在朝廷山林謂釋在佛寺又愚菴及禪師録淨慈冬至小參云千載南屏古道場目前無法可論量群陰銷盡陽生也四海同瞻化日長如是則鐘鼓山林依舊太平氣象維新止此夫天童淨慈皆居五山之一住天童疏而居頂有此詞淨慈小參而愚菴有此言則山林之目何在貶抑故其説無謂矣又敕修清規聖節疏語曰山林鐘鼓樂化日之舒長草木昆蟲被膏澤之滲漉止此此之疏五山大方蕞剎巨剎可皆通用而取蘇軾句成山林鐘鼓之語五山亦可稱山林矣又叢林者凡衆僧所集處之稱五嶽何得專稱而令他不稱哉東坡贈清涼寺和長老詩云老去山林徒夢想雨餘鐘鼓更清新十方剎忠曰請諸方名宿住持不拘甲乙故為十方剎也敕修清規請新住持云凡十方寺院住持虗席必聞于所司伺公命下庫司會兩序勤舊茶議發專使修書製疏茶湯榜請書記為之義堂信禪師日工集云上杉兵部來和會報恩永式堂曰昔十方諸檀為先師造寺不可勝計特以天龍為十方剎兵部曰吾聞臨川以下大小寺院皆為度弟院今此瑞泉又然空華集云天龍資聖寺以本備十方之居故先師不允徒弟者挂搭詳職位門淨頭處翻譯名義集云裕師寺誥云寺是攝十方一切衆僧修道境界法為待一切僧經遊來往受供處所無彼無此無主無客僧理平等同護佛法故其中飲食衆具悉是供十方凡聖同有鳴鐘作法普集僧衆同時共受與檀越作生福之田如法及時者皆無遮礙是宜開廓遠意除蕩鄙懷不吝身財護持正法忠曰寺誥十方義與請十方僧住持少異焉然寺通十方則其義同度弟院忠曰未詳何義蓋對十方剎為言則己所度之弟子令住持之甲乙而傳者又見稱呼門度弟處義堂日工集云神崎某以寺施與余堅却之曰凡今時以度弟院為資者天下皆是也余則不然以有三寶互用之誡也又云府君賜東榮寺為度弟院又云承新規改度弟院為十方則許預十剎余伏以臨川已為十剎首是度弟也當寺及普門亦皆度弟諸方以為何如哉府君僧録皆頷之受業院首受出家業寺院也受業義見稱呼門受業師傳燈録云福州古靈神讚禪師本州大中寺受業後行腳遇百丈開悟却回本寺受業師問曰汝離吾在外得何事業曰並無事業遂有蜂鑽窗紙因緣常住敕修清規副寺云掌常住金穀錢帛米麥出入又典座云護惜常住不得暴殄又莊主云有補常住而消禍未萌又辦道具濾水囊云常住若不濾水罪歸主執之人忠曰常住者行事鈔隨戒釋相篇云僧物有四種一者常住常住謂衆僧舍宇什物樹木田園僕畜米麥等物以體局當處不通餘界但得受用不通分賣故重言常住也云云器物門常住物處詳引四種今禪林總轄常住僧物之所又謂之常住所謂千年常住也二者十方常住三者現前現前四者十方現前詳釋如彼釋氏要覽云增輝記梵云拓鬬提奢唐言四方僧物但筆者訛拓為招去鬬奢留提故稱招提即今十方住持寺院是也廣燈録洞山聰禪師章云僧問無根樹子向什麼處栽師云千年常住一朝僧羅湖野録云明州啓霞宏禪師院之山林深秀有貴人卜葬所親迎柩至宏堅臥其穴不克喪事郡守仇待制遣人諭之曰千年常住一朝僧長老何苦爭耶宏曰不可以一朝僧壞千年常住貴人亦賢者善其言而改圖中峯本禪師山房夜話云今之苾芻於所為處動背至理惟務惡求如片地之不獲或多財以壓之或重勢以臨之或搆罪以恐之或挾術以勝之雖成就於一時皆煩惱業根豈福田利益者哉競以千年常住一朝僧之説為張本殊不思千年常住苟非定慧資熏自他兼利必何所從而得耶或罔其所自是猶捨池而招明月棄樹以集衆鳥理豈然哉禪林寶訓云妙喜曰安著禪和子不過錢穀而已時萬菴以謂不然計常住所得善能撙節浮費用之有道錢穀不勝數矣何足為慮然當今住持惟得抱道衲子為先虗堂和尚徑山録有朝廷降賜度牒二十道入常住修造上堂公界公道之疆界也敕修清規日用軌範云不得以兩邊公界手巾拭頭面公界手巾係著衣後淨手拭之以披五條也塔頭祖師塔處也臨濟玄禪師録云師到達磨塔頭塔主云長老先禮佛先禮祖師云佛祖俱不禮塔主云佛祖與長老是什麼冤家師便拂袖而出子院叢林諸院依附本寺者為子院都道場都道場者每郡縣建祝壽道場以為一郡一縣聚會祈禱之處義堂日工集云唐土每城裡有都道場諸宗集會祝聖止此是也敕修清規聖節云或住持赴郡縣都道場所歸時鳴鐘集衆門迎詣方丈問訊僧史略云魏大武帝始光二年立道場至神四年敕州鎮悉立道場慶帝生日報禱門聖節詳引定額忠曰朝廷定天下佛寺之數有限此云定額定額外不許私建寺凡定僧數或定賦稅數皆稱定額本朝文粹前中書王請以施無畏寺為定額寺狀云伏願陛下鴻慈特降龍渙準之前例列之定額宣政院朝廷管僧道衙門此謂宣政院忠曰元朝初置之日本寺社所也元史百官志云宣政院秩從一品掌釋教僧徒及吐蕃之境而隸治之遇吐蕃有事則為分院往鎮亦別有印如大征伐則會樞府議其用人則自為選其為選則軍民通攝僧俗並用至元初立總制院而領以國師二十五年因唐制吐蕃來朝見於宣政殿之故更名宣政院置院使二員同知二員副使二員參議二員經歷二員都事四員管勾一員照磨一員二十六年置斷事官四員二十八年增僉院同僉各一員元貞元年增院判一員大德四年罷斷事官至大初省院使一員至治三年置院使六員天曆二年罷功德使司歸宣政定置院使一十員從一品同知二員正二品副使二員從二品僉院二員正三品同僉三員正四品院判三員正五品參議二員正五品經歷二員從五品都事三員從七品照磨一員管勾一員並正八品掾史十五人蒙古必闍赤二人回回掾史二人怯里馬赤四人知印二人宣使十五人典吏有差續文獻通考云宣政院古無之元立掌釋教僧徒佛祖通載云逮我皇元世祖皇帝混一海宇條綱制度一出睿思謂以俗制於僧殊失崇敬諭天下設立宣政院僧録僧正都綱司錫以印信行移各路主掌教門護持教法賴聖天子不負佛囑也然而裨販之流好爵縻賢恃其所貴而貴之奔走伺候處污不羞以敲朴喧囂牒訴倥傯為得志不奪不厭致有囊加巴僧録枉取栲栳山僧錢罔咈律行可謂師子身蟲也仁宗皇帝居儲宮日目擊其弊降旨除宣政院外一例革之是亦不負靈山付囑也中峯本禪師録師子正宗寺升座云今乃與宣政院使平章相國及王子宰相尚書侍郎舍人宣使一行官從同時會集行宣政院舊説曰在朝廷曰宣政院在諸道曰行宣政院行奉行也謂遐方州縣難通治故置之奉行宣政院事敕修清規兩序進退云泰定間脫歡丞相領行宣政院分上中下三等寺院額定歲請知事員數佛祖通載云元仁宗延祐五年戊午六月再立行宣政院又云文宗天曆元年戊辰革行宣政院設立十六處廣教總官府以攝僧續文獻通考云行宣政院順帝元統二年革罷廣教總管府十六處置行宣政院於杭州除院使同知副使各二人同僉院判各一人至元二年西蕃寇起又置行宣政院以也先帖木兒為院使往討之至正二年江浙行宣政院又設崇教所擬行中書省理問官以理僧民之事虞集撰笑隱欣和尚行道記云江浙行省丞相脫歡公故答剌罕順德王之子也以世勛名德靖重知大體兼行宣政院事領東南浮圖之教凡大剎非名德不輕授中峯本和尚録示脫歡丞相法語云賢宰相以是光沛仁澤宣大政忠曰脫歡兼行宣政院故有宣大政之語忠按日本昔時亦有此職名義堂日工集云貞治三年甲辰夏有朝旨關東幕府始置行宣政院以十州管內禪教諸剎系焉涅槃臺涅槃臺焚化亡骸之處敕修清規尊宿遷化云喪至涅槃臺化壇涅槃臺又名化壇幻住菴清規云默持經咒送至化壇又云公界與鄉人往化人壇上收骨第二類殿堂門伽藍慧苑華嚴音義云僧伽藍具云僧伽羅摩言僧者衆也伽羅摩者園也或云衆所樂住處也忠曰法堂佛殿山門廚庫僧堂浴室西淨為七堂伽藍未知何據各有表相如圖止觀輔行云如大經云頭為殿堂摩訶僧祇律云厠屋不得在東在北應在南在西忠曰此圖淨所在西南則合僧祇律説招提增一阿含經云毗沙鬼白世尊曰我今以此山谷施招提僧唯願世尊與我受之悲華經云智華無垢堅菩提尊王如來正法像法中間諸比丘比丘尼無慚無愧或斷招提僧物斷現前僧衣服飲食臥具醫藥釋氏要覽云招提增輝記梵云拓鬬提奢唐言四方僧物但筆者訛拓為招去鬬奢留提故稱招提即今十方住持寺院是也翻譯名義集云經音義云梵云拓鬬提奢唐言四方僧物但筆者訛稱招提此翻別房施或云對面施或云梵言僧鬘此翻對面施音義云體境交現曰對輟己惠他名施後魏太武始光元年造伽藍創立招提之名杜子美遊龍門奉先寺詩云已從招提遊更宿招提境柳河東集衡山中院律師塔銘注云凡官賜額者為寺私造者為蘭若招提寺僧史略云寺者釋名曰寺嗣也治事者相嗣續於其內也本是司名西僧乍來權止公司移入別居不忘其本還標寺號僧寺之名始於此也釋氏要覽云後漢明帝永平十年丁卯佛法初至有印度二僧摩騰法蘭以白馬馱經像屆洛陽敕於鴻臚寺安置鴻臚即司賓寺也至十一年戊辰敕於雍門外別建寺以白馬為名即漢土佛寺始也吳孫權立建初寺為始也大日經一行疏云寺者毗訶羅此方譯為住處山門忠曰山門者山對城市之言城市俗山林真凡蘭若反俗居本宜在山所謂遠離處也蘭若智度論翻遠離處故縱在城市者亦用山號夫歸向真道者當由此而入故言山門也或援劉熙曰山産也産生物也釋名蓋今謂産生叢林法材也忠曰此解幾乎附會不可取也臨濟玄禪師録云師栽松次黃檗問深山裏栽許多作什麼師云一與山門作境致二與後人作標榜又有山門為本寺總稱者傳燈録牛頭慧忠禪師章云威禪師以山門付囑訖出居延祚寺又有闔山住持已下大衆稱山門者敕修清規諸方名勝挂塔云首座請知事等白住持發批山門相送之意詳文疏門送榻位批處三門山門之制排列門有三故亦稱三門敕修清規聖節云堂司備榜張三門之右日用清規云藥石罷出寮不得出三門傳燈録睦州陳尊宿章云一日有天使問三門俱開從那門而入師喚尚書天使應諾師云從信門入聯燈睦州章天使為吳尚書五燈會元仰山章陸希聲相公機語與此因緣相類釋氏要覽云凡寺院有開三門者只有一門亦呼為三門者何也佛地論云大宮殿三解脫門為所入處大宮殿喻法空涅槃也三解脫門謂空門無相門無作門今寺院是持戒修道求至涅槃人居之故由三門入也羅湖野録云死心禪師以大觀元年丁亥九月從洪帥李景直之命住黃龍山明年揭榜于門曰仰門頭行者賓客到來劃時報覆即不得容縱浮浪小輩到此賭博常切掃灑精潔凡置三門者何也即空無相無作三解脫門今欲登菩提場必由此門而入然高低普應遐邇同歸其來入斯門者先空自心自心不空且在門外戊子九月十八日死心叟白護法録育王山碑銘序云三解脫門則僧伽智華作之止此即謂三門也三門閣上必設十六羅漢像中安寶冠釋迦以月蓋長者善財童子為挾侍釋迦或為觀音又有妥五百羅漢者釋氏資鑑云宋元豐元年天嘗久旱帝禁中齋禱甚力一夕夢有僧乘馬馳空中口吐雲霧既覺而雨大作翌日遣中貴道夢中所見物色相國寺三門五百羅漢中至十三尊略倣佛即迎入內觀之正帝所夢也隔子門忠曰子助字蓋方丈小門隔外庭故云隔子門雪竇顯禪師録云玄沙與地藏在方丈説話夜深沙云侍者關隔子門汝作麼生出得地藏云喚什麼作門又聯燈玄沙章傳燈會元並但作門無準範禪師録結夏小參云佛殿裏隔子門礙塞殺人偏門非正門也有罪犯者自此門驅出焉禪苑清規百丈規繩頌云犯重焚衣鉢應當集衆人山藤聊示恥驅擯出偏門敕修清規肅衆云或彼有所犯即以拄杖杖之集衆燒衣鉢道具遣逐偏門而出者示恥辱也佛殿文字禪白鹿山靈應禪師大佛殿記云余聞百丈大智禪師之訓曰世尊遺教弟子因法相逢則當依法而住飲食服玩經行宴坐必為叢林營建室宇必先造大殿以奉安佛菩薩像使諸來者知歸向故晝夜行道令法久住報佛恩故傳燈録丹霞然禪師章云一日石頭告衆曰來日剗佛殿前草正宗贊德山鑒禪師傳云師凡住院拆却佛殿獨存法堂而已傳燈録德山章不載之忠曰世謂拆却佛殿獨存法堂德山獨有此作殊不知本是百丈立意也傳燈所載禪門規式云不立佛殿唯樹法堂當代為尊也詳法堂處蓋雖百丈本規諸方猶立佛殿而德山特準其令爾歷代三寶記云孝明帝熙平元年靈太后胡氏造永寧寺乃至浮圖北有佛殿一所形如大極中有丈八金像空華集賀知殿頌軸序云昔吾震旦之祖自達磨至大寂之世凡八葉三百五十餘祀未有禪居故吾徒多栖律寺及乎百丈祖興創意別營禪宇以居其徒僧史所謂利不百不變格是也然猶未立佛殿以表佛祖親承當代為尊也而後祖師以懼吾徒去佛逾遠而忘乃本也而乃有佛殿之制既有佛殿矣則不可無掌之者於是置乎知殿之司班于頭首之末矣本朝當叢林盛時尚置是職而邇年稍稍而廢者何也意以其班序庳而吾徒不肯就焉耳由是殿堂也像設弗嚴薌火弗裝燈燭弗焰塵埃也𡋯如几案也暗如管籥之啓閉也弗謹往來之瞻禮也弗便於呼致使吾覺皇寶殿寂寂焉而曾路旁古廟之不若不亦可惜也哉聯燈會要古靈神讚禪師章云其師一日澡浴命師去垢師撫其背云好所佛殿只是無佛傳燈作好所佛殿而佛不聖忠曰佛殿甎面白土畫者擬夏中楞嚴會行道此亦律有據見叢軌門經行處西域佛殿名香殿毗奈耶雜事佛為外道現神通因緣云世尊即以右足踏其香殿是時大地六種震動注西方名佛所住堂為健陀俱知健陀是香俱知是堂此是香室香臺香殿之義不可親觸尊顏故但喚其所住之殿即如此方王階陛下之類然名為佛堂佛殿者斯乃不順西方之意佛壇敕修清規報恩章序云於是設聖容具佛壇場忠曰居家必備漳郡張一棟祭禮考云古者庶人無廟而祭於寢注云寢者前堂也止此余謂此方寺院無佛殿處則方丈設佛壇而祭佛祖亡者即是無廟而祭於寢者也撑天柱凡殿堂正面左右二露柱此謂撑天柱雨打凡殿堂四壁與露柱之間曰雨打蓋殿堂宇有二重第一重為正屋第二重更足造者若無第二重則第一重簷霤可零此處故名雨打義堂日工集云三門兩廊雨打既成月壇凡殿堂壁外露壇名月壇蓋月光常到處也東福寺入寺記云新命過佛殿西月壇東坡詩集扈從景靈宮詩云道人幽夢曉初還已覺笙簫下月壇忠曰近水戶侯光國造大學明倫堂其壁外壇曰月臺老者得乘輿到于此水戶侯依清儒朱之瑜指揮造二十分一之明倫堂云月臺即月壇也永覺晚録重建鼓山湧泉寺記云大殿乃謀再造即命石工甃殿前月臺及大庭石無怨公案搶劫類云縣主即起鄉夫七八人抬其石而至令放于月臺之下抬擊也非義恐訛扛對舉也隋史遺文云秦叔寶販馬到潞州二賢莊單雄信所見主人立在簷前只得站立於月臺傍邊忠曰是農家亦稱月臺水滸傳云梁中書起身走出階前來從人移轉銀交椅直到月臺欄干邊放下祖師堂祖師之堂設于佛殿西邊白雲端和尚禪録祖堂綱紀序云吾道盛於此土初祖菩提達磨之綱焉創立禪林之制百丈大智之紀焉此實天下之共知而奈何天下祖堂中各以開山傳次者為其祖殊不思乃宗乃祖所傳所持之最者乎嗚呼教來五百年後達磨始來嚮之諸家之賢者豈不知性即乎聖何為竟自以性以聖之泥乎乃須少林之後猶彈指頃不假文字語默有無釋然亡其所待而自得還其本又古之巖居穴處者但以法為勝為味殊不慮今日其間者驕獨大智禪師慮之而廓以禪林之度由是資之而少林之風至今藹然於天下吾欲天下祖堂中以達磨大智正其位以開山傳次者陪之貴來者尊其始而歸其大豈不然乎熙寧三年歲次庚戌十月初一日立林間録云白雲端禪師曰天下叢林之興大智禪師力也祖堂當設達磨初祖之像於其中大智禪師像西向開山尊宿像東向得其宜也不當止設開山尊宿而略其祖宗耳敕修清規欣笑隱尊祖章序云海會端公謂宜祀達磨於中百丈陪于右而各寺之開山祖配焉見於祖堂綱紀序云忠曰綱紀序無左右説然清規言百丈陪于右而今禪林安像例而達磨南面百丈在東則陪于祖左也臨濟在西則陪于祖右也依此舊説紛紜或曰林間録已言大智像西向是亦可約達磨南面則陪于祖左明矣故今右字寫訛當改左字即百丈配昭位左東某寺開山配穆位右西正為當理也或曰右字不可改也但某寺崇開山故開山安祖左東也百丈安祖右西也矣或曰右者謂向真人之右也則北面向真故右則東也合現今禪林安像法忠曰向真人之右之説甚失義也何故謂凡規制書無此例聖節榜張于三門之右者言門西也聖節上堂侍者往法座左側立者言座東也儒禮亦然文公家禮云凡屋制不問何向背但以前為南後為北左為東右為西後皆倣此止此何遽作向真人之左右説耶其尊開山抑百丈固不足取焉改左字者義同林間故不在痛削然以余觀之笑隱云陪于右大有深意蓋達磨為太祖二祖昭三祖穆如此次第配之則百丈穆位而在達磨之右西也笑隱之意豈在茲乎猶如周后稷為祖文王穆武王昭矣綱紀序本不言左右覺範之配定與改左字者一狀領過或曰今禪林以臨濟代開山配祖若依其昭穆説則臨濟亦當穆位答曰若置黃檗像則固可如所論然除黃檗但安臨濟故可配左邊空位耳不可為此難唯是安像法本於清規百丈陪于右説故臨濟可在左也實與今禪林安位相反焉如今之配置蓋依林間録而已羅湖野録云隆禪師及住虎丘道大顯著因追繹白雲端和尚立祖堂故事乃曰為人之後不能躬行遺訓於義安乎遂圖像奉安題讚于上達磨曰闔國人難挽西擕隻履歸只應熊耳月千古冷光輝百丈曰迅雷吼破澄潭月當下曾經三日聾去却膏肓必死疾叢林從此有家風開山明教大師曰春至百花觸處開幽香旖旎襲人來臨風無限深深意聲色堆中絶點埃嗚呼百丈創立禪規以來叢林卒不至於弛廢實本于此白雲以百丈配享達磨有識靡不韙其議可謂知本矣隆既能遵行奉先之禮又從而為讚發明其道有足多也土地堂土地神護法神之堂設佛殿東邊南禪規式曰或曰宋國土地祖師二堂在法堂左右義堂云但隨宜處立之不必於法堂左右也敕修清規住持章念誦云侍者隨住持到祖堂土地堂大殿燒香禮拜三隱詩集拾得録云於土地堂壁上書語數聯關廟關帝之廟也關帝見于靈像門佛祖通載無盡居士撰玉泉皓長老塔銘序云玉泉寺宇廣大弊漏悉壞法堂方丈寢堂鐘樓慈氏閣關廟而鼎新之祠堂居家本設祠堂而祭祖宗親族矣今祭在家亡靈於佛寺者為祠堂漢書龔勝傳云勝敕以棺斂喪事衣周於身棺周於衣勿隨俗動吾冢種柏作祠堂孔聖全書云君子將營宮室先立祠堂于正寢之東為四龕以奉先世神主高祖考妣居左曾祖考妣居右祖考妣居次左考妣居次右祖考妣皆南向考左妣右置祭田具祭器主人辰謁于大門之內出入必告正旦冬至朔望則參俗節則獻以時食有事則告若無力之家只擇明潔空室一間以奉四世神主再無別室可於寢堂正間祀之後漢書馬援傳云更修封樹起祠堂又李固傳云新營祠堂法堂忠曰演説大法之堂故云法堂故黃溍百丈山師表閣記云東陽嗣住是山既新作演法之堂止此又宋景濂護法録妙辨大師塔銘序云元季寺焚于兵公奮然有為創演法堂及方丈室三才圖會宮室部云堂者當也謂當正向陽之屋玉海又堂明也言明禮義之所華嚴經世主妙嚴品云大智日勇猛慧菩薩説頌言世尊凝睟處法堂炳然照曜宮殿中又入法界品無憂德章云善財童子將升法堂又摩耶夫人章云時有守護菩薩法堂羅剎鬼王名曰善眼疏護正法堂也大方等日藏經云於當來世是中皆應起立塔寺造作法堂安置舍利經法形像佛本行集經云有諸比丘或在露地説法之時或寒或熱我許造堂堂下説法若雖有堂露無四壁風吹塵草汙諸比丘我今當聽起四壁障遮諸塵草時諸比丘在説法堂若地不平應以種種若麻若草泥塗其地使令淨好毗奈耶雜事云佛告阿難陀此拘尸那城往古有城有拘奢伐底有王名大善見國人奉諸金銀末尼等寶王曰如是諸寶我自豐足不受國人置寶而去王念今此珍寶非枉求我今宜用修造法堂時有八萬四千諸城小王聞之咸詣王所白言願不煩神慮臣等望為王營造再三請而許諸王白王於城東形勝地興建法堂莊嚴廣説嚴飾既畢願親臨幸王念此勝法堂不應先自受用宜請一切沙門婆羅門有德行者如法供養略鈔右法堂文字出經律者歷代三寶記隋録云法堂佛殿既等天宮震旦神州還同淨土六學僧傳隋羅雲傳曰上明東寺法堂十二間蓋道安曇翼所造唐高僧傳羅雲傳云釋道安於上明東寺造堂七間曇翼後造五間連甍接棟橫列十二傳燈録牛頭慧忠禪師章云衆請入城居莊嚴舊寺師欲於殿東別創法堂先有古木群鵲巢其上工人將伐之師謂鵲曰此地建堂汝等何不速去言訖群鵲乃遷巢他樹初築基有二神人定其四角復潛資夜役遂不日而就繇是四方學徒雲集座下矣宋高僧傳香育嗣神秀傳曰州將韓𨳝供施交駢樹造法堂嚴飾奇麗時來問道右並百丈已前有法堂稱者傳燈録百丈章禪門規式云不立佛殿唯樹法堂者表佛祖親囑受當代為尊也德山拆却佛殿獨存法堂見于佛殿處忠曰竊以百丈制禪苑規繩取意於朝制其東西兩序猶如文武排行五參上堂猶如五日一參到法堂制造亦是擬太極殿矣豫嘗聞日本大極殿之制蓋一依中華法地面碁布甎瓦中央有高臺皇帝即位登此座則可四方瞻禮之由此觀今法堂之制無一所異而今法堂座後有大板屏非可移動者蓋非古也何以知之清規上堂云設罣罳法被夫板屏罣罳也若常在則何言設之乃知古制不造板屏臨時設罣罳耳既無板屏則在座上者可四方仰望之然古有佛殿擬太極殿者編年通論云魏胡太后作永寧寺極土木之美其佛殿如太極殿三門如端門僧房千楹玉珠錦繡駭人心目前佛殿處引歷代三寶記豫之法堂形太極之説殆得類證矣或曰禪剎法堂象帝釋善法堂故名法堂也豫謂不然古人或命文命扁只取類似以資言藻或上堂小參亦臨時假借未可取以為本義也若實謂象帝釋之堂則義不亦涉焉師表閣記明言演法之堂何須別説且掇古人以善法堂稱者附見于此佛祖通載唐張説法池院二法堂贊序云法池西三歸院二法堂茲院長老初上禪師所造也三歸堂以長安元年辛丑子月望日癸卯立善法堂以開元元年癸丑丑月望日戊辰建又云至哉初上人建立善法堂彩翠三世佛廣燈録覺華普照禪師章云僧問如來以一音演説法未審和尚何法示人師云白雲無定止出沒太虗中進云恁麼則善法堂前師子吼也續燈録興化紹清禪師章云上堂云祖師門下佛法不存善法堂前仁義休説又云興化今日不上天堂不入地獄於善法堂中登王座上為母説法葉縣省禪師録云問善法堂中伸一問未審師還接也無師云蜀地錦觀陶綿雲峯悅禪師法輪録云開堂升座僧問善法堂開於此日第一義諦請師宣師云何不早問石溪録小參頌趙州訪茱萸上法堂從東過西因緣云善法堂前探淺深寒濤平地湧千尋貞和集北澗彰教建法堂頌云善法堂傾法不傾欲支一木要重新南堂欲禪師本覺録小參云從教靈山會上退席五千善法堂前草深一丈大休念禪師録壽福寺挂善法堂額佛事云善法堂前雙樹陰微風吹動奏清音如來寶座親蹤迹天上人間亘古今所以釋迦世尊初於普光明殿成等正覺不離菩提樹下上升忉利天宮乃至七處九會遍登寶華王座一音演唱隨類得解一雨所霑隨根受潤而况壽福禪苑古佛道場標善法之名模遵先覺之懿範雷音大震普示人天四衆慈雲廣被仰瞻天雨四花忠曰是已以善法命扁故援世尊升忉利且實其事然假借緣飾非為本義也清拙澄禪師録小參引臨濟洞山等五尊宿因緣云這五員老凍膿只今同在善法堂上大開鋪席互顯家風法座忠曰演法之座即須彌座也敕修清規聖節云侍者往法座左側立候衆集開山塔享堂忠曰安祖像牌之堂設祭享於此故云享堂也今謂之照堂者訛矣詳照堂處大鑑清規末後事儀云龕安正客殿或卵塔前享堂龕於此安之本是饗堂享同祭享之堂也日本人名照堂錯也忠曰日本人以開山享堂謬稱照堂蓋其轉謬有所由也抑照堂本在僧堂之後而或處佛殿後設開山塔有似彼僧堂後之照堂故稱佛殿後開山塔為照堂矣遂不在殿後者亦例謂照堂也又照堂處辨之癸辛雜識別集云平江虎丘有虎十餘據之同里葉氏墓舍在焉其一大享堂虎專為食息之地方丈敕修清規聖節云維那上方丈請住持僉疏傳燈録禪門規式云長老既為化主即處于方丈同淨名之室非私寢之室也祖庭事苑云今以禪林正寢為方丈蓋取則毗耶離城維摩之室以一丈之室能容三萬二千師子之座有不可思議之妙事故也唐王玄策為使西域過其居以手版縱橫量之得十笏因以為名法苑珠林感通篇云吠舍釐國宮城周五里宮西北六里有寺塔是説維摩經處寺東北四里許有塔是維摩故宅基尚多靈神其舍壘甎傳云積石即是説法現疾處也於大唐顯慶年中敕使衛長史王玄策因向印度過淨名宅以笏量基止有十笏故號方丈之室也釋氏要覽云方丈蓋寺院之正寢也引王玄策事忠曰頭陀寺碑有方丈字先唐玄策且附見文選王簡栖頭陀寺碑文曰宋大明五年始立方丈茅茨以庇經象注高誘曰堵長一丈高一丈面環一堵為方丈銑曰宋孝武皇帝時也言立方丈之室覆以茅茨之草以置經象也堂頭忠曰方丈稱堂頭住持人居處禪苑清規請尊宿云專使先看知事計會訖上堂頭人事廣燈録三聖然禪師章云師到道吾道吾以緋𥿉額持神杖師見乃云逐便祗候道吾應諾師參堂了再上堂頭人事道吾却具威儀方丈內坐師才近前道吾云有事相借問得麼師云也是適來野狐精便出去聯燈會要香嚴間禪師章云造溈山山問我聞汝在百丈先師處問一答十問十答百此是汝聰明靈利意解識想生死根本父母未生時試道一句來看師茫然不能加答遂歸寮將平日看過底文字從頭檢尋無一句可將酬對乃自嘆云畫餅不可充飢屢上堂頭告溈山為説山云我若説似儞儞已後罵我去在正堂一山曰正堂方丈室也傳燈録龜洋山無了禪師章云師告寂瘞于正堂酉陽雜爼云嵩山普寂禪師潔正堂焚香端坐未久忽聞叩門連云天師一行和尚至矣一行入詣寂作禮云云衣鉢閣忠曰藏住持衣財之處此方所謂眠藏也衣鉢義見于金寶類校定清規入院視篆云住持看封預都寺開封呈過住持就狀先押字次書日子行者使印於日子處狀係都寺收印子隨封押歸衣鉢閣付與衣鉢侍者或親隨行者備用清規侍者云密菴和尚赴靈隱如侍者掌衣鉢閣又有閣作閣者校定清規新住持入院云印子隨即封押歸衣鉢閣付與衣鉢侍者又云檢舊例下嚫衣鉢閣貼嚫又法嗣師忌辰云就衣鉢閣支羞設錢寢堂住持正寢之堂也忠曰蓋擬世之路寢周禮注云六寢者路寢一小寢五玉藻曰朝辨色始入君日出而視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服是路寢以治事小寢以時燕息焉疏云路大也人君所居皆曰路竺仙仙和尚宗門千字文自注云寢廟者前曰廟後曰寢今之曰方丈者謂之寢室大者曰寢堂室則幽奧深邃堂乃堂堂明顯也今法堂者正謂之堂佛殿可曰廟也舊説曰凡禪剎堂舍位置法堂後有茶堂接茶堂而有寢堂連寢堂而有方丈蓋寢堂者住持講禮之處今日本禪院於丈室前置禮間者是也忠曰依此説則日本方丈前不別建寢堂以方丈前一間名禮間充寢堂也敕修清規聖節云上堂住持於鼓初鳴出寢堂坐又小參云小參初無定所看衆多少或就寢堂或就法堂又遊方參請云凡寢堂中必設參椅示尊師道也新到相看住持當居中位令其插香展禮側坐受茶於禮無損輪藏設機輪運轉法藏也傅大士創造釋門正統塔廟志云復次諸方梵剎立藏殿者初梁朝善慧大士傅翕玄風愍諸世人雖於此道頗知信向然於贖命法寶或有男女生來不識字者或識字而為他緣逼迫不暇披閲者大士為是之故特設便方創成轉輪之藏令信心者推之一匝則與看讀同功故其自誓曰有登吾藏門者生生不失人身又能旋轉不計數者是人所獲功德即與誦經無異今稱龍宮海藏者乃約龍樹入海而言又稱天宮寶藏者乃附慈氏居處而説然一切如來只令口誦心惟轉我法輪饒益群品今大士特興慈悲在在處處創此機輪運轉不息欲俾一切含靈同霑利益盡未來際成等正覺大哉神力詎可思議耶先民所謂智者創物大士其有焉若夫諸處俱奉大士寶像於藏殿前首頂道冠肩披釋服足躡儒履謂之和會三家佛印禪師了元為王荊公贊其所收畫像曰道冠儒履釋加沙和會三家作一家忘却率陀天上路雙林癡坐待龍華又列八大神將運轉其輪謂天龍八部也又立保境將軍助香火之奉謂是在日烏傷宰也茲三者考録無文録六卷弟子結集進士樓穎修定不能自決佛祖統紀云梁傅大士愍世人多故不暇誦經及不識字乃於雙林道場創轉輪藏以奉經卷其誓有曰有三登吾藏門者生生不失人身有能信心推之一匝則與讀誦一大藏經正等無異藏前相承列大士像備儒道釋冠服之相者以大士常作此狀也列八大神將者八部天神也保境將軍者在日烏傷宰發誓護藏者也注云義烏縣舊名烏傷善慧大士録云大士在日常以經目繁多人或不能遍閲乃就山中建大層龕一柱八面實以諸經運行不礙謂之輪藏仍有願言登吾藏門者生生世世不失人身從勸世人有發菩提心者志誠竭力能推輪藏不計轉數是人即與持誦諸經功德無異隨其願心皆獲饒益今天下所建輪藏皆設大士像實始於此白氏文集蘇州南禪院千佛堂轉輪經藏石記云堂之中上蓋下藏蓋之間輪九層佛千龕彩繪金碧以為飾環蓋懸鏡六十有二藏八面面二門丹漆銅鍇以為固環藏敷座六十有四藏之內轉以輪止以柅經函二百五十有六經卷五千五十有八護法録日本瑞龍山重建轉法輪藏禪寺記云我佛如來其正法之流通者有三藏焉一曰修多羅藏二曰阿毗曇藏三曰毗尼藏惟此三藏諄諄化導使一切有情滅妄趨真誠昏衢之日月苦海之舟航也琅函玉軸多至五千四百四十八卷衆生根鈍莫能融貫善慧大士以方便力造為毗盧寶藏函經其中一運轉間則與受持讀誦等無有異已下辨輪藏字義北澗文集金粟洞天三教藏記云金粟洞天在泉南勝處住山人凝雲黃去華總三家之書于山中置諸大輪藏所謂藏也者藏也涵藏之謂也又澄心院藏記云佛所説經一味之雨三草二木所澤各異根差性殊豈雨之咎車軸之滴匪海莫容大心溟渤乃克堪受涵攝其義曰藏運行其説曰輪舍藏無以蘊其奧非輪無以發其用第二義門特出巧思制成八觚八玲瓏面面層室以貯琅函以絢金碧以擬覩史大莊嚴藏樞正厥中以靜以應一機潛發飄風疾旋若翻地軸使海水立蕩胸決眥倐爾如砥曰此權道會心以境釋氏要覽云經律論謂之三藏又佛藏菩薩藏聲聞藏名三藏藏者攝也謂攝人攝法故又云八藏菩薩處胎經云胎化藏中陰藏摩訶衍藏戒律藏十住菩薩藏雜藏金剛藏佛藏是為釋迦文佛經法具足矣若今安置經律論處名藏者梵云俱舍此言藏謂庫府之總稱也文苑英華談銖廬州明教寺轉關經藏記云經心也藏藏也如心之含藏萬法者也故曰一心生萬法萬法由一心其動靜弛張在我而寧窮其義略舉其大斯藏也本於一心靈通無礙動用自在靜則萬法空寂動則三界彌綸虗偽唯心所造作其在斯乎周回八角角覺也佛以眼為八邪耳為八患鼻為八苦舌為八難回八邪為八覺回八患為八解脫回八苦為八安樂回八難為八王子指四八為三十二相由此八關返邪歸正成佛之境矣止則寂然無用引則轉而不窮動雖有聲靜乃無迹云云讚曰修多羅教函于藏輪周回八角正道斯陳動用一心為萬法因忘因無法得本歸真鐫于金石用導迷人忠曰記中銖自謂常學釋氏然眼為八邪已下未知何據法輪者釋氏要覽云大毗婆沙論云何名法輪答是法所成故法為自性故名法輪如世間呼金輪等輪是動轉不住義捨此離彼義能伏怨敵義又圓滿義謂轂輻輞三事具足故輪體法即八聖道支也云云鐔津文集崇壽禪院轉輪大藏記云夫轉輪藏者非佛之制度乃行乎梁之異人傅翕大士者實取乎轉法輪之義耳其意欲人皆預於法也法也者生靈之大本諸佛之妙道者也諸佛以是而大明羣生以是而大昧聖賢乃推己之明而正人之昧故三藏之取諭者諭於此也五乘之所歸者歸於此也然其理幽微其義廣博殆非衆人槩然而輒得故益其藏而輪之姑使乎扶輪而轉藏者欲其槩衆普得漸染佛法而預其勝緣則於道其庶幾乎是亦至人攝化羣生之一端耳其意遠且大矣備用清規藏殿祝聖諷經云住持領衆繞藏行道三匝以表法輪三轉法輪三轉者示勸證也俱舍論云云何三轉十二行相此苦聖諦此應遍知此已遍知是名三轉即於如是一一轉時別別發生眼智明覺説此名曰十二行相淨名略疏云三轉法輪者即是趣波羅奈説生滅四諦也輪者佛證四諦法有可轉之義故名為輪又解能壞煩惱名之為輪如輪王寶能壞怨敵佛法輪寶能壞煩惱故名法輪如來成道經三七日方趣波羅㮈生生雖不可説以悉檀方便赴天人小機而説四諦轉入彼心壞彼煩惱故名轉法輪也三轉者一示轉謂是苦是集是滅是道二勸轉謂苦應知集應斷滅應證道應修三證轉謂苦我已知集我已斷滅我已證道我已修初轉示見道勸轉示修道證轉示無學道是三轉十二行法輪大藏以千字文命函見經録門大藏經處東西藏敕修清規知藏云後以衆多列東西藏十僧閣建長寺有十僧閣禪居附録清拙禪師塔銘序云師居建長起十僧閣各立扁以居大耆舊千僧閣徑山有千僧閣大慧杲和尚年譜云紹興七年丁巳師四十九歲主徑山又云十一年辛酉師五十三歲千僧閣成師遣介泉南求記於李漢老參政其略曰云云院去城百里自唐國一禪師始斬蓬藋驅龍蛇而居之寺無常産山之神龍實助其緣化公至之始衆才三百二年法席大興衆將二千而院有僧堂二不足以容創意於寺之東鑿山開址建層閣十楹以盧舍那南向嶤然居中列千僧案位於左右設連床齋粥於其下經始於十年春越明年春告成云云又云一閣之成任公何足道而循襲齷齪之者以為奇特不亦陋甚矣哉陸放翁渭南文集圜覺閣記云淳熙十年某月某日徑山興慶萬壽禪寺西閣落成云云東偏有千僧閣紹興中大慧禪師宗杲法門之傑方住山時衆溢千數故以是名閣虗堂愚和尚徑山録有千僧堂上梁上堂又有開爐移衆僧單鉢歸千僧閣上堂蓋度宗咸淳元年乙丑八月虗堂住徑山三年丁卯冬十月賜綾牒二拾道銀券等一新僧堂浴室行堂也三默堂浴室僧堂西淨相傳浴室僧堂西淨不許語笑故此總曰三默堂又見浴室西淨等處供養次第法不可思議疏云默然者有三處一食時二大小便時三洗浴時忠曰浴室默然不思議疏洗浴時又見毗奈耶雜事殿堂門浴室引僧堂默然不思議疏食時是也西淨默然不思議疏大小便時又見文殊經殿堂門西淨處故三默堂皆有據矣僧堂傳燈録禪門規式云所裒學衆無多少無高下盡入僧堂依夏次安排敕修清規日用軌範云不得僧堂內聚頭説話不得在僧堂中看經看册子北澗文集南翔僧堂記云連長榻敷廣座容數千指開單盔必搜梁棟選柱石然後可以帡幪震風陵雨雖然非古也古之人一生打徹於冢間樹下云云又慶寧僧堂記云僧堂之作非古人意古無拓提况堂耶自枯木留香後天下較奇策勝翬飛炫耀床榻囟几惟恐不壯麗耄耋疾疢無霧霾風雨暴露之慘既適既寧精勵勝進當倍蓰異時冢間樹下不三宿者何反無聞焉興禪護國論述宋國二十種勝事中云經藏僧堂莊嚴如淨土雪峯存禪師録云師示衆云望州亭與儞相見了也烏石嶺與儞相見了也僧堂前與儞相見了也玄沙備禪師廣録云我今問儞還見溪水麼還見佛殿麼還見僧堂麼僧堂名已著於西竺智度論云迦葉結集法藏時以阿難殘結未盡擯出阿難入金剛定破諸煩惱作大力阿羅漢即夜到僧堂門敲門而喚禪林有設二僧堂者又見千僧閣處又有設三僧堂者無文印笑翁堪禪師行狀云雪峰僧堂二曰留香曰衆香師至衆集如海更闢妙香處之佛祖通載雲峰高禪師傳云遷保安江陰教忠霅川何山雲衲四來三堂皆溢止此蓋此亦有三僧堂也僧堂但在禪剎而天台宗有效之者佛祖統紀了生法師傳云謁東靈欽師時效禪林羣居僧堂當元夕衆往觀燈欽師行香見其跪坐牀上僧堂十六板首鉢位圖見圖牌門東福清規云外僧堂東邊亦上下間有床歷兵亂壞却之故今則亡矣東福清規云後堂床之南床曰汾洲也忠按分手訛作汾洲知客床有暫到者上古有下齋時行腳僧據此床受齋故云暫到也又云住持赴僧堂坐禪者蓋為點撿大衆也故入堂先巡堂一匝是便撿衆之儀也又專主僧堂者首座也住持者非主僧堂故僧堂無住持床唯別設椅子而已雲堂忠曰僧堂亦曰雲堂謂衆集如雲多也開福寧禪師録冬夜小參云賴遇庫司置辦土儀果子下座雲會堂中大家東咬西咬止此字義可見敕修清規受嗣法人煎點云請云來晨就雲堂聊具菲供伏望慈悲特埀降重諸祖偈頌阮中大仰山飯歌云五更雲堂門尚閉普供廚中人已起大慧杲和尚鄭成忠請普説云齋雲堂清淨禪衆請普説功德不為別事專用回向無上佛果菩提禪堂忠曰僧堂亦謂禪堂言衆僧坐禪於此也文字已出首楞嚴經云若諸末世愚鈍衆生未識禪那不知説法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼咒若未能誦寫於禪堂或帶身上一切諸魔所不能動摩訶止觀云身開常坐遮行住臥或可處衆獨則彌善輔行云或可處衆者謂禪堂中別處最勝故云彌善續高僧傳後梁法聰法師傳云聰住禪堂每有白鹿白雀馴伏栖止人天寶鑑云圓覺慈法師解行兼備東掖虗席能文二師然指請師主之慈至法席鼎盛盛暑講罷歸方丈偃息而文適至謂師曰東掖道場世世皆有道者主之講罷不在懺室即在禪堂未有偃臥自恣者也慈聞曰敢不敬命自後不少怠僧寶正續傳月菴果禪師傳云初至鵝湖宴坐禪堂聞二童子戲爭蒲團其一舉起云儞道不見遮箇是什麼師恍然有省柳河東集巽公院五詠中禪堂詩云發地結菁茆團團抱虗白山花落幽戶中有忘機客涉有本非取照空不待柝萬籟俱緣生窗然喧中寂心境本同如鳥飛無遺迹前門僧堂忠曰佛殿法堂皆有前後門今舉僧堂者敕修清規大挂搭歸堂云參頭領衆前門右手入堂至聖僧前排立日用軌範云打定鐘後不得於前門出入後門僧堂敕修清規大挂搭歸堂云參頭送維那出注云齋前後門齋後前門前板僧堂僧堂聖僧龕左右為出入板自出入板已前為前板亦曰前堂即前堂首座管領之自出入板已後為後板亦曰後堂即後堂首座管領之後板僧堂説見于前板堂內三板頭禪苑清規維那章云衆中新到挂搭禮須勤重諸方辨事及名德人別選上寮安排退院長老須依住持帖及開堂疏內資次於堂內三板頭安排齋粥座位四板頭忠曰首座板後堂板分手板聖僧板也又見禮則門四處問訊處敕修清規方丈特為新首座茶云四板頭不安香几無巡堂請茶首座板頭僧堂敕修清規聖節云維那於僧堂往住持前問訊從首座板起巡堂一匝備用清規方丈特為茶云侍者往特為人前問訊從龕後轉首座板頭巡問訊一匝西堂板頭僧堂忠曰即是聖僧板頭也東漸清規勤舊鉢位圖云內僧堂如有西堂則一班聖僧板排之敕修清規專使特為新命煎點云於僧堂內鋪設主席西堂板頭排專使位聖僧板頭僧堂忠曰聖僧前下間板為聖僧板頭蓋聖僧侍者板也見校定兄弟相看章即前堂首座分手亦名西堂板頭見僧堂處東福僧堂圖校定清規兄弟相看禮儀章新到歸堂云參頭領衆僧堂前門下手入乃至仍至聖僧前問訊自末先移步過聖僧侍者板頭進三兩位次第而立敕修清規念誦云住持入堂前堂首座入次名德西堂插入歸聖僧板頭立又大挂搭歸堂云參頭領衆巡堂排立問訊從班尾先移步退聖僧板頭立維那入堂燒香上間立解云維那與挂搭人對立也又結制禮儀云次知事入堂燒香大展三拜巡堂一匝至聖僧板頭挂立後堂板頭僧堂僧堂後門上間是後堂板頭也即住持對面位也敕修清規專使特為受請人煎點云於僧堂內住持對面設新命位止此是新命位即後堂板頭也立僧板頭僧堂立僧床此方曰分手板也蓋僧堂後堂首座分手位也敕修清規兩序章云維那鳴椎俟首座唱食至第三句將畢轉身退至立僧板頭立立僧首座床即立僧板頭也分手板忠曰立僧板又名分手板言後堂之分手位也東漸略清規云燒香首座板後堂板分手板聖僧板詳禮則門四處問訊處東福清規作汾洲床依音近訛文惑人多矣出入板僧堂聖僧龕左右為出入板前堂首座領自出入板已前大衆後堂首座領自出入板已後大衆也敕修清規兩序進退云知事一班云云從聖僧左出住持前兩展三禮乃至退身從聖僧右出聖僧前大展三拜備用清規坐禪云如衆頭首起位抽解惟前堂首座從住持面前出入其餘皆從出入板出入敕修清規坐禪云頭首大衆並從出入板往來南禪規式僧堂圖録出入板忠曰此圖二三四等是被位也非十六板首圖床前三淨頭僧堂敕修清規日用軌範云床前一尺為三淨頭一展鉢二安袈裟三頭所向解云展鉢者食時展鉢於此也安袈裟者臥時函匱在腳邊不便置袈裟故安於此也然床椽或怕盜竊故但安函匱上而作在枕邊之想念為妙頭所向者臥時床椽為枕也三條椽僧堂續燈録西禪繼圖禪師章云上堂云云一一法上一如來一一塵中一彌勒若也不知且向三條椽下六尺單前快須究取碧巖録第二十五則評云儞諸人若見得與蓮花峯菴主同參其或未然三條椽下七尺單前試去參詳看忠曰僧堂之床每人座位橫占可三尺許乃各各頭上之椽有三條故言三條椽下七尺單前箋于座位門單位處地爐僧堂臨濟玄禪師録云師一日與河陽木塔長老同在僧堂地爐內座云云僧寶傳清涼益禪師傳云與善修洪進自漳州抵湖外將發而雨溪壯不可濟顧城隅有古寺解包休于門下雨不止入堂有老僧坐地罏見益而曰此行何之曰行腳去又問如何是行腳事對曰不知曰不知最親益疑之老僧地藏琛禪師也五分律云聽因地作火爐明僧堂又方丈僧堂之制大而復前後架屋堂內暗矣故當前板首座板頭西堂板頭之上屋上開窗如今煙窗故第一座板言明窗下舊説云僧堂宏構掩蔽故作窗受明名明窗也五燈會元佛日空禪師章云師十七歲參夾山問答山曰冷灰裏有一粒豆爆乃喚維那明窗下安排著師曰未審明窗還解語也無山曰待明窗解語即向汝道忠曰維那掌僧堂事故特喚命之也虗堂愚和尚寶林録結夏小參云若得箇插手處莫待期滿便請説看何故蓋老僧急欲明下安排諸祖偈頌慈受針規云虗占案分挂物明窗不合律儀叢林安許忠按慈受所言似明窗在壁又方丈有明窗傳燈録石霜諸禪師章云師居方丈有僧在明窗外問咫尺之間為什麼不覩師顏師曰我道遍界不曾藏忠曰此亦明窗於壁開者也明樓在僧堂前也僧堂廣深又前有外堂故堂內昏暗乃於堂前外堂間高架樓開窗接明此云明樓物初賸語育王庫閣陰記云更其制為閣五間三正兩挾前後橫廡前後穿堂以覆砌級如明樓之制枯崖漫録泉山子愚初禪師承天寺僧堂記云擁以照堂明樓在前臥雲日件録云東福衆寮請頌題於夢巖巖與牮明樓三字蓋時明樓將崩也牮支也又云相國寺明樓崩矣明堂敕修清規念誦巡堂之圖僧堂與外堂之間左右題云明堂忠曰僧堂正前高架明樓明樓左右空處曰明堂也內堂虗堂愚和尚淨慈録結夏小參云竺土大仙於九夏之月布漫天網子籠絡天下衲僧謂之禁足護生尅期取證致於南山內堂外堂排單下榻箇箇如生鐵橛外堂在僧堂外面故曰外堂又曰外僧堂凡暫到客僧皆食於此知客接不時賓客故不食於內僧堂而食於此又凡知事不時有所辨故並就外堂鉢位而食敕修清規赴粥飯云都監寺維那直歲侍者等位在外堂上間知客知浴知殿化主堂主等位在外堂下間知客板頭忠曰在外堂後門內南邊敕修清規受嗣法人煎點曰住持引手揖煎點人坐位居知客板頭又專使特為受請人煎點云住持對面設新命位堂外知客板頭設專使位知客床即知客板頭也照堂舊説曰照堂在僧堂之後若住持事繁不遑上堂則立僧首座令挂牌代住持入室普説皆於是處故堂內架法座矣此屋連僧堂邃暗故高其制而取敞明因名照堂後來此處構尿所未知其是也又今時有法堂後造照堂者固不足則也已枯崖漫録子愚初禪師承天寺僧堂記云擁以照堂明樓在前敕修清規方丈特為新挂搭茶云至日侵晨洗面時備卓子筆硯列照堂請各於名下書云某甲謹拜尊命破菴先禪師行狀云至平江萬壽旦過值天大雪夜坐乃自念言行腳十年矣此回若不徹去又是虗生浪死正悶悶間不覺鐘動趍後架舉頭見照堂二字疑情頓釋敕修清規念誦云先鳴方丈板照堂板解者曰僧堂後衆寮後皆有照堂而今鳴衆寮之照堂板也忠曰但是僧堂有照堂不用曲説雲章解聖節巡廊鳴板曰巡廊鳴板者先鳴方丈板次鳴照堂板次鳴衆寮首座寮等板止此雲章已照堂之次別言衆寮則可知照堂板但是僧堂後照堂板耳故不用衆寮後有照堂之説舊説曰今時稱影堂為照堂實無本據或云照當作昭乃昭穆之謂也本當謂昭穆堂而略稱昭堂此説亦杜撰矣忠曰大應國師建長録有新開昭堂升座乃作昭字蓋日本禪林有忌火字去列火者如照牌作昭牌録者從作昭堂乎此升座語中不亦見祖塔饗堂事又無文印癡絶行狀曰學徒中分遺骨塔于照堂窣堵波之左止此癡絶録趙若琚撰行狀作中分其半建塔徑山菖蒲田玉芝菴止此此亦非謂影堂也故影堂曰照堂訛矣余辨復見享堂處後架照堂之後有後架大衆洗面之處永平正法眼藏洗面章云雲堂洗面處者在後架裡後架在照堂之西敕修清規日用軌範云取手巾轉身下地巾搭左手念偈云云輕手揭簾出後架輕手取盆洗面瑩山清規云往後架洗面往東司屙屎傳燈録興化存獎禪師章云師謂衆曰我只聞長廊也喝後架也喝諸子汝莫盲喝亂喝廁亦有後架東淨處引幻住清規廊下聯燈會要興化存獎禪師章云師謂衆云我聞長廊下也喝後架也喝諸子莫盲喝亂喝日用軌範云不得衩袒歸僧堂并廊下行佛祖通載海雲簡禪師傳云一日於廊下逢數僧云云東海一漚集自曆譜云延文二年冬吉祥寺廊下庫司災外典亦有廊下説苑云介子推行年十五而相荊廊下有二十五俊士堂上有二十五老人仲尼曰合二十五人之智智於湯武并二十五人之力力於彭祖常朝録云元稹為翰林承旨朝退行至廊下時初日映九英梅隙光射稹齋堂忠曰齋堂即食堂也食堂即僧堂也今日本黃檗山僧堂外別設齋堂蓋大清禪林如是非古也佛祖統紀云司馬光暇日遊洛陽諸寺廊廡寂寂忽聲鐘伐鼓至齋堂見沙門端坐默默方進匕箸光欣然謂左右曰不謂三代禮樂在緇衣中食堂忠曰禪林僧堂本食堂也食堂即齋堂也蒲室集揚雲巖居士作蔣山僧堂偈序云寺古制皆有僧堂然惟會食而已至於寢處則有別室如今教律院猶然也獨禪林自唐開元中百丈海禪師作清規設長連牀於堂率衆盡入居之牀端為木函盈赤以貯三衣一鉢外無餘畜也坐臥起居有時凡晨昏午夜以及旦長老首座加巡警焉惰者罰不率教而擯之至於禪寂䇄若枯株湛然止水衆千百肅如也由貞元距今六百年他規盡廢僧散處寺內外甚者一己占屋數十間積産業以萬計輿馬僕從擬巨室刑法汙宗教有不可勝言者矣而堂之規猶獨得如古使天下之凡若僧者盡撤其私室禁而私畜而會之于一堂申以吾祖之規教之庸有如前所陳之敞乎而僧者能終身不越堂戶繼之以不昏不亂虗而照寂而應超生死越三界雖古聖賢不出乎是也南山教誡律儀二時食法云初入食堂隨門頰舉足出時亦爾釋氏要覽云毗奈耶云給孤長者造寺後作念若不彩畫便不端嚴即白佛佛言隨意未知畫何物佛言云云食堂畫持餅藥叉祗園圖經云最巷北大院名僧食所自開三門中門之北有大食堂堂前列樹方維相對交陰相接渠流灌注甚可觀閲凡僧食者多止此林酉陽雜爼續集寺塔記云平康坊菩提寺食堂前東壁上吳道玄畫智度論色偈變偈不空三藏奏代宗天下食堂中置文殊為上座詳見靈像門聖僧處十誦律自恣法中曰掃灑食堂掃除竟入室坐禪佛本行集經曰爾時世尊日在東方著衣持鉢共諸比丘來至食堂於所敷設次第而坐雜阿含經曰比丘低舍與衆多比丘集於食堂語諸比丘言諸尊我不分別於法不樂修梵行多樂睡眠疑惑於法佛廣呵責又云佛住舍衛國祇樹給孤獨園前三月夏安居竟有衆多比丘集於食堂為佛縫衣三隱詩集閭丘胤序云國清寺有拾得知食堂尋常收貯餘殘菜滓於竹筒內寒山若來即負而去又拾得録云拾得者知庫僧靈熠令知食堂香燈供養忽於一日與像對坐佛盤同餐聯燈會要藥山儼禪師章云師問僧甚處來云南泉師云在彼多少時云粗經冬夏師云恁麼則三十年後成一頭水牯牛去也云某甲雖在彼中且不曾上他食堂師云口飲南風那云和尚莫錯自有把匙筯人在僧寶傳大通本禪師傳云移住錢塘淨慈繼圓照之後食堂日千餘口仰給於檀施而供養莊嚴之盛遊者疑在諸天儒家亦有食堂柳河東集盩厔縣新食堂記云貞元十八年五月某日新作食堂于縣內之右始會食也又云其上棟自南而北者二十有二尺周阿峻嚴列楹齊同又云既成得羡財可以為食本月權其贏羞膳以充乃合群吏于茲新堂升降坐起以班先後又云惟禮食之來古也今京師百官咸有斯制甸服亦王之內邑且官有聯屬則宜統會以齊之也嚮之離而今之合其得失也遠甚我是以肅焉而莊衎焉而和群疑以亡嘉言以彰旨乎其在此堂也茶堂茶堂必在法堂後寢堂前也今之茶堂元是方丈也住持行禮之處芙蓉道楷禪師唯置一茶堂自去取用詳飲啖門米湯處校定清規告香云齋退鳴鼓特為茶或就法堂或茶堂首座相伴特為參頭有飯傳燈録東山慧和尚嗣百丈海章云大于和尚與南用到茶堂見一僧近前不審云云又傳燈録黃檗慧禪師嗣踈山仁章云師下堂參第一座乃至於言下頓省禮謝退於茶堂悲喜交盈廣燈録黃檗斷際禪師章云師一日在茶堂內坐南泉下來問定慧等學明見佛性此理如何師云十二時中不依倚一物云云鼓山神晏國師録云師見保福共僧在茶堂説話師云莫葛藤保福云葛藤即不得商量佛法還得也無師作摑勢保福云過在什麼處師又行一摑玄沙備禪師廣録云一日僧問訊云云師云儞適來從什麼處來云某從茶堂裏來師云儞今若去也從茶堂裏去因什麼不識去來大慧杲禪師録歲節秉拂云今日一隊奴僕在茶堂裏村歌社舞弄些神鬼茶寮焦竑類林云僧寺茗所曰茶寮寮舍傳燈録禪門規式云置十務謂之寮舍每用首領一人管多人營事令各司其局也主飯者目為飯頭主菜者目為菜頭他皆倣此又職位門十務處丹鉛總録云左傳同官為寮文選注寮小窗也宋王聖求號初寮高似孫號踈寮謝伋號靈石山藥寮唐詩綺寮河漢在斜樓皆指窗也古人謂同官為寮指其齋署同窗為義今士子同業曰同窗官先事士先志官之同寮亦士之同窗也爾雅云寀寮官也郭璞注同官為寮刑昺疏言同寮者皆謂居官者云同官為寮者左傳文七年荀林父告先蔑之辭也周祈名義考云楊用修謂寮為小窗以齋署同窗為義不知窗竂之竂從穴不從宀説文竂穿也玉篇竂舍也後人遂以竂為窗是窗竂之竂與采寮之寮文既不同義亦自別安得以同窗釋同寮乎寀采俱音菜宀音綿忠曰周祈不取丹鉛同窗義直取同官為寮之義則禪林亦可同職者為寮也四寮敕修清規嗣法師遺書至云兩序四寮江湖鄉人法眷小師辦事皆有祭又尊宿遷化遺書云知客引專使巡寮先庫司次頭首寮單寮蒙堂四寮又云兩序四寮江湖辦事鄉人皆致祭義堂曰蒙堂之四寮也所謂佛國白大覺璉參寥潛九峰韶四人所居也忠曰昔四名德居蒙堂後人慕之存四寮名耳舊説曰四寮者庫司頭首單寮蒙堂是也非別有名四寮者止此忠曰此訛讀尊宿遷化章先庫司次頭首寮單寮蒙堂四寮之語者也四寮義可依義堂之説耳敕修清規亡僧云所封行李首座維那知客侍者燒香侍者四寮人力擡歸堂司雲章曰四寮不足疑焉清規亡僧章明言首座維那知客侍者四寮是也又住持章下遺書云頭首寮西單寮單寮東單寮蒙堂西蒙堂東蒙堂四寮蒙堂分東西此亦可稱四寮忠曰雲章第二説強以東西單寮東西蒙堂作四寮不足信焉忠曰清規四寮蓋有二種亡僧章四寮即其所列首座維那知客侍者是也嗣法師遺書章兩序四寮及遷化章蒙堂四寮並可依義堂説余曾清規嗣法師遺書中詳辨蒙堂忠曰蒙堂名昉于大覺故事後來勤舊退職者安息處乃稱蒙堂也見稱呼門蒙堂處又可與下蒙堂併看宋景濂潛溪集四明阿育王山廣利禪寺碑銘云其主僧自宣密素公始可考見宣密五傳至大覺璉公名振天下乃至大覺日與九峯韶公佛國白公參寥潛公講道一室扁曰蒙堂叢林取則焉又云修演法之堂并撤其房廬為下蒙堂則白雲住山智珠營之周易蒙卦彖云蒙以養正聖功也疏云能以蒙昧隱默自養正道乃成至聖之功月江印禪師育王録大覺禪師忌拈香云代圓通應詔而起為九峰草疏而來對使者焚却龍腦之鉢創蒙堂如築黃金之臺此是大覺老人平生受用不盡底三昧雖相去二三百載而聲光煒燁猶百千之迅雷稽首僧伽真古佛鄮峰千古碧崔嵬又月江賀友竹改牧石寮作蒙堂頌云幽居改作蒙堂住湖海高人不用招大覺斷絃今復續可無佛國與參寥下蒙堂玄極頂禪師圓菴集阿育王山下蒙堂記云四明阿育王山廣利禪寺沙門某成下蒙堂有年矣今住山弘辨裕禪師圖記其事于石而屬筆於某辭弗獲乃記曰昔大覺璉禪師嘗闢一室列四榻延其友九峰韶公佛國白公參寥潛公相與居之而榜曰蒙堂蓋取蒙以養正之語也是後禪林咸效為之今是堂之設于育王者有二其一則大覺所居者其一所謂下蒙堂者即某始作也初某之師雪窗光公法席盛時名緇鱗集乃謀別創蒙堂以處之未果而化去於是述先志損己資撤所居房盧而創焉名下蒙堂其屋凡若干楹而為室十有六室置一榻奉像設肅賓客與夫庖湢之舍無不完經始於戊戌之秋落成於明年之冬惟百丈起禪規會衆僧於雲堂食息咸在焉而蒙堂由大覺禮賢增置自非齒隆德優者誠未易處也然世降道衰諸方往往空其雲堂而不居而吾人始勞於形生矣嘗聞古之學道者咸能忘其軀是故日中一食樹下不信宿身愈窮而道愈通其果何術哉今雲堂聚衆之規未復是以某承其師志益為蒙堂以養隱德晦行之士不亦善用其心乎然入是堂者宜思蒙之為義及其身之安也務深蓄其道德使九峯佛國參寥三人者復生吾不讓焉則大覺始立之意某氏別創之勤斯無負矣單寮忠曰單寮者獨寮也詳于稱呼門單寮處寮義見寮舍處敕修清規西堂首座挂搭云如大方名德欲作住計語次露意住持度有單寮可處及行坐位次上下安順則留之人天寶鑑云無畏久法師餘姚人依慧覺壁公得旨後遍歷禪會嘗入徑山佛日之室佛日夜坐必召師至命説天台旨趣及楞嚴大意深遇之出世清修學者雲集師患後生單寮縱恣闢屋為衆堂淨几明窗蒲褥禪板灑然有古叢社之風侍者寮聯燈會要百丈懷海禪師章云師契悟野鴨子因緣浹背汗流却歸侍者寮哀哀大哭云云虗堂愚和尚録普説云一日在侍者寮思之古帆未挂有甚難會云云侍者寮扁擇木大慧年譜云師三十七歲抵天寧挂搭圜悟令居擇木堂作不釐務侍者左傳哀十一年云鳥則擇木木豈能擇鳥大慧普説作擇木寮侍者寮扁小玉日本禪藍志南禪寺侍者寮曰小玉聯燈云圜悟勤禪師歸五祖入侍者寮偶五祖為陳提刑舉小艷詩云頻呼小玉元無事只要檀郎認得聲師問答云云忽然大悟侍司侍者寮也敕修清規告香云每夏前告香新歸堂者推參頭一人維那和會定同衆詣侍司稟云新挂搭兄弟欲求和尚告香普説衆寮忠曰衆寮之制南向也敕修清規大挂搭歸堂云新挂搭人轉東邊寮主轉西邊又觸禮一拜寮主引挂搭人排列朝觀音問訊止此是可證南面之制也敕修清規列職雜務云寮元掌衆寮之經文什物之類禪居附録清拙大鑑禪師塔銘東陵永璵撰云大元泰定丙寅八月至博多明年正月上京關東使來迎居建長三月十二日入寺檀信稟以大國禪林所宜行事悉舉行之師開堂告香普説新造衆寮規製如靈隱者國中始有也衆寮圖諸書所載似有訛差今多依南禪規式之所圖鎌倉清規衆寮圖二十八位者結解小座湯圖也穿堂衆寮衆寮觀音龕後曰穿堂乃衆寮之後堂名也日用軌範云僧堂不得上下間行道穿堂直過止此又慈受針規云穿堂直過豈不厚顏止此此等穿堂者非堂名謂自前門穿過後門之義敕修清規新挂搭人點入寮茶云瓶須從穿堂入又衆寮結解特為衆湯云寮元依戒排經匱圖茶湯問訊圖等圖成大衆和南時俱出於穿堂衣閣衆寮忠曰蓋衆寮安衆資具處備用清規日用清規云衆寮登衣閣白寮主上名打板三下上閣開籠維那寮紀綱寮維那寮又曰紀綱寮毛詩大雅棫朴篇云勉勉我王綱紀四方箋云張之為綱理之為紀疏説文云綱網紘也紀別絲也然則綱者網之大繩以舉綱能張網之目故張之為綱也紀者別理絲縷故理之為紀以喻為政有舉大綱赦小過者有理微細窮根源者正字通云六書故綱要而紀詳綱以舉紀紀以舉目謂綱大紀小者非南禪規式録南禪諸寮名曰表率寮前板雲門望仰寮後板仰山龍蟠寮書記黃龍虎嘯寮東藏主虎丘結集寮西藏主虎丘紀綱寮維那應菴或桃洞或悅衆擇木寮燒香侍者思忠寮請客侍者小玉寮湯藥侍者內史寮書狀侍者景雪知客忠曰敕修清規維那云綱維衆僧曲盡調攝止此維那寮名紀綱寮本于此僧史略云知事之三綱者若網罟之巨繩提之則百目正矣止此若依此則知事三綱總可稱紀綱耳堂司堂司者維那寮也若呼人為堂司則維那是也又見職位門藏司藏司者藏主寮也若呼人為藏司則藏主是也又見職位門僧寶傳雲居齊禪師傳云法燈使知藏司法燈偶見齊呼曰每見舉祖師西來意話藏主如何商略齊曰不東不西法燈曰若與麼會了無交涉曰未審尊意如何法燈良久曰西來有甚意知客寮客司客司者知客寮也若呼人為客司則知客是也敕修清規知客云官員尊宿相過者引上相見仍照管安下去處如以次人客只就客司相款密菴傑禪師録小參云佛眼五祖會中在客司因夜坐撥火忽然猛省應菴華禪師蔣山録載之作充知客前資寮忠曰副寺已下知事退休者所歸寮也大慧普説瑩上座請普説云老和尚會裡有元禪客乃至一日見元在前資寮裏坐老漢拍他背云來同去鐘樓上看雪去沙彌寮敕修清規沙彌得度云祇就沙彌寮安下俟他時登檀受戒謝戒客位忠曰賓客及新命安息室也旦過外別設焉敕修清規遊方參請初敘住持旦過回禮又云住持遇名勝相看就送客位回禮止此可知旦過之外有客位也若一則同回禮何別舉之謂旦過之外別設客寮若名勝則送客寮也敕修清規迎待尊宿云湯罷兩序勤舊同送客位拈八方珠玉集云寶蓋來訪漸源源捲却簾子在方丈內坐蓋乃下却簾子却歸客位明極俊和尚語要云大慧會中有一尼僧來參送歸方丈客位歇云云安下處忠曰安下者安息稅下行李也賓客或新命稅駕之館此名安下處又名旦過日本不特置安下者借一子院安息謂之宿房安下或作安駕非也下駕音近轉訛也敕修清規住持章受法衣云專使相看湯罷兩序同送安下又尊宿遷化下遺書云侍者燒香點湯送專使歸安下處又遊方參請云侍者云且回安下處容某通覆東林雲門頌古云琅琊和尚問舉和尚近離甚處乃至琊遂去安下處見問莫便是舉師叔麼云云正法眼藏舉此話安下處作旦過堂釋氏資鑑云騰蘭二僧於鴻臚寺安下翻譯四十二章經龍舒居士淨土文云譬如人入大城中必先覓安下處却出幹事大平廣記薛調撰唐無雙傳云劉震曰汝易衣服押領此物出開遠門覓一深隙店安下剪燈餘話還魂記云夫人曰郎君母還邸中只在寒舍安下安下處或單言下處隋史遺文曰秦叔寶領刑具到下處喫飯旦過寮忠曰遊方人到某寺先稅袱子入旦過堂憩息然後與師家相見或謂旦當作且即暫時來過之義妄説不足從按陸放翁詩集病中柬仲彌性詩云心如澤國春歸鴈身是雲堂旦過僧止此是以春對旦又城西聯句庚韻云十載旦過軾同時寒食翃止此是以寒對旦故旦夕之旦明矣蓋夕來宿而旦過去也禪苑清規龜鏡文云旦過寮三朝權住盡禮供承敕修清規知客云其旦過寮床帳什物燈油柴炭常令齊整又裝包云如遊山到處將及門下包捧入旦過又遊方參請云遊方挂搭初到旦過推熟於叢林能事者一人為參頭又月分須知云四月初一日鎖旦過解者曰自四月朔止行腳故鎖旦過也正法眼藏云琅邪和尚問舉和尚近離甚處乃至琅邪問侍者此是甚麼人曰舉上座琅邪遂親下旦過堂問莫是舉上座麼云云大慧武庫云葉縣省和尚嚴冷枯淡衲子敬畏之浮山遠天衣懷在衆時特往參扣正值雪寒省訶罵驅逐以至將水潑旦過衣服皆濕其他僧皆怒而去唯遠懷併疊敷具整衣復坐於旦過中省到訶曰儞更不去我打儞遠近前云某二人數千里特來參和尚禪豈以一杓水潑之便去若打殺也不去省笑曰儞兩箇要參禪却去挂搭大川濟和尚天章録開旦過上堂云開門待知識知識不來過有箇來不入門去不出戶問他洞山麻三斤趙州柏樹子便惡發吽喫茶去護法録會堂緣禪師塔銘序云師道經寧海日已暮悲風號林莽間師遑遑急走欲求憩泊之地竟不可得夜行三里所乃逢逆旅主人破屋一間不能蔽風雨師竟夕不寐明發指天自誓曰所不能建菴廬以延旦過者有如日叢林盛事有旦過字見稱呼門兄弟處破菴先禪師録行狀云至平江萬壽旦過值天大雪夜坐乃自念言行腳十年矣此回若不徹去又是虗生浪死清拙澄禪師日本録晚參云二十三上出閩入浙至淨慈先佛心愚極和尚門庭高峻旦過中八十餘人不得相看云云又圓融寺鐘銘序云大唐天目山中峯本禪師行腳時止金陵一小寺旦過寮云云宋景濂護法録淨慈逆川順公塔銘序云師走閩之天寶山參鐵關樞公師欲住公叱師下旦過寮然而泣或憫之慰曰善知識門庭高峻拒之即進之也浴室敕修清規知浴云其入浴資次當刊揭浴室外南海寄歸傳云世尊教為浴室或作露地甎池乃至洗浴者並須飢時浴已方食有其二益一則身體清虗無諸垢穢二則痰癊消散能餐飲食飽食方洗醫明所諱十誦律云外國浴室形圓猶如圓倉開戶通煙下作伏瀆出外內施三擎閣齊人所及處以瓨盛水滿三重閣火氣上升上閣水熱中閣水暖下閣水冷隨宜自取用無別作湯故云淨水耳增一阿含經曰爾時世尊告諸比丘造作浴室有五功德云何為五一者除風二者病者得差三者除去塵垢四者身體輕便五者得肥白乃至若有四部之衆欲求此五功德者當求方便造立浴室浴室安跋陀婆羅像説見靈像門入浴法毗奈耶雜事詳説往看毗奈耶雜事云浴室內漫為言話佛言不應漫話然洗浴時有二儀式一者法語二聖默然六學僧傳云後唐智暉姓高氏咸陽人少從圭峰溫禪師剃𩭄梁乾化四年自江表來京邑歷觀諸剎以為所須皆備而獨於浴室似有缺典於是相攸洛汭治屋若干楹購山給薪鑿沼儲水輪汲而槽受其湯之富未易言則瓶錫之侶冠簪之倫搢紳先生之流其至者日不暇給而脫履則木舄承足卸衣則枲裙障身五日一開開凡七十有二而歲周矣其所浴殆數萬人不啻又闢浴聖室於西廡以象十六應真其內中則觀自在堂也侍郎揚凝式篤重暉為作碑頌德又六學僧傳云宋常覺姓李氏陳留人遊廬山投歸宗寺出家乃至後唐天成三年始得地於汴京麗景門右治屋數間以營浴事每月以三八日一設僧無遠近皆就浴歲約費千萬緍雖一出檀施自非覺維持之力疇克爾尤與北海陶穀湘東張仲荀厚善皆有遺寄之文可考右二件並宋高僧傳載今愛文簡明故引六學耳浴室頭首板頭敕修清規知浴云如住持有故欲同頭首先浴則不用設屏障不入小閣內只頭首板頭解衣廚庫臨濟玄禪師録云黃檗因入廚次問飯頭作什麼飯頭云揀衆僧米雲門偃禪師録云古人道人人盡有光明在看時不見暗昏昏作麼生是光明代云廚庫三門廚品字箋云烹飪之所也庫釋名云舍也物所在之舍也槽廠六祖法寶壇經云五祖云這獦獠根性大利汝更勿言著槽廠去慧能退至後院有一行者差慧能破柴踏碓又見行者房處忠曰舊解言行者寮非也但是廚房邊卑賤雜務之處行者亦當服役于此耳槽正字通云音曹説文畜獸食器品字箋云槽草平聲刳木令空曰槽又酒槽又以木槽飼馬謂之馬槽廠正字通云音敞屋無壁又音昌義同篇海類編云廠昌兩切音昶馬屋又露舍無壁品字箋云棚廠薄有橕架而覆不以瓦曰棚雖以瓦覆而門窗不設曰廠廠敞也言其廠然高曠不狹隘也磨院正宗贊雪峯真覺禪師傳云師親書牌於磨院云山前竟日無狼虎磨下終年絶雀兒至今虎雀絶無大慧武庫云五祖演和尚依舒州白雲海會端和尚咨決大事深徹骨髓端令山前作磨頭演逐年磨下收粳麩錢解典出息雇人工及開供外剩錢入常住每被人於端處鬥諜是非云演逐日磨下飲酒食肉及養莊客婦女一院紛紜演聞之故意買肉沽酒縣于磨院及買坯粉與莊客婦女搽畫每有禪和來遊磨院演以手與婦女揶揄語笑全無忌憚端一日喚至方丈問其故演喏喏無他語端劈面掌之演顏色不動遂作禮而去端咄云急退却演云俟某算計了請人交割一日白端曰某在磨下除沽酒買肉之餘剩錢三百千入常住端大驚駭方知小人嫉妬時秀圓通為座元受四面請即請演為第一座永平清規引演祖事云磨下者磨院也稱磨司椎米磨麵之局也寺邊五六町若十餘町建之磨院主一人請之演祖之職掌乃是也水磨坊置水碓磨之房舍也雪峯存禪師録云師在枯木菴坐禪於水磨坊前晒麥乃親題云菴前永日無狼子磨下終年絶雀兒注山中至今並無狼虎凡於磨坊前晒麥亦無鳥雀皆如師記耳淨頭寮大慧年譜云師二十五歲在寶峯湛堂處在淨頭寮因書雪峯悅和尚小參語於座右一日廣道者至寮見之乃私語湛堂曰宣州杲兄以雪峯小參為警慕非碌碌餘子之比湛堂曰此子他日必能任重致遠淨頭義見職位門淨頭處行堂行者所居之堂即行者寮也若呼人為行堂則行者是也敕修清規訓童行云行堂前挂牌報衆又沙彌得度云自行堂鳴鈸引剃頭人出又敕修清規方丈點行堂茶云節臘僧堂茶罷侍者同客頭至行堂點茶侍者至庫司典座接入參頭堂主領衆行者門迎忠曰蓋行堂在庫司故侍者至庫司也東福寺扁行堂曰選僧堂也忠曰選箇中人為僧也童行堂即是行堂也禪苑清規訓童行云新到於庫司參禮訖將行李入童行堂行者房行堂也傳燈録丹霞天然禪師章云師抵南嶽石頭曰著槽廠去師禮謝入行者房隨次執爨役凡三年西淨西序所上之廁曰西淨忠曰和俗呼西淨為雪隱謂雪淨之也見其稱西淨却為怪焉余謂雪若淨之義則隱又何義按竺仙和尚説云靈隱淨頭寮名曰雪隱即今圓覺淨頭寮二草字不知何人好事者模來淨智寺録又按日本禪剎一覽建仁寺亦揭雪隱字皆用雪竇顯禪師曾在靈隱隱潛于淨頭職之事然雪隱西淨唐音適近遂以為雪隱而失本名隱者潛隱義非取靈隱之隱也况復雪隱是淨頭寮扁字而不宜扁于西淨益見不當也或有以西淨為厠通名而其在東者亦呼西淨者實訛稱而已雪竇事見職位門淨頭處舊説曰淨者謂廁易穢處可以淨潔故特以淨稱小補韻會云史記楲竇廁中行清器也釋名行清即糞槽謂之清者以其穢濁當常清除之也忠曰舊説解淨正合釋名然今流行劉熙釋名語不同唯云廁或曰圊至穢之處宜常修治使潔清也天竺精舍廁院在西或南故摩訶僧祇律云廁屋不得在東在北應在南在西小行亦如是祇園圖經云次北第六院名為流廁有大高屋三重而立飛橋雙上甚自清淨下施廁坑砌以伏竇天帝手作上無臭氣大渠從大院北西注南入廁院伏流入竇北出會於大河人無見者一切比丘皆此便利余聞此説深為獲相故江淮已南諸古寺者皆設都清一所中已北周屏繞院臰處蓬勃伊何可言廁字義見器物門廁籌處緇門警訓云文殊經曰大小便時身口狀如木石不得有聲東淨東序之廁曰東淨也幻住菴清規營辨云後架乃糞穢之聚其稱為東淨西淨者其淨在人不在境也東司東淨又曰東司也或以東司為廁通名而在西者亦呼為東司實訛言也如下引武庫敕修清規辨道具濾水囊云僧行東司亦皆濾水又慈覺龜鏡文云涕唾墻壁狼藉東司非所以報淨頭也大慧武庫云錢弋郎中訪真淨説話久欲登溷淨令行者引從西邊去錢遽云既是東司為什麼却向西去淨云多少人向東邊討釋氏要覽云屏廁或曰圊圊清也至穢之處宜潔清故今南方釋氏呼東司未見其典事物異名云登司同郭登廁神也登主也今人誤曰登司忠曰東訛作登更隨作廁神之義轉誤矣無住雜談集云東司可誦烏芻沙摩真言是即不動明王埀迹而號不淨金剛人上東司時或有鬼惱人則此金剛誓護念矣忠曰不動化不淨金剛見大日經一行疏大威力烏樞瑟摩明王經下卷云復次烏樞瑟摩明王教法不拘淨穢恆示忿怒相誦滿三十萬遍得驗又云復次不拘淨穢誦三十萬烏油麻和酥進火中一千八遍得驗忠曰世傳凡人懸佛像於頸者書烏樞瑟摩明王名號加之則不蒙穢罪然未得經律本據烏樞瑟摩經説但如右耳起止處忠曰起止處者正屙糞之處也吳越春秋云盛夏之時人食生瓜起居道傍子復生秋霜止此所謂起居屙屎也毗尼母經云上廁有二處一者起止處二者用水處用水處坐起褰衣一切如起止處無異僧祇律云作廁屋若坑底有水出者當使淨人先起止中然後比丘行用水處忠曰屙屎已正洗淨之處見起止處處尿闥續宗門統要云明招謙禪師到招慶乃至招云是儞諸人一時縛作一束倒卓向尿闥下來日相見正字通云凡士民所居門內曰闥統要作躂正字通云躂俗字禪苑瑤林作闥今從之安樂堂見于次延壽堂延壽堂禪林寶訓音義云延壽堂撫安老病之所也古者叢林老僧送安樂堂病者送延壽堂也又今涅槃堂是校定清規住持入院云古者建立叢林為老病設所以命堂主司以藥餌戒常住足其供需此先佛規制也又况八福田中直病為第一今諸方延壽堂有名無實衲子遇病如囚其間良可憫也萬一鄉曲無人看虧公界當差人直之速期病安惟是天童凡一病僧差一小僕供過為住持者當推菩薩慈悲之心留意於此行事鈔瞻病送終篇云若依中國本傳云祇桓西北角日光沒處為無常院若有病者安置在中以凡生貪染見本房內衣鉢衆具多生戀著無心厭背故制令至別處堂號無常來者極多還反一二即事而求專心念法其堂中置一立像金薄塗之面向西方其像右手舉左手中繫一五綵幡腳埀曳地當安病者在像之後左手執幡腳作從佛往淨剎之意瞻病者燒香散華莊嚴病者乃至若有屎尿吐唾隨有除之亦無有罪釋氏要覽云西域傳云祇桓西北角日光沒處為無常院若有病者當安其中意為凡人內心貪著房舍衣鉢道具生戀著心無厭背故制此堂令聞名見題悟一切法無有常故今稱延壽堂涅槃堂者皆後人隨情愛名之也庚溪詩話云唐以前僧寺中或僧有疾病者未有安養之所唐末一山寺有僧臥病久因自題其戶曰枕有思鄉淚門無問疾人塵埋牀下履風動架頭巾適有部使者經從過寺中見其題因詢其詳惻然憐之邀歸墳菴療治之其後部使者貴顯因言於朝遂令天下寺院置延壽寮專安養病僧也羅湖野録曰佛眼禪師住舒州龍門嘗題語于延壽壁間曰佛許有病者當療治容有將息所也禪林凡有數名或曰涅槃見法身常住了法不生也或曰省行知此違緣皆從行苦也或曰延壽欲得慧命扶持色身也其實使人了生死處也多見少覺微恙便入此室不強支吾便求補益及乎久病思念鄉閭不善退思滅除苦本先聖云病者衆生之良藥若善服食無不瘥者也又尊宿云須知有不病者故明書示以告後來觀其規詠風巾塵履者豈特令退思苦本而已抑欲使遵乍可有戒而死之訓其明切精審可謂藥石之言矣嗚呼是大醫王其佛眼之謂乎忠曰延壽為目道誠以情愛貶趙令矜以鄙俚彈見省行堂處至佛眼有慧命扶持之説不但令名美抑義亦深矣北澗文集妙湛延壽堂記云疾病相扶持無憾於養生送死以明王道之本佛世寖古建幢剎棲冷灰稿株蠟穹德茂者却冢間桑下嵐昏霧蝕之患又為省行堂以別不老不病欲其循省日用事若學之正偏業之勤荒行之缺全思之沈掉好惡之失中喜怒之或私利養是崇進修是怠應病授藥法惟一味以治其內劑砭針艾以攻其外正命小康幻體亦寧或又謂之延壽堂延壽云者延此者也壽此者也非人間世短修延趣之謂也今者反是樂便安者巧圖其居耽燕佚者曲求其處先之以貨賂申之以強援弗知廉與遜為何物盡巧致曲疇知志於道者袖手傍顧泚顙芒背忍死不為也一念之忍傲睨黃髮鯢齒纍然困踣於其外祖宗成憲遂為具文往往大叢林亦如之今妙湛鼎新斯堂故書近世叢林墜典以告覆車在前冀革斯轍雖然水沫巴焦匪石匪金燕安鴆毒少壯勿恃美疢惡石老病無忽作如是觀以度生死則住山月巖某之宰制耆舊執事某之裁割勤勞百囏不徒其為是伇也作於紹定三年仲夏晦落之於冬書雲橘洲文集焦山延壽堂記云叢林老病菟裘之地也百丈憫此創為延壽堂床敷厚溫牖戶寬爽供給使令左右畢出惟少與健者不得而與也自都城下京口兩峯屹立波面所謂山圍屋者焦山也山故海窟世世皆有道者尸之四方鼎來如水雲合今住山朴菴性公赴太守待制陳公之招周旋逾年視山之壽老堂自靖康至今多歷年所屋有震風凌雨之患過者未嘗問焉公於是命執事相與經營輪奐一新老者居之如入寶所病者得之如飲良藥有來觀者心目適悅朴菴曰吾道蓋是也使余撾鼓掉舌號令佛祖指撝人天而老病有時乎不聞今此堂朝明夕昏夏涼冬燠木章竹箇皆代余説法時也所得與法喜禪悅等豈不壯哉朴菴書來屬余記之因書以為記清拙澄和尚圓覺寺延壽堂題亡僧名牌云十方聚會生死任緣既同歸寂滅之場尚沒記雪泥之爪圓覺延壽堂置牌以紀亡僧名或臨終有遺偈之類悉詳書之或親知眷義尋訪遺蹤庶幾知其死所雖然如是名在這裡且道人在甚麼處涅槃堂裏事猶危妙在全機獨脫時火後莖眉如拾得不刊名字有人知雪泥之爪用東坡詩中事又與職位門延壽堂主雜行門看病併看省行堂即延壽堂也黃檗清規云省行堂者有病比丘攝養之所也幻住菴清規云身屬報緣誰無老病百丈建立意在於斯古宿扁延壽堂為省行使其省察行苦而興悲智北澗文集説見于延壽堂緇門警訓超然居士趙令矜撰南嶽法輪寺省行堂記云嘗謂諸苦之中病苦為深作福之中看病為最是故古人以有病為善知識曉人以看病為福田所以叢林為老病之設今叢林聚衆凡有病使歸省行堂不唯修省改行以退病亦欲人散夜靜孤燈獨照之際究索大事豈徒然哉既命知堂以司藥餌又戒常住以足供須此先佛之規制近世不然堂名延壽鄙俚不經病者不自省咎補躬乖方湯藥妄投返成沈痼至有酷疾不參堂以務踈逸者大失建堂命名之意也知堂名存實廢或同路人常住急於日用殊不存撫又復失優波待老病之意也由是病人呻吟痛楚日益增極過在彼此非如來咎縱有親故問病率皆鄉曲故舊心既不普事忽有差今法輪病所奐然一新蓋有本分人是事色色成辦無可論者惟有病人宜如何哉省躬念罪世之有識者皆能達此衲僧分上直截機緣當於頭痛額熱之時薦取掉動底於聲冤叫苦之際領略徹困心密密究思是誰受病人既不見病從何來人病雙亡復是何物直饒見得分明正好為他將息忠曰堂名延壽鄙俚不經者此即貶不言省行而稱延壽也涅槃堂即延壽堂也説見于延壽堂傳燈録泉州莆田縣國歡崇福院慧日大師福州侯官人也姓黃氏生而有異及長名文矩嗣長慶大安落髮至靈觀和尚所觀曰我非汝師汝去禮西院大安去師携一小青竹杖入西院法堂安遙見而笑曰入涅槃堂去師應諾輪竹杖而入時有五百許僧染時疾師以杖次第點之各隨點而起閩王禮重創國歡禪苑以居之大光明藏云此黃涅槃也入西院涅槃堂故號涅槃聯燈會要趙州諗禪師章云南泉埀語云今時人須向異類中行始得師便問異即不問如何是類泉以兩手托地師近前一踏踏倒却向涅槃堂叫云悔悔泉令侍者問汝悔箇甚麼師云悔不更與兩踏無常堂即延壽堂也天竺稱無常院見于延壽堂處釋氏要覽云南山鈔云無常堂內置一立像金薄塗之云云同前延壽堂處引行事鈔重病閭蓋亦是延壽堂也大慧武庫云圓悟到五祖室中平生所得一句用不著出不遜語忿然而去祖云汝去遊浙中著一頓熱病打時方思量我在圓悟到金山忽染傷寒困極移入重病閭遂以平生參得底禪試之無一句得力追繹五祖之語乃自誓曰我病稍間即徑歸五祖將息寮蓋亦是延壽堂也續傳燈録葉縣省禪師章云師因去將息寮看病僧僧乃問曰和尚四大本空病從何來師曰從闍黎問處來僧喘氣又問曰不問時如何師曰撒手臥長空僧曰㖿便脫去卵塔忠曰無縫塔形似鳥卵故云卵塔下有辨雪峯存禪師録難提塔銘云土主曰松山卵塔號難提正宗贊雪峯贊云松山小塔卵石子亂疊幾層祖庭事苑云梵云塔婆此言方墳或云支提或云難提此言滅惡或云抖藪波此言贊護或云窣堵波此云靈廟或云高顯説文云塔西域浮屠也從土答聲土盍切正字通云漢以前無塔故説文有答無塔塔字徐氏新附爾雅俞畣肰也畣即答塔亦作塔林間録云雲居祐禪師曰吾觀諸方長老示滅必塔其骸山川有限而人死無窮百千年之下塔將無所容於是於宏覺塔之東作卵塔曰凡住持者自非生身不壞火浴雨舍利者皆以骨石填於此其西又作卵塔曰凡衆僧化皆藏骨石於此謂之三塔普燈録天衣義懷禪師章云弟子智才問卵塔已成如何是畢竟事師舉拳示之遂就寢推枕而寂文字禪謁靈源塔詩云瓦燈已照宮商石卵塔分藏服匿瓶僧寶傳瑞鹿先禪師傳曰大中祥符元年二月謂門弟子如晝曰為我造箇卵塔塔成我行矣叢林盛事云塗毒老人示寂放翁以詩哭之曰塵侵白拂繩床冷露滴青松卵塔成陸放翁渭南文集祭勤首座文云卵塔告成欲往不果古南牧雲登天童玲瓏巖詩云卵塔依空住香臺若砥平已下辨卵塔妄説世有援藏經説云昔有一女産五百卵皆破成人母按乳乳分為五百道灑五百兒口所破卵㲉聚之埋地上建一塔因名卵塔五百兒即五百阿羅漢也忠曰何從得斯説耶藏中人産卵纍有證唯瘞㲉名卵塔都不見本據夫般遮羅王妃生五百卵放乳驗子在俱舍頌疏世間品俱舍論略引又蓮華夫人生五百卵為五百力士出雜寶藏經又南本涅槃經云如施婆羅比丘優婆施婆羅比丘彌迦羅長者母尼拘陀長者母半闍羅長者母各五百子同於卵生止此又毗舍離女生三十二卵皆為力士為波斯匿王見殺見于賢愚經智度論作毗舍佉彌伽羅母須達長者女蘇曼生十卵卵開有十男兒後見佛得羅漢又見賢愚經婦人産卵緣如是不一稗禿附會搆幻卵塔因緣惑亂未學若實有之自古該博君子豈不録出示人耶又有鹿女生蓮華華千葉生千子後自外國來鹿女試按乳流為千岐入千兒口緣出于雜寶藏經西域記等然非卵生故今不用援證梅峯信和尚曰凡安舍利用銅瓶金壜藏之於塔中今函骨身於鑞瓶庀鑞瓶於銅瓷蓋擬金棺銀槨之製乎卵形蓋瓶瓷之遺形也止此若依忠所見亦不然昔南陽國師對代宗曰與老僧作箇無縫塔後之禪者託斯語乃窆亡僧削堅石團圝無縫稜無層級者呼為無縫塔矣無縫塔之形適如卵因名卵塔耳已下録先德告誡物初賸語笑翁堪禪師行狀云竺西用闍維自先佛以然其後佛法入中國間於道大德備之衲始用葬法然出於後人追崇如此耳後世沿襲之弊住山者雖妄一衲亦龜食形勝為朽骼腐胾之藏十室而九昔雲居佑禪師嘗病之曰山川有限人死無窮乃建三塔隨尊卑藏其燼餘師奏用其法俾禪教律同焉夢巖和尚旱霖集墳塔之戒云塔廟之所以為世所貴者果何為耶考之聖典上從諸佛下至輪王歿皆建塔而其制有差蓋因其功德之大小為品級耳夫輪王但以十善濟世則其為功也小佛以度生死之法益物則其為德也大由是觀之埀裕之實在功德而不在塔廟也崇奉之事在它人而不在自己也而近代法末號大有道者大率自營墳塔於死前囑其徒守之享祀於無窮由此大方巨剎主者塔院四環棊布後來者容無地則詭計爭奪無所不至竊惟迦葉守定雞足阿難分形恆流已來僧牒所載支竺名德未有一人以遺骸纍人者矣其上世則化火焚身空中雨舍利示業不亡刃下湧白乳四衆建塔供養靈感與佛靡殊其次則臨終告其徒使舁尸林下餧肉鳥獸或水葬省柴或歸骨石於普同塔而其門人不忍忘德或收舍利塔之或髹全身奉之烏如今日挾豪勢炫惑無識先言往行不一顧之極輪奐美高立標榜自示尊大之者乎智愈明迹愈晦道愈高位愈卑若彼明者高者未始逐蕞爾土木而存泯俗謂廉頗藺相如死向千年凜凜常有生氣曹蜍李志雖無恙奄奄如九泉下人端不虗語易曰古之葬者厚衣之以薪葬之中野不封不樹聖人之意豈不尚古乎孔子葬母於防曰丘也東西南北之人也不可以不識為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞古不修墓延陵季子適齊而返葬長子於嬴博之間穿不及泉斂以時服封墳掩坎其高可隱也號曰骨肉復歸于土命也魂氣則無不之也而遂行孔子孝子也季子賢父也共存名教者而其葬者如斯是亦凡為人資者之所宜知焉師已薄德資又無忠孝信義之實而事外飾過奉之則不止已陷非誼怕纍爾師於地下吾佛縣知今日告之我滅度已一千年惡法漸興不修道德競造塔寺佛之塔廟尚不許爾造况其餘乎又説比丘之法曰寄於殘生旅泊三界示一往還去已無返又曰比丘不修比丘法大千無唾處而今留無益不靈之枯臘自爼豆于聖賢之間不妄人而如此為乎是特世諦之一近事也耳尚能省識者少達觀絶識宜乎乏其人僅有好古不流俗耶不可不告以戒無縫塔卵塔也忠曰凡造塔相疊纍或木或石而成故皆有縫稜而今卵形塔一塊石而造無縫稜仍託南陽語稱無縫塔而已如南陽云無縫塔則別有意旨在傳燈録光宅寺慧忠國師章云師以化緣將畢涅槃時至乃辭代宗代宗曰師滅度後弟子將何所記師曰告檀越造取一所無縫塔曰就師請取塔樣師良久曰會麼曰不會師曰貧道去後有侍者應真却知此事乃至代宗後詔應真入內舉問前語真良久曰聖上會麼曰不會真述偈曰湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識應真後住耽源山普同塔忠曰凡藏亡僧骨植同歸于一塔故云普同塔文字禪普同塔記云自佛法入中國奉持之者纜總其法度參差不齊獨百丈大智禪師以禪律之學約之人情折中而為法以壽後世故其生依法而住謂之叢林及其化也依法而火之聚骨石為塔號普同塔乃至溈山空印禪師軾公住山十餘年百廢具興獨以普同塔未建為憂一旦與侍者登山之西崦相其形勝施長材鳩工以為之開大穴以石為宮又屋於其上棟楹翔空雲煙蔽虧萬衆歡呼聲應山谷普通塔即普同塔也僧寶傳寶峰英禪師傳云呼維那鳴鐘衆集敘行腳始末曰吾滅後火化以骨石藏普通塔明生死不離清衆也言卒而逝普燈作普同塔海會亦是普同塔也蓋與海衆同會於一穴也僧寶傳黃龍佛壽清禪師傳云公遺言藏骨石於海會示生死不與衆隔也第三類座位門座前敕修清規聖節上堂云頭首領衆出堂至法座前列一行問訊歸西序立又見座下處忠曰凡清規言座前即橕天柱之間也座下敕修清規聖節上堂云待住持斂衣趺坐侍者先末班引過座下列一行問訊燒香侍者引班歸位次首座領班出列座前問訊忠曰凡清規言座下即須彌座直下也住持轉位東序上首舊説曰都寺立班宜在後堂對面位若其前堂對面位乃是住持轉位也敕修清規亡僧大夜念誦云龕前念誦知事先燒香上茶湯住持至燒香居東序上首立維那出燒香請鎖龕佛事受請人出班忠曰住持避鎖龕人中立故轉居東序上首也故知住持若離中位立班則必居東序右邊也又云知客平舉楞嚴咒回向云云住持仍歸東序上首立江湖道舊鄉人法眷次第設祭忠曰此是住持避江湖等設祭中立也鎌倉清規衆寮諷經云住持入燒香而立都寺上位時寮元從西序班末知客之側出燒香忠曰此是住持避寮元中立燒香也入牌小師班位居浴司右前住入祖堂小師居浴司班右邊出位燒香問訊向住持請安牌佛事南禪規式前住入祖堂云小師親度牌於侍者小師在浴主後立法語畢侍者接牌度於都寺清拙小清規云入祖堂孝子僧從頭首之末進爐前問訊燒香了向長老請佛事單位敕修清規日用軌範云昏鐘鳴須先歸單位坐禪忠曰單者用小紅紙片題衆僧名貼各各位上壁別源東歸集云一單一鉢標一名止此是也有己名單之位此謂單位也又僧堂床前之板曰單濶八寸日用軌範言床前一尺蓋依周尺也凡言七尺單前者非帳帷之長謂自床後至前六尺日本謂之一間更加單板一尺合成七尺也又見文疏門單處東福僧堂床深六尺前單板一尺七尺單碧巖録云三條椽下七尺單前試去參詳看又有稱六尺單蓋除單板為六尺乎續燈録西禪繼圖禪師章云且向三條椽下六尺單前快須究取晦菴光禪師録石菴玿禪師録續古尊宿録皆有六尺單前語又有稱五尺單蓋亦六尺單用周尺則得四尺八寸存大數言五尺也佛果擊節録雪竇普請話評云也須是三根椽下五尺單前靜坐究取始得鄰單忠曰己之單位左右也敕修清規日用軌範云以枕子安腳下未要拗恐驚鄰單又云喫食之法不得抓頭恐風屑落鄰單鉢中又云不得與鄰單語話鄰單生疏當以善言誘喻不得生嫌惡心被位日用軌範云上被位眠單收一半坐定敕修清規出圖帳云寫被位圖鉢位圖舊説曰被位是大衆平僧排僧堂之位鉢位是蒙堂衆排僧堂之位忠曰按敕修清規鉢位圖注云被位倣此不分板首止此蓋鉢位分板首十六板等被位不分板首以為異也其分不分圖見圖牌門被位圖處敕修清規坐禪云或有留被在堂不隨衆者忠曰被者是坐禪之單也鉢位見于被位處圖見圖牌門敕修清規入院云大衆先歸鉢位立定又日用軌範云或歸衆寮喫湯藥或茶堂經行次第歸鉢位忠曰永平清規辨道法云粥了歸衆寮喫茶喫湯或復被位打坐止此此即以軌範鉢位又為被位可知被位鉢位非別余謂僧堂大衆粥齋坐位故謂鉢位其坐禪則謂之被位而已但鉢位分板首被位不分板首以為異也副鉢位敕修清規出圖帳云舊以送蒙堂者排副鉢後因爭競不排忠曰副鉢者鉢謂十六板頭也副相亞之意也今言只今但以單寮西堂首座勤舊排副鉢位古者蒙堂亦排副鉢遂有爭競故停之與大衆同依戒次排之也副鉢位圖見圖牌門被位圖處校定清規圖云或六出八出十二出隨僧堂大小衆之多寡又各排副鉢一位其餘並依戒次循轉四案位衆寮敕修清規衆寮結解特為衆湯云大衆依戒四案位忠曰四案位如僧堂四板頭備用清規日用清規云歸衆寮鳴大板三下問訊不歸輕侮大衆入門分四板頭依位立定止此此謂衆寮四板頭即今四案位也又衆寮結解點湯行禮圖見圖牌門特為位敕修清規方丈小座湯云第一座分二出特為東堂西堂請首座光伴舊説曰方丈特為位者主之對面位是也光伴位者主之分手位是也二出者除主伴外分二出也圖見二出座處又曰若僧堂則分手床頭立特榻矣又特為照牌見圖牌門光伴位舊説曰方丈光伴位者住持右邊即是住持分手位也又見特為位處主位忠曰室南鄉者以東為主位以西為賓位如方丈室東鄉者以北為主位以南為賓位如僧堂室西鄉者以南為主位以北為賓位如庫司禮記曲禮云主人入門而右客入門而左主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階鶴林玉露云四方以西為尊云云今朝廷之上羣臣皆自東階而升不敢升自西階非特嫌若賓主敵體亦以西為尊也班孟堅西都賦曰左墄右平左東也東則為墄若世所謂澀道乃羣臣所由登降之階也右西也西則為平而不為墄也凡賓主之席主東而賓西亦所以尊賓也非謂東尊於西而使賓次主也故禮客降一等則就主人之階蓋客不敢自西階為賓主禮欲自東階隨主人而升也主人辭客乃復位蓋主人不許客然後自西階升也唐趙璘因話録云人道尚右以右為尊先賓客故西讓客主人在東蓋自卑也今人東讓客豈禮哉文選司馬長卿喻巴蜀檄云位為通侯處列東第注善曰東第甲宅也居帝城之東故曰東第張揖曰列東第在天子下方翰曰第次也西為尊東為下言為通侯列在天子之下次賓位見于主位顧元慶簷曝偶談云古者賓位尚右史記陳平願以右丞相讓周勃語云無能出其右者及行尚西禮記曰主人就東階客就西階諺呼主人為東道則古人坐讓右行尚西亦甚明矣後世不察遂以東左為尊耳佛經尊右卑左觀佛三昧經云佛母摩耶生忉利天佛從閻浮提上忉利天為母説法龍王為佛作三道寶階上忉利宮梵天釋提桓因等侍左階聲聞菩薩大衆侍右階佛處其中取意又佛説海龍王經云佛愍龍王受其請龍王從海邊化作三道寶階金銀琉璃下至其宮佛升寶階陟於中階諸菩薩衆住右階諸大聲聞住在左階略鈔長阿含經遊行經云世尊到巴連弗城諸清信士起大堂舍世尊與大衆俱詣彼講堂處中而坐時諸比丘在左面坐諸清信士在右面坐忠曰尊比丘卑諸信士則左右與前二經違分手位舊説曰分手己之左右也又曰分手不可定也有住持之分手有後堂之分手忠曰但分手依或並向內或並向外者言之若己之左右班相對向者不稱分手自此名埀手耳敕修清規施主請升座云僧堂內設施主位與住持分手又留請兩序云客頭先報迎住持入分手坐忠曰左右坐曰分手坐今須住持主位知事賓位又唱衣云首座與主喪分手兩序大衆次第而坐垂手位忠曰在主席前東西對向如埀左右手然備用清規唱衣云主喪首座分手兩班埀手坐對面位敕修清規山門管待新命并專使云寢堂中敷住持高座專使附位于右兩序如常列左右勤舊對面位侍者知事下位上板下板僧堂上間板頭下間板頭也補僧寶傳雲巖新禪師傳云一日默坐下板會知事捶行者新聞杖聲忽大悟禪林寶訓云萬菴曰先師竄衡陽賢侍者録貶詞揭示僧堂前衲子如失父母涕泗愁嘆居不遑處音首座詣衆寮白之曰人生禍患不可苟免使妙喜平生如婦人女子陸沈下板緘默不言故無今日之事文字禪石臺夜坐詩云故鄉乃有此叢林下板何妨著寂音上堂下堂僧堂之上間下間也敕修清規大挂搭歸堂云參頭燒香同衆大展三拜巡堂一匝自上堂至下堂仍如前排立問訊又日用軌範云在上堂左足先入在下堂右足先入忠曰此約僧堂後門出入而言其左右也禪苑清規浴主云入浴之法老宿上堂後生下堂忠曰此浴室言上堂下堂也上間忠曰凡人鄉堂己身右為上間法堂方丈南向則東僧堂東向則北庫司西向則南此曰上間敕修清規大挂搭歸堂云維那入堂燒香上間立下間忠曰凡人鄉堂己身左為下間法堂方丈則西僧堂則南庫司則北此曰下間敕修清規告香云參頭領衆法堂下間謝維那侍者觸禮一拜校定清規書之云衆人隨參頭於法堂西北角謝維那侍者觸禮一拜左間右間敕修清規受法衣云嗣法師已遷化法堂右間設靈几忠曰右間即下間也身南面鄉堂外時右邊為下間故言右間也法堂則西也反之可上間言左間也已上肩下肩忠曰己之上位為上肩己之下位為下肩不拘己之左右矣譬如東序人以佛座為上則其在己之右肩者為上肩在己之左肩者為下肩敕修清規念誦云暫到於侍者下肩立又兩序交代茶云西序請茶則知事分手座於同列頭首中請肩下一人光伴如肩上人赴坐位相妨又謝挂搭云參頭立於侍者下肩又日用軌範云聞遍食椎看上下肩以面相朝揖食此與上肩順轉之上肩別若己身左為上肩右為下肩別見身肢門肩次下肩也下位也敕修清規謝挂搭云副參趲向前接聯參頭肩次伺住持至上手下手敕修清規謝挂搭云參頭居末至衆寮門外下手立云云參頭門外轉上手立又住持遷化挂真舉哀云有親書遺言喪司行者貼法堂中間上手幕上備用清規結制行禮云巡寮云云庫司蒙堂前資衆寮列門外下手立接住持入左手右手敕修清規謝挂搭云參頭退左足側轉身於香几右手空處出行過復位忠曰反之可言左手也團座合座圓形坐者此名團座圓形坐而開一方者此名合座此圖見敕修清規雲桃解方丈特為新挂搭茶處第一座第二座饗禮第一筵謂之第一座第二筵謂之第二座敕修清規嗣法師忌云如有三五人西堂則分作兩座第一座西堂喫湯住持行禮第二座兩序喫湯侍者行禮小座湯二出座四出座六出座敕修清規方丈小座湯云四節講行按古有三座湯第一座分二出特為東堂西堂請首座光伴第二座分四出頭首一出知事二出西序勤舊三出東序勤舊四出西堂光伴第三座位多分六出本山辦事諸方辦事隨職高下分座職同者次之首座光伴忠曰出者特也蓋取首出傑特之義正字通云出特也過人之稱徐稚傳角立傑出宜稚為先凡幾出者皆除主位及光伴位而論之特為湯四出敕修清規方丈特為新舊兩序湯云新頭首一出新知事二出舊頭首三出舊知事四出餘勤舊預光伴者列主伴兩邊西序居左東序居右特為茶六出校定清規夏前住持特為新挂搭茶六出之圖特為茶八出座校定清規知事頭首特為新挂搭茶八出之圖第四類節時門四節結夏解夏冬至年朝謂之四節義堂日工集云凡稱四節乃百丈叢林也結解則天竺佛制冬年則中華俗節百丈以隨方毗尼禮貴同俗遂有四大節之儀校定清規云今時叢林每遇解結冬年四節小參蓋為敘謝兩班及大小職務敕修清規節臘章云今禪林結制以四月望解以七月望者若先一日講行禮儀乃至中土以冬為一陽之始歲為四序之端物時維新人情胥慶禮貴同俗化在隨宜故以結解冬年為四大節周旋規矩聳觀龍象之筵主賓唱酬兼聞獅子之吼杜氏通典云漢高帝十月定秦遂為歲首七年長樂宮成制諸侯羣臣朝賀儀又云後漢歲首正月為大朝受賀居家必用引之云賀正名自此始居家必用云賀冬漢雜事曰冬至陽生君道長故賀也杜氏通典云大唐開元八年十一月中書門下奏曰伏以冬至一陽始生萬物潛動所以自古聖帝明王皆此日朝萬國觀雲物禮之大者莫逾是時云云從之因敕自今以後冬至日受朝永為恆式夏安居安居義見于叢軌門四分律藏安居揵度法云佛在舍衛國祇樹給孤獨園時六羣比丘於一切時春夏冬人間遊行時夏月天暴雨水大漲漂失衣鉢坐具針筒蹈殺生草木時諸居士見皆共譏嫌沙門釋子不知慙愧蹈殺生草木自言我知正法如是何有知正法乃至諸外道法尚三月安居此諸釋子而於一切時春夏冬人間遊行云云諸比丘以此因緣具白世尊世尊以無數方便訶責六群比丘已告諸比丘從今已去聽諸比丘三月夏安居白所依人言我於此處夏安居長老一心念我比丘某甲依某甲聚落某甲僧伽藍某甲房前三月夏安居房舍破修治故如是第二第三説後三月夏安居法亦如是又見安居處西域記云如來聖教歲為三時正月十六日至五月十五日熱時也五月十六日至九月十五日雨時也九月十六日至正月十五日寒時也又云印度僧徒依佛聖教坐雨安居或前三月或後三月前三月當此從五月十六日至八月十五日後三月當此從六月十六日至九月十五日前代譯經律者或云坐夏或云坐臘斯皆邊裔殊俗不達中國正音或方言未融而傳譯有謬又云印度僧徒依佛聖教皆以室羅伐拏月前半一日入雨安居當此五月十六日以頞濕縛庾闍月後半十五日解雨安居當此八月十五日印度月名依星而建古今不易諸部無差良以方言未融傳譯有謬分時計月致斯乖異故以四月十六日入安居七月十五日解安居也善見律云梵本律五月十六日為前安居六月十六日後安居若安居中有因緣移去無罪不成安居行事鈔安居策修篇云律通制三時意存據道文偏約夏月情在三過一無事遊行妨修出業二損傷物命違慈實深三所為既非故招世謗以斯之過教興在茲又云春冬過少又見叢軌門安居處忠曰三時春夏冬也天竺立三時盡一年故一時各有四箇月又云初四月十六日是前安居十七日已去至五月十五日名中安居五月十六日名後安居故律中有三種安居謂前中後也又見叢軌門安居處忠曰事鈔安居篇資持記云一時四月約過是同止此按西域記自五月十六日至九月十五日都四箇月為雨時乃佛教立三時然即前安居者開後一月以五月十六日結至八月十五日解然事鈔云前安居自四月十六日此猶在熱時則為跨熱雨二時豈得言一時耶亦不可稱唯雨安居矣是故以四月十六日結順傳譯乖謬也若自五月十六日結則一時四月之言無爽亦稱雨安居無失其後安居者以六月十六日結至九月十五日解亦是在一雨時內可稱唯雨安居矣四分律云爾時舍利弗目連欲共世尊安居十五日從所住處往十七日乃至不知當云何即白諸比丘諸比丘以此事白佛佛言聽後安居有二種安居有前安居有後安居若在前安居應住前三月若後安居應住後三月結夏忠曰結夏安居之制也又名結制又見叢軌門安居處禪苑清規結夏云行腳人欲就處所結夏須於半月前挂搭所貴茶湯人事不至倉卒中峯雜録示衆云若以至理言之最初發心向道時此夏已曾結了也十二時中看箇所參底無義味話頭未即決了便是坐夏時三十年二十年推到神消識盡冷地裏忽爾猛省得著便是解夏之時自恣之日豈以區區九十日為限哉一夏九旬忠曰從四月十五日至七月十五日都九十日為一夏復有禪祖不拘時月只數九十日為一夏者傳燈録曹山本寂禪師章云師曰曹山一生行腳到處只管九十日為一夏普燈録雪庭元淨禪師章云死心和尚道山僧行腳三十餘年以九十日為一夏增一日也不得減一日也不得取不得捨不得不可得中只麼得有以八十日為期者中峯和尚雜録冬安居示衆云以八十日立為長期欲諸人屏除心念蕩滌外緣斷絶妄情純一無雜單單究此事所云期者乃相約之義必期成佛作祖必期及第心空必期超越死生必期續佛慧命或不與所期相應便是過此八十日之期亦不肯懡㦬而休須做一回倒斷覺浪禪師尊正規云結制之法一年分為四期一期是九旬今定八旬為度餘十日寬其規矩與學人料理身分上事或遷移別堂及暫時告假幹辨等忠曰八十日為期圓覺所謂下期也圓覺經圓覺菩薩章云若法末時具大乘性欲修行者即建道場當立期限若立長期百二十日中期百日下期八十日安置淨居略鈔白夏禪林類聚云世尊在摩竭陀國為衆説法是時將欲白夏乃謂阿難云諸大弟子人天四衆我常説法不生敬仰我今入因沙舊室中坐夏九旬忽有人來問法之時汝代為我説一切法不生一切法不滅言訖掩室而坐忠曰此緣出諸佛要集經行事鈔安居策修篇云安居上座於一切僧集時食時粥時漿時應白言爾許時已過餘有爾許時在若行此等行法者是名僧父母亦名僧師資持記云白法中云云今準義加於小食上維那打槌告云白大衆安居已過一日餘有八十九日在當勤精進謹慎莫放逸餘日準此加減半夏忠曰結夏與解夏之中間也臨濟玄禪師録云師因半夏上黃檗見和尚看經師云我將謂是箇人元來是掩黑豆老和尚住數日乃辭去黃檗云汝破夏來不終夏去師云某甲暫來禮拜和尚黃檗遂打趁令去師行數里疑此事却回終夏破夏忠曰不守禁足之制出界外遊者見半夏處行事鈔自恣宗要篇云若破夏不安居人雖不得歲以舉罪義通理必依衆恣僧治舉又云問十五日自恣已得出界不答不得破夏離衣由夜分未盡故北澗詩集云藉甚參寥子臨平破夏歸參寥子詩集臨平道中詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲解夏解夏安居之制也又名解制禪苑清規解夏云七月十四日晚念誦煎湯來日升堂人事巡寮煎點並同結夏之儀自恣日行事鈔自恣宗要篇云然九旬修道精練身心人多迷己不自見過理宜仰憑清衆埀慈誨示縱宣己罪恣僧舉過內彰無私隱外顯有瑕疵身口託於他人故曰自恣翻譯名義集云鉢剌婆剌拏音義指歸譯為隨意寄歸傳云凡夏罷歲終之時此日應名隨意即是隨他於三事之中任意舉發説罪除𠎝之義舊云自恣者是義翻然則自恣之言涉乎善惡今局善也釋氏要覽云十誦云好惡相教以三語自恣注三語者謂見聞疑十誦律自恣法云諸比丘一處集應三事求他説自恣何等三若見若聞若疑乃至應差能作自恣人廣説應如是語長老憶念今僧自恣日我某甲比丘長老僧自恣語若見聞疑罪語我憐愍故我若見罪當如法除首楞嚴經云屬諸比丘休夏自恣釋要鈔云自恣凡有二種五德一舉罪五德謂知時不以非時如實不以虛妄利益不以損減柔軟不以獷慈心不以瞋恚二自恣五德謂不愛不瞋不怖不癡如自恣不自恣然自恣通三日七月十四十五十六又修道安樂亦通延日自恣可延至八月十五日忠曰釋要依行事鈔自恣宗要篇行事鈔自恣宗要篇云然律中但明十四日十五日自恣及至急施衣中次第增中十六日自恣增三中三日自恣律云安居竟自恣則七月十六日為定律又云僧十四日自恣尼十五日自恣此謂相依問罪故制異日及論作法三日通用克定一期十六日定若有難者如五百問中一月自恣法苑珠林云增一阿含經云爾時世尊在舍衛國東鹿母園中與大比丘衆五百人俱是時世尊七月十五日於露地敷坐比丘僧前後圍繞佛告阿難曰汝今速擊揵稚今七月十五日是受歲之日阿難叉手便説此偈淨眼無與等無事而不練智慧無染著何等名受歲世尊以偈報曰受歲三藏淨身口意所作兩兩比丘對自陳所作短還自稱名字今日衆受歲我亦淨意受唯願原其過是時阿難聞已歡喜即升講堂手執揵稚而説此偈降伏魔力怨除結無有餘露地擊揵稚比丘聞當集諸欲聞法人度流生死海聞此妙響音盡當雲集此爾時阿難擊揵稚已至世尊所白世尊言今正是時唯願世尊何所敕使是時世尊告阿難曰汝隨次坐當坐草座時諸比丘各坐草座是時世尊默然觀諸比丘已便敕諸比丘我今欲受歲我無過咎於衆人乎又不犯身口意耶如來説此語已諸比丘默然不對是時再三告諸比丘已時尊者舍利弗即從座起長跪白世尊言諸比丘衆觀察如來無身口意過世尊今日不度者度不脫者脫不般涅槃者令般涅槃無救護者為作救護盲者為作眼目為病者作大醫王三界獨尊無能及者以此事緣如來無咎於衆人亦無身口意過是時舍利弗白世尊言我今自陳無咎於如來及比丘僧乎世尊告曰汝舍利弗都無身口意所作非行汝今智慧無能及者汝今所説常如法義未曾違理是時舍利弗白佛言此五百比丘盡當受歲盡無咎於如來乎世尊告曰亦不責此五百比丘身口意此舍利弗大衆之中極為清淨無瑕穢今此衆中最小下坐得須陀洹必當上及不退轉法以是之故我不恐責此衆忠曰所援增一經第二十四卷善聚品文也今以珠林略鈔簡明依珠林所載耳法臘敕修清規節臘章云或曰坐夏或曰坐臘戒臘之義始此如言驗蠟人氷以坐臘之人驗其行猶氷潔或謂埋蠟人於地以驗所修之成虧者類淫巫俚語庸非相傳之訛耶且吾所修證聖不能窺豈外物可測其進退哉玄應衆經音義云臘力盍切案風俗通曰夏曰嘉平殷曰清祀周曰大蠟漢曰臘臘獵也獵取禽獸祭先祖也此歲終祭神之名也經中言臘佛者即此義也或曰臘者接也新故交接也諸經律中亦名歲如新歲經等爾雅注云一終名歲又取歲星行一次也夏曰歲商曰祀周曰年唐虞曰載皆據一終為名今比丘或言臘或云夏或言雨亦爾皆取一終之義案天竺多雨名雨安居從五月十五日至八月十五日也上人羅諸國至十二月安居今言臘者亦近是也此方言夏安居各就其事制名也路史餘論云蠟與臘異臘者祭先祖蠟者報百神萬卷星羅云自冬至日去後第三戌為臘也若冬至日值戌日此便為一戌之數或三戌日在十一月內須用第四戌日在十二月之內是定之僧史略賜夏臘章云所言臘者經律中以七月十六日是比丘五分法身生來之歲首則七月十五日是臘除也比丘出俗不以俗年為計乃數夏臘耳經律又謂十五日為佛臘日也盂蘭盆經孤山釋云臘者以七月十六是比丘五分法身生來歲首則以七月十五為歲除者非以七月十六方始入臘八月十六是歲首十五為歲除耳學者宜知忠曰蓋孤山依玄奘前安居以五月十六日入之説故八月十五日為歲除矣玄奘説見夏安居處祖庭事苑風穴衆吼集蠟人氷注云蠟當作臘謂年臘也按增輝記臘接也謂新故之交接俗謂臘之明日為初歲也蓋臘盡而歲來故釋式以解制受臘之日謂之法歲是矣天竺以臘人為驗者且其人臘有長幼又驗其行有染淨言臘人冰者是言其行之冰潔也今衆中妄謂西天立制唯觀蠟人之冰融然後知其行之染淨佛經無文律範無制未詳得是説於何邪今此集以臘為蠟深誤後人良可歎也東谷禪師解夏普説云西天鑄蠟人為驗行全則氷不全則冸宋曾三異同話録云僧家所謂伏蠟者謂削髮之後即受戒若或斷酒色等若干件每歲禁足結夏自四月十五日至七月十五日終西方之教結夏之時隨其身之輕重以蠟為其人解夏之後以蠟人為驗輕重無差即為驗定而無妄想其有妄想者氣血耗散必輕於蠟人矣湯朝美作本然僧塔銘寫作伏臘之臘蓋未詳此也忠曰曾儒必得之妄僧敢作此説佛教所無其造語艱滯可笑以朝美作臘却為非猶如己倒懸而嘲人之正立矣戒臘同法臘忠曰自受具足戒同大僧歸僧堂辦道安居滿而受法歲故凡為僧者從此年數去言戒臘幾多或言坐幾夏也舊説曰古者以安居禁足數幾臘僧傳所謂世壽若干法臘若干是也今時不必然但自剃度年數為幾臘而已忠曰從為僧數夏臘亦有例證如雲峯悅禪師七歲剃度佛祖通載書云住世六十六年為僧五十九夏止此豈七歲非年滿而受具耶法歲比丘以七月十五日受法歲見自恣處義同法臘也釋氏要覽云夏臘即釋氏法歲也凡序長幼必問夏臘多者為長故云天竺以臘人為驗焉經音疏增輝記皆云臘接也蔡雍獨斷云臘者歲之終也晉博士張亮議云臘接也新故交接俗謂臘之明日為初歲也今釋氏自四月十六日前安居入制至七月十五日為受臘之日若俗歲除日也至十六日是五分法身生養之日名新歲也自夏九旬統名法歲矣四分律云前安居者欲自恣後安居者不知得自恣不佛言聽受自恣住待日足前安居人自恣已數歲後安居人不知得數歲不佛言不應三月未足便數歲八朔鏡堂圓禪師建仁録八月旦上堂云扶桑八月初一古謂天中佳節各祈妖怪潛蹤皆願口舌消滅云云忠曰八朔為天中節蓋日本傳習耶月令廣義云道書正月一日天中節會之辰獻壽之日又云提要録五月五日午時為天中節漢制考云法言膢臘注膢八月旦也今河東俗奉以為大節祭祀先人也楊子法言問道篇注光曰膢落侯切月令廣義云音義冀州北八月朔作飲食為膢俗曰膢臘忠曰八朔膢之説如此著矣然公事根源云八朔風俗此事更無本説止此何耶授衣節鏡堂圓禪師建仁録授衣節上堂云人間九月授衣時破綻禪和猶未知趁暖急須先補綴待寒方覺已遲遲冬安居和漢禪林夏安居之外坐冬安居即以十月十六日結到明年正月十五日以謂其便于禪坐勝夏安居焉既為古矣行事鈔云律通制三時前夏安居處引故知佛制亦有冬安居也梵網經故入難處戒中云若佛子常應二時頭陀冬夏坐禪結夏安居常用十八種物經具列常隨其身頭陀者從正月十五日至三月十五日八月十五日至十月十五日是二時中此十八種物常隨其身如鳥二翼忠曰蓋言行頭陀可於夏冬二安居之間其云從正月十五日便可知有冬安居也冬安居了之明日始頭陀也永平道元和尚云梵網經中雖有冬安居文其法不傳但九夏安居法傳焉榮西和尚興禪護國論云夏冬安居謂四月十五日結夏七月十五日解夏又十月十五日受歲正月十五日解歲二時安居并是聖制也不可不信行我國此儀絶久矣大宋國比丘者二時安居無闕怠不安居而稱夏臘之二名佛法中可笑也忠曰言十月十五日受歲者恐未曉增一七月十五日受歲之説耶五燈會元第二世寶壽和尚失名嗣寶壽沼章云在先寶壽為供養主壽問父母未生前還我本來面目來師立至夜深下語不契翌日辭去壽曰汝何往師曰昨日蒙和尚設問某甲不契往南方參知識去壽曰南方禁夏不禁冬我此間禁冬不禁夏汝且作街坊過夏若是佛法闤闠之中浩浩紅塵常説正法師不敢違傳燈廣燈第二世寶壽章不收此緣大隋真禪師録云老僧行腳時看他眼目稍似根性有些些器量方欲過一夏或一冬詳于參請門遍參處月江印禪師再住澱山録解制上堂云南方禁夏不禁冬北方禁冬不禁夏又覩貨邏國以十二月十六日安居西域記云覩貨邏國氣序既溫疾疫亦衆冬末春初霖雨相繼故此境已南濫波已北其國風土並多溫疾而諸僧徒以十二月十六日入安居三月十五日解安居斯乃據其多雨亦是設教隨時也雲棲山房雜録即事詩云春開講演席挂鉢聲相鳴秋結禪那期孤存二三僧忠曰由此雲棲結秋安居也冬夜忠曰冬至前夜也幻住清規十一月冬至云其冬夜土地堂念誦及冬朝講禮分冬冬夜也虗堂徑山後録云僧問云云僧云只如徑山今冬果子貴將什麼與諸人分冬師云鐵酸豏冬朝忠曰冬至之朝也見于冬夜又賀冬義見四節處分歲聯燈會要北禪賢禪師章云歲夜小參示衆云年窮歲盡無可與諸人分歲且烹箇露地白牛炊黍米飯向骨柮火唱村田樂何故免見倚他門戶傍他牆剛被時人喚作郎便下座年朝忠曰正月朔日也賀正義見四節處善月忠曰此三箇月特可修善故正五九為善月敕修清規善月云正五九為善月又云始由隋開皇三年詔天下正五九并六齋日各寺建祈禱道場不得殺生命取藏經中有毗沙門天王每歲巡按四大部洲正五九月治南瞻部洲故禁屠宰而唐之藩鎮每上任必犒士卒不下數萬人須大烹宰故以正五九不上官為禁殺也而俗以為忌者非開皇詔依三寶紀見三長齋月處群談採餘辨惑類云正五九月新官到任今人多忌不知所謂考之唐時以此三月斷屠宰上任必有大宴宰割遍及下人緣禁不便故於正五九不上任非其利也今無禁而不用至於移居忌之豈非因襲之弊耶又一説以正五九月建乃寅午戌也寅午戌屬火臣音為商商屬金恐火之尅於金故忌之未知是否忠曰寅午戌火尅商金之説儒家不曉三長齋月出于佛書斷屠妨犒宴矣教苑清規云正五九月為三長齋世稱善月每月建祈福道場提謂經云諸天帝釋太子使者閻羅鬼神俱用正五九月旦日案行王民等為善惡者四時交代歲終三覆以校與四王一月六奏使無枉錯覆校衆生罪福作善降祥不善降殃自隋開皇三年詔天下正五九月及六齋日不得殺生命唐武德二年詔天下正五九月十齋日不得行刑屠釣逮今聖朝遵行尤篤各寺凡屆斯期或怠也三長齋月即善月也齋義見雜行門持齋處釋氏要覽云三長月不空羂索經云諸佛神通之月智論云天帝釋以大寶鏡從正月照南郯部洲二月照西洲至五九月皆照南洲察人善惡故南洲人多於此月素食修善故經云年三長齋也又一説北方毗沙門天王巡察四洲善惡正月至南洲亦如鏡照至五九月皆察南洲故忠曰智度論無帝釋照鏡之文智論但有六齋日説而已見六齋日處要覽妄引梵網經詐親害生戒中云於六齋日年三長齋月作殺生劫盜破齋犯戒者犯輕垢罪梵網傳奧疏云三長齋月者智論説天帝以大寶鏡共諸天衆從正月一日照南洲善惡具録如是二月東三月北四月西五月還至此九月亦然梵網明曠疏云年三長月者正月是衆生現生之初五月是興盛之中九月是斂藏之始忠曰釋門正統舉二説正是用傳奧明曠疏耳又明曠義正依提謂經意次下引又通月令義見于後引鼠璞中斂藏疏作欲藏寫訛也梵網私記云年三長齋者正月初半五月上半九月初半並是也補忘鈔云既云初半乃知白月也法苑珠林亦云從一日至十五日資持記云年三者正五九月冥界業鏡輪照南洲若有善惡鏡中悉現注或云天王巡狩四天下此三月對南洲又云此三月惡鬼得勢之時故令修善法苑珠林云提謂經云提謂長者白佛言世尊歲三齋皆有所因何以正用正月三月九月六日齋用月八日十四日十五日二十三日二十九日三十日佛言正月者少陽用事萬神代位陰陽交精萬物萌生道氣養之故使太子正月一日持齋寂然行道以助和氣長養萬物故使竟十五日五月者大陽用事萬物代位草木萌類生畢百物懷妊未成成者未壽皆依道氣故持五月一日齋竟十五日以助道氣成長萬物九月者少陰用事乾坤改位萬物畢終衰落無牢衆生蟄藏神氣歸本因道自寧故持九月一日齋竟十五日春者萬物生夏者萬物長冬者萬物藏依道生沒天地有大禁故使弟子樂善者避禁持齋救神故爾長者提謂白佛言三長齋何以正月一日至十五日復言如何名禁佛言四時交代陰陽易位歲終三覆以校一月六奏三界皓皓五處録籍衆生行異五官典領校定罪福行之高下品格萬途諸天帝釋太子使者日月鬼神地獄閻羅百萬神衆等俱用正月一日五月一日九月一日四布案行帝王臣民八夷飛鳥走獸鬼龍行之善惡知與四天王月八日十五日盡三十日所奏同無不均天下使無枉錯覆校三界衆生罪福多少所屬福多者即生天上即敕四鎮五官大王司命增壽益算下閻羅王攝五官除罪名定福祿故使持是三長齋是故三覆八校者八王日是也亦是天帝釋輔鎮五官四王地獄王阿須倫諸天案行比校定生注死增減罪福多少有道意無道意大意小意開解不開解出家不出家案比口數皆用八王日何等八王日謂立春春分立夏夏至立秋秋分立冬冬至是謂八王日天地諸神陰陽交代故名八王日月八日十四日十五日二十三日二十九日三十日皆是天地用事之日上下弦望朔晦皆録命上計之日故使於此日自守持齋以還自校使不犯禁自致生善處已下録三齋月斷刑屠歷代三寶記大隋録云開皇三年降敕旨云好生惡殺王政之本佛道埀教善業可憑稟氣含靈唯命為重宜勸勵天下同心救護其京城及諸州官立寺之所每年正月五月九月恆起八日至十五日當寺行道其行道之日遠近民庶凡是有生之類悉不得殺陸遊老學菴筆記云唐高祖實録武德二年正月甲子下詔曰釋典微妙淨業始於慈悲道教沖虗至德去其殘暴況乎四時之禁毋伐麛卵三驅之禮不敢順從蓋欲敦崇仁惠蕃衍庶物立政經邦咸率斯道朕祇膺靈命撫遂羣生言念亭育無忘鑒昧殷帝去綱庶踵前修齋王捨牛實符本志自今每年正月五月九月十直日並不得行刑所在公私宜斷屠殺此三長月斷屠殺之始也唐士大夫如白居易輩蓋有遇此三齋月杜門謝客專延緇流作佛事者今法至此月亦減去食芋錢蓋其遺制事物紀原云斷屠唐刑法志曰武德二年詔斷屠日不行刑會要曰武德二年正月二十四日詔自今後每年正月五月九月及每月十齋日並斷屠按此則是斷屠之制起於唐高祖也杜佑集歷代沿革事為通典前此無文而首載武后聖曆二年事驗此可知也宋朝因之臨時限日云忠曰十齋日者佛祖統紀云十齋經於六齋日加月旦十八二十四二十八四日也今國律令諸州十直日不得行刑正據此義忠曰老學筆記事物紀原并以唐高祖武德為善月斷屠之始制蓋在唐此可為始焉若遠論之隋文帝開皇為正五九月斷屠之始見三寶記敕修清規依之見善月處宋許觀東齋紀事云高承事物紀原唐刑法志武德二年詔斷屠日不行刑會要曰武德二年正月二十四日詔自今以後每年正月五月九月及每月十齋日並斷屠按此則斷屠之始起于唐高祖也承所紀非也隋高祖仁壽三年詔六月十三日是朕生日宜令海內為武皇帝后斷屠則此制隋已有之不始於唐已忠曰東齋總論斷屠言不始於唐是也其言始於隋仁壽猶未是也若論天子生日斷屠則以隋仁壽為始若論正五九月斷屠以隋開皇為始凡儒氏不得歷代三寶記説往往失考詢芻録闕撰人名云新官到任多忌正五九三月不知所謂唐以此三月斷屠宰節度使上任必有大宴宰割遍及下人緣禁不便事故於此三月不上任非不利也今無齋禁而亦不用豈非因襲之弊哉宋戴埴鼠璞云今俗人食三長月素按釋氏智論天帝釋以大寶鏡照四大神洲每月一移察人善惡正五九月照南贍部洲唐人於此三月不行死刑曰三長月節鎮因戒屠宰不上官是以天帝釋為可欺也妄誕可笑然月令於孟春言無傷胎卵毋聚大衆不可稱兵於仲夏言君子齋戒必掩身毋躁薄滋味節嗜欲靜事毋刑於季秋言命衆百官無不務內以會天地之藏無有宣出豈時令當然耶忠曰如埴言實十二月只三月戒屠宰而餘九月否則為欺天帝汝若然當全十二月禁屠殺奉戒善有何不可耶若言不能之則且帝釋親臨三月奉殺禁猶優都無戒矣譬如世人間居汰傲若君父來視則改容示恭焉琅邪代醉編云正五九月不上官戴埴云釋氏智論天帝釋以寶鏡照四大神洲每月一移察人善惡此三月照南贍部州唐人以此不行死刑曰三長月節鎮因戒屠宰不上官後世因之歐陽永叔治平丁未三月出知亳州陛辭乞便道過穎許之公與曾舍人書云在穎無所營為所以少留者蓋避五月上官爾此老未能免俗亦可笑也王元美曰宋人以是三月食素誦經已可笑矣今人不斷屠宰但不上任尤為無謂或曰宋朝火德火生于寅旺于午墓于戌此三月謂之災月官員例減祿料無羊故又謂無羊之月衆皆避之似勝但長生帝旺祿命家所喜何以謂災至胡太僕汝嘉謂火君象臣下宜避尤無謂容齋隨筆云釋氏以正五九月為三長月故奉佛者皆茹素其説云天帝釋以大寶鏡輪照四天下寅午戌月王臨南贍部洲故當食素以徼福官司謂之斷月故受驛券有所謂羊肉者則不支俗謂之惡月士大夫赴官者輒避之或人以謂唐日藩鎮蒞事必大享軍屠殺羊豕至多故不欲以其月上事今之他官不當爾也然此説亦無所經見豫讀晉書禮志穆帝納后欲用九月九月是忌月北齊書云高洋謀篡魏其臣宋景業言宜以仲夏受禪或曰五月不可入官犯之終於其位景業曰王為天子無復下期豈得不終於其位乎乃知此忌相承由來已久竟不能曉其義及出何經典也野客叢書云隨筆云齊書高洋謀篡魏其臣宋景業言宜以仲夏受禪或曰五月不可入官犯之不終於其位景業曰王為天下無復下期豈得不終其位乃知此忌相承已久不曉其義僕觀前漢張敞為山陽太守奏曰臣以地節三年五月視事其言如是則知前漢之俗未嘗忌五月也然張敞在山陽監護驕賀其責甚難卒以無事其後徵為膠東相亦不聞有凶橫之説又觀後漢朔方太守碑云延嘉四年九月乙酉詔書遷衙令五月正月到官乃知拘忌之説起於兩漢之後然又觀獨孤及集有為舒州到任表曰九月到州訖乃知唐人亦有不忌九月者因考諸州唐人題名見不避正五九處亦多神通月三長齋又名神通月神變月神足月等不空羂索神變真言經云修此法者當于十方一切諸佛神通月修所謂正月五月九月白月一日至十五日如法清淨讀誦受持即得成就神變月雜阿含經云於月八日十四日十五日及神變月受戒布薩神足月雜阿含經云於法齋日及神足月受持齋戒修功德四孟月敕修清規月分須知云正月初一日有處四孟月大衆行道諷經祈保羣書拾唾云四孟孟春正月孟夏四月孟秋七月孟冬十月旦望敕修清規住持日用云凡旦望侍者隔宿稟住持云來晨祝聖上堂幻住清規云一年十二月遇初一十五是謂朔望須就粥前諷大悲咒祝聖興禪護國論云報恩謂每月朔日奉為今上皇帝講般若經十五日奉為先皇講大涅槃經有祈請句忠曰旦望禮儀亦是隨世俗焉居家必用云朔望廣州記尉陀立朝臺朔望升拜名此始也杜氏通典云大唐永徽二年八月二十九日下詔來月一日太極殿受朝此後每五日一度太極殿視事朔望朝即為恆式旦謂朔日忠曰清規朔日十五日為旦望或言月旦月望見四齊日處而韻書無朔曰旦之訓按西京雜記云月之旦為朔車之輈亦謂之朔名齊實異止此又後漢書許劭論鄉黨人物每月輒更其品題故汝南俗有月旦評焉止此月令廣義每月令載此以係初一日可證月旦為月朔也又葉隆禮遼志歲時雜記題正旦其中記正月一日事望謂十五日品字箋云望説文月滿與日相望如朝君也從臣從月從壬壬朝廷也徐曰假借作望增韻今經典通作望五旦望五參日朔日十五日此謂五旦望也皆有上堂敕修清規赴齋粥云近時諸方住持大鐘鳴時先入堂坐至堂前鐘鳴方下地普同問訊只遇五旦望講行一次新入衆者不知所自五參日五日一參故曰五參即五日十日二十日二十五日也詳埀説門五參上堂校定清規云如初五初十二十二十五此四日謂之五參詳垂説門忠曰準春明退朝録則五日十一日二十一日二十五日也密菴傑禪師靈隱録上堂云五日一參諸方常例不説少室單傳不説靈山受記云云中巖月禪師崇福菴録云五參衆立定師出來大衆如例問訊師云五日前山僧來到這裡諸人恁麼問訊今日來到者裏亦是恁麼問訊但恁麼去有甚了期便歸室忠曰可知日本此時有此規三八日古以每旬三八日念誦乃一月有六日今以上八中八下八為三八乃一月有三箇八日也故備用清規聖節云聖節內遇八佛殿念誦又見諷唱門誦敕修清規念誦云古規初三十三草三初八十八草八今止行初八十八草八蓋上八中八念誦祝禱帝道昌法輪轉等下八念誦令衆觀無常其意見敕修清規念誦回向文敕修清規聖節云節內遇三八日佛殿念誦榮西興禪護國論云念誦謂每月初三十三草三初八十八草八六箇日有儀式念十佛名奉祝皇風遠扇帝道久潤佛法永弘利生廣大兼報一草一葉施主恩矣三八日入室敕修清規入室云今時以三八入室者備故事也三八普説西禪舜禪師上堂云五日一參三八普説詳垂説門五參上堂六齋日忠曰每月八日十四日十五日二十三日二十九日三十日此為六齋日名義集云逋沙他此云齋日止此齋義詳雜行門持齋處智度論云問曰何以故六齋日受八戒修福德答曰是日惡鬼逐人欲奪人命疾病凶衰令人不吉是故劫初聖人教人持齋修善作福以避凶衰是時齋法不受八戒直以一日不食為齋後佛出世教語之言汝當一日一夜如諸佛持八戒過中不食是功德將人至涅槃論詳説受八戒法佛説四天王經云佛告諸弟子齋日責心慎身守口諸天齋日伺人善惡須彌山上即第二天天帝名因福德巍典主四天四天神王即因四鎮王也各理一方常以月八日遣使者下案行天下伺察帝王臣民龍鬼蜎飛蚑行蠕動之類心念口言身行善惡十四日遣太子下十五日四王自下二十三日使者復下二十九日太子復下三十日四王復自下四王下者日月五星二十八宿其中諸天僉然俱下四王命曰勤伺衆生施行吉凶若於斯日有歸佛歸法歸比丘僧淨心守齋布施貧乏持戒忍辱精進禪定玩經散説開化盲冥孝順二親奉事三尊稽首受法行四等心慈育衆生者具分別之以啓帝釋若多修德精進不怠釋及輔臣三十二人僉然俱喜釋敕司命增壽益算遣諸善神營護其身隨戒多少若持一戒令五神護之五戒具者令二十五神營衛門戶凶疫衆邪陰謀消滅夜無惡夢縣官盜賊水火災變終而不害禳禍滅怪唯斯四等五戒六齋耳猶如大水而滅小火豈有不滅者乎臨其壽終迎其魂神上生天上七寶宮殿無願不得若有不濟衆生之命穢濁盜竊淫犯他妻兩舌惡罵妄言綺語厭禱咒詛嫉妬恚癡逆道不孝違佛遠法謗比丘僧善惡反論有斯行者四王以聞帝釋及諸天僉然不悅善神不復營護之即令日月無光星宿失度風雨違時以現世人欲其改往修來洗心齋肅首過三尊四等養親忠于帝王慈心諫諍至誠無欺反前修來捐穢濁之操就清淨之道若有改邪行就正真者帝釋四王靡不歡喜日月即清明星宿有常風雨順時毒氣消歇天降甘露地出澤泉水滋味食之少病華色奕奕壽命益長生不更牢獄死得上天智度論云如四天王經中佛説月六齋日使者太子及四天王自下觀察衆生布施持戒孝順父母少者便上忉利以啓帝釋帝釋諸天心皆不悅説言阿修羅種多諸天種少若布施持戒孝順父母多者諸天帝釋心皆歡喜説言增益諸天衆減損阿修羅是時釋提婆那民見諸天歡喜説此偈言六日神足月受持清淨戒是人壽終後功德必如我佛告諸比丘釋提桓因不應説如是偈所以者何釋提桓因五衰三毒未除云何妄言持一日戒功德福報必得如我若受持此戒必應如佛是則實説諸大尊天歡喜因緣故得福增多復次此六齋日惡鬼害人惱亂一切若所在丘聚郡縣國邑有持齋受戒善人者以此因緣惡鬼遠去住處安穩以是故六日持齋受戒得福增多問曰何以故諸惡鬼輩以此六日惱害於人答曰天地本起經説劫初成時有異梵天王子諸鬼神父修梵志苦行滿天上十二歲於此六日割肉出血以著火中以是故諸惡鬼神於此六日輒有勢力問曰諸鬼神父何以於此六日割身肉血以著火中答曰諸神中摩醯首羅神最大第一諸神皆有日分摩醯首羅一月有四日分八日二十三日十四日二十九日餘神一月有二日分月一日十六日月二日十七日其十五日三十日法苑珠林其字在月二日上屬一切神摩醯首羅為諸神主又得日多故數其四日為齋二日是一切諸神日亦數以為齋是故諸鬼神於此六日輒有力勢復次諸鬼神父於此六日割肉出血以著火中過十二歲已天王來下語其子言汝求何願答言我求有子天王言仙人供養法以燒香甘果諸清淨事汝云何以肉血著火中如罪惡法汝破善法樂為惡事令汝生惡子噉肉飲血當説是時火中有八大鬼出身黑如墨髮黃眼赤有大光明一切鬼神皆從此八鬼生以是故於此六日割身肉血以著火中而得勢力如佛法中日無好惡隨世惡日因緣故教持齋受戒忠曰諸偈類要援四天王經全依智論引彼經撿此方藏中四天王經無修羅增減文按增一阿含高幢品雜阿含第四十樓炭經忉利天品正法念處經第六十八並説六齋日有修羅增減文大同智論説智度論云從四天王乃至淨居天是大力諸天來小鬼避去菩薩能生清淨大心是故來隨逐法師六齋日諸天來觀人心十五日三十日上白諸天復次是六齋日是惡日令人衰凶若有是日受八戒持齋布施聽法是時諸天歡喜小鬼不得其便利益行者優婆夷墮釋迦經云何等為佛正齋法是間有賢善人持戒一月六齋乃至齋日朝起告家中言今日我身齋家中莫飲酒莫鬬諍莫道錢財觀普賢行法經云剎利居士於六齋日敕諸境內力所及處令行不殺梵網經疏云三齋六齋並是鬼神得力之日此日宜修善乃至年三長齋月六齋齋本為在家出家盡壽持齋不論時節提謂經説見三長齋月處摩訶般若經云佛告須菩提是善男子善女人若六齋日月八日二十三日十四日二十九日十五日三十日在諸天衆前説是般若波羅蜜義是善男子善女人得無量無邊阿僧祇不可思議不可稱量福德何以故須菩提般若波羅蜜是大珍寶何等是大珍寶是般若波羅蜜能拔地獄畜生餓鬼及人中貧窮能與剎利大姓婆羅門大姓居士大家能與四天王天處乃至非有想非無想處能與須陀洹果斯陀含果阿那含果阿羅漢果辟支佛道阿耨多羅三藐三菩提四分律云佛在羅閲城時城中諸外道梵志三時集會月八日十四日十五日衆人大集來往周旋共為知友給與飲食極相愛念經日供養時瓶沙王在閣堂上遙見問左右人乃至瓶沙王即下閣堂往詣世尊所頭面禮足白佛言羅閲城中梵志三時集會善哉世尊今敕諸比丘令月三時集乃至我及羣臣亦當來集時世尊默然受王語集比丘僧告八日十四日十五日大衆集瓶沙亦將群臣來集諸長者欲聞説法佛聽比丘説契經略鈔忠曰白月三時黑月三時即是六時大毗婆沙論云三十三天於白黑月每常八日若十四日若十五日集善法堂稱量世間善惡多少見造善者便擁護之見造惡者即共嫌毀四齋日敕修清規四齋日祝讚云月旦月望初八草三四齋日隔宿堂司行者報衆挂諷經牌又知殿云四齋日開殿門以便往來瞻禮舊説云六齋日中舉此四者朔望及白黑二月之分中也乃初八上弦二十三下弦也幻住清規朔望回向稱月旦月望令辰又云初八草三日但稱齋戒令辰寅旦日用軌範偈云從朝寅旦直至暮一切衆生自回互舊説曰凡報時鐘及某時正中而擊之或以擊鐘時為初入某時者謬矣譬如擊丑時鐘而經半時為寅時之初又擊寅時鐘而經半時為寅時之終即是卯時之初也每每如此傳燈録載寶志和尚十二時頌其十二時者曰平旦寅曰日出卯曰食時辰曰禺中巳曰日南午曰日昳未曰晡時申曰日入酉曰黃昏戌曰人定亥曰夜半子曰雞鳴丑也明相法苑珠林云若欲解齋要待明相出時始得食粥不爾破齋何名明相如薩婆多論云明相有三種色若日照閻浮提樹則有黑色若照樹葉則有青色若過樹葉則有白色於三色中白色為正始得解齋食其粥也釋氏要覽云四分律云明相出始得食粥餘皆非時婆沙論云明相有三初日照剡部樹身天作黑色二日照樹葉天作青色三日過樹天作白色三色中取白色為正時須舒手見掌文分明始得食粥澄彧前聞記云天龍第二代佛慈禪師者名志玄號無極初住臨川一日粥早師不展鉢首座以為不安候之師曰古規不云乎掌文見而喫粥老僧何病之有至今臨川曉鐘雖絶開靜待明者師遺範也忠曰無極不展鉢者諳律文也首座以為不安者盲于佛制也開靜待明本是律法不可必為師遺範也四分律云非時者從日中乃至明相未出若比丘非時受食食咽咽波逸提大般若經云如見東方赤明相現則知不久日輪當出若聞般若波羅蜜多當知是人去佛不遠粥罷喫粥之後也敕修清規聖節云至五更住持行香回再覆粥罷上堂半齋舊説云在粥與齋之半故曰半齋又見諷唱門忠曰半者猶如備用清規半晚之半然世有不辨半齋義者妄引雜譬喻經半日齋因緣雜譬喻經云昔大檀越請佛僧飯有一賣酪客至因留其飯勸持齋戒聽法暮歸婦言我朝未飯延待至今強令相伴敗壞其齋半齋之福七生天上七生人間一日持齋有六十萬歲糧令其義益隱矣或援寄歸傳半者蒲膳尼半者珂但尼亦不當也又半齋者時名也然以半齋諷經稱誦半齋則成歇後語今援數語證粥時與飯時之半義敕修清規告香曰次早請參頭茶半齋請參頭維那侍者點心又迎待尊宿云半齋點心又兩序進退云方丈請半齋點心齋時草飯又方丈特為新舊兩序湯云粥罷請新舊人茶半齋庫司點心備用清規兩序進退亦有此語臨齋舊説曰臨齋者臨午齋之時也又見諷唱門臨齋諷經處校定清規住持出入云或久出歸時就臨齋徑入僧堂伴衆食畢於挂鉢時令行者報云堂頭和尚巡堂問訊宗門統要藥山儼禪師章云師一日臨齋院主報云打鐘也請和尚上堂師云汝與我擎鉢盂去云云齋罷午齋之後也敕修清規聖節云至日齋罷堂司行者覆住持兩序諸寮挂念誦牌齋退即齋罷也敕修清規山門特為新命茶湯云齋退鳴鼓集衆參前晚參之前此曰參前若無晚參則放參已前也敕修清規聖節云挂念誦牌報衆參前巡廊鳴板集衆參後晚參或放參之後曰參後稍近薄暮也敕修清規坐禪云參後坐禪如常參退即參後也真淨文禪師歸宗録上堂云云云今日莊主設饡飯俵嚫錢參退僧堂內普請喫茶去半晚齋了與晡時之半時也備用清規知浴云半晚浴頭覆首座方丈維那鳴鼓三下律苑事規全同敕修清規知浴半晚作齋罷晚刻敕修清規山門特為新命茶湯狀式云今晨晚刻就雲堂點茶昏鐘鳴敕修清規達磨忌云昏鐘鳴再鳴僧堂鐘集衆又晚參云移於昏鐘鳴而謂之小參又對靈小參云候昏鐘鳴鳴鼓集衆人定亥時也寶志歌見前寅旦處經國大典注解云人定罷漏人定初更三點禁人行罷漏五更三點放人行敕修清規鐘云人定時一十八下白氏文集人定詩云人定月朧明香消枕簟清隔宿忠曰前日也與當日隔一宿故言隔宿敕修清規景命四齋日祝讚云隔宿堂司行者報衆挂諷經牌念日忠曰日本禪林回向文二十稱念如念一日念二日也古老解云念字從八二是十六數心有四畫合為二十也余謂此杜撰耳此義出兼明書又吾千山祖翁曰禪苑用念字自大德寺起其祖忌二十二日維那舉唱時覺音纍重故以二十代念言念二日餘寺倣此用念字又不必拘字音煩否忠按禪林二十用念字亦尚矣奧山方廣寺無文禪師録雲公大師拈香云今月念二日茲值先妣雲公大師七周之忌辰月菴光禪師録拈香云今月念日恭值先妣宗城禪尼三十三回之忌辰兼明書云吳主之女名二十而江南人呼二十為念而北人不為之避也字林云草音念二十併也小補韻會緝韻云按草字諸韻書皆音入市井商賈或音念學士大夫亦從其誤者惟程篁墩文集中書草日作念字焦氏筆乘云顏之推稽聖賦魏嫗何多一孕四十中山何夥有子百草草音入而集反説文二十并也俗音念者誤大夜敕修清規尊宿遷化對靈小參云拜請主喪人大夜對靈小參又亡僧云大夜念誦天如則禪師録有徐氏大夜小參舊説曰物故之夜曰當夜次夜曰大夜又次荼毗夜也大夜者女之婚嫁謂之大歸一往不復反也人之死類此無復反理故曰大夜又曰逮夜宿夜伴夜贈別夜等或世稱忌辰前夜為大夜者非也大鑑清規末後事儀云入滅第三日荼毗先第二日晚夜此時名大夜大夜之義謂只此一夜之留明日出而不歸也故殷勤供養小師圍繞終夜不寐名曰伴夜唯誦金剛經鳴磬忠曰東漸清規云物故之夜謂之大夜止此誤矣小爾雅云諱死謂之大行前漢書霍光傳云受皇帝信璽行璽大行前注韋昭曰大行不反之辭也正字通云春秋莊四年紀侯大去其國傳曰大去者土地人民儀章器物悉委置之而不顧也忠曰今大夜者大行之夜之謂也大行之大須以大去之大解也逮夜物故次夜同大夜備用清規對靈小參云逮夜法堂面真設座對靈小參注逮夜者乃宿夜忠曰逮明日荼毗之夜也詩經匏有苦葉篇云士如歸妻逮氷未泮宿夜即逮夜也忠曰明日荼毗之前夜故曰宿夜幻住清規津送云宿夜念誦伴夜大夜伴靈故亦曰伴夜大鑑清規云入滅第三日荼毗先第二日晚夜此時名大夜大夜之義謂只此一夜之留明日出而不歸也故殷勤供養小師圍繞終夜不寐名曰伴夜唯誦金剛經鳴磬贈別夜大夜也見前大夜處大鑑清規云今晚大夜則午後道舊辨事小師諷經此名贈別經以表生死道義也正日正日者當日也敕修清規帝師涅槃云正日鳴鐘集衆又靈骨入塔云正日鳴鐘衆集禮記禮器云質明而始行事止此質明者正日也忌日釋氏要覽云二月十五日佛涅槃日天下僧俗有營會供養即忌日之事也俗禮君子有終身之孝忌日之謂也又謂不樂之日不飲樂故或云諱日或云遠日遠日猶濫曲禮喪事先遠日釋子師亡可稱歸寂之日蓋釋氏無忌諱故首楞嚴經云時波斯匿王為其父王諱日營齋長水疏云先王崩日忌諱之辰故云諱日諱忌也以忌舉吉事諱避其名歸寂日見忌日處七七日釋氏要覽云人亡每至七日必營齋追薦謂之纍七又云齋七瑜伽論云人死中有身冥間化起一相似身傳識謂之中有若未得生緣極七日住中陰經云中有極壽七日若有生緣即不定若極七日必死而復生如是展轉生死乃至七七日住自此已後決定得生又此中有七日死已或於此類由餘業可轉中有種子便於餘類中有生今尋經旨極善惡無中有既受中有身即中下品善惡業也故論云餘業可轉也如世七日七日齋福是中有身死生之際以善追助令中有種子不轉生惡趣故由是此日之福不可闕怠也地藏本願經云鬼王無毒答聖女曰此是南閻浮提造惡衆生新死之者經四十九日後無人繼嗣為作功德救拔苦難生時又無善因當據本業所感地獄自然灌頂隨願往生十方淨土經云普廣菩薩語四輩言若人臨終未終之日當為燒香然燈續明於塔寺中表剎之上懸命過幡轉讀尊經竟三七日所以然者命終之人在中陰中身如小兒罪福未定應為修福願亡者神使生十方無量剎土承此功德必得往生周祥一周之祥祭乃小祥忌也普燈録佛鑑勤禪師章云五祖周祥上堂去年今日時紅爐片雪飛今日去年時曹娥讀夜碑三年忌葉縣省禪師録先師首山念三周年忌頌云師真似日三周已畢遍布乾坤翹足七日大展壃風狐魅屏迹香茶供養光漆誰識遠年忌虎關散語云四十九日追薦見于經文百箇日一周忌第三年忌中華俗禮見于外典十三年三十三年等始于日本少納言入道信西者卒其子中有才人始修十三年三十三年追薦爾來日本有此佛事夢語集云十三年忌三十三年忌日本始行之其十三年忌見元享釋書明遍傳今時更有十七年二十五年佛事臥雲日件録曰南禪雲臥菴竺華為一色泰雲居士二十五年忌升座散説中論二十五年忌特設佛事出於近時清拙日本録普説有三十三年忌説可知此時已有此忌祭忠曰七七薦亡經有明文如前引證一百日一周忌三年忌儒家亦祭焉所謂卒哭小祥大祥也十三年忌起於日本元亨釋書明遍傳云國俗薦十三年者迎先支而寓追慕余謂二十五年亦本支再回故薦之如七年十七年二十三年二十七年三十三年則蓋取乎三七之數矣古云三者數之小終章懷太子七者天之紀數空同子佛教説七佛三繞有所表事苑禮云祭不欲數數則煩祭不欲疏疏則怠祭義故先亡當三七年者特祭而薦之有慧空法師云昔在尊氏薨二十一年而追薦之大猷相公薨二十一年攀尊氏之例追薦焉蓋二十一者三纍七數也如日本神社有二十一年而新造其祠伊勢春日談岑等是也亦據斯義又薦五十年一百年等取其滿數而已梨窗隨筆近大德大心和尚著修祭説云明遍傳修十三年忌之外東鑑有修二位禪尼如實十三年忌又世傳建久後鳥羽帝年號壬子鎌倉賴朝為父義朝建勝長壽院于本府薦其三十三年忌又寬元後嵯峨帝丙午宋蘭溪隆禪師來朝明年修千光禪師三十三年忌於築前州聖福寺語録無語如二十五年忌應永後小松帝已後禪祖諸録間見五十年忌起乎應仁後土御門以後一百年忌創乎建武後醍醐帝之時其後有十七年二十一年二十三年二十七年之忌又天長淳和丁未弘法大師應詔就乙訓寺修推古帝二百年忌大師遊方記又延德後土御門辛亥三月阿波州主細川源久之請建仁天隱澤公於本州補陀禪寺升座薦其七世祖永泰院源賴之一百年忌澤公普説略云茲承文安後花園帝丁卯𨳝二月細川某當先祖光勝院源賴春賴之之父一百年忌請相國寺竺雲連禪師就某寺佛事是在家一百年忌之權輿也其後長祿丁丑將軍尊氏公一百年忌文正後土御門丙戌將軍義詮公一百年忌皆開法筵於洛北等持院蓋取法於光勝者也夫百年齋會未見經典蓋十十滿數又分作三預營為三十三年復分其半為十七年不待十三年者分半為七年止此今按普説配數一時附會或剩一或欠一不足據矣忠曰世有公事大成經余聞是偽造非聖德及河勝作其中有年忌説或援之為實出于聖德後生請莫信焉第五類靈像門拈華釋迦聯燈會要釋迦牟尼佛章云世尊在靈山會上拈華示衆衆皆默然唯迦葉破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉宗門雜録云王荊公問佛慧泉禪師云禪家所謂世尊拈花出在何典泉云藏經亦不載公曰余頃在翰苑偶見大梵天王問佛決疑經三卷因閲之經文所載甚詳梵王至靈山以金色波羅花獻佛舍身為床座請佛為衆生説法世尊登座拈花示衆人天百萬悉皆罔措獨有金色頭陀破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相分付摩訶大迦葉此經多談帝王事佛請問所以祕藏世無聞者山菴雜録云明善韓先生書陸放翁普燈録敘草後云放翁先生手書普燈録敘草本報恩淨上人之所藏也余故有先生遺文二帙其間誤處皆手自塗乙傳燈言世尊舉華迦葉一笑今講者以為經無此事詆其妄傳或曰金陵王丞相於祕省得梵王決疑經閲之有此語有所避諱故經不入藏今先生以為書之木葉旁行之間不知即丞相之所見以否其言如此必有所考矣併書其後云夫二先生學廣理明其言豈妄近翰林宋公為余敘應酬録亦曰豫觀大梵天王問佛決疑經所載拈花云云宋公既親觀之則此經世必有之而或者詆以為妄前云有所避諱故不入藏斯言盡矣宋文憲公護法録瑞巖和尚語録序云豫觀大梵天王問佛決疑經所載梵王以金色波羅夷花獻佛請為説法佛拈花示衆人天百萬悉皆罔措獨金色頭陀破顏微笑佛云吾有正法眼藏涅槃妙心實相無相分付摩訶迦葉嗚呼此非禪波羅蜜之初乎寶冠釋迦忠聞佛匠説十六羅漢中尊必用寶冠釋迦寶冠有五佛像中央大日左邊阿閦寶掌右邊彌陀釋迦東福寺山門閣上中安寶冠釋迦像東福古剎書畫像器夥矣先年發開祕藏縱四來觀瞻者凡兩回忠每回往而遍覽如諸堂像設皆貼紙片題其像名到山門閣上中尊題云寶冠釋迦如來華嚴合論云略説大相有九十七種大人之相隨好無盡頂著華冠項著瓔珞手著環釧非同三乘厭俗出家誕生佛像長可四寸右手指天澄彧前聞記記無極玄禪師事迹云天龍始鑄佛降誕像其指天手莫識左右遣使問師無極師曰舉右手耳但去藏殿探取合在某字函某經第幾葉檢之無差彧云方廣大莊嚴經降生品及普曜經並不言左右唯言字函過現因果經云太子生時墮蓮華上無扶侍者自行七步舉其右手而師子吼云我於一切天人之中最尊最勝宜字函佛本行集經樹下誕生品及彩字函釋迦譜同之不知當初所指何函忠曰經唯言右手而不言左手而現今釋迦降生像右手指天左手指地蓋應天上天下唯我為尊瑞應經本起經長阿含等之語矣復按左手指地者降魔印也慧琳經音義云如來成正覺時身安吉祥之坐左手指地作降魔之印文殊普賢見次迦葉阿難處迦葉阿難釋門正統云今殿中設釋迦文殊普賢阿難迦葉梵王金剛者此土之像也阿難合掌是佛堂弟理非異儀迦葉擎拳本外道種且附本習以威來象蓋若以聲聞人輔則迦葉居左阿難居右若以菩薩人輔則文殊居左普賢居右今四大弟子俱列者乃見大小乘各有二焉耳梵王執爐請轉法輪金剛揮杵衛護教法也達磨百丈臨濟三祖之像安於祖堂見殿堂門祖師堂處普菴普菴肅禪師録云師諱印肅號普菴袁州之宜春人也世姓余紹臨濟十二世孫牧菴忠禪師之緒有宋之時生於縣之太平里初師未生時鄰夜有望其室者祥光燭天遠近相諤已而蓮生道周或現阡陌衆愈異之及師生五相豐潤即善世言由是人始知為至聖之徵實乙未政和五年十一月二十七日辰時也庚子宣和改元之二年師夢一僧點其胸曰汝他日當自省既寤白母黃氏視點紅瑩大似世之櫻珠至高宗甲寅紹興四年八月遣師壽隆賢和尚賢授以法華師曰諸佛元旨貴悟于心數墨循行何益于道賢甚器之辛酉紹興十一年四月八日剃染壬戌紹興十二年五月受甘露大戒於袁州之開元寺聞牧菴忠公唱導溈山師入湘訪問萬法歸一一歸何處牧菴豎拂示之有省歸壽隆時癸亥紹興十有三年師甫二十有九矣癸酉紹興二十三年使牒請主慈化寺孝宗丙戌乾道二年正月一日始營梵宇至四年十二月落成弟子圓通圓融圓成勤勤贊襄與有績矣舊傳殿址本李倉監施而莫詳開迹何代也師利世不伐嘗言捨家出家當為何事披緇削髮本屬何因若不報國資家虗負皇恩敕命若不導化檀那枉作空門釋子每楮衣糲食藜杖芒屩脅不沾席者十有二年一日誦華嚴論至達本情忘知心體合豁然大悟遍體汗流乃曰我今親契華嚴法界矣遂示衆曰李公長者於華嚴大經之首痛下一槌擊碎三千大千世界如湯消雪不留毫髮許於後進者作得滯礙普菴老人一見不覺吞却五千四十八卷化成一氣充塞虗空方信釋迦老子出氣不得之句然後破一微塵出此華嚴經遍含法界無理不收無法不貫便見摩耶夫人是我身彌勒樓臺是我體善財童子是甚茄子文殊普賢與我同參不動道場遍周法界悲涕歡喜踊躍無量大似死中得活如夢忽醒良久云不可説不可説又不可説始信金剛云信心清淨即生實相實相既生妄想生滅全體法身遍一切處方得大用現前即説偈曰揑不成團撥不開何須南嶽又天台六根門首無人用惹得胡僧特地來云云俄有僧稱道存自蜀雪而來既見師曰此吾不請友也遂相徵詰棒喝交馳心心密契僧曰師再來人也大興吾道非師其誰因指雪書頌而行自是廣津梁崇塔廟禦災捍患天動物與雖鬼神莫測其變符頌藥水驗世非一嘗自贊云蒼天蒼天悟無生法談不説禪開兩片皮括地該天如何是佛十萬八千己丑乾道五年七月二十一日沐浴書偈于方丈之西壁云乍雨乍晴寶象明東西南北亂雲深失珠無限人遭劫幻應權機為汝清枯木救度書畢跏趺而逝至冬十一月一日奉全身于塔普菴傳更見于五燈嚴統佛祖通載搜神大全等續傳燈載名無録又載普菴法嗣二人曰佛慧清禪師曰鐵牛禮禪師並有名無録搜神大全云師示衆曰諸佛不出世亦無有涅槃入吾室者必能元契矣善自護持無令退失索浴更衣跏趺而寂時則乾道五年七月二十一日也享年五十五僧臘二十八年十一月一日全身入塔是時四衆云集悲號之聲振動山盡普菴寂感妙濟正覺昭貺禪師聖朝大德四年歲次庚子秋七月加封大德二字餘封如故大德大元第六主成宗年號佛祖通載云元仁宗延祐三年丙辰是年封普菴禪師加號其詔曰上天眷命皇帝聖旨朕聞佛氏以空寂為宗則凡學所遵者寧欲建名號殊稱謂以示天下後世哉而國家非此無以昭尊德樂道之意也朕自即位以來聞袁州路南泉山慈化禪寺普菴寂感妙濟真覺昭貺大德慧慶禪師紹臨濟之緒超華嚴之境德映當代澤被方來其道甚尊顯心切慕之既纍錫大諡唯塔號未稱可加定光之塔曰定光靈瑞之塔者主者施行續文獻通考云大明成祖永樂十八年十二月封普菴師制曰朕惟佛道以慈悲為體方便為用超卓萬有拯拔群倫廣利濟以無邊妙神道而莫測不有丕承於法緒曷能茂振於宗風惟普菴禪師萬行圓融六通具足端嚴自在變化無方誓覺悟於群迷普利益於庶類如溥甘霖於六合膏澤均沾猶現滿月於千江光輝旁燭眷此弘彰於靈化式宜荐錫於名稱今特加封普菴至善弘仁圓通智慧寂感妙應慈濟真覺昭貺惠慶護國宣教大德菩薩於戲教闡宗乘傳千燈之派系功施幽顯福四海之生靈翊我皇明永臻至治普菴録三卷明成祖御製序又續文獻通考載恐繁不録天如則禪師録吳郡慧慶禪寺記云姑蘇城西五里許松林柳涇映帶如畫有重閣廣殿飛出林杪與西山爭高者慧慶禪寺也寺視他剎雖不古而化聲藉藉緇白歸之如市者普菴禪師之化也初普菴振化於袁之南泉山道場之盛甲天下沒世雖久揚揚有靈凡官民旱潦病橫與夫拘忌營搆之事咸禱之厥應如響皇元加贈大德慧慶禪師歲時香幣與民施交委食無寸壤居徒常數千人江湘淮漢之間其化殆遍獨未至於吳其至有待於時邪亦必待人而後行邪延祐甲寅春南康無瑕沙門宗璁訪道至吳門誦寒山夜鐘江楓漁火之句惻然有感于中乃謀結菴以延遊錫且以奉禪師郡人金國寶首率財營地相其成戶屨日滿日持鉢以餉之閶關驛道濱長河民苦泥淖璁募衆以甓之橋之圮者新之凡利人之事靡不為為必徼靈於普菴江艘海舶有獲冥應而脫風濤者至則拜普菴為更生由是施者翕然遂建無量壽閣以祠佛及五百尊者像閣後為普光明殿普菴之像居焉云云又云余謂世尊以正法眼藏涅槃妙心付摩訶迦葉凡草八傳至達磨又十傳至臨濟臨濟十三傳為普菴普菴以臨濟峻機大用陶鍊學徒不歷階梯深達佛祖堂奧此其化之大本者也彼弭災救患應禱於有為功用者餘事也忠曰禪林或妥普菴於佛殿背後以慧慶寺無量壽閣後為普光明殿居普菴像為據不必然耳又天如答江陵性海書説普菴事清拙澄和尚録普菴贊云佛眼之孫牧菴之子金剛無量鎮長存百萬天龍常守護其靈妙如如也圓等太虗其神通赫赫也震同天鼓故其不動道場恩加四海與一切人成就華堂紺宇緇白歸依浩若百川之朝水府夫是之謂定光古佛再來普菴肅公和尚江西袁州慈化禪寺開山之祖者也謝肇浙塵餘云鄭一觀者隆慶時福清農家也雅好持齋誦經凡桑門之徒過者無不留宿罄家所有資其衣糧先是有一年少不知何自而來挾數百金占籍於鄰村容貌清俊器度溫雅一觀因許以女招之入贅具日適有道士求宿一觀以婚辭強之乃許趺坐中堂手結普安印凝然不動須臾壻至鼓樂沸天燈光載道及入門見道士一時俱沒道士叱之曰畜生來前復汝故形赦汝死罪壻即化為老猴伏地乞命道士敕遣之一觀大驚拜請何居道士手指前山化為電光而去明日尋其迹得廢寺故基叢莾中有普安佛像儼然道士也忠曰普安乃普菴也音近訛安而已開山文字禪雲菴真淨和尚行狀云丞相舒王捨第為寺以延師為開山第一祖又以神宗皇帝問安湯藥之賜崇成之是謂報寧蒲室集有當湖新建福源寺請林平山開山杭諸山疏貞和集古田寄集慶開山偈云如意來尸釋梵宮雨花狼藉濕春風自慚老矣無靈骨日在深雲聽講鐘準開山東漸略清規云道行崇重功被山門者謂之準開山或號中興祖中興祖見準開山處觀音衆寮以觀世音菩薩為本尊敕修清規謝挂搭云副參引衆自觀音後轉出爐前清拙澄和尚録有建長寺衆寮栴檀林觀音大士安座佛事跋陀婆羅浴室設跋陀婆羅菩薩像本水因圓通之説首楞嚴經云跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅妙觸宣明成佛子住佛問圓通如我所證觸因為上智度論云陀婆羅秦言善守又云善守等十六菩薩是居家菩薩陀婆羅居士菩薩是王舍城舊人大寶積經無盡慧菩薩會云有十六在家菩薩跋陀婆羅而為上首忠曰今浴室所揭畫像作僧形著袈裟者蓋依楞嚴文若準寶積智論等則為在家菩薩故止觀輔行云跋陀和智論及諸經名跋陀婆羅音輕重耳是在家菩薩止此余謂出家者在家者名同人別七佛所説神咒經跋陀和菩薩説菩薩妙行八事如彼聖僧忠曰僧堂中央所設像總稱聖僧然其像不定若大乘寺則安文殊小乘寺則安憍陳如或賓頭盧有處用大迦葉復用空生如禪剎則通用不拘乃下文援證或説曰釋迦法中以憍陳如為僧寶之始蓋陳如臘大於迦葉一夏故以陳如為僧堂中上座然從唐大曆已後用文殊為上座梵網經法藏疏云又聞西國諸小乘寺以賓頭盧為上座諸大乘寺以文殊師利為上座睿山光定法師一心戒文云凡佛寺有三一者一向大乘寺初修業菩薩僧所住寺二者一向小乘寺一向小乘律師所住寺三者大小兼行寺久修業菩薩僧所住寺凡佛寺上座置大小二座一者一向大乘寺置文殊師利菩薩以為上座二者一向小乘寺置賓頭盧和上以為上座三者大小兼行寺置文殊與賓頭盧兩上座小乘布薩日賓頭盧為上座坐小乘次第大乘布薩日文殊為上座坐大乘次第普通廣釋引惠苑有迦葉為聖僧別源旨禪師東歸集和竺仙和尚賀太虗侍者侍聖僧韻偈云子今勤侍大迦葉即能超宗還異目又大休念禪師録法源寺安奉聖僧佛事云恭惟聖僧大迦葉尊者意根滅盡妙法開明分寶華座於多子塔前破金色顏於靈山會上有須菩提為聖僧大休念禪師録禪興寺聖僧點眼佛事云恭惟靈山會上空生尊者達法不二解空第一日本黃檗山萬福寺僧堂安布袋和尚為聖僧未聞其有所據僧形文殊舊説云古東福寺有一維那適見聖僧像背貼紙題云陳如尊者告衆云戒臘簿宜改書陳如尊者老僧議云曾文殊大士為簿中上座既經百年餘而今不可遽改遂止止此忠曰此蓋不知僧形文殊妄題為憍陳如歟然則固不違戒簿耳智度論云釋迦法中無別菩薩僧是故文殊彌勒等入聲聞衆次第而坐止此故大乘寺文殊為聖僧其像僧形不異聲聞衆矣夫內證大乘法外現聲聞形內外相兼方稱圓備忠曰東福寺聖僧僧形文殊大士披袈裟手結定印宋高僧傳興善寺不空傳云大曆四年冬空奏天下食堂中置文殊菩薩為上座制許之此蓋慊憍陳如是小乘教中始度故也不空三藏表制集天下寺食堂中置文殊上座制云大聖文殊師利菩薩右京城大德特進試鴻臚卿大興善寺三藏沙門大廣智不空等奏忝迹緇門久修梵行習譯聖典頗悟玄門大聖文殊師利菩薩大乘密教皆周流演今鎮在臺山福滋兆庶伏惟寶應元聖文武皇帝陛下德合乾坤明並日月無疆之福康我生人伏望自今已後令天下食堂中於賓頭盧上特置文殊師利形像以為上座詢諸聖典具有明文僧祇如來尚承訓旨凡出家者固合摳衣普賢觀音猶執拂而為侍聲聞緣覺擁彗而居後斯乃天竺國皆然非僧等鄙見仍請永為恆式祠部牒云牒奉敕大聖文殊師利菩薩法王之子威德特尊為諸佛之導師洗羣生之心目康我兆庶是拯無邊不有尊崇人何瞻仰今京城大德懇茲申奏雅合聖典所請宜依牒至準敕故牒大曆四年十二月十九日牒賓頭盧或曰律宗聖僧不立文殊而用賓頭盧其説言文殊已取涅槃賓頭盧現在世故立以為聖僧釋氏要覽云傳云中國僧寺立鬼廟次立伽藍神廟次立賓頭盧廟即今堂中聖僧也始因道安法師夢一胡僧頭白眉長語安云可時設食後十誦律至惠遠方知和尚所夢即賓頭盧也於是立座飯之寺寺成則法苑云聖僧元無形像至宋泰初末正勝寺僧法願正喜寺僧法鏡等始圖形像矣今堂中聖僧多云是憍陳如非也緣經律不令為立廟故不赴四天供故又安法師夢是賓頭盧故梁高僧傳道安傳云安常注諸經恐不合理乃誓曰若所説不甚遠理願見瑞相乃夢見梵道人頭白眉毛長語安云君所注經殊合道理我不得入泥洹住在西域當相助弘通可時時設食後十誦律至遠公乃知和尚所夢賓頭盧也於是立座飯之處處成則日本南都大乘寺安賓頭盧南京招提寺覺盛撰菩薩戒通受遣疑鈔云問文殊上座尤順大乘由此大唐不空三藏準天竺例奏於玄宗皇帝帝好其説制可我朝諸寺何不然耶答夫於賓頭盧上座者如來教敕聖教有文漢地諸寺不空以前渡天歸朝聖人賢哲更無異論經數百歲其寺豈皆小乘寺耶其戒豈皆小乘戒耶况不空奏敕制以後大唐諸寺始學大乘始受大戒哉若許爾者可有多疑若不爾者何由此事知寺大小耶明知不空三藏新製文殊上座雖無教文覺母之德獨超衆聖出家菩薩其形相順唐國臺山殊有緣故食時常禮為消信施窺於天氣安置之彼奏狀文有明文者出家菩薩滅罪生善超他之文乎非謂有明上座文若不爾者顯戒論中何不引之其所引但是文殊般涅槃經彼經無上座文若雖有教文澄師不得之北衆祖師所見何狹耶就中彼狀賓頭盧上安文殊像云云是非並安舊上座耶如山門義則當于唐國諸寺不空以後大小兼行寺也已安二上座故何以彼為證立于唯大寺哉但彼奏狀謂天竺諸國皆然者為西域三寺傳教之證豈並皆安文殊上座耶自證文中似有相違蓋天竺諸寺亦上代多分信聖教文安賓頭盧末代少分雖無教證歸依覺母副置文殊漸遍諸國不空見之云爾乎若然則南都依教明文順釋迦法雖大乘寺安賓頭盧有何失耶是即化身國土之法以聲聞外無別僧故雖大乘衆表其相也文殊在世既入聲聞次第而坐何至滅後私以文殊隔聲聞耶上座文殊既自如是何况於其下座凡夫耶賓頭盧設實類聲聞住聲聞位尚可如是何况既回心菩薩何况既是大聖應化哉法苑珠林云賓頭盧為樹提伽長者現神通坐取象牙杙上栴檀鉢佛呵責云何為外道鉢於未受戒人前現通盡汝形擯不得住閻浮提賓頭盧如教往化西瞿耶尼閻浮四衆思見白佛佛聽還不聽涅槃自誓三天下有請悉赴略鈔又見罪責門擯出處雜阿含經云賓頭盧告阿育王言世尊住舍衛國五百阿羅漢俱時給孤獨長者女適在於富樓那跋陀那國彼女請佛及比丘僧比丘各乘空而往我爾時以神力合大山往彼受請時世尊責我汝那得現神足如是我今罰汝常在世不得取涅槃護持我正法勿令滅也可知賓頭盧留身非但取鉢事藏中有請賓頭盧經一卷宋三藏慧簡譯法苑珠林受請篇引全文又南山感通傳説請賓頭盧法法住記云第一尊者名賓度羅跋囉墮闍與自眷屬千阿羅漢多分住在西瞿陀尼洲憍陳如敕修清規夏前草單式云威音王戒陳如尊者堂頭和尚忠曰僧堂聖僧用憍陳如故書戒臘此為首也舊説曰天竺僧寶憍陳如為始釋迦法中出家之椎輪也憍陳如等得度不用剃刀佛一呼善來則鬚髮自落得具足戒此名見諦戒袈裟自在肩鉢盂自在手威儀具足不勞造作此名善來得度矣其用剃刀落髮度僧以阿難為始忠曰陳如度僧之始則臘最高於釋迦法中可知崇之為僧堂聖僧無復間然矣編年通論云天台拾得嘗掌供獻於憍陳如像前訶斥之曰小根敗種何為者耶寺僧深怪之不使直供忠曰蓋天台聖僧用憍陳如也又見前聖僧處普燈録尼慈鑑大師文照章云上堂云云老胡四十九年説夢即且止僧堂裏憍陳如上座為儞諸人舉覺底還記得麼良久曰惜取眉毛好十六羅漢山門閣上多安十六羅漢其名號住處眷屬詳於法住記記云難提蜜多羅曰如來先已説法住經今當為汝粗更宣説止此故知十六尊者本是佛説慶友後述説難提蜜多羅唐言慶友今唯列其名第一賓度羅跋囉墮闍尊者第二迦諾迦伐蹉尊者第三迦諾迦跋釐墮闍尊者第四蘇頻陀尊者第五諾距羅尊者第六跋陀羅尊者第七迦理迦尊者第八伐闍羅弗多羅尊者第九戌博迦尊者第十半諾迦尊者第十一囉怙羅尊者第十二那伽犀那尊者第十三因揭陀尊者第十四伐那婆斯尊者第十五阿氏多尊者第十六注荼半託迦尊者又法住記云如是十六大阿羅漢一切皆具三明六通八解脫等無量功德離三界染誦持三藏博通外典承佛敕故以神通力延自壽量乃至世尊正法應住常隨護持及與施主作真福田令彼施者得大果報又云若此世界國王大臣長者居士若男若女發殷淨心為四方僧設大施會或慶寺慶像慶經幡等施設大會或詣寺中經行處等臥具飲食奉施僧衆時此十六大阿羅漢及諸眷屬隨其所應分散往赴現種種形蔽隱聖儀同凡常衆密受供具令諸施主得勝果報此南贍部洲人壽極短至於十歲刀兵劫起乃至人壽漸增至百歲時此十六大阿羅漢與諸眷屬復來人中稱揚正法度衆出家作饒益事人壽七萬歲時正法永滅時十六大阿羅漢用七寶造窣堵波釋迦如來遺身皆集其內香花供養繞百千匝作如是言敬禮世尊釋迦如來應正等覺我受教敕護持正法及與天人作諸饒益法藏已沒有緣已周今辭滅度説是語已一時入涅槃略鈔十六善神叢林轉讀大般若經揭釋尊十六善神像陀羅尼集經載般若波羅蜜多大心經云爾時世尊正在大會説般若波羅蜜及説是真言法利益方便能令一切人非人等聞此陀羅尼者悉發無上菩提之心回向十方諸佛國土當得阿耨多羅三藐三菩提常生歡喜爾時衆中有十六大藥叉將其名曰達哩底囉瑟吒大將禁毗嚕大將嚩日嚕大將迦尾嚕大將彌覩嚕大將欶怒毗大將阿儞嚕大將娑儞嚕大將印捺嚕大將波夷嚕大將摩尾嚕大將嬌尾嚕大將真特嚕大將嚩吒徒嚕大將尾迦嚕大將俱吠嚕大將有如是等十六大藥叉將各將七千諸眷屬等即從座起頂禮佛足而白佛言世尊今此衆中一切天人既聞佛教滅一切罪不墮三塗植於佛種我等藥叉將亦復如是既蒙佛恩我等歸命佛法僧寶常隨擁護佛法僧衆若王大臣比丘比丘尼優婆塞優婆夷等及一切衆生受持此法若讀若誦若聽若念又復念佛若坐禪者我等十六藥叉將及諸眷屬隨其行處而衛護之若國城邑若聚落中若空間林中如是等處若有念此般若波羅蜜多名者我等眷屬悉皆擁護若人持此般若波羅蜜多時忽遇一切諸難事者我等眷屬共相擁護若復有人欲得般若波羅蜜多成就者我等眷屬使滿其願爾時佛讚諸藥叉大將言善哉善哉汝等眷屬能於般若波羅蜜多所在之處而作衛護為未來世諸衆生故説修行之法爾時諸藥叉王等言若王若比丘比丘尼優婆塞優婆夷若能深心信解我般若波羅蜜多功德自在威力陀羅尼成就故者又須我等十六眷屬來佐衛護汝等有能依我此法如前結護廣建道場為之壇法求諸利益國祚延長人民安樂四方無事災禍不侵保守貞幹無諸疾苦當請清淨持明師無問道俗道體相同行純熟者七人乃至二七三七人等淨持戒行德尊長者當於一所別立厨膳供給師等任取勝地無問寺內寬大堂宇庭院之所若近舍利浮圖塔廟若好園林名山淨處起作道場其壇場法掘去惡物淨土築平如前所説築平正已又以淨牛糞和香湯泥摩塗其地以五色粉作三重院三重各開四門第三重內院作一圓月中心安般若波羅蜜多菩薩像面向西門其像右邊安帝釋天左邊安梵摩天東面安使者西面持明者第一重外四方各列四神王像四方各四總數即是十六神王若欲畫者第一重內畫著亦得其持明師者入第三重內正在般若波羅蜜多像前先請般若波羅蜜多菩薩次請梵天等次請召四面十六神王而安置之及使者等欶玉篇所角切忠曰此經印相有十三真言有九而揭諦呪其一也又有請十六神呪若誦其呪則不須供養即得成就十六神即到任行者驅使功德無窮須往覽又有般若壇法及畫大般若像法所謂般若菩薩也𡏖囊鈔云大般若十六善神之名及其本尊不定唯其脅士必法涌常啼也或曰十二神將加四天為十六神而不記名字常喜院要集記列十六夜叉名云毗首羯摩夜叉劫比羅夜叉法護夜叉眉目夜叉廣目夜叉護軍夜叉珠賢夜叉滿賢夜叉持明夜叉阿吒縛夜叉縛蘇松龍王蘇摩那龍王補沙毗摩龍王訶利帝大天佛醫羅縛蹉大天佛雙目大天佛其本尊三種而脅士隨本尊有異若本尊藥師則脅士日光月光也本尊釋迦則脅士普賢文殊也本尊般若菩薩則脅士法涌常啼也當寺北山觀勝寺法用如此凡文殊般若部總部主也般若菩薩大般若別部主也故立為本尊釋迦説教之主藥師主息災故並立為本尊焉忠曰要集記十六夜叉名未知何據矣陀羅尼集經明列名不用別説寂照堂谷響集列十六善神名畢曰又問十六神形相如何答一書云提頭攞吒善神身緑青色怒顏開口著赤衣被甲胄右手持刀左手杖鉾鬚髮赤黑色毗盧勒叉善神身赤紫色忿顏閉脣著白青衣擐甲胄右拔刀左按腰鬚髮紺青色摧伏毒害善神身赤肉色著白色衣擐甲胄右執刀左手掌向外當胸鬚髮皆豎紺色增益善神身赤肉色怒顏四臂右第一手持刀第二把劍輪左第一手執楊枝第二擎半月著緑色袈裟紅裳頸懸瓔珞歡喜善神身緑青色忿顏頭頂金色孔雀右手持鈎左按腰著赤衣披甲胄鬚髮赤色除一切障難善神身黃色怒相六臂右手第一持三戟次捧經卷次擎塔左第一紅蓮華次執鈎次把螺首戴寶冠埀瓔珞披白衣挂袈裟風翻環佩拔除罪垢善神身赤黃色裸體著雜色袈裟右手持五叉棒左作拳置頂上瞋目開口利牙上下出髮毛豎立能忍善神身紺青色裸體被鎧頭著素帽垂下右手持劍左手執矟鬚髮赤黑已上右方吠室羅摩拏善神身青黑色瞋面合脣右手杖金剛棒左手擎寶塔披赤衣著甲胄鬚髮赤黑色毗盧博叉善神身青黑色笑顏著緑衣帶甲胄右手握筆左執卷如欲書之勢鬚髮赤色離一切怖畏善神形相全似帝釋天但頭戴髑髏髑髏上有三股杵是異彼天耳救護一切善神身白青色形相全如毗沙門天但兩手合掌指端插紅色微敷蓮華攝伏諸魔善神身黑肉色右手持劍左埀掌向外以瓔珞莊嚴能救諸有善神身白緑色顏貌如玉二手合掌屈二頭指著中指背第一節著鎧帶紅裙披白色袈裟師子威猛善神肉色忿怒相具四臂右第一持斧第二劍左第一擎梵篋第二三戟首戴師子冠著紺色袈裟披虎皮小服勇猛心地善神身緑色微笑擐甲胄形如能救諸有二手外縛當心已上左方世有金剛智所譯般若守護十六善神王形體一卷三紙讀之明知非是金剛智筆語綴文甚拙想先達依金剛智圖畫録之而假金智名矣不自揣之甚今豫所注名及形相粗摘彼卷中前却語而已梵釋四王忠曰東福土地堂安梵天帝釋又凡道場疏陳白等勸請回向梵釋四王實有因由往昔釋尊遠攀古佛之例以滅後正法親付此三衆其成道時必四王授鉢梵釋同請轉法輪無非歆付囑不然欲色二天猶有增勝功德諸天在何得獨舉此三天耶余今引方等典故而證此義大集經云爾時釋迦牟尼佛告諸梵天帝釋四王善男子我為如是惡衆生故本願力故大憐愍故於此惡處成阿耨多羅三藐三菩提乃至我涅槃後所有正法當付汝等汝等便當深心守護月藏經云爾時世尊復問娑婆世界主大梵天王言過去諸佛以此四大天下曾付囑誰令作護持養育時娑婆世界主大梵天王言過去諸佛以此四天下曾付囑我及憍尸迦令作護持乃至我等曾於鳩留孫佛已受教敕乃至令三寶種已作熾然拘那含牟尼佛迦葉佛所我受教敕亦如是於三寶種已勤熾然地精氣衆生精氣正法味醍醐精氣久住增長故亦如我今於世尊所頂受教敕於己境界言説教令得自在處休息一切鬬諍飢饉乃至令三寶種不斷絶故三種精氣久住增長故遮障惡行衆生護養行法衆生故休息衆生三惡道趣向三善道故為令佛法得久住故勤作護持佛言善哉善哉妙丈夫汝應如是忠曰凡四天王各分護四洲北毗沙門東提頭賴吒南毗樓勒西毗樓博叉月藏經説然又有別義四王並護南洲月藏經云大梵天王言大德婆伽婆此四天下南閻浮提最為殊勝何以故閻浮提人勇健聰慧梵行相應佛婆伽婆於中出世是故四大天王於此倍增護持養育廣説分國護持相又月藏第七卷佛告四王令護閻浮提佛法廣説如彼密迹金剛禪剎山門亦有安金剛像者所謂二王也聯燈會要淨果守澄禪師章云問會昌沙汰時護法善神向甚麼處去師云三門外兩箇一場懡㦬西巖惠和尚開善録云元宵上堂屋上山橋下水三門八字打開左右青葉婁至頭頂天腳蹈地南堂欲禪師開福録云山門頭樓至德如來兩腳踏地明極俊禪師再住建長録山門語云山門八字開金剛兩邊立忠曰二王是法意化身名密迹金剛下詳説然禪録皆稱青葉樓至此二佛現力士形見陸遊所記陸務觀入蜀記云遊二聖報恩光孝禪寺二聖謂青葉髻如來婁至德如來也皆示鬼神力士之形高二丈餘陰威凜然可畏正殿中為釋迦右為青葉髻號大聖左為婁至德號二聖三像皆南面豫按藏經駒字函娑羅浮殊童子成道為青葉髻如來青葉髻如來再出世為樓至如來則二如來本一身耳有碑言邑人一夕同夢二神人言我青葉髻婁至德如來也有二巨木在江干我所運者俟鄯行者來令刻為我像已而果有人自稱鄯行者又善肖像邑人欣然請之像成人皆謂酷類所夢然碑無年月不知何代也忠曰娑羅浮成佛號青葉髻持大力於青葉髻涅槃後成佛號樓至見于大乘悲分陀利經第四卷悲華經第六卷悲華經青葉髻作那羅延勝葉耳今入蜀記言青葉髻再出為樓至二身本一訛矣按聯燈會要仰山寂禪師章言有僧作樓至勢傳説亦久矣大寶積經密迹金剛力士會云過去久遠有佛名無量勳寶錦淨王現世有轉輪聖王名曰勇郡王有千子具足其二正夫人一名不行步二名無虗損有二孩童自然來上夫人膝上一名法意二名法念異口同音而説頌曰云云其上方境界不可計佛土彼土而有佛號名曰時節從彼佛土來以用法故舉亦欲見功勳國土之所有云云勇郡轉輪王自心念言是吾諸子皆發無上正真道意今當試之何所太子先當逮致無上正真之道為最正覺者便敕工師作七寶瓶作七寶㼤高四十九尺使諸千太子各各疏名作七寶籌著瓶中舉瓶著㼤上咸共夙夜七日供養過七日後取瓶在中宮夫人婇女諸太子衆前舉著紫金案上使人舉瓶令諸太子各各探籌有太子名曰淨意得第一籌拘留孫如來是也從次太子名離名聞兵則拘那含牟尼佛是也乃至有太子名意無量得最後籌時其諸太子輕易笑之言我當成佛時度脫衆生令至滅度衆生盡後何所設當何救濟意無量愁惱五體投地口自宣言諸佛道法不可稱量衆生之界亦無有限願所教弟子所度多少其壽長短適同仁等無異所言不虗為吾現瑞六反震動意無量立斯誓時三千大千世界六反震動天雨衆華樂器自鳴諸天歎曰當如所願最後成佛名曰樓由如來爾時愁感自投於地由斯號樓由樓由者晉言涕泣王千太子後二子各念言所志云何法意太子曰吾自要誓諸人成得佛時當作金剛力士常親近佛在外威儀省諸如來一切祕要常委託依普聞一切諸佛祕要密迹之事信樂受喜不懷疑結法念太子曰諸正士聽吾心自誓言諸仁成佛道身當勸助使轉法輪適見相勸輒轉法輪爾時勇郡王過去定光如來是也其時諸子此賢劫中千佛興者是也從拘留孫為始作佛至樓由竟千佛也其法意太子則今金剛力士名密迹是也其法念太子者今識其梵天是也彼時聖王中宮夫人婇女今諸來會者是也經及十紙今略鈔密迹因緣又出于如來不思議祕密大乘經第五意無量作無邊慧經曰最小無邊慧太子者當得成佛號樂欲如來於賢劫中最後成佛注云古經不譯但云樓至金光明經文句知禮記云據經唯一人今狀於伽藍之門而為二像者夫應變無方多亦無咎釋門正統云五分律云佛四面有五百金剛今狀其二無可疑也又前文云於門兩頰應畫執仗藥叉是也前文者正統引毗奈耶律云佛告給孤長者於門兩頰應畫執杖藥叉忠曰圓覺經集解引千子成佛二子為梵王金剛因緣辨云依之寺三門只合一身金剛一身梵王今為對故塑二金剛非也止此豫謂此胸臆妄談也夫安金剛於門首為有護教之約如梵王正掌請法若安之門則果是何義玄應衆經音義云密迹梵言散那此譯云密主密是名也以知佛三密功德故也主者夜叉主也按梵本都無迹義當以示迹為神故譯經者義立名耳忠曰此未撿尋寶積文也經云法意自誓普聞一切諸佛祕要密迹之事信樂受喜止此蓋密主者密迹之主也迹義屬佛非示迹耳心有佛密迹有財得名清涼華嚴疏云密迹者古譯為力士忠曰以密迹為梵語訛矣嘉祥法華疏云金剛神屬四天處住實是樓至佛樓至此云啼哭佛忠曰金剛誤為樓至其來尚矣光明文句記云世傳樓至化身非也乃法意王子耳智者觀音義疏云金剛手執此寶護持佛法或言在欲色天中教化諸天即大權神也經云是吾之兄忠曰恐弟字誤作兄然慈恩上生經疏引金剛力士經云諸兄願作金剛擁護小弟止此慈恩亦以弟為兄又曰光明文句記説二弟為金剛梵王因緣為出正法念經余遍檢彼經七十卷都無文名義集釋門正統圓覺集解並承訛一律矣一人傳虗萬人傳實故實學難矣又普通廣釋説一千二子外別有密迹亦是不親見經本緣之過也又曰義楚六帖載此因緣引上生經亦妄也諸天傳云集要引佛名經及上生經説昔有王生千單二子千兄同詣佛所發心修道二弟不知一弟發願千兄成道為魔惱害一弟發願我為力士護千兄法乃至一為調達以魔惱一為力士以護持止此是説又與寶積大異也風調雨潤像升菴文集云按兵書云東海出氣如鱉渭水出氣如蜃蜃形似蛇而大今寺門金剛風調雨潤手執劍者風也彈琵琶者調也執傘者雨也手中如蛇者蜃也則與蚌蜃字同物異忠曰日本不見此四像又無本據恐中華末代妄造今且附見于金剛下又可言手中握如蛇者潤也如蛇者蜃也寫者以為纍文訛脫月蓋長者山門閣上觀音像右邊安月蓋長者像蓋依請觀音經事緣以為觀音脅士也請觀世音菩薩消伏毒害陀羅尼咒經云時毗舍離大城之中有一長者名曰月蓋與其同類五百長者俱詣佛所到佛所已頭面作禮却住一面白佛言世尊此國人民遇大惡病良醫耆婆盡其道術所不能救唯願世尊慈愍一切救濟病苦令得無患爾時世尊告長者言去此不遠正立西方有佛世尊名無量壽彼有菩薩名觀世音及大勢至恆以大悲憐愍一切救濟苦厄汝今應當五體投地向彼作禮燒香散華繫念數息令心不散經十念頃為衆生故當請彼佛及二菩薩説是語時於佛光中得見西方無量壽佛并二菩薩如來神力佛及菩薩俱到此國往毗舍離往城門閫佛二菩薩與諸大衆放大光明照毗舍離皆作金色爾時毗舍離人即具楊枝淨水授與觀世音菩薩大悲觀世音憐愍救護一切衆生乃至毗舍離人平復如本善財童子山門閣上觀音像左邊安善財童子像蓋依華嚴經説相以為觀音脅士也華嚴經入法界品云爾時文殊師利童子知福城人悉已來集乃至復於是時觀察善財以何因緣而有其名知此童子初入胎時於其宅內自然而出七寶樓閣其樓閣下有七伏藏於其藏上地自開裂生七寶牙所謂金銀琉璃頗梨真珠硨磲碼瑙善財童子處胎十月然後誕生形體支分端正具足其七大藏縱廣高下各滿七肘從地涌出光明照耀復於宅中自然而有五百寶器種種諸物自然盈滿所謂金剛器中盛一切香於香器中盛種種衣美玉器中盛滿種種上味飲食摩尼器中盛滿種種殊異珍寶金器盛銀銀器盛金金銀器中盛滿琉璃及摩尼寶頗梨器中盛滿硨磲硨磲器中盛滿頗梨碼瑙器中盛滿真珠真珠器中盛滿碼瑙火摩尼器中盛滿水摩尼水摩尼器中盛滿火摩尼如是等五百寶器自然出現又雨衆寶及諸財物一切庫藏悉令充滿以此事故父母親屬及善相師共呼此兒名曰善財又入法界品善財從文殊師利發心漸次南行參五十三善知識而觀自在菩薩居其第二十七善知識如經廣説韋天將軍忠曰三洲護法者韋琨將軍世稱韋馱天訛矣法苑珠林云長安西明寺道宣律師大唐乾封二年仲春之節身在京師城南清宮故淨業寺逐靜修道遂感冥應時有諸天四王臣佐至律師房門律師問言是誰答言弟子張瓊第一欲界南天王之第十五子云云又有天人韋琨亦是南天王八大將軍之一臣也四天王合有三十二將斯人為首生知聰慧早離欲塵清淨梵行修童真業面受佛囑弘護在懷周統三洲住持為最亡我亡瑕殷憂於四部達物達化大濟於五乘所以四有佛教互涉頽綱僧像阽危無非扶衛屢蒙展對曲備嘉猷歎律師緝敘餘風聖迹住持刪約撰集於是律師既承靈屬扶疾筆受隨聞隨録合成十卷道宣律相感通傳云有一天人來禮敬敘暄涼已曰弟子姓王名蟠是大吳之蘭臺臣也云云弟子是南天韋將軍下之使者將軍事務極多擁護三洲之佛法有鬬諍陵危之事無不躬往和喻令解今附和南太欲即來前事擁隔不久當至且令弟子等共師言議又云次又一天云姓費氏禮敬如前云弟子迦葉佛時生在初天在韋將軍下諸天貪欲所醉弟子以宿願力不受天欲清淨梵行遍敬毗尼韋將軍童真梵行不受天欲一王之下有八將軍四王三十二將周四天下往還護助諸出家人四天下中北天一洲少有佛法餘三天下佛法大弘然出家人多犯禁戒少有如法東西天下少有黠慧煩惱難化南方一洲雖多犯罪化令從善心易調伏佛臨涅槃親受付囑並令守護不使魔撓若不守護如是破戒誰有行我之法教者故佛埀誡不敢不行雖見毀禁愍而護之見行一善萬過不咎事等忘瑕不存往失且人中臭氣上熏於空四十萬里諸天清淨無不厭之但以受佛付囑令守護法佛尚與人同止諸天不敢不來韋將軍三十二將之中最存弘護多有魔子魔女輕弄比丘道力微者並為惑亂將軍恓惶奔赴應機除剪故有事至須往四王所時王見皆起為韋將軍修童真行護正法故又云最後一朝韋將軍至致敬相問不殊恆禮云弟子常見師在安豐坊初述廣弘明集割斷邪正開釋明顯異於前者甚適幽心常欲相尋但為三天下中佛僧事大鬬訟興兵攻伐不已弟子職當守護慰喻和解無暫時停所以令前諸使者其師言議今暫得來不得久住師今須解佛法衰昧天竺諸國不及此方此雖犯戒太途慙愧內雖陵犯外猶慎護故使諸天見其一善忘其百非若見造過咸皆流涕悉加守護不令魔子所見侵惱余問欲界主者豈非魔耶以下諸天皆非魔屬耶答曰魔若行惡四天帝釋皆所不從若下二天行諸善法魔及魔子無如之何此方僧勝於大小乘曾無二見悉皆奉之西土不爾諸小乘人獲大乘經則投火中小僧皆賣於北狄耆者奪其命根不可言述今菩提大寺寺主威猛象有八萬僧戶數十萬王征不得繞塔之下日有金帛收已自納廚內生魚積成大聚羊腔縣之劇屠宰肆然亦守護不令惡鬼害之余問曰可無善神龍王何因縱其造罪答曰血食之神咸來嚮衛諸受佛語者守護大乘寺僧余曰常見此國以殺戮為功每願若死生龍鬼中有大勢力令其不殺如何此神還縱其殺者答曰並是衆生惡業所致魚羊還債是其常理余問還債之業誠是可嘉然後殺噉無不由惑惑是貪瞋癡貪癡之惑結在惡道如何諸神故縱造耶答曰亦是業定諸佛不能除况諸神者生此國中正念既失便縱其殺余曰先有此願脫生失念墮彼如何答曰自非觀行明白在涅而不緇方可得行此也韋將軍所言既終作禮而退釋門正統第三卷亦引之忠曰世稱道宣律師所感見三洲護法者為韋馱天訛矣釋氏資鑑大慧普説無準清拙虎關諸録皆從世傳恐未深稽焉三洲護法者稱韋琨余按感通傳中云有天性姚氏云弟子天人自有姓字語同天竺師既不解還述本音止此例此韋琨二字亦可皆從漢語焉如韋馱天其名著於四卷金光明經大方等大雲經涅槃經等並無嘆德况三洲護法等事迹耶獨金光明云大力勇猛常護世間晝夜不離止此此嘆德文亦通諸神説非特為韋馱天可考經知之韋馱天神處引韋馱梵語此云智論見諸天傳北本涅槃作違陀故知韋琨將軍與韋馱天神異而不同道宣所感見三洲護法者宜稱韋天將軍也釋門正統述感通傳作韋天將軍可為是矣宋魯應龍括異志云有住菴僧王了因事母至孝母病危篤日夜禱於所事韋天護法神誠意感格忽神降其身作蠻語云憫汝孝誠故救汝母教以藥餌遂愈自是神常降之言人休咎多驗遠近趨之一日有人請禱僧不謹神怒責遂發狂不可止索浴左右不得已具湯與之湯百沸猶以為冷投於中宛轉為快衆拜祈哀神曰姑薄懲之爾遂免及出浴舉體略無少損病亦愈神不復降矣明極俊和尚録宣上人禮補陀現韋天像頌云志山願海浩無邊不涉程途入妙玄紫竹林中參大士白花岩畔見韋天運心平等門應普任性逍遙通自圓只此別無修證法光明智照口難宣教苑清規云韋天回向式藩屏佛化蓋本證之以深保障山門示大權而利益云云伏願道場鎮山嶽之固教海源河漢之長三學興隆四檀成集公私並秦秦字可疑火盜雙沈忠曰明極自應撰教苑魯應龍皆稱韋天能得不順世謬矣行霆諸天傳韋天將軍傳云靈威要略曰天神姓韋諱琨南方天王八將之一臣也四王合三十二將而為其首生知聰慧早離塵欲清淨梵行修童真業面受佛囑外護在懷用統三洲用珠林作周住持為最亡我亡瑕殷憂於四部達物達化大濟於五乘已上文又出于法苑珠林光明鬼神品中有韋馱天神梵語韋馱此云智論今此則以韋為姓雖類華夏一經之裔而其天神隱顯其號烏可測量唐高宗乾封歲京師淨業寺道宣律師因覩韋天嘗問律相等事律師述靈威要略并律相感通二傳備載其實如要略中天神姓費自述云弟子迦葉佛時生在初天在韋將軍下諸天貪欲如醉弟子以宿願力不受天欲清淨梵行遍敬毗尼韋將軍童真梵行不受天欲若有事至四王所王見皆起自唐高宗已來諸處伽藍及建立熏修皆設像崇敬彰護法之功其間感應録於文集者甚多然童真乃十住中第八住而賢乎聖乎孰可知之讚曰四王三十二大將南方韋天以為先生知聰慧離塵欲清淨梵行威儀全修童真業持禁戒迦葉佛時志已堅四部殷憂常守衛三洲護法應機緣名姓隨凡安可測示迹唐朝遇道宣備言佛教深幽事律相靈威二集傳或見四王王起接是知無染所當然爰自乾封崇至化逮今名位列諸天每在伽藍或蘭若熏修之所現威權頭頂金兜橫寶杵合十指掌兒童年或警行人令進行或隨方所護其邊却除外障令無惱庶幾佛日照三千忠曰行霆作天神隱顯其號烏可測量之説意似欲混同韋琨韋陀然三洲護法者韋琨將軍而足矣混之韋陀果有何益耶豫以謂國清百録依光明鬼神品而列次諸天焉行霆傳於百録諸天自餘諸天並有事緣可述獨韋馱天闕焉遂取韋琨事迹以混合韋馱文飾資筆舌又自辨防揑合之責故有烏可測量之言矣又曰天神費氏言韋將軍童真梵行不受天欲止此所謂童真者真元不喪欲惡不行如童稚真淨大般若云常修梵行不壤童真止此是也然行霆託此語遽以韋天為第八童真住人豈非舉燭燕説乎如十住中童真住則大乘義章云所行真實離過清淨如世童子心無欲染名童真住止此此是菩薩階位不可與但不行欲染之童真槩論也余非必為韋天非菩薩位中人只惡其假託傳會失語之實而已又讚中云頭頂金兜橫寶杵合十指掌兒童年止此蓋造此天像頂兜橫杵由將軍號如言兒童年雕作童形亦當原童真之言然童真但喻童子無欲何必童形矣韋天見道宣時其童壯不可審焉日本佛匠或安鬚若三四十歲人亦未必為失也以韋琨訛稱韋馱者今陳一二釋氏資鑑云宣律師問韋陀天云云大慧果和尚為盧時用普説云唐時有箇宣律師為他持戒殊勝戒光直透天宮感得韋馱天神每日供天廚食無準範禪師録入內升座云唐宣律師嘗問韋陀尊天云云偃溪聞禪師録韋馱天變相贊云橫兩腕中杵現堆雲裡身權中示權處依舊是天人清拙澄禪師録升座云韋馱天神有大願力東勝身洲西牛貨洲南贍部洲於此三大部洲守護正法獨北俱盧洲佛法不到故不護之虎關鍊禪師録廚司韋馱天點眼云鳳翅兜高金甲新繁華堆裡獨童真上方香積四天是扶起法輪轉食輪恭惟蘇迷盧山第四層中艮頗黎𣐟吠室羅摩那王第二真子韋馱尊天二九世中曾居將軍之位六九生內又為宰輔之身擎北天之貢牙照耀此界持南山之趺足衛護吾人臂上橫安金寶杵重輕八萬四千斤以筆作點勢云一點毫端烏律律爍迦羅眼自威神忠曰諸天傳云近有偽書號總聖録出十六天并韋天昔因其間曰幾世為國王幾世為長者等考之藏典並無所據又云一千二百卷在西竺一百二十卷在唐士皆不根之語若果西域有之而傳此方合有譯師翻傳之事請見者詳之止此忠謂虎關二九世居將軍六九生為宰輔之語蓋依總聖録説耶又按宋高僧傳擎北天之貢牙持南山之趺足皆那叱太子事也非韋天矣忠曰禪林韋天像安之廚房未知何據傳説韋天為宣律師送天廚故大慧普説云宣律師感得韋馱天神每日供天廚食前已引今安廚司有託此説乎稽古略但云宣律師感天送饌侍衛而不言韋天矣大明寺月菴光和尚録韋馱天安座語云汝是三洲護法最勝天子今特請來且作庖廚之主切囑嚴修齋供不虧鐘鼓擁護佛僧令法久住儻違吾言柱杖與汝喫取監齋使者監護僧食之神也大清僧寺稱監齋菩薩剪燈餘話聽經猿記云袁秀才遜戲舞跳梁好為兒態有時箕踞龕中以靛塗面令廚人致敬曰此洪山大聖監齋也注寺廚至今奉洪山大聖監齋青面朱髮普菴肅禪師録香積廚法語云咦以此三法為三昧無量無邊世不會我今修供佛衆生萬聖千賢悉同共摩訶般若味真如十波羅蜜同受用大家著力要精專一粒微塵不許動為報龍天并八部莫入廚中乾打鬨監齋使者在眼前守護普菴無罅縫針劄不入起馨香十八元來佛不共教苑清規監齋回向式云奧者宰一寺之封疆竈者典衆人之喉舌威靈有正正直無私云云法輪當運食輪為先欲令香積之充餘須藉神祇之匡護云云伏願晨炊夕爨無徒薪曲突之憂齋鼓粥魚有法喜禪悅之味韋馱天神與韋天將軍不同也四卷金光明經鬼神品云世尊説偈言釋提桓因及日月天閻摩羅王風水諸神韋馱天神及毗紐天大辨天神及自在天火神等神大力勇猛常護世間晝夜不離大方等大雲經云見事韋馱作韋馱像見事天母作天母像北涼涅槃經云梵天大自在天違陀天迦旃延天違陀南本作韋陀釋門正統云金剛密迹執持寶杵韋馱應機最存弘護明仁孝皇后勸善書云宋僧淨梵嘉禾人姓笡氏母夢光明滿室見神人似佛因而懷娠生甫十歲依勝果寺出家祝髮從湛謙二法師學教得其傳初住無量壽陀凡講法華經十餘過大觀中結二十七僧修法華懺每期方便正修二十八日連作三會精恪上通感普賢受羯摩法呼淨梵比丘名聲如撞鐘時長洲縣宰王公度親目其事題石為記又嘗夢黃衣人請入冥見王者令撿簿云淨梵比丘纍經劫數講法華經即遣使送歸一日禪觀中合衆皆見金甲神人胡跪師前又在他處懺期蒙韋馱天點撿大衆中有戒不嚴淨者先以預定後果懺法不全時姑蘇守應公有婢為祟所惱請師授戒其妖即滅葛氏請施戒薦夫見夫繞師三匝而去待制賈公睹師道行即補為管內法主師住持十餘年亡後焚軀有舍利五色傅大士輪藏妥其像詳于殿堂門輪藏處善慧大士録云大士姓傅名翕字玄風東陽郡烏傷縣稽停里人烏傷即今義烏縣也父名宣慈字廣愛母王氏世為農以齊建武四年丁丑歲五月八日生端靖淳和無所愛著少不學問時與里人漁每得魚常以竹籠盛之沉深水中祝曰欲去者去止者留時人以為愚梁天監十一年年十六歲娶留氏名曰妙光有子二人曰普建普成云云又曰大士欲導羣品先化妻子令發道心即捨田宅請四衆設大會而説偈曰捨抱現天心傾資為善會願度羣生盡俱翔三界外歸投無上士仰恩普令蓋是年飢饉設會之後家無斗儲同里傅昉傅子良等入山供養大士化諭妻子鬻身助會妙光受命乃曰唯願一切衆生因此同得解脫大通二年三月同里傅重昌傅僧舉母以錢五萬買之大士得錢即營設大會乃發願曰弟子善慧稽首釋迦世尊十方三世諸佛盡虗空遍法界常住三寶今捨賣妻子普為三界苦趣衆生消災集福滅除罪垢同證菩提後月餘傅氏悉遣妙光等還山傳燈録善慧大士章云陳太建元年己丑四月二十四日示衆曰此身甚可厭惡衆苦所集云云弟子問師之發迹可得聞乎曰我從第四天來為度汝等次補釋迦及傅普敏文殊慧集觀音何昌阿難同來贊助故大品經云有菩薩從兜率來諸根猛利疾與般若相應即吾身是也言訖趺坐而終壽七十有三聯燈會要善慧大士章云大士一日披衲頂冠靸履朝見帝梁武問是僧耶士以手指冠帝云是道耶士以手指靸履帝云是俗耶士以手指衲衣忠曰今造像為道冠儒履佛衣之狀原此雲臥紀談云佛印禪師謁王荊公於定林公以雙林傅大士像需讚佛印掇筆書曰道冠儒履佛袈裟和會三家作一家忘却率陀天上路雙林癡坐待龍華搜神祕覽云錢塘龍山伽藍中有傅大士真身在焉因觀大士之遺物可得而紀矣藕絲織成彌勒內院一其巧妙法度出於自然惜其歷年如在髣佛之間耳王補之以謂其功非鬼非人以豫觀之故非人力之所能為也叩門槌一云叩九重門者乃此槌也不甚昂大亦無特異者銅鐘一叩之其聲雜踏然無清越聲似銅而非銅若鐵而非鐵妙光檀香枕一人之有疾病者剽其香煮湯飲之其患未始有不差者筆架二硯屏一皆陶器木朴之所為又大士嘗齋餘遺飯及蔬茹於山皆化為石今有二焉白者飯石也青者菜石也尚能辨其形迹可考證之聖人以身顯化或出或沒隨世之緣又况於物耶人之於此不原其心特有異以待焉耳誠物之所化也普建普成或謂輪藏傅翕像左右往往置普建普成非也蓋傅翕已賣二子而設會豈可設此像耶忠謂按大士録鬻妻子月餘而買者復遣歸二子為法師隨侍而今二子像非法師又大士製輪藏雖不紀年月測之可在末年若在末年則非二子童孩時進退齟齬佛祖統紀列輪藏前像設而不及二兒故不設亦可也其安二兒像處一拍手笑一指父笑或曰是即傅大士與嵩頭陀臨水觀影乃見圓光寶蓋二子笑之也忠曰噫此何從得之耶按傳唯大士自笑無二子事況今像非臨水者余謂二子笑態只可據現成説謂大士道冠而儒履而佛袈裟其異形兒見之笑而已佛匠巧意以作兒態也何好鑿説八大神將釋門正統云藏殿列八大神將運轉其輪謂天龍八部也詳于殿堂門輪藏忠曰今輪藏八面排列八天像所謂密迹金剛分二軀梵天帝釋四天王也異正統説又依釋門正統佛祖統紀立保境將軍像謂是在日烏傷縣宰發誓護藏者也然此方少設此又一説曰八天中除一軀密迹金剛加烏傷將軍為八數矣余謂此甚得之且如密迹分二軀蓋欲對立門左右無偏焉如今輪藏則與餘天雜列而分身固無謂也耐重凡堂閣四稜椽下柱上所蹲鬼形頭上及兩掌作擎舉之勢者稱耐重雜毒海卒菴耐重頌云坐斷孤危未肯休荷擔傑閣與層樓祖翁活計丘山重得力全歸頂𩕳頭人天眼目十智同真十同得入下語云耐重打金剛十王禪剎亦有位十王者大慧普説云𭰤潭湛堂和尚一日因修鐘樓樓下元有地藏十王塑像普請移出安在三門頭是時山僧亦捧一身堂問儞手裏大王姓甚麼山僧云姓梁蓋湛堂姓也堂遂以手作展朴頭腳勢云爭奈姓梁底少這箇對曰雖然少這箇鼻孔不多爭堂云杜撰禪和如麻似粟幻住清規歲旦普回向云下界鄷都大帝冥府十殿慈王善惡諸司功曹典吏焰摩羅界牛首馬面阿旁等衆清拙澄和尚日本録近江大守直菴居士七七日升座云今大孝千代松殿與諸兄命僧於七七日內衆僧十員看經禮懺坐禪誦咒每遇七日印造法華經繪畫十王化現本尊佛菩薩像忠曰十王者一秦廣王二初江王三宗帝王四五官王五閻羅王六變成王七泰山王八平等王九都市王十五道轉輪王也見十王經此經前哲判為偽妄然禪剎猶或存十王之像者意在弘勸懲之道歟又西遊記云孫悟空道快報名來十王道我等是秦廣王初江王宋帝王忤宮王閻羅王平等王泰山王都市王卞城王轉輪王忠曰西遊記妄誕之書不足信用矣韻語陽秋云歐陽永叔素不信釋氏之説既登二府一日被病丞夢至一所見十人冠冕環坐一人云參政安得至此宜速反舍公出門數步復往問之曰公等豈非釋氏所謂十王者乎曰然因問世人飯僧造經為亡人追福果有益乎答云安得無益既寤病良已自是遂信佛法文康公得之於陳去非去非得之於公之孫恕當不妄忠曰十王藏典不談不應憑歐陽之夢而實其事晝日所聞見夜間成夢境不應詰歐陽之所覩飯僧造經為福經説明白祇歐陽因此方信佛法則其見淺近不可望玄妙可知也劉須溪十王殿修造疏云江村古寺託於長者之間風雨頽廊謂是何王之殿眷焉修復賴爾衆多列為十地十觀以象三公三又又字可疑宣室但言鬼神事不也世尊天堂必有君子登存乎人者釋門正統云有所謂十王者按正法念經祇有琰摩羅王此翻為雙王以兄主男獄妹主女獄故也據冥報記云天帝統御六道是謂天曹閻羅王者是謂地府如人間天子泰山府君如尚書令録五道大神如六部尚書自餘鬼道如州縣等此外十殿之名乃諸司分者乃唐道明和尚入於冥中一一具述因標其號報應符合初匪罔世往往猶歷代官制不同隨時更變也又有十王經者乃成都府大聖慈寺沙門藏川所撰又水陸儀文敘曰圖形於果老仙人唐張果老畫幀起教於道明和尚雖冥司有十王之號在藏殿無一字之談稽考所因粗知其故由雙王之示實分十殿以強名或崇追薦之方或啓預修之會云云佛祖統紀云世傳唐道明和上神遊地府見十王分治亡人因傳名世間人終多設此供十王名字藏典傳記可考者六閻羅五官二名見提謂經平等華嚴感應傳郭神亮為使者追至平等王所因誦若人欲了知四句偈得放回泰山譯經圖紀沙門法炬譯金貢泰山牘罪經孝經援神契泰山天帝孫主召人魂初江夷堅志池州郭生夢入冥府王揖坐謂曰我是西門王郎冥司録我忠孝正直不害物得作初江王一紀秦廣夷堅志南劍陳生既死其弟之女見二鬼導至宮殿曰秦廣王也王謂女曰欲救伯苦可轉八師經女寤家人求得經請僧誦千遍兄夢弟來謝曰已獲生天忠曰五雜爼云藏經云泰山為天帝之孫為五嶽祖主掌人間生死修短此俗説之鼻祖也止此泰山天孫孝經援神契之説而謝肇浙誣以藏經何也掠剩大夫掌世人飲食神也雲臥紀談云無盡居士張公為玉泉皓禪師撰塔碑紀其入廚見饌晚膳問待過客耶為衆僧耶既以實對即呼知事杖而數之曰吾昔參禪為人汲水舂米今現成米麵蒸炊造作與供養諸佛菩薩無異飽喫了並不留心參學百般想念五味馨香假作驢腸鱓生羊骨鱉𦞦餵飼八萬四千戶蟲開眼隨境攝闔眼隨夢轉不知注祿判官掠剩大夫隨汝抄札消鑿祿簿教汝受苦有日在徒衆不堪其枯寂譖於縣宰曰長老不能安衆唯上來下去點撿零碎縣宰召皓至語之曰大善知識何不在丈室端坐兩廊下三門前來去得許多耶皓曰大通智勝佛十劫坐道場長官以坐是佛耶坐殺佛去也縣宰笑而已春渚紀聞云陳秀公丞相與元參政厚之同日得疾陳忽寄聲問元安否曰參政之疾當即痊矣某雖小愈亦非久世者續請其説秀公曰某病中夢至一所金碧煥目室間羅列甕器甚多上皆以青帛羃之具題曰元參政香飯也某問其故有守者謂某曰元公自少至老每食度不能盡則分減別器未嘗殘一食也此甕所貯皆其餘也世人每食不盡則狼藉委棄皆為掠剩所罰至於減算奪祿無有免者今元公由此當更延十年福算也後數月而秀公薨元果安享耆壽其孫中大公紹直云異聞總録云楊州節度推官沈君失其名及鄉里居官頗強直通判饒惠卿尤知之惠卿受代歸臨川一府僚屬出祖於瓜洲前一夕沈聞書窗外人語曰君明日祿盡馬絶為妻子言愀然不樂明日將上馬厥子牽衣止之沈曰饒通判相與甚厚方為千里別安得不送策馬徑行所乘馬蓋借於軍中者惡甚始出城奔而墜足絓𩍐間不可脫馳四十里及瓜洲方止馭吏追及之則面目俱敗血肉糢糊不可辨識舁歸舍氣息殜殜經一日而絶惠卿憐其以己死賻錢二十萬郡遣夫力十餘輩護柩歸諸人在道相顧體如冰霜或時稍怠則頭輒痛類有物擊之兩旁行者皆見一緑袍官人坐柩上執挺而左右顧至家乃已後歲餘其妻閻氏白晝見旗幟奄冉行空中一人跨白馬蹀躞而下至則沈也相慰拊良久又遍呼諸子誨以讀書耕稼之務曰吾今為掠剩大夫職業雄盛無憶我翩然而去自是不復來閻氏之客傳其事夷堅志作閻氏之弟楁傳其事徐鉉稽神録云廣陵法雲寺僧珉楚嘗與中山賈人章某者親熟章死珉楚為設齋誦經數月忽遇章於市中楚未食章即延入食店為置胡餅既食楚問君已死那得在此章曰然吾以小罪未得辭脫今死為楊州掠剩兒復問何謂掠剩曰凡市人賣販利息皆有常數過數得之為掠剩吾得而掠有之今人間如吾輩甚多因指路人男女曰某人人皆是也頃之有一僧過于前又曰此僧亦是也因召至與語良久僧亦不見楚也忠曰所指路人男女及僧皆鬼也伽藍神或單稱伽藍品字箋云伽藍釋氏護法神名敕修清規念誦云皇風永扇帝道遐昌佛日增輝法輪常轉伽藍土地護法護人十方檀那增福增慧又沙彌得度云伽藍土地增益威光護法護人無諸難事繼燈録雲居即菴慈覺禪師章云師始登雲居時先一夕宿瑤田莊夢伽藍安樂公謂曰汝與此山祇有一粥緣云云後數年蜀士有宦達於朝者與師親故以雲居虗席請師補其處師欣然承命將復徵往夢竟至瑤田莊而寂鏡堂圓禪師録示作無頭榜者偈云損他常住惡徒黨盡付伽藍掌握中詳文疏門無頭榜處釋氏要覽云七佛經云有十八神護伽藍一美音二梵音三天鼓四歎妙五歎美六摩妙七雷音八師子九妙歎十梵響十一人音十二佛奴十三歎德十四廣目十五妙眼十六徹聽十七徹視十八遍視道世法師云寺院既有十八神護居住之者亦宜自勵不得怠惰為非恐招現報耳凡寺壁有畫大神者即是此神也或問世界之內伽藍無數何只十八神而能遍護耶答一切神皆有無數眷屬即是分任守護也無妨編年通論云天台拾得嘗掌供獻伽藍神粥飯多為烏鳶所殘拾得杖擊神而嫚罵曰汝食猶不能護焉能護伽藍乎神遍夢寺僧曰拾得鞭我至旦互以語及一一皆同由是衆駭之鎌倉建長寺伽藍神五軀相並張大帝大權修利掌簿判官感應使者招寶七郎土地神忠曰守護其封境之神稱土地也又見殿堂門土地堂餘冬序録云爵尊德尊齒尊之人往往沒而得祭於里社俗謂土地神是也里人或為之立廟徑山土地神名靈澤龍王寺有龍王殿無準徑山録云靈澤之殿大慧年譜云師住徑山時紹興九年己未以神龍未有封號敷奏于朝蒙賜侯曰廣潤廟曰靈澤靈隱護法神名靈鷲山王正宗贊月堂昌禪師贊云拋擲冷泉靈鷲山王忙忙尋討解者曰靈鷲山王靈隱護法神也雪峰土地神名松山雪峰録難提塔銘云土主曰松山卵塔號難提嘉興府興聖寺土地神名千聖小王虗堂興聖録云千聖小王怒發將鴛鴦湖一腳踢翻僧寶傳雲居簡禪師傳云先是高安洞山有神靈甚膺公住三峰時受服役既來雲居神亦從至舍於枯樹之下而樹茂號安樂樹神雪堂拾遺録云真州長蘆登和尚數年鼎新起長蘆寺既就一夜夢有神人來乞為土地登曰儞做我土地不得神曰何故登曰儞見我僧家過神云某有長誓遂斷一臂呈登曰若如是則可遂與建祠堂逮塑土地一臂墮落屢修復爾方見願力之重也清拙清規云近年杭州靈隱寺都寺忘其名字晚間土地堂燒香土地神執其手令之算常住錢米帳此僧伸手立於神像前竟動不得行者走方丈方丈遂與告白免罰此僧方得退出明日此僧自將衣物盡淨僧堂前估唱錢歸常住畢僧堂插單坐禪又平江府承天寺僧義首座因時疫病前堂寮僧臥病十餘人義首座白日見土地神領瘟神同入看病人義公告土地神求免土地神乃説與瘟神云此僧無過可免義公時有俗姪在旁亦病義公又告土地神求免俗姪神答云我只管寺內僧此俗人非寺人我不管神皆出後義公病愈又天童土地神依人而降言寺中事又言我聞覺和尚住持六年我未曾得見其面覺和尚宏智也乃知道德行解之師神鬼不能見洞山見撒米作色土地神得見禮見碧巖録南泉見撒米起心土地神得見禮見大慧普説方輿勝覽泉州云粥院在開元寺古傳有兵官就院索兩大粥桶盛草餧馬一宿主僧曰本院土地不能守護之捲畫像壓磨石下後一夜於長廊誦經忽見一人曰容為取之是夜兵官兩馬俱斃丞敲門還兩粥桶後復見神曰願從今去守香積廚永無鼠雀耗遂許之仍立廟像焉晉干寶搜神記云蔣子文者廣陵人也嗜酒好色挑撻無度常自謂己骨清死當為神漢末為秣陵尉逐賊至鍾山下賊擊傷額因解綬縛之有頃遂死及吳先主之初其故吏見文于道乘白馬執白羽侍從如平生見者驚走文追之謂曰我當為此土地神以福爾下民爾可宣告百姓為我立祠不爾將有大咎是歲夏大疫百姓竊相恐動頗有竊祠之者矣文又下巫祝吾將大啓祐孫氏宜為我立祠不爾將使蟲入人耳為災俄而小蟲如塵虻入耳皆死醫不能治百姓愈恐孫主未之信也又下巫祝若不祀我將又以大火為災是歲火災大發一日數十處火及公宮議者以為鬼有所歸乃不為厲宜有以撫之於是使使者封子文為中都侯次弟子緒為長水校尉皆加印綬為立廟堂轉號鍾山為蔣山今建康東北蔣山是也自是災厲止息百姓遂大事之忠曰土地神之稱亦久矣火德星君禪林佛殿安南方火德星君牌每月四日十八日諷經羅泌路史後紀炎帝紀曰炎帝神農氏姓伊耆名軌一曰石年炎精之君也乘火德贊火德開統連山感神謹修地利粒我蒸民云云淮南子天文訓曰南方火也其帝炎帝漢高誘注炎帝少典之子也以火德王天下號曰神農死託祀於南方之帝湖海新聞後集云衡嶽有嶽麓寺重新修建金碧輝煌光彩鑠人有胡僧雲遊詣寺與寺主言若於東北角上小溪中造一座兜率橋成則類西天矣寺主翌日集大衆題化積年橋成山門下二聖忽現夢於寺主云本寺類西天上界今差火德星君來焚取可急集大衆南去十里溪橋邊迎之夢覺寺主驚遂集僧衆前去往候自朝至晚無往來者天將昏忽有一道人鬢髮鬅鬙身衣縷徐徐然來僧衆見之下拜迎至寺大作齋會待之甚至哀懇之曰此寺緣化修造以十數年之辛勤方能圓就若一旦為煨燼之場寧不可惜欲望星君特發慈悲姑與原宥道人驚曰貧道安有此僧衆再三哀告不已乃問曰誰與汝説我是火德星君言若明白當與料理寺主不得已直云山門下二聖現夢道人云可打粘大紙數十幅一一綵繪本寺殿宇房廊樣式多將紙錢前來燒化庶可消禳僧衆如其教焚訖五更初衆送道人出山門下乃指罵二聖云誰使汝饒舌教汝骨不見肉肉不見骨及送至昨日橋邊雲霧四起道人倐然不見衆回山門則二聖泥土皆落只有木胎寺主再裝塑之越旬日又落至今本寺山門下無金剛二聖也三國志傳云東海胊縣人居淮安姓糜名竺字子仲此人家世富豪莊戶僮僕等萬餘人糜竺嘗往洛陽買賣回歸竺坐于車路傍見一婦人甚有顏色來求同載竺乃下車步行讓車與婦人婦人再拜請竺同載竺上車目不邪視並無調戲之意行及數里婦人辭去臨別對竺曰我天使也奉上帝敕往燒汝家感君見待以禮故私告耳竺曰娘子何仰也婦曰吾乃南方火德星君耳竺拜而祈之婦曰此天命不敢不燒君可速往搬出財物吾當夜來竺飛奔到家搬出財物日中廚下果然火起盡燒其屋竺因此濟貧拔苦救難扶危大權修利菩薩忠曰右手加額為遠望勢像是也大唐阿育王山護法神矣修利或謬作修理非呂氏春秋三月紀云修利隄防導達溝瀆止此又見淮南子時則訓物初賸語育王庫閣陰記云嚴奉大權修利菩薩於閣之正中以警執事者又與壑翁相國書云僥遷玉几育王故冬進寺云云修舍利殿創閣以奉大權又與壑翁書云庫堂之大權菩薩閣已有成效又云其護塔之神曰大權修利菩薩洎夫鰻井二龍皆果位賢聖隱實揚權威靈昭假如響應聲止此此皆述育王山事緣也希叟曇禪師雪竇録謝育王知客上堂云爭奈育王通師公未肯點頭在忠曰通師公蓋土地神名修利別稱乎月江印禪師育王録云僧問大權菩薩因甚以手加額師云行船全在把梢人忠曰傳説育王山臨東大海渡海者每望山祈穩濟於此神而大權加額者遙望其船保護之狀也今月江之答似可據清拙澄禪師録大權贊云威權廣大赫赫煌煌神通電也非速願力金兮未剛護佛真身舍利依前不識佛光如何是佛光斫額望扶桑東明日禪師白雲録云長蘆寺深沙大神把定蛇頭鄮峰山大權菩薩加額有分天境和尚無規矩大權修利菩薩贊云華冠絳服儀堂堂佛伽真身護法王願力堅兮劫石難比威權大兮羣邪退藏咸謂飛來浙江東松峰孤頂上焉知不離西竺土真機遍十方忠曰或云大權修利亦名張大帝止此此大謬矣蓋出於夢語集大帝斫額之紕繆張大帝處辨之大休念禪師壽福録上堂云白山祠山與修利拍手呵呵笑不徹止此是與字隔別上下可證祠山修利二人也育王山大權歸宗寺張大帝何得混為一人耶忠曰傳説大權修利是天竺阿育王郎子為護育王所建舍利塔以神力來支那國止明州招寶山加手於額回望四百州育王山祀之為土地自爾剎剎慣之或曰斫額者育王令鬼造塔時羅漢神力展手掩日日光分八萬四千道以照示可建塔之所此時大帝斫額望視其異也止此余謂如此無稽之談並祖於瑞溪臆説阿育王弟有大帝誤以為同大權遂附會掩日之緣而浪作斫額之義又有招寶訛作小蓬小蓬山大蓬山在蜀地實東西相絶矣招寶七郎洞家諸剎所祠土地稱為招寶七郎道元和尚歸朝時潛形隨來護法或云亦是大權而已大權修利是封號本名招寶七郎招寶山在鄮峰此神祠于此七郎蓋行第乎止此忠謂此未輒信可更考梅峰信和尚云祀招寶七郎為護法是唯局育王山蓋按陶弘景名勝力菩薩有事緣于育王山招寶七郎恐是弘景乎永平道元和尚行狀云寶慶三年冬解纜發舶天寒白雪霏霏忽有化神現前師云汝何神曰我是招寶七郎知師佩祖印還鄉願相隨護正法師嘆曰汝若然須現小身神乃為白蛇三寸許自入鉢囊而屈蟠肥前州平戶嵨有祠神名七郎權現蓋招寶七郎也昔者唐船來皆著於平戶故唐人祭之為護舶之神猶如今時長崎媽祖此祠至今存其祠扁紹法二字蓋訛招寶也五國故事云閩王延彬圭之子審知姪也嗣圭封泉州初圭領兵至泉州舍于開寺疑有脫乎始生延彬于寺之堂既生有一白雀棲于堂中迄延彬之終方失所在凡三十年仍歲豐稔每發蠻舶無失墜者人因謂之招寶侍郎忠曰招寶七郎本護船神而延彬無失于船故雅稱也非延彬實是招寶神三才圖會有招寶山圖云招寶山在定海城東一里所雄峻特立郡志山名候濤以蕃舶貨寶來集其下故又名招寶山一統志云在定海縣東五里浙江名勝志定海縣云與巾子山名形勢相控者招寶山也舊名候濤山後以諸蕃入貢停船于此故改今名忠曰按名勝志鄮山阿育王山皆在浙江寧波府鄞縣招寶山在寧波府定海縣故舊説招寶山在鄮峯七郎亦是大權者余未信之廣輿記寧波府云招寶山一名候濤山四向海天無際朝鮮日本諸夷之域皆在指顧中祠山張大帝歸宗寺土地與蘭溪和尚有因緣建仁寺祀之為土地神見夢語集義堂日工集云建仁月心云祠山大帝廬山歸宗土地神也大覺禪師在唐時夢感示日本有緣如此三度矣江東祠山府前有穴深廣丈餘每歲祭祀飲食等物內其穴中未嘗作堆如消化者謂之埋藏或云穴通南海建長開山大覺禪師蘭溪和尚行狀云有時遊山之次有峩冠異人招手謂師曰汝緣在東方師回首之頃便不見偶到歸宗寺祠山大帝靈祠而物色前所現異人是也師深疑之東遊挂錫於明州天童時聞日本船在來遠亭往觀之於浮橋頭異人又現師前曰時已至矣速去速去師過橋半里許有一古廟入門顧便是祠山大帝也師燒香誓曰我若建立伽藍請汝為土地神善自記取乃偕義翁龍江等數人登日本船到博多上岸桂林和尚名德昌嗣和甫忍公東山建仁寺語録云吾西來祖千光董此山之初請神君為護法神第一此即張大帝旺化於東方之權輿也桂林大覺法孫故指大覺可稱西來祖乎廣搜神記云祠山聖烈真君姓張諱渤字伯奇武陵龍陽人也父曰龍陽君母曰張媼其先龍陽君與媼遊於太湖之陂正晝無見風雨晦冥雲蓋其上五采青黃雷電並起忽失媼處俄頃開霽媼言見天女謂曰吾汝祖也賜以金丹已而有娠懷胎十四箇月當西漢神雀三年二月十一日夜半生長而奇偉寬仁大度喜怒不形於色身長七尺隆準修髯髮埀委地深知水火之道有神告以地荒僻不足建家命行有神獸前導形如白馬其聲如牛遂與夫人李氏東遊吳會稽渡浙江至苕霅之白鶴山山有四水會流其下公止而居焉於白鶴得柳氏於烏程桑丘得趙氏為侍人王九弟五子一女八孫始於吳興郡長興縣順靈鄉發迹役陰兵自長興荊溪疏鑿聖瀆長十五里岸高七丈至十五丈總三十里志欲通津於廣德也復於後村畢宅保小山楓樹之側為挂鼓壇先時與夫人李氏密議為期每餉至鳴鼓三聲王即自至不令夫人至開河之所厥後因夫人遣飱於鼓乃為烏啄王以鳴鼓而餉至洎王詣鼓壇乃知為所誤及夫人至鳴其鼓王反以為前所誤而不至夫人遂詣興功之所見王為大豨役陰兵開鑿瀆河王見夫人變形未及遂不與夫人相見聖瀆之功息矣遁於廣德縣西五里橫山之頂居民思之立廟於山西南隅夫人李氏亦至縣東二里而化時人亦立其廟聖瀆之河涸為民田即浴兵池為湖灌溉瀕湖之田僅萬頃挂鼓之壇禽不敢栖蟻不敢聚云唐天寶中禱雨感應初贈水部員外郎橫山改為祠山昭宗贈司農少卿賜金紫景宗封廣德侯南唐封為司徒封廣德公後晉封廣德王宋仁宗封靈濟王至寧宗朝纍加至八字王至理宗淳祐五年改封正佑聖烈真君至咸淳二年十二月十二日準告加封正佑聖烈昭德昌福真君二月十一日誕生封正寧昭助靈慧順聖妃李氏初二日誕生封協應濟惠慈昭廣懿夫人趙氏封協順承濟慈佑廣助夫人楊氏此外神眷不勝計不耐記陳繼儒羣碎録云祠山張大帝張秉武陵人一日行山澤間遇仙女謂曰帝以君功在吳分故遣相配長子以木德王其地故且約踰年西會秉如期往果見前女歸子曰當世世相承血食吳楚後生子渤為祠山神神始自長興自疏聖澤欲通津廣德便化為狶役使陰兵後為夫人李氏所見工遂輟故避食狶宋程棨三柳軒雜識云廣德祠山神曰張避食豨按祠山神事要云王始自長興縣疏聖瀆欲通津廣德化身為豨從使陰兵後為夫人李氏所覘其工遂輟食之避豨蓋以此淮南子載禹治水時自化為熊以通轘轅之道塗山氏見之慙而化為石右二事實相類清拙小清規祠山大帝誕生看經榜云山門二月初八日恭遇當寺護法大宋國祠山正順昭顯威德聖烈大帝聖誕良辰謹集合山大衆肅詣靈祠看誦大乘經典聊伸慶讚之誠仰答匡扶之德者也粵以戒稟歸宗僧夏預堂前單鉢位廟居廣德詩仙稱天下鬼神爺朝誦法華六萬餘言功闢隋河幾千百里方仲春蓂敷八葉應昌期靈降九天陰兵肅衛鐵騎雲屯在在作伽藍之主聖烈尊嚴玉爐香靄堂堂現居士之身摧邪去惡雷擊電奔翊正扶公波騰嶽立爰自建長年東臨日域宏恢少室心宗始知大宋國西有祠山夙秉鷲峰口囑禱號如鴻鐘答杵昭然若寶鏡當臺背忘恩義之者先誅侵盜常住之人重罰今此海衆同披梵典仰謝帡幪未來劫數確護禪林益堅城塹謹榜又云元號祠山正順威德聖烈大帝洪名元朝改稱祠山正祐昌福崇仁真君歸宗寺裡請作土地神本社正在江東廣德軍埋藏靈驗天下聞二月八日誕生辰與大覺禪師為有因緣不易言陳畢竟無異事要在弘法度人祠山處名大帝官名忠曰祠山事要十卷詳記神事迹顯應封爵等無遺矣然不載歸宗寺緣其行狀中唯有天寧寺事而今清拙明言可為據按一統志歸宗天寧同在南康府江西名勝志南康府星子縣云廬山歸宗寺在城西二十五里張大帝生辰祠山事要廣搜神記為二月十一日南京名勝志翰墨大全清拙清規作二月八日忠曰禪林疏文所謂祠山正順昭顯崇仁威德聖烈大帝止此皆見于歷代封號據祠山事要正順者宋紹興五年加封正順忠祐靈濟昭烈王昭顯者宋開禧三年改封正祐昭顯威德聖烈王崇仁者宋德祐元年加封正祐聖烈昭德昌福崇仁輔順真君元史泰帝本紀云泰定元年加封廣德路祠山神張真君曰普濟南京名勝志廣德州云廣惠王祠在橫山亦呼為祠山又云國朝慎蒙廣德紀遊云從吳興西行九十里至長興之銀斟舟行過四安又陸行五十里至廣德出西門三里有廣惠殿榜殿高計九丈以沈香雕神像甚奇怪面色似經煙火虬髯如鐵祝史謂是海馬騣乃水神也像有袴乃元天曆二年製布為之至今不朽我太祖龍興時嘗來登謁有詩云天下英靈第一山白雲為闕石為關高臺近斗當空出老樹如龍挾雨還兵革纍經香火舊鬼神常護道人間從軍幸得來瞻此麾指干戈動笑顏又云廟記云祠山神以二月八日誕七日必風九日必雨相傳誕神延其小姨飲必風雨者欲以露其足為樂雖涉虗妄然風雨不爽湖海新聞後集云廣德軍祠山張大帝初發靈時嘗化為豬以治水故郡人多不食豬自為諱物郡人事之甚謹戒不食豬肉唐士羅隱名彰天下所至之處鬼神無不為之譏諷嘗過其廟題詩於壁曰踏遍天涯路平生不信邪方欲題後二句俄手如人拽起狀聞人語曰若後二句不佳能折爾手羅悚懼曰如不佳甘照神語手遂如故續題曰祠山張大帝天下鬼神爺宋景定年間大平州城北四里外有行宮極靈富家巨室重新廟宇計用筒瓦數萬口臨時起窰三五所燒造其土瓦盡皆變成青色琉璃結蓋將畢工尚少三百口續行燒造匠者復以數萬入竈意其皆變琉璃庶可轉鬻以圖小利及出窰則三百口為琉璃餘者皆土瓦也周密字公謹齊東野語云余世祀祠山張王動止必禱應如蓍龜姑志奇驗數事於此以彰神休先子需澄江次為有力者攘去再以毗陵等三壘千祀第餘月不報先妣時留霅禱於南關之祠有水邊消息的非遙之語及收杭信則聞霍山所祈亦得此籤越日臨汀之命下矣戌辰年鑄子甫五歲病骨蒸勢殆甚凡藥皆弗效禱籤得蠱之上九云蠱有三頭紛紛擾擾如蠱在皿執一則了退謀之醫試投逐蟲之劑凡去蛔蛔二其色如丹即日良愈甲寅春往桐川炷香得籤云不堪疾病及東牀云云是歲外舅捐館壬午五月二十八日杭城金波橋馮氏火作次日勢益張雖相去幾十里而人情惶惶不自安時楊大芳潘夢得皆同居相慰勞曰巫言神語皆吉毋庸輕動余不能決因卜去就於神得五十六云遭人彈劾失官資火欲相焚盜欲窺於是挈家湖濱是夕四鼓遂成焦土勸善書云宋台郡都監趙訓武所居與曹顯大尉第三子耘相近耘嘗夢到天宮自西廂迤𨓦過東北角望塑神一軀甚大瞻仰而行長松巨柏陰森滿庭肅然起敬傍有兩凳將就坐少憩神搖手止之曰不可知為祠廟急從東趍出所經履處屋以間計者踰數百覺而恍然其壻趙亮夫為廣德太守遣信來其女寄祠山圖一軸展玩之宛是宵夢所覩始萌奉事張王之意俄有携三畫詣其質庫求十千掌事者靳之客曰吾買時用錢三十萬此名筆也特以急缺之故暫行權質勿慮不來贖也閲其一乃壽星像以白曹曹命如數付與旋又求益至三凡滿二萬而去徐視其二乃祠山像貌丹青燁如其人後不復來於是決意香火訓武之子喚工摹寫捲納筒中置於佛堂久而忘加褾飾都監忽若為物擊暈仆不醒遂作神語曰汝兒子奈何拋我於污穢處家人莫知其旨或曰三哥心忽慢必其所為問之果然急使取之已失所在一小兒言前日見某婢擲一箇竹筒在後園枯井內試令下取乃像卷也污泥滿外而絹素不濕都監少頃即復常而婢疾作符療不效夜臥叫呼徹曉頭髮為鼠齧盡經三日稍愈全如癡迷遂遣其出聽其自如曹氏舉家自後不食豬肉張大帝感應悉於事要不可枚舉請看其書應菴華禪師歸宗録有靈濟王生日上堂竺仙仙禪師建長録土地堂語云祠山張大帝天下鬼神爺誰知鄉曲裏由來共一家便燒香天境和尚無規矩大帝讚云於昭祠山誰不仰止護持佛門摧破魔壘臨機辨正邪猶如鏡中視喚作鬼神爺未知其所履挂錫於歸宗跏趺耳夏滿去無蹤異迹多如是瑞溪夢語集云豫萬年先廬佛龕右畫達磨像左畫一神人蓋擬土地祖師二堂也所謂神人斫額而立傍有一人擎蓋或説阿育王一日起八萬四千塔此神斫額望塔起處謂之大帝偶看翻譯名義集曰摩訶釋提翻曰大帝阿育王弟也按釋迦譜曰阿育王問道人曰何處可起塔道人即以神力左手掩日日光作八萬四千道散照閻浮提所照之處皆可起塔今塔處是也豫謂大帝斫額必在此時忠曰育王起塔時大帝斫額望塔起處全無據矣蓋依護法神有歸宗張大帝故謬取大帝名釀斯妄説瑞溪匪啻不質誤隨援翻譯集實其事復附會云斫額必在掩日時矣自夢語集一倡此以來或有大權為育王郎子者或有斫額為望日勢者流言不止可傷哉夫張大帝中華人以張為姓大帝天竺人摩訶釋提是其梵語阿育王之弟固沒關涉矣又道人掩日作八萬四千道阿育王傳無斯文余別處辨之貴耳集云高九萬越人號菊澗好作唐詩輦下酒市多祭二郎祠山神有詩云簫鼓喧天閙酒行二郎賽罷賽張王愚民可煞多忘本香火何曾到杜康關帝蜀關羽也又稱關大王或關壯繆河東解梁人也續文獻通考云蕩寇將軍都督荊州事漢壽亭侯關羽字雲長後主時追諡壯繆三國志蜀書關羽傳云關羽字雲長本字長生河東解人也亡命奔涿郡先主於鄉里合徒衆而羽與張飛為之禦侮先主與二人寢則同牀恩若兄弟建安五年曹公東征先主奔袁紹曹公禽羽以歸拜為偏將軍禮之甚厚紹遣大將軍顏良攻東郡太守劉延於白馬曹公使張遼及羽為先鋒擊之羽望見良麾蓋策馬刺良於萬衆之中斬其首還紹諸將莫能當者遂解白馬圍曹公即表封羽為漢壽亭侯初曹公壯羽為人而察其心神無久留之意謂張遼曰卿試以情問之既而遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍厚恩誓以共死不可背之吾終不留吾要當立效以報曹公乃去遼以羽言報曹公曹公義之及羽殺顏良曹公知其必去重加賞賜羽盡封其所賜拜書告辭而奔先主於袁軍左右欲追之曹公曰彼各為其主勿追也云云二十四年先主為漢中王拜羽為前將軍假節鉞是歲羽率衆攻曹仁於樊曹公遣于禁助仁秋大霖雨漢水泛溢禁所督七軍皆沒禁降羽羽又斬將軍龐德梁郟等云云曹公議徙許都以避其鋭司馬宣王蔣濟以為關羽得志孫權必不願也可遣人勸權躡其後許割江南以封權則樊圍自解曹公從之先是權遣使為子索羽女羽罵辱其使不許婚權大怒又南郡太守糜芳在江陵將軍傅士仁屯公安素皆嫌羽自輕己羽之出軍芳仁供給軍資不悉相救羽言還當治之芳仁咸懷懼不安於是權陰誘芳仁芳仁使人迎權而曹公遣徐晃救曹仁羽不能克引軍退還權已據江陵盡虜羽士衆妻子羽軍遂散權遣將逆擊羽斬羽及子平于臨沮追諡羽曰壯繆侯子興嗣興字安國少有令問丞相諸葛亮深器異之釋門正統云無盡居士張天覺商英巨儒碩學筆大如椽嘗記玉泉寺關王祠堂云過去陳隋間有大法師名曰智顗一時圓證諸佛法門得大總持辨説無礙敷演三品摩訶止觀是三非一是一非三即一是三即三是一是三是一非一非三隨衆生根而設初後至自天台止玉泉冥坐林間身心湛寂此山先有大力鬼神與其眷屬怙恃憑據以通力故知師行業即現種種諸可怖畏虎豹號擲蛇蟒盤瞪鬼魅嘻嘯陰兵悍怒血脣劍齒毛髮鬅鬠妖形醜質歘忽千變法師愍言汝何為者生死於幻貪著餘福不自悲悔作是語已迹言悄絶頎然丈夫鼓髯而出我乃關羽生於漢末值時紛亂九州爪裂曹操不仁孫權自保義臣蜀主同復帝室精誠激發洞貫金石死有餘烈故王此山所嗜惟殺所食惟腥諦觀法師具足殊勝我從昔來本未聞見我今神力變見已盡而師安定曾不省視汪洋如海非我能測大悲我師哀憫我愚方便攝受願捨此山作師道場我有愛子雄鷙類我相與發心擁護佛法師問所能授以五戒神復白言營造期至幸少避之其夕晦冥震徑掣電靈鞭鬼箠萬壑浩汗湫潭千丈化為平地黎明往視精藍煥麗簷楹欄楯巧奪人目海內四絶遂居其一智者造寺三十六所櫻櫻字悽之誤乎霞靈巖天台玉泉天下四絶以是因緣神亦廟食千里內外同共雲委稽違有咎怠慢有罰捐施金幣匍匐恐後玉泉以甲實神之助歲越十稔魔民出世寺綱頽亂槌拂虗設神既不祐廟亦浸弊元豐甲申襄有蜀僧名曰承皓行年七十所作已辦以大衆請翛然赴感有陳氏子忽作神語自今已往祀我如初遠近播聞瞻禱逾肅明年辛酉廟宇鼎新爾時無盡居士聞説是事乃其贊之云云佛祖統紀智者傳云一日天地晦冥風雨號怒妖怪殊形倐忽千變有巨蟒長十餘丈張口內向陰魔列陳炮矢如雨經一七日了無懼色師閔之曰汝所為者生死衆業貪著餘福不自悲悔言訖衆妖俱滅其夕雲開月明見二人威儀如王長者美髯而豐厚少者冠帽而秀發前致敬曰豫即關羽漢末紛亂九州瓜裂曹操不仁孫權自保豫義臣蜀漢期復帝室時事相違有志不遂死有餘烈故王此山大德聖師何枉神足師曰欲於此地建立道場以報生身之德耳神曰願哀閔我愚特埀攝受此去一舍山如覆船其土深厚弟子當與子平蜀先生拜羽前將軍率衆攻曹仁不克孫權已據江陵羽因遁走吳馬忠獲羽及其子平於章鄉斬之唐書羽生侍中興其裔孫播相德宗建寺化供護持佛法願師安禪七日以須其成師既出定見湫潭千丈化為平址棟宇煥麗巧奪人目神運鬼工其速若是師領衆入居晝夜演法一日神白師曰弟子今日獲聞出世間法願洗心易念求受戒品永為菩提之本師即秉爐授以五戒於是神之威德昭布千里遠近瞻禱莫不肅敬三國志傳云却説雲長英魂不散悠悠蕩蕩直至荊州當陽縣玉泉山有一僧人名普靜原是泛水關鎮國寺長老是時普靜禪師雲遊天下來到此處因見山明水秀就此結為草菴每日裡坐禪參道止有個小行童下山化飯度日是夜月白風清正當三更普靜只聞空中有人大呼還我頭來普靜仰面觀之見空中一人騎赤兔馬手提青龍刀左有關平右有周倉口中但呼如前言不息普靜見是雲長騎馬在菴前靜乃將手中麈尾擊其座曰顏良安在雲長即叉手立于菴前曰吾師何人也願求清號靜曰昔泛水關前鎮國寺中已曾相會今日何為不識普靜耶雲長曰羽質愚魯願聞其教靜曰昔非今是一切休論只以公今生所為言之往日白馬坡前顏良文醜不曾與公鬬力忽然刺之斯人于九泉之下安得不抱恨乎今呂蒙一旦詭計害公正猶此也公何迷惘于是雲長方始解脫禮玉泉山普靜長老為師就山間往往顯聖里人于山頂建廟四時以豬羊祭之後至大唐高宗儀鳳年間東京開封府尉氏縣有一秀才屢舉不第遂乃捨族出家法名神秀拜蘄州黃梅寺五祖禪師弘忍為師學大小乘經法後雲遊天下到玉泉山忽然困棬坐于怪樹之下見一大蟒于前神秀端坐不動至次日于樹下得金一藏遂于玉泉山創建道場因問土人此何廟也土人答曰三國時關公顯聖之祠也神秀拆毀忽然陰雲四合見雲長提刀躍馬于黑雲中馳驟秀問之雲長具言前事神秀乃破土建寺立關公為本寺伽藍至今古迹尚存神秀即六祖師兄我聖朝封雲長義勇武安王忠曰三國志傳迂誣謬悠不足信之七修類稿辨其普靜事妄誕唯七修并受戒護法皆歸虗妄又稱智者為妖僧太過矣呂真人洞賓文集真人本傳曰政和中宋徽宗年號宮禁有崇白晝現形盜金寶姦妃嬪獨上所居無患自林靈素王文卿諸侍宸等治之息而復作上精齋虔禱奏詞凡六一日晝寢見東華門外有一道士碧蓮冠紫鶴氅手持水晶如意前揖上曰臣奉上帝命來治此崇良久一金甲丈夫捉劈而啖之且盡上問丈夫何人道士曰此乃陛下所封崇寧真君關羽也上勉勞再四復問張飛何在羽曰飛乃臣纍劫兄弟世世為男子身今已為陛下生于相州嶽家他日輔佐中興飛將有功焉上問卿姓名曰臣姓陽四月十四日生夢覺録之召侍宸言之意其為洞賓也自是宮禁帖然遂詔天下有洞賓香火處皆正妙通真人之號琅邪代醉編云王元美曰宋崇寧時蚩尤神壤鹽池帝敕天師張虗靖召關羽勝之鹽池復故封羽為真君今所傳祠廟尚有破蚩尤畫壁按黃帝經序云黃帝殺蚩尤其血化為鹵今之解池是也則蚩尤之主鹽池其説久矣文海披沙云關壯繆之神自唐以前未聞威靈至宋真宗祥符間解州鹽池忽為蚩尤所據池鹽耗竭祈禱無驗帝夢城隍語其故敕龍虎山張天師舉關王諭旨果大風雷一晝夜而池鹽俱溢遂賜敕封嗣後屢顯神靈至今日則家祀戶奉即兒童蠻貊無不知崇信者乃知鬼神之顯晦亦自有時耶麈餘云福清民林某女幼喜齋素得香木數寸許刻為關王像甚愛之每食必祭及嫁藏之袖中以行其夫家素事山魈娶婦初夕壻必他往讓崇先宿而後合巹女都不知臨宿袖中出神像置寢閣上夜半崇至但聞室中剨然有聲如物被擊之狀更無他異天明起視牀前有血一團自是怪絶小大驚問具説所以始信神力也宋許觀東齋記事云紹興中洞庭漁人獲一印方僅二寸制甚古紐有連環四兩兩相貫上有一大環總之蓋所以佩也魚者以為金競而訟于官辨其文乃壽亭侯印四字關羽嘗封為漢壽亭侯人疑必羽佩也遂留長沙官庫守庫吏見印上時有光焰回白于官乃遣人送荊門關羽祠中光怪遂絶淳熙四年玉泉寺僧真慈將獻之東宮印已函而未發或光焰四起衆皆驚愕遂不復獻暌車志云忠愍李公若水宣和壬寅尉大名之元城有村民持書至云關大王有書公甚駭愕視其緘云書上元城縣尉李尚書漢前將軍關雲長押詰民何自得之云夜夢金甲將軍告某曰汝來日詣縣由某地逢著鐵冠道士索取關大王書下與李縣尉既覺驚異勉如其言果遇道士得書不敢不持達公發書其間皆預言靖康禍變以事涉怪即火其書遣其人不復問作詩紀之云金甲將軍傳好夢鐵冠道士寄新書我與雲長隔異代翻疑此事大荒虗公後果貴顯卒蹈圍城之禍朕兆之萌神告之矣公始名若水後改賜今名其子浚淳記其事刻之石媚幽閣文娛載姚希孟撰關壯繆定本序云自古忠義之士亦多矣忠而謀勇則為廉頗李牧忠而成功則為郭汾陽李西平忠而無成則為諸葛武侯宗觀文忠而蒙難則為顏常山為張睢陽為嶽少保皆燁燁於青史而寂寂於愚賤之口獨至于關壯繆則自販夫走卒兒童婦媼上而千古之喧辟一代之興王爭先而尸之祝之廟貌之褒美之甚而王之帝之聖之吾不得其解也即曰有稗史有傳奇有耳語耳訛承訛俚鄙不足稽之談浸灌於人之肺腑而不可湔浣則説者何嘗不與張桓侯同稱此何赫濯彼何淡漠也或云桓侯武侯各自聖於其地終不若壯繆之浹遠近而亘古今也吾愈不得其解也記云神也者聰明正直而一者也不聰明則冥憒烏知善淫然聰明而不正直正直而不一則回互欹側人得以熒矞其肹蠁而不足靈且毋論逖聽遐矚為下民作綱維也就其生前微有回互欹側則必文緻其美而匿其醜飾其所長而使人莫窺其所短忮者矯而讓褊者襲而寬其閃忽藏露之態純是宇內之陰氣則皆死氣也人之生也直不直者死之徒生而死矣寧死而生乎壯繆之見辱于操也他人感其禮遇必委心焉否者且結嗉絶粒以死而壯繆不然一飯之德必報終身之誼弗易也刺良而歸封其所賜致書拜辭何光明磊落也馬超來奔孔明心知其護前拜前將軍羞與老兵同列費詩得而説之心曲中事蕩蕩然落落然不獨與孔明見亦可與費詩輩見也愈忮愈陽愈褊愈平也日月之食良玉之斑曉然與天下共質之豈若柴柵其內函蓋其外效鼠輩喔咿囁嚅哉絶孫權惡糜芳口如其胸行如其口灝氣可以貫白虹而囈語可以通碧落直之至神之道也嬰兒順之則喜拂之則怒無造適無獻笑有時乎匍匐入井而不自知古之至人與嬰兒同體抱天地之大朴而無少刓其壯繆之謂與至若天台智者當陽清溪一事舍覆舟山奉師安禪神運鬼工棟宇煥麗師即秉爐受以五戒是不特外護金湯亦且為新發意菩薩以天大將軍身得度即現天大將軍身而為説法矣今之明神載在祀典者嶽瀆而外惟神為正非直道之挺特則宏誓之所攝受戴君而刻此書也豈獨愧夫淫濫其有昭對之思乎吾于此占其人焉壯繆大節不可枚指只一至誠無偽足以括之區區秉燭達旦云爾哉戴埴鼠璞云如今東三班之祠關王祕書省之祠蒼史王及各建天王堂之類軍廢此祠遂存廟碑無考五雜爼云唐以前崇奉朱虗侯劉章家祠戶禱若今之關王云然自壯繆興而朱侯之神又安之也今世所崇奉正神尚有觀音大士真武上帝碧霞元君三者與關壯繆香火相埒遐陬荒谷無不戶而祝之者凡婦人女子語以周公孔夫子或未必知而敬信四神無敢有心非巷議者行且與天地俱悠久矣豈神佛之中亦有遭遇而行世者耶抑神道設教或相禪而興也劉氏鴻書載宋南宮靖關壯繆侯贊云嗚呼篡漢者瞞也成瞞篡者權也瞞名漢臣也實漢賊也權陽瞞敵也陰瞞翼也公批亢於前而不虞姦於腋七軍甫淹六師隨厄使永安之恨不在許昌而在公安建興之師不出樊城而出祁山安樂之𦎗與歸命之璧而相後先惜哉雖然不以間關而廢兄弟不以亂離而廢君臣其峙如者山嶽澄如者川流而炳如者日月星辰嗚呼此其所以亘萬古而猶神也耶清拙澄禪師録關大王贊云蜀帝熊虎之將義勇武安之王受智者大師戒法護普菴古佛道場喑噁叱吒皎日無光語其威則吳朝魏國不敢仰視語其猛則獨入百萬軍中叉取顏良敬之者霸夢之者昌此蓋是手提百二十斤刀摧鋒破關關大將軍號曰雲長者焉忠曰日本黃檗山伽藍堂神三目問之則云關帝也關帝見智者時未始言三目未知唐人何據矣掌簿判官忠曰是土地神之屬從者凡張大帝大權修利等一切神前不妨皆安此像蓋護法神天各執賞罰之權須備掌簿録之官吏也慧日山東福寺土地堂安梵天帝釋據床像像東安掌簿判官立像其像著襆頭左手持卷軸右手握筆梵釋像西安感應使者立像右手持棒擔于右肩左手持槌東福曾此諸像各題其名云爾事記于前寶冠釋迦處襆頭者杜氏通典云全幅巾而向後幞髮謂之頭巾俗人謂之幞頭後周武帝因裁幅巾為四腳大唐因之又云唐太宗謂侍臣曰幞頭起於周武帝蓋取便於軍容耳廣燈録葉縣省禪師章云問如何是衲僧活計師云城東太山廟學云不會意旨如何師云判官手裏筆忠曰近見中華人撰禪林方語其神祇門載判官手裡筆句可知此判官謂神之屬官者而握筆者是掌簿判官也又按左采簿右握筆者記録衆之善惡行事以備賞罰之證也同彤管記功書過之義竹三筆云夫剃削者應離世絶俗奈何接踵於長途廣化募化者罕遇道流而恆見緇輩也有手持緣簿如土地神前之判官者忠曰已稱判官而在土地神前則可證大帝大權等屬官矣法山掌簿舊著幞頭近加莊飾佛工改著帝冠又呼為張大帝訛甚舊説云土地神十九用祠山張大帝或用掌簿判官感應使者忠曰余觀諸禪剎少安張大帝多祀大權所謂十九者舊説以大權訛稱張大帝故有此妄説夢語集云建仁祀張大帝前祠山處引又言或用掌簿判官感應使者此亦訛也夫掌簿感應是正神之屬官當先立正神然後有部屬豈有無主虗設從之理耶縱令有之猶如不立本尊而但置挾侍像而已感應使者忠曰蓋位在判官下東福寺所設像左手持槌右手持棒而擔右肩三聖寺土地堂感應像右手持槌左手提棒與東福像左右相反皆被髮不復著巾所謂作卑下之容也曠野神天竺中華多畫于門壁出食祭之見祭供門出生處鬼子母訶利帝母也訶利帝此翻惡賊今已受戒護法須稱鬼子母天竺中華畫於門屋或食廚處出生祭之見祭供門出生處頂相忠曰祖相本無相猶如如來頂相不可見故名頂相大法炬陀羅尼經云如來頂相肉髻圓滿一切天人所不能見瑜珈師地論云一切所有諸相隨入福聚除白毫相烏瑟膩沙增至千倍爾所福聚能感如來眉間白毫乃至白毫隨入福聚增至百千倍爾所福聚能感如來其頂上現烏瑟膩沙無見頂相竺仙天柱集頂相朝向所宜跋云凡畫宗師頂相宜面西向或謂生前作者則東此言勿聽若作執竹篦為學者入室之狀學者從右而入是尤不可背之其或升堂小參之時雖四衆滿前顧視不拘定方然龍象多衆皆居於右而亦偏多右盻抑東面者賓也是主人者將為賓乎若夫遊山行道等相或回頭轉腦臨時出格則無固必傳神寫照之士宜知之忠曰余聞凡祖像其生前畫者主位面向像右死後畫者客位面向像左其書贊法書起一隨像面所向也今見竺仙所辨存沒須皆主位也抑死後所畫者果何也亦是畫生前形狀耳若言死者在賓位其像當賓位則死者有何形狀可圖嗚呼竺仙所論可謂至當永平道元和尚云江浙禪剎自稱臨濟遠孫者間有惡模樣者謂在善知識會下參禪懇請頂相一幅法語一軸以備嗣法之標準及晚年討得一箇院子不嗣法於前法語頂相之師但擇當代名譽王臣親附者而改嗣之噫如此輩豈夢見佛祖道耶大凡法語頂相雖教師及在家男女行者商客可亦授之諸家語録具在或非其人而謾望嗣法之證雖是有道所傷遂不得已而援筆也耳乃不憑古來書式聊記嗣我之由矣寫照忠曰畫肖像言寫照也照者鏡也行事鈔鉢器制聽篇明坐禪具有好照資持記云好照有説坐禪處多懸明鏡以助心行止此又駱丞集題有詠照陳繼儒注云鏡也止此蓋寫照視鏡所照一倣模寫其面像故謂寫照也閲耕餘録云國語越王命工以良金寫范蠡之狀史記燕世家宋王無道為木人以寫寡人射其面後世言寫照寫生義出於此碧巖録三教老人序云昔人寫照之詩曰分明紙上張公子盡力高聲喚不𮘻晉書顧愷之傳云尤善丹青圖寫特妙每畫人成或數年不點目精人問其故答曰四體妍蚩本無闕少於妙處傳神寫照正在阿堵中普燈録內翰蘇軾居士章云過金山有寫公照容者公戲題曰心似已灰之木身如不繫之舟問汝平生功業黃州惠州瓊州僧寶傳佛印元禪師傳云李公麟伯時為元寫照元曰必為我作笑狀三十佛配日五祖師戒禪師所定也戒雲門宗虗堂愚和尚録楊御藥奉聖旨請跋每月念佛圖云每月念佛之圖戒禪師所編自初一定光佛為首三十日至釋迦世尊終而復始猶若貫華新新不住念念不停口誦心思光明發現為人天福此念佛精誠之感驗也虎關和尚云配一月三十日以佛名者無有本説但寶積經第六十一卷有説佛之日然與今之三十佛全異也忠曰撿彼經無文如三十五佛第九十卷説恐言之乎臥雲日件録云三十日配佛菩薩名號未知何人所定其二十八日大日如來一本為大日菩薩問律宗僧其答不分明忠曰瑞溪未知五祖戒所定大日菩薩恐筆誤耳今本皆作大日如來第六類稱呼門國師祖庭事苑云西域之法推重其人外內攸同邪正俱有舉國歸依乃彰斯號聲教東漸唯北齊高僧法常齊主崇為國師國師之號自常公始陳隋之代天台智顗為陳宣隋煬菩薩戒師故時號國師唐則天朝神秀召入京師及中睿玄凡四朝皆號為國師後有慧忠肅代二朝入禁中説法亦號國師元和中敕署知玄號悟達國師若偏之國則蜀後主賜右街僧録光業為祐聖國師吳越稱德韶為國師見贊寧僧史鈔略僧史略而此文義明故引此不引彼忠曰高麗國稱國尊高麗國華山曹溪宗麟角寺普覺國尊碑銘序云國尊諱見明字晦然詔住雲門寺上曰我先王皆得釋門德大者為王師德又大者為國師今雲門和尚道尊德盛行闔國尊師之禮改國師為國尊者為避大朝國師之號也忠曰大朝指中華也大師傳燈録菩提達磨章云師以化緣已畢傳法得人端居而逝即後魏孝明帝太和十九年丙辰歲十月五日也代宗李唐第九主諡圓覺大師塔曰空觀釋氏要覽云師範也大簡小之言也瑜伽論云於善説法毗奈耶中略有五種大師功德若有大師具成就者便能映蔽外道沙門婆羅門師何等為五一於諸戒行終無誤失二善建立法三善制立所學四於善建立法善制立所學中隨所疑惑皆能善斷五教授出離又佛稱大師瑜伽論云能善教誡聲聞弟子一切應作不應作事故名大師又能化導無量衆生令苦寂滅故名大師又為摧滅邪穢外道出現世間故名大師禪師忠曰稱禪師有二一天子褒賞有德賜徽號稱某禪師二凡禪僧呼前人稱某禪師通師家衆僧義堂日工集云禪師號自神秀號大通禪師始焉國師之稱亦起於神秀即唐朝也生前賜之者宋朝大慧禪師是也有四字者有六字者如今風俗好名以多字為榮非正論也四字號始于宋南渡賣師號助役未為好事神秀賜號詳疏榜門諡號處日本禪師號者蘭溪名道隆蜀人也松源三世嗣無明性來朝為鎌倉建長興國禪寺開山示寂之後諡大覺禪師是此方禪師號之始建長第八十八主後深草帝年號以為寺名頓悟要門論云有客問云弟子未知律師法師禪師何者最勝師曰夫律師者啓毗尼之法藏傳壽命之遺風洞持犯而達開遮秉威儀而行軌範牒三番羯磨作四果初因若非宿德白眉焉敢造次夫法師者踞師子之座瀉懸河之辨對稠人廣衆啓鑿玄關開般若妙門等三輪空施若非龍象蹴踏安敢當斯夫禪師者撮其樞要直了心源出沒卷舒縱橫應物咸均事理頓見如來拔生死深根獲現前三昧若不安禪靜慮到這裡總須忙然隨機授法三學雖殊得意忘言一乘何異故經云十方佛土中唯有一乘法無二亦無三除佛方便説但以假名字引導於衆生客曰和尚深達佛旨得無礙辨善住意天子所問經云文殊師利言何等比丘坐禪禪師於一切法悉無所得彼無憶念若不憶念彼則不修若不修者彼則不證乃至天子問何等比丘得言禪師文殊師利答言天子此禪師者於一切法一行思量所謂不生若如是知得言禪師乃至無有少法可取得言禪師不取何法所謂不取此世彼世不取三界至一切法悉皆不取謂一切法悉無衆生如是不取得言禪師天子若彼禪師無少法取非取不取以是義故得言禪師楞伽經百八問中云禪師以何法建立何等人傳燈録韶州淨法章和尚禪想大師嗣雲門偃章云廣主劉氏問如何是禪師師乃良久廣主罔測因署其號雙杉元禪師上書丞相言買師號金環象簡不便見枯崖漫録堂頭和尚忠曰方丈和尚稱堂頭也敕修清規告香云侍者出小榜云奉堂頭和尚慈旨名德西堂首座並免告香臨濟玄禪師録行録云首座云汝何不去問堂頭和尚如何是佛法的的大意又方丈曰堂頭見殿堂門方丈和尚忠曰住侍人也敕修清規小參云客頭行者喝請云方丈和尚請西堂兩班單寮耆舊蒙堂侍者禪客即今就寢堂獻湯又單言方丈敕修清規訓童行云喝食行者喝云奉方丈慈旨晚參又四節秉拂云秉拂人提綱敘謝方丈及兩序勤舊諸寮大衆畢舉方丈小參公案或拈或頌明極俊禪師報恩録上堂云只如桶箍一爆忙急上方丈方丈云且喜大事了畢雲峰因緣這箇還傷鋒犯手麼又秉拂頭首多稱堂頭和尚為方丈老人傳燈録石頭和尚草菴歌云方丈老人相體解上乘菩薩信無疑石溪月禪師録天童西堂寮結夏普説云方丈老人云釋迦老子全身在草窠裡扶持不起云云上方忠曰上方本稱山上佛寺而今呼住持人為上方其所居在寺最高深處亦可稱上方也五車妙選曰初學記常琮侍煬帝遊寶山帝曰幾時到上方上方寺也琮曰昏黑應須到上頭左右大笑帝曰淳古君子也唐詩選郎士元贈錢起秋夜宿靈臺寺見寄詩云月在上方諸品靜心持半偈萬緣空注上方是僧寺最深處無文印與明月澗書中云比聞以翰墨入侍上方朝夕相從所得當浩無涯涘清拙附録南屏德海詩序云寄呈前雞足清拙和尚及上方月江和尚又德海詩題云奉謝真淨上方清拙和尚老師別源南遊集鳳臺藏主寮結夏秉拂云且道上方拂子因甚麼在旨上座手裡堂上忠曰堂頭亦言堂上虛堂愚和尚録送鏡空西堂上堂云景德堂上鏡空禪師蘊前輩典刑有尊宿禮貌和尚傳燈録達磨大師章云神光悲淚曰惟願和尚慈悲開甘露門廣度羣品善見律云和尚者外國語漢言知罪知無罪是名和尚慧苑華嚴音義云和尚按五天雜言和上謂之塢波陀耶然彼土流俗謂之殟社于闐疏勒乃云鶻社今此方訛音謂之和上雖諸方舛異今依正釋言塢波者此云近也陀耶者讀也言此尊師為弟子親近習讀之者也舊云親教師者是也行事鈔云問云何名師和尚闍梨答此無正翻善見云無罪見罪訶責是名我師共於善法中教授令知故是我闍梨論傳云和尚者外國語此云知有罪知無罪是名和尚四分律弟子訶責和尚中亦同明了論正本云優波陀訶翻為依學依此人學戒定慧故即和尚是也方土音異耳相傳云和尚為力生道力由成闍梨為正行能紏正弟子行未見經論雜含中外道亦號師為和尚業疏云中梵本音塢波陀耶在唐諦言名之依學依附此人學出道故自古翻譯多雜蕃胡胡傳天語不得聲實故有訛僻轉云和上如昔人解和中最上此逐字釋不知音本人又解云翻力生弟子道力假教生成得其遠意失其近語真諦所譯明了論疏則云優波陀訶稍近梵音猶乖聲論余親參譯委問本音如上所述彥琮譯云郁波弟耶聲相近也翻譯名義集云和尚或和闍云云傳云和尚梵本正名塢波遮迦傳至于闐翻為和尚傳到此土什師翻名力生舍利弗問經云夫出家者捨其父母生死之家入法門中受微妙法蓋師之力生長法身出功德財養智慧命功莫大焉又和尚亦翻近誦以弟子年少不離於師常逐常近受經而誦云云義淨云塢波陀耶此云親教師由能教離出世業故故和尚有二種一親教即受業也二依止即稟學也毗奈耶云弟子門人才見師時即須起立若見親教即捨依止長老傳燈録禪門規式云凡具道眼有可尊之德者號曰長老如西域道高臘長呼須菩提等之謂也敕修清規住持章云始奉其師為住持而尊之曰長老見職位門住持處慈覺龜鏡文云開示衆僧故有長老又云晨參莫請不舍寸陰所以報長老也釋氏要覽云長阿含經云有三長老謂耆年長老年臘多者法長老了達法性內有智德作長老假號之者譬喻經偈云所謂長老者未必剃鬚髮雖復年齒長不免於惡行若有見諦法無害於群萌捨諸穢惡行此名為長老我今謂長老未必先出家修其善本業分別於正行設有年齒幼諸根無漏缺此謂名長老肇法師云內有智德可尊故名長老恩法師云有長者老年之德名長老祖庭事苑云今禪宗住持之者必呼長老正取長阿含經有三長老中所謂了達法性內有智德之人以訓領學者增一阿含經云世尊説偈所謂長老者未必剃鬚髮雖復年齒長不免於愚行若有見諦法無害於羣萌捨諸穢惡行此名為長老我今謂長老未必先出家修其善本業分別於正行設有年幼少諸根無漏缺此謂名長老分別正法行大莊嚴經論云諸沙彌説偈言所謂長老者不必在白髮面皺牙齒落愚癡無智慧所貴能修福除滅去衆惡淨修梵行者是名為長老智度論云如佛説偈所謂長老相不必以年耆形瘦鬚髮白空老內無德能捨罪福果精進行梵行已離一切法是名為長老金剛經纂要云長老者德長年老唐譯云具壽壽即是命魏譯云慧命以慧為命刊定記德高曰長年多曰老也智慧超倫即是德長義也然以慧為命者約喻顯法也謂人身以命為本佛法以慧為本命盡則六根俱廢慧喪則萬行不成此約別義釋長老也若通意者但有德業便名長老如云先生未必年老矣增一阿含經云阿難白世尊言如今諸比丘當云何自稱名號世尊告曰若小比丘向大比丘稱長老大比丘稱小比丘稱姓字十誦律云佛在舍衛國爾時有下座比丘不恭敬喚上座上座聞已心不喜諸比丘不知云何是事白佛佛言從今不得不恭敬喚上座若不恭敬喚上座者突吉羅爾時諸比丘不知云何喚上座是事白佛佛言從今下座比丘喚上座言長老爾時但喚長老不便佛言從今喚長老某甲如喚長老舍利弗長老目犍連長老阿難長老難提長老金毗羅世尊稱長老却成不敬方廣大莊嚴經云阿若憍陳如等白佛言長老瞿曇面目端正諸根寂靜身相光明如閻浮金今者應證出世聖種智耶爾時世尊語五人言汝等不應稱喚如來為長老也令汝長夜無所利益後生亦稱長老五燈會元華嚴休靜禪師章云後唐莊宗請入內齋見大師大德總看經唯師與徒衆不看經帝問師為甚麼不看經師曰道泰不傳天子令時清休唱太平歌云云帝曰既是後生為甚麼却稱長老師曰三歲國家龍鳳子百年殿下老朝臣聯燈作僧問北澗簡禪師録普説云遠録公召東山至方丈與語奇之曰我老矣不能與汝説話近此有一後生長老名端我也不識他只見他頌臨濟三頓棒極是淨潔汝若信我説必了大事端即白雲守端禪師也前住忠曰退某寺在東堂者此稱前住枯崖漫録雙杉元禪師上丞相書云景德靈隱禪寺前堂首座前住持嘉興府天寧寺僧中元謹熏沐獻書樞使大丞相國公云云故住京師伊藤儒門弟覽妙心祖堂牌語一僧云現存可稱前住遷化後可稱故住也忠曰此言是也明極俊和尚東院主入祖堂語云故我瑞雲堂上暘谷院主云云文苑英華權德輿馬祖塔銘云唐故洪州開元寺石門道一禪師塔銘云云然古名德有遷化人稱前住者清拙和尚石梁入祖堂語云前住當山第二十二代石梁和尚大禪師云云東堂忠曰當寺前住人稱東堂蓋東是主位前住人是舊主故居東堂舊説曰東堂當山前住也西堂他山前住也本非謂位之高下與日本沿襲義別也昔龍華和尚春屋葩開基南禪龍華院慈氏和尚義堂信開基南禪慈氏院武州管領等胥議定東堂西堂及其衣相坐具等之色又曰如中華雖甲剎某寺前住則稱東堂於本寺雖五山之前住來居餘寺則稱西堂日本稱呼不如此耳瑩山清規云如當寺退院長老稱之東堂敕修清規入院云若前代住持別遷未赴或退居東堂未據室前講交代禮又退院云若留本寺居東堂相繼住持者須當盡禮溫存又聖節云住持趺坐西堂東堂出座下問訊又云次東堂西堂出班上香五燈會元臨濟玄禪師章云師後居大名府興化寺東堂又臨濟録序云僧寶傳白雲端禪師傳云圓通訥禪師讓圓通以居之而自處東堂祖庭事苑解風穴衆吼集東堂云晉卻詵遼遷雍州刺史帝於東堂會送問詵曰卿自以為何為詵對曰百舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑之忠曰風穴衆吼集今不傳古尊宿録風穴語録無東堂語未知解何東堂也詵郗傳東堂於禪家東堂沒干涉東菴東堂又言東菴普燈録雪峯妙湛思慧禪師章云紹興甲子罷寺居東菴東山空和尚録送南泉入菴上堂云去此善法堂不遠有臥雲老人舊隱之東菴伏望禪師不忘乃祖暫此韜藏佛祖通載松源嶽禪師傳云師有棲遁之志即上章乞罷住持事上察其誠許之退居東菴又佛照光禪師傳云師於育王創數椽以自處號曰東菴掩關自娛西堂忠曰他山前住人稱西堂蓋西是賓位他山退院人來此山是賓客故處西堂又詳東堂處瑩山清規云如他寺退院長老者稱之西堂敕修清規告香云其特為茶請西堂光伴碧巖録云此是涅槃和尚法正禪師也昔時在百丈作西堂開田説大義者西菴西堂又名西菴菴主敕修清規開堂祝壽云莊庫菴塔法眷鄉人暫到展賀忠曰菴塔者菴主塔主也五燈會元溈山祐法嗣有蘄州三角山法遇菴主傳燈録臨濟玄法嗣有桐峯菴主杉洋菴主虎溪菴主覆盆菴主名勝敕修清規有諸方名勝挂搭規舊解名勝者非泛常人或大方兄弟之類也江湖敕修清規開山歷代祖忌云或鄉人或江湖舉咒又尊宿遷化祭次蒙堂次有江湖莊子大宗師云泉涸魚相與處於陸相詬以濕相濡以沫不如相忘於江湖忠曰江湖二水名也文選注今言江湖者江外湖邊本是隱淪士所處如蓮社高賢傳周續之曰心馳魏闕者以江湖為桎梏駱賓王序曰廊廟與江湖齊致范希文記曰既而動星象歸江湖是也故禪士之散處名山大剎之外江上湖邊此為江湖人或不出世為名山大剎住持者聚會在一處亦為江湖衆也然相傳以江西馬祖湖南石頭往來憧憧為解此説浸染學家肺腸可浣濯之難矣此方禪林江湖疏題名曰平沙某遠浦某等亦足粗知其字義如傳燈録石頭章云江西主大寂湖南主石頭往來憧憧並湊二大士之門矣止此則二祖師之法席盛昌非今隱淪義也又見文疏門江湖疏處耆舊敕修清規日用軌範云古云衩袒登溷草履遊山莫踐法堂回互耆舊校定清規參前特為新舊人湯云請西堂或大耆舊一人相伴備用清規交代茶云隨令茶頭請兩班耆舊光伴華嚴經離世間品云見有耆舊久修行人不起逢迎不肯承事是慢業增一阿含經云是時世尊住尼拘類樹下成佛未久將千弟子是皆耆舊宿長千弟子者優留比迦葉弟子五百人江迦葉弟子三百人伽耶迦葉弟子二百人毗尼母論云從無臘乃至九臘是名下座從十臘至十九臘是名中座從二十臘至四十九臘是名上座過五十臘已上國王長者出家人所重是名耆舊長宿又上座處引行事鈔阿毗達磨集異門足論云諸有生年尊長耆舊是謂生年上座詳于上座王充論衡卜筮篇云夫蓍之為言耆也龜之為言舊也明狐疑之事當問耆舊也晉習鑿齒作襄陽耆舊傳杜工部集贈別鄭鍊赴襄陽詩云為於耆舊內試覓姓龐人上座廣燈録臨濟玄法嗣有定上座奯上座傳燈録雪峯存法嗣有太原孚上座行事鈔云毗尼母云二十夏至四十九夏名上座詳于耆舊資持記云母論四名局據夏限若如五分取上無人隨時受稱則通大小今時禪衆無論老少例稱上座不知孰為下座乎阿毗達磨集異門足論云三上座者謂生年上座世俗上座法性上座云何生年上座答諸有生年尊長耆舊是謂生年上座云何世俗上座答如有知法富貴長者大財大位大族大力大眷屬大徒衆雖年二十皆應和合推為上座云何法性上座答諸受具戒耆舊長宿是謂法性上座有説此亦是生年上座所以者何佛説出家受具足戒名真生故若有苾芻得阿羅漢名為法性上座釋氏要覽云五分律云齊幾名上座佛言上更無人名上座十誦律云具十法名上座謂有住處言住處者婆沙論云謂道及果空三摩地能引彼力殊勝能令身心安住不動故名上座住處矣無畏無煩惱多知識多聞辨言具足義趣明了聞者信受善能安庠入他家能為白衣説法令他捨惡從善自具四諦法樂無有所乏名上座律中僧坊上座即律三綱上座僧上座即壇上上座或堂中首座別房上座即今禪居諸寮首座住家上座即計齊席上座婆沙論云夫上座者心安住故不為世違順傾動是名上座祖庭事苑説見職位門前堂首座處上座又作尚座從容録云曹山問德尚座佛真法身猶若虗空云云曹山録作強上座勤舊敕修清規聖節云坐堂西堂勤舊蒙堂諸寮並外堂坐舊説云東序都寺退職者曰勤舊蓋知事勤山門世務故曰勤已退職故曰舊也敕修清規都監寺云所在單寮勤舊不滿五六人又兩序進退云近來諸方大小勤舊動至百數僕役倍之脫歡丞相額定歲請知事員數正為此也忠曰此等語皆可以證知事退職者曰勤舊矣又有侍者退職曰勤舊有藏主退職曰勤舊有書狀退職曰勤舊忠曰勤舊不止稱東序退職而西序退職亦稱勤舊故敕修清規方丈小坐湯云第二座分四出頭首一出知事二出西序勤舊三出東序勤舊四出止此故知勤舊名通東西序又須與單寮及前資合看單寮敕修清規小參云客頭行者喝請云方丈和尚請西堂兩班單寮耆舊蒙堂侍者禪客即今就寢堂獻湯敕修清規受嗣法人煎點云令客頭請兩序單寮諸寮品字箋云同官為寮文選注寮小窗也楊升菴曰古人謂同官為寮亦指齋署同窗為義敕修清規都監寺云都寺非三次不得居單寮再請出充者公界封鑰元房以避嫌疑忠曰頭首知事退職居獨房及名德西堂首座居獨房者皆稱單寮言單身專寮無同舍者也敕修清規西堂首座挂搭云如大方名德欲作住計語次露意住持度有單寮可處及行坐位次上下安順則留之備用清規西堂首座挂搭云住持兩班送歸單寮若辭即蒙堂亦兩班相送此是西堂首座歸單寮者敕修清規兩序進退云古知事職滿鳴椎白衆告退歸堂隨衆初無單寮榻位又都監寺云所在單寮勤舊不滿五六人忠曰蓋知事難得其人故退稱勤舊而居獨房者亦少也知事告退歸堂者如靈隱都寺估唱衣物歸錢常住插單僧堂見靈像門土地神此是知事退職歸單寮者備用清規兩班進退云送舊首座都寺歸單寮此是頭首退職歸單寮者又與蒙堂合看人天寶鑑云無畏久法師遍歷禪會嘗入徑山佛日之室出世清修學者雲集師患後生單寮縱恣闢屋為衆堂淨几明蒲褥禪板灑然有古叢社之風法久法師天台宗佛祖統紀為慧覺玉法師法嗣此教家有單寮稱也蒙堂敕修清規聖節云集衆坐堂西堂勤舊蒙堂諸寮並外堂坐蒙堂名基于大覺故事見殿堂門蒙堂後來兩序退職者居之敕修清規都監寺云監寺非三次不歸蒙堂舊説曰三度充都寺者得退歸單寮此謂單寮三度充監寺者得退歸蒙堂此謂蒙堂忠曰都寺退職居單寮者稱單寮衆監寺已下知事退職居蒙堂者稱蒙堂衆今按後堂已下頭首退職者亦須居蒙堂得稱蒙堂證如次引敕修清規兩序進退云各喝云大衆送舊首座都寺歸寮鳴鐘送賀畢各喝云兩班勤舊送以次舊頭首知事歸蒙堂前資忠曰首座前已送畢可知以次舊頭首者後堂已下而歸蒙堂也又都寺前已送畢可知以次舊知事者副寺已下而歸前資也監寺歸蒙堂舊説曰都寺是大蒙堂而居後堂上敕修清規出圖帳云除單寮西堂首座勤舊排板頭外其餘並依戒臘舊以送蒙堂者排副鉢後因爭競不排忠曰舊時則以蒙堂衆排於單寮西堂首座勤舊之傍此為副鉢位後為其生爭競終停不排之余謂既以蒙堂排板頭傍則可知蒙堂位卑於單寮西堂首座勤舊矣古林茂和尚拾遺録送林藏主入虎丘蒙堂頌云一氣轉得大藏教衲僧覷著眼睛枯中峯故是口門窄虎阜不妨牙齒踈放去乾坤千句有收來佛祖一毫無翻身百草頭邊看大地從教似焰爐義堂信和尚録壽天錫真贊敘云天錫壽公外柔而內剛言雅而行端禪苑之職自侍局至后板率以序遷雖居蒙堂戶外之屨已滿矣蒙堂寮主主蒙堂者曰蒙堂寮主敕修清規入寮出寮茶云入蒙堂者白寮主挂點茶牌前資敕修清規尊宿遷化祭次江湖次有前資又都監寺云副寺以下非歷三次不歸前資普燈録淨慈混源曇密禪師章云之泉南教忠求決於晦菴俾悅衆會解事歸前資物初賸語代淨慈前資祭北澗文云服勤衆事隨職所操解職寧居録茲微勞獲依我師優存吾曹春風和氣以相薰陶有過則飭有美則褒忠曰以敕修清規及物初所言推之副寺以下東序職勤歷三次而退休者為前資也蓋謂前之資助事務者也若副寺已上都寺勤而歷三次者為勤舊居單寮矣監寺勤而歷三次者居蒙堂耳矣敕修清規兩序進退送舊首座都寺次送以次舊頭首知事歸蒙堂前資詳蒙堂處忠曰前已送都寺畢可知以次舊知事者副寺已下而歸前資也監寺歸蒙堂備用清規云浙翁退知客後鞱晦前資十七年舊説曰或見備用語妄謂前資但是知客已下退職者訛矣忠曰東序歸前資如前辨然知客班西序今見備用所言西序亦歸前資也久住雲門偃禪師録云示衆云儞等諸人每日上來下去問訊即不無若過水時將什麼過有久住僧對云步師深喜之又云問新到甚處過夏云雲蓋師云多少人僧云七十人師云儞為什麼不在數代云恐久住瞋玄沙備禪師廣録云師見三人新到打鼓三下却歸方丈僧具威儀了却去打鼓三下却歸堂內久住來白師云新到輕欺和尚法席云云舊住久住又作舊住無明性和尚尊相録有舊住至上堂石溪月和尚報恩録有謝首座舊住上堂法華經如來神力品云爾時世尊於文殊師利等無量百千萬億舊住娑婆世界菩薩摩訶薩乃至一切衆前現大神力出廣長舌云云五分律云若舊住比丘聞上座客比丘遊行人間當來至此應修飾房舍乃至應出門迎云云位頭忠曰在衆位之最上人云位頭蓋日本稱呼而已敕修清規雖有位頭字其義別也主盟忠曰禪林主道聚者呼為主盟密菴傑禪師靈隱録安撫疏云徑山天目之奇峰久尸法席靈隱錢塘之勝槩願得主盟左傳文七年云無德何以主盟襄九年云非禮何以主盟昭十三年云晉禮主盟羣玉韻府云凡盟割牲以玉敦承血諸侯共歃血主盟者執牛耳掘坎埋牲加載書堙之言背盟者如此牛也又云禮記疏割牲左耳盛以朱盤玉敦用血為盟書乃歃之忠曰禪林主盟名義準擬世典善知識忠曰或稱師家或稱道友或師家呼學者皆為善知識知識者友之義謂知識其面也非博知博識之謂也維摩經什法師注云衆生利鈍有五品第一但見他無常其心便悟第二見知識無常其心乃悟云云正法念處經云諸凡夫若見知識若見婦女心則生貪僧祇律云阿難有一知識檀越家合門疫病死盡止此毗奈耶雜事云火生長者與諸親朋友知識共辭別止此皆謂友也輔行釋善知識引大經云佛告大衆菩提近因莫過善友止此善知識即是善友可知也傳燈録長沙景岑禪師章云僧皓月問天下善知識證三德涅槃未師曰大德問果上涅槃因中涅槃曰問果上涅槃師曰天下善知識未證曰為什麼未證師曰功未齊於諸聖曰功未齊聖何為善知識師曰明見佛性亦得名為善知識碧巖録云大凡宗師須與人抽釘楔去粘解縛方謂之善知識僧寶傳玄沙備禪師傳云夫為人師匠大不容易須是善知識始得聯燈會要洞山初禪師示衆云夫善知識者驅耕夫之牛奪飢人之食方名善知識即今天下那箇是真善知識諸人參得幾箇善知識來也不是等間直須是參教徹覷教透千聖莫能證明方顯丈夫兒忠曰已上稱師家者法寶壇經云大師告衆曰善知識菩提自性本來清淨但用此心直了成佛善知識且聽慧能行由得法事意云云忠曰此即師家謙呼學者為道友也法華經云善知識者是大因緣摩訶般若經云云何菩薩親近善知識佛言能教人入薩婆若中住如是善知識親近咨受恭敬供養是名親近善知識釋氏要覽云摩訶般若經云能説空無相無作無生無滅法及一切種智令人心入歡喜信樂是名善知識華首經云有四法是善知識一能令人入善法中二能障礙諸不善法三能令人住於正法四常能隨順教化瑜伽論云善知識具十功德一調伏二寂靜三惑除四德增五有勇六經富七覺真八善説九悲深十離退且初調伏者謂與戒相應由根調故寂靜者定相應由內攝故惑除者信念以慧相應煩惱斷故德增者戒定慧具不缺減故有勇者利益他時不疲倦故經富者多聞故覺真者了實義故善説者不顛倒故悲深者絶希望故離退者於一切時恭敬故涅槃經云阿難比丘説半梵行名善知識我言不爾具足梵行乃名善知識又第二十三卷廣説善知識義忠曰止觀作半因緣全因緣然半梵行者值遇善友則成己身梵行半分也全梵行者啓發己行得全備也根本説一切有部毗奈耶雜事云阿難陀言諸修行者由善友力方能成辦得善友故遠離惡友以是義故方知善友是半梵行佛言阿難陀勿作是語善知識者是半梵行何以故善知識者是全梵行由此便能離惡知識不造諸惡常修衆善純一清白具足圓滿梵行之相由是因緣若得善伴與其同住乃至涅槃事無不辨故名全梵行又雜阿含經説貧道忠按沙門一翻乏道乏即貧然則貧道本沙門翻語而世不省何也乃修道斷生死貧窮之義釋氏通鑑齊世祖武帝紀云僧鍾初見武帝於乾和殿稱貧道時暢元暢獻法獻見帝每稱名而不坐帝因問尚書王儉先輩沙門見帝王何所稱及預坐否儉答東晉時諸國僧皆稱貧道而預坐中代庾氷桓元欲使僧盡敬朝議紛紜事皆休寢自宋至今多預坐而稱貧道帝曰暢獻二僧道業如此尚自稱名况復餘者挹拜則太甚稱名亦無嫌自是僧稱名於帝王自獻暢始也又梁武帝紀云上以寶亮法師德居時望每延談説亮每對上唯稱貧道僧史略云此方對王者漢魏兩晉或稱名或曰我或曰貧道故法曠上書於晉簡文稱貧道支遁上書乞歸剡亦稱貧道道安諫苻堅自稱貧道呼堅為檀越于時未為定式避暑録話云晉宋間佛學初行其徒猶未有僧稱通曰道人貧道亦是當時儀制定以自名之辭不得不稱者疑示尊禮許其不名云耳今乃反以名相呼而不諱蓋自唐已然而貧道之言廢矣百論胡吉藏疏云沙門者云乏道亦云息心乏道者以道斷於貧乏也翻譯名義集云沙門或云具名沙門那此云乏道以為良福田故能斷衆生饉乏以修八正道故能斷一切邪道故又云世言沙門名乏那者名道如是道者斷一切乏斷一切邪道以是義故名八正道為沙門那從是道中獲得果故名沙門果忠曰沙門那見寶積寶積經善住意天子會云大士所言沙門那者義何謂也文殊師利言天子若非沙門非婆羅門是則名為真沙門世説云支道林常養數匹馬或言道人畜馬不韻支曰貧道重其神駿釋氏通鑑云唐代宗召忠國師驗大白山人忠云算三七是多少曰國師玩弟子三七豈非二十一忠云却是山人弄貧道三七是十何謂二十一忠曰唐時廢貧道稱者言對王者耳如於士庶則今古何妨焉道舊忠曰道舊謂道友也以道相交故言道舊舊識也舊説西序頭首退職者曰道舊猶如東序退職曰勤舊也蓋頭首在僧堂專辦道故言道已退職故言舊忠曰此杜撰説如西序退職者亦名勤舊前勤舊處已辨忠曰敕修清規不多言道舊只頭首就僧堂點茶榜式云鄉曲道舊禪師又病僧念誦云凡有病僧鄉人道舊對病者榻前排列香燭佛像念誦止此詳味此語只是道友也大慧果和尚示蘇知縣法語云蘇明甫妙喜與渠乃翁三十年道舊斷橋倫禪師行狀云問道舊藏密趙公曰似地擎山不知山之孤峻如石銜玉不知玉之無瑕公曰自己師云自己聻公於言下有省此皆在俗曰道舊非西序退職明矣山主傳燈録有撫州龍濟山主紹修禪師嗣羅漢琛又稱修山主廣燈録有杭州南山資國圓進山主嗣崇壽稠續傳燈有衡州茶陵縣郁山主嗣楊岐會五燈會元為未詳法嗣明極俊禪師語要有堪翁本忍山主靜主黃檗清規云本山住持與各院靜主既同宗派老宿敕修清規尊宿遷化祭次勤舊之外有老宿次前資臨濟録云有一老宿參師未曾人事便問禮拜即是不禮拜即是云云受業師忠曰得度受教之師名受業師又曰親教師又見和尚釋氏要覽云律云師有二種一親教師即是依之出家授經剃髮之者毗奈耶亦云親教二依止師即是依之稟受三藏學者但是依學一切事業乃至一日皆得稱師又云毗奈耶云塢波陀耶此云親教由能教離出世業故稱受業和尚古靈神讚大中寺受業見于區界門受業院史記孟子傳云孟軻受業子思之門人依止師忠曰依隨住止於諸方名德座下仰為受學參禪之師者是名依止師又見受業師處五分律云佛言有五種阿闍梨始度受沙彌戒是名出家阿闍梨授具足戒時教威儀法是名教授阿闍梨授具足戒時為作羯磨是名羯磨阿闍梨就授經乃至一日誦是名授經阿闍梨乃至依止住一宿是名依止阿闍梨羯磨阿闍梨四分律名受戒阿闍梨大師祖忠曰師祖之師稱大師祖應菴華禪師蔣山録上堂云頃在虎丘聞先師舉佛眼叔祖初作無為軍化士因道中著攧有箇省處歸來舉似師祖後令充知客因夜坐撥火忽然猛省雖然如是每至入室未能深入閫奧從容請益太師祖云我為儞説箇喻子正如一人牽一頭牛從櫺中過兩角四蹄悉皆過了唯尾巴過不得忠曰是應菴於五祖演稱太師祖元叟端禪師録跋張紫巖墨迹云紫巖張魏公為宋南渡第一人物其宣撫四川時圓悟大師祖嘗把其手囑曰杲首座真得法髓苟不出無支臨濟宗者叮嚀再三至於忍泣故公造朝首以徑山奏請大慧師祖出世忠曰是元叟於圓悟稱大師祖師祖忠曰師之師稱師祖見大師祖處間極雲公嗣虗堂愚撰虗堂愚和尚行狀中云運菴師祖謝事真之天寧又有大師祖稱為師祖者禪林寶訓云演祖曰山門執事知因識果若師翁輔慈明師祖乎忠曰是五祖演於慈明稱師祖於楊岐稱師翁師翁忠曰師之師又稱師翁見師祖處叔祖忠曰師翁之兄弟稱叔祖應菴於佛眼稱之見大師祖處法叔忠曰師之兄弟稱法叔應菴華禪師蔣山録徑山大慧禪師至上堂云苟非法叔老師到來小姪此生無因拈出弟子維摩經孤山埀裕記云所以稱弟子者言弟則顯師之謙言子則彰我之敬謙敬俱陳故言弟子所以自稱為弟子師亦謂之為弟子故知其名含謙敬也維摩經慧遠義記云聲聞學在佛後故名為弟從佛化生故復稱子維摩經嘉祥胡吉藏疏云問諸聲聞菩薩皆弟子何意聲聞云弟子菩薩不稱弟子耶解云通例而不爾者聲聞親侍佛形儀如法故云弟子菩薩形無定方反常合道如文殊安劍欲刺佛非弟子之法故不得云弟子也而言弟子者外書云夫子視門人如弟自處如兄弟子親夫子如父自處如子師資合舉故云弟子佛法即通衆生親佛如父自處為子佛亦視衆生如子自處為父故云吾世間之父衆生皆是吾子前悟為兄後悟為弟故云弟子也小師忠曰弟子曰小師師蓋僧通稱如師僧之師也舊説曰小於師故云小師減師半德也忠曰非也敕修清規嗣法師忌云小師師孫不可同席又尊宿遷化祭次有小師馬祖道一禪師録云有小師耽源行腳回云云臨濟玄禪師録云嗣法小師慧然大慧普説云時有因佛鑒是老杲和尚小師聯燈會要歸宗常禪師章云師因小師大愚辭師問甚處去云諸方學五味禪去云云釋氏要覽云寄歸傳云鐸曷攞唐言小師受戒十夏已前西天皆稱小師毗奈耶云難陀比丘呼十七衆比丘為小師此蓋輕呼之也亦通沙門之謙稱也昔高僧名僧導為沙彌時睿法師見而異之問曰君於佛法且欲何為導對曰願為法師作都講睿語曰君當為萬人法主豈可對揚小師乎師孫弟子之弟子稱師孫敕修清規尊宿遷化祭次有師孫又見小師處法眷法中眷屬曰法眷或同辦道者總名法眷如敕修清規亡僧入塔云鄉曲法眷同收骨是也敕修清規尊宿遷化祭次鄉人次有法眷又遊方參請云侍者詳詢來由或鄉人法眷辦事分明忠曰詳問住持人同鄉人否住持人法眷否也法兄忠曰受業於師先於己者喚之為法兄此文字又在佛經大集經云寶女語無畏言法兄如來出世不可思議止此已下文纍稱法兄蓋同是釋迦世尊之弟子故稱也度弟日工集云慧珙童子即絶海度弟也又見區界門度弟院處同門忠曰法之兄弟言同門或泛稱法眷言同門敕修清規云法眷尊長同門兄弟見于兄弟處大光明藏關南道吾章云同門有漳州羅漢和尚忠曰羅漢道吾同嗣關南道常白虎通云禮記曰同門曰朋同志曰友忠曰天中記同門曰朋引公羊按公羊傳朋友相衛注有此語非傳本文用禮記可也兄弟忠曰自少壯居叢林諳熟清規者曰山中兄弟便反晚達之人或作品麗者無據又作之説曰義滿公臨相國寺日無位者不得充供過乃以沙彌喝食權授五品而充之故言品麗也此説益無根據又不得字義敕修清規舊解云藏主當兄弟人轉之然昔竺仙和尚特自書記轉于藏主蓋時無兄弟人故書記非兄弟之職也又解名勝云名勝者非常人之稱如大方兄弟者敕修清規嗣法師忌云諷經罷備湯果如有法眷尊長同門兄弟皆當請之叢林盛事云宏智禪師一笠過東浙抵天童及歸旦過雖不言名字而兄弟已有識者曰此乃長蘆長老也主事即申使府使喜出帖差官至旦過請之師堅不肯乃被旦過兄弟硬舁歸方丈又云柏堂雅禪師兄弟多歸之見座元處已上兄弟有一類人也增一阿含經云佛臨涅槃時告阿難曰自今已後敕諸比丘不得輕心相向大者稱尊小者稱賢相視當如兄弟敕修清規告香云新挂搭兄弟欲求和尚告香普説又謝挂搭云出榜報衆云新歸堂兄弟來日粥罷詣方丈謝挂搭解云兄弟者修道和合如兄如弟故曰兄弟南泉語要云兄弟近日禪師太多覓箇癡鈍人不可得雪峯存禪師録云兄弟我道秖三寸能殺人能活人癡絶沖禪師録金山普説云如今兄弟志願不堅力量不大虗堂愚和尚徑山録云兄弟家還有東去西去底已上呼大衆為兄弟大慧普説禮侍者斷七普説云可惜遮兄弟方始於竹篦子話有箇發明處此呼一箇人為兄弟左傳襄三年云寡君願與一二兄弟相見林堯叟注列國之君相謂兄弟言晉國願與列國之君相見門派忠曰宗派同門者清拙澄禪師録示訥侍者法語云吾觀此方學者不得其正者以其局於門派為學之士唯守其家傳之業不能廣入作家爐鞴同行忠曰結友遍歷者相謂為同行楊岐會和尚録云一日三人新到師問三人同行必有一智提起坐具云參頭上座喚者箇作什麼僧云坐具師云真箇那僧云是師云喚作什麼僧云坐具師顧左右云參頭却具眼云云正宗贊真淨文禪師傳云師遊方時與二僧偕行至谷隱薛大頭處問三人同行必有一智如何是一智二僧無語師立下肩應聲便喝薛舉拳作相撲勢師云不勞再勘薛拽杖趁出平交敕修清規迎待尊宿云若諸山平交斟酌中禮可也忠曰平交者同位等輩也謂道德位年皆與我齋等也社中忠曰凡結衆講磨道學者曰社中北澗簡和尚行狀云社中飽參碩望忘年與交石城遺寶虗堂愚和尚虎丘十詠題云虎丘十詠奉呈社中龍象幸笑覽鄉人敕修清規議舉住持云為勤舊知事者不可以鄉人法眷阿黨傳會又遊方參請挂搭規云侍者詳詢來由或鄉人法眷辦事分明又敕修清規開山歷代祖忌云或鄉人或江湖舉呪又尊宿遷化孝服云勤舊辨事鄉人法眷諸山生絹腰帛又亡僧大夜念誦云江湖道舊鄉人法眷次第設祭或解遷化章鄉人曰此有二解一與遷化尊宿同生緣鄉里人二尊宿取滅處鄉里人亡僧章鄉人例解忠曰以議舉住持參請挂搭中鄉人語觀之初同生緣鄉里之義是也雪竇顯禪師録云問僧近離甚處僧云溫州師云還識永嘉大師麼僧云是鄉人師云與儞隔海僧云酌然云云又云師在大龍為知客李殿院到山茶話次問師知客是長老鄉人師云不敢院云且在者裏不得亂走師云本為行腳院云行腳為甚事師云看亂走底院微笑聯燈大龍作大溈死心新禪師録小參云便被世間情愛纏縛得來七顛八倒江南人護江南人廣南人護廣南人淮南人護淮南人向北人護向北人湖南人護湖南人福建人護福建人川僧護川僧浙僧護浙僧道我鄉人住院我去贊佐他一有箇不周全翻作是非到處説周全普燈作周旋鄉頭忠曰諸鄉人中為其首者曰鄉頭雪巖欽禪師録告香普説云諸路鄉頭力到侍者寮陳請忠曰諸路鄉頭者蓋大衆十百每路數人其各數人中揀老成有德者以為之首名為鄉頭已每路有鄉頭此為諸路鄉頭也幻住清規津送云鄉頭出龕前燒香鄉末舉經鄉長鄉頭亦曰鄉長敕修清規亡僧云鄉人舉呪鄉長出燒香鄉末鄉人之末位者見于鄉頭新到忠曰新到某寺挂搭謂之新到僧敕修清規遊方參請云新到相看住持當居中位令其插香展禮暫到忠曰暫時到某寺當不久而去故曰暫到僧敕修清規聖節云堂僧堂司給由暫到客司給由又遊方參請云參頭領衆白云暫到相看新戒忠曰沙彌新受戒故稱新戒敕修清規新戒參堂云得度受沙彌戒已覆住持於何日參堂乃至新戒參頭領衆入堂聖僧前列問訊忠曰如有新戒數人其初得度者為參頭恩度忠曰蓋特恩賜度者為恩度張無盡東林善法堂記云以弼恩度而為上首座主忠曰禪家凡稱教者為座主馬祖一禪師録云有講僧來問曰未審禪宗傳持何法師却問座主傳持何法主曰忝講得經論二十餘本師曰莫是師子兒否主曰不敢師作噓噓聲云云釋氏要覽曰托言曰有司謂之座主今釋氏取學解優贍穎者名座主謂一座之主古高僧呼講者為高座或是高座之主大衆忠曰大衆者謂多衆也舊説曰疏家謂衆者四人非一崇成衆法梵言僧伽耶和合義非四人則不成和合義故記家謂三人曰衆衆字從三人故泉涌寺南山為疏家大智為記家國語周語曰獸三為羣人三為衆女三為粲善見毗婆沙律云衆者如律文説三人名衆從此以上名為僧淨名疏云梵言僧伽此翻為衆直一比丘不名為衆衆多共集名為衆也律明四人已上皆名為衆如衆樹共聚乃名為林四分律云衆者若四人若過四人十誦律云佛語諸比丘清淨同見四比丘是名衆僧若五比丘清淨同見十比丘二十比丘清淨同見皆名衆僧略鈔放光般若經曰佛告須菩提大衆者謂須陀洹斯陀含阿那含阿羅漢辟支佛初發意菩薩摩訶薩至阿惟越致地住者是為大衆之聚智度論云大衆者除佛餘一切賢聖僧僧伽耶之略言也僧史略云若單曰僧則四人以上方得稱之今謂分稱為僧理亦無爽如萬二千五百人為軍或單己一人亦稱軍也僧亦同之行事鈔云僧者以和為義資持記僧者通目七位一二三人雖不秉衆法亦得名僧以僧假別成從因彰號和者有六戒見利三名體和身口意三名相和五分律云僧者從四人已上毗尼母論云比丘僧者一二三人不成僧四人成僧五人僧十人僧二十人僧比丘釋氏要覽云梵語云比丘秦言乞士謂上於諸佛乞法資益慧命下於施主乞食資益色身肇法師云因果有三名一名怖魔即因出家時魔宮震動故至果上名殺賊有云出家者具正信正因發勇捍心求佛果大菩提誓度一切衆生真實大心者方能震動魔宮爾二因中名乞士果上名應供三因中名破惡即持戒名破惡至果上名無生涅槃經云能破煩惱故名比丘破我等想修戒定慧度三有四流安處無畏道故名比丘大莊嚴經云破無明藏故名比丘瑜伽論云比丘者捨離家法趣非家等具足別解脫律儀衆同分是其自性於其形色勤精進故怖畏惡趣自防守故攝無損故名比丘毗婆沙論偈云手足勿妄犯節言順所行常樂守定意是名真比丘雜阿含經偈云所謂比丘者非但以乞食受持在家法是何名比丘於功德過惡俱離修正行其心無所畏是則名比丘大威德陀羅尼有一長者名選擇投佛出家剃髮已時有尊者婆難陀喚言長者選擇答曰我今出家剃髮為比丘非長者也時婆難陀語曰不但剃髮名為比丘乃以偈説云若斷欲希望復斷諸漏盡諸法無希望不可説有法隨順向涅槃隨順趣厭離入信到彼岸此成為比丘有四種比丘一畢竟到道比丘謂阿羅漢二示道比丘謂三果聖人三受道比丘謂初果向四汙道比丘謂凡夫破戒者凡夫持戒比丘隨信隨戒法故必在受道下稱也問汙道比丘堪為福田否答大婆娑論云汙道比丘雖破戒而不破見雖破加行不破意樂信有因果如是正見意樂九十六種外道所無但施主於彼起正信不生嫌惡自生大福矣智度論云比丘名乞士清淨活命故乃至復次比名破丘名煩惱能破煩惱故名比丘復次出家人名比丘譬如胡漢羌虜各有名字復次受戒時自言我是某甲比丘盡形受持戒故名比丘復次比名怖丘名能怖魔王及魔人民當出家剃頭著染衣受戒是時魔怖何以故怖魔王言是人必得入涅槃如佛説有人能剃頭著染衣一心受戒是人漸漸斷結離苦入涅槃維摩經注云肇曰比丘秦言或名淨乞食或名破煩惱或名淨持戒或名能怖魔天竺一名該此四義秦言無一名以譯之故存義名焉忠曰比丘號不必局聲聞僧馬鳴遺教論云此修多羅中每説比丘者示現遠離相故復示摩訶衍方便道與二乘共故又於四衆亦同遠離行故住法記釋第二義云欲明比丘之號不局聲聞取其所修皆受斯目方顯遺教普被羣機尼大師忠曰比丘尼稱大師與徽號賜大師之類別也正宗贊雪峰真覺禪師傳云師象骨巖接人後欲往松山建寺安衆問大師借菴基尼不肯因與坐禪約曰未滿七日出定者輸尼至六日開眼師遂奪其基建寺宗門統要續集云都尉李文和公臨薨時膈胃躁熱因尼道堅就枕問云都尉衆生見劫盡大火所燒時切要照管主人公尉云大師與我煎一服藥來尼無語尉云者師姑藥也不會煎投枕而去忠曰可作李和文往往字倒非也大慧杲和尚普説有尼慈明大師請普説普燈録甘露仲宣禪師法嗣平江府妙堪尼慈鑑大師文照又枯木成禪師法嗣東京妙慧尼淨智大師慧光又石門易禪師法嗣遂寧府香山尼佛通大師雲臥紀談云東都妙慧尼寺住持淨智大師慧光乃普燈所載者倦遊雜録云熙寧中王禹玉丞相奏亡妻慶國夫人鄭氏臨終遺言乞度為女真敕特許披戴賜名希真仍賜紫衣號沖靜大師宋莊綽雞肋編云京師僧諱和尚稱曰大師尼諱師姑呼女和尚近有名執弊集者曰按毗那耶律云尼女十夏以上其徒尊之為大姊二十夏以上其徒尊之為大師燕南記談同此忠曰此大妄説惑後生者也凡律藏有毗奈耶名者一一點撿絶無此語師姑尼稱師姑傳燈録五臺智通禪師章云初在歸宗會下時忽一夜巡堂叫云我已大悟也衆駭之明日歸宗上堂集衆問昨夜大悟底僧出來師出云智通歸宗云汝見什麼道理言大悟試説似吾看師對云師姑天然是女人作歸宗默而異之宗門統要云鄭十三娘年十二歲時隨師姑到大溈才禮拜起溈便問這箇師姑甚麼處住姑云南臺江邊住溈便喝出又問背後老婆甚處住十三娘放身近前叉手立溈再問娘云早箇呈似和尚了也溈云去道人尼稱道人雲臥紀談云無際道人乃張侍郎淵道之女超宗道人乃劉侍郎季高猶子之母其於大慧老師之門俱受記莂者普燈録死心新禪師法嗣云空室道人智通者龍圖范峋女也峋會元作珣又圓悟勤禪師法嗣覺菴道人祖氏建寧遊察院之姪女也誠齋朝天集云臨川蔡教授詵之母徐氏諱蘊行自號悟空道人檀那南海寄歸傳云梵云陀那鉢底譯為施主陀那是施鉢底是主而云檀越者本非正譯略去那字取上陀音轉名為檀更加越字意道由行檀捨自可越渡貧窮妙釋雖然終乖正本舊云達嚫者訛也資持記云檀越亦云檀那並訛略也義淨三藏云具云陀那鉢底此翻施主檀越敕修清規普説云有檀越特請者有住持為衆開示者則登法座首楞嚴經云阿難心中初求最後檀越以為齋主長水疏檀越此云施者翻譯名義集云稱檀越者檀即施也此人行施越貧窮海又見檀那處祖庭事苑云檀那此云施者越謂度越彼岸忠曰或越為漢語或兼越為梵語以余觀之兩字為梵語者近是又唐時安秀諸師對天子稱檀越見貧道處功德主檀施之人曰功德主虗堂愚和尚顯孝録云次拈香奉為革律為禪功德主侍讀尚書資陪祿算居士祖庭事苑云凡具四德乃稱居士一不求仕官二寡欲蘊德三居財大富四守道自悟又菩薩行經云有居財之士居家之士居法之士居朝居山之士通名居士也法華文句補注云外國居財一億為下居士乃至居財百億名上居士此士居家德業充備故名居士又居家大富多財之士名居士也五分律云瞻婆城長者子名首樓那大富有二十億錢人號曰首樓那二十億有三人居士并二十億為四瓶沙王問言汝各有幾財得為居士第一人言我錢有十三億第二人言我有十四億第三人言我有十四億又有一無價摩尼珠二十億言我有二十億復有五百摩尼珠一摩尼寶牀首楞嚴經云若諸衆生愛談名言清淨自居我於彼前現居士身而為説法令其成就長水疏博聞強識不求士官居財大富秉志廉貞故名居士又長水云守道自怡寡欲蘊德故曰居士維摩經云若在居士居士中尊斷其貪著注什曰外國白衣多財富樂者名為居士肇曰積錢一億入居士里寶貨彌殖故貪著彌深智者觀音義疏云居士者多積賄貨居業豐盈以此為名也中阿含經云生聞梵志問曰瞿曇居士何欲何行何立何依何訖耶世尊答曰居士者欲得財物行於智慧立以技術依於作業以作業竟為訖禮記玉藻云居士錦帶鄭康成注居士道藝處士也孔穎達疏居士錦帶者用錦為帶尚文也輟耕録云今人以居士自號者甚多考之六經中惟禮記玉藻有曰居士錦帶注謂道藝處士也吳曾能改齋漫録云居士之號起於商周之時按韓非子書曰太公封於齊東海上有居士任矞華仕昆弟二人立議曰吾不臣天子不友諸侯耕而食之掘而飲之吾無求於人無上之名無君之祿不仕而事力云然則居士云者處士之類是已張無盡護法論議歐陽修排佛曰及其致仕也以六一居士而自稱何也以居士自稱則知有佛矣知有而排之則是好名而欺心耳豈謂端人正士乎又志磐佛祖統紀曰居士者西竺學佛道者之稱永叔歐陽見祖印排佛之心已消故心會其旨而能以居士自號又以名其文集信道之篤於茲可見又竺仙續叢林公論云歐陽子好排佛而乃自稱居士居士者乃奉佛弟子在家之流能通佛道者也已下引維摩證忠曰儒亦有居士之稱而所援數書以謂其稱但在佛氏而歐陽取之以為渠信佛之證矣欠深考也大明録廣辨居士今不取之忠曰居士之服別一樣釋氏資鑑云忠肅公馬亮歷探竺典尤邃華嚴忽一日告所親曰吾大期非遠乃絶葷澡頮更居士服泊然而逝女居士婦人亦稱居士物初賸語重刊古尊宿語録序云覺心居士出善女倫秉烈丈夫志操天如則禪師録普説云如徐氏了心居士雖現女人身同行世間事其不昧者終自了然圓菴集賢母沈氏傳云母名善清字本然族出蘇之崑山湖川鄉沈氏母年及笄即絶葷食衣不華飾好清潔自處父母強之於是贅邑之李氏福成為其配既生伯瑩遂與夫異室而居清修苦行鄉鄰多譽之因稱為女居士明極俊禪師語要有妙清女居士求坐禪訣語徐氏筆精云范君和妻姚氏自號青峨居士容窗隨筆云趙明誠挺之之子妻李氏能文號易安居士堯山外紀曰李清照號易安居士濟南李格非女適趙明誠明誠乃趙挺之子也大姊舊解云大姊老女稱碧巖録云七賢女遊尸陀林遂指尸問云尸在這裏人在什麼處大姊云作麼作麼一衆齊證無生法忍敬函七女經無大姊字老郎敕修清規開堂祝壽云次直廳轎番莊甲作頭老郎人僕參拜又尊宿遷化祭次轎番次有老郎舊解云老郎者力者之上首所謂兄部也人力力者也通鑑綱目宋文帝元嘉元年云臺官衆力集覽力謂僕從也俗事考云俗語人力見北史敕修清規知浴云第四通人力入浴羅湖野録云玉泉皓禪師有示衆曰一夜雨雱烹打倒葡萄棚知事頭首行者人力拄底拄撑底撑撑撑拄拄到天明依舊可憐生人僕敕修清規尊宿遷化祭次有方丈人僕又見老郎某甲正字通云某以代名凡未知主名與不敢斥名者皆以某代之禮天王某甫語某在斯是也今書傳凡自稱不書名亦曰某忠曰某召事物辭甲以十干分人也可言某甲某乙某丙等文字出周禮注困學紀聞云某甲出周禮職內注周禮職內注云某月某日某甲詔書出某物若干給某官某事祖庭事苑云某甲某如甘在木上指其實也然猶未足以定其名甲次第之言亦猶某甲某乙也輟耕録云有部民某甲與某乙鬬毆云云舊説曰凡書某甲兩字者可知雙字名書某一字者可知單字名然不必如此如臣僧某敕修清規聖節上堂豈單字名而可哉必須雙字名忠曰敕修清規遷化下遺書書云令某馳送又請名德首座榜云侍司某止此此等豈復單字名耶名諱敕修清規遊方參詣云住持問鄉里名諱及夏在何處品字箋云生時曰名沒則稱諱檀弓卒哭而諱諱之不稱也今問人名而曰尊諱者失其義矣左傳桓六年云公問名於申繻對曰名有五有信有義有象有假有類申繻魯大夫以名生為信若唐叔虞魯公子友以德命為義若文王名昌武王名發以類命為象若孔子首象尼丘取於物為假若伯魚生人有饋之魚因名之曰鯉取於父為類若子同生有與父同者不以國國君之子不自以本國為名也不以官不以山川不以隱疾隱痛疾患辟不祥也不以畜牲畜牲六畜不以器幣釋氏敕修清規肅衆云悉稱釋氏準俗同親大般若經云非沙門非釋迦子高僧傳道安傳云初魏晉沙門依師為姓故姓各不同安以為大師之本莫尊釋迦乃以釋命氏後獲增一阿含果稱四河入海無復河名四姓為沙門皆稱釋種既懸與經符遂為永式開元釋教録云秦晉已前出家者多隨師姓後彌天沙門道安云凡剃髮染衣紹釋迦種即無殊性宜悉稱釋氏時皆未然洎譯出阿含經云佛告比丘四大河水入海無復本名同名為海四姓之子於佛出家剃除鬚髮著三法衣無復本姓但云沙門釋子彌沙塞律云汝等比丘雜類出家捨本姓同稱釋子今稱沙門釋者蓋天竺出家外道亦自稱沙門今以釋字簡之或單稱釋亦可若彼此是僧即不用稱蓋同釋家法兄弟故僧祇律云佛言譬如恆河遙扶那薩羅摩醯流入大海皆失本名合為一味名為大海汝等如是各捨本姓皆同一姓沙門釋子譬如剎利婆羅門鞞舍首陀羅各各異姓共入大海皆名海商人如是比丘汝等各各異姓異家信家非家捨家出家皆同一姓沙門釋子避暑録話云晉宋間佛學初行其徒猶未有僧稱通曰道人其姓則皆從所授學如支遁本姓關學干支謙為支帛道猷本姓馮學于帛尸梨密為帛是也至道安始言佛氏釋迦今為佛子宜從佛氏乃請皆姓釋世以釋舉佛者猶言楊墨申韓今以為稱者自不知其為姓也慧能大師上唐高宗辭疾表云韶州曹溪山釋迦慧能辭疾表慧能生自偏方幼而慕道叨為忍大師囑付如來心印傳西國衣鉢授東土佛心奉天恩遣中使薛召能入內慧能久居山林年邁風疾陛下德包物外道貫萬民育養蒼生仁慈黎庶旨弘大教欽崇釋門恕慧能居山養疾修持道業上答皇恩下及諸王太子謹奉表釋迦慧能頓首頓首忠曰釋迦慧能即釋慧能也釋具言釋迦耳法名忠曰凡名加祖字宗字者祖之宗之之意也祖宗者尊崇之也其所尊崇者下某字是也而今人不詳此義浪加祖宗字非也今以明極語證之焰慧語要金菴主警策云菴主名宗金求語為警策余曰古人既説金多亂人心汝苦要宗他作麼莫是以其為世間至重之寶歟莫是以其有堅剛不壞之德歟又宗禪禪人警策云汝既名宗禪宜宗此禪便須二六時中提趙州狗子無佛性話東都事略張齊賢傳云自言慕唐李大亮之為人故字師亮止此此以大亮為師之義傳燈録丹霞天然禪師章云初造江西馬祖曰南嶽石頭是汝師也遽抵南嶽一日石頭告衆曰來日剗佛殿前草至來日大衆諸童行各備鍬钁剗草獨師以盆盛水淨頭於和尚前胡跪石頭見而笑之便與剃髮又為説戒法師乃掩耳而出便往江西再謁馬師未參禮便入僧堂內騎聖僧頸而坐時大衆驚愕遽報馬師馬躬入堂視之曰我子天然師即下地禮拜曰謝師賜法號因名天然聯燈會要道吾智禪師章云師見南泉泉問闍梨名甚麼師云宗智泉云智不到處作麼生宗師云切忌道著泉云酌然道著即頭角生雪竇顯禪師録云問僧闍梨名什麼僧云宗雅師云雅即不問作麼生是宗僧無對師云且限三日其僧頻來下語師皆不諾僧却問某甲見處只恁麼和尚作麼生師云爾何不問我僧方擬問被師連打數下道號忠曰以號表所得之道也即是表德號今時以字為道號而道號之外有表德焉禮記郊特牲云冠而字之敬其名也大慧杲禪師答許壽源書云左右具正信立正志此乃成佛作祖基本也山野因以湛然名公道號又答楊彥侯書云承需道號政欲相塗糊可稱快然居士明極俊禪師語要曰諏方性了居士過門需字以號其道余托達空二字授之又云崇福胤公藏主問號於豫豫曰夫胤者繼也嗣也受經所稟師訓名既曰胤宜以嗣宗二字號其道忠曰語要所言道號字義自炳然虎關鍊和尚曰聖一在中華時需道號於無準準曰汝鄉里名何一曰駿河州久能準云不可別求但久能為號可也勸善書云宋僧惠詢道號月堂俗陳氏古今印史云道號之稱雖起於末世然義各有取或因性急而以韋自勉或因性緩而以弦自厲有思親而號望雲有隱江湖而號散人紛然不同然皆士流則有之今也不然而胥吏之徒往往而有以號者衆也恆慮其相同崇尚新奇有名木者號曰半林有姓管名簫者號曰四竹穿鑿亦甚矣於義何居且習以成俗而稱謂之間有不諳大義者或責其友曰我長於汝也曷不以號稱而字我邪嗟夫孔子祖也子思孫也嘗稱仲尼明道兄也伊川弟也嘗稱伯淳蓋字之者乃所以尊之也何獨取於號乎古者相語名之質也周人尚之以字文矣末世別以號稱彌文也哉別號又言別稱即表德也釋氏通鑑梁武帝普通四年紀云制中外毋斥法師慧約名別號智者沙門別號自是而始楊升菴外集云幼名冠字長而伯仲沒則稱諡古之道也未聞有所謂別號也杜甫李白倡和互相稱名張仲吉甫雅什但聞舉字近世士夫多稱別號厥名與字瞢然不知傳刻詩文但云張子李子或云某菴某齋當時尚不諳其誰何後此安能辨其甲乙慎所著詩篇多舉交遊之字或書其名于下庶乎觀者俾言與事諧情景相對不知者或以為輕之異哉又近日民風漓猾白衣市井亦輒稱號永昌有鍛工戴東坡巾屠宰號一峯子一善謔者見二人並行遙謂之曰吾讀書甚久閲人固多不知蘇學士善鍛鐵羅狀元能省牲信多能哉相傳以為笑丹鉛總録云戰國策秦惠王時有寒泉子注云秦處士之號史記索隱云甘茂居渭南陰鄉之樗里故號曰樗里子又范蠡去越自稱鴟夷子此固後人別號之所昉乎表德號忠曰禪祖昔但有名而已臨濟之義玄德山之宣鑒之類也後世便有道號謂字也後又道號外有表德號其實道號即表德耳華嚴經清涼疏云召體曰名表德為號名別號通一切諸佛通具十號名釋迦等則不同故鈔亦有釋云表德為字響頒人天曰號忠曰號通者禪林稱和尚禪師等也叢林盛事云菴堂道號前輩例無但以所居處呼之如南嶽青原百丈黃檗是也菴堂者始自寶覺心禪師謝事黃龍退居晦堂人因以稱之自後靈源死心草堂皆其高弟故遞相法之真淨與晦堂同出黃龍之門故亦以雲菴號之覺範乃雲菴之子故以寂音甘露滅自標大抵道號有因名而召之者有以生緣出處而號之者有因做工夫有所契而立之者有因所住道行而揚之者前後皆有所據豈苟云乎哉今之兄弟才入衆來未曾夢見向上一著子早已各立道號殊不原其本故瞎堂遠禪師因結制次問知事云今夏俵扇多少知事曰五百來柄遠曰又造五百所菴也蓋禪和菴才得柄扇子便寫箇菴名定也聞者罔不大笑余以母氏夢梵僧頂一月而投之懷中既覺遂育因以古月自號以安穩眠呼之蓋倣覺範甘露滅也二號皆維摩寶積所出故橘洲曇公為余作古月説云萬古長空一朝風月慚愧古人模寫得成也融禪未生之夕其母夢得月是為生子之祥愧今人不去却模子也融禪不負其母兼不忘古人古月名菴不為忝矣忠曰禪祖表德大珠可為始按傳燈師名慧海姓朱氏嗣馬祖祖因覽其所撰頓悟入道要門論告衆云越州有大珠圓明光透自在無遮障處也衆中有知師姓朱者迭相推識結契來越上尋訪依附時號大珠和尚者因馬祖示出也西京雜紀云禮曰字以表德顏氏家訓云名以體正字以表德老學菴筆記云字所以表其人之德故儒者謂夫子曰仲尼非嫚也先左丞每言及荊公只曰介甫蘇季明書張橫渠事亦只曰子厚輟耕録論印章制度云漢張安字幼君有印曰張幼君唐呂溫字化光有印曰呂化光此亦三字表德式詳器物門印處事林廣記云仲尼者孔子字也字是表德也已上以字為表德祝允明猥談云道號別稱古人間自寓懷非為敬名設也今人不敢名亦不敢字必以號稱雖尊行貴位不以屬御為重而更重所謂號大可笑事也士大夫名實副者固多餘唯農夫不然自閭市村隴嵬人瑣夫不識丁者未嘗無號兼之庸鄙狂怪松蘭泉石一坐百犯又兄山則弟必水伯松則仲叔必竹梅父此物則子孫引此物於不已愚哉愚哉豫每徇人為記説多假記以規諷猶用自愧近聞婦人亦有之向見人稱冰壼老拙乃嫠媼也又傳江西一令訊盜盜忽對曰守愚不敢令不解問左右一胥云守愚者其號也乃知今日賊亦有別號矣此等風俗不知何時可變南堂欲禪師録云承天毅首座號木翁松月翁更曰剛中求正於余余曰剛中其字也木翁其號也北澗文集云妙喜稱覺範曰甘露滅何以字稱宋濂護法録靈隱朴隱塔銘序云其諱元瀞其字天鏡別號為朴隱江湖紀聞後集云人面蛇呼之曰黎觀主黎不應又連呼其孺名及道號表字俗時排行黎終不應乃不復呼已上字外別立表德周書諡法解云諡者行之迹也號功之表也車服者位之章也白虎通曰帝王者何號也號者功之表也所以表功名德號令臣下者也雅號忠曰有雅而呼者有謔而名者有誚而稱者羅湖野録云湖州西余淨端禪師字表明觀弄獅子頓契心法齊嶽禪師住枕之龍華端往參禮機緣相契不覺奮迅翻身作狻猊狀嶽因可之自是叢林雅號為端獅子祖庭事苑云白頭因因事立號叢林素有之因以少年頭白故得是名如頭副赤頭璨钁頭通安鐵胡覺鐵觜劉鐵磨清八路米七師忽雷澄踢天太鑒多口不語通黑令初明半面一宿覺折床會岑大蟲獨眼龍矬師叔周金剛簡浙客陳蒲鞋泰布衲備頭陀大禪佛王老師瀏陽叟皆禪林之白眉聞其名者莫不慕其所以為道也諡號僧史略云僧循萬行故有迹焉善行則諡以嘉名惡行則人皆不齒自漢魏晉宋無聞斯禮後魏重高僧法果生署之以官死幸之而臨乃追贈胡靈公此僧諡之始也果為沙門統封公爵追贈胡靈諡也後周隋世唐初皆不行至天后朝有北宗神秀居荊州神龍二年詔賜諡大通禪師矣白虎通云諡者何也諡之為言引也引烈行之迹也所以進勸成德使上務節也故禮特牲曰古者生無爵死無諡此言生有爵死當有諡也死乃諡之何言人行終始不能若一故據其終始從可知也晉書劉毅傳云王宮上疏曰臣謹按諡者行之迹而號者功之表今毅功德並立而有號無諡于義不體經國大典注解云諡誄其平生行迹以易名也竺仙仙禪師淨智録云帝詔徑山欽禪師至賜國一禪師此誠有道德感於君王召賜如此而本無道德而求討一箇虗號不知何用後來六祖也不討不知何人也諡他為大鑒禪師達磨也有人諡他曰圓覺大師如今才諷經回向時便口裏念我道也不消得他達磨六祖心裏也不以為榮也沒甚麼歡喜者般説話若如今人本師已死有師號者必定怪殺我其師未死無號者未定我死後必定小師也者般弄我必在陰空裏打莫言不道又有好笑底事儞道是甚麼事釋迦老子却沒人諡他不知如何畢竟無德耶佛祖統紀善月法師傳云善月字光遠將入寂顧左右曰人患無實德為後世稱若但崇虗譽我則不暇千載之下謂吾為柏庭叟則吾枯骨為無愧幸勿為請諡以汙我素業言已纍足而化徽號諡號又言徽號本旌旗之名借用陳后山詩集追尊皇太后挽詞云典册尊徽號欽慈煥德名注徽號字見禮記後人借用康熙字典曰徽爾雅釋詁善也疏徽者美善也書舜典慎徽五典又與徽通幟也禮大傳聖人南面而治天下必改正朔殊徽號注徽號旌旗之屬也安名為新戒者初命法名也增一阿含經云世尊告阿難曰自今後不得稱父母所作字又云諸比丘欲立字者當依三尊此是我之教戒聯燈會要丹霞然禪師章云師再謁馬祖未參禮便入僧堂騎却聖僧項而坐乃至馬大師入堂見即笑云我子天然師跳下作禮云謝師安名因名天然詳法名處廣燈録黃檗斷際禪師章云裴相一日托一尊佛於師前䠒跪云請師安名召云裴休休應喏師云與汝安名竟相公便禮拜具位具載位名言具位也敕修清規迎待尊宿請湯狀尾云年月日具位狀文選任彥升撰宣德皇后令云宣德皇后敬問具位注濟曰具位謂在位百官也人氏敕修清規大挂搭歸堂榜式云挂搭一僧某甲上座某州人氏某戒干寶搜神記云漢時有杜蘭香者自稱南康人氏堯山堂外紀云唐權龍褒夏日侍皇太子宴獻詩云嚴霜白皓皓明月赤團團或曰豈是夏景答曰趁韻而已太子援筆譏之曰龍褒才子秦州人氏明月晝耀嚴霜夏起如此詩章趁韻而已忠曰人氏又作人事蓋事與氏音通假借而已人事義多詳禮則門作氏為正傳燈録虎溪菴主章云有僧問和尚何處人事師云隴西人法華舉和尚録云天使牛太保入寺師云天使甚處人事使云東京城裏人大慧武庫云湛堂準和尚初參真淨淨云甚處人事準云興元府又云真淨和尚小參云人人有箇生緣那箇是上座生緣便道某是某州人事是何言歟普燈録佛海遠禪師章云老僧本貫眉州眉山縣人事西巖慧和尚東林録拈睦州偷果話云陳尊宿將謂是睦州生緣元來却是普州人事又法語云西巖老漢是蓬州人事了也上肩下肩忠曰在己位上人言上肩在下人言下肩日用軌範云看上下肩以面相朝揖食又左肩謂上肩義別見身肢門肩上肩下己位上下也同上肩下肩敕修清規兩序交代茶云西序請茶則知事分手坐於同列頭首中請肩下一人光伴如肩上人趣坐位相妨一行人忠曰一列之人也康熙字典云行集韻寒岡切音杭類篇列也左傳隱十一年鄭伯使卒出豭行出雞犬注百人為卒二十五人為行行亦卒之行列敕修清規請新住持發專使云山門管待專使一行人從至起程日講茶湯禮又尊宿遷化入塔云主喪同喪司一行人巡寮致謝琅琊代醉編云維志王文恪留守西京日長水縣申請買木錢數百千王視其狀亟呼吏作教下縣令追買木一行人械送府云云合干人忠曰凡合會干預一種事務人曰合干人正字通云唐萬年公主傳無干時事注干預也敕修清規請喪司職事云喪司合干人僕排單揭示又唱衣云喪司合干人貴在公心主行第七類職位門義堂日工集云古人以名位為稱者何也謂借位明功也今時禪宗弊于名位夫名位皆職也百丈兩序之設為安衆也安衆之本在乎行道然今人取以為私僥幸乎官家求名及位自生至死此念不斷可痛復可笑莊周曰道隱小成余亦曰禪隱名位矣水滸傳云大相國寺知客語魯智深道僧門中職事人員各有頭項且如小僧做箇知客只理會管待往來客官僧衆至如維那侍者書記首座這都是清職不容易得做都寺監寺提點院主這箇都是掌管常住財物儞才到的方丈怎便得上等職事還有那管藏的喚做藏主管殿的喚做殿主管閣的喚做閣主管化緣的喚做化主管浴堂的喚做浴主這箇都是主事人員中等職事還有那管塔的塔頭管飯的飯頭管茶的茶頭管東廁的淨頭與這管菜園的菜頭這箇都是頭事人員末等職事假如師兄儞管了一年菜園好便升儞做箇塔頭又管了一年好升儞做箇浴主又一年好才做監寺智深道既然如此也有出身時灑家明日便去僧録僧録者僧官也録僧之事釋氏資鑑云唐史唐憲宗元和二年丁亥二月制法師端甫掌內殿法事儀注録左右街僧事僧録自甫而始也忠曰高僧傳僧䂮傳云姚興曰凡夫學僧未階苦忍安得無過過而將極過遂多矣宜立僧主以清大望因下書曰大法東遷於今為盛僧尼已多應須綱領宣授遠規以濟緒僧䂮法師學優早年德芳暮齒可為國內僧主僧遷法師禪慧兼修即為悅衆法欽慧斌共掌僧録給車輿吏力止此蓋職雖異正副僧録名既在端甫已前也僧史略云唐文宗開成中始立左右街僧録尋其人即端甫法師也俗姓趙德宗召入禁中與儒道論議賜紫方袍令侍太子於東朝順宗重之若兄弟相與臥起恩禮特深憲宗數幸其院待之若賓友掌內殿法儀録左街僧事標表淨衆一十年即元和中也由此觀之僧録之起自端甫也甫公文宗開成中卒又云偽秦始立僧正則以法欽慧斌二人掌僧録也有唐變態正乃錯諸録則用矣蓋禮樂自天子出也時既所高物無我競仕使魏統如草秦正若林皆歸唐録區宇中矣日本僧録第一百主後圓融帝康曆二年庚申正月春屋妙葩賜國師號任僧録司此為始也自義滿公義持公時住鹿苑院者任僧録司以蔭涼軒為其副矣掌五山十剎出世舉薦武家賜公帖副僧録僧史略云至唐元和長慶間始立僧録録左右街僧亦無二職次有三教首座昭宗乾寧中改首座為副僧録得覺暉焉副録自暉公始也忠曰日本古以蔭涼軒副於僧録而今廢之住持敕修清規住持章云佛教入中國四百年而達磨至又八傳而至百丈唯以道相授受或巖居穴處或寄律寺未有住持之名百丈以禪宗寖盛上而君相王公下而儒老百氏皆嚮風問道有徒實蕃非崇其位則師法不嚴始奉其師為住持而尊之曰長老如天竺之稱舍利弗須菩提以齒德俱尊也禪苑清規尊宿住持云代佛揚化表異知事故云傳法各處一方續佛慧命斯曰住持初轉法輪命為出世師承有據乃號傳燈得善現尊者長老之名居金粟如來方丈之地私稱灑掃貴徒嚴淨道場官請焚修蓋為祝延聖壽故宜運大心演大法蘊大德興大行廓大慈悲作大佛事成大益利權衡在手縱奪臨時規矩準繩故難擬議然其大體令行禁止必在威嚴形直影端莫如尊重量才補職略為指蹤拱手仰成慎無徹時整肅叢林規矩撫循龍象高僧朝晡不倦指南便是人天眼目備用清規住持云佛祖傳持延洪慧命軌範三界開鑿人天明向上事轉大法輪居金粟如來方丈之位得善現尊者長老之名入室升堂告香普説世出世間法如法説行説俱到名實相當舉古明今師承有據或單提直截對接上根或設化隨機誘勸中下成就勝緣權衡縱奪致若行道説法之暇勾稽錢穀簿書豐儉隨宜供衆修造雖曰世間餘事古今亦號難齊苟能兼濟斯謂全才不及此者竭力運謀修造盡心供衆安僧列職任賢庶曠役斯謂三等住持良非細事焚修祈禱貴在專誠臨衆間居無宜慢易叢林之設老病為先照拂矜憐尤須介念方來高士加禮送迎率身以先無事不辦如密菴披衣夜臥代先師持戒克振家聲地藏指石説心與弟子投機得大智慧此皆千古典刑佛法重任也明教嵩禪師廣原教云教謂住持者何謂也住持也者謂藉人持其法使之永住而不泯也夫戒定慧者持法之具也僧園物務者持法之資也法也者大聖人之道也資與具待其人而後舉善其具而不善其資不可也善其資而不善其具不可也皆善可以持而住之也昔靈山住持以大迦葉統之竹林住持以身子尸之故聖人之教盛聖人之法長存聖人既隱其世數相去茫然久乎吾人僥幸乃以住持名之勢之利之天下相習沓焉紛然幾乎成風成俗也聖人不復出孰為之正外衛者不視不擇欲吾聖人之風不衰望聖人之法益昌不可得也悲夫吾何望也禪林寶訓云密菴曰住持有三莫事繁莫懼無事莫尋是非莫辨住持人達此三事則不被外物所惑矣僧寶傳黃龍寶覺心禪師傳云謝景溫師直守潭州虗大溈以致公三辭不往又囑江西轉運判官彭汝礪器資請所以不趣長沙之意公曰願見謝公不願領大溈也馬祖百丈已前無住持事道人相尋於空間寂寞之濱而已其後雖有住持王臣尊禮為天人師今則不然挂名官府如有戶籍之民直遣伍伯追呼之耳此豈可復為也師直聞之不敢以院事屈願一見之公至長沙清拙澄禪師聖因録云古德住持有三種一説法二安衆三修造舍此之外不為住持昔汾陽感石門排闥喻以佛法大事靖退小節之言而起大覺為九峯一疏而來晦堂願見謝公不住大溈應菴云衲僧家著草鞋住院何至如蚖蛇戀窟此皆中古傳道名師可為後世法羅湖野録云五祖演和尚付法衣佛鑑曰大凡應世略為子陳其四端雖世俗常談在力行何如耳一福不可受盡福盡則必致禍殃二勢不可使盡勢盡則定遭欺侮三語言不可説盡説盡則機不密四規矩不可行盡行盡則衆難住大慧杲和尚與鼓山逮長老書云溈山謂仰山曰建法幢立宗旨於一方五種緣備始得成就五種緣謂外護緣檀越緣衲子緣土地緣道緣山菴雜録云大凡住持人須要鉗轄僕隸亦宜時時以善訓之庶不為惡而無纍焉千瀨住嘉興天寧僕隸盜街坊人狗煮而食之千瀨得煮狗名荊石住姑蘇承天駕舟趣檀家請經墅落僕隸盜居民羊煮而食之荊石得煮羊名夫盜狗盜羊於二人何與而當其惡名者蓋尋常失於鉗轄嚴訓而致然也後之人亦當以彼二人為戒又云夫住持者蓋住一切菩薩智所住境護持諸佛正法之輪所謂佛子住持而百丈立斯名豈偶然哉近代為住持而名焉利焉者不知其所係之重間有好交俗子從事飲啖吁可惜哉云云名德西堂敕修清規上堂云或有諸山住持名德西堂座右設位又告香云名德西堂首座並免告香又念誦云住持入堂前堂首座入次名德西堂插入歸聖僧板頭立又受請人升座云名德西堂前堂首座方舉行此名德義見名德首座處五侍者侍香侍狀侍客侍藥侍衣此之謂五侍者敕修清規云侍者之職最為近密觀道德於前後聽教誨於朝夕親炙參扣期法道底于大成而禮節常宜恭謹慶喜之侍瞿曇香林之侍雲門佛祖重寄其可忽諸空華集贈侍客俊上人敘云原夫侍客之職非古也古之親炙師長者總曰侍者而已百丈師祖創立叢林以慮後世住持者事繁於是分其職為五侍客其一也凡住持者迎官客接尊宿之禮系焉故侍司五局之中獨以侍客為美而古之為人師長而得其侍者機緣契合咸有所待焉泐潭以野鴨而待雄峯臨濟以鯉魚而待洛浦雲門待香林於紙襖鳥窠待會通於布毛乃至鹽官犀牛趙州大王南陽呼喚西睦商量白雲佛果煨蘆蔔吟小艷是其樣子也而其所待雖異而至於克成大器則同矣釋氏要覽云侍者即長老左右也肇云恭己順命給侍之者菩薩從兜率下生經云侍者具八法一信根堅固二其心覓進三身無病四精進五具念心六心不憍慢七能成定意八具足聞智空華集題侍者寮偈敘云南禪侍司之職邇來送歸寮者惟燒香一人而已其他書狀以下寮皆借人居之由是為侍司者不復親近住持視如路人豈容聽教誨於朝夕者哉及余住山俾四員侍者咸歸寮明年夏有侍香者曰廣侍狀者曰鏗侍客者曰春侍藥者曰曙是四人者各具牌額請豫扁題遂扁曰擇木取諸佛日故事也曰內史取諸主文翰也曰思忠取三平接韓侍郎也曰小玉取圓悟小艷詩句也侍者字亦出國語魯語云展禽侍者曰若有殃焉在六侍者覺浪尊正規云方丈有六侍者一巾瓶二應客三書録四衣鉢五茶飯六幹辨是皆親炙必須為法忘軀英奇嚴密之子以任此職庶不孤此法乳也立班小頭首忠曰侍者云小頭首蓋對西序頭首言小矣校定清規云侍者謂之立班小頭首在方丈所以多不與位者猶父子一家也若外客至方丈為主人煎點侍者亦同坐但俟主人坐定侍者於住持前問訊方可就坐在住持前雖為位卑然亦壓寺中諸小頭首禪苑清規維那云院中小頭首如堂頭侍者聖僧侍者延壽堂主爐頭衆寮寮主首座閣主殿主並維那所請空華集賀侍者頌序云古之欲弘吾宗於天下後世者先整叢林欲整叢林者先正住持之名欲正住持名者先選頭首之材欲選頭首材者先選侍者之職謂之立班小頭首蓋以此也而其職欲久久則朝親暮炙砥礪陶冶厥材底于大成是以慶喜侍佛者二十年香林侍韶陽者十八載老慈明之侍汾陽行雪堂之侍佛眼皆十餘祀親近益久而所學益進而後克續乃焰聯乃芳宗風盛于百世其職如斯可不選哉忠曰立班者何謂也蓋擇於衣鉢侍者之不立班而稱餘四侍者為立班小頭首乎山門三大侍者舊説曰燒香侍者書狀侍者請客侍者稱山門三大侍者燒香侍者敕修清規侍者云凡住持上堂小參普説開室念誦放參節臘特為通覆相看挂搭燒香行禮記録法語燒香侍者職之書狀侍者敕修清規侍者云凡住持往復書問製作文字先具草呈如闕書記山門一應文翰書狀侍者職之別源旨和尚東歸集賀建長書狀侍者頌云雲門一字誤烏焉紙襖抄來不得全萬樹松杉池蘸碧未知侍者若為編內記書狀侍者又曰內記敕修清規書記云猶存書狀列於侍者使司方丈私下書問曰內記云虗堂愚和尚録示內記藻侍者頌云當年濟北辭黃檗索火之機屈未伸今日子孫開活眼老南元是讀書人清拙澄禪師録送訥侍者行軸跋云豫內記道人訥辭入京覲師內史侍狀又名內史空華集無文印後敘云凡人之羣居也非一人職其事代其勞則衆人必煩煩則其業必荒矣故吾祖百丈氏創禪剎安衆設東西兩序曰頭首曰知事猶朝廷置文武官其才宜文者相之宜武者將之而又統其衆者曰住持住持之職尤為難矣事日百端應接弗暇則於是置侍司以代其勞猶朝廷近侍之職也而厥頭首侍司之主文者曰書記亦云外史曰書狀亦云內史皆以禪文兼備者充之故厥職每乏其人矣苟非禪文兼全之才則闕焉烏乎難矣哉才之兼全也或禪全者文缺或文長者禪短然則今之世欲得其禪文兼全者俾居是職不亦難矣乎請客侍者侍客掌住持之內客若外客則知客主之又見五侍者處敕修清規侍者云凡住持應接賓客管待尊宿節臘特為具狀行禮請客侍者職之湯藥侍者舊解曰湯藥者湯果藥石也見飲啖門湯果敕修清規云湯藥侍者立班朝暮供奉方丈湯藥左右應接佐助衣鉢侍者撫恤近事行僕或暫缺侍者客至通覆燒香或缺人回向皆宜攝行須擇年壯謹願者充之空華集賀侍藥靈仲集敘云詳夫法身無相豈患風寒之侵陵色體有形須資湯藥以攝養故吾祖百丈氏為老病者創禪林以安其居為住持者置湯藥而奉其養則侍藥之職其來也尚矣佛國高峯和尚行狀云兀菴自大宋至相陽平副帥最明寺殿請住相之建長一日入室舉大力量人為甚麼擡腳不起之話使衆下語師出衆擡一足曰腳跟下聻菴便稱賞命侍湯藥凡日域叢林少年輩以侍藥為榮登實自師始衣鉢侍者衣鉢侍者掌住持錢帛忠曰住持資具錢帛之有處謂之衣鉢閣蓋蓄資財非僧人本志故諱露言之稱衣鉢矣而此侍者掌此敕修清規曰衣鉢侍者不立班先輩多以叢林老成之士為之蓋能納忠救過羅致人才內外庶事通變圓融庶幾上下雍肅如密菴有如侍者而得松源世其家東叟得升首座而家法益嚴今諸方往往任後生晚輩甚至敗德誤事可不慎歟不釐務侍者釐理也一山曰不治事也忠曰在侍者寮不理侍者職曰不釐務侍者大慧年譜云師三十七歲四月抵天寧圓悟令居擇木堂作不釐務侍者每日同士大夫入室物初賸語西巖禪師行狀云師名了惠時主雪竇席者佛鑑無準範也師造席下自陳來歷範呵曰熟歇去已而令充不釐務侍者語之曰覷不透處只在鼻尖頭道不著時不離口脣皮上枯崖漫録云鐵鞭韶禪師見密菴六年為不釐務侍者虗堂愚和尚行狀云運菴師祖赴道場擕師過霅上剃染為不釐務侍者忠曰不釐務語本在外書宋史禮志云元豐八年二月詔諸三省御史臺寺監長二開封府推判官六參職事官赤縣丞以上寄祿升朝官在京釐務者望參不釐務者朔參春明退朝録云本朝視朝之制文德殿日外朝凡不釐務朝臣日趣是謂常朝詳垂説門五參上堂事物紀原知縣云宋朝會要曰建隆四年六月詔河朔右地魏為大名分治劇邑當用能吏思慎釐於縣務入院侍者南堂欲禪師行道記云皇慶初佛性被上旨復居開元四衆推師為入院侍者秉拂侍者舊説曰聖僧侍者任之而無其班位故立方丈侍者下位敕修清規四節秉拂云秉拂侍者同方丈侍者出座下問訊四寮有數説詳殿堂門四寮庫司頭首單寮蒙堂兩班忠曰朝廷制有文武兩班禪林擬之故有東西兩班也敕修清規兩序章云兩序之設為衆辦事而因以提綱唱道黼黻宗猷至若司帑庾歷庶務世出世法無不間習然後據位稱師臨衆馭物則全體備用所謂成己而成人者也古猶東西易位而交職之不以班資崇卑為嫌今岐而二之非也甚而黨鬬強弱異勢至不相容者有矣惟主者申祖訓以戒之欲其無爭必慎擇所任使各當其職人無間言可也明極俊禪師再住建長録謝新兩班上堂云百丈已前無住持事也無兩序之稱亦無進退之説百丈已後古風漸散法出姦生選賢擇能量才補職以宗眼明戒行潔者為住持謂之長老以參請多叢林熟者歸西序謂之頭首以廉於己世法通者歸東序謂之知事匡持法社左輔右弼可謂至矣盡矣無以加矣逗到末梢無賢可選無能可擇不陳其力而就其列者往往有之以故叢林凋弊佛法陵阺深可傷歎明通紀集略憲宗紀云上御奉天門視朝侍衛忽驚擾兩班亦喧亂東序西序東序者知事西序者頭首此謂兩班也猶如朝廷有文武兩階也爾雅云東西牆謂之序注所以序別內外疏此謂室前堂上東廂西廂之牆也所以次序分別內外親疏故謂之序也尚書顧命云西序東嚮敷重底席東序西嚮敷重豐席及禮經每云東序西序者皆謂此也忠曰文武官列班東之序墻西之序墻故云東序西序品字箋云序説文東西墻也徐曰序之言序也所以序別內外也增韻序堂前之兩廡也內則注引崔氏云宮室之制中央為正室正室左右有房房外有序序外有夾室然則序也者其正室前夾室後東西兩墻下之廊廡與唐書儀衛志云文班自東門而入武班自西門而入敕修清規兩班圖云頭首西序此謂頭首明極曰以參請多叢林熟者歸西序謂之頭首詳兩班處敕修清規兩序章列西序頭首云前堂首座後堂首座書記知藏知客知浴知殿燒香侍者書狀侍者請客侍者衣鉢侍者湯藥侍者聖僧侍者是也忠曰茶禮請全班止知客敕修清規方丈特為新挂搭茶云次日首座鳴照堂板全班行禮又云頭首當列名止於知客舊解頭首全班自首座到知客也忠曰前堂後堂書記知藏知客知浴知殿皆為西序頭首也然今但止知客耳敕修清規迎待尊宿云如大尊宿則首座衆頭首稟住持勸請為衆開示法要秉拂五頭首前堂首座後堂首座東藏主西藏主書記也竺仙仙和尚南禪録結夏上堂舉柏樹話拈云趙州拏空塞空直得天下人無出氣處莫有為衆竭力者麼來夜問取五頭首珍重明極俊和尚建長録謝頭首秉拂上堂云建長頭首五座説法第一座玄中玄第二座妙中妙第三座玄中妙第四座妙中玄第五座玄妙俱到六頭首禪苑清規列首座書狀藏主知客庫頭浴主畢云已上並為六箇頭首忠曰六中庫頭之一是知事然槩稱六頭首者隨多得名也前堂首座敕修清規云前堂首座表率叢林人天眼目分座説法開鑿後昆坐禪領衆謹守條章齋粥精粗勉諭執事僧行失儀依規示罰老病亡歿埀恤送終凡衆之事皆得舉行如衣有領如網有綱也雖大方尊宿若住持能以禮致之亦請充此職謂之退位為人如文殊為七佛師猶助釋迦揚化為衆上首吾宗睦州於黃檗雲門於靈樹光昭前烈詒訓後來名位之重可輕任耶前堂義見殿堂門前板處祖庭事苑云首座即古之上座也梵語悉替那此云上座此有三焉集異足毗曇曰一生年為耆年二世俗財名與貴族三先受戒及證道果古今立此位皆取其年德幹局者充之今禪門所謂首座者即其人也必擇其己事已辨衆所服從德業兼備者充之慈覺賾公龜鏡文云表儀衆僧故有首座又云尊卑有序舉止安詳所以報首座也又云三業不調四儀不肅非首座所以率衆也又云坐臥參差去就乖角非所以報首座也禪林寶訓云張侍郎子韶謂妙喜曰夫禪林首座之職乃選賢之位今諸方不問賢不肖例以此為僥幸之津途亦主法者失也然則像季固難得其人若擇其履行稍優才德稍備識廉耻節義者居之與夫險進之徒亦差勝矣幻住菴清規曰首座之稱居一衆之首也在叢林與長老平分風月在菴中與菴主同展化儀事在精勤行存潔白情忘憎愛念絶是非十方之儀範所鍾一衆之道業所係凡打板坐參放禪行道種種動靜靡不關心惟恐道緣未辨法化不周衆有怠惰者當策之以精勤犯衆者當制之寬厚菴居法令又非大叢林所比凡禮貌供需廚堂受用或豐或儉一切折中常以火種刀耕形影相弔為懷自然不落今時道用在其中矣黃檗希運在南泉作首座又在鹽官作首座有請和尚充首座者癡絶沖禪師蔣山録有請旌忠和尚充首座上堂舉黃檗在南泉會中作首座因緣第一座首座在僧堂前板第一位故亦言第一座聯燈會要溈山祐章云師在百丈充典座丈選溈山主人命師往時華林為首座乃云某甲忝居第一座而不得往典座却往百丈令首座與師對衆下語出格者行遂拈淨瓶置地上云不得喚作淨瓶汝喚作甚麼首座云不可喚作木棎也丈却問師師踢倒淨瓶而去丈笑云首座輸却山子也因命師行座元首座言座元忠曰蓋僧堂座位之元首也敕修清規謝挂搭云參頭云即刻恭惟座元都總諸位禪師尊候多福解云都總都寺此舉兩序之首也續燈録翠巖可真禪師章云在歸宗南禪師堂中為座元南問首座常將女子出定話為人是否真云無普燈録五祖表自禪師章云初依祖令看德山小參不答話因緣未有省時圓悟為座元師往請益祖者五祖法演林間録云佛印禪師再歸雲居靈源叟初自龍山來與衆群居痛自韜晦佛印升座白衆請以為座元其禮數特異靈源受之叢林學者日親知晦堂老人法道有在矣大慧武庫云五祖演和尚依舒州白雲海會端和尚咨決大事時秀圓通為座元受四面請即請演為第一座大慧年譜云師五十一歲時住徑山是年龍象駢集坐夏者一千七百有奇舉悟本道顏二座元分座訓徒叢林盛事云圓極岑和尚抱節孤高近世罕及依正堂辨於道場未幾令董座元又云柏堂雅禪師閩人嗣懶菴需初住紫籜以佛照居冷泉叔姪之故特往輔佐之居座元二年兄弟多歸之然雅剛正佛照憚之後住龍翔靈巖其道大振寮元亦稱座元敕修清規大挂搭歸堂云新挂搭人行者引見寮元對觸禮一拜云即日恭惟座元禪師尊候起居多福解云座元即寮元也教家亦有座元稱唐高僧傳曇選傳云晚住并部興國寺川邑奉之以為師傅每有衆集居于座元酬問往還以繫節為要禪頭首座稱禪頭大鑑清規淨智寺首座寮榜云僧堂坐禪號令之權在首座不在住持首座謂之禪頭衆僧皆聽命於首座切須力行勉勵後學祖庭事苑天衣懷禪師傳云晚謁翠峯明覺因營衆務汲水擔忽墮地師豁然知歸由是名振叢林皆目之為禪頭云僧寶傳法昌遇禪師傳云大寧寬禪師至遇畫地作此相便曳钁出翌日未升座謂寬曰昨日公案如何寬畫此相即抹撒之遇曰寬禪頭名下無虛人大慧為秦國夫人請普説云睦州喚僧大德僧回首州云擔板漢曾有箇禪頭舉遮話問僧儞作麼生會又為禮侍者斷七普説云我既會了却倒疑著幾箇禪頭乃問老和尚老和尚曰能有幾箇得到儞田地又方外道友請普説云慶藏主在溈山雖僻地裏與先師入室其實真如不曾舉他立僧一日真如問先師儞去慶藏主處入室否曰未曾真如云因甚不去他古今好先師曰某待都去禪頭處入室僧寶正續傳泐潭照禪師傳云示衆曰禪頭首座同行道伴亦皆教儞參學首衆首座稱首衆虗堂愚和尚徑山録云舉黃檗在南泉會中為首衆一日捧鉢向南泉位中坐云云立僧首座舊説曰立僧者謂成立衆僧也無定人首座頭首之外別於西堂或前堂及諸耆宿中擇有道博達之人敦請為衆開法焉或有請大方尊宿充之極為重任矣夫前堂首座之代主説法者尚乏人日本古有闕之况立僧之名實相符豈易多得耶如名德首座則前堂中擇稍有德者為之不甚難得其人也已敕修清規請立僧首座云其事嚴重不可輕舉如大方西堂名德首座行解素為衆所推服者委曲陳情如有允意特為上堂言此間多衆宜得當人相與建立法幢開大爐鞴山中幸有某人知見高明慧命所寄少刻下座同兩序大衆拜請為衆開室伏望慈悲特埀開允下座云云禪苑清規請立僧云退院尊宿首座藏主如合衆望可舉立僧即住持人升座舉白訖知事大衆詣寮禮請請辭云大衆傾心久思示誨伏望慈悲俯賜開允如不允更不答拜云自救不了豈可為人如允即時還禮云既蒙堅請不敢固辭乃上方丈陳謝禮數隨宜退院尊行謝云本欲依悽貴藏衰拙既蒙見舉不敢奉違答云象駕既臨法輪常轉雖然不合奉煩告以佛法為念退院平交謝云方圖自養豈復為人上命雖違下情多愧答云不合奉煩且以佛法為念諸方名德及參學小師謝云此蒙和尚指揮今受兄弟問訊雖無深證不敢固辭下情無任惶恐感激之至答云既有餘光且以佛法為念並相看陳謝知事次日堂頭庫下特為煎點置食隨意備用清規請立僧云若名德之士受此請住持座上説及即抽身歸寮閉門下座領大衆扣門開門接住持入插香同衆觸禮一拜呈納普説入室牌已下略舉事緣大慧杲和尚為禮侍者斷七普説云老和尚圓悟曰如今方知道我不謾儞我既會了却倒疑著幾箇禪頭乃問老和尚老和尚曰我箇禪如大海相似是儞將得箇大海來傾取去始得若只將得鉢盂來盛得些子去便休是儞器量只如此教我怎奈何能有幾箇得到儞田地舊時只有一箇璟上座與儞一般只是死了過得幾時便舉我立僧後來在雲居首座寮夜間常與兄弟入室老和尚愛來聽人天寶鑑云慈航小參長靈卓禪師命無示立僧法席嚴肅不事堂廚唯安禪以當佳供夜參以當藥石其間衲子有不任者無示告卓曰人以食為先若是則衆將安乎卓慍之曰表率安可為此無示云某不爭堂廚教誰爭耶叢林盛事云應菴初依蔣山圓悟會中與此菴元為友及元住虔之連雲華從虎丘隆會中來初到便令作首座未久令立僧元上堂云西河有師子連雲出虎兕親從猛虎窟中來文彩爪牙悉皆備雖未及驚羣已有食牛志痛念楊岐宗今之如掃地竪起鐵脊梁與先師出氣諸人還識麼兩眼大如環當頭立底是又云谷山旦初參佛性泰和尚泰問前百丈不落因果因甚墮野狐身後百丈不昧因果因甚脫野狐身且曰好與一坑埋却泰徵之語皆不凡未幾令立僧名動一時應菴華禪師天童録有舉傑首座密菴立僧上堂密菴傑禪師徑山録有舉演首座立僧上堂云云下座詣首座告香無準範禪師録有請淵首座立僧上堂又有上元請首座立僧上堂增續傳燈滅翁禮禪師章云時松源唱道饒之薦福師往參焉蒙印可辭源巡禮江淮間祖塔至蔣山浙翁命充立僧首座晉陵尤公焴數入山聽師提唱語悅服虗堂愚和尚録有靈隱立僧普説已下略舉請尊宿立僧事緣應菴華禪師蔣山録有舉西堂正法和尚立僧上堂密菴傑禪師徑山録請前堂首座鶴林印和尚立僧上堂云云下座煩知事頭首大衆詣首座寮扣問松源嶽禪師録舉首座鳳山義和尚立僧上堂云諸佛不出世祖師不西來佛法遍天下談玄口不開既是談玄因甚口不開問取鳳山和尚癡絶沖禪師天童録請蔣山石溪和尚立僧上堂云正法眼破沙盆貴時傾國不換賤時不直分文不作貴不作賤分付石溪老子共結佛祖深冤破菴先禪師録行狀云師既歸蜀初住果之清居梓之望川未幾復振錫而南至夔門時尚書楊公輔素聞師名以臥龍招之留三年出峽至常州華藏遁菴演始延師分座立僧衆皆傾服山菴雜録云破菴和尚退資福趣徑山蒙菴招委以立僧首座職有寶上座者具大知見遇住持首座開堂必橫機捷出迎鋒取勝一日破菴開室寶上座至破菴埀語云乾坤之內宇宙之間中有寶擬議被打出其時寶待破菴舉語盡乃進語既於中有處被打出以謂破菴故摧我歸衣單下脫去火後鄉人收舍利呈破菴破菴拈起云寶上座饒儞有舍利八斛四斗置之一壁還我生前一轉語來擲地惟見膿血聞之於先輩名德首座舊説曰名德非位職之稱前堂首座中擇有名譽德行者為名德首座其事最重故諸頭首中首座為重首座中名德為重名德西堂例知敕修清規請名德首座云住持須預稟露如有允意方丈先請茶兩序光伴即鳴鼓升座更不報衆住持委曲致懇下座與大衆同伸拜請鳴鐘送歸寮中阿含經云烏陀夷妄非舍梨子説法世尊面呵尊者烏陀夷已語尊者阿難曰上尊名德長老比丘為他所詰汝何以故縱而不撿汝愚癡人無有慈心捨背上尊名德長老釋氏要覽云名德名者實也實立而名從之仲尼云所貴名實之名也德者得也所謂內得於己外得於人常無所失合而稱之阿含經呼舍利弗已下為名德比丘皎法師高僧傳序云寡德適時名而不高實德潛光高而不名却來首座敕修清規前堂首座云雖大方尊宿若住持能以禮致之亦請充此職謂之退位為人舊説曰退位為人是為却來首座忠曰却來洞家舉唱向正位為向去自正位來于偏位為却來後堂首座敕修清規云後堂首座位居後板輔贊宗風軌則莊端為衆模範蓋以衆多故分前後齋粥二時過堂及坐禪則後門出入如缺前堂住持別日上堂白衆請轉前板插單唱食其坐禪坐參只衆寮前第三下板即入堂不必鳴首座寮前板餘行事悉與前堂同後堂義見殿堂門前板處義堂信禪師日工集貞治三年甲辰記曰四十歲東林和尚領圓覺寺請余充後板余以年少堅臥不起忠曰義堂以四十歲為猶未老不勝任後板而不就由此可驗昔時厚純亦可痛今日輕躁矣書記古稱書狀今分內外內為書狀侍者外為書記敕修清規云書記即古規之書狀也職掌文翰凡山門榜疏書問祈禱詞語悉屬之蓋古之名宿多奉朝廷徵召及名山大剎凡奉聖旨敕黃住持者即具謝表示寂有遺表或所賜所問俱奉表進而住持專柄大法無事文字取元戎幕府署記室參軍之名於禪林特請書記以職之猶存書狀列於侍者使司方丈私下書問曰內記云而名之著者自黃龍南公始又東山演祖以是職命佛眼遠公欲以名激之使兼通外典助其法海波瀾而先大慧亦嘗充之凡居斯職者宜以三大老為則可也忠按聯燈普燈會元正宗贊等皆云佛眼為知客未見為書記普燈云佛鑑主五祖書記恐今誤為佛眼乎忠曰記室參軍武官也杜氏通典武官大將軍云晉增置司馬一人從事中郎二人主簿記室督各一人事文類聚引續漢百官志云三公大將軍皆有記室主上表章報書記雖列於上宰之庭然本於從事之職禪苑清規云書狀之職主執山門書疏應須字體真楷言語整齊封角如法及識尊卑觸淨僧俗所宜如與官員書信尤不得妄發每年化主書疏預先安排即時應須子細點檢恐封角差賺及漏落施主名銜如寫常住書信即用常住紙筆如寫堂頭書信即用堂頭紙筆如發自己書信不宜侵用輕塵積嶽宜深戒之新到茶湯特為禮不可闕院門大榜齋會疏文並宜精心製撰如法書寫古今書啓疏詞文字應須遍覽以益多聞若語言典重式度如法千里眉目一衆光彩然不得一向事持筆硯輕侮同胞不將佛法為事禪月齊己止號詩僧賈島惠休流離俗官豈出家之本意也備用清規云書記聲名清雅翰墨典嚴製文須合古規發語當為新鑑悚動觀聽輝映林泉若曰佛祖慧命豈在茲乎黃龍南和尚遇雲峰悅禪師指見慈明方決大事謀西江華藏遁菴會下充書記代赴張循王府升座到府門問曰書記若會禪家間自有教授謀即歸寺焚却所蓄文字徑造天童默耕此道凡十年不出僧堂方了大事後住雪竇至天童法道大振任重致遠叢林共知慈覺龜鏡文云為衆僧典翰墨故有書狀又云手不把筆如救頭然所以報書狀也又云書狀不工文字蔑裂非書狀所以飾衆也又云事持筆硯馳騁文章非所以報書狀也無文印寄隆瘦巖書云古無書記見於清規惟書狀書記云者創置於中古諸老非百丈意也第數十年來謬謬相承其氏名者多耳舊説曰書記雖班藏主上然其職掌卑猶如知客雖在侍香上其職却卑已下略出事緣碧巖録云唐宣宗乃大中也武宗即位潛遁在香嚴間和尚會下後剃度為沙彌未受具戒後到鹽官會中請大中作書記林間録云嵩明教初自洞山遊康山託迹開先法席主者以其佳少年鋭於文學命掌書記明教笑曰我豈為汝一杯薑杏湯耶因去之居杭之西湖三十年閉關不妄交僧寶傳黃龍慧南禪師傳云登衡嶽寓止福嚴老宿號賢叉手者大陽明安之嗣命公掌書記北澗文集送夢書記序云古無書記自積翠老南領徒行腳叢林稱之後世嗣具遺響僅得積翠之一體餘則百步半百也普燈録佛鑑勤禪師章云師見五祖演大豁所疑令主翰墨普燈録大慧杲禪師章云師至天寧見圓悟於言下去盡知見悟曰始知吾不汝欺遂命掌翰墨普燈録宏智正覺禪師章云丹霞子淳領大洪師掌𦎗記有比丘尼命書記者焰慧語要有比丘尼廓然聖書記者外史外記書記又名外史或名外記又見內史處皆準朝制周禮云外史掌書外令注王令下畿外掌四方之志注志記也謂若魯之春秋晉之乘楚之樁雪廬稿云江左外史番易釋克新仲銘金玉編序云天曆初文宗皇帝以金陵潛邸為大龍翔寺起笑隱禪師主之而天下學者雲輸川涌今水西新公仲銘晚至以雄才碩學為書記記室書記又名記室大慧年譜云師三十八歲居天寧記室藏主備用清規云藏主掌握金文嚴設几案常備湯茶香燭延迎兄弟看經初入經堂先白堂主同到藏司相看送歸案位對觸禮一拜此古法也今人物駢集藏列東西務在馳名所職何事直須宗乘洞達聖教該通點對出入經卷書填殘缺字畫焙拂補粘盡心成美亦為報佛之恩名實無辜矣大藏教二副分庋東西見殿堂門遂有東藏主西藏主慈覺龜鏡文云為衆僧守護聖教故有藏主又云明窗淨案古教照心所以報藏主也又云几案不嚴喧煩不息非藏主所以待衆也又云慢易金文看尋外典非所以報藏主也藏主本兄弟職舊説曰昔竺仙和尚由書記轉藏主蓋時乏兄弟而藏主本兄弟職故也已下略録事緣傳燈録雲居道齊禪師章云法燈泰欽住上藍院師乃主經藏一日侍立次法燈謂師曰藏主我有一轉西來意話汝作麼生會師對曰不東不西法燈曰有什麼交涉曰道齊只恁麼未審和尚尊意如何法燈曰他家自有兒孫在師於是頓明厥旨續傳燈録虎丘隆禪師章云謁圓悟悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見悟曰頭上安頭師聞脫然契證悟叱曰見箇甚麼師曰竹密不妨流水過悟肯之俾掌藏教有問悟曰隆藏主柔易若此何能為哉悟曰瞌睡虎耳按虎丘録行狀圓悟移道林師從焉遂有見見之問答乃知掌教在道林時也虗堂愚和尚録行狀云時笑翁和尚住靈隱以虎丘舊職命師再尸藏事知藏即藏主也敕修清規云知藏職掌經藏兼通義學凡看經者初入經堂先白堂主同到藏司相看送歸按位對觸禮一拜此古規也今各僧看經多就衆寮而藏殿無設几案者然充其名當盡其職函帙目録常加點對缺者補完蒸潤者焙拭殘斷者粘綴若大衆披閲則藏主置簿照堂司所排經單列名逐函交付看畢照簿交收入藏庶無散失藏司忠曰知藏之人居處言藏司藏主及知藏處引備用敕修故亦呼知藏為藏司又見殿堂門普燈録楚安慧方禪師章云佛鑑指往大別既至職藏司經藏堂主忠曰藏主之外有堂主焉藏主不居藏殿堂主守經常在藏殿也敕修清規云凡看經者初入經堂先白堂主見知藏處知客敕修清規云知客職典賓客凡官員檀越尊宿諸方名德之士相過者香茶迎待隨令行者通報方丈然後引上相見仍照管安下去處如以次人客只就客司相欵或欲詣方丈庫司諸寮相訪令行者引往其旦過寮床帳什物燈油柴炭常令齊整新到須加溫存維那在假則攝其行事僧堂前檢點行益客僧粥飯遇亡僧同侍者把帳暫到死主其喪雪竇在大陽禪月在石霜皆典此職毋忽聯燈會要雪竇重顯禪師章云師在大溈為知客李殿院來問云知客是長老鄉人那師云不敢李云且在這裡不得亂走師云本為行腳李云行腳當為何事師云看亂走底李大笑典客知客又名典客僧寶傳雪竇顯禪師傳云嘗典客大陽與客論趙州宗旨客曰柏樹子因緣覺鐵觜言先師無此語法眼肯之其旨安在顯曰宗門抑揚那有規轍乎時有苦行名韓大伯者貌寒寢侍其旁輒匿笑而去客退顯數之曰我偶客語爾乃敢慢笑笑何事對曰笑知客智眼未正擇法不明顯曰豈有説乎對以偈曰一兔橫身當古路蒼鷹一見便生擒後來獵犬無靈性空向枯樁舊處尋顯陰異之結以為友顯盛年工翰墨作為法句追慕禪月休公破菴先禪師録行狀云見密菴於烏巨衆才滿百然皆一時龍象命師為典客常隨衆入室密菴為傍僧舉不是風動不是幡動師聞豁然大悟從此機語相契一日密菴遇師於衆寮前謂師曰不得問訊不得叉手總不得作伎倆儞試露個消息看師應聲云方丈裏有客密菴呵呵大笑典賓即知客也普燈録佛眼遠禪師章云依太平事祖五祖數載後典賓海會雨夜讀傳燈録至破竈墮因緣忽撥火大悟明極俊禪師録南洲和尚遠忌普説云大日本國有善知識名南洲禪師生平履踐確實工夫精專遊唐七載參知識於南屏山中掌典賓任只一玻𭹳盞子驗盡五湖四海龍象奏凱回來本國見兀菴於洗鉢盂話深領其旨客司忠曰知客之人居處言客司見殿堂門客司處故亦呼知客為客司敕修清規聖節云堂僧堂司給由暫到客司給由知浴敕修清規云知浴凡遇開浴齋前挂開浴牌寒月五日一浴暑天每日淋汙鋪設浴室挂手巾出面盆拖鞋腳布參頭差行者直浴齋罷浴頭覆維那首座住持畢鳴鼓三下浴聖桶內皆著少湯燒香禮拜想請聖浴次第巡廊鳴板三下遍鳴鼓第一通僧衆入浴第二通末頭首入浴第三通行者入浴此時住持方入以屏風遮隔而浴第四通人力入浴監作行者知事居末浴就彈壓之併點視令息竈中火及炭煤水灑乾淨有餘柴搬於遠處云云能妙觸宣明成佛子住則功不浪施矣傳燈録太原孚上座章云參雪峯嘗問師曰見説臨濟有三句是否師曰是曰作麼生是第一句師舉目視之雪峯曰此猶是第二句如何是第一句師叉手而退自此雪峯深器之室中印解師資道成師更不他遊而掌浴室焉一日玄沙上問訊雪峯曰此間有箇老鼠子今在浴室裏玄沙曰待與和尚勘破言訖到浴室遇師打水玄沙曰相看上座師曰已相見了玄沙曰什麼劫中曾相見師曰瞌睡作麼玄沙却入方丈白雪峯曰已勘破了雪峯曰作麼生勘伊玄沙舉前語雪峯曰汝著賊也浴主知浴又曰浴主慈覺龜鏡文云為衆僧浣濯故有浴主水頭又云輕除靜默不昧水因所以報浴主水頭也又云湯水不足寒暖失宜非浴主水頭所以浣衆也又云桶杓作聲用水無節非所以報浴主水頭也浴頭直浴行者曰浴頭敕修清規知浴云齋罷浴頭覆維那首座住持畢鳴鼓三下詳知浴處傳燈録鏡清道怤禪師章云因普請鋤草次浴頭請師浴師不顧如是三請師舉钁作打勢浴頭乃走師召曰來來浴頭回首師曰向後遇作家分明舉似知殿掌佛殿事者曰知殿敕修清規云知殿掌諸殿堂香燈時時拂拭塵埃嚴潔几案或遇風起須息爐內香火及結起幡腳防顧使勿近燈燭施主香錢不得互用佛誕日浴佛煎湯供大衆四齋日開殿門以便往來瞻禮殿主知殿又曰殿主禪苑清規殿主云拂拭塵埃列正供具以時灑掃莊飾香燈參後展席以待衆人瞻禮宗門統要藥山儼禪師章云師因遵布衲作殿主浴佛次師乃問汝秪浴得這箇還浴得那箇麼遵云把將那箇來師休去斷橋倫禪師瑞巖録有請殿主上堂直堂禪苑清規云直堂之法從上間第二座被位為頭次第輪轉終而復始主看守堂中衆僧被位衣鉢早晨長板時大衆集持直堂牌於當日上座前問訊云上座今日直堂交牌訖問訊歸位如食位與被位相遠即須記被位不看之人於何粥飯所貴至時不煩尋討如只在鄰位亦當下床納牌受牌人但口所問訊納之並不下床直堂人常在堂中於上下間照管如有所幹須請熟分兄弟暫時看守並不得趣升堂及延壽堂并外請念誦諸處茶湯如全衆出入除維那指揮鎖堂並不得擅離所守至放參後方可隨意如堂中去失係是放參已前方是直堂人位責直堂以放參為限也欲開函匱或抽衣被並先白直堂人知如不先報即當審問開靜已前放參已後衆中兄弟並不得開函匱及抽取衣被如送入衣被則不妨如有所犯即鄰位及衆人呵止不得規避直堂預遷被位令堂衆動念敕修清規坐禪云堂中有直堂牌刻云輸次直堂周而復始住山押閣主禪苑清規云閣主殿主維那所請詳立班小頭首處塔主臨濟玄禪師録云師到達磨塔頭塔主云云云詳區界門塔頭處主塔侍者傳燈録慧能大師章云塔中有達磨所傳信衣中宗賜摩衲寶鉢方辨塑真道具等主塔侍者尸之侍真忠曰侍祖塔真影者曰侍真即塔主也真者祖師形像也傳燈録盤山寶積章云師將順世告衆曰有人邈得吾真否衆皆將寫得真呈師云云聖僧侍者敕修清規云聖僧侍者不立班在衆後行道堂外粥飯貴有道心齋粥二時上供鳴下堂椎朝夕交點被位中夜剔燈同維那交收亡僧唱衣錢住持遷化把帳頭首秉拂則為燒香或代鳴椎念佛職滿在本山當預侍者名退耕斷橋二老在衆時常充此職以能結衆緣而勵志于道也義堂日工集云府君義滿問衣鉢侍者次是何侍者曰聖僧侍者即秉拂侍者也常在僧堂侍于聖僧者君曰其職為貴為賤曰此職多以道者充之或雖勤舊亦發心自請充者有之寮元舊説曰維那司僧堂寮元司衆寮江西曰禪林寮元立班起於大慧充雲居寮元為衆普説按大慧年譜大慧四十歲四十一歲在雲居首座寮焉寮元亦稱座元見座元處敕修清規列職雜務云寮元掌衆寮之經文什物茶湯柴炭請給供需灑掃浣濯淨髮椸巾之類又大挂搭歸堂云新挂搭人行者引見寮元備用清規云寮元之職隨處毗尼江左叢林盛時大慧挂牌普説班列西序之下者當知所自也清拙清規栴檀林須知云寮元總管衆寮大小事務好經文雜文字語録家私什物等各依目録交割維那眼同見衆兄弟借文書寮暇請暇病暇時須便送還叢林盛事云證西林號老衲長沙人月菴之嗣月菴居道林證為寮元已為兄弟挂牌入室其為人至誠鄭重雖處暗室如臨大賓兄弟見之其容必莊寮長敕修清規寮元云每日粥罷令茶頭行者門外候衆至鳴板三下大衆歸寮寮長分手寮主副寮對面左右位副寮出燒香歸位茶頭喝云不審大衆和南解曰寮長分手者寮長位于寮元分手也寮主舊説曰寮主輔佐寮元者侍者類也敕修清規列職雜務云寮主副寮凡安衆處寮元照戒次自下而上請充之寫定名字預貼牌上十日一替佐寮元辦事旦暮僧衆歸堂巡視經案或有遺忘什物者眼同收拾付還及交點本寮什物提調香湯茶湯毋容外人止宿及寄賣物件猶預定望寮一名使以次挨補副寮若寮主遇滿從維那請交代副寮遇滿從寮元請交代又大挂搭歸堂云參頭領衆行者引至衆寮鳴內板三下寮主相接入門對觸禮一拜清拙清規栴檀林須知云寮主副寮二人日夜不離衆寮坐禪時同寮元佛前坐禪諷經過堂一切隨衆並免專看守上下間及前後門凡諷經過堂時並關閉前後門日夜坐禪時並鎖前後門其後門打給粥飲打炭打水時開餘時常鎖諸寮大小人工不許入凡取點茶之湯只沙彌喝食入取茶盞及臺并圓盤盆湯瓶係副寺管領日間寮主看管上間副寮看管下間凡有失物分上下間倍償如撿點不在寮令起單放參後寮行者鳴出寮版一聲衆隨意鎖匱先出行者掩大門一扇二聲衆盡出三聲門雙閉昏鐘鳴下鎖鑰匙寮元收寮內夜間不許通僧來往定鐘時寮主副寮及行者執燭三人同巡視案匱或忘鎖者與鎖之或忘收物者與收起明日送還之十日管領遞相照應義也五更鐘鳴行者裝香爐火點燈請鑰匙門開一扇住持知事行香此時多是賊入寮主副寮輪番人各一日看守粥時全閉亦恐有賊此粥時外寮莫來燒香粥罷全開衆入問訊畢耆舊隨意燒香慈覺龜鏡文云為衆僧守護衣鉢故有寮主又云一瓶一鉢處衆如山所以報寮主又云打疊不勤守護不謹非寮主所以居衆也又云以己方人慢藏誨盜非所以報寮主也知寮知寮者即寮主也諸祖偈頌慈受禪師示衆針規云放參開籠須白知寮日用軌範云粥前齋前放參後不得開函匱如有急切白主事人寮中白寮主僧堂白聖僧侍者解曰此寮主者慈受所謂知寮也副寮備用清規云副寮之職其事繁重寮中什物逐一交割分明職務一旬關攝諸事粥前參後不許登閣有急切幹者須白寮主書日書名打板上閣庶免後患時時提點湯瓶夜看火燭賊盜掃地拭桉換水添香勿容外人止宿寄賣物件子細收藏衣竿尉斗洗衣桶衆人所用之物各收元處善用其心獲勝妙功德也又見于寮主處望寮舊説曰望寮轉副寮副寮轉寮主蓋自臘少者次第請向上忠曰副寮闕則可轉上補之故云望也備用清規副寮下有望寮云望寮之職先輩深有意焉受職到寮預知寮中細大副寮出盞點茶相與收拾放參藥石行醋行鹽結緣邊事也又見寮主處洞腳舊説曰住侍巡寮住持倚各各寮椅子時寮主與寮之洞腳皆進插香古解者為洞腳未詳忠曰蓋各寮屬寮主之衆也未詳字義日工集云守亨書記求預會下乃容石屏洞腳又云步往石屏語諸同腳曰屋子破損在在皆是吾無以為憂今經像墨寶無恙幸矣忠曰作同未知孰是禪客舊説曰宋國圓悟大慧之後禪剎例置禪客僧大剎二人小剎一人擇得言句三昧者蓋官人入寺屢請升座説法及時禪客出衆問答名之曰問禪今叢林差禪客此其遺風也或禪客中有得法者則讓其主位云晦堂祖心寶覺禪師語録長沙安撫謝通議請就北禪升座云僧問昔日李翱登藥嶠雲在青天水在瓶今日通議臨寶座乞師一句定宗乘師曰潭上無風浪自平僧曰還有承當處也無師曰爾作麼生承當僧曰金烏迥出青霄外玉兔輝時四海清師曰不如退後看僧曰大衆證明學人禮謝忠曰此禪客出衆作頌又有入衆語大似今時禪客模樣而寶覺時已有之此可以證舊説禪客事也敕修清規上堂云古之學者蓋為決疑故有問答初不滯於語言近日號名禪客多昧因果增長惡習以為戲劇譁然喧笑甚失觀瞻况舉揚宗乘端祝聖壽忠曰夫問話者不憑佛心宗淵源亂以口頭聲色粉飾語句或戲謔模樣欲動視聽或坐具擬棒打地云效臨濟打爺弄法之罪因莫大焉無間之獄果難逃矣然自撥無因果增長此惡弊可不痛哉或有惡之都禁絶問話此亦過甚非令法久住之計只當止火災何廢爨燭之用世之師法須委悉又見參請門問話處龐居士録云居士因辭藥山山命十禪客相送至門首士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處士遂與一掌全曰也不得草草士曰恁麼稱禪客閻羅老子未放儞在全曰居士作麼生士又掌曰眼見如盲口説如啞江湖風月集復巖己和尚贈禪客頌云倒翻一問沒來由拶得通身白汗流梅雨打窗聲瀝瀝重添公案上心頭行者亦為禪客虗堂愚和尚録贈禪客智仁偈云法戰場中樹勝旗話頭何似問頭危古人減竈添兵處切忌交鋒蹉過伊又云問話行者智仁炷香請語以此贈之景定癸亥至節虗堂老僧書于雪竇西菴放禪客忠曰秉拂預定禪客外放出問答名放禪客敕修清規秉拂云秉拂人令茶頭行者請聖僧侍者禪客燒香獻茶畢云今晚秉拂輒煩侍者燒香禪客問話舊解曰見此語預差定禪客也唐土則兄弟名勝秉拂定禪客外自他寺他山來者忽放出於衆前問答稱放禪客日本亦如東福虎關秉拂時乾峯俄出衆問答成叢林絶唱參頭有行者參頭見下有四來參頭今是四來參頭也即告香普説等新歸堂衆中推舊參能諳禮樂人一員為參頭焉敕修清規告香云每夏前告香新歸堂者推參頭一人又云若大衆均預告香則首座為參頭又遊方參請云今時遊方挂搭初到旦過推熟於叢林能事者一人為參頭領衆至客司具威儀列門首右白云暫到相看云云大慧武庫云慈明琅瑘大愚等數人辭汾陽相讓不肯為參頭汾陽云此行不可以戒臘推聽吾一頌天無頭吉州城畔展戈矛將軍匹馬林下過圓州城裏閙啾啾慈明出班云楚圓何人敢當此記莂遂領衆拜辭廣燈録羅漢院繼宗禪師章云師行腳時與數僧參一老宿問五人新到阿那箇是參頭師云不怕三冬雪惟憂午夜風宿云平地上喫交作什麼師云言猶在耳宿云且坐喫茶師云喫茶即得聯燈會要雪竇顯禪師章云一日六人新到相看師問參頭夫為上將須是七事隨身兩刃交鋒作麼生云久響和尚有此一著師云一著放過還我草鞋錢來僧便喝師便打僧約住棒與師一掌師云未到翠峯時與儞三十棒了也僧無語師云且過一邊著却問第二僧副將作麼生僧茫然師云一狀領過喫茶了師把住參頭云適來公案這裏只恁麼堂中作麼生舉僧擬議師打一坐具便推出小參頭敕修清規謝挂搭云參頭當具小圖習儀三人一引每引一人為小參頭須詳記詞語進退折旋合度免致臨時參差副參忠曰副二參頭者此云副參副參亦有兩曰行者副參見下曰四來副參今是四來副參也敕修清規告香云住持就座副參遞大香一片與參頭同衆問訊望參舊説曰日本南禪寺定望參名參頭闕則補其職猶望寮之例忠曰望參當補副參之闕矣開堂請主雲峯悅禪師録云保壽開堂三聖為請主才升座聖推出一僧保壽便打聖云似恁麼為人瞎却鎮州一城人眼去在壽擲下柱杖便歸方丈聯燈無請主字又見叢軌門開堂處三綱有數説一僧史略為寺主上座維那二名義集為上座維那典座又舊説為寺主知事維那僧史略云寺之設也三綱立焉若網罟之巨綱提之則正故曰也梵語摩摩帝悉替那羯磨那陀華言言寺主上座悅衆也求法高僧傳云那爛陀寺但以最老上座而為尊主不論其德諸有門鑰每宵封印將付上座更無別置寺主維那但造寺之人名為寺主梵云毗訶羅莎弭若作番直典掌寺門及和僧白事者名毗訶羅波羅譯為護寺若鳴犍稚及監食者名為羯磨陀那譯為授事言維那者略也衆僧有事集衆平章令其護寺巡行告白一一人前皆須合掌各伸其事若一人不許則事不得成全無衆前打槌秉白之法若見不許以理喻之未有挾強便加壓伏翻譯名義集云音義指歸云僧如網假有德之人為綱繩也隋智琳潤州刺史李海遊命琳為斷事綱維爾後寺立三綱上座維那典座也山門三大禪師都寺維那燒香侍者為山門三大禪師東漸清規秉拂禮儀云山門三位禪師都寺維那侍香同往首座前問訊首座受請主事楊億古清規序云長老上堂升座主事徒衆鴈立側聆釋氏要覽云主事四員一監寺二維那三典座四直歲其義注于各職下又云上之四人皆不用本處徒弟並於十方海衆內僉選道心身幹知因果者打鍵椎白衆請之用無常人其或心力勞倦告衆歸堂則別請能者也傳燈録太原孚上座章云初上雪峯參雪峯禮拜訖立于座右雪峯才顧視師便下看主事又漸源興禪師章云師在道吾處為典座一日隨道吾往檀越家弔喪師以手拊棺曰生耶死耶道吾曰生也不道死也不道師曰為什麼不道道吾曰不道不道弔畢同回途次師曰和尚今日須與仲興道儻更不道即打去也道吾曰打即任打生也不道死也不道師遂打道吾數拳道吾歸院令師且去少間主事知了打汝師乃禮辭云云知事東序此言知事乃主事也敕修清規兩序章列東序知事云都監寺維那副寺典座直歲是也忠曰知事之知猶如知州之知也知寮知浴知殿等例解品字箋云知主也易乾知大始又如今之知府州縣知字皆作主字解明極俊禪師云以廉於己世法通者歸東序謂之知事詳于兩班處僧史略云按西域知事僧總曰羯磨陀那譯為知事亦曰悅衆謂知其事悅其衆也稽其佛世飲光統衆於靈鷲身子涖事於竹林及沓婆摩羅年甫十六已證應真其後念身不牢固請為僧知事寶積經入胎藏會曰世尊告阿難陀曰汝今宜去告彼難陀令作知事人即便往報世尊令爾作知事人問曰云何名為知事人欲作何事答曰可於寺中檢校衆事問曰如何應作答言具壽凡知事者若諸苾芻出乞食時應可灑掃寺中田地取新牛糞次第淨塗作意防守勿令失落有平章事當為白僧若有香華應行與衆夜閉門戶至曉當開大小行處常須洗拭若於寺中有損壞處即應修補永平清規引之大方等日藏經云頻婆娑羅王言世尊有何等人堪為知事守護僧物供養供給如法比丘佛言大王有二種人堪持僧事守護僧物何者為二一者具八解脫阿羅漢人二者須陀洹等三果學人此二種人堪知僧事供養衆僧諸餘比丘或戒不具足心不平等不令是人為知僧事寶積經寶梁聚會營事比丘品云摩訶迦葉白佛言世尊云何比丘能營衆事佛告迦葉我聽二種比丘得營衆事何等二一者能淨持戒二者畏於後世喻如金剛復有二種何等二一者識知業報二者有諸慙愧及以悔心復有二種何等二一者阿羅漢二者能修八背捨者迦葉如是二種比丘我聽營事自無瘡疣何以故迦葉護他人意此事難故迦葉於佛法中種種出家種種性種種心種種解脫種種斷結或有阿蘭若或有乞食或有樂住山林或有樂近聚落清淨持戒或有能離四枙或有勤修多聞或有辨説諸法或有善持戒律或有善持毗尼儀式或有遊諸城邑聚落為人説法有如是等諸比丘僧營事比丘善取如是諸人心相乃至迦葉若營事比丘數得僧物慳惜藏舉或非時與僧或復難與或困苦與或少與或不與或有與者或不與者營事比丘以此不善根故墮穢惡餓鬼常食糞丸此人命終當生是中爾時更有餓鬼以食示之而復不與此鬼爾時悕望欲得諦視此食目不曾眴受飢渴苦於百千歲中常不得食或時得食變為糞屎或作膿血何以故有持戒人人所敬禮僧所有物以自在故而難與之迦葉若營事比丘以常住僧物若招提僧物及以佛物輒自雜用得大苦報若受一劫若過一劫何以故以侵三寶物故迦葉若營事比丘聞如是罪知如是罪而故生瞋心於持戒者我今説此諸佛世尊所不能治迦葉是故營事比丘聞如是非法罪已應當善護身口意業自護亦護他迦葉營事比丘寧自噉身肉終不雜用三寶之物作衣鉢飲食爾時摩訶迦葉白佛言世尊未曾有也如來自以慈心説如是法為無慙愧者説無慙愧法有慙愧者説慙愧法行事鈔隨戒釋相篇盜戒云然盜戒相隱極難分了若廣張體貌徒盈卷軸至於披檢取悟必繁故略列犯緣粗知梗概意存省事知足憂心念道者緣境既局少應清潔若多衆務而欲高升者必羅盜網終無有出何者由心懷勝劣倒想未傾初果無學方可營事有心懷道者細讀附事深思乃知人天寶鑑云石窗恭禪師久依天童宏智禪師細大職務靡不歷試一日歸省母母曰汝行腳本為了生死度父母而長為人主事苟不明因果將纍我於地下恭曰某於常住毫髮不欺雖一炬之燈亦分彼此之用無足慮我母曰然過水得不腳濕忠曰世尊説須陀洹阿羅漢而方可知事蓋其濫盜犯也恭師之母懼果因如此深得佛意嗚呼賢哉今之知事若秉意不低細則為不及一婦人之智焉執事即知事也虗堂愚和尚報恩録曰謝執事上堂一跳一躑師子嚬呻一新一舊和氣如春報恩尺不如寸贏得癡坐何也家裏有人周禮天宮大宰曰前期十日帥執事而卜日遂戒注執事宗伯大卜之屬都文南禪清規都寺上有都文相國寺亦古有都文而班都寺上心華桂長老云備用清規被鉢位圖都寺下監寺上有都文夢巖應和尚録安持國佛事云慧日山東福禪寺都文比丘某云云希叟曇禪師法華録謝坤都文并客西堂上堂云電捲風旋搖乾蕩坤一伸怒臂相助扶顛聽古洞生薑倍增高價與楊岐破屋重整頽磚法華贏得日高眠蘿窗清夢覺引客步松門春晝永鳥聲喧拍禪床一下我行荒草裡汝又入深村忠曰希叟用寶生薑會監寺事都文職掌可粗知之都聞忠曰蓋都文也文聞音近或作聞耳東福清規云東序轉位自都聞寮噓達又云都聞轉位則令都寺退而都聞立班其位新住持入院則都聞立都寺之班鏡堂圓禪師録示法平都聞法語云平都聞不憚鯨波之險隨侍建長和尚而來此同住一夏忠曰建長蓋隆蘭溪也法平自中華侍來乃知都聞之稱尚矣清拙澄禪師録有都聞惠磬頌靈山隱禪師嗣雪岩欽業識團有都聞起龕佛事義堂日工集云天龍都聞能公云云又云趣相國寺新都聞局奉接府君之伴也府君義滿公又云中季藏主送公帖與南禪都聞都聞即持公帖來余乃受請都寺忠曰位在監寺上都總諸監寺故曰都寺又曰都總舊説曰或謂知事卑於頭首殊不知都寺是大蒙堂位居後堂上凡三歷都寺則歸單寮僧史略云夫言寺者嗣也治事者相嗣續於其內也既用官司之名無虧佛事之業故子續其父資踰於師此相嗣而接蹤當克勤而成事也永平清規云古時監寺而已近日稱都寺即監寺也稱副寺亦監寺也近代寺院繁務仍請兩三監寺也備用清規云都監寺山門重任貴在得人百丈監院幹辦公私今都寺是也大剎多職書記方任荷負貴得翰墨清新黼黻宗社朝夕勤於香火歲計考於簿書參辭官員賀謝檀越出納收支準備供衆齋粥常運勝心待物不可輕易行僕有犯量過行移罪亡重科誠告聽恕莊庫職務擇舉公心尊賢容衆和氣靄然供衆缺乏竭力運謀修造事務盡心成美同事才德推揚行止涉私密諭或大過纍及山門密覆住持毋聞清衆方便處置萬不失一也二時撥忙趣堂他營語及同事公私纖粟分明種種愛護常住如楊岐之佐慈明石窗之輔宏智異日遇緣即宗人天模範盛大光明未可量也虛堂愚和尚徑山後録謝知事上堂云楊岐挾紙衾出入庫司三十年力輔慈明用都寺不點常住油買大碗造食供養大衆用都寺婺州雙林德用禪師也嗣高菴悟普燈録載都監寺忠曰即都寺也都監寺略言都寺而已或以為雙舉都寺監寺二職者非也敕修清規都監寺云古規惟設監院後因寺廣衆多添都寺以總庶務早暮勤事香火應接官員施主會計簿書出納錢穀常令歲計有餘尊主愛衆凡事必會議稟住持方行訓誨行僕不妄鞭捶設當懲戒擯罰亦須稟議量情示警毋縱威暴激變起訟差設莊庫職務必須公平毋用私黨致怨上下昔叢林盛時多請西堂首座書記以充此職而都監寺亦充首座書記否則必臘高歷事廉能公謹素為衆服者充之既無取於公而道福殊勝上下美留雖連年不易或數請再充又何傷焉故所在單寮勤舊不滿五六人副寺以下非歷三次不歸前資監寺非三次不歸蒙堂都寺非三次不得居單寮再請出充者公界封鑰元房以避嫌疑齋粥二時必趣堂則行僕行益自然整肅如楊岐之輔慈明石窗之輔宏智可為法則又聖節黃榜式云都監寺臣僧某言舊説曰天竺唯有監寺耳如都寺漢土始置故當監寺為本然都寺却班監寺上忠曰舊説云天竺無都寺蓋依要覽主事四員之説前主事處引而有此言又云漢土始置都寺者依敕修清規添都寺之語而有此言但如曰都寺漢土後置故可在監寺下則拘事昧義夫事務繁故增監寺之員在數員上位者可總下位總之者名都寺其名雖後有豈都總者而可得班所屬之下耶睦州陳尊宿録云睦州僧正并諸大德衆請師上堂師問僧正僧正應諾師云監寺𡁠正云不在師云都監闍梨𡁠正云不在師云上座𡁠正云不在師云三段不同今當第一向下文長赴在來日不詞謹退便起諸大德罔措都總都總即都寺也敕修清規謝挂搭云座元都總諸位禪師都管都寺亦名都管清拙澄禪師南禪録請都管上堂云有荷衆之力復有容衆之量有憂衆之心復有供衆之念能具此力量更存此心念方可總衆僧之庶務廣梵剎之宏規佛法與世法無殊公事與己事一體護惜常住如護眼睛如楊岐之輔慈明三腳驢遼天聲價石窗之佐宏智漏燈盞動地光輝須是大丈夫兒方顯大丈夫事還知麼瑞龍此日宗風盛栗棘金圈大播揚大休念禪師録月巖頌軸跋云建長蘭溪和尚神秀照都管毗贊叢席歷試諸難觀其處己清廉虗明自照見其履踐卓絶高而不危因命曰月巖非其父不知其子非其子不承其父云云希叟曇禪師開善録謝首座藏主秉拂都管冬齋上堂云兜率天宮初説夢修多羅藏又談空一人人飽純陀味不與尋常至節同娟娟蘿月瑟瑟松風四壁生涯貧徹骨敵君王富樂無窮義堂信和尚録玖都管預修拈香曰乾坤之內宇宙之間中有一寶祕在形山乃至今有大功德主等持禪寺現職都管寶山玖公憑此寶力輔我山門法輪食輪左轉右轉大屋小屋東橕西橕云云高峯妙禪師録有明山都管下火朝廷有都管職元周密著天基聖節排當樂次云都管周朝清陸恩顯二人名市豪亦有都管水滸傳云盧俊義管家私的主管姓李名固盧俊義見他勤謹直擡舉他做了都管一應裏外家私都在他身上手下管著四五十箇行財管幹一家內都稱他做李都管庫司敕修清規國忌云庫司報堂司令行者覆住持兩序解者曰庫司都寺也監寺釋氏要覽云會要云監者總領之稱所以不稱寺院主者蓋推尊長老又見主事處舊唐書劉子玄傳云夫言監者蓋總領之義耳祖庭事苑云僧史曰知事三綱者若網罟之巨繩提之則百目正矣梵語摩摩帝此云寺主即今之監寺也詳其寺主起於東漢白馬也寺既爰處人必主之于時雖無寺主之名而有知事之者至東晉以來此職方盛今吾禪門有內外知事以監寺為首者蓋相沿襲而然也大集等經云僧物難掌佛法無主我聽二種人掌三寶物一阿羅漢二須陀洹所以爾者諸餘比丘皆不具足心不平等不令是人為知事也更復二種一能持淨戒識知業報者二畏後世罪有諸慚愧者今吾禪門必擇心通法道而不著諸有身忘利養者以掌僧務此先德之遺意也普燈録楊岐會禪師章云慈明自南源徙道吾石霜師皆佐之總院事依之雖久然未有省發每咨參明曰庫司事繁且去他日又問明語如前或謂曰監寺異時兒孫遍天下去何用忙為禪林寶訓云雪堂曰高菴住雲居普雲圓為首座一村僧為書記白楊順為藏主通烏頭為知客賢真牧為維那華姪為副寺用姪為監寺皆是有德業者用姪尋常廉約不點常住油華姪因戲之曰異時做長老須是鼻孔端正始得豈可以此為得耶用姪不對用姪處己雖儉與人甚豐接納四來略無倦色高菴一日見之曰監寺用心固難得更須照管常住勿令疏失用姪曰在某失為小過在和尚尊賢待士海納山容不問細微誠為大德高菴笑而已故叢林有用大碗之稱大碗義見都寺處監院監寺古稱監院禪苑清規云監院一職總領院門諸事如官中應副及參辭謝賀僧集行香相看施主吉凶慶弔借貸往還院門歲計錢穀有無支收出入準備逐年受用齋料米麥等及時收買并造醬醋須依時節及打油變磨等亦當經心衆僧齋粥常運勝心管待四來不宜輕易如冬齋年齋解夏齋結夏齋炙茄會端午七夕重九開爐閉爐臘八二月半是如上齋會若監院有力自合營辨如力所不及即請人勾當如院門小事及尋常事例即一面處置如事體稍大及體面生創即知事頭首同共商量然後稟住持人行之自住持人以下如有不合規矩不順人情大小諸事並合宛轉開陳不得緘默不言亦不得言語暴敕修清規云古規惟設監院後因寺廣衆多添都寺以總庶務詳于都寺處又兩序進退云知事古規只列監院維那典座直歲庫頭五員而已見單寮處黃龍南禪師書尺與讓監院書云固宜乘時適變畢力毗贊不可須臾有倦色異日他時因緣會遇皆歸于己先佛所説豈可妄言慈覺龜鏡文云荷負衆僧故有監院又云外遵法令內守規繩所以報監院也又云容衆之量不寬愛衆之心不厚非監院所以護衆也又云意輕王法不顧叢林非所以報監院也碧巖録有則監院丙丁童子來求火因緣院主監寺古稱院主後為尊住持改稱監寺見監寺處又名寺主見監寺處又見三綱馬祖道一禪師録云師示疾院主問和尚近日尊候如何師曰日面佛月面佛臨濟録云師問院主什麼處來主云州中糶黃米去來云云廣燈録興化獎禪師章云師後到大覺為院主一日大覺喚院主我聞儞道向南方行腳一匝拄杖不曾撥著一箇會佛法底人儞具箇什麼眼便漝麼道師便喝大覺拈棒師擬議大覺便打師又喝覺又打兩家便休云云明極俊和尚録佛事云瑞雲堂上暘谷院主云云宋高僧傳曇一傳云詔置開元寺長史張楚舉為寺主院宰院主又名院宰傳燈録魏府大覺禪師章云興化存獎禪師為院宰主首監寺亦曰主首正宗贊雲居膺禪師傳云師示寂主首白師誰可繼席曰堂中簡時簡密受師印人無知者以臘高為第一座衆不曉師意謂令揀擇欲命第二座住持且備禮先請簡簡不讓即自持道具入方丈衆不愜簡察其情乃棄去又南堂靜禪師傳云師住大隋舊有龍居方丈寢室纍代不敢近師至欲臥主首白師不顧竟去臥見龍臥床上師以手推曰老畜生留老僧半榻就臥及醒龍不見從此不來矣權管忠曰蓋監寺也執一寺權柄而管領事務也愚中及和尚丱餘集云嘗見江南叢林不論寺院大小不問住持有無必立權管一位而待之副寺篇海類編云副音富二也佐也敕修清規云副寺古規曰庫頭今諸寺稱匱頭北方稱財帛其實皆此一職蓋副二都監寺分勞也掌常住金穀錢帛米麥出入隨時上曆收管支用令庫子每日具收支若干僉定飛單呈方丈謂之日單或十日一次結算謂之旬單一月一結一年通結有無見管謂之日黃總簿外有米麵五味各簿皆當考算凡常住財物雖毫末並是十方衆僧有分如非寺門外護官員檀越賓客迎送慶弔合行人事並不可假名支破侵漁其上下庫子須擇有心力能書算守己廉謹者為之病僧合用供給之物即時應付如倉庫疏漏雀鼠侵耗米麥蒸潤一切物色頓放守護有不如法者並須及時照管處置備用清規云副寺之職職小任重衆人命脈所繫米麵當須細潔粥飯貴得精豐醬黃豆豉合辦及時鹽醋薑油滿足供衆缺乏預謀上首尅落常慎下流無徇私情勿圖己計推情保惜如護眼睛先德分司列任本為衆人今昧原深加刻削飯薄粥臭醋淡齏非惟任責者之無知實在住持之有過上副寺下副寺敕修清規告香圖東序凡有副寺三人維那上一人維那下二人圖見東序西序處敕修清規兩序交代茶云如維那位居東序請茶時肩下副寺一人趣忠曰肩下副寺所謂下副寺也既言肩下副寺須知有肩上副寺乃如告香圖所記舊説曰觀肩下副寺一人趣語副寺本是維那肩下也或有副寺肩上於維那者即是監寺退職後為却來副寺者位在維那之上矣義堂日工集云夢巖默菴與中巖此山會於等持夢巖問中巖以日用規中浴室之儀上下知事中巖一一分曉指陳蓋江南叢林常儀不必疑問也忠曰上下知事蓋上副寺下副寺也庫頭副寺之舊稱也見副寺處幻住清規云古叢林無副寺之名惟稱庫頭掌一切支收出內即知庫之職也禪苑清規云庫頭之職主執常住錢穀出入歲計之事所得錢物即時上曆收管支破分明齋料米麥常知多少有無及時舉覺收買十日一次計曆先同知事簽押一月一次通計住持人已下同簽金銀之物不宜謾藏見錢常知數目不得衷私借貸與人如主人并同事非理支用即須堅執不得順情常住之財一毫已上並是十方衆僧有分之物豈可私心專輒自用如非院門供給檀越及有力護法官員並不宜將常住之物自行人事如有借貸米麥錢物除主人及同事自辨衣鉢外常住之物不可妄動當庫行者須有心力解計算守己清廉言行真的衆所推伏方可委付如山野寺院城市稍遠衆僧所用及藥蜜茶紙之類亦宜準備僧行回買常存道念不可憚煩病僧合用供給之物不得闕少如遇打給即時應副如倉廩踈漏雀鼠侵耗米麥蒸潤常住物色頓放守護若不如法並係庫頭照管白同事人處置慈覺龜鏡文云為衆僧出納故有庫頭又云常住之物一毫無犯所以報庫頭也又云畜積常住減剋衆僧非庫頭所以贍衆也又云多貪利養不恤常住非所以報庫頭也傳燈録溈山祐禪師章庫頭擊木魚見火頭處知庫庫頭又名知庫見庫頭處虗堂愚和尚録質知庫鎖龕語云無矯偽多質直豎百橫千對本收息質知庫日暮也收取鑰匙匱頭副寺亦曰匱頭見副寺處貞和集雪巖欽和尚賀梅溪副寺頌云匱頭一面日黃簿列祖玄關無少差算得透時參得透油鹽醬醋與薑茶財帛中華北方叢林稱副寺為財帛見副寺處事文類聚云戶部尚書漢置尚書郎四人其一人主財帛委輸掌財忠曰蓋財帛也希叟曇禪師開善録謝新舊知客掌財維那上堂云茶迎過客無新舊稱定須彌有重輕活弄手頭雖得妙何如聞爆桶箍聲又份掌財秉炬曾充直歲云渤塗直歲寺基掌財網市利不求龍斷開荒田先務燒畬無星稱較錙銖絲毫不忒破钁頭埋佛祖深淺無差掀翻死貨別立生涯石火電光機路活涅槃生死等空花忠曰寺基蓋鎡基字也元叟端禪師徑山録為泳掌財下火云稱盤上分斤定兩是汝算筒邊橫千豎百是汝且道生死海中涵泳遊戲是汝不是汝云云典座僧史略云典座者謂典主牀座九事舉座一色以攝之乃通典雜事也現刊僧史略九作凡非釋氏要覽云典座僧祇律云典次付床座此掌僧九事之一也又見主事處祖庭事苑云按僧史謂典主牀座九事今舉一色以攝之乃通典雜事也今禪門相沿以立此名耳僧祇律云佛住舍衛城有比丘名陀驃摩羅子衆僧拜典知九事九事者典次付牀坐典次差請會典次分房典次分衣服典次分華香典次分果蓏典次知暖水人典次分雜餅食典知隨意與堪事人是名僧拜典知九事付牀坐時是長老右手小指出燈明隨品次付廣説忠曰次者次第也次第付與次第差擇等也四分律云佛在羅閲城耆闍崛山中爾時尊者沓婆摩羅子比丘衆中差令典衆僧牀座臥具及分飲食廣説禪苑清規云典座之職主大衆齋粥須運道心隨時改變令大衆受用安樂亦不得枉費常住齋料及點檢廚中不得亂有拋撒選揀局次行者能者當之行令不得太嚴嚴則擾衆不宜太緩緩則失職造食之時須親自照管自然精潔如打物料并齋粥味數並預先與庫司知事商量如醬醋淹藏收菜之類並是典座專管不得失時常切提舉火燭依時俵散同利務要均平如合係監院直歲庫主所管同共商量即可並不須侵權亂職廚中竈釜什物如故舊損壞則逐旋抽換添補云云備用清規云典座之職無真心供養者不宜徇關節妄請之當與前堂首座謀議從衆擢用萬不失一也當廣種蔬菜力除草穢四時合種雜物勤看老圃須知園丁當以私惠優其寒暑調和羹菜五味須全油醬椒料常住有限須出己囊助辦堂供一人辦心諸天辦供多見所在假名職圖監收園地半占栽麻苧以為園丁補洗遞代相承習以成弊廚中不許棄賤諸物執役選用苦行老成若設大齋食次與上首知事商議過多減除皆不可也行者不律誨而至再不受訓者責之罰之同利均俵粥飯上桶焚香望僧堂設拜常把衆人頂在頭上自獲福利不汝欺也敕修清規云典座職掌大衆齋粥一切供養務在精潔物料調和檢束局務護惜常住不得暴殄訓衆行者循守規矩行益普請不得怠慢撫恤園夫栽種及時均俵同利二時就廚下粥飯食不異衆粥飯上桶先望僧堂焚香設拜然後發過堂慈覺龜鏡文云供養衆僧故有典座又云為成道業故應受此食所以報典座也又云六味不精三德不給非典座所以奉衆也又云貪婪美膳毀訾餐非所以報典座也溈山祐禪師在百丈充典座見第一座處漸源興禪師在道吾為典座見主事處五燈會元芙蓉楷禪師章云謁投子義青於海會後作典座子曰廚務勾當不易師曰不敢子曰煮粥邪蒸飯邪師曰人工淘米著火行者煮粥蒸飯子曰汝作甚麼師曰和尚慈悲放他間去佛果擊節録云雪峯擔笊籬木杓行腳到處作典座詳雜行門把針處物初賸語諸公贈淨慈印典座語跋云大溈雪峯皆典香積而策勳者也必躬必親隨變發機乃自作活計非勤勞之謂至踢倒淨瓶鼇山半夜而其活計一空印也職此斡無為有調衆口若一雖午盂九文之積亦以資之噫亦勤且勞矣為而忘其勤隨變而發其機審是則太虛為口萬象為舌讚之不及又豈在諸衲謗沈無香哉提點忠曰掌常住金穀者南堂欲禪師靈巖録請提點上堂云楊岐栗棘蓬東山鐵餕餡多處添些子點即不到少處減些子到即不點萬機俱趣八面玲瓏一句全提風行草偃擊拂子龍得水時添意氣虎逢山色長威獰山菴雜録云徑山惠洲提點虎巖徒弟頗聰明有幹蠱才掌常住衆務三十餘年一切金穀恣其糜費或以果報諭之乃答云滿載戴角來洲只戴得一雙至正初高納麟領行宣政院事其屬淨珂具狀訴之結罪杖斷歸俗既而潛於化城院得風痺疾攣拳如蝟兩手握拳承其兩頰兩腳反承其尻看病人欲伸之痛不可忍日夜但聞霍霍之聲如是者三年始氣絶洲平昔以心任事輕視因果乃言滿載戴角來只戴得一雙余謂三途報中歲月長久一雙去一雙來至無量劫戴此角何止一雙而已凡司常住金穀人宜以洲自鑒又云洪武八年秋余訪同門友報復元于象山智門寺寺有提點彝正堂者四十餘年管領常住出納廉能謀斷有方撫衆和易歷六代住持終始如一是年七月二十四夜夢兩童子並立榻前問之何幹抵此答曰請提點考算單帳答云我無單帳可算覺而再睡得夢如前次日到方丈説其夢稟云夜得此夢恐今歲庫司知事人懶慢常住日黃簿未成和尚宜促之觀其言貌絶無愧赧態少選報彝歸房跌仆地上如熟醉至夜半始蘇急處分後事然後瞑目彝於智門可謂有功矣臨終尚爾諸方執事者遇常住物如鷹拏燕趠不以罪福為事聞此自須改行宋史職官志云提點刑獄公事掌察所部之獄訟而平其曲直所至審問囚徒詳覆案牘凡禁繫淹延而不決盜竊逋竄而不獲皆劾以聞事物紀原云宋朝會要曰景德三年三月敕置開封府界提點司即置提點之官呂夷簡三朝寶訓曰真宗謂近臣曰諸道刑獄皆遣官提振惟京師無之去夏開封府訊進士蹇符暴於日中裂其背而鞠之無狀炎暑之際未見情枉罹虎毒令置司命京師刑獄處悉糾之忠曰提點本朝廷官職名而僧寺擬立也提點者提振其壅滯也按山菴所言庫司知事外有提點免僧義堂日工集云鳴板坐禪議曰自今輪番聖僧侍者四時裝香鳴板且為衆説勤行精進則成就道業懶惰懈怠則滅亡佛法輪番衆每三日一更自外典座免僧直歲三人免坐堂各守其職也納所虎關鍊禪師曰當時叢林之司言納所者日本樣也忠曰天如則禪師録師子林菩提正宗寺記云崇佛之祠止僧之舍延賓之館香積之廚出納之所悉如叢林規制止此依之納所稱非為日本樣也火客火客執爨者也敕修清規尊宿遷化祭次莊甲之次有火客火佃忠曰火客亦云火佃備用清規尊宿遷化祭次莊甲之次有火佃火伴忠曰司竈火之伴類也世作火番謬矣虛堂愚禪師淨慈後録謝執事上堂云火伴得人宋龔熙正續釋常談云古木蘭詞云出門見火伴十務禪門規式云置十務謂之寮舍每用首領一人管多人營事主飯者目為飯頭主菜者目為菜頭等見殿堂門寮舍處忠曰十務未稽一一目傳燈鈔云一山曰十件事務令人主領也今兩班職也忠曰見禪門規式所注以飯頭菜頭等為十務則必當但東班中分此職然言今兩班也恐不是辦事常菴崇和尚曰辨事言小寮等忠曰辨事無舊解所的指余謂山門列職雜務人總名辨事也敕修清規列職雜務所謂寮元寮主副寮延壽堂主淨頭化主園主磨主水頭炭頭莊主監收等此一行人不可稱勤舊蒙堂前資等故可以為辦事人也敕修清規尊宿遷化祭次衆寮次有辦事又頭首就僧堂點茶榜式云本山辦事禪師又方丈小座湯云第三座本山辦事諸方辦事隨職高下分坐解者曰本山辦事者本寺勤舊也忠曰上第二座有勤舊而今以辦事為第三座何得言辦事即勤舊耶又住持遷化祭次勤舊之外有辦事其別益可知也飯頭幻住清規飯頭云粥飯乃一衆命脈所係不可不留心於其間故叢林自典座而下至應接無慮數十人皆職司五味供給二時之至公之道也今菴居但設一飯頭總柄其事凡任此責者須拳拳以大衆心食之重觀察時分之早晚酌量食指之寡多撿看米穀之精分別水漿之清濁撙節菜蔬之多少顧慮柴薪之有無乃至收藏洗滌等勿令穢污毋致餿淹弗及則食觀不充過多則遺棄何益使生熟之得所令醎淡之合宜一朝不動衆人心萬古積成身後福然出家以利他為行今此職務莊嚴保社安慰衆心助轉食輪遠資法化誠利他之極致者也前輩如雪峯大隨溈山諸老自此而高登祖位盛播遺風豈猥屑之謂哉有力於道者宜審之已下略録事緣傳燈録藥山儼禪師章云師問飯頭汝在此多少時也曰三年師曰我總不識汝飯頭罔測發憤而去臨濟玄禪師録云黃檗因入廚次問飯頭作什麼飯頭云揀衆僧米黃檗云一日喫多少飯頭云二石五黃檗云莫太多麼飯頭云猶恐少在黃檗便打飯頭却舉似師師云我為汝勘這老漢才到侍立次黃檗舉前話師云飯頭不會請和尚代一轉語師便問莫太多麼黃檗云何不道來日更喫一頓師云説什麼來日即今便喫道了便掌黃檗云這風顛漢又來這裏捋虎鬚師便喝出去大光明藏大隋真禪師章評云此老為定光古佛示現在溈山造飯七年洞山負薪三年苦處先登力量如此非古佛而何溈山大安也事出大隋示衆見柴頭處聯燈會要雪峯存禪師章云師在洞山作飯頭淘米次山問淘沙去米淘米去沙師云沙米一時去洞云大衆喫箇甚麼師覆却米盆山云據子因緣合在德山又云師在德山作飯頭見雜行門托鉢處南京名勝志云蘇州承天能仁寺吳地記云有飯頭號宗本每飯熟必禮拜然後供僧一日忽悟恣談皆經中語仁宗召見賜金襴衣號圓照禪師粥頭禪苑清規有粥頭名見般若頭處湯頭石溪月禪師録賀鎮湯頭頌云甜似黃連微帶澀苦如甘草略含辛一回點過一回別只恐難瞞無舌人茶頭茶頭在諸寮舍或曰即茶頭行者也敕修清規新首座特為後堂大衆茶云呈納狀訖受特為人令本寮茶頭遞付供頭貼僧堂前下間解者曰此是後堂寮茶頭行者四寮茶頭四寮者首座寮維那寮知客寮侍者寮也各有茶頭敕修清規亡僧板帳式有四寮茶頭庫司茶頭敕修清規亡僧板帳式有庫司茶頭菜頭菜義見飲啖門貼菜處趙州諗禪師録云師問菜頭今日喫生菜熟菜菜頭提起一莖菜師云知恩者少負恩者多薑頭傳燈録投子同禪師章云師問僧久嚮疏山薑頭莫便是否無對法眼代云嚮重和尚日久醬頭禪苑清規有醬頭名見般若頭處米頭傳燈録石霜諸禪師章云抵大溈山法會為米頭一日師在米寮內篩米溈山云施主物莫拋撒師曰不拋撒溈山於地上拾得一粒云汝道不拋撒這箇什麼處得來師無對溈山又云莫欺這一粒子百千粒從這一粒生師曰百千粒從這一粒生未審這一粒從什麼處生溈山呵呵笑歸方丈晚後上堂云大衆米裏有蟲麥頭東山外集送麥頭頌云淵明非達士乞食拙言詞誰知我輩人佳處正在茲所化果何物持來復是誰山前小麥熟行矣今其時麻頭白雲端禪師法華録上堂云法華收得三般稀奇之寶尋常未曾拈出今日麻頭穀頭進發不免將出奉送二公乃拈起拄杖卓三下云前頭第一不得擘破又須分交兩手縱遇南番舶主也須換却眼睛穀頭見麻頭處園頭慈覺龜鏡文云為衆僧執勞故有園頭磨頭莊主又云計功多少量彼來處所以報園頭磨頭莊主也又云地有遺利人無全功非園頭磨頭莊主所以代衆也又云飽食終日無所用心非所以報園頭磨頭莊主也已下略録事緣傳燈録藥山儼禪師章云師見園頭栽菜次師曰栽即不障汝栽莫教根生曰既不教根生大衆喫什麼師曰汝還有口麼僧無對又末山尼了然嗣高安大愚章云灌溪間和尚遊方時到山禮拜問如何是末山然云不露頂間云如何是末山主然曰非男女相間乃喝云何不變去然云不是神不是鬼變箇甚麼間於是伏膺作園頭三載又永安靜禪師章云唐天復中南謁樂普安禪師安器之容其入室仍典園務力營衆事有僧辭樂普普曰四面是山闍黎向什麼處去僧無對樂普曰限汝十日內下語得中即從汝去其僧冥搜久之無語因經行偶入園中師怪問曰上座豈不是辭去今何在此僧具陳所以堅請代語師不得已代曰竹密不妨流水過山高那阻野雲飛其僧喜踴師囑之曰祇對和尚時不須言是善靜語也僧遂白樂普普曰誰下此語曰某甲樂普曰非汝之語僧具言園頭所教樂普至晚上堂謂衆曰莫輕園頭他日住一城隍五百人常隨也乃至節帥創永安禪苑以居之徒衆五百餘佛果擊節録云巖頭行腳到處做園頭詳雜行門把針處碧巖録云風穴在南院會下作園頭一日院到園裏問云南方一棒作麼生商量穴云作奇特商量穴云和尚此間作麼生商量院拈棒起云棒下無生忍臨機不讓師穴於是豁然大悟聯燈會要首山念禪師章云師與真園頭同上侍立風穴次穴問作麼生是世尊不説説真云鵓鳩樹頭啼意在麻畬裏穴云儞作許多癡福作什麼何不體究言句復問師師云動容揚古道不墮悄然機穴顧真云汝何不看念法華下語園主即園頭也敕修清規云園主不憚勤苦以身率先栽種菜蔬及時灌溉供給堂廚毋使缺乏園夫藝菜蔬之人夫也敕修清規典座云撫恤園夫栽種及時磨頭慈覺龜鏡文見園頭處大慧武庫云五祖演和尚依舒州白雲海會端和尚咨決大事深徹骨髓端令山前作磨頭演逐年磨下收粳麩錢解典出息雇人工及開供外剩錢入常住每被人於端處鬬諜是非云演逐日磨下飲酒食肉又養莊客婦女一院紛紜演聞之故意買肉沽酒懸于磨院及買坯粉與莊客婦女搽畫每有禪和來遊磨院演以手與婦女揶揄語笑全無忌憚端一日喚至方丈問其故演喏喏無他語端擘面掌之演顏色不動遂作禮而去端咄云急退却演云俟某算計了請人交割一日白端曰某在磨下除沽酒買肉之餘剩錢三百千入常住端大驚駭方知小人嫉妬時秀圓通為座元受四面請即請演為第一座磨主即磨頭也敕修清規云磨主兼主碓坊米麵供衆極有關系須擇有道心人諳曉舂磨等事者充之水頭敕修清規云水頭五更燒湯供大衆頮盥手巾面盆燈燭牙藥毋令缺少冬月烘焙手巾須早起鋪排勿致臨時動衆念慈覺龜鏡文見浴主處普燈録天衣懷禪師章云晚至姑蘇禮明覺於翠峯徐為水頭因汲水折擔忽悟作投機偈曰一二三四五六七萬仞峯頭獨足立驪龍頷下奪明珠一言勘破維摩詰覺聞拊几稱善火頭傳燈録溈山祐禪師章云師在法堂坐庫頭擊木魚火頭擲却火抄拊掌大笑師云衆中也有恁麼人喚來問作麼生火頭云某甲不喫粥肚飢所以喜歡師乃點頭又逍州諗禪師章云抵池陽參南泉作火頭一日閉却門燒滿屋煙叫云救火救火時大衆俱到師云道得即開門衆皆無對南泉將鎖於間過與師師便開門碧巖録云大隋真和尚承嗣大安禪師昔時在溈山大安會裏作火頭傳燈録伏龍山奉璘禪師章云師問火頭培火了未曰低聲師曰什麼處得者消息來曰不假多言師曰省錢易飽喫了還飢柴頭人天寶鑑云大隋真禪師示衆云諸禪德老僧行腳時到諸方多是一千少是三百衆在其中經冬過夏未省時中空過向溈山會裏做飯七年洞山會中做柴頭三年重處即便先去只是了得自己時中干他人甚麼事忠曰光明藏言洞山負薪者是也見飯頭處傳燈録嵇山章禪師嗣雲居膺章云曾在投子作柴頭投子喫茶次謂師曰森羅萬象總在者一碗茶裏師便覆却茶云森羅萬象在什麼處投子曰可惜一碗茶師後謁雪峯和尚雪峯問莫是章柴頭麼師便作輪椎勢雪峯肯之炭頭敕修清規云炭頭預備柴炭以禦寒事或化施主或出公界須令足用慈覺龜鏡文云為衆僧禦寒故有炭頭爐頭又云緘言拱手退己讓人所以報炭頭爐頭也又云預備不前衆人動念非爐頭炭頭所以向衆也又云身利溫暖有妨衆人非所以報爐頭炭頭也雲峯悅禪師在翠巖化炭見堂司處慈受深禪師慧林録上堂云炭頭今日地爐開澀雨慳風惱破懷老僧向火喫酸豏誰管檀那來不來爐頭禪苑清規云爐頭雖維那所請亦係炭頭和會選舉十月一開爐二月一日閉爐放參前裝爐粥前添炭相度寒暖臨時添減如天暖炭多則枉用信施如天寒炭少則大衆冷落掃拂拭常令嚴淨兄弟圍爐遞相回避不畫灰撥入敲火筯作聲聚頭間話擅便取火尉焙等用慈覺龜鏡文見炭頭處趙州諗禪師録云師在南泉作爐頭大衆普請擇菜師在堂內叫救火救火大衆一時到僧堂前師乃關却僧堂門大衆無對泉乃拋鎖匙從窗內入堂中師便開門傳燈作火頭見火頭處鍋頭東山外集送鍋頭偈云白雲生處踈山寺無水無柴世得知若問道人今日事木蛇鑽破鐵鍋兒燈頭禪苑清規有燈頭稱見般若頭處續傳燈録洞山聰禪師章云遊方時在雲居作燈頭見僧説泗洲大聖近在揚州出現有設問曰既是泗洲大聖為甚麼却向揚州出現師曰君子愛財取之以道後僧舉似蓮華峯祥菴主主大驚曰雲門兒孫猶在中夜望雲居拜之桶頭傳燈録玄沙備禪師章云文桶頭下山師問桶頭下山幾時歸曰三五日師曰歸時有無底桶子將一擔歸文無對歸宗柔代云和尚用作什麼聯燈會要招慶匡禪師章云師在長慶作桶頭常與衆僧語話一日長慶入寮見乃問儞終日口嘮嘮地作甚麼師云一日不作一日不食云云樹頭虛堂愚禪師録謝樹頭上堂僧問栽松道者借路周氏之家後來為第五祖此意如何師云燈籠沿壁上天台僧云友直歲為二林樹頭獲何福報師云説向儞也不難僧云學人也要種一片樹只是未有人分付钁子師云何不便領僧云謝和尚钁子便禮拜師云得少為足又樹頭祖用秉炬語云黃梅不墜腰間石鄮嶺惟栽帶雨松四十餘年今有驗長長短短用無窮祖衣未得人手萬緣先以頓空無柄钁頭何處著一時分付丙丁童莊主敕修清規云莊主視田界至修理莊舍提督農務撫安莊佃些少事故隨時消弭事關大體申寺定奪近時叢林凋弊百出而莊中尤甚略舉其三諸方通害初爭莊職安能遍及搆怨住持上下不睦一也一充其職離寺相遠靡所不為致爭起訟供衆錢糧盡皆耗費復積逋負以纍于後因而紀綱不振莊佃生侮租課不還其弊二也縱使老成能事充之而州縣應酬吏胥管幹鄉都職役鄰里富豪皆合追陪既啓其端稍有不及便生釁隙雖不明支而巧立除破公私無益故莊中之費或半於寺其弊三也只如大家業産巨富不聞分遣子弟遍居莊所蓋耕種有佃提督則有甲幹收租之時自有監收僧行此外縱有輸納修墟俵糧等項只臨時分委勤舊知事限期使辦事畢旋歸非唯省費有補常住而消禍未萌公私攸濟今諸方之廢如逃亡家住持勤舊能恤念寺門欲撙費救弊汰除濫冗請自此始其初例有當重難而應充莊職者別議酬補之慈覺龜鏡文見園頭處都莊忠曰蓋莊主也普燈録別峯寶印禪師章舉南泉到莊因緣云金山今日新請都莊萬一山僧到莊第一不得鬼語東山空禪師録亡僧遷化上堂云洞山道天晴蓋却屋乘時刈却禾輸納王租了鼓腹唱謳歌古人住山得與麼了事得與麼快活雪峯有屋蓋未了有禾收未上有租未納破方待鼓腹謳歌而顗都莊又遷化苦苦敢問大衆一等是出家兒一等是住山人為甚苦樂不同會麼曹溪波浪如相似無限平人被陸沈喝一喝副莊忠曰副二莊主者石溪月禪師録淑副莊下火語云閙處番交靜處插腳偉哉淑副莊舉火云透過這一著這一著那一著開眼也著合眼也著監收敕修清規莊主云收租之時自有監收僧行又諸莊監收云古規初無莊主監收近代方立此名此名一立其弊百出為住持私任匪人者有之因利曲徇者有之為勤舊執事人連年占充者有之托勢求充者有之樹黨分充者有之角力爭充者有之蠹公害私不可枚舉雖欲匡救未如之何倘得廉正勤舊輔佐住持公選區用或對衆鬮拈充之充此職者當克己為念奉衆為心毋苛取佃戶毋虧損常住則自他俱利矣備用清規云監收之職衆人命脈貴在擇人當請公心大小耆舊無任小師鄉人苟用非其人不識因果隱瞞常住苛取佃甲無所不至非特歲計不足抑且纍及山門晦堂見黃龍云云如次下引諸莊成熟時至審細和會廉謹久歷大小耆舊或十方兄弟定已至日請兩班大耆舊茶勸率寢堂一一請已轉位獻湯了送歸客位兩班領衆作賀次第巡寮草飯特為湯庫司特為湯藥石進退兩班禮同唯天童諸莊古式不墜監收無人已望望畏之每年至再和會加禮敦請特為了至下莊日山門首釘挂講茶湯禮鳴樓鐘集衆門送上轎至今遺風在焉禪林寶訓云晦堂一日見黃龍有不豫之色因逆問之黃龍曰監收未得人晦堂遂薦感副寺黃龍曰感尚暴恐為小人所謀晦堂曰化侍者稍廉謹黃龍謂化雖廉謹不若秀藏主有量而忠靈源嘗問晦堂黃龍用一監收何過慮如此晦堂曰有國有家者未嘗不本此豈特黃龍為然先聖亦曾戒之又云演祖自海會遷東山太平佛鑑省覲祖問佛鑑舒州熟否對曰熟祖曰太平熟否對曰熟祖曰諸莊共收稻多少佛鑑籌慮間祖正色厲聲曰汝濫為一寺之主事無巨細悉要究心常住歲計一衆所係汝猶罔知其他細務不言可見五祖演禪師録謝監收上堂云人之性命事第一須是欲得成此先須防於若是真人按大慧普説稻稻盜道道道六字都場希叟曇禪師法華録中秋謝都場監收并知客維那上堂云明月可中庭鴈影沈寒水烹金爐冷歲華深九鼎遺言猶在耳拈拄杖云深深撥著宿火通紅不假一槌成大器刈禾鎌子疾如風都倉雪巖欽禪師光孝録謝都倉副寺侍者并秀才上堂云叢林雖未整肅更點却要分明粒米須還粒飯八兩定要半斤折衡剖斗移風易俗固是格外提持為什麼却道將謂汝孤負吾元來却是吾孤負汝逢人但恁麼舉甲幹敕修清規莊主云耕種有佃提督有甲幹收租之時自有監收僧行又尊宿遷化孝服云甲幹莊客諸僕麻布巾甲正字通云詩衛風能不我甲注甲長也才能不足長于我也幹品字箋云能幹言其能為凡事之根幹也忠曰甲幹屬莊主催促作務者也舊解言掌納收者非也掌收已有監收今言提督則其職亦可知也莊甲忠曰莊甲即甲幹屬莊主故曰莊甲也敕修清規開堂祝壽云參頭領衆行者插香禮拜次直廳轎番莊甲作頭老郎人僕參拜又尊宿遷化祭次老郎之次有莊甲莊佃農夫之屬莊主者其名見莊主處小補韻會云佃堂練切廣韻營田增韻治田又亭年切治土也居家必用云佃客謂治田分利之人也和名類聚云唐韻佃作田也音與田同和名豆久太莊客忠曰莊客即莊佃也見甲幹處地客忠曰即莊佃也禪林寶訓云妙喜曰佛性住大溈行者與地客相毆佛性欲治行者祖超然佛日文祖嗣天衣懷因言若縱地客摧辱行者非惟有失上下名分切恐小人乘時侮慢事不行矣佛性不聽未幾果有莊客弒知事者又云妙喜曰祖超然住仰山地客盜常住穀超然素嫌地客意欲遣之令庫子行者為彼供狀行者欲保全地客察超然意抑令供起離狀仍返使叫喚不肯供責超然怒行者擅權二人皆決竹篦而已蓋超然不知陰為行者所謀烏乎小人狡猾如此廨院主禪苑清規云廨院主之職主院門收糴買賣僧行宿食探報郡縣官員交替應報公家文字或收簇院門供施財利或迎待遠方施主永平道元和尚曰妙信尼仰山之弟子也仰山選廨院主曰信淮子雖是女流有大丈夫志氣正堪為廨院主遂充之信在廨院與蜀僧商量風幡話街坊化主或單言化主或單言街坊忠曰勸化市𮠔街坊索得檀施以為大衆供料者古德曰東山外集多送街坊頌蓋到處若不持師家送偈則人疑為贋索故必作頌送之敕修清規云化主凡安衆處常住租入有限必藉化主勸化檀越隨力施與添助供衆其或恆産足用不必多往干求取厭也慈覺龜鏡文云為衆僧乞丐故有街坊化主又云忖己德行全缺應供所以報街坊化主也又云臨財不公宣力不盡非街坊化主所以供衆也又云不念修行安然受供非所以報街坊化主也覺浪大師尊正規云豫嘗謂化主是門外知賓知賓是門裡化主蓋法不孤起仗緣方生所謂諸法性無常佛種從緣起五燈會元芙蓉楷禪師章云示衆曰山僧行業無取忝主山門豈可坐費常住頓忘先聖付囑今者輒斆古人為住持體例與諸人議定更不下山不赴齋不發化主唯將本院莊課一歲所得均作三百六十分日取一分用之更不隨人添減可以備飯則作飯作飯不足則作粥作粥不足則作米湯新到相見茶湯而已更不煎點唯置一茶堂自去取用務要省緣專一辦道聯燈會要雲居舜禪師章云師自洞山如武昌行乞首謁劉公居士家居士高行為時所敬意所與奪莫不從之師時年少不知其飽參頗易之居士云老漢有一問上人語相契即開疏如不契即請却還遂問古鏡未磨時如何師云黑似漆士云磨後如何師云照天照地居士長揖云若恁麼上人且請還洞山拂袖入宅師懡㦬即還洞山山問其故師具言其事山云儞問來我與儞道師理前問山云此去漢陽不遠師進後語山云黃鶴樓前鸚鵡洲師於言下大悟機鋒不可觸希叟曇禪師録為元街坊下火云赤腳走紅塵全身入荒草本命元辰都失了掀翻海嶽覓無蹤雲峯悅在大愚為衆乞飯見于堂司處天竺亦有化主儀付法藏因緣傳云於東方國有族姓子信樂佛法出家學道善能營事無不成辦經歷多時便生疲厭即往尊者憂波毱所尊者觀察知此比丘為福未具故不得道即令為僧遊行教化受教入城處處求索有一長者見而問之答言長者尊者毱多使我教化今此城中誰是篤信長者復言慎勿餘去一切所須當相奉給即為辨具比丘得已於上座前持食長跪一切衆僧皆為咒願咒願已竟成阿羅漢雜阿含經云尊者大目犍連言我於路中見一大身衆生以熾然鐵鍱以纏其身衣被牀臥悉皆熱鐵炎火熾然食熱鐵丸乘虛而行啼哭號呼佛告諸比丘此衆生者過去世於此舍衛國迦葉佛法中出家作比丘為衆僧乞衣食供僧之餘輒自受用緣斯罪故已地獄中受無量苦地獄餘罪今得此身續受斯苦粥街坊禪苑清規街坊云粥街坊米麥街坊菜街坊醬街坊水頭炭頭燈頭華嚴頭般若頭經頭彌陀頭並是外勸檀越增長福田內助禪林資持道果若非契聖運心何以普酬衆望米麥街坊菜街坊醬街坊並見粥街坊處供養主蓋即街坊化主也廣燈録第二代寶壽禪師失名嗣寶壽沼章云師在先寶壽處為供養主得數年一日寶壽問云供養主父母未生時還我本來面目來師道不得三兩日後却來下供養主寶壽云汝不用下後經月十日間因在街坊見二人買賣不和相打師見忽然大悟歸院舉似寶壽寶壽云儞悟也不用道葉縣省禪師録云師勘五人新到云總是雲居供養主那僧云是師云是即一齊坐傳燈録王敬初常侍視事次米和尚至王公乃舉筆米曰還判得虛空否公擲筆入廳更不復出米致疑至明日憑鼓山供養主入探其意米亦隨至潛在屏蔽間偵伺供養主才坐問云昨日米和尚有什麼言句便不得見王公曰師子咬人韓獹逐塊米師竊聞此語即省前謬遽出朗笑曰我會也我會也修造局忠曰掌山門作事者局義見六局行者處敕修清規尊宿遷化祭次火客次有修造局西巖惠和尚開善録有謝璧都管郁修造上堂廣燈録四面山寶津禪師章云師問修造僧本自圓成何得開山造寺造云擔枷過狀師云未在更道造云兩重公案師拈棒造擬議師便打諸色作頭忠曰山門匠人隸修造局者敕修清規開堂祝壽云直廳轎番莊甲作頭老郎人僕參拜又結制禮儀云參頭領衆行者插香禮拜次作頭領老郎諸直廳轎番人僕等參拜又尊宿遷化孝服云方丈人僕作頭麻布巾衫又同祭次修造局之次有諸色作頭又見莊甲處忠曰舊説曰作頭者園頭乎止此非也余引無準録好生録正其謬説無準範禪師録入城歸上堂云張都料李作頭鑿竅底鑿竅著楔底著楔好生録云杏花寺八長老一夕至丹墀見巨蛇即時打死出山門暗中忽有聲曰八長老我與夏作頭有讐欲來相報汝何無故殺我八長老驚汗浹背急趍出至街恰遇夏匠曰儞好造化夏問其故長老具述前事夏曰此蛇在否引至蛇所夏大怒拔斧斫之破腦出髓髓濺入眼眼遂爛三年而死長老亦因訟弊於獄忠曰已呼夏作頭為夏匠此作頭是工匠之證監作忠曰監作隸修造局監作頭者蓋人力之上首敕修清規亡僧板帳式云監作差撥人力忠曰舊解訓監作為古乃加宇倍即兄部也蓋非當訓也監作頭者是人力之上首故為此訓矣已言差撥人力則其上首可知忠曰備用清規當代涅槃對靈小參中云作下寮參拜聲喏諷經止此作下寮蓋亦監作也兄部日本禪林力者上首稱兄部和言古乃加宇倍直歲忠曰正字通云直當也止此蓋當一歲幹事故謂直歲也敕修清規云直歲職掌一切作務凡殿堂寮舍之損漏者常加整葺動用什物常閲其數役作人力稽其工程黜其遊惰毋縱浮食蠹財害公田園莊舍碾磨碓坊頭匹舟車火燭盜賊巡護防警差撥使令賞罰惟當並宜公勤勞逸必均如大修造則添人同掌之釋氏要覽云三千威儀經具十德堪充直歲文多不録今但掌園民直歲調也又見主事處大比丘三千威儀云直歲有十德一者為三法盡力二者若有比丘從遠方來當迎安隱三者當給與牀席若燈火三日至七日四者設房皆滿當自避持處與之五者當數往問訊占視六者當為説國土習俗七者當憂所不具足八者若中有共諍者不得有所助常當和解令安隱九者若宿與不相便安不得於衆中呵罵亦不得呼人使共作某令主不可十者不得與摩波利共諍求長短數於衆中若行説之亦不得取三法中所有物持行作恩惠如法行者可作直歲僧史略云或立直歲則直一年或直月直半月直日皆悅衆也祖庭事苑云按僧史謂直一年之務故立此職今禪門雖不止定歲時立名亦法於古制也慈覺龜鏡文云為衆僧作務故有直歲又云安處僧房護惜什物所以報直歲也又云寮舍不修什物不備非直歲所以安衆也又云居處受用不思後人非所以報直歲也五燈會元仰山寂禪師章云師在溈山為直歲作務歸溈問甚麼處去來師曰田中來溈曰田中多少人師插鍬叉手溈曰今日南山大有人刈茅師拔鍬便行直月見直歲處直日見直歲處俗事考云俗語直日見禮記注巡更尊正規巡更云重門擊柝以待暴客此聖人防微杜漸之意也叢林每夜輪二人巡更打板念佛直欲喚起光天徹地主人公無使偷心白拈之所欺瞞也其中兼有五種大利一警覺提昏出于夢宅二敲破參頭懸崖撒手三使小人不敢私自交接四令燈火明慎門戶常嚴五能令虛空作舞露柱揚眉此巡更人莫往往向犍椎下打失自家眼睛鼻孔也直廳舊説曰直廳者力者也忠曰僧寺亦當擬官有廳事今直廳直於廳事者小補韻會云毛氏曰聽事言受事察訟於是漢晉皆作聽六朝以來乃始加廣敕修清規開堂祝壽有直廳名見莊甲處又侍者進退云方丈行者直廳轎番拜賀轎番轎番者荷輿僕人也忠曰轎肩輿也見器物門轎處番正字通云番符山切音翻廣韻更遞也漢紀賢良直宿更番止此今轎番者更遞擡輿者敕修清規迎待尊宿云方丈執局及參頭領衆行者人僕轎番以次參拜又見莊甲處轎從轎番又名轎從敕修清規迎待尊宿云帶行侍者行者人僕轎從參拜額定知事數敕修清規兩序進退云泰定間脫歡丞相領行宣政院分上中下三等寺院額定歲請知事員數解者曰上五山中十剎下甲剎為三等額定者題定之也維那十誦律云祇陀林中僧坊中無比丘知時限唱時無人打楗槌無人掃灑塗治講堂食處無人次第相續敷牀榻乃至飲食時無人行水衆散亂語時無人彈指是事白佛佛言應立維那乃至成就五法應立作維那五法者不隨愛不隨瞋不隨怖不隨癡知淨不淨即時一比丘僧中唱言大德僧聽是某甲比丘能為僧作維那若僧時到僧忍聽僧立某甲比丘作維那是名白如是白二羯磨僧立某甲比丘作維那竟僧忍默然故是事如是持祖庭事苑云維那寄歸傳云華梵兼舉也維是綱維華言也那是略梵語刪去羯磨陀三字此云悅衆也又云聲論翻為次第謂知事之次第者也今禪門令掌僧籍及表白等事必選當材南海寄歸傳云授事者梵云羯磨陀那陀那是授羯磨是事意道以衆雜事指授於人舊云維那者非也維是周語意道綱維那是梵音略去羯磨陀字也求法高僧傳云那爛陀寺若鳴犍稚及監食者名為羯磨陀那譯為授事言維那者略也衆僧有事集衆平章詳三綱處行事鈔集僧通局篇云維那聲論翻為次第也謂知事之次第相傳云悅衆也又訃請設則篇云十誦為知請故須立維那出要律儀翻為寺護又云悅衆本正音婆邏此云次第資持記云寺護謂監護寺事也備用清規云梵語維那唐言悅衆叢林典則一一舉行位列東班職居清要送往迎來禮須勤重病僧將息令得其宜兄弟粗心委曲調護挂搭歸堂檢示度牒上簾收帳閉爐打扇當計寒暖亡僧衣物務要分明念誦舉經詳緩合節乃至若楞嚴會化香燭或有他緣戒臘簿假簿當送過客司并請假煩打槌回向細大事務列諸條章凡僧堂關係水頭炭頭供頭一一提點便衆為懷若夫興化會裏克賓棒下罰錢出院百世標準也敕修清規云維那綱維衆僧曲盡調攝堂僧挂搭辨度牒真偽衆有爭競遺失為辨析和會戒臘資次床曆圖帳凡僧事內外無不掌之舉唱回向以聲音為佛事病僧亡僧尤當究心云云此説食時鳴槌法今在唄器門槌砧處或有他緣或暫假出入將戒臘簿假簿堂司須知簿親送過客司令攝之慈覺龜鏡文云調和衆僧故有維那又云六和共聚水乳相參所以報維那也又云修行者不安敗羣者不去非維那所以悅衆也上下不和鬬諍堅固非所以報維那也菩薩處胎經云迦葉語優波離卿為維那唱阿難下即受教唱下阿難卿是佛侍者今有大過於我等所卿自知不也阿難白迦葉言不審有何過迦葉言佛所説經若有得道羅漢六通清徹者修四神足多修多行能住壽一劫有餘卿何故默然而不報佛時阿那律將阿難出在外聯燈會要太行山禪房克賓禪師章云興化一日謂師云儞不久為唱道之師師云不入這保社化云儞會了不入不會不入師云總不恁麼化便打復云克賓維那法戰不勝罰錢五貫設饡飯一堂至明日齋時化白槌云克賓維那法戰不勝不得喫飯即便出院廣燈録守廓上座章云師行腳到襄州華嚴和尚會下華嚴一日上堂云今日賜卿無畏若是臨濟德山高亭大愚鳥窠船子兒孫不用如何若何直須單刀直入華嚴與汝證據師出禮拜起便喝嚴亦喝師又喝嚴亦喝師便禮拜起云大衆看者瞎漢一場敗闕便喝拍手歸衆嚴下座歸方丈風穴時為維那上去問訊嚴云維那儞來也叵耐守廓適來把老僧細揑一上待集衆打一頓趁出穴云趁他遲也況和尚言過他是臨濟下兒孫本分恁麼嚴方息怒風穴下來言前事舉似師師云維那著什麼來由勸者漢我未問前早要棒喫得我話行如今不打我榻却我話也遂與風穴同過夏各話南北家風遞相舉論松源嶽禪師録普説云應菴師祖依圓悟教特去宣州彰教參隆和尚門庭孤峻直是不容湊泊未經數時遷虎丘亦參隨去續請充維那一日室中舉五祖牽牛過話擬祇對次被他劈胸一拳自此打斷命根是時隆和尚欲命首衆會中有圓悟耆舊云華維那嫩在師祖聞得遂書偈於壁間云江上青山殊未老屋頭春色放教遲人言洞裏桃花嫩未必人間有此枝不辭便行綱維忠曰維那亦云綱維綱紀維持堂中事也詳維那處敕修清規聖節經單式云綱維臣僧某詳文疏門經單處小補韻會云大曰綱小曰紀總之為綱周之為紀篇海類編云維持也一曰綱也堂司忠曰維那掌僧堂事其所居言堂司又呼其人為堂司若呼居處為堂司則維那寮是也敕修清規聖節差單式云堂司某具僧寶傳雲峯悅禪師傳云悅至筠州大愚守芝芝升座曰大家相聚喫莖齏若喚作一莖齏入地獄如箭射下座無他語悅大駭夜造丈室芝曰來何所求曰求佛心法芝曰法輪未轉食輪先轉後生趁有色力何不為衆乞飯去我忍飢不暇暇為汝説法乎悅不敢違即請行及還自馮川芝移住西山翠巖悅又往從之夜詣丈室芝曰又欲求佛心法乎汝不念乍住屋壁疏漏又寒雪我日夜望汝來為衆營炭我忍寒不能能為汝説法乎悅又不敢違入城營炭還時維那缺悅夜造丈室芝曰佛法不怕爛却堂司一職今以煩汝悅不得語而出明日鳴楗椎堅請悅有難色拜起欲棄去業已勤勞久因中止然恨芝不去心地坐後架架下束破桶盆自架而墮忽開悟頓見芝從前用處走搭伽梨上寢堂芝迎笑曰維那且喜大事了畢悅再拜汗下不及吐一詞而去楞嚴頭敕修清規楞嚴會云維那先期擇有音聲者為楞嚴頭又云維那白佛宣疏畢楞嚴頭喝楞嚴衆和畢仍作梵音唱念經首序引畢方舉咒咒畢喝摩訶衆和畢維那回向又云每日集衆諷咒畢楞嚴頭舉普回向偈大衆同聲念又云至七月十三日滿散禮同但楞嚴頭唱念咒尾之末章維那回向而散有衆寮楞嚴頭與佛殿楞嚴頭別也敕修清規衆寮結解特為衆湯云設照牌特為寮主副寮楞嚴頭行瓶盞人解者曰此是衆寮楞嚴頭也非佛殿楞嚴頭臥雲日件録云寶壽祖師月舟名周勳少年在天龍為楞嚴頭夢自教授佛母又云東福楞嚴頭普慶字迪元與絶海聯句破題曰涼雨城南寺絶海續曰清標天上仙義堂日工集云府君義滿見楞嚴頭喝食唱佛母曰彼少年者俊快如斯可愛也曰禪家雛道者雖七八歲亦猶於大衆前作法事他時荷大法住持巨剎威儀可觀蓋自少年薰陶而然空華集云鹿峰宗輔道者年十三適值解制選於衆為楞嚴頭已能唱念其聲和雅聽者咸悅之今歸武陵梵音禪院欲省今師大全記史其志可嘉故以偈為餞云耳偈曰正宗輔教豈無人年少頭陀已出塵見説楞嚴勝會日迦陵落落梵音新水拙文集與東江書云側聞令弟仁叔夢窗之孫今夏鈞選楞嚴首唱乃祖七朝帝師夢窗曾任此職此職增重尊丈前程可知小維那相國寺興彥龍半陶稿云秀峯佳丈今茲結制膺小維那顯職僕聞吾山盛時於童髮隊設楞嚴首唱得其選者榮莫大焉中興以還斯舉實為闕典呼今之有小維那蓋古之楞嚴頭也以此接彼可謂華矣般若頭禪苑清規云如請街坊化主莊主炭頭醬頭粥頭街坊般若頭華嚴頭浴主水頭園頭磨頭燈頭之類應係助益常住頭首須當及時稟住持人請之不可怠慢遲延又見粥街坊處華嚴頭見般若頭及粥街坊處經頭見粥街坊處彌陀頭見粥街坊處導師忠曰觀音懺法式有導師香華自歸三職其導師謂表白者僧史略云導師之名而含二義若法華經中商人白導師言此即引路指迷也若唱導之師此即表白也故宋衡陽王鎮江陵因齋會無有導師請曇光為導及明帝設會見光唱導稱善敕賜三衣瓶鉢焉法華經涌出品云是四菩薩於其衆中最為上首唱導之師補注云啓發法門名之為唱引接物機名之為導又禪史稱唱導之師者謂唱教法導引有情之義今援一二廣燈録百丈海禪師章云仰山云百丈得大機黃檗得大用餘者盡是唱導之師傳燈録興化獎禪師章云師謂克賓維那曰汝不久當為唱道之師詳維那處香華見導師處自歸見導師處鐘頭禪苑清規鐘頭云付法傳説罽賓吒王死作千頭魚常為劍輪斫首痛不可言每聞鐘聲則劍輪不下晨昏扣鐘無非佛事高僧傳釋智興如法鳴鐘聲震地府受苦者皆解脫校定清規念誦云報鐘頭候鳴大鐘又勸化鑄鐘者曰鐘頭應菴華禪師録示圓鐘頭法語云歸宗年來寂寞太甚也思得六十棒喫誰為下手忽然圓上座出來道法圓下手秖向伊道待儞鑄鐘了則分付拄杖子淨頭廁本不淨之處故掌之者可令極淨潔故以淨命名禪苑清規云淨頭之職五更上燈日出收茆籌淨布浸之次刷洗籌槽併疊掃地添換茆籌淨巾并灰土皂角打當水廨齋後洗濯籌布晚後燒湯上油常令湯水相續無使大衆動念淨頭者行人之所甚難當人之所甚惡可謂無罪不滅無病不愈無福不生同袍拱手上廁寧無慚愧之心備用清規云淨頭之職果自因生每朝掃地裝香及時剔燈點燭換籌洗廁出桶拖鞋手巾乾淨湯水寬容澡豆頻添灰土常滿或時狼藉打併宜勤討柴洗籌俯恤人力觸邊明淨道業圓成雪竇在靈隱牧菴妙喜寶峰會中皆服勤斯務矣敕修清規云淨頭掃地裝香換籌洗廁燒湯添水須是及時稍有狼藉隨即淨治手巾淨桶點檢添換凡供此職皆是自發道心將交替時堂司預出小榜云下次淨頭缺人如有結緣請留芳字願結緣者收榜白堂司然後覆住持請充之慈覺龜鏡文云為衆僧滌除故有淨頭又云酌水運籌知慚識愧所以報淨頭也又云懶惰併除諸緣不具非淨頭所以事衆也又云涕唾墻壁狼藉東司非所以報淨頭也大慧年譜云師二十四歲在寶峰居侍者寮一日侍次湛堂視師指爪云想東司頭籌子不是汝洗師即承訓交代黃龍忠道者作淨頭九箇月按普説某自聞湛堂和尚此説終身不養爪甲才長一菽不剪湛堂和尚便於手指上出現此乃誠服其訓導也又見殿堂門淨頭寮處雲臥紀談云佛心禪師才公趨西禪海印隆禪師法席于時西禪衆逾萬指才發心領淨頭職一夕汛掃次隆適夜參至則遇結座擲拄杖云了即毛端吞巨海始知大地一微塵才豁然有省真淨文禪師録云淨頭端上人求洗滌之説因而成偈云段食共滋養皆名有漏身焉知大小事不昧往來人歷歷隨聞見惺惺應屈伸變通元自在鑒照本天真由逐江湖客恥為堯舜臣所依投旅舍妄計困風塵病故嫌王膳飢仍預國民既能分皂白須解別疏親朽宅蚖蛇會浮泡屎尿陳何妨觀穢惡却要滅貪瞋除垢超凡果談空入聖因迦文教雖舊釋子道應新革屣排朱戶禪衣挂緣筠攝心彰戒定彈指覺坑神吐唾防塗壁拋籌怕動鄰為僧當異俗學佛便行仁伏忍冤憎盡興悲鳥獸馴汲湯宜讓伴盥手忌淋垠受用生慚愧供承識苦辛階甎同鏡面瓦宇若魚鱗狼藉欣歡少光明讚歎頻桶盆還次第灰土最精淳塞鼻奢紅棗迎賓熾絳脣去驕終遠害習慢必遭迍匾器易盈滿曠懷忘賤貧沙門修慧命菩薩振慈綸總具如蓮性誰偏可意珍莫迷臭皮袋苦海枉沈淪竺仙仙禪師南禪録重陽謝志首座為淨頭上堂云盡十方虛空是箇廁坑孔三世諸佛諸代祖師頭出頭沒盡十方大地是箇垃𡒁堆三世諸佛諸代祖師十字縱橫坐斷去來今不落第二見超出法報化分開三八九僧問雲門如何是佛門云乾屎橛南禪則不然如何是佛不昧主人翁不昧主人翁眉間劍化龍笑他陶靖節醉倒菊華叢又竺仙淨智録普説云山僧少年時每見人誦祖英集自亦觀其語句雄偉超拔亦慕敬之乃想其人物必英姿氣槩方頤大耳巍巍不可近者及遊雪竇觀衆寮前石碑所鐫頂相大不相似心中想者如絶無福之人而有大福乃至儞道其大福從何而來他昔在靈隱做淨頭今靈隱淨頭寮名曰雪隱即今圓覺淨頭寮二草字即是不知何人好事者模來他做淨頭時將衆人用過籌子雖把水浸漬洗滌其上有乾塗之物不去者躬以指甲剔洗又恐不光滑或少傷儞所用處身體乃於自面上蕩試之如此若看其頂相窮寒寂寞而其語言道德如此之行人之敬慕月江印禪師録贈省淨頭偈云擬續當年雪隱絃行菩薩行更加鞭驀然自屎不覺臭插翅蒲鞋飛上天義堂空華集賀淨頭頌軸序云易曰謙亨君子有終卑而不可踰又曰地中有山謙君子卑以自牧牧者養也夫山之為體也宜峻拔乎天上而反居地中然而人莫敢踰越其巔者猶君子抱才德者宜居崇班而反隱乎下位以自養然而以居人之所惡故莫或爭之其道自亨而有終也宜矣古之宗門祖師發心入道必先歷試諸難而役于雜務職職之最卑而人所甚惡莫過乎持淨然若雪竇明覺居衆司此職于靈隱至今有雪隱之美稱大慧師以承湛翁之訓洗籌於寶峰幾一期有終身不養爪甲之誓是豈非卑以自牧也歟惟二老也出乎雲門臨濟之後回狂瀾於既倒支大廈於將顛之際可謂君子有終矣而後學者抑止不啻如泰山北斗之尊不亦卑而不可踰之謂乎今也不然初機後輩乍入吾門則輒欲身心以逸豫衣食以豐美名位以崇重屋廬以安便由是雜務劇職每乏其人實主法者所憂也我不聞大禪師主瑞鹿明年丙午春適淨頭缺人前主正傳明岩師之徒有阮其名者被褐懷玉匿乎緇伍之間有年於此矣及茲慨然而起請就厥職凡東司器皿什物之類莫不修整焉牏之污者刷而滌之屐之缺者綴而補之桶盆脫者椸巾弊者或篐而束之或換而新之至若掃地裝香之勤燒湯汲水之勞莫不竭力焉見者咸悅服矣於是禪師特唱四句伽陀以讚厥美且告于乃師洎山中耆英碩衲賡歌以助成之軸成命豫文以冠于首惟曆應間朝廷有旨革故龜山行宮鼎建一大禪剎賜天龍資聖之額仍命先師為開山祖然以寺本備十方之居故先師不允徒弟者挂搭小子方十七歲投師易服懇乞隸名師憫豫誠心乃允豫既而發心持淨期一周而職未滿俾遷于侍司而後出入叢林每欲終其職而未遂矣嗟今老且病矣竊感諸阮公克繼雪竇大慧之踵合乎君子有終之道而有愧于內故不辭書以告來者庶乎哉持淨忠曰淨頭又名持淨虛堂愚禪師録普説云如玄沙和尚精持頭陀苦行日間開畬種粟引水灌蔬夜間勤於香燈持淨掃地斷橋倫禪師録行狀云佛鑑奉詔登徑山因再參焉命掌法藏既復自惟曰宴安鳩毒苟勞身利衆何為不勉持淨一年拂垢滌穢皆躬為之佛鑑亟稱於衆遂延為第二座清拙澄禪師住建長時請持淨偈云妙喜寶峯持淨日隱之靈隱結緣時芳塵郁郁今如昔直下承當者是誰月江印禪師録振寮元持淨求警策偈云執持糞器著弊垢衣入淨入穢入水入泥日用常行三昧發揮古德風規趙州東司頭不説佛法狼藉不少湛堂指甲上放光動地誠不自欺生苕帚破糞箕得便宜是落便宜這般標致誰相似靈鷲山中有隱之雜毒海實虛暗侍者持淨頌云銀甲纖纖剪斷時黃金殿上掘東司一籌不獲翻身去禿拈來好畫眉虎關濟北集持淨歌略云漢也少年誓持淨胸懷不干高下職土灰堆器似丘陵波浪鼓槽如溟渤盧公何處惹塵埃神秀時時勤拂拭夜燈焰長常耿暉晨香煙細恆馥郁誰言此所幽陰地何知變作光明國誰言此所臭穢地何知熏作芝蘭室三回引出赤鈞天一推推倒悟瓦塔應識寺圊真法場不與俗間溷廁匹鶖子婆羅潛堅信趙州文遠工鬬劣巍峩乳峯百世師突兀凌霄萬人傑道價盛起洞明爭讚歎不及衡梅謫二老在衆共於斯奚翁寶峰李靈嶽想汝要透祖師機豈必敢學淮南迹奚翁大慧奚氏李雪竇顯李氏靈嶽靈隱也義堂日工集云康永元年壬午十八歲復參夢窗挂名天龍發心持淨者一年國師一日窺見余躬自洗滌廁牏用爪甲清除穢污感其精勤乃命侍于湯藥而職未滿俾遷于侍司延壽堂主或略稱堂主又見殿堂門延壽堂處禪苑清規延壽堂主云堂主須請寬心耐事道念周旋安養病僧善知因果之人堂中所用柴炭米麵油鹽醬菜茶湯藥餌薑棗烏梅什物家事皆係堂主緣化如其無力唯米麵油炭就常住打給如病僧入堂將息令行者打疊床位如法安排煎煮湯藥供過粥飯逐時問訊務令適意如病人苦惱多生瞋怒粥飯湯藥動不如意及呻吟叫喚屎尿狼藉並須憫念看承不得心生厭賤如欲沽酒下藥及以浸藥為名食啖魚肉蔥薤貴圖補益是時堂主當以禁戒因果善言開諭令丙堅正念勿縱邪心甲嚴戒供過行者剪剃針線之人不得潛隱藏帶酒肉入堂合藥如須用酒當令院外浸漬及以酒糊為丸煎藥用蔥及合藥肝腎魚肉尚猶不可何况恣心食啖也病僧若可擔擎及稍進粥飯勸令持齋不宜輕毀禁戒堂中鍋釜不得令人練帛有妨病僧使用非係堂中將息之人不得延容粥飯有處病僧在堂並上文曆以憑庫司打給并請齋嚫病僧如稍困重報堂司抄札遷重病閣若非道眼精明並勸令專念阿彌陀佛祈生淨土若勸率同袍打磬念之極妙八福田中看病最為第一佛法僧父母師長貧窮橋梁義井疾病乃八福田也况出家之人雲遊萍寄一有疾病誰為哀憐唯藉同袍慈悲安養誠為重任豈可輕心延容作延客備用清規云延壽堂主奉養病僧常備薑棗油燭五味以時管遇病者呻吟當生愍念病稍輕安勿縱補益恣噉無厭久占房榻病是衆生良藥當改過日新孤燈獨照時正好著力敕修清規云延壽堂主看視病僧湯藥油燭炭火粥食五味常備供須公界倘缺若自己豐裕結緣應付或勸化施主措辨床席衣被狼藉穢污為其洗浣母生憎嫌八福田中直病為第一也慈覺龜鏡文云為衆僧供侍湯藥故有堂主又云寧心病苦粥藥隨宜所以報堂主也又云不間供侍惱亂病人非堂主所以恤衆也又云多瞋少喜不順病緣非所以報堂主也已下略録事緣禪林寶訓云高菴住雲居聞衲子病移延壽堂咨嗟嘆息如出諸己朝夕問候以至躬自煎煮不嘗不與食或遇天氣稍寒拊其背曰衣不單乎或值時暑察其色曰莫太熱乎不幸不救不問彼之有無常住盡禮津送知事或他辭高菴叱之曰昔百丈為老病者立常住爾不病不死也四方識者高其為人及退雲居過天台衲子相從者僅五十輩間有不能往者泣涕而別蓋其德感人如此春渚紀聞云錢塘淨慈寺古道者主供侍病僧寮一日病僧有告之曰我病少愈念少𠒎血為味汝能為我密致之幸甚至暮夜袖血餉僧食之美甚一二日復多以金付之再有所須同寮僧雛窺道者於隙處披其胸取漆盂以利刃刺心血覆盂其上解衣帶纏繞久之開視盂中血凝矣即以蔥醯依前法製之以進病僧僧雛大駭出以所見語其徒且告病僧皆大驚異又見殿堂門延壽堂處涅槃頭忠曰蓋掌涅槃堂事者涅槃堂即延壽堂也雲門偃禪師録云師問僧儞作什麼僧云涅槃頭師云還有不病者麼僧云不會師云恁麼不會不恁麼不會僧無語師云汝問我僧便問作麼生是不病者師指傍僧本師受業之師也受業師見稱呼門敕修清規沙彌得度云引請領沙彌至本師前胡跪合掌本師執刀云最後一結謂之周羅唯師一人乃能斷之我今為汝除去汝今許否答云可爾戒師為沙彌授戒品者敕修清規沙彌得度云戒師用淨瓶灌頂以指滴水於頂上執刀剃頭乃至秉爐請三寶受戒作梵闍梨忠曰沙彌得度時作梵唄者蓋聲明止息喧亂然後方行事敕修清規沙彌得度云作梵闍梨鳴大磬作梵云神仙五通人云云又作云何梵云云場歇又鳴磬作處世界梵梵梵唄也釋氏要覽云梵音梵云唄匿華言止斷也由是外事已止已斷爾時寂靜任為法事長阿含經云其梵聲有五種詳諷唱門聲明處闍梨南海寄歸傳云阿遮利耶譯為軌範師是能教弟子法式之義先云阿闍梨訛也引請闍梨忠曰得度沙彌未諳進退故此闍梨引導之指揮行禮而請戒師受戒焉敕修清規沙彌得度云引請闍梨至戒師前大展三拜乃至引請收坐具起鳴手磬引剃頭人入堂聖僧前三拜次戒師前三拜了就跪云云乃至引請秉爐教沙彌云請師言句汝合自陳汝若不能隨我聲道凡稱某甲處當稱自己名詳如彼行事鈔沙彌別行篇云先請和尚應具儀教云大德一心念我某甲請大德為和尚云云資持記云教云者準須旁人教示今時所謂引請人也專使忠曰專為某事發使非託便故曰專使或又用魯論文字論語云子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為朱熹曰專獨也敕修清規請新住持發專使云庫司會兩序勤舊茶議發專使修書製疏茶湯榜云云所請專使或上首知事或勤舊或西堂首座或以次頭首充之若非知事充專使亦須以下知事一人同去掌財議事備用清規住持涅槃下遺書云須擇能事人充專使如大慧見無盡叢林未致寂寥敕修清規尊宿遷化云主喪請侍者辦事人充專使分路馳送諸山法眷檀越官員遺書唯尊宿相見下語須擇能事人充專使臨濟玄禪師録云師為黃檗馳書去溈山時仰山作知客接得書便問這箇是黃檗底那箇是專使底師便掌帶行侍者忠曰賓客自帶從之人也經國大典注解云帶行率行也敕修清規迎待尊宿云喫茶罷侍者方插香禮拜帶行侍者行者人僕轎從參拜又尊宿遷化對靈小參云喪司維那同小師懷香詣客位拜請主喪人大夜對靈小參乃至主喪人用帶行侍者燒香無則聖僧侍者代之帶行小師敕修清規入院受兩序勤舊煎點云住持寢堂中位兩序勤舊位如常坐侍者帶行小師問訊住持畢兩序勤舊末坐帶行知事敕修清規受嗣法人煎點云若法嗣到寺煎點令帶行知事到庫司會計營辦合用錢物送納帶行僧行敕修清規尊宿遷化請喪司職事云主喪人須存公正不可徇私帶行僧行不得干預執役沙彌翻譯名義集云音義云沙彌二字古訛略也唐三藏云室利摩拏路迦此翻勤策男寄歸傳云授十戒已名室羅末尼譯為求寂最下七歲至年十三者皆名驅烏沙彌若年十四至十九名應法沙彌若年二十已上皆號名字沙彌法苑珠林云沙彌者耶舍傳云隋云勞之小者以修道為勞也又翻息慈謂息世染之情以慈濟萬物也又創佛法俗情猶存須息惡行慈也十誦律云沙彌法者沙彌不應輕慢和尚有所作事皆應白和尚行時當隨從和尚後常供給一切所須隨順和尚意不得有違逆若所作不白和尚不得作除禮佛法僧用齒木大小便沙彌住和尚邊知不能增長善法應白和尚持我付囑某甲比丘和尚應籌量是比丘教化法何似弟子衆復何如若知是比丘具足善法當付囑若知不具足當更付囑餘比丘若和尚不好應捨去應令取草樹葉取果齒木除僧坊中草掃灑授飲食湯藥是名沙彌法人天寶鑑云慈航朴禪師凡童行剃染令入沙彌寮習登壇受戒儀軌及誦遺教經方令受具戒受具畢入新戒寮受持三衣一鉢夜則展坐具披五條而睡復請一精誦戒經者與之教授誦至通利方許參堂越二三夏山門方督掌務願遊方者師必欣然動于眉睫贈道具促其行趙州諗禪師録云師初隨本師行腳到南泉南泉問儞是有主沙彌無主沙彌師對云有主沙彌泉云那箇是儞主師云孟春猶寒伏惟和尚尊體起居萬福傳燈録藥山高沙彌嗣藥山儼章云高沙彌藥山住菴初參藥山藥山問師什麼處來師曰南嶽來云云山便召維那云這跛腳沙彌不任僧務安排向後菴著驅烏沙彌四分律云阿難有檀越家死盡唯有一小兒將至佛所頭面禮足在一面坐佛知而故問此何等小兒阿難具白因緣世尊言何不度令出家答言世尊有制不得度年減十二者是以不度佛問阿難此小兒能驅烏能持戒能一食不若能如是者聽令出家阿難言此兒能驅烏能持戒能一食佛告阿難若此小兒盡能爾者聽度令出家略鈔十誦律作阿難親里二小兒又作能驅僧食上烏未五分律作二小兒大者八歲小者七歲恆教驅食上烏如上座所得食分驅烏小兒亦應等與僧祇律云沙彌有三品一者從七歲至十三名為驅烏沙彌二者從十四至十九是名應法沙彌三者從二十上至七十是名名字沙彌沙喝忠曰日本禪林剃度為沙彌而著喝食之服者稱為沙喝喝食義見下瑞龍山南禪寺方丈有牌開山大明國師時物也題曰闔山清衆七百員沙喝百三十人止此此方沙喝之稱亦舊矣或謂沙彌喝食略言日工集云南禪佛生之辰紀綱預命沙喝裝花亭沙喝行力走山野採衆色草花詳花亭處觀之非沙彌喝食略言童行忠曰童行投佛寺求僧未得度者即少年行者也釋氏要覽云智度論云梵語鳩摩羅伽秦言童子寄歸傳云白衣詣苾芻所專誦佛典求落髮號童子西天出家國無制止但投師允可即和僧剃髮即無童子行者之屬今經中呼文殊善財寶積月光等諸大菩薩為童子者即非稚齒如智論云如文殊師利十力四無所畏等悉具佛事故住鳩摩羅伽地又云若菩薩從初發心斷淫欲乃至菩提是名童子今就此方釋之釋名曰兒年十五曰童童獨也自七歲止十五皆稱童子謂太和未散故南海寄歸傳云凡諸白衣詣苾芻所若專誦佛典情希落髮畢願緇衣號為童子或求外典無心出離名曰學生童行訓誨法詳埀説門訓童行處六學僧傳晉曇徽傳云徽年十二師事安公為童子精神大於其身安使受詩禮又四年乃落髮普燈録天衣懷禪師章云長遊京師依景德寺為童行天聖中試經得度道者忠曰童行又稱道者義堂曰禪家雛道者雖七八歲亦猶於大衆前作法事又曰鹿峯宗輔道者年十三選於衆為楞嚴頭共詳楞嚴頭處僧寶傳天台韶國師傳云十八詣信州開元寺受滿分戒後唐同光中謁舒州投子菴主不契造龍牙遁禪師問天不蓋地不載此理如何遁曰合如是韶惘然固要為説遁曰道者汝向後自會去釋氏要覽云智度論云得道者名為道人餘出家者未得道者亦名道人注道者亦同此説舊説曰渡唐人説中華叢林稱僧道者其得度牒披剃此謂僧未得度牒有髮而與僧同誦經者此謂道即行者也忠曰敕修清規聖節云僧道歲一供帳止此是即僧及道士也然解者謂道是行者非道士輒引渡唐人説非也余左觹中辨童侍即童行也宋高僧傳貫休傳云貫休七歲父母雅愛之投本縣和安寺圓貞禪師出家為童侍日誦法華經一千字耳所暫聞不忘於心僧童即童行也勸善書云宋師贊雍州人為僧童年十四念佛不絶東海一漚集示僧童道秀頌云蔗苗地不腴道秀亦何如童稚無攸往昏蒙可擊虗今年天大旱盈科詎庸需為憐山下水竟弗知所於而矧若爾輩育德少居諸吾詩有新誡似示城南符龍魚各異志爭取怪豫旦聽叫忠曰侍住持左右聽其叫呼受使令者敕修清規亡僧板帳式云方丈聽叫捧香合行者忠曰禪林行者盧能為始爾後凡求剃度而未得買度牒有髮而依止僧寺者稱為行者舊説曰中華行者與日本所謂行者別日本行者剪除鬚髮而行事同俗中華則凡剃髮者唯有僧及沙彌而已如行者則不剃落不披帽其髮岐二長下埀背後又中華行者受五戒五戒本在家所受但第三為不邪淫行者則不淫欲以為異焉昔六祖受衣鉢於黃梅時亦以行者之形矣從行者轉得為僧故有行堂之額題選僧堂者又曰行者有二種謂方丈行者庫司行者也詳見下釋氏要覽云善見律云有善男子欲求出家未得衣鉢欲依寺中住者名畔頭波羅沙未見譯語今詳若此方行者也經中多呼修行人為行者行是所修二種行也者即五蘊假者是能修行之人也凡十六歲已上應呼行者謂男生八歲毀齒十六陽氣全以其有意樂信忍修淨梵行故自晉時已有此人如東林遠大師下有辟蛇行者宋高僧傳南華寺慧能傳云咸亨中往韶陽遇尼無盡藏恆讀涅槃經能聽之即為尼辨析中義尼深歎服號為行者虛堂愚和尚録示行者智潮法語云優婆塞者吾佛會中四衆之一數也精持苦行承事佛僧先道業而後得度世尊入滅道法遐被五天竺國佛舍僧廬莫不有之逮教入中國譯梵語而正唐言名之曰行者蓋有德有行之所稱也其數既廣漢唐以來設官置局試經得度至於海內奇髦俊彥冒歷寒暑窮經討論以試所業其間獲中僧科者官給黃牒剃度為僧然後肩雲頂絲履艱涉險不憚數千里之遙尋師訪道究明人天性命之學醞釀既久文彩發露王臣尊禮為人天師一言一句光明殊勝為後世法此古今通論出家兒之大體也南渡之後為見吾教日興出綾紙易楮幣庶欲得者寡而入者稀殊不知物隨事變一墮利域百計紛拏以謀進納之計得之者形服雖殊升沈事海失之者窮困相煎老斃山澤要如前人優遊教海披尋文義試所得而披法服者無復得也忠曰翻優婆塞曰行者未知何據忠曰如日本今時行者帶妻啖肉全非求僧也然中華上古行者有復帶妻者傳燈録池州甘贄行者嗣南泉章云有住菴僧緣化什物甘曰若道得即施乃書心字問是什麼字僧云心字又自問其妻什麼字妻云心字甘云某甲山妻亦合住菴其僧無語甘亦無施聯燈會要亡名尊宿云昔溈山有一僧下山覓住處偶宿一行者家者問上座何處去云覓箇住處者書佛字問這箇是甚麼字云佛字者却喚妻子問是甚麼字妻云佛字者云上座與拙室見解一般爭解住得其僧却回溈山趙州諗禪師録云有俗行者到院燒香云云已稱俗蓋亦是帶妻子者義堂日工集云圓覺行者實恩至戒其勿帶刀器謂行者是僧之基豈可自棄哉行堂忠曰行者居行者堂故以居呼人又曰行堂也若呼居處為行堂則行者堂也見殿堂門敕修清規尊宿遷化祭次方丈行者六局行者之次有行堂解者曰此公界行堂也中峯本禪師録示行堂偈云至道常湛然萬古絶成壞良由妄想生輪回三有界行堂主行者堂之主首或單稱堂主敕修清規為行者普説曰參頭堂主詣侍司同請住持下行堂六局行者敕修清規尊宿遷化祭次有六局行者舊解闕品字箋云局曹也部分也曲禮各司其局也忠曰六局古無解蓋謂六頭首歟六頭首所屬行者故云六局行者歟且闕疑六頭首者禪苑清規列首座書狀藏主知客庫頭浴主云已上並為六箇頭首執局行者敕修清規迎待尊宿云方丈執局及參頭領衆行者人僕轎番以次參拜又開堂祝壽云展賀畢據座侍者小師插香大展三拜次執局行者插香禮拜次參頭領衆行者插香禮拜忠曰方丈及六局行者就諸職者此謂執局也次言參頭領衆行者是無職掌者參頭行者行者中高年舊參者首于諸行者曰參頭行者又有四來參頭見前參頭處敕修清規訓童行云參頭行者令喝食行者報各局務行堂前挂牌報衆副參行者忠曰副二參頭事務者又有四來副參見前副參處敕修清規為行者普説云參頭報衆請兩序立班副參領衆門迎兩序入堂望參南禪寺往昔有望參之行者若副參闕則此人將補之故曰望參猶如副寮之有望寮焉堂司行者維那為堂司而此行者屬堂司受其使令故名堂司行者敕修清規堂司特為新舊侍者茶湯云維那令堂司行者請新舊侍者并聖僧侍者參前就寮獻湯客頭行者屬知客受其使令者敕修清規知客云凡官員檀越尊宿諸方名德之士相過者香茶迎待隨令行者通報方丈然後引上相見又云或欲詣方丈庫司諸寮相訪令行者引往忠曰此皆知客寮客頭行者也方丈行者舊説曰行者有兩部謂方丈行者庫司行者也敕修清規上堂云方丈行者覆住持次覆侍者鳴鼓又尊宿遷化祭次六局行者上有方丈行者又侍者進退云與舊人交代頭首禮同方丈行者直廳轎番拜賀庫司行者見方丈行者處禪苑清規庫頭云當庫行者須有心力解計算守己清廉言行真的衆所推伏方可委付方丈客頭行者請客侍者所使令者敕修清規專使特為新命煎點云兩序單寮係方丈客頭同專使行者一一詣寮稟請又方丈特為新舊兩序湯云請客侍者令客頭行者備盤袱爐燭詣新舊前堂首座處庫司客頭行者都寺寮客頭行者也敕修清規山門請新命齋云庫司客頭鋪設僧堂內住持位又庫司四節特為首座大衆湯云都寺預於齋退具湯榜即令客頭行者備盤袱爐燭詣前堂首座前插香庫子副寺寮行者屬副寺造單具收支者見副寺處又見前地客處及雜行門公差處或曰禪苑清規所謂當庫行者是也見庫司行者處茶頭行者茶頭在四寮庫司頭首單寮蒙堂見殿堂門四寮處故茶頭行者亦可在四寮又見茶頭處敕修清規寮元云每日粥罷令茶頭行者門外候衆至鳴板三下喝食行者禪苑清規赴粥飯云十聲佛罷良久打槌一下首座施食粥云粥有十利云云齋云三德六味云云饡飯云施者受者云云施食訖行者喝食入喝食須言語分明名目不賺若有差誤受食之法不成須令再喝永平清規赴粥飯法云喝食行者先入前門向聖僧問訊訖向住持人前問訊住持人訖到首座前問訊訖到前門內南頰板頭之畔面向聖僧問訊訖叉手而立喝食瑩山清規云聞展鉢槌喝食童行入堂聖僧主人首座前問訊罷經聖僧後到南頰版頭問訊待首座施食呪願了喝食如常南禪規式云旦望喝食二人列立僧堂門右邊同音喝食粥則曰飲湯次白粥次汁菜次再請次潑水或云鉢水次折水折者棄義齋則曰香飯次汁菜次再請次請折次潑水次折水次第喝之如粥時飲湯低聲而永曳蓋表大衆謹慎也若四節則請上座喝之或闕其人則新戒轉上座唱之隨唱某物參頭行者低聲報鈴之沙喝粥畢自聖僧龕右邊轉左至首座前問訊高聲唱曰請首座大衆祝聖諷經畢下堂舊説曰喝食者喝是唱義當衆僧齋粥時唱喝湯香飯等名古説曰喝者其音速烈者如日本禪林齋粥二時喝食之聲則只是唱食而非喝食忠曰或見禪機下咄喝聲緊烈作此説可笑清規云長聲喝緩聲喝豈怒聲義耶舊説曰喝食行者屬方丈行者分二類謂方丈及庫司也住持上堂立班侍者之後又曰日本禪林有髮童子稱喝食者綺羅鉛粉恧口言飯羹名實相失有如此者可笑古德曰喝食者喝大衆喫飯也或曰往昔東福寺齋時喝食人候其飯羹等盡未盡以異名呼之鹽稱柳絮之類供頭即行益焉今時司席人指揮供頭故喝食名義到有無識者忠曰禪苑清規已言喝食言語若有差誤受食之法不成須令再喝止此依此則喝大衆喫飯之説為當矣但可依敕修清規喝言請大衆下鉢見受嗣法煎點處此語不明實應受食不成豈有但誤唱飯羹等而受食不成之義哉然初喝請大衆下鉢次第喝香飯羹菜等可如南禪規條敕修清規訓童行云凡旦望五參上堂罷參頭行者令喝食行者報各局務行堂前挂牌報衆云云如住持他緣則喝食行者喝云奉方丈慈旨晚參衆云不審次長聲喝云放參衆云珍重問訊退又亡僧板帳式云喝食行者撮鬮又大坐參云若不晚參則堂司行者進首座前問訊云堂頭和尚今晚放參轉聖僧後右出令喝食行者中立問訊長聲喝云放參忠曰按此敕修清規數條皆是粥飯喝食之外有名喝食行者者明矣然舊説曰非有定行者名喝食者只臨時掌此職者為喝食行者而已止此此無稽之談不可取也日本禪林喝食權輿有數説未知孰是一説曰始於東福聖一國師法嗣雙峯源公東福塔頭桂昌院開祖也一説曰聖一法嗣無外然公稱應通禪師是為喝食之始忠曰此時喝食不拘齒老少但掌其職而已非如今時喝食但少年者何以知之如無外初稱道空房蓋更教入禪者其豈少年耶一説曰東福開山時有監寺勤舊死後現形於僧堂請聖一國師曰我某監寺也某平生希望秉拂分座而事未果遽死今也託生山前某家願和尚他後允為頭首言畢不現國師訪求山前民家果産一男子國師囑曰此是某監寺後身善能撫育焉稍長取之訓導某額所埀髮剪刀斷之令掌喝食後居實相寺是喝食之始忠曰今時喝食分取額上髮少許下埀額面剪斷其末蓋此故事歟又左右髮抽取少許下埀左右肩前此是中華行者岐髮下埀之遺法歟一説曰大覺禪師法嗣桃溪悟公宏智禪師為喝食之始傳説曰天龍開山時名公巨卿之子求僧入寺未堪剃度受具者皆為喝食忠曰蓋失喝食名實者起於此僧祇律衆學法中看大衆食遍不遍者名監食人又行益者名行食人供頭行者忠曰粥飯時行益飯羹茶果等者或但稱供頭敕修清規兩序進退云堂司行者喝云大衆送新知事歸庫司供頭行者鳴僧堂鐘住持送入對觸禮一拜敕修清規念誦云住持入堂供頭鳴堂前鐘七下又亡僧板帳式有供頭又坐禪云令供頭僧堂內裝香點燈忠曰此方供食果人名言給仕訛矣當稱供頭按給仕法華經安樂行品云天諸童子以為給仕不動經云如親友童子給仕行人給侍慈覺龜鏡文云為衆僧給侍故有淨人給使搜神記云朱誕給使妻有鬼病其夫疑之為姦趙與時賓退録云市民間子女以備給使皆在人左右辨事之泛稱不可局供茶飯之事矣蓋給仕與供頭音似近故有此轉訛普燈録月菴果禪師章謝供頭上堂云解猛虎頷下金鈴驚群動衆取蒼龍穴裏明珠光天照地山僧今日到此讚歎不及汝等諸人合作麼生豎起拂子曰眨上眉毛速須薦取擲拂子下座應菴華禪師録示璋供頭法語云本色道流夙有般若種智才出頭來其氣槩徑直於最初一步卓然超絶與泛泛者不同蓋末上親近真正宗匠至於一言半句終不妄誕然此一段事初非明悟知見可擬又豈是世智辨聰而能倣佛者哉是故羅山云上士腳才跨門便知宗旨猶怕繩牀上老漢瞌睡更回頭與一探若是作家暫挂瓶盂亦恐繩床上老漢瞌睡未醒口裏水漉漉地不是泊船處便去俗人家寄宿去看他透底人驀露箇消息直使天下衲僧無絲頭許湊泊亦不令守住無湊泊蹊徑所謂驅耕奪食手段誠間世而出又安可與時輩和泥合水瞎學者眼耶供過行者即是供頭行者禪苑清規延壽堂主云病僧如欲沽酒下藥及以浸藥為名當以禁戒因果善言開諭嚴戒供過行者剪剃針線之人不得潛隱藏帶酒肉入堂詳前延壽堂主處癡絶沖禪師蔣山録上堂云舉顯英首座見慈明明問云近離甚處英云金鑾明云夏在甚處英云金鑾明云去夏在甚處英云金鑾明云前夏在甚處英云金鑾明云先前夏在甚處英云和尚何不領話明云我也不會勘得儞教庫下供過兒子來勘且點一碗茶與儞濕口直殿行者守佛殿行者敕修清規聖節云堂司行者直殿行者常加伺候毋令怠慢衆寮行者大鑑清規栴檀林須知云寮行者常常在寮凡事聽寮元主副號令如新來副寮未知行者詳細白知每日點茶之湯行者管寮主提點之門頭行者羅湖野録云死心住黃龍山揭榜于門曰仰門頭行者賓客到來劃時報覆詳殿堂門三門處監作行者忠曰名義見前監作處蓋即監作也敕修清規知浴云第四通人力入浴監作行者知事居末浴又亡僧送亡云庫司預分付監作行者辨柴化亡淨人舊説曰淨者非自淨之義能代他而淨他也忠曰淨人投寺未得剃染給使衆僧者釋氏要覽云毗奈耶云由作淨業故名淨人若防護住處名守園民或云使人今京寺呼家人緣起者十誦律云瓶沙王見大迦葉自踏泥修屋王於後捕得五百賊人王問汝能供給比丘當赦汝命皆願王遂遣往祇園充淨人謂為僧作淨免僧有過故名淨人又梵云吃栗多唐言賤人今見童行自稱淨人蓋不知端也慈覺龜鏡文云為衆僧給侍故有淨人又云寬而易從簡而易事所以報淨人也又云禁之不止命之不行非淨人所以順衆也又云專尚威儀宿無善教非所以報淨人也六學僧傳宋常覺嗣歸宗章傳云覺遊廬山樂其間靜遂投歸宗寺出家為淨人梁乾化二年始易形服從剃染高峯妙禪師録志藏淨人煆骨語云一大藏教全體是火若有嶺南靈骨便好赤身擔荷雖然更入紅爐重煆過明極俊禪師録示智有淨人偈云智妙玄機有也無須從槽廠著工夫一朝踏碓忘移足肯許傳衣與老盧苦行忠曰淨人亦名苦行傳燈録天台豐干禪師章云師居天台山國清寺本寺廚中有二苦行曰寒山子拾得二人執爨終日晤語潛聽者都不體解時謂風狂子獨與師相親宋高僧傳常覺傳云洎登弱冠往廬山乃禮歸宗寺禪師克苦行焉忠曰六學僧傳常覺傳作淨人見淨人處僧寶傳雪竇顯禪師傳云有苦行名韓大伯者笑知客智眼未正詳前典客處五戒五戒者行者也但受五戒未剃染者義楚六帖云行者五戒律云行者依師先受五戒修行之者近事堪可承事比丘羅漢故名為行者五戒故名為五戒示名趙州諗禪師録十二時歌人定亥云劉維那趙五戒口頭説善甚奇怪石溪月禪師雜録為智舉五戒下火語云天台臨海舉五戒靈隱堂中幾歲華掃地添爐新活業拾薪供水舊生涯不憂衣鉢不入手且喜身心已出家舉五戒劫火洞然無退轉却來領取一袈裟毛頭日本月菴光禪師録志杲毛頭請自贊云三尺吹毛當面提起杲日照天清風匝地又宗聑毛頭請自贊云利劍高提殺佛殺祖死中得活是尋常空手誰擊塗毒鼓忠曰毛頭未詳蓋淨人毛髮者淨髮待詔類乎淨髮待詔見靈山業識團主喪忠曰自代亡人指揮後事總主領喪事者其職甚重敕修清規尊宿遷化云請人主喪須諸山名德鄰封老成或法眷尊長或只本寺首座如有遺命遵行舉請又請主喪云主喪人至鳴大鐘集衆門迎至龕前炷香首座大衆問訊又云凡主喪者須老成名德如圓悟為開福寧和尚主喪接月菴果公以嗣其法可為標格校定清規云鄰封當代歸寂如請主喪一看亡者遺言二者其徒虔請尤宜審及若亡者遺言固不可辭非其徒虔請如得回互最逃謗議切不可有心希酬謝也事稍違式多致爭訟有玷法門如圓悟與寧道者主開福之喪接月菴果一人便是承當後事之標格也東漸略清規云凡喪主須老成宿德圓悟為開福寧主喪宏智作書遺大慧禪師屬以後事晦堂祖心入滅命門人黃庭堅主後事豈可忽乎龐居士請于為喪主宗鏡録云昔有龐居士命女靈照曰吾當先逝汝可後來專候日中可蛻斯㲉靈照曰午即午矣有蝕陽精居士怪之自臨窗下其靈照忽爾回登父座俄爾坐亡居士笑云甚為鋒捷空華落影陽焰翻波吾道于先吾行于後遂往于相公為喪主告于公曰但願空諸所有慎勿實諸所無言訖而逝有緣禪師囑楊習主喪六學僧傳唐有緣傳云宣宗皇帝嘗戲書其衫背云此童子與朕有緣由是名之有緣而剃落焉天祐丁卯歲終時司空楊公習方制置浙右遺命主後事雪峯遷化玄沙為喪主聯燈會要玄沙備禪師章云雪峯遷化師作喪主三朝集衆煎茶師於靈前拈起一隻盞云先師在日即且從汝道如今作麼生道若道得即先師無過若道不得即過在先師還有人道得麼如是三問衆無對師撲破盞子歸寺香林遠禪師寂宋璫主喪普燈録香林遠禪師章云知府密學宋公璫請至普安院安下云云示衆訖坐逝府主為師作喪主黃龍心禪師命山谷主喪雪堂拾遺録云山谷嘗問道於晦堂晦堂入滅山谷主後事請勝寺長老秉炬而火不爇山谷顧謂死心曰老師之意無他蓋欲這風顛漢説數句死心曰某拘喪制中拒不出山谷強之死心執炬曰不是殃門纍及我彌天過犯不容誅而今兩腳捎空去不作牛兮便作驢遂以火炬打一圓相云只向這裏雪屈攛下火炬應手而爇大慧為宏智主喪人天寶鑑云大慧主育王一日執宏智手曰吾二人偕老矣爾唱我和我唱爾和一旦有先溘然者則存者為主其事越歲宏智告寂大慧竟為主喪不逾盟也不逾盟逾恐渝叢林盛事亦云宏智入滅妙喜主後事月林觀禪師滅陳貴謙作喪主無門開禪師嗣月林師觀録告香普説云先師圓寂後陳提刑諱貴謙作喪主臨時令為先師挂真詳喪薦門挂真處教家善無畏化詔李現護喪編年通論云開元二十三年三藏善無畏卒春秋九十有九詔鴻臚丞李現監護喪事儒家梁明山賓卒昭明使王顒監護喪事詳喪薦門舉哀處君實卒詔程伊川主喪程子遺書云司馬溫公薨朝廷命伊川為主喪事子瞻周視無闕禮乃曰正叔喪禮何其熟也押喪送亡之時鎮行列之最後者為押喪人義見喪薦門押喪處敕修清規亡僧板帳式云首座主喪都寺押喪喪司書記凡喪事山門公界職事外別請喪司職事並加喪司兩字擇于公界如公界職事稱山門書記見職書記山門維那現職維那等敕修清規云議請喪司職事書記維那知客侍真侍者校定清規云次商議請諸執事人掌財或二人喪司維那書記知客侍者即四人請執事如尋常請人禮喪司維那見喪司書記處喪司知客見喪司書記處侍真侍者即喪司侍者侍于靈者見喪司書記處敕修清規尊宿入塔云山門維那送見職侍者侍真侍者歸衆寮喪司行者敕修清規尊宿遷化云如有親書遺言喪司行者貼法堂中間上手幕上直靈行者敕修清規亡僧云直靈行者每日上粥飯第八類身肢門周羅髮敕修清規沙彌得度云戒師用淨瓶灌頂以指滴水於頂上執刀剃頭乃至本師執刀云最後一結謂之周羅唯師一人乃能斷之我今為汝除去汝今許否答云可爾行事鈔沙彌別行篇云與剃髮時當頂留五三周羅髮來至和尚前互跪和尚問云今為汝去頂髮可不答言爾便為除之資持記云周羅經音義云此翻為小梵僧云小髻也留五三者趣舉其數留一亦得準知落髮本是和尚恐其煩久故令闍梨為除餘者但留少許和尚親落釋氏要覽云周羅髮即今親教和尚最後為剃頂上髮也梵語周羅此云小結且三界九地煩惱見修所斷有八十一品即第九地末品煩惱名小結微細難除今此頂髮喻彼煩惱九十六種外道皆不能盡除唯佛弟子能斷故親教師最後剃者表為除殘結令出三界故玄應經音義云周羅此譯云小謂小髻也上肩日用軌範云以上肩順轉注謂左肩也忠曰己身之左為上肩己身之右為下肩其己身左為上義詳禮則門上肩順轉處又曰凡上肩下肩有二義其自他相望以上位下位為上肩下肩者別見座位門下肩忠曰己身之右也上肩處箋觸指日用軌範展鉢法云以兩手大拇指迸取鐼子從小次第展不得敲磕作聲仍護第四第五指為觸指不得用忠曰上廁畢洗淨時用第四第五指故常以此二指為觸指不用觸者污也雖左右四五為觸指就中洗淨用左日用軌範故特忌左手四五指矣第九類叢軌門叢軌不止視篆開堂之類凡禮則埀説報禱喪薦無非叢軌矣今就中更條分類從貴易撿尋焉又諸清規所列詳細行事皆是叢規若逐一舉之不若但從頭閲清規故今特撮其中名色顯著者出世禪士得法之後隱退長養一旦龍天推轂而住大小寺院此謂出世焉蓋比佛世尊之瑞于世其為代佛揚化也其所住寺院須奉綸命公帖方著黃紫之服世俗遂見著黃紫以為出世可笑舊説曰自首座轉西堂可謂之出世自諸山轉十剎不可謂之出世忠曰諸山轉十剎如清拙由南禪住臨川聯燈會要南泉願禪師章云有一菴主人謂之曰南泉近日出世何不去禮拜主云非但南泉直饒千佛出興亦不去師聞令趙州往勘之州才見菴主便作禮主不顧州從西過東從東過西而立主亦不顧州云草賊大敗拽下簾子便行舉似師師云我從來疑著這漢法華經方便品云諸佛世尊唯以一大事因緣故出現於世入院出世入某院也敕修清規入院云古人腰包頂笠到山門首下笠入門炷香有法語就僧堂前解包屏處濯足取衣披搭入堂炷香云云其如彼視篆舊説曰中華寺院有其寺印如天童印以玲瓏巖主四字篆刻凡住持退院時小軸列書闔山大衆名軸尾使寺印又別片紙打寺印不動其紙貼印仰之納于印籠若少動印則所粘紙可破唐紙易破是闕住之際禁盜挂搭之法也住持封其印籠託都寺令傳後住之人都寺至新住持入寺日於室間度與之忠曰日本禪剎皆亦有寺印敕修清規入院云知事捧呈寺印新命看封付知事開封新命視篆唐書百官志云節度使入境州縣齎印迎于道左視事之日設禮案三日洗印視其刓缺潛確類書云職官分紀節度使視事三日洗印視其刓缺故曰視篆又曰滌篆篆印也仕滿曰解篆滌篆視篆亦曰滌篆見視篆處舊説曰小器盛水備傍削細木以為滌印之用拈衣敕修清規受請人升座云若新命是嗣法弟子住持付法衣有法語披衣又開堂祝壽云如受請時未拈衣當舉法語披衣畢舊説曰衣表信而已不可數拈之又曰凡開堂拈法衣一生當唯一度也昔慈氏和尚入寺公方義滿請拈衣答曰貧道嘗在鎌倉一回拈黃梅衣今若再拈近乎衒名不可也日工集云義堂受南禪鈞帖三會院大義來曰先師所留金襴洎先祖法衣二頂當探府君意以入寺日護送堂曰按清規凡入院有嗣法之師送法衣至則拈衣佛事乃披為嗣法之信不復還於師處今則不然吾先師嘗以衣為爭端留在三會院不許外出然先師滅後好名者出而披之誇入院觀瞻不為玩弄哉余昨告府君曰無相為衣况嘗拈黃梅所傳衣耶固辭又按無準行狀破菴遷寂之日以密菴法衣及頂相等付無準準不受惟領圓悟墨迹及密菴法語蓋不必貴衣故曰衣表信而已東漸清規曰如初出世人在別處受請已拈衣有法語此處更不重疊如未拈出當先拈衣有法語然後披衣一家宴入院不請列剎名為一家宴宴亦作燕宴筵或不局入院凡不請他寺皆一家宴也五祖演禪師四面録云結夏無可供養大衆作一家宴管顧諸人遂擡手云囉邏招囉邏搖囉邏送莫怪空踈古林茂和尚永福録舉五祖作一家燕又小參云開東山家筵南浦明禪師崇福録舉五祖作一家宴物初觀禪師智門録云山僧未免作一家宴以當賞勞清拙澄禪師録小參云山僧未免將無作有作一家宴也要大家暖熱開堂敕修清規云古之開堂朝命下或差官敦請或部使者或郡縣遣幣禮請就某寺或本寺官給錢料設齋開堂各官自有請疏及茶湯等榜見諸名公文集近來開堂多是各寺自備至時入院其規詳清規祖庭事苑云開堂乃譯經院之儀式每歲誕節必譯新經上進祝一人之壽前兩月二府皆集以觀翻譯謂之開堂前一月譯經使潤文官又集以進新經謂之開堂今宗門命長老住持演法之初亦以謂之開堂者謂演佛祖正法眼藏上祝天算又以為四海生靈之福是亦謂之開堂也春明退朝録云太平興國中始置譯經院於太平興國寺延梵學僧翻譯新經始以光祿卿湯公悅兵部員外郎張公洎潤色之後趙文定楊文公朝文莊李尚書維皆為譯經潤文官天僖中宰相丁晉公始為使天聖三年又以宰相王冀公為使自後元宰繼領之然降麻不入銜又以參政樞密為潤文其事寖重每歲誕節必進新經前兩月二府皆集以觀翻譯謂之開堂亦唐之清流盡在也前一月譯經使潤文官又集以進新經謂之閉堂慶曆三年呂許公羅相以司徒為譯經潤文使明年致仕章郇公代之自後降麻入銜湘山野録云景祐中景靈宮鋸傭解木木既分中有蟲鏤文數十字如梵書旁行之狀因進呈仁宗遣都知羅崇勳譯經潤文使夏英公竦詣傳法院特詔開堂導譯每聖節譯經則謂之開堂冀得祥異之聯燈會要香嚴間禪師章云師開堂日溈山令人送書并拄杖到師接了云蒼天蒼天僧問和尚為甚如此師云只為冬行春令已下略録先入院後開堂者禪苑清規入院云至晚小參三日為準次日早晨看官次第人事擇日開堂佛果擊節録云第二代保壽參前保壽後前保壽遷化祝三聖云且令作山主住十年始得開堂後三聖作請主令開堂開堂日三聖推出一僧保壽便打三聖云恁麼為人瞎却鎮州一城人眼去在壽便歸方丈慈受深禪師慧林録云師宣和三年五月五日入院五月二十二日就大相國寺中三門上開堂密菴傑禪師徑山録云淳熙四年正月初七日在常州華藏受請次有入寺上堂次云淳熙四年五月初十日恭奉聖旨就景德靈隱禪寺開堂又靈隱録云淳熙七年六月二十四日在徑山受請次有入寺上堂次云淳熙七年八月二十九日恭奉聖旨就本寺開堂已下略録先開堂後入院者楊岐會禪師録云住潭州雲蓋山海會寺於興化寺開堂雲峯悅禪師翠巖録云師在同安受翠巖請在上藍開堂次云師入山大衆出接入院升座大慧杲和尚年譜云紹興七年丁巳師四十九歲張浚造朝遂以臨安府徑山延之七月十七日至臨安二十一日開堂於明慶寺二十四日入院又云紹興二十八年戊寅師七十歲正月初十日被旨遷住徑山二月二十八日就靈隱寺開堂三月初九日入院已下略録入院開堂同日者五祖演禪師海會録云師入院開堂日僧問白雲山下祖令當行如何是祖令師云一二三四五學云恁麼則昨日太平今朝海會師云高著眼忠曰今時入院開堂例在同日凡新命自入門到視篆草賀為入院也自後法座祝聖壽為開堂也虎關鍊禪師禪儀外文序云唐宋之間迄于汴京入院開堂兩也南渡後合為一焉是我門之大儀也以故疏榜出焉忠曰如上所録保壽在五代時楊岐雲峯慈受在宋南渡已前大慧密菴在南渡已後而皆入院開堂隔時月別行之五祖演禪師在南渡已前而入院開堂同日行之故外文序所言未必如此矣開堂就三門行之者如前録慈受又僧寶正續傳佛鑑勤禪師傳云政和二年有詔請住東都智海十月九日就大相國寺三門開堂就本寺開堂如前録密菴住靈隱有請首座開堂者聯燈會要含珠哲禪師章云師因檀越請堂中首座開堂主事報師師云是即是欠悟在首座聞得束裝而去師拈拄杖隨後打出有尼師開堂者聯燈會要談空和尚章云有尼欲開堂師云儞有五障不得開堂尼云龍女成佛有幾障師云龍女現十八變儞試變看尼云不是野狐精變箇甚麼師便打又祝聖之外有新堂慶讚稱開堂者明極俊禪師録勝因寺慶讚觀音開堂普説云由是涓卜今月二十七日吉旦命諸山宿德安寶座點光明標懸寺額仍命建長住持比丘升于寶座舉唱宗乘謂之開堂演法慶贊妙嚴樓閣觀音聖像又新法堂開堂普説云大日本國相模州巨福山建長禪寺新造法堂成主事者與大檀越敦請當寺住持某於結制日升此寶座普説一切法要謂之開堂演法開堂敘得法普燈録五雲悟禪師章云乾道戊子秋回冷泉為西堂十二月望示微疾至二十四夜請堂頭首座龍華本禪師為衆普説敘師出處及得法注師未開堂故也忠曰堂頭當作堂中祝聖拈香劉熙釋名云拈黏也兩指翕之黏著不放也忠曰拈香者拈起香而燒之也忠曰開堂拈香祝天子蓋葉縣神鼎為始葉縣省禪師録云師開堂捻香示衆云此一瓣香不從他方得即汝州水土然願皇帝萬歲重臣千秋文武百僚常居祿位忠曰此録無別嗣法香其不從他得等似寓嗣法意又以臣僚香合拈往時朴略如此神鼎諲禪師録云開堂日拈香此一炷香奉為今上皇帝聖壽無疆爾後香語稍文有對語四六見演祖佛眼等録將軍拈香忠曰日本禪林開堂祝聖香次必有為將軍拈香約翁儉禪師建長録祝聖香次拈香云此一瓣香爇向爐中奉為征夷大將軍增崇祿算伏願華夷一致車書混同八埏風清四海浪靜鏡堂圓禪師圓覺録征夷大將軍香云伏願壽山高聳福海淵深永佐聖明長居祿位臣僚拈香忠曰開堂為官僚拈香亦葉縣神鼎為始神鼎諲禪師録祝聖香次云第二炷香為府主學士合郡尊官伏願長光佛日永佐明君敕使拈香忠曰如大德妙心兩剎敕差住持故開堂日天使臨法筵便為敕使拈香檀那拈香忠曰日本禪林開堂為大檀那拈香蘭溪隆禪師建寧録丞相文武官僚香次拈檀越最明寺禪門香約翁儉禪師建長録將軍香次拈香云此一瓣香爇向爐中奉為本寺大檀那最勝園寺殿伏願除細行之枝蔓窮大德之淵源福海愈廣壽山彌堅嗣法拈香忠曰開堂為師拈香發露得法所由興化獎禪師為始又信香見器物門興化獎禪師録云師開堂日拈香云此一炷香本為三聖師兄三聖為我太孤便合承嗣大覺大覺為我太賒我於三聖處會得賓主句若不遇大覺師兄洎乎誤却我平生我於大覺處喫棒見得臨濟先師在黃檗處喫棒底道理此一炷香供養我臨濟先師石門山慈照禪師鳳巖集云師嗣首山念師開堂拈香云西天二十八祖唐土六祖過去聖人盡得傳衣付法至唐代六祖之後得道者如稻麻竹葦不傳其衣只傳其法皆以香為信今日一瓣香為什麼人通信某甲雖不言大衆已委悉爇此一炷香也祖庭事苑云世典所謂人而無信不知其可也曰大車無輗小車無軌其何以行之哉是以釋氏之作佛事未嘗不以拈香為先者是所以託香而表信經曰信是道源功德母長養一切諸善根此其意也今開堂長老必親拈香者以所得之法必有所自所行之道其外衛者必藉乎王臣俾福慧雙資必圖報於此日豈偶然乎敕修清規開堂祝壽云拈香祝聖次拈帝師省院臺憲郡縣文武官僚香侍者逐一度香惟法嗣香住持懷中拈出自插爐中普燈録諸方廣語本覺法真一禪師示衆云古人雖則遍參知識承嗣燒香只為最初發明之師非是別底不如此人揀人承嗣蓋不忘本也今時見人曾參某人却不承嗣却承嗣某人便謂前人不如彼人生輕重心又有般底或受他摩捋或希他勢望便忘本逐勢既負漸怍欲釋人非返生毀謗如斯之輩閻羅王未放儞在古人接得弟子却指令承嗣他人則睦州與雲門大愚與臨濟是也不似今時勾爬人家男女硬斷送與三間屋子令承嗣他若總如此佛法豈得殊勝敗壞宗門有現世報者自不省耳有數回拈嗣香者圓悟勤禪師金山録云此一瓣香佛眼也覷不見江淮十載受盡辛勤一旦白雲打破漆桶六處忝領大剎七回拈出此香奉為蘄州五祖山真慧禪院第十二代演禪師以酬法乳又次雲居真如禪院開堂為演禪師拈香虗舟度禪師徑山録云拈香云此一瓣香三十年八回拈出更看末後殷勤奉為前住常州褒忠顯報華藏禪寺先師無得和尚爇向爐中用酬法乳之恩中巖月禪師建長録云此香本無許多五回拈出供養金華草堂先師有為曾見知識拈香者義堂信和尚曰東福白雲和尚嗣香之次更拈香云供養曾所見諸知識從香忠曰開堂祝聖侍者插瓣香更拈一炷或新住持為嗣法師親插爐却中立侍者進更撮香炷並謂之從香舊説曰從者副也檀弓所謂涕之無從之從也或曰從者隨也小瓣香隨從大瓣香之後故東福則左手插大香未放手而右手燒從香矣可式也禮記檀弓云孔子之衛遇舊館人之喪入而哭之哀出使子貢説驂而賻之子貢曰於門人之喪未有所説驂説驂於舊館無乃已重乎夫子曰豫鄉者入而哭之遇於一哀而出涕豫惡夫涕之無從也小子行之疏謂我感舊館人恩深涕淚交下豈得虗然客行更無他物易換此馬女小子但將驂馬以行之副此涕淚敕修清規聖節云侍者接香以左手插爐中右手拈從香一炷略問訊校定清規告香入室請益云再進前燒大香一片有處初請開示前不燒香但同大衆問訊便往請開示因緣此際燒大片香又燒小片謂之從香行香忠曰有巡堂燒香曰行香有出班上香曰行香有官人來寺行香曰行香有施主自來寺行香曰行香漢書高帝紀行田宅注蘇林曰行音行酒之行猶付與也止此諸韻書欠此訓已下録巡堂燒香曰行香者敕修清規聖節云燒香侍者覆住持來早上堂至五更住持行香回再覆忠曰住持巡堂燒香在朝暮二時故敕修清規鐘云殿鐘住持朝暮行香時鳴七下止此蓋住持人巡庫堂韋天東司烏瑟砂摩明王山門觀音浴室跋陀婆羅菩薩僧堂聖僧炷香尚直編云行中仁禪師每旦行香至世尊前於小合中別取好香一炷進之詳器物門大香合處已下録出班上香曰行香者備用清規達磨忌云行者鳴行香鈸維那轉身爐前揖住持上香云云已下録官人來寺行香者僧史略行香唱導云香也者解穢流芬令人樂聞也原其周人尚臭冥合西域重香佛出姬周遠同符契矣經中長者請佛宿夜登樓手秉香以達信心明日食時佛即來至故知香為信心之使也大遺教經曰比丘欲食先燒香唄讚之又經中蛇呼比丘自説宿緣令為懺悔并將仙提來取我行香此方教法既行經律散漫故安法師三例中第一是行香定座上講斯乃中夏行香之始也後魏及江表皆重散香且無沿革至唐高宗朝薛元起李義府奉敕為太子齋行香因禮奘三藏又中宗設無遮齋詔五品以上行香或用然香薰手或將香粖遍行謂之行香後不空三藏奏為高祖太宗七聖忌辰設齋行香敕旨宜依尋因多故不齋但行香而已文宗朝中書崔蠡上疏曰國忌設齋百官行香事無經據伏請停廢敕曰崔蠡所奏遂遺討尋本末禮文令式曾不該明其兩京天下州府國忌於寺觀行香今後並宜停罷嘗試論之崔蠡言無經據者蛇之行香豈無經也安公引教設儀豈無據也敕曰討尋本末禮文令式曾不該明者三代之禮何嘗言飯釋子而行香耶且令式唯是歷代沿革之法律如代宗後之條格豈標在隋末唐初之令式乎矧以禮出儒家詎可將釋書為據事因釋氏無宜用儒典為憑就體證之方曰合理儒流不許還引儒書何異獄訟之人召親黨而作證若欲除廢其無辭乎夫孝子事祖考唯善是從徇葬不益於生生固宜寢也行香是薦於冥漠知無不為觀文宗薄於祖宗宜其寄坐矣或曰何必行香為通曰如周之尚臭燔柴血膋薌蕭言天歆其臭也天豈食血膋薌蕭之氣耶由人尚其臭故以臭而事天也若然者佛教重香寧可奪乎况百官行香代君也百官事祖宗亦臣子也苟欲廢之如忠孝何宣宗即位再興斯道大中五年敕京城及外州府國忌行香並須清潔不得攜酒肉入寺烹炮既失嚴恪之心頗乖追薦之道云自此至于哀帝行香如舊朱梁廢唐七廟方止開平三年大明節百官入寺行香祝壽後還薦祖宗行香于今不絶晉天福五年竇貞固奏國忌宰臣跪爐百官列座今欲宰臣跪爐百官立班行香後飯僧百人永為常式宋太宗淳化三年虞部員外郎李宗訥奏國忌行香請宰臣已下行香後禁酒食表其精潔敕下御史臺依行困學紀聞云忌日行香始於唐崔蠡奏罷之本朝宋景文公奏云求於非福則是諂祭懺於無罪則是誣親其言不行行香歷代興廢宋姚寬西溪叢語詳説同僧史略宋洪邁容齋四筆云樞密行香唐世樞密使專以內侍為之與它使均稱內諸司五代以來始參用士大夫遂同執政案實録所載景德二年三月元德皇后忌中書樞密院文武百官並赴相國寺行香初樞密院言舊例國忌行香惟樞密使副依內諸司例不赴恐有虧恭恪今欲每遇大忌日與中書門下同赴行香從之樞密使副翰林樞密直學士並赴自茲始也然則樞密之同內諸司久矣隆興以來定朝臣四參之儀自宰臣至于郎官御史皆班列殿庭拜舞惟樞密立殿上不預亦此意云釋氏資鑑云唐高宗永徽三年上壬子幸感業寺忌日行香唐玄奘三藏傳云高宗顯慶元年敕遣朝臣行香已下録施主行香廣燈録濟上座嗣克符章云師行腳到洛京南禪安下有朱行軍設齋入僧堂內顧視上下云直下是又作麼生行香次口不住道至下間師便問直下是箇什麼行軍便喝師云行軍幸是會佛法底人又惡發作什麼軍云喚作惡發即不得師便喝軍云鈎在不疑之地師又喝法苑珠林云增一阿含經云若有設供者手執香而唱時至佛言香為佛使故須燒香遍請十方既知燒香本擬請佛為凡夫心隔目覩不知佛令燒香遍請十方一切凡聖表呈福事騰空普赴正行香作唄時一切道俗依華嚴經各説一偈云戒香定香解脫香光明雲臺遍世界供養十方無量佛見聞普熏證寂滅又三千威儀經云坐受香亦得為女人行香恐觸手染著故開坐受若恐譏慢令懸放下亦得男子行香女人受香翻前即是行事鈔趣請設則篇云賢愚經蛇施金已令人行香置僧手中乃至執香爐遙請佛僧如富那奇中説資持記云賢愚即行香緣彼第七云佛告阿難過去無量阿僧祇劫閻浮提有一大國名波羅捺時有一人好修家業意偏愛金勤力積聚因得一瓶於其舍內掘地藏之如是勤身乃得七瓶悉取埋之後遇疾終作一毒蛇守此金瓶如是展轉受形經一萬歲最後受身厭心忽生見有一人順道而過蛇呼之云吾今此處有一瓶金欲用相託供僧作福設食之時持一阿先提此云草籠來取我彼至日擔蛇至寺著衆僧前食時已到僧住行立蛇令彼人次第賦香賦者給也衆僧食訖為蛇説法歡喜轉增將僧維那到本金所餘六瓶金盡用施僧命終生忉利天佛告阿難爾時持蛇人者則我身是是毒蛇者今舍利弗是富那奇亦即彼經第六云佛在舍衛放鉢國長者有子名富那奇後出家證阿羅漢化兄羡那造旃檀堂請佛各持香爐共登高樓遙望祇桓燒香歸命念佛及聖僧香煙乘空至佛頂上作一煙蓋佛知即語神足比丘同往儒禮有言行香者月令廣義云行香國初詔正諸臣封號惟孔子封爵特仍其舊每月朔望遣內臣降香朔日則祭酒行釋菜禮洪武二十四年令各處儒學每遇朔望有司官至日早詣學謁廟行香燒香傳燈録睦州陳尊宿章云問教意請師提綱師云佛殿裡燒香三門外合掌法苑珠林云佛言香為佛使見行香處禪苑清規煎點燒香法云兩手捧香合起以右手拈合安左手內以右手捉香合蓋放香臺上右手上香向時為入焚之却右手蓋香合兩手捧安香臺上並須款曲低細勿令敲磕或墜地宋吳曾能改齋漫録云李相之貿已集謂焚香之始云本佛圖澄傳襄陽國城塹水源暴竭石勒問澄澄曰今當敕龍下取水乃至澄上坐繩床燒安息香咒數百言水大至豫按江表傳有道士干吉來吳會立靜舍燒香讀道書制作符水以療病又按漢武帝故事亦云毗邪王殺休屠王以其衆來降得其金人之神置之甘泉宮金人者皆長丈餘其祭不用牛羊唯燒香禮拜然則焚香自漢已然矣插香插瓣香於爐也敕修清規告香云住持就座副參遞大香一片與參頭同衆問訊插香各大展三拜答香凡有來插香者我亦為彼插香此謂答香還香答香亦名還香備用清規方丈特為新首座茶云請客侍者寫茶榜詣首座寮炷香首座還香觸禮一拜還拜又交代茶云具威儀懷香躬往交代人前插香觸禮一拜云云茶畢交代人詣爐前還前請香觸禮一拜敕修清規兩序交代茶云新職事具威儀懷香躬詣各受代人處插香對觸禮一拜云云茶畢受代人起將元請香插爐中觸禮拜謝而退安居敕修清規節臘章云西域三時以一時為安居出入有禁止又云五竺地廣暑寒霖潦氣候之弗齊故結制有以四月五月十二月然皆始以十六日所謂雨安居者因地隨時惟適之安或曰坐夏或曰坐臘戒臘之義始此行事鈔安居策修篇云律通制三時意存據道文偏約夏月情在三過一無事遊行妨修出業二損傷物命違慈實深三所為既非故招世謗以斯之過教興在茲然諸義不無指歸護命故夏中方尺之地悉並有蟲即正法念經云夏中除大小便餘則加趺而坐故知護命為重佛深制之又云上總三時分別今但就夏亦有三時初四月十六日是前安居十七日已去至五月十五日名中安居五月十六日名後安居故律中有三種安居謂前中後也前安居者住前三月後安居者住後三月雖不云中三月然文中具明前後日數中間不辨於理自明羯磨疏諸衆安居法篇云出家慕道馳散非業故當計時擇念義無浮逸今乃沿隨邑野追逐情塵顛仆巨壑無思返迹是以大聖以法遮防不許遊涉當居靜慮故律文中三時通制然有待之形許緣不一必量過起夏暑偏多一則損生害命深乖慈道二招世譏謗不及禽獸三為過既深故非道業春冬過少待緣開赴有斯別故名曰安居釋名者形心攝靜曰安要期在住曰居也忠曰譏謗不及禽獸者僧祇律云安居法者佛住舍衛城爾時諸比丘雨時遊行多所踐害為世人所嫌九十六種出家人尚知安居如鳥隱巢而自守住沙門釋子自稱為善好而不安居諸比丘以是因緣具白世尊佛言正應為世人所嫌從今已後雨時應安居廣明安居法梵網經古迹記云夏坐安居處者北并洲疏云昔來經論或名坐夏或名坐臘或名夏臘皆由不善方言也今依大唐三藏譯云雨安居謂雨時安居故然西方立時不同或立四時謂從正月十六日至四月十五日為春時從四月十六日至七月十五日為夏時如此秋冬並各三月至正月十五日總為一歲或總一年分為三時謂即佛法依此為定謂從正月十六日至五月十五日以為熱際從五月十六日至九月十五日立為雨際從九月十六日至正月十五日即為寒際雨際蟲多令人譏謗故制安居又云今此四月十六日至七月十五日實為疏謬既非夏時言雨安居忠曰太賢意謂佛制自五月十六入為初安居自六月十六入為後安居然此方結制以四月十六既不依佛制實為疏謬矣又稱坐夏夏臘尤謬矣蓋初安居至八月十五日則自七月十六已後非天竺夏時此方亦自七月朔已後非夏時其後安居滋晚焉不待論之依彼此不可謂坐夏夏臘等但當稱雨安居耳矣諸律講解古迹文紛紛沒甄別故我今贅言圓覺經云世尊告圓覺菩薩言若經夏首三月安居當為清淨菩薩止住心離聲聞不假徒衆至安居日即於佛前作如是言我比丘比丘尼優婆塞優婆夷某甲踞菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆善男子此名菩薩示現安居僧祇律云比丘至四月十六日應安居不安居者越毗尼罪到後安居復不安居者得二越毗尼罪結制結安居之制也見安居處結制禮儀如敕修清規坐夏安居曰坐夏其辨見安居處過夏敕修清規謝挂搭云近時衲子到處坐席未溫移單東西多致不謝挂搭既曰經冬過夏折中當在冬前夏前兩期報謝廣燈録廬山慶雲禪師章云問僧什麼處來僧云洪州來師云什麼處過夏僧云翠巖師云踏破多少草鞋又見節時門冬安居處碧巖録云天平和尚行腳時參西院有兩錯因緣西院云且在這裏過夏待共上座商量這兩錯云云忠曰科舉名目有過夏取佛書準倣也或看此為此目出俗書非也唐國史補云進士籍而入選謂之春關不捷而醉飽謂之打毷氉匿名造謗謂之無名子退而肄業謂之過夏執業而出謂之夏課遁齋聞覽云長安舉子六月後落第者不出京謂之過夏多借靜坊廟院作文曰夏課太平廣記引盧氏小説云唐德宗至西明寺宋濟在僧院過夏上忽入濟院方在下犢鼻葛巾抄書上問曰作何事業兼問姓行濟云姓宋第五應進士舉云云坐臘安居亦曰坐臘其辨見安居處臘義節時門法臘處詳説賞勞梵網古迹作償勞韻會陽韻云償辰羊切説文還也廣韻報也增韻酬也行事鈔作賞勞祖庭事苑賞勞注云勞郎到切尉也忠曰國史補云大出金帛賞勞止此此般賞勞勞當從郎到切耳行事鈔安居策修篇云五事賞勞忠曰五事即五利次下箋羯磨疏安居法篇云迦提賞勞使作衣服受用資身弘道利俗也梵網經古迹記云然初安居即從五月十六日至八月十五日良以雨時將畢恐至寒時不濟故開一月為償勞月若後安居從六月十六日至九月十五日即無償勞三月雨時盡故善圓鈔云從八月十六日至九月十五日三十日為償勞月已上證賞勞字畢已下辨其義行事鈔安居策修篇云問何為但結三月者生死待形必假資養故結前三月開後一月為成供身衣服故忠曰如來聖教歲為三時乃一時有四月故有此問言何故不結一時全四箇月耶又云若四月十六日結者至七月十五日夜分盡訖名夏竟至明相出十六日後至八月十五日已來名迦提月明了論云本言迦絺那為存略故但云迦提此翻為功德注以坐夏有功五利賞德也忠曰由是可知賞勞者賞坐夏功勞也又宗覺律師語余曰此一月二百五十戒中開五種戒恣意出入往來而造功德衣以償前九旬功勞也止此依此説則勞即刀切老平聲疲也勤也功也字彙事苑為去聲郎到切慰勞義恐不知律文賞勞目謾下義乎若知則必可辨其義而欠之五利者行事鈔自恣宗要篇云次明五利通塞者律中受此衣故畜長財離衣宿背請別衆食食前食後至他家等各如隨相所明隨戒釋相篇僧祇律云衣時中間捨五罪別衆食處處食離同食不白畜長衣離衣宿無罪毗尼論云佛聽畜迦絺那衣有五種利一得中前數數食二得有檀越來請得別衆食三得畜長財不説淨四得離衣宿五不白得出界是名受迦絺衣利迦絺那衣者自恣篇云二明衣體四分云若得新衣若檀越施衣若糞掃衣新物揲作淨若已浣浣已納作淨即日來不經宿不以邪命得不以諂曲得不以相得不以激發得不捨墮作淨者應法四周有緣五條作十隔若過是條數應自浣染舒張碾治裁作十隔縫治又云不得大色染衣聽用袈裟色此云不正色也釋氏要覽云迦提梵語具云迦栗提迦即九月望宿名也謂西國三月安居至九月十六日解後安居比丘行化故取望宿為名也忠曰是與事鈔義大異未知何據已下禪録用賞勞語普燈録大通本禪師章云僧問九夏賞勞即不問從今向去事如何曰光剃頭淨洗鉢虗堂愚禪師寶林録結夏小參云於是九十之期各證本法然後升雙檮堂入息耕室向無星等子上較其重輕以憑賞勞又淨慈後録上堂云忽有箇眼皮綻底出來道乞師賞勞只向他道三貫嚫錢三味食相招攜手上高臺忠曰律則五事賞勞其文明皎今按録所舉似以施財供養等為賞勞焉坐堂忠曰坐堂與坐參規同但上堂已前少時坐禪於僧堂此曰坐堂小參已前及每日晚參已前少時坐禪於僧堂此曰坐參也今以小參已前稱坐參例解之坐堂之堂者上堂之堂也上堂之堂者法堂也故非坐僧堂之義謂坐禪於上堂已前也敕修清規聖節上堂云鳴方丈板三下鳴鼓堂司行者預鳴衆寮前板三下集衆坐堂如尋常坐禪向內坐鼓鳴則轉身向外坐頭首先集堂外候鼓鳴即入堂首座後入就坐西堂勤舊蒙堂諸寮並外堂坐忠曰集衆者集於僧堂也一山寧禪師曰坐堂不赴者首座罰之衆頭首自末班次第入堂故首座自最後入也大衆坐堂時住持亦坐堂敕修清規大坐參云待住持入堂坐定堂司行者鳴首座寮前板三下云云又坐參云鳴堂前鐘三下衆就位普同和南住持頭首次第出堂忠曰依此可知住持參前陪大衆坐參坐參既然亦當上堂前陪衆坐堂而已舊説曰住持説法已前亦自澄心靜慮蓋世尊説法華時先入無量義處三昧即從三昧安詳而起方説法華此其榜樣也又凡坐禪於僧堂曰坐堂日用軌範云住持并首座坐堂時不得從前門出入入衆日用云莫待打坐堂板次第歸堂坐禪忠曰軌範所謂坐堂乃四更一點坐禪也入衆所謂坐堂亦是每日坐禪也並非上堂已前者故此堂乃僧堂也坐參坐參者坐禪於參前也住持晚參已前大衆集僧堂坐禪澄心以待參謂之坐參若住持有事息參則行者報曰和尚今晚放參敕修清規晚參云叢林坐參猶旦望五參升座將聽法時大衆坐堂也又坐參云蓋古者每晚必參住持以求開示故率衆齊集坐待鼓鳴而往參之名曰坐參因汾州地寒昭公罷之遂有放參之説忠曰坐參坐堂名異規同見坐堂處清規已云坐待鼓鳴而往參之乃知禪於僧堂畢往參於住持之處故曰坐參非禪坐即是參之義備用清規云諸方謂放參不披袈裟轉身方搭衣非法也唯徑山寺古規不墜披衣坐參當力行之清拙澄和尚録晚參云每日晚參已前坐以待參謂之坐參且如坐參又參箇甚麼莫是參父母未生前事麼莫是參空劫以前自己麼莫是參宗乘向上向下事麼莫是參古人玄言妙句一機一境麼若與麼總是將心湊泊擬心承當擬心領解本分事上總沒交涉又不遊方而參禪曰坐參大慧正法眼藏云或者道琅邪被舉公道箇杜撰心中疑惑即時倒戈卸甲遂挽留舉公咨決此事謂之坐參一犬吠虗千猱啀實忠曰此不離己住處居參禪於他之義蓋大慧舉俗説故其義不足取焉大坐參敕修清規大坐參云今時叢林有多衆處猶特講晚參以存古意謂之大坐參與常坐參同但首座入堂不燒香云云具如彼放參舊説曰住持有事或修臨時祈禱則放免晚參此謂放參即鳴鐘三下此謂放參鐘又見坐參及垂説門晚參處禪苑清規首座坐堂云大衆入堂依單位相向而坐堂司行者先稟堂頭挂放參牌然後堂前上簾行者於首座前問訊低聲云和尚放參復於聖僧前躬身正立喝放參然後打放參鐘展單下帳罷歸寮問訊喫湯隨意僧寶傳慈明圓禪師傳云公冬日榜僧堂作此字其下注云若人識得不離四威儀中有首座者見之謂曰和尚今日放參白氏文集昭國間居詩云時暑放朝參忠曰可知放參之目本在官制又有晚食名放參者見飲啖門放參飯處忠曰此方禪林晡時念經為讀誦放參失義當曰念經或誦晚課蓋放參鐘後誦經故轉訛展單舊説曰無晚參時鳴放參鐘三下其時展半單蓋為黃昏坐禪也然放參鐘名展單者鄰近釋也日用軌範云坐參了各出半單下地坐禪敕修清規坐禪詳敘其規敕修清規坐禪云大衆歸堂向裏坐又聖節云坐堂如尋常坐禪向內坐永平清規辨道法云早晨坐禪首座大衆搭袈裟入堂就被位面壁坐禪首座不面壁自餘頭首一如大衆面壁而坐住持人就椅子坐禪又云後夜坐禪大衆不搭袈裟住持人袈裟挂于椅子而坐禪是法也忠曰住持就椅坐則知亦是不面壁矣夫面壁坐禪匪但準依初祖風規復可攝定散心然今清朝禪僧例向外誠失古矣日工集云典座免僧直歲三人免坐堂詳職位門免僧處南禪規式云四月草一日舊規自今日四時坐禪不赴佛殿勤行者罰金一斤不赴坐禪者罰金同此又云初夜并曉天二時坐禪住持巡堂若有被位空處則令聽叫取被巾歸方丈若兩班寮之看寮而空被位者僧堂坐牌前植看寮簡板則不取被巾忠曰坐禪用心諸祖有針有銘有儀有論不可悉録今且舉其目備辦道士檢尋杭州五雲和尚坐禪針傳燈録載鵝湖大義禪師坐禪銘緇門警訓載天台大靜禪師坐禪銘諸祖偈頌載同安察禪師坐禪銘諸祖偈頌載佛眼遠禪師坐禪銘緇門警訓載長蘆賾禪師坐禪儀禪苑清規載佛心才和尚坐禪儀普燈録載中峯本禪師坐禪論蘭溪隆禪師坐禪論明極俊禪師坐禪訣焰慧語要載永平元禪師坐禪儀并銘瑩山瑾禪師坐禪用心記及三根坐禪説大慧杲禪師告香普説云近來諸方打板坐禪若要莊景即得我不信儞坐得定往往聞恁麼道却謂妙喜不教人坐禪又是錯認何曾解方便我只要儞行亦禪坐亦禪語默動靜體安然山僧有時夜裏睡才覺便起來坐坐既久都無所思自謂諸佛境界只這是然不要把為極則不是放身命處况更言靜是根本悟是枝葉此處誤人諸方説靜了方悟我是悟了方靜不敢相瞞未悟時心識紛飛悟了方貼貼地大比丘三千威儀云欲坐禪有五事一者當隨時二者當得安牀三者當得軟座四者當得間處五者當得善知識復有五事一者當得好善檀越二者當有善意三者當有善藥四者當能服藥五者當得善助爾乃得猗隨時者謂四時安牀者謂繩牀軟座者謂毛座間處者謂山中樹下亦謂寺中不與人共善知識者謂同居善善檀越者謂令人無所求善意者謂能觀善藥者謂能伏意能服藥者謂不念萬物善助者謂禪帶禪帶有五事一者當廣一尺二者當長八尺三者當頭有鉤四者當三重五者不得用生韋亦不得用金鉤又天台次第禪門詳説坐禪用心內外方便其第二第三卷最為要無住云日本坐禪規矩道元禪師為始無住和尚雜談集云建仁榮西入宋雖傳禪門戒律儀歸朝之後且順國風兼行天台真言未得專講禪規其坐禪但據狹床而已佛法上人道元入宋歸朝始行廣床坐禪於深草興聖寺也道俗初見聞此規故敬信者衆當時所目擊之僧為豫説之自後東福開山圓爾渡宋久住徑山歸國行其坐禪法蘭溪隆長老宋國僧也故建長寺坐禪規一依宋朝自此後天下禪院儀禮通行矣坐禪坐法見禮則門結跏趺坐處坐禪纍手法請觀音經云若欲得見觀世音菩薩端身正心使心不動心氣相續以左手置右手上舉舌向齶令息調勻智者疏約世間陽上陰下隨世俗故右陽居下左陰處上者欲將定靜之法鎮於陽散也世俗既有威儀此即是以戒法禁約獷即對戒也二陽動相陰靜相以靜鎮動是制亂方便即對於定三者右表方便屬權而居下左是實智居上是則自權而顯實此即表慧闡義鈔釋之恐繁不録或曰一夏九十日坐禪即一行三昧也摩訶止觀明四種三昧常坐常行半行半坐非行非坐中云一常坐出文殊説文殊問兩波若名為一行三昧乃至居一靜室或空間地離諸喧閙安一繩床傍無餘座九十日為一期結跏正坐項脊端直不動不搖不萎不猗以坐自誓脅不拄床四時坐禪四時者依永平清規辨道法黃昏坐禪戌辰後夜坐禪四更三點早晨坐禪粥後巳辰晡時坐禪申辰也又幻住菴清規云裝香一盤且以三炷為率自黃昏燒起至第三炷約四鼓時分也竈下燒面湯堂前鳴板三下大衆收枕推被於裏床收半單下地洗面歸堂坐禪忠曰是後夜也至開靜板鳴即摺被搭衣佛前禮拜歸鉢位坐展鉢受粥粥罷佛前諷經經畢小歇堂前復鳴板三下自主至伴歸堂坐禪忠曰是早晨也至齋時火板鳴下地少頃長板鳴歸鉢位受食食畢小歇堂前鳴板三下復歸堂坐禪忠曰是齋罷永平為晡時至晡時分鳴板放參至黃昏燒香盤大衆搭衣諷經施食事畢堂前鳴板三下歸堂坐禪忠曰是黃昏也至放參板鳴開枕展被右脅而息又云凡一日夜之間四次坐禪之際宜各屏心絶慮息念忘緣深究死生力窮道業大比丘三千威儀云坐禪有五事一者當隨時謂四時詳前坐禪處夢窗石國師録臨川家訓云四時坐禪唯除浴日坐參其餘極寒極熱修正蘭盆時節亦不可開若於坐禪時特有事可作則可開之趙州和尚云我在南方三十年除粥飯二時是雜用心處趙州寧謂粥飯二時不是正用心處耶只是言其除粥飯外更不雜餘事耳乃至古德又云大事未明當如喪考妣大事已明亦當如喪考妣古人苦口叮嚀其意豈在令人限日約時工夫不純乎上古道人皆是卜僻洞深巖居樹下石上更有何事可作廢寢忘餐一味存道百丈建立叢林以來普請作務其事不少雖然人人以道聚頭故辨道工夫不曾為事緣所奪百丈滅後逮于三百年叢林規繩漸衰緇流少有慚愧始有擊版坐禪之儀謂之四時坐禪蓋是主法尊宿曲設方便以誘懈怠者耳今時後生猶嫌四時坐禪動則欲令省略無慚無愧莫甚於此義堂日工集云在黃梅院訓衆曰夏安居三時諷經四時坐禪本朝不論大小剎皆例行之合不怠怠者罰三時坐禪四時坐禪中省後夜也瑜伽師地論云言初夜者謂夜四分中過初一分是夜初分言後夜者謂夜四分中過後一分是夜後分再請禪忠曰定式坐禪到定鐘鳴而止此後再禪坐此曰再請禪敕修清規大坐參云如坐再請禪住持後門入歸位不巡堂頭首隨衆或抽解者即歸被位更深住持出聞首座開枕響衆方偃息在道兄弟不以此拘伴禪舊説曰住持五更行香之次入僧堂伴於大衆坐禪此謂伴禪也陪禪陪禪同伴禪義舊説曰住持燒香巡堂之次入僧堂陪衆之禪坐少時以勵衆故曰陪禪也住持已是得法人非是為自修行坐禪於僧堂而已又道話曰陪禪蓋訛名也愚中及和尚年譜云應永十三年丙戌師八十四歲尼松巖興造含暉為師塔所師一冬宴安于此檀施甚厚普施衆僧輪次齋會禪坐道話曰陪禪曰夜話放禪敕修清規坐禪云堂司行者候齋次第覆首座放禪轉從聖僧後右出撑簾下牌輕撼作聲住持頭首出堂瑩山清規云凡坐禪者首座之管領也己香欲了時聖僧侍者問訊首座是稟放禪也幻住清規首座云凡打板坐參放禪行道種種動靜靡不關心經行日用軌範云開小靜摺被或歸衆寮喫湯藥或茶堂經行次第歸鉢位瑩山坐禪用心記云坐中若昏睡來常應搖身或張目又安心於頂上髮際眉間猶未醒時引手應拭目或摩身猶未醒時起座經行正要順行順行若及一百許步昏睡必醒經行法者一息恆半步行亦如不行寂靜而不動南海寄歸傳云五天之地道俗多作經行直去直來唯遵一路隨時適性勿居閙處一則痊痾二能銷食禺中日昳即行時也或可出寺長引或於廊下徐行若不為之身多病苦遂令腳腫肚腫臂疼膞疼但有痰廕不銷並是端居所致必若能行此事實可資身長道釋氏要覽云慈恩解云西域地濕疊磚為道於中往來如布之經故曰經行十誦律云經行有五利一勦健勦音巢輕捷也二有力三不病四消食五意堅固三千威儀經有五處可經行一間處二戶前自房戶前三講堂前四塔下五閣下瑜伽師地論云言經行者謂於廣長稱其度量一地方所若往若來相應身業經行斷惛沈睡眠法如彼佛陀波利修禪要訣云問行法云何答行即經行也宜依平坦之地二十二步以來十四五步以上於中經行經行時覆左手以大指屈著掌中以餘四指抱大指作拳然覆右手抱左手腕即端立少時攝心令住謂住鼻端等乃行行勿太急太緩亦攝心行至界畔即逐日回身還向來處住立少時如前後行行時即開目住即輒閉如是復稍倦即休經行唯在晝夜不行也問多人同處經行得不答稍須相離全近不得問繞塔行道與經行何別答經行者直往直來豈同繞塔耶又塔是多人往來處不可於中經行問此方有逆日行道稱為右旋未知是不答西方旋塔並逐日輪曾無逆行忠曰逐日者自東而南而西而北也逆日者從東而北而西而南也逐日者順日輪之行與上肩順轉同十誦律云經行法者比丘應直經行不遲不疾若不能直當畫地作相隨相直行是名經行法摩得勒伽云經行不能直者安繩行道敕修清規藏殿祝讚云住持領衆合掌繞藏行道三匝多衆則一匝又佛降誕云維那舉唱浴佛偈行道浴佛幻住清規津送云舉楞嚴咒一遍行道村寺清規云行道尤須端謹叉手當胸徐行細步瞻顧前後須使疏密得中或出入門戶上下階級皆當先舉左足須照應袈裟不得拖地衣服領袖須當齊整萬善同歸集云行道一法西天偏重繞百千匝方施一拜經云一日一夜行道志心報四恩如是等人得入道疾又云南山行道儀云夫行道障盡為期無定日限若論障盡佛地乃亡翻譯名義集云半行半坐方等云旋百二十匝却坐思惟法華云其人若行若立讀誦此經忠曰禪林懺摩法楞嚴咒或住立或行道蓋是半行半坐三昧也炙茄會禪苑清規監院云如冬齋乃至炙茄會詳職位門監院處五祖演和尚海會録炙茄會上堂云六月三伏天火雲布郊野松間臨水坐解帶同歡奲毳侶弄荷花賓朋傾玉斝紅塵事繁華碧洞何瀟灑重會在明年相期莫相捨白雲曾有約願結青蓮社酉陽雜爼云茄子茄字本蓮莖名革遐反今呼伽未知所自茄子僧人多炙之甚美忠曰炙茄會蓋炙茄開筵也依酉陽言僧家炙茄尚矣茶湯會松源嶽禪師録茶湯會求頌曰春風吹落碧桃花一片流經十萬家何似飛來峯下寺相邀來喫趙州茶冷淘會石菴玿禪師録有結冷淘小參云湖南人賣上麵福建人喫冷淘云云正字通云淘音陶淅米也銷災會無學元禪師支那真如録有銷災會燒駱駝秉炬偈蓮華會圓悟勤禪師天寧録有蓮華會上堂慈受深禪師慧林録有資福作蓮花會供養羅漢升座菩提會大慧杲禪師普説有雪峯建菩提會普説拈鬮會西巖惠和尚能仁録有謝幹拈鬮會上堂鬮義詳執務門鬮拈處焙經舊説曰設火爐焙藏經去其蒸濕也忠曰蓋煆綿拭經也敕修清規知藏云函帙目録常加點對缺者補完蒸潤者焙拭殘斷者粘綴北澗文集常熟道友焙經得舍利無數榜云蠹不在魚在執紙上語者焙非待火待忘言外詮時明極俊和尚録跋天目淨海真禪人焙四大部經得舍利頌什後云天目西峯淨海真禪人發心焙四大部經一一用綿拂拭及火煆其綿獲設利一顆偃溪聞禪師雪竇録謝衆僧焙經上堂云罏韛之所鈍鐵猶多黃面老子具正遍知只知撒土拋沙欺胡謾漢不知性命落在弟子手中二千年後橫拖倒拽只如雪竇恁麼舉也是把火助熱南浦明禪師崇福録有焙經上堂拭經以綿拭經見焙經處鏡堂圓禪師禪興録拭藏經上堂云五千餘軸眼中塵不識無端貴似金盡底掀翻知落處掃階松影又沉西佛祖通載云元世祖詔僧大內念經行香侍臣奏云僧多不識字在帝乃云但教舒展拭去塵埃亦有功德上堂齋粥粥飯上僧堂此謂上堂與法堂説法稱上堂別傳燈録藥山儼禪師章云院主報打鐘也請和尚上堂師曰汝與我擎鉢盂去又云師曰二時上堂不得咬破一粒米聯燈會要石梯和尚章云師見侍者托鉢上堂乃喚云侍者者應諾師云甚處去云上堂齋去師云我豈不知儞上堂齋去云除此外別道箇甚麼即得師云我只問儞本分事云和尚若問本分事某甲實是上堂齋去云汝不謬為吾侍者教誡律儀云師欲上堂為師滌鉢看閉門戶等事已下録世典稱僧上堂酉陽雜爼云玄奘言那蘭陀寺僧食堂中熱際有巨蠅數萬至僧上堂時悉自飛集于庭樹又云著謠於軍中曰齋鐘動也和尚不上堂月餘天中記云托言王播客楊州木蘭院僧厭苦之飯後擊鐘後二紀播鎮楊州訪舊詩有曰上堂已了各西東慙愧闍梨飯後鐘碧紗籠之矣續云二十年來塵拂面如今始得碧紗籠已下録官人飲食亦稱上堂李肇國史補云鄭相珣瑜方上堂食王叔文至韋執誼遽起延入閣內又云三院上堂有除改者不得終食過堂上僧堂喫食亦云過堂備用清規送鉢位云兩班退職維那先送首座入鉢位次接都寺送鉢位首座都寺挂鉢過堂六學僧傳惟儼傳云二時過堂不得咬著一粒米傳燈作上堂如上堂處引大休念禪師録頌古舉云鵝湖孚禪師侍者請過堂湖云我下莊喫油了會元作赴堂赴堂忠曰與上堂過堂同義敕修清規都監寺云齋粥二時必赴堂則行僕行益自然整肅五燈會元鵝湖孚禪師章云師一日不赴堂侍者來請赴堂師曰我今日在莊喫油飽者曰和尚不曾出入師曰儞但去問取莊主者方出門忽見莊主歸謝和尚到莊喫油陪堂客僧陪僧堂之外堂受食此曰陪堂下堂粥飯畢下僧堂此謂下堂與上間下間稱上堂下堂別敕修清規每日祝讚云齋粥二時下堂僧衆必須登殿又見唄器門下堂椎處喝食見職位門喝食行者處光伴敕修清規告香云請客侍者預依戒次具茶狀備卓袱筆硯告香罷列法堂下間請茶各僉名請首座光伴金鰲新話龍宮赴宴録云神王開潤筆宴王曰余欲與秀才光伴故邀爾酒進樂作或曰光伴者言我得前人恩光允容我令相伴也不敢自專之謂矣此義未是忠曰光者猶如榮也字係伴人言我得伴此人是己之光榮也如入院展詞云光據法筵又王梅溪小簡云光膺宸命榮陟臺端當例此而解耳竺印先師曰明朝百丈清規淪亡久矣隱元來朝禿翁懷百丈清規質難解處元皆不能通翁問光伴義元曰光者空也謂不設茶果藥石而空伴之謂也然觀清規光伴皆是備茶果點心者非空伴之義相伴聯燈會要柏巖哲禪師章云洞山與密師伯到師問二上座甚處來洞云湖南來師云觀察使姓甚麼洞云不得姓師云名甚麼云不得名師云還理事也無云自有廊幕在師云還出入也無洞云不出入師云豈不出入洞拂袖而出師次日侵晨入堂召二上座二人便出師云昨日老僧對上座一轉語不稱意一夜不安今請上座別轉語若愜老僧意便開粥相伴過夏洞云請和尚問師云不出入洞云太尊貴生師乃開粥同過夏傳燈録仰山寂禪師章云若説禪宗身邊要一人相伴亦無敕修清規嗣法師忌云方丈客頭請西堂兩序晚間對真相伴喫湯外典有接伴名且附此事物紀原云宋朝會要曰契丹使至命樂黃自康宗元詣雄州接伴回日充送伴使此疑接伴之始也宋史袁韶傳云韶為右司郎官接伴金使巡堂忠曰巡僧堂也有數種謂住持巡堂入院旦望茶坐禪大衆巡堂三八念誦首座巡堂坐禪大坐參結制維那巡堂聖節參頭巡堂挂搭都寺巡堂庫司湯知事巡堂結制旦望茶請客燒香巡堂方丈茶沙彌巡堂參堂也此有數義不同謂點撿義坐禪時住持首座告報義聖節時維那請謝義茶湯時禮賀義入院時挂搭時結制時也三八念誦後巡堂蓋亦是住持大衆互相禮也中峯雜録冬安居示徒云為懶墮懈怠之舊習之所障乃至其巡堂人三回五度警省略不肯少加精進似如此參禪要明心地要敵生死要脫略情塵要勦除窠臼莫説八十日便是八十年八十劫惟增業識但長癡迷忠曰此巡堂人者住持首座之外別設人巡堂以警策坐禪者睡惰也住持巡堂敕修清規坐禪云住持入堂燒香巡堂自上間至下間一匝歸位坐定東福清規云住持入僧堂坐禪者蓋為點撿大衆也其入堂巡堂一匝是點撿之儀也又入院云鳴僧堂鐘大衆先歸鉢位立定新命入堂炷香參隨人同展三拜維那當面問訊引巡堂一匝參隨人先出兩序送新命歸鉢位觸禮三拜旦望住持巡堂見次下知事巡堂大衆巡堂敕修清規念誦外堂念誦畢云住持入堂前堂首座入次名德西堂插入歸聖僧板頭立頭首領衆三人一引聖僧前問訊轉身住持前問訊合掌巡堂順左肩轉依圖位立暫到侍者隨衆入只巡半堂至聖僧後侍者向後門立暫到向侍者立次知事入堂聖僧前問訊轉身住持前問訊合堂巡堂出暫到接侍者後隨出云云首座巡堂敕修清規坐禪云首座聖僧前燒香巡堂自下間至上間一匝就歸被位坐校定清規云巡堂之法住持從上堂巡至下堂首座從下堂巡至上堂蓋首座未出世人故從下巡上若已出世人則不拘以理論之亦合從下巡上免得於住持位前行故也忠曰校定初義位階區別亦義敬師法式蓋此時雖住持未入堂若首座聖僧前燒香了直向上間則橫過住持空椅前也若聖僧前燒香了直向下間巡堂自聖僧後至上間而歸自被位則得不橫過住持空椅前也故校定云免得於住持位前行也區別義見後又敕修清規大坐參云首座入堂不燒香便歸位待住持入堂坐定堂司行者鳴首座寮前板三下大衆轉身向外坐首座下地從後門出復轉從前門入聖僧前燒香如常巡堂歸被位坐少定忠曰如常者擇坐禪時首座巡堂也如坐禪時首座巡堂自下間至上間一匝蓋自下間巡起者但是已私推其理坐禪則首座巡之後隨有住持巡堂故首座先巡時欲異于住持而示其位階區別矣今大坐參巡堂則自上間巡起是尋常巡法乃如聖節維那巡堂自上間至下間也又敕修清規結制禮儀云首座離位聖僧前燒香大展三拜巡堂一匝歸位行者喝云首座禮謝大衆觸禮三拜維那巡堂敕修清規聖節云維那於僧堂早粥遍食椎後再鳴椎一下云白大衆粥罷聞鐘聲各具威儀詣大佛寶殿啓建聖節謹白復鳴椎一下往住持前問訊從首座板起巡堂一匝出外堂下間至上間歸內堂中間問訊而出參頭巡堂敕修清規大挂搭歸堂云參頭領衆前門右手入堂至聖僧前排立參頭燒香同衆大展三拜巡堂一匝自上堂至下堂仍如前排立問訊都寺巡堂敕修清規庫司四節特為首座大衆湯云鳴齋鼓一通大衆歸鉢位頭首一班齊歸前板都寺隨入揖首座離位却揖以次頭首進板首隨送首座歸位從聖僧後右出堂外迎住持入堂供頭緩鳴堂前鐘七下送住持入位仍往首座前揖坐仍如前出從首座板起巡堂一匝外堂上下間歸堂中立問訊忠曰此是揖坐巡堂次有揖香揖湯巡堂問訊知事巡堂敕修清規結制禮儀云知事入堂燒香大展三拜巡堂一匝至聖僧板頭排立行者喝云知事禮謝大衆觸禮三拜又旦望巡堂茶云鳴堂前鐘七下住持入堂燒香巡堂一匝歸位知事入堂排列聖僧前問訊轉身住持前問訊從首座板起巡堂一匝請客巡堂見巡堂請茶處燒香侍者巡堂敕修清規方丈四節特為首座大衆茶云鳴鼓集衆燒香侍者行禮同庫司湯都寺巡堂沙彌巡堂見參堂處巡堂請茶忠曰住持請衆故請客侍者巡堂敕修清規方丈四節特為首座大衆茶云挂點茶牌長板鳴請客侍者入堂聖僧前燒香一炷大展三拜巡堂一匝至中問訊而退謂之巡堂請茶巡寮校定清規云侍者先於上堂時令行者挂巡堂牌住持巡寮自東廊第一寮巡起寮衆各出外接入仍送出衆寮人多處但寮元一人迎送出入大衆只立門外忠曰巡堂牌之堂當作寮備用清規云方丈客頭先行通覆住持至寮主先於門前下手立迎入請趺坐插香住持答香略敘寒溫致謝送出聽叫收香蒙堂四寮衆皆列門外下手同接入同送出謂衆寮人衆只寮元接送非法次第巡寮畢歸方丈照拂官客諸山敕修清規結制禮儀云住持次第巡寮各寮嚴設坐椅香几於門外候住持從東廊第一寮巡起至各寮香几前寮主同衆插香云此日禮常拜賀返沐降重答香云適辱禮賀專此致謝送住持數步復側立香几之右合掌問訊待衆行盡就隨其末次第巡過各寮人隨後接巡至法堂上住持於香几內中立大衆三人一引問訊而過又巡寮云古規住持巡寮僧堂前挂巡寮牌報衆云云如彼或旦望巡行則不挂牌今惟以四節報禮為巡寮餘日不講能復古者當行之祖庭事苑云僧祇云世尊以五事故五日一按行僧房一恐弟子著有為事二恐著俗論三恐著睡眠四為看病僧五令年少比丘觀佛威儀庠序生歡喜故禪門巡寮正擬大聖之遺範今天下率叢林為師匠者莫不遵依此式按韻會云按察行也考也撫也巡案僧堂則曰巡堂衆寮則曰巡案敕修清規大挂搭歸堂云行者引至衆寮云云寮主引挂搭人排列朝觀音問訊引巡案一匝復朝觀音問訊而退喝參喝參者唱參蓋報某伺候在此之義也品字箋云參趨承也晉謁也敕修清規訓童行云凡旦望五參上堂罷參頭行者令喝食行者報各局務行堂前挂牌報衆昏鐘鳴行堂前鳴板三下集衆行者先佛殿次祖堂僧堂前前堂寮喝參方上寢堂排立參頭入方丈請住持出就坐參頭進前插香退身歸位緩聲喝云參衆低聲同云不審齊禮三拜又為行者普説云侍者燒香請法參頭領衆鴈立插香喝參三拜傳燈録瑞鹿先禪師章云黃昏唱禮了僧堂前喝參僧堂前喝參了主事處喝參主事處喝參了和尚處問訊沙彌亦喝參傳燈録趙州諗禪師章云師聞沙彌喝參向侍者云教伊去侍者乃教去沙彌便珍重去師云沙彌得入門侍者在門外祖忌有喝參敕修清規達磨忌云維那舉楞嚴呪畢回向云云次參頭領衆行者排列喝參禮拜諷經忠曰準事生也開浴又見殿堂門浴室處敕修清規知浴云凡遇開浴齋前挂開浴牌寒月五日一浴暑天每日淋汗施浴傳燈録普淨院常覺禪師章云師以時機淺昧難任極旨苟啓之非器令彼招謗讟之咎我寧不務開法每月三八施浴僧道萬計師常謂諸徒曰但得慧門無壅則福何滯哉又見殿堂門浴室處佛説溫室洗浴衆僧經云耆域欲請佛及僧菩薩大士入溫室澡浴佛告醫王吾當為汝説澡浴及報之福澡浴之法當用七物除去七病得七福報七物一然火二淨水三澡豆四酥膏五淳灰六楊枝七內衣除七病一四大安隱二除風病三除濕痺四除寒氷五除熱氣六除垢穢七身體輕便眼目精明如是供養衆僧便得七福一四大無病二面貌端正三身體香潔四肌體潤澤五多人從拂塵垢識宿命六口齒香好白齊所説肅用七所生處自然衣飾珍寶乃至廣説澡浴及報之及麗本作反入浴敕修清規知浴云鳴鼓第一通僧衆入浴第二通末頭首入浴第三通行者入浴此時住持方入以屏風遮隔而浴第四通人力入浴監作行者知事居末浴日用清規云如遇入浴浴具携右手入下間門閫內問訊歸空處挹左右人云云具如彼説或有瘡或洗灸瘡或使疥藥宜隨後入浴寄歸傳云須飢時浴詳殿堂門浴室處五燈會元石梯和尚嗣茱萸章云因侍者請浴師曰既不洗塵亦不洗體汝作麼生者曰和尚先去某甲將皂角來師呵呵大笑傳燈聯燈不收淋汗夏月入浴曰淋汗見開浴處蓋熱時常有汙故每日淋沃也又見文疏門淋汗疏處正字通云淋音林説文以水沃也清拙澄禪師録淋汗頌云陝府鐵牛遭日炙嘉州大象汗交流有人浴得這箇佛萬兩黃金也合收洗腳舊説曰洗足多於西淨矣日用軌範云洗腳板鳴不得爭奪腳桶淨髮剃頭髮也敕修清規坐禪云或山門有迎接祈禱普請看誦送亡及衆寮淨髮洗衣則不坐禪行事鈔諸雜要行篇云五分佛制半月一剃髮除無人難緣論家四種次第一上座二髮長三先洗頭四有緣欲行並前為剃毗尼母剃髮者但除頭上毛及鬚餘毛一切不合却所以剃者為除憍慢自恃心故四分比丘不得為白衣剃髮除欲出家者若頭極長若兩月若廣兩指一剃爪極長如一麥翦之不得用剪刀翦髮聽畜盛髮器十誦髮當薶坑中涅槃頭鬚爪髮悉皆長利破戒之相增一佛告比丘沙門出家有五毀辱法一頭髮長二爪長三衣裳垢圿四不知時宜五多有所論逆剃順剃毗奈耶雜事云阿難入城乞食有婆羅門於高堂見已以拳攉阿難頭時塢波難陀聞已口中唱我今解治彼小人使剃頭人逆順淨剃揩摩以油著衣入城捉婆羅門臂至王門見王白其事王大怒斬婆羅門手略鈔煆髮焚得度人之髮也斷橋倫禪師録新化爐煆髮佛事云銅頭鐵額馬頷驢腮倒順剗除千萬萬零星收拾幾堆堆作者出手爐韛新開從前毛病到此一時灰紅個白個青個紫個赤個以火打圓相云盡從者箇流出來應菴華禪師蔣山録焚衆僧髮佛事云拈火把云一呼善來鬚髮自落積纍既多無處安著普請大衆把火燒却且道燒却後如何不用撥灰求舍利無邊頂相放毫光長翁淨禪師録煆髮上堂云活剗羣牛腦後毛風吹日炙轉腥臊不堪狼藉薰天地罪惡重將業火燒恁麼見得切忌死灰尋舍利臭煙蓬㶿焰頭高開爐敕修清規月分須知云十月初一日開爐方丈大相看又見職位門爐頭處僧寶傳法昌遇禪師傳云法昌在分寧之北千峯萬壑古屋數間遇至止安樂之火種刀耕衲子時有至者皆不堪其枯淡坐此成單丁開爐日輒以一力撾鼓升座曰法昌今日開爐行腳僧無一箇唯有十八高人緘口圍爐打坐不是規矩嚴難免見諸人話墮直饒口似稱槌未免燈籠勘破不知道絶功勳安用修因證果喝一喝云但能一念回心即脫二乘羈銷閉爐敕修清規月分須知云二月初一日僧堂內閉爐或山寺高寒毋拘又見職位門爐頭處向火日用軌範云寒月向火先坐爐圈上然後轉身正坐揖上下肩不得弄香匙火筯不得撥火飛灰不得聚頭説話不得煨點心等物不得炙鞋焙腳烘衣裳不得攬起直裰露袴口不得吐唾并彈垢膩於火內傳燈録南泉願禪師章云師在方丈與杉山向火次師云不用指東指西直下本分事道來杉山插火箸叉手立師云雖然如是猶較王老師一線道曹山寂禪師録云師一日入僧堂向火有僧曰今日好寒師曰須知有不寒者曰誰是不寒者師策火示之僧曰莫道無人好師下火僧曰某甲到這裏却不會師曰日照寒潭明更明四分律云向火有五過失一令人無顏色二無力三令人眼暗四令多人閙集五多説俗事僧祇律云佛告諸比丘然火有七事無利益何等七一者壞眼二者壞色三者身羸四者衣垢壞五者壞牀褥六者生犯戒因緣七者增世俗言論有此七過故從今日後不聽然火行事鈔引僧祇資持記釋之云壞色謂面無神色生犯戒緣即露地然火掘壞等戒因而成犯普請忠曰集衆作務曰普請困學紀聞云普請出吳呂蒙傳根本説一切有部毗奈耶雜事云如世尊説若掃地時有五勝利時有老宿苾芻棄禪誦業入逝多林皆親掃地佛言我於知事人作如是説非諸耆宿苾芻修行業者然於我所依善法律而出家者有二種業一者習定二者讀誦苾芻聞佛為知事人密作是説其知事人不能遍掃逝多林地佛言隨要當掃若月八日或十五日應鳴犍稚總集衆僧共為灑掃古德以此鳴犍稚集衆作務為叢林普請之據五勝利見執務門掃地處傳燈録禪門規式云行普請法上下均力也僧史略別立禪居云共作者謂之普請敕修清規云普請之法蓋上下均力也凡安衆處有必合資衆力而辦者庫司先稟住持次令行者傳語首座維那分付堂司行者報衆挂普請牌仍用小片紙書貼牌上云某時某處或聞木魚或聞鼓聲各持絆膞搭左臂上趨普請處宣力除守寮直堂老病外並宜齊趣當思古人一日不作一日不食之誡幻住清規云公界普請事無輕重均力為之不可執坐守靜拗衆不赴但於作務中不可譏呵戲笑誇俊逞能但心存道念身順衆緣事畢歸堂靜默如故動靜二相當體超然雖終日為而未嘗為也臨濟玄禪師録云一日普請乃至黃檗豎起钁頭云祇這箇天下人拈掇不起師就手掣得豎起云為什麼却在某甲手裏黃檗云今日大有人普請便歸院聯燈會要華嚴休靜禪師章云師在洛浦作維那普請白槌云上間般柴下間鋤地首座云聖僧作甚麼師云當堂不正坐不趣兩頭機大慧普説如山主請普説云乾峯示衆云舉一不得舉二放過一著落在第二雲門出衆云昨日有人從天台來却往徑山去峯云今日不得普請舊時叢林中日日普請不似今時禪和家十指不沾水百事不干懷著好衣服要受人天供養不生慚愧舊時無這般衲子每人有一柄畬刀一柄鋤頭謂之一日不作一日不食若是普請處有一人打發時一衆賴他便免普請所以道今日不得普請後來衆中多把作禪會了聯燈會要佛日和尚章云師到夾山一日大衆普請次維那令師送茶師云某甲為佛法來不為送茶來那云和尚教上座送師云和尚尊命即得乃携茶去作務處撼盞作聲夾山回顧師云釅茶三五碗意在钁頭邊山云瓶有傾茶勢籃中幾箇甌師云瓶有傾茶勢籃中無一甌便傾茶行時大衆一時舉目師云大衆鶴望請師一言山云路逢死蛇莫打殺無底籃子盛將歸師云手執夜明符幾箇知天曉山云大衆有人也歸去來歸去來忠曰大衆有人也歸去來此即是大慧所謂賴他免普請者已下録非作務而但集衆稱普請者敕修清規送亡云白大衆粥罷普請送亡除守寮直堂外並當齊趣雪峯存禪師録云師示衆云盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看聯燈會要真淨文禪師章云今日莊主設鑽飯俵襯錢參退僧堂內普請喫茶去俵襯錢之襯一本作嚫清拙澄禪師録除夜小參云爆竹已催殘年去明朝普請賀新年交代新職者與舊職者相代也困學紀聞云交代出蓋寬饒傳敕修清規兩序進退云與舊人交代互轉身對觸禮一拜送舊人出交承交代亦曰交承承繼也康熙字典云承繼也詩小雅如松柏之茂無不爾或承疏新故相承無雕落也物初賸語淨慈請無極諸山疏云先與東寺交承於鳳城南畔虗堂愚禪師録有芝峯交承惠茶偈官人交代亦曰交承魯應龍括異志云當湖酒庫有四聖廟在炊淘之後立祠以來閲歲滋久前後交承祀之奉之甚謹每一任初到則上兩幡既解印則復兩幡酬神之庇以為定例交堂僧堂直堂人交付曰交堂大鑑小清規僧堂衆僧須知云直堂須自開靜後看守衆僧被鉢一日至晚不諷經不出外不入寮舍專此一日至放參了名曰交堂交付聖僧侍者看管挂搭初入叢林者挂衣鉢袋於僧堂單位鈎也故凡住持容行腳人依住曰許挂搭楊億古清規序云所裒學衆無多少無高下盡入僧堂依夏次安排設長連床施椸架挂搭道具敕修清規遊方參請云如求挂搭參頭領衆回身進住持前稟云某等生死事大無常迅速久聞道風特來依附伏望慈悲收録稟訖不伺允否即普觸禮一拜云謝和尚挂搭云云如彼住持亦有挂搭儀敕修清規入院云就僧堂前解包屏處濯足取衣披搭入堂炷香聖僧前大展三拜參隨人同拜挂搭已到佛殿拈香大鑑小清規侍者寮榜云昔雪竇明覺禪師在衆日與曾侍郎談道交契一日明覺入浙曾公與書一封至靈隱珊和尚處求挂搭明覺至靈隱相看得挂搭匿其書明年曾公訪靈隱問去年有書送僧挂搭到否珊和尚云無取床歷看有重顯上座名問之乃作淨頭曾公乃相見問其書明覺出其書還之緘封未開曾公大悅知其遠大之人也今日本僧人人求舉書挂搭全無羞恥實使人愁有高見遠識兄弟別有格外相見不舉書為妙忠按雪竇顯公不達曾公贈靈隱書以顯薦達珊禪師故不傳也見僧寶傳挂錫挂搭亦曰挂錫祖庭事苑云西域比丘行必持錫有二十五威儀凡至室中不得著地必挂於壁牙上今僧所止住處故云挂錫二十五威儀具錫杖經挂鉢粥飯畢挂鉢於單後之鈎也敕修清規挂鉢時請知事云預分付堂司行者於僧堂早粥罷挂鉢時喝云大衆少立請新知事有官人挂鉢於禪剎者普燈録徐師川居士章曰為尚書外郎與朝士同志者挂鉢於天寧寺之擇木堂力參圜悟止挂塔敕修清規夏前出草單云叢林以三月初一日出草單方丈止挂搭又月分須知云四月初一日鎖旦過見殿堂門旦過寮處謝挂搭敕修清規謝挂搭云古規挂搭歸堂者即時謝挂搭後以冬節歲節夏前三次謝挂搭近時衲子到處坐席未溫移單東西多致不謝挂搭既曰經冬過夏折中當在冬前夏前兩期報謝其規具如彼參堂沙彌歸堂曰參堂堂者謂僧堂也敕修清規新戒參堂云得度受沙彌戒已覆住持於何日參堂乃至至期早粥遍食椎後新戒參頭領衆入堂聖僧前列問訊插香大展三拜乃至轉身住持前列問訊從首座板起巡堂至外堂復歸內堂中間問訊而出然後歸堂插單隨衆禪誦暖寮忠曰入寮人辨茶果等饗先居人曰暖寮豫聞大德寺亦曰暖寮妙心寺此謂暖席矣清拙小清規云凡入祖堂當一一歷代位牌平等供養云云比之生人入寮暖寮同輟耕録云今之入宅與遷居者鄰里醵金治具過主人飲謂之曰暖屋或曰暖房王建宮詞太儀前日暖房來則暖屋之禮其來尚矣忠曰此暖房鄰里暖於入宅者之房故與禪林暖寮義少異焉暖洞義堂日工集云守亭書記求預會下乃容石屏洞腳又云勸淨智長老春谷令停止兩班官錢且告云今時佛法屬吾宗門宗門弊在名名之弊在暖洞暖洞之弊至官錢極矣與古之賣爵無異請和尚誓革此弊以為永則焉又康曆二年記云承僧録之命巡報建仁兩序西堂諸寮禁止暖洞之儀蓋余之宿志也插單初廁衆插單位於僧堂衆僧之間也敕修清規新戒參堂云歸堂插單隨衆禪誦詳參堂處又移單位亦曰插單敕修清規後堂首座云如缺前堂住持別日上堂白衆請轉前板插單唱食起單忠曰會裏僧辭去某寺曰起單言起其單位也又詳請假處敕修清規月分須知云八月本色衲子未遽起單碧巖録云則監院説丙丁童子來求火法眼云監院果然錯會了也則不憤便起單渡江去云云密菴傑禪師録云應菴一日喝恭上座云儞常在此作什麼恭煩惱打併起單抽單起單亦曰抽單抽下單位也大慧武庫云保寧勇禪師初更衣依雪竇顯禪師問道雪竇呵為央庠座主勇不意堂儀才滿即抽單望雪竇山禮拜誓曰我此生行腳參禪道價若不過雪竇定不歸鄉請假舊説曰暫請假外出者須不過十五日却回若外出過十五日則稱為起單非是請假也須更講挂搭儀挂搭儀者到侍司附名侍司發榜下維那維那出度牒上床曆送歸堂也詳敕修清規遊方參請篇海類編云假去音駕假告休沐正字通云假暇音義別舊注與暇同非居家必用云喪病告報曰假謂借勾當月日也節朔旬休曰暇謂公務空間日也忠曰諸韻書並假字下旬休休沐注而必用獨暇字為旬休按禪林請假非休沐例故不可用韻書假義為辨私事請假故可用必用假義又今時起單稱請假更假作暇皆謬矣敕修清規遊方參請云或有故出入須守堂儀半月方可請假古云請假遊山者常將半月期過期重挂搭依舊守堂儀南禪規式云請假先上方丈報之次報維那寮看寮看寮出紙榜二片一片再上方丈呈之便貼衣鉢閣一片貼僧堂己單名肩呈榜時首尾粘糊以便貼書榜法請假公界某甲限來幾日堂司某甲書請假或病假堂司字印也本寺用則書公界二字亦不書日限又云義堂和尚住南禪日罰榜式中云某上座不請假出京不趣四更坐禪理合出院且從宥恕罰油四斤已下録住持亦言假敕修清規鐘云僧堂鐘遇住持每赴衆入堂時鳴七下住持或不趣堂或在假則不鳴忠曰在假出外也此住持亦言暫假也傳燈録仙宗守玭禪師章云一日不上堂大衆入方丈參師曰今夜與大衆同請假未審還給假也無若未聞給假即先言者負珍重請假本世禮語朝野僉載云權龍襄不知忌日謂府史曰何名私忌對曰父母忌日請假獨坐房中不出襄至日於房中靜坐有青狗突入龍襄大怒曰衝破我忌暫假請假亦曰暫假謂暫時請假也敕修清規維那云或有他緣或暫假出入將戒臘簿假簿堂司須知簿親送過客司令攝之雲臥紀談云真淨和尚住寶峰日洪明一祖同在侍寮祖請暫假真淨不許及上巳日呼俱侍行為寶蓮莊主具飯真淨題偈于壁曰元符二年三月三春餅撮餤桐飯兼真淨來看信道者洪明一祖相隨參祖匿笑謂同列曰元來老和尚以我名廁於偈故不給假也寮假寮假書上中下限在十五日清拙小清規云浴佛在近沙彌喝食不可請假病假寮假病假忠曰為養病請假者見寮假處幻住清規云忽遇病緣宜白之公界移單屏處乃至病或少間當具威儀謝直病人歸堂參假參假凡暫假者不過十五日而再歸堂曰參假若過十五日則抽籍故初出外為起單非請假也若歸則可再行挂搭禮故不可言參假矣忠曰今時新依栖某寺曰參假訛也須稱挂搭清拙小清規云參假僧無維那寮先請假禮者不可免參維那照了瑩山清規云不請假而起單人不可免再參假又云或為請假參假參禪白事詣方丈及諸寮首座等寮不拘時候必搭袈裟也雪巖欽禪師録普説云頓起鄉念且請假歸鄉自此一放都放了也兩月後再來參假又却從頭整頓忠曰過六十日再來亦曰參假依清規非禮住持亦有參假虎丘隆禪師録參假上堂云病起雲山草木秋浮華世事謾悠悠從來萬法不為侶何似韶陽六不收喝一喝下座參假本世禮語戴植鼠璞云唐文武職事官九品以上望朔朝文官五品以上及兩省供奉監察御史員外太常博士日朝為常參武官三品以上三日一朝為九參五品以上及折衝當番五日一朝為六參三日不趂常參即橫行參假時多御宣政正衙立仗廊飱而退分散大衆一同退去曰分散臨濟玄禪師録云徑山有五百衆少人參請師到徑山裝腰上法堂見徑山徑山方舉頭師便喝徑山擬開口師拂袖便行尋有僧問徑山這僧適來有什麼言句便喝和尚徑山云這僧從黃檗會裡來儞要知麼且問取他徑山五百衆太半分散得度忠曰落髮為沙彌此謂得度蓋生死比海今超之到彼岸故言度因中説果也增一阿含經云佛在道場樹下初得佛作是念羅勒迦藍諸根純熟應先得度空中天曰已死復念鬱頭藍弗先應得度空中天曰已死世尊便往波羅奈國度阿若拘鄰等五人試經得度佛法金湯編云唐中宗神龍二年八月詔天下試童行經義挑通無滯者度之唐史試經度僧始此編年通論云唐肅宗至德二年聽白衣能誦經五百紙者度為僧佛祖統紀云宋仁宗詔試天下童行誦法華經中選者得度參政宋綬夏竦監試又見簿券門祠部牒處歐陽修歸田録云宋宣獻公綬夏英公竦同試童行誦經有一行者誦法華經不過問其習業幾年矣曰十年也二公笑且閔之因各取法華經一部誦之宋公十一作五日夏公七日不復遺一字人性之相遠一有也字如此懺悔敕修清規沙彌得度云戒師云汝今至誠隨我懺悔舉云我昔所造諸惡業皆由無始貪瞋癡從身口意之所生一切我今皆懺悔華嚴經疏清涼鈔云懺者梵云懺磨此云請忍悔即此方體是惡作厭先過失求請三寶忍受悔過單云悔者非是六釋合二即是依主根本説一切有部毗奈耶音釋云言懺摩者此方正譯當乞容恕容忍收謝義也若觸誤前人欲乞歡喜者皆云懺摩無問大小咸同此説若悔罪者本云阿鉢底提舍那阿鉢底是罪提舍那是説應云説罪云懺悔者懺是西音悔是東語不當請恕復非説罪誠無由致毗奈耶雜事義淨注云懺謝所言懺者梵云懺摩是謂容恕義後人加悔喚為懺悔此即與説罪義不同也義淨言後人加悔不然經律中皆有懺悔字四分律毗尼增一法云佛告比丘言汝自懺悔於我法中能至誠如法懺悔者便得增益汝懺悔應生厭離心汝比丘至誠如法懺悔我為受之合部金光明經懺悔品云願當受我誠心懺悔令我恐懼悉得消除登壇受戒禪苑清規云三世諸佛皆曰出家成道西天二十八祖唐土六祖傳佛心印盡是沙門蓋以嚴淨毗尼方能洪範三界然則參禪問道戒律為先既非離過防非何以成佛作祖受戒之法應備三衣鉢具并新淨衣物如無新衣浣染令淨入壇受戒不得徣借衣鉢一心專注慎勿異緣像佛形儀具佛戒律得佛受用此非小事豈可輕心若徣借衣鉢雖登壇受戒並不得戒若不曾受一生為無戒之人濫廁空門虛消信施云云納戒傳燈録趙州諗禪師章云從諗禪師曹州郝鄉人也姓郝氏童稚於本州扈通院從師披剃未納戒便抵池陽參南泉云云虛堂録納牌普説舉之作詣南泉請戒謝戒敕修清規沙彌得度云俟他時登壇受戒謝戒詞云某等獲登戒品濫廁僧倫仰荷庇庥特此拜謝答云宿承佛記僧戒圓成堅忍受持力扶宗教傳燈録中邑恩禪師章云仰山初領新戒到謝戒師見來於禪床上拍手云和和仰山即東邊立又西邊立又於中心立然後謝戒了却退後立白四羯磨忠曰如沙彌得度戒師先云汝應受某戒白也次三説某戒相汝能持不三羯磨也通初白名白四羯磨翻譯集羯磨翻業或所作或辨事或作法宗覺六物纂注云就衆法有三一者單白事或輕小或常所行或是嚴制一説告僧便成法事二者白二由事參涉義須通和一白牒事告知一羯磨量處可不便辨前務通白及羯磨故云白二三者白四受戒懺重治舉訶諫事通大小情容乖舛自非一白告知三法量可焉能辨得以三羯磨通前單白故云白四單白有三十九白二有五十七白四有三十八三位八品總數則有一百八十四種羯磨四分律藏云佛告諸比丘有三羯磨攝一切羯磨何等三白羯磨白二羯磨白四羯磨是為三羯磨十誦律云白者白衆是事故名白有僧事初向僧説故名白白羯磨受具足戒布薩説戒自恣等是名白羯磨白二羯磨者若白已一唱説如是白二羯磨是名白二羯磨白四羯磨者若白已二唱説是三羯磨并白為四是名白四羯磨又見雜心論行事鈔等慧苑華嚴音義云羯磨此云辦事謂諸法事由茲成辦也第十類禮則門四分律云佛告比丘云何攝持威儀比丘若出若入屈伸俯仰執持衣鉢若飲若食若服藥大小便利若眠若覺若來若去若坐若住若睡若覺若語若默常爾一心是謂比丘攝持威儀禮拜道宣歸敬儀云禮者履也敬而已矣經云恭敬塔廟謙下比丘者是也禮者履也出説文敬而已矣出孝經廣要道章經云出法華六祖法寶壇經云僧法達常誦法華經來禮祖師頭不至地師訶曰禮不投地何如不禮乃至聽吾偈曰禮本折慢幢頭奚不至地有我罪即生亡功福無比大鑑小清規云禮拜之法自謙之法坐具不敢全展須上兩角摺轉些子若新為僧坐具但半展兩重狹而禮拜又拜時合掌低頭問訊次先兩手托地次兩膝至地低腰妥身仰展開兩掌頭額至地兩手兩膝皆至地名五體投地又拜佛之法仰開兩掌接承如來雙足叩頭而禮拜佛也故曰頭面接足禮今此方人以兩手捏拳不知何義又云禮拜之法低頭問訊先兩手掌至地徐徐五體投地低腰伸手掌而拜有一等執拗之人禮拜時先跪兩膝至地次方兩掌至地威儀不雅如俗人不知次第此大庀謬之人不依真正法度誤後來錯習惡相之甚也大鑑展坐具法見服章門坐具處翻譯名義集云那謨悉羯羅此云禮拜今謂禮之與拜名有通局長短經曰禮者履也進退有度尊卑有分謂之禮禮記云禮也者猶體也體不備君子謂之不成人故孔子云非禮勿視非禮勿聽非禮勿言非禮勿動是則凡所施為皆須合禮此顯禮名通也白虎通云人之相拜者何所以表情見意屈節卑禮尊事者也拜之言服也故周禮明九拜此顯拜名局也若依釋氏如南山云四儀若無法潤乃名枯稿衆生故天台明四種三昧之法是知四儀法則名禮身業恭敬名拜此亦禮通拜局今此翻譯禮即是拜故大論云禮有三種一者口禮二者屈膝頭不至地三者頭至地是為上禮一口禮者如合掌問訊也觀音義疏云此方以拱手為恭外國以合掌為敬手本二邊今合為一表不散誕專至一心僧祇律云禮拜不得如啞羊當相問訊爾雅云訊言也地持論云當安慰舒顏先語平視和色正念在前問訊善見論云比丘到佛所問訊云少病少惱安樂行不二屈膝者即互跪也音義指歸云不合云胡跪蓋梵世遺種居五竺間蔥嶺之北諸戎羌胡今經律多翻互跪以三處翹聳故名互跪即右膝著地也涅槃疏明三義一右膝有力跪能安久二右膝有力起止便易三右膝躁動著地令安若兩膝著地則名長跪毗奈耶云尼女體弱互跪要倒佛聽長跪三頭至地者即五體投地故大論云人之一身頭最為上足最為下以頭禮足恭敬之至輔行云準地持阿含皆以雙膝雙肘及頂至地名五體投地亦名五輪五處圓故華嚴經十回向品疏云勒那三藏説七種禮今加後三以成圓十一我慢禮謂依次位立無敬心故二唱和禮高聲喧雜故此二非儀三恭敬禮五輪著地捧足殷重故四無相禮入深法性離能所故五起用禮雖無能所而禮不可禮之三寶一一佛前皆影現故六內觀禮但禮身中法身佛故七實相禮無內無外同一實故八大悲禮前雖有觀未顯為生今一一禮普代衆生故九總攝禮總攝前六為一觀故十無盡禮入帝網境若佛若禮重重無盡故鈔禮佛十重初二非儀令其知非故辨之耳三通權小四是始教順空義故五是終教通事理故六七頓教但禮心佛無禮禮故八通終教同教一乘故後三合成圓教八是能禮一具一切故九融深淺事隨理融事事無礙故而言攝前六二非儀故十重重無盡故下經云一毛孔中悉明見不思議數無量佛一切毛孔皆如是普禮一切世間燈舉身次第恭敬禮如是無邊諸最勝亦以言辭普稱讚窮盡未來一切劫一如來所供養具其數無量等衆生又普賢行云於一微塵中見一切諸佛菩薩衆圍繞法界塵亦然一一如來所一切剎塵禮等若依此禮一禮則無有盡功德豈可量哉忠曰勒那七禮廣説如法苑珠林致敬篇及道宣歸敬儀西域記云致敬之式其儀九等一發言慰問二俯首示敬三舉手高揖四合掌平拱五屈膝六長跪七手膝踞地八五輪俱屈九五體投地凡斯九等極唯一拜跪而讚德謂之盡敬遠則稽顙拜手近則舐足摩踵智度論云何名頭面禮足答曰人身中第一貴者頭五情所著而最在上故足第一賤履不淨處最在下故是故以所貴禮所賤貴重供養故復次有下中上禮下者揖中者跪上者稽首頭面禮足是上供養以是故佛毗尼中下座比丘兩手捉上座兩足以頭面禮又云天竺以捉足為第一恭敬忠曰清拙仰開兩掌接承如來雙足止此固無間然而智度論已言毗尼中兩手捉上座兩足止此今且引律證覆開兩掌執觸前人足上毗奈耶雜事云難陀執持衣鉢入城乞食巡至鹿子母家時毗舍佉見彼容儀光飾便起淨信禮其雙足將手觸著彼身柔軟女是觸毒近便損害難陀便起染心略鈔又十誦律云爾時諸比丘以油塗足上是國多塵土著比丘腳諸居士婦以兩手接比丘足作禮然後洗手捉鉢下食比丘言先洗手已捉鉢答言已洗若汝不油塗足者當有何過佛見婦呵責還僧房語比丘從今不應油塗足上入白衣家又十誦律云毗舍佉鹿子母信衆僧兩手接足頭面作禮釋氏要覽云長阿含經云二肘二膝頭頂謂之五輪輪者圓轉之義也亦云五體凡禮拜必先並足正身合掌俯首以手褰衣衣即袈裟也五百問云不褰三衣禮拜得衆多罪先以右膝著地次下左膝以二肘著地舒二掌過額承空示有接足之敬也以頭在地良久方成一拜若以中拇指相拄或以掌承面或捺地並非儀也又云大方廣寶篋經智燈聲聞問文殊言云何禮佛文殊言若見法淨名見佛淨若身若心不低不昂正直而住不動不搖其心寂靜行寂靜行是名禮佛萬善同歸集云若行道禮拜時不生殷重既無觀慧又不專精雖身在道場而心緣異境著有為之相迷其性空起能作之心生諸我慢不了目他平等能所虛玄儻涉茲倫深當客舂磨牛責野客叢書云古者拜禮非特首至地然後為拜也凡頭俯膝屈手動皆謂之拜按周禮辨九拜之儀云云肅拜但俯下手即今之揖也何嘗專以首至地為拜邪乃知禹聞善言則拜如揖之類是也豈僕僕之謂哉周禮九拜解見頓首處朱子語録云古人之拜正如今道士拜二膝齊下唐人先下一膝謂之雅拜李濟翁資暇録云夫拜者禮之特所以申敬恭之儀故周禮有稽首頓首振動吉凶奇褒肅九等之拜以示威靈而觀容止也其非至親行卑者拜則接捧示止之不敢當之意今卑謙大過反不敢接捧而鞠躬側立惕受翻令前人得以盡禮深拜又書狀弔慶辭竭並削去拜字以敬尊官都乖古風周祈名義考云首與要平為拜荀子平衡曰拜平衡謂磬折正首與要平荀子注首與腰如衡之平再拜史記周本紀云商人皆再拜稽首武王亦答拜通鑑前編載之作載拜稽首大鑑附録云中吳承天南楚師悅載拜正字通云載與再同小雅賓載手仇忠曰釋氏要覽再拜為俗法見三拜處然師悅有載拜白虎通姓名篇云人所以相拜者何所以表情見意屈節卑體尊事之者也拜之言服也所以必再拜何法陰陽也尚書曰再拜稽首也忠曰尚書云禹拜稽首臯陶拜手稽首等無再之言三拜敕修清規聖節云出班上香乃至大衆同展三拜廣燈録菩提達磨章云命門人曰汝等盍各言乎乃至二祖出禮三拜依位而立師云汝得吾髓釋氏要覽云俗中兩拜者蓋法陰陽也今釋氏以三拜者蓋表三業歸敬也智論云內式禮拜大約身口業也佛法以心為本以身口為末故三拜為禮數南海寄歸傳云凡禮拜者意在敬上自卑之儀也欲致敬時及有請白先整法衣乃至足跟雙豎脊項平直十指布地方始叩頭然其膝下回無衣物復還合掌復還叩地殷勤致敬如是至三必也尋常一禮便罷中間更無起義西國見為三拜人皆怪之乃至如經律云來至佛所禮佛雙足在一邊坐不云敷坐具禮三拜在一邊立祇洹圓經受戒登壇儀云當佛禮三拜運想請十方現在諸佛諸大菩薩等又云面北禮佛三拜又法苑珠林引西國寺圖云行至佛所禮三拜竟圍繞三匝唄讚三契禮佛既已方至僧房房外一拜然後入見上座次第至下各設三拜僧多一拜忠曰若據此説則天竺非無三拜法外典亦有三拜國語云蔡聲子曰子尚良食吾歸子湫舉降三拜納其乘馬注拜善言也夷俗亦有三拜法宋史外國傳云闍婆國王椎髻戴金鈴衣錦袍躡革履坐方牀官吏日謁三拜而退大展三拜敕修清規告香云參頭同衆問訊插香各大展三拜又大挂搭歸堂云參頭至聖僧前排立參頭燒香同衆大展三拜睦州蹤禪師録云問僧莫是從河北來麼僧云某甲近離江西師云大展坐具禮三拜著其僧禮拜了便出去大隋真禪師録云投子和尚呼侍者令裝香大展坐具望西川大隋山遙禮三拜聯燈會要保寧勇禪師章云少習天台教後更衣謁雪竇顯禪師顯熟視之呵曰殃祥座主師氣不平發憤下山望雪竇山大展坐具禮三拜誓曰我此生行腳參禪名不過如雪竇誓不歸鄉五祖演和尚太平録上堂云將四大海水為一枚硯須彌山作一管筆有人向虛空裏寫祖師西來意五字太平下座大展坐具禮拜為師虛堂愚和尚録普説云踈山云若教某甲道須還師資之禮始得香嚴乃下座大展坐具禮三拜準前問南堂欲禪師開福録云衆中忽有忍俊不禁底出來掀倒禪床喝散大衆山僧大展坐具禮他三拜忠曰或解展開手也將合掌時先大開展兩手於左右却合掌此謂大展矣然此説無據諸録已言大展坐具非開手明矣禪苑清規入室云有處大展有處觸禮止此此亦以觸禮對大展則展開坐具義為正焉若大展開手拜者大儀式時然表恭恪也敕修清規沙彌得度云沙彌插香大展三拜解者曰侍者小師拜不全展坐具然今言大展也忠曰大鑑小清規云禮拜之法自謙坐具不敢全展須上兩角摺轉些子若新為僧坐具但半展兩重狹而禮拜止此解者憑之恐清規失辭同展三拜敕修清規聖節云出班上香大衆同展三拜備用清規聖節云出班畢大衆同展三拜此拜佛為告天祝壽也忠曰凡聖節二祖三佛會皆有此規行者先高聲喝云大衆列拜止此大衆一同展坐具三拜展有二切一旃上聲一知輦切見次下兩展三禮處九拜舊説云禪林九拜者展坐具三拜者三度遂成九拜敕修清規當代住持受請云專使插香大展三拜進前云某蒙山門使令攀屈尊嚴得奉慈顏下情不勝感激之至又三拜詞云即日時令謹時共惟新命堂頭大和尚尊候起居萬福復三拜收坐具村寺清規行腳云行腳須見尊宿見尊宿須預見侍者託通名候見合致九拜敬乃請尊宿趺坐當中問訊出所懷香雙手把進插香爐中退展坐具禮三拜即穿鞋自坐具左以進尊宿坐右鞠躬叉手云某久仰道風此日幸遂展拜下情不勝多感之至復側身顧尊宿歸坐具再禮三拜又進云即日共惟某山堂上老師大和尚尊候動靜多福復退禮三拜合掌問訊尊旨就坐喫茶茶罷復出香爐前問訊謝茶而退律苑事規云大展九拜詞語先敘事次寒暄並同禪規右證三拜三度而成九拜禪苑清規挂搭云入室弟子洎法眷卑行並大展九拜備用清規結制行禮云方丈客頭行者進罣罳椅子住持即趺坐侍者一班進前插香九拜次辨事小師插香九拜又開堂祝聖云進罣罳椅子據坐侍者插香大展九拜小師插香大展九拜敕修清規為行者普説云參頭緩聲喝云不審衆低聲和畢同禮九拜又請益云侍者引入住持前問訊插香大展九拜乃至諦聽埀誨畢進前插香大展九拜謂之謝因緣詳參請門請益處雪巖欽禪師録普説云聞天目和尚久侍松源是松源的子必得松源説話移單過淨慈挂搭懷香詣方丈請益大展九拜聖一國師年譜云弘安三年庚辰師七十九歲無傳嗣徑山𤤴荊叟自越後來插香作禮師曰最後相見須致九拜拜畢而坐永平元和尚曰結解冬年及旦望參師燒香九拜或十二拜若請益則不必用九拜十二拜或觸禮一拜或三拜或稽首拜或六拜其一拜三拜六拜並額叩地此名頓首拜永平清規典座教訓云齋粥辨了典座搭袈裟展坐具先望僧堂焚香九拜了乃發食也日本國僧食之法先德未記僧食九拜之説未夢見在唐假成式續酉陽雜爼云長樂坊安國寺彌勒像法空自光明寺移來初移像時索火如虎口數十牛曳之索斷不動法空執爐依法作禮九拜像身忽迸分不終日移至寺焉人天寶鑑云道曇法師凡閲經炷香九禮趺坐良久然後開帙常訓諸徒曰夫窺聖教意在明宗若不端己虗心爭到如來境界忠曰面墻之徒妄謂禪林門狀及文翰言九拜非也夫周禮有九拜此依位高下分九品拜也又佛祖忌九拜乃三回三拜也豈有一時為九拜者哉故今略録數證敕修清規附一山書云了万九拜復前智者堂上和尚雲翁老師兄尊几雪峯存禪師録二十四景總詩尾云當代住山遠孫比丘智明九拜書南堂欲禪師録松源老祖家書跋云頓首九拜謹志乎下方云月江印禪師録應菴與烏巨書跋云三復感慨焚香九拜而為之書清拙澄禪師録示寂前一日預代小師作祭文云謹以湯茗果蓏之儀九拜致祭于真慈又附録瑤首座字玉淵大元國人悼清拙偈後云小師堅瑤九拜又祖柏和瑤首座悼偈序云梓末比丘祖柏九禮明極俊禪師録附寶屏雲長老詩序云口占數語尚希慈盻門人大雲九拜佛祖忌九拜敕修清規佛降誕云住持上香三拜不收坐具進前上湯進食請客侍者遞上燒香侍者捧置于几畢復位三拜再上香下嚫點茶又三拜收坐具又達磨宿忌云住持上香三拜不收坐具上湯退身三拜再進前問訊揖湯復位三拜收坐具餘忌例同不用煩録舊説曰九拜法諸規相同惟建仁寺所講上香三拜次上湯上食下嚫點茶畢三拜次進揖三拜頗異餘剎東福寺進食之次獻果子建仁點茶之次獻果子蓋果子是為茶子之謂歟中華則供具外無更備果而日本則更備果矣祖忌十八拜敕修清規達磨忌云住持上香三拜不收坐具進爐前上湯上食請客侍者供遞俟燒香侍者就祖位側捧置几上退就位三拜仍進前燒香下嚫畢三拜收坐具鳴鼓講特為茶如湯禮忠曰特為湯宿忌記之故不煩重録特為湯有九拜佛祖忌九拜録之今亦如此合前成十八拜十八拜兩回九拜也先住持上香歸行者展席住持三拜不收坐具進上湯進食歸三拜進上香下嚫歸三拜收坐具行者捲席復住持進上香歸行者復展席住持三拜不收坐具行者鳴茶鼓住持進上茶歸三拜又進深揖歸三拜行者止鼓住持收坐具行者捲席百拜希叟曇禪師正宗贊序云寶祐甲寅西蜀比丘紹曇百拜書于靈鷲放山室忠曰百拜直為一百度禮拜也或又但言數多耳不必禮拜百度矣論衡儒增篇云百與千數之大者也實欲言十則言百百則言千矣是與書言協和萬邦詩曰子孫千億同一意也儒亦有百拜禮記樂記云一獻之禮賓主百拜疏謂士之饗禮唯有一獻言所獻酒少也從初至末賓主相答而有百拜言拜數多也明聖君初政記曰洪武三年五月諭中書省曰今人書札多稱頓首再拜百拜非實禮也宜定其式凡致書于尊者稱端肅奉書答則稱端肅奉復儒論再拜禮重野客叢書云漫録曰晏元獻與兄手帖曰殊再拜莊客至知大事禮畢云云此外希順變不備殊再拜十一哥十一嫂僕家有富鄭公一帖正與晏元獻一同前後皆云弼再拜幾叔幾嬸乃知前輩以再拜二字施於尊長不肯輕用而今人或用此二字則以為輕己雖平交亦不敢况兄與叔乎儒有四拜李涪刊誤云夫郊天祭地止於再拜其禮至重尚不可加今代婦謁姑嫜其拜必四豫輒詳之婦初再拜次則跪獻衣服支史承其筐篚則跪而受之常於此際授受多誤故四拜相屬因為疑又婦拜夫家長老長老答之則又再拜即其事也士林威儀豈可效諸下俚耶謁拜姑嫜宜修典故再申插地周禮婦拜插地其儀可觀儒有八拜邵伯溫聞見前録云韓魏公留守北京李稷以國子博士為漕頗慢公公不為較待之甚禮俄潞公代魏公為留守未至揚言云李稷之父絢我門下士也聞稷敢慢魏公必以父死失教至此吾視稷猶子也果不悛將庭訓之公至北京李稷謁見坐客次久之公著道服出語之曰而父吾客也只八拜稷不獲已如數拜之儒天子前有二十四拜水滸傳云宋江等朝覲東京侍御史引至丹墀玉階之下宋江盧俊義為首上前八拜退後八拜進中八拜三八二十四拜揚塵舞蹈山呼萬歲儒有萬拜羣談採餘諂媚類云羅志仁姑蘇筆記賈似道當國時浙曹朱浚每有札子白事必稱某萬拜復時人謂之朱萬拜浚晦翁曾孫也餘冬序録亦載之云朱浚字深源趙世顯客窗隨筆云李涪謂唐世郊天祭地止於再拜其禮至重不可加而以婦拜姑章必四為非禮然則彼時不行四拜也方干處士每拜必三時謂之方三拜宋朱元晦孫為淮東提刑與顯者書必云萬拜時謂之朱萬拜方未免好奇之過朱則諛佞喪厥祖風矣千拜忠曰又有千拜者大寶積經護國會云福焰王子即乘吉利意如來光至如來前舉身投地如大樹倒禮彼如來一千拜已説偈不住拜永平元和尚曰法益之時亦有不住拜謂禮拜而不止也可到百千拜是皆佛祖之會所用來拜也兩展三禮字彙云展之輦切旃上聲開也舒也小補韻會云展知輦切舒也舊説曰展者初欲展坐具師家揶揄止之故作摺勢復欲重展復止之復作摺勢然不拜則情不足故不展坐具而手持觸地拜而已或曰展者插手於坐具也至第三度抽之點額而禮忠曰或曰展者展禮話也謂敘事寒暄豫謂展固係坐具初欲展具師家約免即不展具但敘事情第二展義同敘寒暄耳非展禮詞之義敕修清規遊方參請云起至爐前兩展三禮謝茶初展云某等重承煎點特此拜謝下情不勝感激之至再展云即日時令謹時恭惟堂頭和尚尊候起居多福退身觸禮三拜又謝挂搭云參頭一展坐具住持展手約免之即收起參頭進前云某等宿生慶幸獲遂依棲下情不勝喜躍之至仍如前退身香几右手轉歸位問訊再展坐具住持復如前約免收坐具再進前云即日時令謹時恭惟堂頭和尚尊候起居多福仍如前轉歸位問訊觸禮三拜住持答一拜又大鑑説見觸禮處忠曰上來所録到第三度觸禮三拜其三拜但是三度點額也然又有第三度真三拜者敕修清規受法衣云插香兩展三禮免則觸禮止此此既免真三拜故但觸禮點額三度也校定清規云兩展三拜亦有議論高者凡前兩展住持不答拜只以兩手作分開勢蓋彼欲展拜此以手免之故彼抽之彼又展此又免之故彼觸拜則住持亦當觸拜酬之僧史略云近以開坐具便為禮者得以論之昔梵僧到此皆展舒尼師壇就上作禮後世避煩尊者方見開尼師壇即止之便通敘暄涼又展猶再拜也尊者還止之由此只將展尼師壇擬禮為禮之數所謂蓌拜也如此設恭無乃太簡乎然隨方為清淨者不得不行也祖庭事苑引僧史略文了云今叢林尊宿亦行此禮所未便者僧方展坐具即反答一拜實為倒置往往輒謂一展即當二拜不知據何而為此言所謂蓌者詐也卑以詐拜而尊實答之既重輕之不分使後世將何以為法邪而今而後慎勿言答拜之禮以取笑於傍觀蓌祖臥切釋氏要覽云南方以抽坐具為禮律檢無文已下引僧史略又云蓌音挫拜失容又云詐也村寺清規敘九拜了云然今叢林多只兩展三拜或謂昔有梵僧來參仰山僧方展而山憐其遠來特止之僧即進前切敘云久仰道風意欲展拜山又止之僧故只通寒溫而後觸禮三拜云云後世因之而為敘見之禮又或更簡而只觸禮三拜云云但梵僧參仰山之事清規諸書所不載後學不知兩展三禮之由竟昧見尊宿當九拜之敬耳村寺清規万一山跋云豫初遊方一尊宿曰昔仰山有西土僧來參手展坐具山挹而辭之遂通仰參復欲展禮山又止乃通寒溫僧則觸禮三拜叢林若不本此説則此禮無義理後豫任職衆中睹師徒行禮其徒方展坐具而師乃答拜次日豫詰曰詎有為徒者方展具而師即拜於理未通師曰近代宗師皆然豫舉前話以應遂以豫言為是茲事蓋清規所不載忠曰僧史略開坐具為禮引梵僧緣通慧博該必有所據後世因作梵僧參仰山兩展三禮之説夫仰山別有梵僧來參緣乘之傅會矣宜哉清規諸書不載律苑事規云禪規二展三禮今律規併作大展三拜詞語先寒暄次敘事一併稱之住持不答拜舊説曰兩展陳辭每展別初展言某事再展言起居舊説云或規有初展敘時令異于敕修清規忠曰言或規者指律苑乎若然則卒見律苑云先寒暄次敘事謬解為二展三禮事而自以為異餘規然律苑實以禪規二展三禮合為一箇大展三拜故拜間不交詞語拜前一併稱唱之其語先寒暄次敘事也若到大展九拜則每三拜展詞其語先敘事次寒暄並同禪規九拜處引律苑敕修清規亦一併稱之則先起居次敘事見遊方參請及謝挂搭敕修何異律苑耶舊説又云澤山清規先敘時令止此妄謬惑人有如此者備用兩展皆先敘事次寒溫與敕修全同因録一併唱語法敕修清規遊方參請云參頭領衆至客司乃至詞云即日恭惟知賓尊長禪師尊候起居多福久欽道譽獲奉瞻際下情不勝感激之至又云知客詞云移刻恭惟諸位尊長禪師尊候起居多福適承降重特此拜謝下情不勝感激之至一併詞語先拜次詞語敕修清規謝挂搭云參頭轉身至爐前對觸禮一拜詞云移刻恭惟堂頭和尚尊候起居多福某等重荷收録禮合拜謝茲蒙降尊下情不勝感激之至又云次揖兩序入對觸禮一拜詞云即刻恭惟座元都總諸位禪師尊候多福某等獲遂依附乃承隆重下情不勝感激之至觸禮見兩展三禮處舊説曰以頭觸地故云觸禮忠曰以坐具觸地三叩頭故云觸禮三拜舊説曰觸義未詳義堂岐陽皆不明説忠曰觸義明見大鑑清規語亦何疑焉大鑑小清規云古法小比丘見大比丘必須展拜一問訊便展坐具大比丘堅以手約免之或以坐具約而免之小比丘收摺了又殷勤必欲展拜又展坐具大比丘又堅約免之小比丘又收摺了敬禮之心未息乃以坐具觸地三而拜之大比丘遂答之一拜此其兩展三拜之本意也舊説曰觸禮三拜有數説一曰三折坐具當額於其一折面三叩也一曰執坐具正半四折當額於其上面三叩也一曰前兩展後一拜合稱三拜忠曰第三説非是敕修清規中有但觸禮三拜而無前兩展者敕修清規方丈四節特為首座大衆茶云首座至住持前謝茶兩展三禮初展云云再展云云退觸禮三拜住持每一展則約止之至觸禮則答一拜舊説曰觸禮如軍中蓌拜僧史略説見兩展三禮處蓌拜略拜也軍中負兵器身體不自在故然小補韻會云蓌祖臥切説文拜失容也禮記介者不拜為其拜而蓌拜朱氏曰蓌猶言有所枝拄不利屈伸律苑事規云原其坐具之制為護身護衣故觸禮之法頭若至地身衣有汙非所宜也又云禪規觸禮之法有污身衣盡除去之觸禮一拜敕修清規聖節云維那詣書記寮觸禮一拜稟云啓建聖節煩製疏語書記製畢具草先呈住持親送堂司觸禮一拜答先禮也對觸禮敕修清規入院云新命受草賀了鳴僧堂鐘領衆躬送前代歸寮對觸禮一拜對轉觸禮備用清規侍者進退云當日批下堂司請舊侍者茶送歸衆寮維那上首對觸禮一拜對轉觸禮一拜送維那出門敕修清規侍者進退云與維那交互對觸禮一拜止此即是對轉觸禮也備用清規小挂搭歸堂云參頭同到衆寮維那上間入對觸禮一拜對轉對觸禮一拜敕修清規小挂搭歸堂云維那居上間對觸禮一拜轉下間又對觸禮一拜普觸禮敕修清規諸方名勝挂搭云凡欲求挂搭次日赴茶罷稟云某等為生死事大特來依棲伏望收録普觸禮一拜備用清規侍者進退云受請人進前普觸禮一拜忠曰衆人一時觸禮故曰普也普同作禮敕修清規結制禮儀云行者喝云大衆普同作禮觸禮三拜解者曰大衆各各互禮也丈夫拜雪峯存禪師録云師領徒南遊時黃涅槃預知師至搘策造前途接之抵蘇溪邂逅相遇師遂問曰近離什麼處槃云離辟支巖師云巖中還有主麼槃以竹策叩師簥師乃出簥相見槃云曾郎萬福師遽展丈夫拜槃亦作女人拜答師云莫是女人麼槃又設兩拜云云女人拜傳燈録南泉願禪師章云師與歸宗麻谷同去參禮南陽國師師先於路上畫一圓相云道得即去歸宗便於圓相中坐麻谷作女人拜師云恁麼即不去也歸宗云是什麼心行師乃相喚回不去禮國師又見丈夫拜處傳燈一山解云女人拜女人立拜屈膝而已又曰以兩手當胸前些子鞠躬事物紀原云禮曰男拜則尚左手女拜則尚右手又居喪之禮男拜稽顙女子則否是古者男女之拜一也古詩曰長跽故夫前五言之作自漢李陵推此則由漢而來其拜猶同耳孫甫唐書云唐武后欲尊婦人始易今拜是則女屈膝而拜始於唐武后也忠按女屈膝恐屈上脫不字鶴林玉露云宋朱文公云古者婦女以肅拜為正謂兩膝齊跪手至地而頭不下也拜手亦然南北朝有樂府詩説婦人曰伸腰再拜跪問客今安否伸腰亦是頭不下也周宣帝令命婦相見皆跪如男子之儀不知婦人膝不跪地而變為今之拜者起於何時程泰之以為始於武后不知是否余觀王建宮詞云射生宮女盡紅糚請得新弓各自張臨上馬時齊賜酒男兒跪拜謝君王則唐時婦女拜不跪可證矣事言要玄事集云代醉篇禮婦人與丈夫為禮則俠拜俠者夾也謂男子一拜婦人兩拜夾男子拜今婦人之拜不跪則異於古所謂俠拜江浙衣冠之家尚通行之閭巷則否江鄰幾嘉祐雜志載司馬溫公之語乃謂陝府村野婦人皆夾拜城廓則不然南北之俗不同如此又曰古者男女皆跪男跪尚左手女跪尚右手以此為別自唐武后尊婦人始為今拜而不屈膝此見張建章渤海國記不謂無據然大觀北史周時詔內外命婦拜宗廟及天臺皆俯伏則知前此婦人蓋已不跪者矣文海披沙云婦人拜而不跪自古已然宋王貽孫對趙中令謂古詩長跪問故夫則古婦人亦跪不跪自唐則天始今制婦人亦跪但拜時不如男子一揖間一拜耳然連拜不起揖者俗謂之叩首乃賤者之禮非貴之也至於揖則男子雙手至地婦人略縮膝而已此禮不知與古同否也團拜衆人聚拜曰團拜敕修清規庫司四節特為首座大衆湯云各鄉曲依所出榜詣各處團拜答拜敕修清規尊宿遷化奠茶湯云主喪炷香禮真小師真左答拜尚書顧命云太保受同降盥以異同秉璋以酢授宗人同拜王答拜春秋左氏傳文十三年云鄭伯拜公答拜周禮九拜有褒拜正字通云詩詁謂褒拜為答拜古文報亦作褒宋陳賓桃源手聽云史越王罷相歸里經從慈溪邑宰蔣鶚遠迎既見邑吏而下皆參羅拜庭下越王答拜蔣宰局脊請免王曰閣下與之有名分某與之為鄉曲還拜答拜亦曰還拜敕修清規尊宿遷化下遺書云住持詣靈几前炷香點湯上祭點茶展拜專使座右還拜頓首九拜之一也周禮大祝云辨九一曰稽首二曰頓首三曰空首四曰振動五曰吉六曰凶七曰奇八曰褒九曰肅注稽首拜頭至地也頓首拜頭叩地也空首拜頭至手所謂拜手也吉拜拜而后稽顙凶拜稽顙而后拜奇拜謂一拜褒拜報拜也肅拜但俯下手振動者正字通云振動如儀禮之揖厭推手曰揖引手曰厭今謂之打躬連拱手詩詁謂戰栗變動恐悚迫蹙而下手忠曰凡九拜解釋正字通用捨注疏欲得其詳者須撿彼文獻通考云朱文公熹白鹿禮殿塑像説曰其為頓首則又以頭頓手上也其為稽首則又卻其手而以頭著地野客叢書云今人或以頓首施於卑下不知拜頭叩地豈卑下之所安乎經國大典注解云臣之於君稽首稽首者引首稍久在地稽者稽留之意下官於上官頓首頓首者額至手即起也上官於下官空首空首者頭不至手即起也平交者亦空首賓退録云其為頓首則又以頭頓于手上也其為稽首則又卻其手而以頭著地叩首永平元和尚云凡禮拜以頭叩地或至血出此名頓首拜磬折史記滑稽傳云西門豹簪筆磬折注磬折謂曲體揖之若石磬之形曲折也磬一片黑石凡十二片樹在虡上擊之其形皆中曲埀兩頭言人腰側傾也後漢書馬援傳云公孫述警蹕就車磬折而入注磬折者屈身如磬之曲折敬也禮記曲禮云立則磬折疏僂折如磬之背故云磬折也韓詩外傳云立則磬折拱則抱鼓藝圃球琅威儀篇云立以磬折坐必抱鼓注磬折鞠躬也抱鼓手拱也莊子漁父篇云夫子曲要磬折孝經援神契云孔子作孝經使七十二子向北辰磬折叉手洪武正韻云叉手相錯也今俗呼拱手曰叉手事林廣記載王日休速成法云叉手法小兒六歲入學先教叉手以左手緊把右手其左手小指則向右手腕右手皆直其四指以左手大指向上如以右手掩其胸不得著胸須令稍離方為叉手法也敕修清規裝包云途中雲水相逢彼此叉手朝揖而過十誦律云民大居士從座起叉手合掌白佛言世尊願佛及僧受我舍宿佛默然許之佛説方等般泥洹經曰佛告阿難汝為空無菩薩自西方樂園世界來者叉十指説是偈言其雄根為寂定空無出大光明我為勇猛叉手為師子大吼禮云云佛告阿難汝用是叉手功德我般泥洹已後六月中當獨作佛天上天下人皆當稽首向汝作禮云云如來今現在若泥洹後以直心無諛諂之意一心叉手向説法者諸佛天中天皆當授其決及少功德者皆當具足得是法何况樂喜無瑕穢者忠曰須知此經所謂叉手者捨妄心收歸一真法界者故其功德如經所説後漢書馬援傳云豈有知其無成而但萎腇咋舌叉手從族乎傳燈録南泉願禪師章云有僧問訊叉手而立師云太俗生其僧便合掌師云太僧生忠曰合掌西竺之法叉手本中華古法為俗禮故南泉以為太俗生舊説曰凡進退法進前叉手退後合掌是其通式也合掌日用軌範云合掌手指不得參差須當胸高低得所不得以手托口邊古云參差合掌不當胸兩手交加插鼻中拖履揭簾無款細嘔聲泄氣逞英雄永平清規赴粥飯法云合掌指頭當對鼻端頭低指頭低頭直指頭直頭若少斜指頭亦少斜其腕莫教近於胸襟其臂莫教築於脅下又與問訊同看智者觀音義疏云合掌者此方以拱手為恭外國合掌為敬手本二邊今合為一表不敢散誕專至一心一心相當故以此表敬也觀解者昔權實不合而今得合乃至廣説合掌表於返本還源入非權非實事理契合故合掌也前禮拜處名義集略引之法苑珠林致敬篇云律云當令一心合十指爪掌供養釋師子或云叉手白佛者皆是斂容呈恭制心不令馳散然心使難防故制掌合而一心也今禮佛者多有指合掌不合或有掌合而指開良由心慢而惰散也寧開指而合掌不得合指而開掌本欲來求福却反招慢過釋氏要覽云合掌若此方之叉手也法苑云若指合其掌不合者良由心慢而情散故也必須指掌相著不令虗也資持記云合掌者定心想也兩掌相抵指掌齊合今人但合指耳忠曰禪林有人但合十指頭不合其掌像未開蓮因名蓮華合掌矣夫蓮華合掌別在儀軌逍遙園記羅什答秦王問供養法華正用蓮華合掌蓋依供養蓮經若尋常合掌則不可徒虗掌黏指端既當諸師銼折好善兄弟勿從非法焉又理趣六波羅蜜多經云以無量功德莊嚴之手如新生蓮華合掌恭敬止此是謂手之清淨非合掌如蓮華也和南敕修清規聖節云住持和南登座又寮元云每日粥罷大衆歸寮乃至副寮出燒香歸位茶頭喝云不審大衆和南翻譯名義集云槃那寐或名槃談訛云和南皆翻我禮行事鈔僧像致敬篇云四分至上座前脫革屣偏袒右肩合掌手執兩足云我和南義云度我而作禮也出要儀云和南者為恭敬也聲論云槃那寐此翻為禮法苑珠林云依經云和南者梵語也或云那謨婆南等此猶非正依本正云槃淡唐言我禮或云歸禮歸亦我之本情禮是敬之宗致也或云歸命者義立代於南無也理事符同表情得盡俗人重南無而輕敬禮者不委唐梵之交譯也况復加以和南諸佛迷之彌復大笑又南無者善見論翻為歸命覺亦云禮大壽又和南者出要律儀翻為恭敬善見論翻為度我準此而言恭敬度我義通凡聖豈和南偏在尊師亦通上聖忠曰和南諸佛之南字當作尚也僧祇律云佛言和南有三種身口心身者前人若坐若立住頭面禮足是名身口者若前人遠遙合掌低頭作是言和南是名口心者若以背去應合掌作敬是名身口心恭敬玄應一切經音義云南無或作南謨或言那模皆以歸禮譯之言和南者訛也正言煩淡或言槃淡此云禮也或言歸命譯人義安命字普同和南同普同問訊敕修清規念誦云供頭鳴堂前鐘三下衆普同和南問訊祖庭事苑云訊亦猶問古之重語也釋氏要覽云爾雅云訊言也善見論云比丘到佛所問訊云少病少惱安樂行否僧祇律云禮拜不得如啞羊當相問訊地持論云當安慰舒顏先語平視和色正念在前問訊見禮拜處口禮中敕修清規聖節云維那往住持前問訊巡堂一匝歸內堂中間問訊而出忠曰舊説謂日本問訊但合掌低頭闕不審詞太簡乎止此蓋見僧祇啞羊之誡云爾歟然不可一定説清規問訊合掌低頭如大鑑説不必敘言詞聖節中亦云兩序對出向佛問訊上香止此日用軌範云摺袈裟了亦當問訊而去止此此般豈亦出語曰不審耶大鑑小清規云兩掌相合但名合掌若合掌低頭敬揖此名問訊今此間人但合掌名曰問訊此亦錯誤傳習也又云凡兩掌相合只名合掌如十佛名時大衆合掌默念佛名不名問訊如揖香揖茶此時合掌低頭揖衆此名問訊如自己於佛前合掌低頭敬揖諸佛此名問訊如主賓相見合掌相揖此名問訊如合掌巡堂不名問訊巡堂村寺清規云事畢或轉身團欒問訊或只就位略轉面相顧左右和南却須以頭面隨手略轉相揖左右而問訊不得但俯首以手搖拽左右舊説曰凡問訊但曲腰而直項非也須傾首寓敬意僧史略云如比丘相見曲躬合掌口曰不審者何此三業歸仰也曲躬合掌身也發言不審口也心若不生崇重豈能動身口乎謂之問訊其或卑問尊則不審少病少惱起居輕利不上慰下則不審無病惱乞食易得住處無惡伴水陸無細蟲不後人省其辭止曰不審也大如歇後語乎智度論云問曰寶積佛一切智何以方問訊釋迦牟尼佛答曰諸佛法爾知而故問復次大貴大賤不應相問訊佛力等故應相問訊問曰何以問少惱少病不答曰寒熱飢渴兵刃墜落外病四百四病內病如是二病有身皆苦故問少惱少患不人雖病差未得平復故問興居輕利雖病差能行步坐起氣力未足不能造事携輕舉重故問氣力雖舉重携輕有貧窮恐怖不得安樂故問得安樂不復次有二種問訊法若言少惱少患興居輕利氣力是問訊身若言安樂不是問訊心內外諸病名為身病貪瞋嫉妬九十八結等名為心病問訊二病故言少惱少病興居輕利氣力安樂不略鈔華嚴經梵行品云若語業是梵行者梵行則是起居問訊略説廣説乃至隨俗説顯了説普同問訊忠曰有二種普同問訊一行事人普問訊大衆如上堂登座時二大衆一時問訊名普同問訊敕修清規迎待尊宿云尊宿往住持前問訊歸中普問訊登座云云説法畢下座住持前問訊普與大衆問訊又四節秉拂云秉拂人往住持前問訊次知事前問訊巡至班末次至同班前問訊亦巡至班末即舉手與大衆普同問訊又大夜念誦云維那請鎖龕佛事受請人出班燒香退身問訊次住持前問訊轉東序前問訊巡至班末問訊次西序前問訊然後與大衆普同問訊右行事人與大衆問訊者忠曰行事人與衆普同問訊之法先低頭問訊了以其合掌直下身左邊少磬折更以其合掌直身轉下身右邊少磬折即以合掌致胸前解合掌叉手或處稱十問訊謂若畫十字然敕修清規告香云普説竟仍齊向法座立參頭插香同衆三拜免則觸禮進云云云普同問訊而退又赴齋粥云古規每日住持赴堂早粥時先於堂外坐待堂前鳴鐘即入堂大衆齊下床普同問訊就坐日月軌範云堂前鐘鳴下床為迎住持入堂大衆普同問訊不得以手左右搖曳右大衆一時相問訊者普通問訊即普同問訊也見東福寺入寺規普問訊即普同問訊也敕修清規迎待尊宿云尊宿往住持前問訊歸中普問訊登座詳普同問訊處十問訊即普同問訊也合掌橫豎若畫十字故名東福清規上堂曰住持到法堂東月壇冬則脫帽子到中央十問訊登座略問訊忠曰不深低頭也敕修清規聖節云侍者接香以左手插爐中右手拈從香一炷略問訊下座歸班小問訊即略問訊也敕修清規謝挂搭云參頭小問訊叉手進爐前左手插香趺坐問訊忠曰秉拂人請堂頭趺坐故令侍者問訊此謂請趺坐問訊或省言趺坐問訊堂頭到此據椅矣如日本禪林入院開堂比住持舉埀語侍客為請趺坐到列剎和尚上位前問訊轉身到末位西堂末位問訊此謂趺坐問訊敕修清規開堂祝壽云住持當令侍者請官員坐又四節秉拂云秉拂人就座云侍者請堂頭和尚趺坐秉拂侍者至住持前問訊忠曰此問訊即是趺坐問訊也座前問訊忠曰座前者謂法堂正前撑天柱之間也按上堂凡有兩次座前問訊初住持未出時西序東序望空座座前問訊後住持登座兩序復座前問訊請法日本禪林未聞行初空座問訊焉敕修清規聖節云頭首下床聖僧前問訊領衆出堂至法座前列一行問訊歸西序立大衆鴈列于後知事待西序歸位畢亦列一行座前問訊上首居後都寺引歸東序立定又云住持和南登座乃至首座領班出列座前問訊大衆同問訊知事轉班列座前問訊行者隨問訊忠曰頭首知事空座問訊初未知何義後於教中得其意大般若經百二十七卷云天帝釋言我坐在三十三天善法殿中天帝座上宣説正法無量天子聽説恭敬禮拜而去我不在時諸天子亦來咸言此處是帝釋為諸天説法之座我等皆應如天主在供養右繞禮拜而去又正法念處經云迦迦村陀佛上忉利天為諸天説法還閻浮提後天帝釋入俱吒殿以清淨心舉身投地禮師子座心自念言此是如來所坐之處以敬重心念如來故忠曰今空座問訊亦此義也堂頭説法座故雖堂頭未坐亦禮揖或不得其意妄為兩序互問訊之義非也固依百丈淹貫大藏所制作有淵源矣座下問訊忠曰座下者法堂須彌座前直下也敕修清規聖節云待住侍斂衣趺坐侍者先末班引過座下列一行問訊燒香侍者引班歸位次有首座知事座前問訊西堂東堂出座下問訊忠曰兩序座前問訊侍者座下問訊蓋侍者左右乎住持可謂親於兩序所以座下問訊也其西堂東堂之於座下者彼無有別問訊位况其人與侍者位階懸隔無混雜之嫌故亦用座下也舊説曰侍者位卑於兩序故於座下止此豫不與此義四處問訊忠曰僧堂四板頭燒香問訊此謂四處問訊敕修清規專使特為新命煎點云專使揖衆坐聖僧前燒香次上下間次堂外燒香仍歸堂內住持前上下間及外堂問訊仍歸中問訊又庫司四節特為首座大衆湯云都寺揖坐巡堂歸堂中立問訊衆坐進前燒香次上下間外堂歸香合安元處即往特為人前問訊右出住持前問訊仍巡問訊一匝及外堂歸堂中問訊側立東漸略清規四節別式云庫司特為首座大衆茶乃至都寺進前燒香四處或七處首座板後堂板分手板聖僧板也次外堂上下間歸即往首座前問訊右出住持前問訊仍巡堂問訊一匝及外堂歸堂中問訊側立依聖僧板頭立鎌倉清規燒香侍者巡堂禮云待大衆坐定而進龕前把香合燒香聖僧之前次自首座床始而於四所燒香及外堂香合置本處又向四所問訊及外堂然而立中央問訊是揖香之禮也瑩山清規云聖僧上下間堂外問訊是云四處問訊忠曰東漸云四處但是僧堂四板頭也外堂則不在其數鎌倉及言亦為外堂在四處之外然瑩山歷指聖僧上下間堂外以為四處太可疑蓋取僧堂上下間為二處四板中捨何二耶又取外堂為一處外堂有上下間捨何間耶若共問訊復成五處矣我恐瑩山卒見敕修等清規聖僧上下間外堂問訊語不及審訂妄加外堂為四處也僧堂巡問訊圖依東福清規七處問訊忠曰東漸清規云都寺燒香四處或七處見四處問訊處雖不指七處名僧堂及外堂有爐七處見四處問訊僧堂圖七處燒香了七處問訊是揖香之禮此可稱七處問訊也忠又按衆寮茶湯禮亦七處安爐中間上下間燒香問訊亦可稱七處問訊謂中間觀音前一上間三下間三也敕修清規衆寮入寮出寮茶云進中間上下間燒香復中間上下間問訊仍中央問訊此圖見于清規舊解三巡問訊敕修清規方丈小座湯云客集侍者揖引至住持前問訊依照牌入位立定燒香侍者請客侍者分往特為人前巡問訊揖坐已復位並立燒香侍者進前燒香仍歸位與請客侍者同時轉身分巡問訊揖香候鳴板二下行湯遍仍巡揖湯畢燒香侍者進燒光伴香鳴板一下收盞鳴鼓三下退座解者曰此揖坐揖香揖湯三次問訊是謂三巡問訊燒香請客二侍者各合掌而巡及至末班略問訊了各叉手歸位僧堂湯禮亦有三巡問訊見飲啖門大座湯處先住持前問訊次第巡堂如常一問訊竺仙小清規云住持并侍者接入大衆時合掌立而已是名接入一問訊大鑑小清規求挂搭禮云方丈行者請粥罷方丈獻茶粥罷參頭領衆方丈前候住持入了參頭領衆進門外肅立侍者一問訊接入香爐前又四節日巡堂禮云凡茶湯禮侍者門外立俟兩班耆舊皆集但一箇問訊衆入無人人問訊之理與衆寮不同借香問訊揖班上香有借住持香者即先向住持問訊此為借香問訊燒香了復向住持問訊此為謝香問訊敕修清規兩序出班上香云兩序相朝而出轉身問訊住持謂之借香然後上香若聖節佛祖嗣法師忌無借香問訊詳報禱門出班上香處大鑑小清規兩班出班拈香法云三佛初祖百丈臨濟開山嗣法師無借香問訊其餘前住忌則兩班人人借住持香合內香燒之故先問訊住持借香又回身問訊謝住持也又諸祖忌云維那揖兩班燒香借香問訊先問訊住持轉身燒香問訊了又問訊住持歸位瑩山清規土地堂念誦云維那出班燒香倚卓左邊向主人問訊請主人燒香侍者開香合分香於函蓋置兩班一位出班進前問訊主人轉身問訊土地燒香又轉身問訊主人還位諸位皆如此謝香問訊見借香問訊處茶禮禪苑清規赴茶湯云院門特為茶湯禮數殷重受請之人不宜慢易又見湯禮處忠曰禪林茶湯禮諸清規具在不用煩記今録朝廷所講使知有所本夢溪筆談云百官於中書見宰相九卿而下即省吏高聲唱一聲屈躬趍而入宰相揖及進茶皆抗聲贊唱謂之屈揖待制以上見則言請某官更不屈揖臨退仍進湯皆於席南橫設百官之位升朝則坐京官已下皆立後殿引臣寮則待制已上宣名拜舞庶官但贊拜不宣名不舞蹈中書略貴者示與之抗也上前則略微者殺禮也又云禮部貢院試進士日設香案于階前主司與舉人對拜此唐故事也所坐設位供帳甚盛有司具茶湯飲漿湯禮見茶禮處南禪規式云特為湯雪峯為雲峯講此為始送入席大鑑小清規四節僧堂茶禮云侍者叉手至首座前問訊便至後堂面前問訊便至特為人前問訊此名送入席却從聖龕後轉出堂外報住持住持入堂立定侍者從住持前直至特為人前問訊此名揖坐又從龕後轉從上間一問訊合掌巡堂內外一匝爐前中立問訊此名揖大衆坐送歸位忠曰與送入席同備用清規方丈特為首座大衆茶云侍者外堂俟頭首一班歸前板次首座入堂揖請離位揖次肩上位即送首座歸特為位從龕後出堂前報住持入堂鳴堂前鐘七下住持歸位侍者往特為人前問訊從龕後轉首座板頭巡問訊一匝外堂自下而上間歸中問訊大衆就坐先名送歸位住持入堂後方名揖坐圓照和尚會中盛講此禮揖附長揖敕修清規聖節云維那轉身爐前揖住持上香舊説曰僧家言揖者即問訊是也若叉手著胸是在家所謂揖也忠曰如揖班揖坐揖香揖湯茶皆問訊名揖也但祖忌真前之揖湯揖茶及觸禮之後相揖正是叉手低頭故僧家亦非無此法智度論云有下中上禮下者揖中者跪上者稽首詳禮拜處釋氏要覽云揖即周禮第九肅拜也又是內法下品禮也書云揖如磬折若仰首直身叉手不謹即慢甚也故孔子曰為禮不敬吾何以觀之日用軌範云聞遍食椎看上下肩以面相朝揖食不得正面以手搖曳兩邊經國大典注解云揖下官於上官隔等則舉手齊眼下致敬差等則舉手齊口下致敬上官於下官隔等則無答差等則舉手齊心答禮相等者各舉手齊心下致敬居家必用載王虗中訓蒙法云凡揖人時則稍闊其足其立則穩揖時須是曲其身以眼看自己鞋頭威儀方美觀揖時亦須直其膝不得曲了當低其頭使丙手至乙膝畔甲又不入膝內則手隨時起而叉於胸前揖時須全出手不得只出一指謂之鮮禮揖尊位則手過膝下亦以手隨身起叉手于胸前也困學紀聞云鄭司農注肅但俯下手今時擡是也項氏云古之拜如今之揖折腰而已介胄之士不拜故以肅為禮以其不可折腰也其儀特斂手向身微作曲勢此正今時婦人揖禮也漢時婦人之拜不過如此周祈名義考云手與胸平為揖詩詁推手曰揖引手曰厭推手手與胸離也厭則著手於胸正字通云揖手著胸也六書故拱手上下左右之以相禮也周禮秋官詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓注鄭氏曰土揖推手小下之也時揖平推手也天揖推手小舉之也小補韻會云儀禮注推手曰揖引手曰厭今詳上手當曰厭謂手厭於胸引手當曰揖揖而左揖而右又見頓首處程大昌演繁露云公羊僖二年晉謀伐郭荀息進獻公揖而進之注以手通指曰揖史記周本紀云武王乃揖諸侯湖海新聞云宋徽宗宣和元年降手詔曰寺院改為宮觀自今設禮合掌和南不審並改作擎拳稽首長揖附前漢書高帝紀云酈生不拜長揖曰足下必欲誅無道秦不宜踞見長者注師古曰長揖者手自上而極下聲喏敕修清規迎待尊宿云侍者燒香行者問訊僕從聲喏忠曰本寺僕從要中尊宿之使用故唱喏敬揖相隨侍也品字箋云喏爾者切敬言也俗以長揖呼為作揖又轉而謂之唱喏永言之謂唱喏敬詞也言人於作揖時必有喃喃之辭以將其敬故不僅曰作揖而直謂之唱喏耳又唱注云古人謂長揖為唱喏唱聲之長喏辭之敬也正字通曰喏爾者切音惹俗謂長揖曰唱喏舊注音社非餘冬序録曰揖相傳曰唱喏或古人相揖作此聲唱喏者引氣之聲也宋人記鹵庭事實云揖不聲名曰啞揖不如是則為不知禮法衆所嗤笑契丹人置手胸前亦不聲謂之相揖宋人以為怪宋以前中國揖皆作聲今日承元之後揖不作聲久矣而其名唱喏猶存官府升堂公坐輿皂排衙獨引聲稱揖豈非唱喏之謂與此固自有本也又六書故喏應聲也古無此字疑即諾字六書統言部諾奴各切古文從若從口作喏篆作據二説諾喏同俗音惹或曰今輿皂無稱揖者伏地叩首而起序録説非周祈名義考云唱喏喏音惹左傳使訓羣騶知禮注騶喏喝聲也喏玉篇敬言也喝訶也貴者將出唱使避己故曰唱喏亦曰鳴騶即孟子行辟人也今俗謂揖曰唱喏不可曉老學菴筆記云古所謂揖但舉手而已今所謂喏乃始於江左諸王方其時惟王氏子弟為之故支道林入東見王子猷兄弟還人問諸王何如答曰見一羣白項烏但聞啞啞聲即今喏也忠曰此説大異餘冬序録廣燈録洞山聰禪師章云上堂云聞鼓聲來到法堂上佛法向什麼處去也還有人道得麼莫是去來叉手當胸唱一聲喏東邊却過西邊是麼云云皇朝類苑云英宗即位赦天下皆加恩荊南所給縑帛皆故惡軍士睨之揚言不肯受賜偶語紛紛不已時張師正為鈐轄呼將卒前曰朝廷非次之恩州郡固無預備今帑中所有止如此汝輩不肯拜賜將何為也必欲反則非殺我不可遂擲劍於庭下披胸示之羣校茫然自失遽聲喏受賜而去東軒筆録連珠喏忠曰連珠喏蓋數人連聲唱喏如珠連環也夷堅志云崑山縣一老叟錢三萬買滿艙鱉盡解縛放諸水是夜夢數百人被甲於門外唱連珠喏驚出視之相率列拜謝再生之恩云云揖坐忠曰立為敬坐為懈今請坐者欲弛勤就安故智度論云若得道諸阿羅漢如舍利弗目連須菩提等所作已辦是故聽坐餘雖得三道亦不聽坐大事未辦結賊未破故譬如王臣大有功勳故得坐敕修清規山門特為新命茶湯云知事揖住持入堂歸位揖坐燒香一炷住持前揖香從聖僧後轉歸中問訊立行茶遍瓶出往住持前揖茶又見送入席處揖大衆坐見送入席處請坐問訊南禪規式入院方丈煎點云法堂人事畢侍者立方丈門左揖衆而入乃至揖坐揖香勸湯畢侍者引一班侍者入至住持前問訊住持左邊為上首謂之請坐問訊侍者各歸位坐行者進飯卓飯畢收卓次茶禮清規略要新舊兩序管待云屆時住持出接或遣侍者接各依位立定或侍香獨入揖坐問訊次請坐問訊入位住持復歸位侍香侍客分上下間先至新兩序前問訊巡至末問訊叉手復至舊兩序前問訊巡至末問訊同歸中問訊衆坐侍香引同列住持前一行問訊左肩為首入位飯畢鳴鼓侍香侍客離座至爐前立侍香炷香轉身如前新舊前行禮歸中問訊而行者入湯盞行瓶候喫了又如前行禮歸中問訊而立侍香即燒光伴香侍客同問訊復歸位乃點果子并茶畢收盞鳴鼓三下退座請香校定清規特為新舊人湯云燒香請客二侍者分東西兩邊巡位揖坐訖各歸中央立客人就坐燒香侍者進前燒香一炷至爐前小問訊謂之請香然後開合取香云云忠曰東漸清規侍者進退亦如此豫謂管待新舊兩序新舊侍者故燒香侍者亦在客中故此香亦係為自一分故有請香之禮歟揖香敕修清規新挂搭人點入寮茶云新挂搭人列衆寮前右邊立候衆下堂茶頭即鳴寮前板衆至揖迎歸位立定點茶人列一行問訊揖坐坐畢分進中爐上下間爐前燒香人多不過九人則三三進前退步轉身須相照顧詳緩列一行問訊仍分進爐前問訊退仍一行列問訊而立謂之揖香鳴寮內小板二下行茶遍仍如前進前問訊復退作一行問訊謂之揖茶又見揖坐處舊説曰如巡揖香時先炷香了次巡堂揖如前揖坐法揖大衆香大鑑小清規四節僧堂茶禮云衆坐定侍者小問訊進爐前燒香次上下間堂前燒香安香合畢直至特為人前問訊此名揖香又從龕後轉至上間巡堂內外又爐前中立問訊此名揖大衆香光伴香舊説曰燒香謝光伴人謂之光伴香備用清規方丈特為首座大衆茶云首座轉身龕後右出住持略送復位執盞陪衆燒光伴香一炷鳴鐘一下收大衆盞敕修清規受嗣法人煎點云若諸山煎點煎點人待行食遍起燒香往住持前問訊下嚫俵衆人嚫燒光伴香歸位伴食舊説曰凡煎點人燒光伴香揖時但光伴人舉盞而答之餘人不用舉盞揖茶見揖香及揖大衆茶處揖而勸茶也舊説曰如巡揖茶時理應俟揖畢而喫茶然巡揖經時稍久若俟畢恐冷故各少報左右先喫了及巡揖人歸堂中立問訊但當舉空盞而應之也揖大衆茶大鑑小清規四節僧堂茶禮云行者行茶湯瓶出侍者直至特為人前問訊此名揖茶又從龕後出上間聖僧前大展三拜外入中立此名揖大衆茶行者收茶盞勸茶忠曰勸茶亦是揖茶義但至特為人前問訊名勸茶也敕修清規受嗣法人煎點云行食遍煎點人起燒香下嚫問訊住持及行衆嚫厨司方鳴齋板就行飯飯訖衆收鉢退住持卓煎點人燒香往住持前問訊從聖僧後出爐前問訊鳴鐘行茶遍往住持前勸茶復從聖僧後出進住持前展坐具云此日薄禮屑瀆特辱降重下情不勝感激之至二展寒溫觸禮三拜送住持出備用清規煎點住持云煎點人爐前問訊鳴鐘行茶遍往住持前勸茶儀同敕修清規校定清規諸山尊宿相見云至喫飯時侍者燒香下嚫至喫茶時行者鳴茶鼓侍者燒香一炷至特為人前問訊勸茶仍轉身上手側問訊進前燒相伴香一炷歸位問訊而退謝茶禪苑清規謝茶云堂頭置食點茶特為罷如係卑行之人即時於住持人前大展三拜如不容即觸禮三拜如平交已上即晚間詣堂頭陳謝詞云此日伏蒙管待特為煎點下情無任不勝感激之至古人云謝茶不謝食也揖湯忠曰湯禮則有揖湯當準揖茶而知之揖而勸之即勸湯也敕修清規達磨忌揖湯備用作勸湯勸湯忠曰亦是揖湯義可準勸茶知之敕修清規迎待尊宿云寢堂釘挂帳幕排照牌設特為光伴位鳴鼓行禮揖坐揖香勸湯湯罷藥石謝湯忠曰謝湯之禮有湯前預謝者有湯畢爐前謝者敕修清規念誦云請客侍者即往西序問訊請湯巡過次請東序就歸位乃至各出全單而散住持出兩序隨出至堂前謝湯住持止之下八赴湯寢堂鳴板侍者燒香行禮如常式湯罷藥石右湯前預謝者舊説曰謝湯當觸禮故住持止之敕修清規庫司特為新舊兩序湯藥石云湯罷起身出詣罏前謝湯畢抽之就座藥石右湯畢謝者謝衆臨屈敕修清規新挂搭人點入寮茶曰寮元出爐前對點茶人代衆謝茶衆人就位同時合掌謝畢寮元復位點茶人復一行列問訊再各分進罏前問訊謂之謝衆臨屈仍退作一行問訊鳴寮前板三下大衆和南而散退座敕修清規專使特為新命煎點云鳴鼓三下退座門送清拙澄禪師録晚參云龐居士因辭藥山山命十人禪客門送草賀舊説曰草賀者小賀也或曰草賀權賀也忠曰入院草賀者草草先賀也草略也謂入寺次後禮繁故且省略五侍沙彌喝食行者等三拜其受全賀在開堂下座之後論語子路篇云裨諶草創之朱注草略也敕修清規入院云住持起身知事全班進列上首插香乃至諸山及頭首勤舊進前插香草賀畢客頭行者喝云請諸山兩班勤舊就座獻湯展賀忠曰開堂説法畢下座後大衆賀入寺是名展賀敕修清規開堂祝壽云客頭行者即進爐燭一字排列座前專使插香兩展三禮畢堂司行者喝云諸山人事次喝云西堂人事展禮喝云知事人事兩展三禮又喝云首座大衆人事勤舊蒙堂前資諸寮齊插香同大衆兩展三禮畢莊庫菴塔法眷鄉人暫到展賀畢據座侍者小師插香大展三拜次執局行者插香禮拜次參頭領衆行者插香禮拜次直廳轎番莊甲作頭老郎人僕參拜畢相看敕修清規月分須知云九月重陽日住持上堂許方來相看大相看敕修清規月分須知云十月初一日方丈大相看人事忠曰人事有三義一見人行禮曰人事二餽贈物曰人事三姓氏生緣曰人事已下録見人行禮稱人事者永平元和尚曰人事者相禮拜也觀心論疏云人事者慶弔俯仰低昂造聘此往彼來來往不絶摩訶止觀全同此敕修清規告香云入院後人事定為衆告香又開堂祝壽云堂司行者喝云諸山人事又結制禮儀云先與西堂人事觸禮一拜乃至堂頭和尚與大衆人事普觸禮三拜臨濟玄禪師録云有一老宿參師未曾人事便問禮拜即是不禮拜即是師便喝老宿便禮拜云云大慧武庫云兜率悅禪師張無盡徐語及宗門事悅曰今日與運使相陪人事已困珍重睡去論語學而篇云禮之用和為貴朱熹注禮者天理之節文人事之儀則也已下録餽贈物稱人事者一山寧和尚曰以物贈人曰人事廣燈録西院思明禪師章云師未住時在許州聞汝州南院和尚住元是同參特往看人事了啓和尚某甲別無人事買得江西剃刀獻上和尚南院便問汝從許州來甚處得江西剃刀師把南院手掐院喚侍者收收師以衣袖拂一拂院云阿朿朿阿朿朿忠曰初人事謂行禮後人事謂餽贈物葉縣省禪師録云因僧人事一箇書筒云云又有人事手巾頌大慧杲和尚示方宋輔法語云臨行袖此紙求指示以頌繼之云惠然訪我鄮峰下剡溪興盡歸心起禪家無物贈君行前面有山兼有水要知妙喜敢將常住物作人事耳韓昌黎集謝許受王用男人事物狀云緣臣與王用撰神道碑文令臣領受用男沿所與臣馬一匹并鞍銜及白玉腰帶一條者云云令臣受領人事物等承命震悚宋許觀東齋紀事云今人以物相遺謂之人事韓退之奏韓弘人事物狀云奉敕撰平淮西碑文伏緣聖恩以碑本賜韓弘等今韓弘寄絹五百匹與臣充人事物未敢受領謹録奏聞又杜牧謝許受江西送撰韋丹碑綵絹等狀云中使奉宣聖旨令臣領受江西觀察使許于泉所寄撰韋丹遺受碑文人事綵絹共三百匹乃知此稱自唐已有之徐充暖姝由筆云今人凡交遊往來及贄見不論貴賤但有餽送之禮貨物不等皆謂之人事白樂天奏于頔裴均欲入朝事宜狀云上須進奉下須人事其來已久昌黎集亦有奏韓弘人事物狀人之姓氏生緣稱人事者見稱呼門人氏處揶揄忠曰揶揄亦作歋邪揄禪録多為約免義僧寶傳汾州善昭禪師傳云時洞山谷隱皆虗席衆議歸昭太守請擇之昭以手耶揄曰我長行粥飯僧傳佛心宗非細職也又西余端禪師傳云端聽僧官宣至此以手耶揄曰止後漢書王霸傳云市人皆大笑舉手邪揄之章懷注説文曰歋手相笑也歋音弋支反音踰或音由此云邪揄語輕重不同通鑑集覽云邪揄音耶喻説文舉手相笑也正字通云歋歈舞手相弄笑也世説新語補云晉陽秋曰羅友同府人有得郡者溫為席起別友至尤晚問之友答曰於中路逢一鬼大見揶揄云我只見汝送人作郡何以不見人送汝作郡溫者桓溫也孤樹裒談云蔣君廷貴應試經行教坊群婢夾擁蔣不一顧妓揶揄引其裾蔣絶裾去亦不怒約免忠曰約免者省約煩禮而放免之也乃出手作止之勢或曰揶揄正字通云約簡也節省也禮內則適子庶子不敢以貴富入宗子之家雖衆車徒舍于外以寡約入敕修清規謝挂搭云本引三人一展坐具住持展手約免之即收起詳兩展三禮處又見觸禮處回禮忠曰回禮者答他之禮也敕修清規遊方參請云參頭領衆至客司乃至歸旦過知客尋往回禮希叟曇禪師開善録有回諸山禮歸上堂還禮回禮又謂還禮禪苑清規請立僧云退院尊宿首座藏主如合衆望可舉立僧知事大衆詣寮禮請請辭云大衆傾心久思示誨伏望慈悲俯賜開允如允即時還禮云既蒙堅請不敢固辭復禮回禮又曰復禮玄沙備禪師廣録云師問招慶云我如今去看王太傅乃至來日太尉出招慶復禮習儀居家必用云習儀學制禮也謂凡有大典禮必預先習儀也敕修清規告香云預集衆習儀又謝挂搭云參頭當具小圖習儀三人一引每引一人為小參頭須詳記詞語進退折旋合度免致臨時參差春秋左傳昭公五年云女叔齊曰禮所以守其國行其政令無失其民者也云云而屑屑焉習儀以丞言善於禮不亦遠乎具威儀永平元和尚云參師具威儀者著袈裟持坐具整理鞋襪帶一片沈香棧香等也敕修清規聖節云維那鳴椎一下云白大衆粥罷聞鐘聲各具威儀詣大佛寶殿啓建天壽聖節謹白教誡律儀入溫室法云具威儀持坐具贊行鈔云具威儀者著五條也舊説曰大覺大鑑并曰具威儀者謂帶坐具也忠曰具威儀當隨處通解之教誡具威儀著五條義則是入溫室時具威儀也永平所言者是參師時具威儀也大覺大鑑但為帶坐具義夫如啓建聖節豈但持坐具披五條而可耶凡七條坐具帽襪一切服章具足方可言具威儀而已又曰帶坐具也者恐由教誡文有此轉解余謂教誡文若持業而具威儀即持坐具義則與著五條解違與大覺大鑑順若相違而具威儀更別持坐具義則著五條解成大覺大鑑義不成我恐此解非出於二師若具威儀即是帶坐具義則不可重言持坐具矣因録佛説具威儀長阿含經云世尊告諸比丘云何比丘具諸威儀於是比丘可行知行可止知止左右顧視屈伸俯仰攝持衣鉢食飲湯藥不失儀則善設方便除去陰蓋行住坐臥覺寐語默攝心不亂是謂比丘具諸威儀大寶積經云有四法威儀具足一者知時二者知處三者寂靜四者真實朝忠曰朝者面相向前人也小補韻會云朝馳遙切覲君之總稱又禮記王制耆老皆朝于庠注云猶會也疏云恐有朝王之嫌故云會耆老聚會於鄉學康熙字典云朝馳遙切音潮爾雅釋言陪朝也注臣見君曰朝又曰又同類往見亦曰朝史記司馬相如傳臨邛令謬為恭敬日往朝相如敕修清規聖節云出班上香兩序對出向佛問訊上香畢兩兩相朝轉身歸位又日用軌範云聞遍食椎看上下肩以面相朝揖食朝立忠曰立為敬揖坐處詳説朝立者向佛祖及靈位立也校定清規遷化遺書云住持升座乃至下座詣靈位前朝立廟立忠曰中立南面如太祖廟位故曰廟立備用清規謝挂搭云至時侍者同參頭入請住持出廟立參頭歸衆同問訊律苑事規新來挂搭云至時侍者同參頭入請住持出廟位立參頭歸位衆同問訊鴈立忠曰鴈立者凡列立或橫或豎總此謂鴈立也與鴈行班不同楊億古清規序云長老上堂升座主事徒衆鴈立側聆敕修清規四節土地堂念誦云衆集相對鴈立右豎列立者敕修清規帝師涅槃云鳴鐘集衆向座鴈立右橫列立者今為下有揖班上香故預向座耳鴈行班村寺清規云若橫列佛神而立謂之鴈行班事畢或轉身團欒問訊或只就位略轉面相顧左右和南忠曰又見前人背後次第列行言鴈行四分律云佛言若檀越來白時到上座應在前如鴈行而去教誡律儀食了出堂法云出堂門外須旁廊一邊行令威儀庠序鴈行而行戰國策云魏朱忌曰為天下鴈行頓刃注鴈行言以次進此義通四分律等又並行而稍後也禮記王制云父之齒隨行兄之齒雁行注鴈行並行而稍後也又次第行言鵝行十誦律云起行時來往故相亂佛言應如鵝法次第行鴛班村寺清規云凡諷經面面相看而對立謂之鴛班事畢候回向人歸位與衆俯首和南不必更轉身面佛神而問訊朝坐忠曰朝坐者面於前人坐也與朝立之朝同義譬如新命辭衆茶湯東序西序同面於新命坐是也敕修清規新命辭衆上堂茶湯云中敷高座向內首座向外攝居主位西堂勤舊分手光伴東西序兩邊朝坐廟坐忠曰中位坐如廟位故云廟坐廟義見廟立處山門管待新命并專使座次圖特為諸山尊宿湯果藥石管待廟坐之圖校定清規特為住持煎點云煎點人請特為人出有處只就主位坐有處廟坐或是法嗣亦當廟坐在住持意忠曰住持或坐主位若法嗣人煎點則住持廟坐以此可知廟坐尊於主位矣諸山法眷特為住持煎點寢堂廟坐之圖忠曰備用清規猶言廟坐敕修清規皆改為高坐實惟廟之言關天子東陽換詞或有意于避之乎分手坐忠曰住持在煎點人分手位也分手義見座位門諸山特為住持煎點寢堂分手坐位圖胡亂坐東福清規云兩序交代禮東西新兩班人共到無價軒先東序與住持觸禮外出次西序與住持觸禮外出兩序共到茶堂據堂內床東序西首列東西序東首列西位次未定故謂之胡亂坐亦謂不臘次也住持坐中央椅子點茶蓋為定兩班集衆點茶也請客頭呈目子住持下椅向西立先讀東序目子侍客進次第請東序受請了都寺引維那監寺到住持前都寺植香兩展觸禮都寺引班到茶堂橫廊東壁北首向西立次讀西序目子禮如東序首座引班到茶堂橫廊西壁北首向東立又侍者交代胡亂坐見飲啖門七香湯處忠曰胡亂坐者蓋對新職之位次得名謂若欲受請未受已前列坐時未知誰人可為何職且依舊位坐以後受職位視今坐位則成雜亂故為胡亂坐矣及受職畢交互轉位依某職位次於是位方定所謂東序都寺監寺副寺等西序前堂後堂書記等五侍燒香書狀請客等如此列次敕修清規兩序進退言轉位者是也不臘次即胡亂坐也見胡亂坐處趲近敕修清規聖節云粥罷上堂乃至衆行者列知事後稍離遠立乃至住持至法座前行者趲近知事後立正字通云趲則板切贊上聲逼也走也六書故行第相趣也品字箋云趲催趲也俗以緊行謂之趲步忠曰衆行者初少離知事後者為開住持出路若過己背後則成失禮况復住持至迎問訊見清規故退立今住持既過前去故進走近知事背後立此謂趲近也右繞敕修清規藏殿祝讚云繞藏行道見行道處忠曰繞者須右繞也四分律云客比丘於塔邊左行過護塔神瞋佛言不應左行過應右繞塔而過薩婆多毗尼毗婆沙云右繞者順佛法故所以右繞又密迹力士若有左繞者即以金剛杵碎之又佛世世已來常順三寶父母師長一切教誡無違無逆令得果報無有逆者又佛身淨衆生於中各見所事或天或神莫不見者是以畏敬右繞而去大毗婆沙論九十八云不吉祥故説名為左如有於佛賢聖制多及天靈廟不右繞者以不吉祥故名為左萬善同歸集云繞塔功德經云勇猛勤精進堅固不可壞所作速成就斯由右繞塔得妙紫金色相好莊嚴身現作天人師斯由右繞塔淨源法師楞嚴道場修證儀云夫右繞者順向殷重瞻望不足也如是三匝乃至百匝亦無定數行事鈔僧像致敬篇云大論如法供養必應右繞資持記諸經論皆令右繞古今諍論紛紜不息都緣不曉繞佛繞壇兩儀自別且直據祖教略明大途餘廣如別初明繞佛者歸敬儀云右繞者面西北轉如像面南行者面北舉步回身面西而去從北而回右肩袒侍向佛而恭此示正儀比見有僧非於此法便東回北轉此為右繞出錯見也西竺梵僧闐聚京邑經行旋繞目閲其蹤並乃西回而為右繞以順天道如日月焉此引親見之事證成上義次明繞壇者感通傳天人述西竺戒壇云衆僧登壇受戒説戒事訖東回左繞南出而返戒壇經祖師對真懿云律師勿見東回左繞以為非法耶此乃天常之大理也感通傳云天常乃左人常乃右祖訓明顯人妄穿鑿或曲引俗書如執天文志李長者之説是也或妄憑世事如執牛踏稻蜘蛛結網之類且繞佛者本乎致敬繞壇者便乎行事致敬則必須右繞表執侍之恭勤行事則必須左繞使上下而倫序如入食堂及説恣時入堂之式必依此判寧復疑乎若爾壇經云東回北轉繞佛一匝者答此本登壇為行受法因旋佛後故云繞佛豈同殿塔特申卑敬耶古記引秀州靈光舍利左繞為證豫親瞻禮但覩金鐸動搖豈見舍利左右此亦欺罔之甚忠按禪林巡堂者左繞而準繞壇儀尋常行道者右繞而準繞佛儀資持記云行事則必須左繞注云如入食堂止此禪規巡堂左繞正合律文又資持云有僧東回北轉此為右繞止此余按此亦非無據天文家曰天左旋日月五星逆右旋止此此以東回為右旋然天文家説左右反常途蓋人仰面於北斗而以人左右為天左右乎記曰西回為右繞如日月者且約現見耳矣上肩順轉日用軌範云以上肩順轉注謂左肩也敕修清規念誦云順左肩轉依圖位立忠曰左為上者古者尚右後世尚左叢林亦從時尚而已如上堂已前寢堂侍者東立行者西立是尚住持左也住持登法座趺坐時侍者及東西序請法問訊並在清規聖節規中必以住持左為上位而列行皆斯義也如今於己一身亦爾以左為上故左肩曰上肩也順轉者即以左肩自面前向右方而回轉此為順轉矣若以右肩自面前向左方而回轉或以左肩自背後向右方而回轉是逆轉也僧祇律云經行時不得背回應面向右回忠曰是即言上肩順轉也戰國策趙策云趙國豪傑之士多在君之右注右者人道所尊補曰秦漢以前用右為上史記廉頗傳正義云秦漢以前用右為上忠曰秦漢已後用左為上可知也琅邪代醉編云朱承爵曰古者賓位尚右史記陳平願以右丞相讓周勃語云無能出其右者及行尚西禮記主人就東階客就西階諺呼主人為東道則古人坐尚右行尚西甚明矣後世不察遂以東左為尊齊東野語云按古人主當阼以右為尊而遜客而己居左則左非尊位也後世以左為主位而貴不敢當則以左為尊也如魏無忌迎侯主而虛車左何也地道陰道尚右故後世之祀以右為上今宗廟亦然野語詳載古今左右之辨結跏趺坐禪苑清規坐禪儀云欲坐禪時於間靜處厚敷坐物寬繫衣帶令威儀齊整然後結跏趺坐先以右足安左䏶上左足安右䏶上或半跏趺坐亦可但以左足壓右足而已瑜伽師地論云何因緣故結加趺坐謂正觀見五因緣故一由身攝斂速發輕安如是威儀順生輕安最為勝故二由此宴坐能經久時如是威儀不極令身速疲倦故三由此宴坐是不共法如是威儀外道他論皆無有故四由此宴坐形相端嚴如是威儀令他見已極信敬故五由此宴坐佛佛弟子共所開許如是威儀一切賢聖同稱讚故正觀如是五種因緣是故應當結加趺坐大毗婆沙論云問諸威儀中皆得修善何故但説結跏趺坐答此是賢聖常威儀故謂過去未來過殑伽沙數量諸佛及佛弟子皆住此威儀而入定故復次如是威儀順善品故謂若行住身速疲勞若倚臥時便增惛睡惟結跏趺坐無斯過失故能修習殊勝善品復次如是威儀違惡法故謂餘威儀順淫欲等諸不善法惟結跏坐能違彼故乃至復次住此威儀怖魔軍故謂佛昔於菩提樹下結跏趺坐破二魔軍謂自在天及諸煩惱故今魔衆見此威儀即便驚恐多分退散復次此是不共外道法故謂餘威儀外道亦有惟結跏坐外道無故乃至問結跏趺坐義何謂耶答是相周圓而安坐義聲論者曰以兩足趺跏致兩䏶如龍盤結端坐思惟是故名為結跏趺坐脅尊者言重疊兩足左右交盤正觀境界名結跏坐惟此威儀順修定故大德説曰此是賢聖吉祥坐故名結跏坐慧琳經音義云跏趺上音加下音夫皆俗字也正體作加跗鄭注儀禮云跗足上也顧野王云足面上也案金剛頂及毗盧遮那等經坐法差別非一今略舉二三明四威儀皆有深意結跏趺坐略有二種一曰吉祥二曰降魔凡坐皆先以右趾押左股後以左趾押右股此即左押右手亦左居上名曰降魔坐諸禪宗多傳此坐若依持明藏教瑜伽法門即傳吉祥為上降魔坐有時而用其吉祥坐先以左趾押右股後以右趾押左股令二足掌仰於二股之上手亦右押左仰安跏趺之上名為吉祥坐如來昔在菩提樹下成正覺時身安吉祥之坐手作降魔之印是故如來常安此坐轉妙法輪若依祕密瑜伽身語意業舉動威儀無非密印坐法差別並須師授或曰半加或名賢坐或象輪王或住調伏與此法相應即授此坐皆佛密意有所示也又慧琳經音云結加趺坐趺音府無反三蒼云足趺也鄭注儀禮云足上也案攝持鞋履之處名為足趺慧琳云結加趺坐者加字只合單作加盤結二足更互以左右足趺加於二髀之上名結加趺坐其坐法差別名目頗多不可繁説今且略敘二種坐儀先以右足趺加左髀上又以左足趺加右髀上令二足掌仰於二髀之上此名降魔坐二手亦仰掌展五指以左押右安在懷中諸禪師多傳此坐是其次也若依持明藏教灌頂阿闍梨所傳授即以吉祥坐為上降魔為次其吉祥坐者先以左足趺加右髀上又以右足趺加左髀上亦令二足掌仰於二髀之上二手準前展指仰掌以右押左此名吉祥坐於一切坐法之中此最為上如來成正覺時身安吉祥之坐左手指地作降魔之印若修行人能常習此坐具足百福莊嚴之相能與一切三昧相應名為最勝也止觀輔行云結跏者先左後右與兩䏶齊大論第九問云有多坐法何故但令跏趺坐耶答最安穩故攝持手足心不散故魔王怖故故偈云得道慚愧人安坐若龍蟠見畫跏趺坐魔王亦驚怖不同俗坐及異外道翹立等也字書云跏趺者大坐也故知此方未曉坐法但云大坐今佛法坐其相如結二趺相加故云結跏釋氏要覽云結加趺坐毗婆沙論云是相圓滿安坐義聲論云以兩足趺加致兩䏶如龍盤結脅尊者云是吉祥坐念誦經云全加趺是如來坐半加趺是菩薩坐智度論云問曰多有坐法佛何以故唯用結跏趺坐答曰諸坐法中結跏趺坐最安隱不疲極此是坐禪人坐法攝持手足心亦不散又於一切四種身儀中最安隱此是禪坐取道法坐魔王見之其心憂怖如此坐者出家人法在林樹下結跏趺坐衆人見之皆大歡喜知此道人必當取道如偈説若結跏趺坐身安入三昧威德人敬仰如日照天下除睡懶覆心身輕不疲懈覺悟亦輕便安坐如龍蟠見畫跏趺坐魔王亦愁怖何况入道人安坐不傾動以是故結跏趺坐復次佛教弟子應如是坐有外道輩或常翹足求道或常立或荷足如是狂狷心沒邪海形不安隱以是故佛教弟子結跏趺直身坐何以故直身心易正故其身直坐則心不懶端心正意繫念在前若心馳散攝之令還欲入三昧故種種馳念皆亦攝之如此繫念入三昧王三昧薩婆多毗尼毗婆沙云結跏趺坐為正身故所以正身為正心故是正於心必先正身又云九十六種外道皆不結跏趺坐欲異外道故為此坐法又云欲止睡眠故又云欲生前人信敬心故如一時有異國來罰罽賓入其界內見諸比丘在山林樹下結跏趺坐正身正意即生信敬尋歸本國又云佛坐道樹時結跏趺坐利根辟支佛亦結跏趺坐以是諸緣故結跏趺坐供養次第法不可思議疏云跏趺坐者凡坐法聖善之寺三藏和上邊面受左足先著右䏶上右足次著左䏶上名為蓮華坐單足著左䏶上名為吉祥坐也別此坐者非聖坐也若欲求菩提學佛坐為得又云蓮華座者結跏坐是所謂先左腳著右䏶上後右腳著左䏶上也吉祥坐者右腳著左䏶上亦言半跏坐是也蓮華座作坐忠曰不思議所謂蓮華坐者慧琳所謂吉祥坐也不思議所謂吉祥坐者半跏趺坐而又異于禪苑坐法余謂禪苑是降魔之半跏以左壓右故不思議是吉祥之半跏以右單足壓左䏶故半加趺坐以左足壓右䏶是菩薩坐見結加趺坐處四分律曰比丘尼結跏趺坐血不淨出汙腳跟指奇間佛言比丘尼不應結跏趺坐彼疑不敢半跏趺坐佛言聽半坐毗奈耶雜事云諸苾芻尼受用隨時供身臥具跏趺而坐宴默思惟遂有蟲來入不便處因生苦惱世尊聞已告諸苾芻諸尼不應跏趺而坐以修寂定應半跏坐胡跪敕修清規沙彌得度云引請闍梨至戒師前大展三拜胡跪合掌歸敬儀云言胡跪者胡人敬相此方所無存其本緣故云胡也或作胡跽者撿諸字書跽即天竺國屈膝之相也俗禮云授立不跪跪謂屈膝俗所諱之凡有所授膝須起立通真記授立不跪文出曲禮俗所諱者由是受刑之狀故劉熙釋名釋姿容云跪危也兩膝隱地體危倪也跽忌也見所敬忌不敢自安也文獻通考云朱文公熹白鹿禮殿塑像説曰古人之坐者兩膝著地因反其而坐於其上正如今之胡跪者琅邪代醉編云古者席地而坐即今之跪也故禮記稱跪皆曰坐以愚意觀之跪則兩膝用力坐則臀近于肱賓退録云莊子云跪坐而進之則跪與坐似有小異處疑跪有危義故兩膝著地伸腰及股而勢危者為跪兩膝著地以尻著而稍安者為坐也互跪歸敬儀云言互跪者左右兩膝交互跪地此謂有所啓請悔過授受之儀也佛法順右即以右膝拄地右𮪭在空右指拄地又左膝上戴左指拄地使三處翹翹曲身前就故得心有專志請悔方極此謂心隨其身行慢失矣忠曰三處者右膝右指左指此三拄地餘皆在空也釋氏要覽云互跪天竺之儀也謂左右兩膝互跪著地故釋子皆右膝若言胡跪音訛也文獻通考云跪與坐又自有少異處疑跪有危義故兩跪著地伸腰及股而勢危者為跪兩膝著地以尻著蹗而稍安者為坐也宋史衛膚敏傳云膚敏使金及受書欲令雙跪膚敏曰雙跪乃北朝禮安可令南朝人行之哉爭辨踰時卒單跪以受又見禮拜處長跪歸敬儀云僧是丈夫剛幹事立故制互跪尼是女弱翹苦易勞故令長跪兩膝據地兩脛翹空兩足指拄地挺身而立者是也南海寄歸傳云言長跪者謂是雙膝踞地豎兩足以支身舊云胡跪者非也五天皆爾何獨道胡釋氏要覽云長跪即兩膝齊著地亦先下右膝為禮神足無極經云月天子即從座起更整衣服前下右膝叉手長跪毗奈耶云尼女體弱互跪要倒佛聽長跪忠曰今人所為互跪者右膝著地右蹗承尻植左膝屈之左蹗蹈地都無在空者不知所謂三處翹翹為何物如此互跪易於長跪寧長跪可踣互跪不可倒翻令人疑互跪難為長跪易為之説䠆跪長跪又作䠆跪慧琳一切經音義云䠆跪上丈良反方言云東郡謂跪曰䠆跪廣雅䠆𨂣拜也古今正字從足長聲𨂣音務下逵位反雙膝跪地也住持位前不可行過住持座位之前橫行過為失禮校定清規云巡堂之法首座從下巡上免得於住持位前行故也第十一類垂説門上堂楊億古清規序云長老上堂升座主事徒衆鴈立側聆傳燈録弘忍大師章云能居士跪受衣法乃至禮足已捧衣而出是夜南邁大衆莫知忍大師自此不復上堂凡三日大衆疑怪致問祖曰吾道行矣何更詢之又南嶽讓禪師章云後馬大師闡化於江西師遣一僧去云待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰馬師云自從胡亂後三十年不曾闕鹽醬師然之又百丈海禪師章云馬祖上堂大衆雲集方升座良久師乃卷却面前禮拜席祖便下堂忠曰五祖章已有上堂語蓋其盛行自馬祖百丈時而已祖庭事苑云或問每質諸佛經所集四衆未嘗不坐今禪門上堂必立而聽法何謂也曰此百丈禪師之深意也且佛會説法四衆雲萃所説法義不局性相所會時節未知久暫今禪門自佛教東流後六百年達磨祖師方至漢地不立文字單傳心印直指人心見性成佛所接學者俾於一言之下頓證無生所聚之衆非久而暫故不待坐而立也百丈曰上堂升座主事徒衆鴈立側聆賓主問酬激揚宗要示依法而住此其深意也古德曰睦菴所辨如此而後代不然如諸録普説五六紙或至十餘紙豈可謂一言下證無生所聚非久哉忠曰質之佛經四衆皆坐者蓋經首聽法往往有退坐一面文又十誦律云比丘尼到祇洹聽法諸比丘敷敷具竟多有殘在比丘尼語比丘言餘者借我等坐比丘白佛佛言聽敷敷具竟殘與比丘尼坐又毗奈耶雜事云聽法之時應敷座席止此此亦容坐聽然而立聽是佛制也智度論云佛法中諸外道出家及一切白衣來到佛所皆坐外道他法輕佛故坐白衣如客是故坐一切五衆身心屬佛是故立若得道諸阿羅漢如舍利弗目連須菩提等所作已辦是故聽坐餘雖得三道亦不聽坐大事未辦結賊未破故止此由此出家五衆除得道者外不許坐而聽法者西竺古制而龍樹之論如揭日也非百丈深意為説不多集不久創立此規睦菴不援智度而酬問而臆斷為百丈新立者殆乎誣矣智論復言坐者於供養不重立者恭敬供養法重止此是故華嚴善財聽法無不言起立合掌白言頂禮其足合掌而立等又大集經云金剛光藏世界大衆至娑婆世界覲見釋迦牟尼如來頭面禮足右繞三匝却在一面合掌而立止此此是賓客亦立蓋敬法重於供養也舊説曰以上堂對小參則可稱大參也忠曰凡四節開爐元宵佛祖忌國忌請兩班謝秉拂謝都寺齋祈雨雪禳旱潦出隊病起客至訃至一切因事無不上堂不可枚舉載在諸録又曰粥飯過僧堂云上堂見叢軌門又上間下間稱上堂下堂見座位門皆義別也旦望上堂敕修清規上堂云凡旦望侍者隔宿稟住持云來晨祝聖上堂住持登座拈香祝壽其規如彼又見節時門旦望處舊説曰上古朝參暮參中古五日一參近代旦望參而已忠曰備用所説見五上堂處春明退朝録云唐在京文武官職事九品以上朔望日朝又曰其武官準令五品以上每月六參五參上堂處詳引忠曰六參中亦有朔望雲章曰旦望上堂且循俗禮也止此其説有據五參上堂校定清規云如初五初十二十二十五此四日謂之五參上堂座上不鋪設衆中有未盡齊整及常住缺典事略而提之欲衆知也不可多談世諦厭人聽古人朝暮咨參何有限日今從簡要於五日一升堂也侍者當隔宿覆住持恐住持事繁或有失記是日開靜前令行者報覆知事頭首寮舍及再請後挂上堂牌忠曰朔日五日十日十五日二十日二十五日一月總有六參但旦望別有祝聖上堂故除之餘四日名為五參即每五日一參也非謂一月五度參矣蓋擬朝制五品以上官五日一朝若鼠璞及退朝録則十日作十一日二十日作二十一日餘同此參義見小參處敕修清規上堂云五參上堂兩序至座下徑歸班立住持登座不拈香舊説曰五參上堂同小參鳴法鼓唯一通唐書百官志云文武官職事九品以上及二王後朝朔望文臣五品以上及兩省供奉官監察御史員外郎太常博士日參號常參官武官三品以上三日一朝號九參官五品以上及折衝當番者五日一朝號六參官五代史李琪傳云明宗初即位乃詔羣臣五日一隨宰相入見內殿謂之起居琪以謂非唐故事請罷五日起居而復朔望入閣明宗曰五日起居吾思所以數見羣臣也不可罷而朔望入閣可復宋宋敏求春明退朝録云唐在京文武官職事九品以上朔望日朝其文官五品以上及監察御史員外郎太常博士每日參武官五品以上仍每月五日十一日二十一日二十五日參三品以上九日十九日二十九日又參王沂公家一本云四品以上九日十九日二十九日再參其長上折衝果毅若文武散官五品以上直諸司及長上者各準職事參其洪正字犯宣祖廟諱文館及國子監博士學生每季參若雨雪霑服失容及泥潦並停以上唐儀制令凡京百司有常參官謂五品以上職事官八品以上供奉官以上唐六典正正字犯仁宗嫌名元二年敕文官充翰林學士皇太子諸王侍讀武官充禁軍職事並不常朝參其在三館等諸職掌者並朝參訖各歸所務是年御史中丞竇參奏常參文武官準令每日參自艱難以來遂許分日待戎事稍平即依常式其武官準令五品以上每月六參三品以上更加三參頃並停廢今請準令却復舊儀十三年御史臺奏諸司常參文官隔假三日以上並以橫行參假其武班每月先配九參六參九參謂一月九次六參謂一月六次今後每經三節假滿縱不是本配入日並依文官例橫行參假以上唐會要後唐同光二年四方館奏今後除隨駕將校及外方造奉專使文武兩班三品以上官可於內殿對見其餘並詣正衙從之天成元年御札賜文武百僚每日正衙常朝外五日一赴內殿起居每月朔望日賜廊下食唐室承平時常參官每日朝退賜食謂之廊餐自乾符亂離罷之惟月旦入閣日賜食明宗即位諫官請文武百僚五日一起居見帝於便殿李琪以為非故事以五日為繁請每月朔望日入閣賜廊下食罷五日起居之儀至是宣旨朔望入閣外五日一起居以為常天成元年敕今後若遇不坐正殿日未御內殿前便令閣門使宣不坐放朝班退是年御史臺奏凡新除官及差使者合於正衙謝辭每遇內殿起居日百官不於正衙敘班其差使及新除官辭謝不令參謝每內殿起居日百僚先敘班於文明殿庭候辭謝官退則班入內殿從之晉天福二年中書門下奏在內廷諸司使等每除正官請令赴正衙謝後不赴常朝其京官未升朝官祇赴朔望朝參從之以上五代會要國朝諸在京文武升朝官每日朝其有制免常朝者五日一參起居國朝令文按唐制文武職事官並赴常參武班五日一參又有三日一參五日參并朔望為六參三日參乃九參所謂常參官未有無職事者由後唐同光中乃分常朝內殿凡隨駕將校外方進奉使文武三品以上官即於內殿對見其餘並詣正衙至天成初詔文武百官每日常朝外五日一赴內殿起居其趨朝官遇宣不坐放朝各退歸司本朝視朝之制文德殿日外朝凡不釐務朝臣日赴是謂常朝埀拱殿曰內殿宰臣樞密使以下要近職事者并武班日赴是謂常起居每五日文武朝臣釐務令釐務並赴內朝謂之百官大起居是則奉朝之制自為三等蓋天子坐朝莫先於正衙殿於禮羣臣無一日不朝者故正衙雖不坐常參官猶立班俟放朝乃退唐有職事者謂之常參今隸外朝不釐務者謂之常參又鼠璞説見叢軌門參假處大慧為真空道人慈行普説云方是時大溈真如慕哲法席甚盛龍象蹴踏每遇升堂三通鼓罷大衆鴈行而立風滲滲地趺坐良久乃舉箇古人頌子云欲識本來心青山緑水深不是身心境徒將聞見尋識得便識取不用更沈吟參便下座後五日又當參復舉是柱不見柱非柱不見柱是非已去了是非裏薦取參但是升座除拈提公案外其餘多類此有箇川僧滑稽從溈山下來有問大溈法道如何僧云規矩法度甚好只是念誦多晒曰三八念誦叢林定法何言甚多僧云大溈獨不然三八日僧堂前維那念誦了五日法堂上長老又念誦衲子傳以為笑普燈録佛海遠禪師章云上堂昨夜來報五參正值老僧洗腳起來抖擻精神末上輸他一著雪巖欽禪師録云凡遇五參見曲彔床上箇漢胡説亂道何不也歷在耳根又云前日有兩箇兄弟來侍者寮説要上方丈請益我與侍者説每遇五參須説做工夫一段他何不領略又何須到方丈聽説方才便是這裡無口傳心授底佛法待此後五參把我自己為伊再説一遍普燈録西禪舜禪師章云上堂曰五日一參三八普説千説萬説橫説豎説云云又簡堂機禪師章云上堂曰五日一參三八普説自揚家醜更苦問理問事問心問性克由叵耐別峯印禪師録慈航到上堂曰每遇五日一參雖是諸方舊例今日宗師面前豈容亂呈懵袋雖則恁麼不可放過云云別峯雲禪師録云上堂支提門下五日一參我才合掌汝便和南云云無準範和尚録普説云凡遇五日須要上堂三八須挂牌勉強以塞方丈之責亦不是矜誇學解眩曜見知及造妖捏怪只據自家所見赤骨律地與兄弟相見偃溪聞禪師香山録上堂云五日不升堂三八不入室供是衆人辦飯是借米喫清拙澄禪師建長録舉龍濟修山主諸佛不出世四十九年説頌師和二首代五參上堂忠曰日本古亦有五參中巖月禪師崇福録云五參衆立定師出來大衆如例問訊云云五上堂五參上堂又名五上堂備用清規五日上堂云古宿朝夕激揚此道晚參曾不越宿今時遇五上堂單提正令亦不易得也九參上堂退朝録云九參謂一月九次又云三日參乃九參見五參上堂處古德有行九參上堂者傳燈録羅漢琛禪師章云衆僧晚參聞角聲師曰羅漢三日一度上堂王太傅二時相助聖節上堂天子生日為聖節詳報禱門上堂祝壽詳敕修清規續燈録禾山志傳禪師章有聖節看經上堂日本亦行聖節上堂清拙澄禪師建仁録有天壽節上堂謝秉拂上堂四節頭首秉拂之後住持上堂謝勞此謂謝上堂敕修清規四節秉拂云次日方丈請茶如都寺辦齋併請茶半齋點心別日上堂敘謝管待虗堂愚和尚寶林録謝頭首秉拂上堂云以壇拜將為求活國之英以拂授人要見枯心之士雲黃峯下象龍所歸虗堂薄處先穿引得證龜作鱉謝都寺齋上堂四節秉拂都寺辦齋住持上堂謝之見謝秉拂上堂處虗堂愚和尚育王録謝秉拂夏齋上堂云一稱南無佛皆已成佛道若説到金輪水際崑崙山椒功歸何所擊拂子吽吽有甚饆饠䭔子快下將來希叟謝都管冬齋上堂見職位門都管處南堂謝秉拂冬齋上堂見飲啖門冬齋處北澗簡禪師續集化齋偈云解結冬年辦四齋赤洪崖打白洪崖信心檀越家家是只告諸天次第排出隊上堂出隊義見雜行門大川濟和尚天章録出隊上堂云為衆持鉢去七佛舊儀式菴園塔廟間處處遍敲擊施主一聲慚愧化主當面著賊賊已著了且道如何拔本太無厭生元叟端禪師録出隊寄歸示衆偈云太湖三萬六千頃埀白西來把釣竿蝦蟹魚龍都不見月明空照夜濤寒北澗簡禪師道場録出隊歸上堂云半月出去鼻孔不見眼睛一日歸來眼睛不見鼻孔失却惺惺換得骨董雖然只是潑骨董貪者不與廉者不取卓拄杖云打歸常住出鄉上堂密菴録多出鄉上堂蓋即出隊也密菴傑禪師靈隱録出鄉歸上堂云持鉢去持鉢歸草鞋跟斷通消息玲瓏八面盡光輝遊魔宮入虎穴當機撞著惡聲頭直教心地頓休歇且據箇什麼道理便乃如是老不以筋力為能因事上堂忠曰雖其事不定多是有毀逆違難因此説法不露言其事故稱因事也虗堂和尚育王録因事上堂云天之有雲也可以蔽日月降甘雨地之有水也可以濟舟楫潤焦枯人之有心可以興禍福制剛柔三才既明理歸一揆所以然者何也卓拄杖大鵬展翅蓋十洲籬邊燕雀空啾啾祖庭事苑云叢林或説因事往往妄議當日猥瑣世諦雜事豈其然也夫宗師唱道無不因此事而有語言偈頌以接引學者豈存誠於世諦者哉若宗師因世諦彼非此是以出示人天又何足為後世法耶至如初洞山因事頌曰五臺山上雲蒸飯佛殿前頭狗尿天剎竿頭上煎鎚子三箇猢猻夜簸錢又慈明因事頌時來開鉢展巾單飯了收盂困即眠石人撫掌呵呵笑木女彈箏儞自箏又韶九峯因事頌收得便除四足兩耳却挂金鐶好是月明深夜一聲清透松關此皆因事而作豈留情於是非動靜之間者哉忠曰睦菴以因事強為因此事不因世諦若然則宗師語言上堂偈頌無不因此則都可名因事上堂偈頌矣特標因事何為凡佛祖出乎五濁惡世埀化動則遇魔難宗師即託魔難開示道法此云因事上堂因事偈頌而已何復彼非此是耶引座忠曰引座者導引他升座也若突然敷演則衆可驚疑故住持先表白故語尾必有恐人無憑等語舊説曰引座有二一他寺尊宿來訪時首座勸請説法住持為之先引座以申尊宿當為衆闡揚之意二他剎虗席請本寺西堂或首座等遷補即專使先請本寺住持引座次受請新命升座敕修清規上堂云若尊宿相訪特為上堂或引座舉揚又迎待尊宿云如大尊宿則首座衆頭首稟住持勸請為衆開示法要住持先到客位陳意若允首座具狀兩序大衆同詣客位插香拜請次請住持引座乃至住持先引座與常上堂同右為尊宿引座者敕修清規受請人升座云住持出升座與五參禮同令請客侍者請新命趺坐褒美新命為法而出勸請舉揚慰衆渴仰舉話有無不拘松源為掩室引座笑菴為松源引座皆不舉話石橋為簡堂引座息菴為復菴引座皆舉話無準範禪師徑山録為石溪和尚赴蔣山引座云寶公寶山之寶非青黃赤白等色亦非大小方圓等相三賢莫辨十聖那知是故公亦祕惜若非其人未易分付今日石溪不涉安排計較突然在前無心而得既得之已亦不以為奇特眩曜於人是則故是爭奈我此千百衲子虗心久矣皆欲一見是以鳴鼓集衆殷勤虔請願升此座於香煙起處放此寶光令我一衆因此寶光獲見此寶同得受用盡未來際永無退失然雖恁麼更有一事不得不疑或有箇沒意智漢不識好惡犯衆出來道蔣山蔣山不得將常住物作自己人情吾姪却須自作支遣莫教纍及老叔恐人無憑先此奉白右為受請新命引座者升座舊説曰普説為升座或上堂亦稱升座忠曰古有上堂稱升座者如臨濟録後世升座與上堂不同諸録已分二名不可槩為一也又日本稱升座者多有散説與普説同如唐僧無學大休竺仙清拙等日本録中升座亦有散説蓋觀土風愜時機而已按升座有散説無學為濫觴焉瑞溪臥雲日件録云妙智太嶽曰升座與普説有異然此方升座全同普説有散説其弊自絶海矣豫按絶海已前尊宿升座早有散説忠次下引敕修清規受請升座云侍者覆住持鳴鼓如常上堂式聯燈會要釋迦牟尼佛章云世尊一日升座大衆才集定文殊白槌云諦觀法王法法王法如是六祖法寶壇經云韋使君請益師升座臨濟玄禪師録云府主王常侍與諸官請師升座師上堂云山僧今日事不獲已曲順人情方登此座云云已下略録來朝唐僧日本録中升座有散説者無學元禪師建長録慶懺釋迦圖繪像升座先提綱次散説百六十言後説偈又越州太守夫人請慶讚釋迦像楞嚴經升座先提綱次散説三百七十言後四句偈又圓覺録開堂大光明殿慶懺升座先拈香次趺坐提綱次散説四百七十言後長偈忠曰無學録升座數則但此三則有散説然不如後人繁長大休念禪師壽福録武藏守三祥供淨智寺開山升座先拈香次就座散説後説偈竺仙仙禪師淨妙録足利觀心公周年忌升座先問答次提綱次散説後長偈清拙澄禪師録近江太守直菴居士七七日升座從頭散説次回向後拈提又直菴百日拈香升座先拈香次問答次散説次回向次敘謝後四句頌已下略録日本禪祖升座中有散説者南浦明禪師萬壽録龜山法皇大祥奉敕就嵯峨殿升座先拈香次就座索話問答次提綱次散説後拈提夢窗石禪師天龍録後醍醐天皇十三回忌就多寶院升座先拈香次就座問答次提綱次散説志趣回向後長偈又慶讚京城東山八坂寶塔升座全同上月菴光禪師録前豫州太守為先考正受院殿升座先拈香次志趣回向次就座索話問答次提綱次散説志趣回向後拈提説偈忠曰支那諸録升座無散説且如續燈録所載淨因臻圓通秀佛國白等自餘不遑枚舉説禪忠曰日本禪林有説禪一規而今詳之只是升座耳矣其必挂文殊像者蓋行之於僧堂也有處沒意智對機之後不提綱直敘志趣或初埀語敘志趣皆失體裁其提綱之後説志趣者如宋時慧林德遜佛陀禪師淨因惟嶽佛日禪師慈德殿升座見續燈録夫説禪者何謂也但是謂提綱説法而已故大鑑禪師叢林細事云秉拂提綱不必押韻但據平生參學所見滔滔地説將去所貴宗眼正手段高如臨濟德山趙州雲門可以為法若能如是古風可復古來但云説禪不言做禪止此然説禪而無提綱何説禪之有忠曰中華未有規矩詺説禪者其禪史祖録中唯有説禪文字略録一二聯燈會要仰山寂禪師章云溈山云寂子説禪如師子吼驚殺狐狼野犴之屬傳燈録歸宗常禪師章云師上堂云吾今欲説禪諸子總近前大衆進前師云汝聽觀音行善應諸方所大慧為照超二大師普説云有箇月和尚法嗣大通自信禪不及每日在方丈內修長懺所以端師子有頌譏之曰何山長老修長懺壇上闍梨愛説禪子細思量無別事都盧只為大光錢中峯山房夜話云今之禪流將欲據大牀揮麈尾首取諸家語要揀擇記持及漁獵百氏之雜説以資談柄者是説禪之師也不惟不能與人解黏去縛而亦自失本真喪壞道眼小參舊説曰小參不時講之鳴鼓唯一通其規約於大參故曰小參大參者上堂也參者交參義敕修清規云凡集衆開示皆謂之參見晚參處祖庭事苑云禪門詰旦升堂謂之早參日晡念誦謂之晚參非時説法謂之小參夫是皆以謂之參者何乎曰參之為言其廣且大矣謂幽顯皆集神龍並臻既無間於聖凡豈輒分於僧俗是以謂之參也其主法者以平等一心應勤植萬類令法久住豈曰小補或以小參為家訓愚未之前聞敕修清規小參云小參初無定所看衆多少或就寢堂或就法堂乃至鳴鼓一通衆集兩序歸位住持登座與五參上堂同提綱敘謝委曲詳盡然後舉古結座又晚參云如住持入院或官員檀越入山或受人特請或為亡者開示或四節臘則移於昏鐘鳴而謂之小參可以敘世禮曰家教者是也禪苑清規小參云小參家訓綱紀叢林夫小參之法初夜鐘鳴寢堂設位集知事徒衆賓主問酬並同早參提唱之外上自知事頭首下至沙彌童行凡是衆中不如法度事無大小並合針規廣説乃至出家行腳入衆參禪粥飯茶湯晨參暮請語言事業動止威儀應係衆中規矩並當委曲提撕若其緘口無言迤邐玄綱墜地後進如蒙法藥應當刻骨銘肌斂片善以無遺剔纖瑕而必去小參之設意在斯焉有行堂講之者希叟曇禪師録有行堂小參又見立參處義堂日工集云建長衆寮聽長老中巖講清規云天童淨和尚小參不必於法堂隨處行之故今日本永平寺猶講此規傳燈録藥山儼禪師章云大衆夜參不點燈師埀語曰我有一句子待特牛生兒即向汝道時有僧曰特牛坐兒也何以不道師云侍者把燈來其僧抽身入衆聯燈會要德山鑑禪師章云小參示衆云今夜不答話問話者三十棒時有僧出作禮師便打僧云某甲話也未問為甚便打師云儞是甚處人云新羅人師云未跨船舷時好與三十棒汾陽小參見提綱處元亨釋書藏山空禪師傳云空曰石林老行鞏禪海波瀾吾雖不得而盡偏洲傍渚儻打浮泳我昔辭林林告曰小參雖家訓又自有家法子歸故里敲唱宗乘妙叶之一路不可亂做也即與二篇冬至曰擬著即錯鐵牛掣斷黃金索不擬猶乖撒手還同萬仞崖這裏一咬便斷如花開鐵樹似笋迸石頭無陰陽地儘自寬間爭奈東山山前一片松根竹腳未曾踏著在驀拈拄杖一畫云不得侵疆越界除夜曰似地擎山不知山之孤峻鳳縈金網趨霄漢以何期如石含玉不知玉之無瑕蛇護神珠蘊風雷而未化設使翱翔霄漢鼓蕩風雷聞者震驚見者眩惑也只間間地可可地豈不見僧問洞山年窮歲盡時如何山云家家門底野狐兒拍床云鯨吞海水盡露出珊瑚枝家教小參又曰家教又見小參處黃龍死心禪師録云夫小參者謂之家教何謂家教譬如人家有三箇五箇兒子大底今日幹甚事小底今日幹甚事是與不是晚間歸來父母一一處斷叢林中亦復如是院門今日幹甚事是與不是住持人當一一處斷清拙澄禪師聖因録云古德小參謂之家教説些細大法門汾陽六七人夜夜小參德山小參不答話問話者三十棒令行千古如在耳目雲峯悅禪師小參舉百丈示衆語至今叢林膾炙人口莫不皆是從悲智海中流出血滴滴地親切為人處豈似後來攢花簇錦對句押韻以當宗門提唱又日本録小參云古德小參謂之家教細大法門一一指陳後來法道不古競出新樣攢花簇錦以巧妙為奇特不知古人實頭處正是拙中之巧雲峯小參聯燈録載笑隱欣禪師龍翔録云明日結制今夜小參謂之家教如家裡人説家裡話家訓小參曰家訓見小參處校定清規云小參謂之家訓初夜鳴鼓寢堂排設有處只就法座事無大小並合針規衆中規矩委折提撕若其緘口無言迤邐綱宗墜地小參之法意在斯焉鳴鼓一通侍者候衆集定請住持出踞座侍者於法座前問訊云云古之叢林每夜咨參汾陽以夜寒罷參不特為規矩家訓而設意專激勵學者針其做處偏枯各自討生涯立地成佛作祖今時叢林每遇解結冬年四節小參蓋為敘謝兩班及大小職務又緣諸方專係都寺幹齋故當晚小參時敘謝心力為衆之勤若常住自辨不必言也云云如施主請小參觀其來意或咨扣因緣則又與家訓不同也或齋後或夜靜俱得又有所至處官員請小參者又有出隊處衆人裒率請小參者雖名為小參乃與升座事體一同此尊宿家遇緣即宗之謂也備用清規小參云百丈謂之家訓古法只就寢堂針誨埀示委曲提撕乃至前輩時時激揚宗旨開發後昆忠曰祖庭事苑云或以小參為家訓愚未之前聞止此余謂死心敷衍小參謂家教義見家教處睦菴與死心同時人或怪其説乎然備用已言百丈謂之家訓蓋其目在古清規而睦菴偶不見也中巖月禪師建長録入寺當晚小參埀語問答畢師乃云小參者家訓也古德喻之有一大家底主人朝暮使令屋裏兒女姪弟排列座下分付家中行事云大兒當行其事小底當作何事以至奴婢僕輩一一示其當行事便如我宗門中兩序諸職事人教它排列法座下一一標示當行底事乃至四來兄弟在僧堂裏究明己躬大事斯乃最要緊事近來佛法弊甚在小參時長老力作文言謂是提綱或舉古則拈之頌之以當宗旨以豫觀之當得甚麼碗脫丘兄弟家莫説道新長老不會説法只會弄口觜才方入院雜談惡言以當佛事便是雜惡言談不會文章詞語他後到閻王面前未知他愛儞文言耶又聽我條直言語乎兄弟各自諦審思惟勉之次結座其語見結座處朝參早朝參禪也禪門規式云闔院大衆朝參夕聚僧史略別立禪居章云有朝參暮請之禮隨石磬木魚為節度忠曰禪林朝參於粥罷普燈録楊岐會禪師章云一日當參粥罷久之不聞撾鼓師問行者今日當參何不擊鼓云和尚慈明出未歸師徑往婆處見明執爨婆煮粥師曰和尚今日當參大衆久待何以不歸明曰儞下得一轉語即歸下不得各自東西師以笠子蓋頭上行數步明大喜遂與同歸忠曰當參者當五參之日也忠曰世禮言朝參者蓋入朝參謁義見五參上堂處杜工部集重過何氏詩云頗怪朝參懶應耽野趣長皇明通紀集略弘治紀云今朝參外不得一覩天顏早參朝參又名早參祖庭事苑云禪門詰旦升堂謂之早參詳小參處廣燈録洞山聰禪師章夏日早參頌云晨參暮請無別事古代相傳直至今折旋俯仰全體是莫纍曹溪與少林三月鶯啼春樹老九旬時雨日霖霖滴滴不離毗盧界海上番人笑夜深又早參頌云曙色才分便即參九年面壁過多談俱胝一指虗勞力禪客豈待口喃喃晚參舊説曰晚參對朝參為言敕修清規晚參云凡集衆開示皆謂之參古人匡徒使之朝夕咨扣無時而不激揚此道故每晚必參則在晡時至今叢林坐參猶旦望五參升座將聽法時大衆坐堂也若住持至晚不參則堂司行者稟命住持覆首座鳴僧堂鐘三下謂放參鐘也備用清規坐參云若晚參堂司行者不覆首座不鳴僧堂前鐘方丈客頭鳴法堂鼓住持出堂首座頭首領衆隨至法堂或寢堂隨方毗尼上座坐定侍者出班兩班東西堂各出班問訊晚參畢衆散各歸寮藥石臨濟玄禪師録云師晚參示衆僧寶傳汾州昭禪師傳云并汾地苦寒昭罷夜參有異比丘振錫而至謂昭曰會中有大士六人奈何不説法言訖升空而去昭密記以偈曰胡僧金錫光請法到汾陽六人成大器勸請為敷揚又楊岐會禪師傳云慈明飯罷必山行禪者問道多失所在會闞其出未遠即撾鼓集衆慈明遽還怒數曰少叢林暮而升座何從得此規繩會徐對曰汾州晚參也何為非規繩乎慈明無如之何今叢林三八念誦罷猶參者此其原也清拙澄禪師録晚參云晚參之舉盛起於汾陽汾陽老人日日晚參楊岐撾鼓逼慈明晚參正謂此也或暫止參則云和尚今晚放參祖庭事苑云日晡念誦謂之晚參詳小參處忠曰晚參直如臨濟晚參示衆楊岐所謂汾州晚參是也然目之於日晡念誦者當時訛言又如晡時念經言誦放參也叢軌門放參處辨廣參忠曰大衆一同參故言廣鹽山拔隊和尚行録云大衆廣參次國師三光還問師曰逍州因什麼道箇無字立參忠曰立地説法故云立參而已即晚參也希叟曇禪師法華録及小參中有為行者立參四則又晚參普説云慈明出遊楊岐乃撾鼓請歸立參訓童行備用清規訓童行云五參上堂罷當訓童行參頭行者令喝食行者報各局務行者行堂前挂牌報衆昏鐘鳴行堂前鳴板三下集衆行者上寢堂排立定參頭入方丈請住持出就座參頭進前插香喝參同問訊九拜進前屏息拱聽規誨已又同衆三拜珍重而退禪苑清規訓童行有立身陪衆作務三章文繁又監院云訓誨童行之法宜以方便預先處置不得妄行鞭捶設有懲戒當庫堂對衆行遣不過十數下而已不虞之事不可不慎村寺清規云童行方入寺須先訓之以祖師偈頌近世所刊緇林寶訓及了禪師訓童行歌溈山警策證道歌永安僧堂記等是也次訓之以大悲楞嚴諸祕咒觀音圓覺金剛諸經若語孟中庸大學周易禮記并可兼訓之乃至早以佛祖書入諸肺腑多應作好人蓋先入者為主他日雖中之雜毒亦不足以害其正念乃至亦不可只訓其歌唄鼓鈸以規嚫施乃至宜教觀音聰明神咒久而漸漸聰明縱未即聰明亦足以資性長福消災觀音聰明咒見經咒門童行義見職位門禪月大師戒童行偈諸祖偈頌載月窟清禪師訓童行諸祖偈頌載慈受深禪師訓童行頌慈受偈頌載中峯本禪師訓童行幻住清規載慈航朴禪師沙彌訓練法人天寶鑑載説規矩希叟纍行説規矩蓋有所特警誡敕修清規備用清規等訓童行之類也希叟曇禪師開善録上堂謝遠首座并説規矩云結繩為政畫地為牢堯舜之君猶有化在拈杖拄杖子罪犯彌天剛強難化非結繩可以取其信非畫地可以格其非商令至嚴惡心轉熾瑞嚴老朽既司其職當言不避截舌卓杖輕輕點著返朴還淳何故不過虎溪橋誰識東林遠又為新歸堂兄弟晚參注云説規矩不録又衆寮晚參説規矩云妙斷去漫巧運風斤之手專工修月細無玉斧之痕木之就規矩在梓匠輪輿金可作瓶盤假洪爐烹煉學道謹鞭羊之戒希賢思畫虎之羞蠅附驥千里可期葛倚松九霄有望馬勝熱威儀攝衆忍不步趨婆羅門聚會無殊速須敬遠隄防六賊守心城莫使穿窬掃蕩羣邪行正路須教透徹百丈頽綱要人提掇楊岐破屋要汝支撑灼然皮下有血人終不隨他語脈轉倘能深信彼此無辜其或未然拍膝一下啼得血流無用處不如緘口過殘春教苑清規訓童行云訓童行之法當説出家因緣或説規矩禮度或説經中大意聽教義堂日工集云中華禪院每夜坐禪罷隨意就于諸寮而夜話商量古今事謂之聽教今日本不然是以兄弟見聞局於册子上而不通方普説舊説曰普説即升座也上堂亦升座也但普説不炷祝香不搭法衣以為異普説自真淨始三佛亦行之到大慧方盛普説須是知見廣博人而始得或曰今時升座即普説也多唯演五部大乘經本緣施食法來由耳中華宗師豈如是耶少讚檀主者則有之如今時普説與唱導之師經供養何異經供養者檀家請供養其經則為作之也又曰升座如諷經拈香如願文正述諷經之功德忠曰如供養五部大乘經普説則何得不演五部功德若復餘時升座而演五部功德則或剝可當也原夫末代道薄無開示宗要之普説多是檀那薦亡供養經時為普説故語路自然不似中華宗師普説而已或不鑑其本而但責其末何足針起膏肓哉敕修清規普説云有大衆告香而請者就據所設位坐有檀越特請者有住持為衆開示者則登法座凡普説時侍者令客頭行者挂普説牌報衆鋪設寢堂或法堂粥罷行者覆住持緩擊鼓五下侍者出候衆集請住持出據坐普説與小參禮同舊説曰普説者一時説普於一切時也或曰普説一切法也或曰説普法也普法者即普賢法也隨緣真如曰普不變真如曰賢隨緣不變圓融無礙法門也忠曰華嚴經毗盧遮那品演義鈔云言普法者一具一切一一稱性同時具足等太清曰普説非明眼人則不可也語中必演自家悟道緣蓋人天衆前吐露自悟境界豈未悟人而得普説哉忠曰眼若不明何説而可是太清之言可笑又云普説中必説自悟處古人普説何必如此是太清自枉立格式大慧杲和尚為虎丘沼長老普説云一百年前本無普説因熙寧元祐間真淨和尚居洞山歸宗時方有普説大意以開悟學者為心然古人立箇法門亦自有出處何以知之不見大華嚴經離世間品普慧菩薩雲興二百問普賢菩薩瓶瀉二千酬於中有一問曰何等名為普説三世答曰佛子菩薩摩訶薩有十種説三世何等為十所謂過去世説過去世過去世説未來世過去世説現在世未來世説過去世未來世説現在世未來世説無盡現在世説過去世現在世説未來世現在世説平等已上是九世却把當人這一念如貫數珠相似穿過九世以此一念通為十世故曰現在世説三世即一念是為一所以李長者有言無邊剎境自他不隔於毫端十世古今始終不離於當念云云忠曰按華嚴普慧問但云何等為説三世五十三經乃無普字普賢答云有十種説三世何等為十云云是為十菩薩以此普説三世止此至此方有普説字又離世間品云有十種智慧觀察乃至於一切世界普説正法智慧觀察五十四經亦有普説字又永大師請普説云師云叢林舊無普説有來方五六十年始因真淨和尚尋常不入室時便為大衆普説如普説入室一般東山外集答普賢書云正月二十九日堅上座自衡陽歸來得妙喜老書此老名雖未脫罪籍其身甚安樂道愈光衡之伊山開福花藥三院與之館參徒無事即騎馬入三處坐方丈與之入室普説來者皆湖海英爽有志之士是臨濟一宗未至委地矣備用清規普説云洞下尊宿每遇朔望衆寮設位為衆普説惟大慧和尚宗通説通不拘時節不擇方所也虛堂愚和尚録告香普説云古之宗師為人直截凡有所問只就問處與之破執初無實義後來垛生招箭形於語言乃有普説普説首出於真淨和尚三佛以來皆有普説無非怒罵呵咄鞭策誨勵使其大心衲子勇於進工近世宗師間有普説尚多文體不見古人直截為人處大似場屋中論策一般及攻其所從乃藥貼上語不能療人之病徒使其末流紛紛傳集祕蓄以當本參殊不知我王庫內無如是刀明極俊禪師普説舉華嚴普説三世法畢云由是東震旦禪林中有普説之舉即宗此法然此普説亦不易舉無非法性寬波瀾濶有變通逸格之才回乾轉坤之作方可任此責前輩大珠南陽臨濟德山巖頭羅山亦不敢舉此黃龍南死心新靈源清長靈卓亦不敢舉此至於真淨文方有普説之舉以後圓悟大慧應菴皆宗此式中峯密菴下惟無準石田癡絶虗堂外餘者法性不寬波瀾不濶雖有此舉終是不能通暢况乎山僧膚淺末學孤陋無聞詎敢當此責耶華嚴經離世間品云佛子菩薩摩訶薩有十種説三世何等為十所謂過去世説過去世過去世説未來世過去世説現在世未來世説過去世未來世説現在世未來世説無盡現在世説過去世現在世説未來世現在世説平等現在世説三世即一念是為十菩薩以此普説三世又十定品云此菩薩普入一切世界而於世界無所著乃至於一念中普得一切三世智普知一切三世法普説一切諸佛教普轉一切不退輪於去來現在一一世普證一切菩提道於此一一菩提中普了一切佛所説忠曰禪林普説目當援十定品為證貴徑截而易曉人耳矣又大慧言真淨和尚方有普説撿古宿録中真淨語録不載普説告香普説普説有告香者小補韻會號韻告居號切增韻啓也又沃韻姑沃切增韻啓告也爾雅請也注云求請也正字通云告古到切音誥啓也爾雅請也忠曰今告香者謂插香于師家請求普説或啓求開示之意也韻會姑沃切正字通古到切並有啓也請也訓則二音相通漢書高帝紀注孟康曰古者名吏休假曰告師古曰告者請謁之言謂請休耳忠曰今告香請謁插香求開示也漢書注告音如嘷呼之嘷又音嚳雲章曰告字上之告下音郜下之告上音穀學者就師家插香以告之請法則用穀音師家順學者之請而説則用郜音日本禪林未曾行之為可憾焉忠曰韻會毛氏曰凡告命告假之告止音去聲餘經史告示有音無音合二韻通用止此雲章何從得二音義別耶蓋周禮大祝作六辭一曰告上曰告發下曰誥止此此是文告之辭也雲章依此妄説至今學徒傳妄無辨敕修清規告香云每夏前告香新歸堂者推參頭一人維那和會定同衆詣侍司稟云新挂搭兄弟欲求和尚告香普説敢煩侍者咨稟乃至如住持允從即報堂司出告香圖其規詳彼備用清規告香云四月五日告香開示方來校定清規云夏前例於四月初五日已前看新挂搭兄弟若干人就中推一人為參頭忞公清規云或頭首中有未告香者亦可為參頭北澗簡禪師録告香普説云告香乃叢林盛禮前輩未嘗盡行道大德備如慈明和尚尚且至再至三然後受南禪師告香况非慈明乎舊説曰夏前新挂搭人請普説者蓋列剎宗師自證雖可無異為人演法門風或不同新到要識之或意在若説入做因緣可以為榜樣焉瑞溪夢語集云即菴録曰告香普説叢林典故豫謂普説尋常可行之告香普説行之不多何以知之普説之盛無如大慧然六十則內告香唯一耳大慧曰一百年前無普説然則告香蓋有普説以來有此式也大慧引經證普説字其告香字亦可證而未撿出矣入寺之初告香普説是又叢軌也今略録敕修清規告香云住持入院後人事定庫司備香首座領衆懇請為衆告香然後開室古法未預告香不許入室大慧有告香普説在其普説第二卷偃溪聞禪師録靈隱告香普説云叢林新人入門例有開室告香二事諸方臨夏告香一節不舉行久矣山僧叨此來已及兩月汩汩人事日不暇給向後入室之際兩班單寮暨諸宿德不必訪及若是晚學有志慕道者來自大方不妨商確清拙澄禪師録夏前告香普説云諸方舊例今古常儀入寺之初為衆普説近日堂中首座諸耆德同上方丈堅請告香普説務欲復見古道顏色開室忠曰開室即入室也言開室令衆入參也猶如公孫弘開東閣延賢人之開矣敕修清規云住持入院後為衆告香然後開室詳告香處又入室云遇開室時粥前侍者令客頭行者僧堂前諸寮挂入室牌偃溪録新人入門例有開室告香二事詳告香處虗堂愚和尚録靈隱立僧普説云旦夕必為諸公開室相見入室舊説曰入室者師家勘驗罷參的學者見解深淺教其無底滯矣敕修清規入室云入室者乃師家勘辨學子策其未至搗其虗亢攻其偏重如烹金爐鉛汞不存玉人治玉碔砆盡廢不拘昏曉不擇處所無時而行之故昔時衲子小香合常隨身但聞三下鼓鳴即趨入室今時以三八入室者備故事也又云粥罷下堂客頭即緩擊鼓三下住持至達磨前炷香同侍者三拜入據室坐侍者問訊班左立行者問訊班右立頭首領衆達磨前各炷香三拜聯接而至室前後至者依次炷香展拜接排而立次第相趲不許攙先亂序侍者燒香問訊出外揖首座入入先左足仍以左手上香進前問訊至禪椅右側立聽舉話或下語或不下語隨意過禪椅左問訊退步觸禮一拜舉左足出揖次人入一出一入相向問訊聯接不絶又告香云古法未預告香不許入室雲章曰凡有入室侍者以竹篦度與住持云請入室是即天童如淨和尚之規也禪苑清規入室云或分郭作廊或分寮或隔日或排日或早或晚各逐住持人建立入室時到侍者令行者裝香當面設拜席有處不拜更不展席竟咨稟住持人如有指揮入室則挂入室牌或打鼓或打板或敲入室牌警集大衆住持人坐侍者方丈外東邊叉手立如衆稍集排立定或一行面東或兩行相對侍者入方丈當面問訊轉身禪椅東邊香臺後面南立先問訊左手上香問訊訖當面問訊出於大衆前問訊請入室侍者歸寮入室人略轉身問訊大衆依次第叉手而進不得攙前令衆動念於方丈門右邊入先舉左足當面問訊訖轉身叉手禪椅西南角問訊而立又先問訊然後吐露消息不得語話多時亦不得説世諦間話久滯大衆吐露竟問訊退當面禮拜有處一拜有處三拜有處大展有處觸禮面東轉身叉手從左邊出先舉左足所以避後來之人免有衝撞出方丈外望住持人問訊乃去大衆前又問訊而出或作兩行入室入門便分兩向東西次第送進有處或舉話或通話或請益各分一時不許相雜有處混而為之大衆入室竟侍者入室仍捲席而退入室禮合燒香燒香之法初入方丈當面問訊訖轉身叉手於香臺南立向住持人問訊右手上香當面問訊禪椅角立今以滯時妨衆故不燒香有處門外設席一拜而退亦恐妨衆也入室人常令衣服完淨無帶垢膩及令威儀齊整舉止安詳以表敬重人之意也曉諭侍者非緊急人客要切事務於入室時不得通報仍令行者不得出聲説話敲磕喧衆校定清規云入室之法或三八日或不定時節鳴鼓三下集衆侍者預令行者挂牌住持於方丈內坐侍者於室外東邊列一行立仍於室門限外設席衆人燒香大展三拜不問戒臘鴈行而立於室外西邊如頭首知事插入不妨餘人攙行令人動念俟排稍定侍者入室內住持前問訊了燒香復當面問訊出室外對入室上首人問訊揖入當先舉左足叉手進住持前問訊轉身於禪倚角西南叉手而立住持舉話下語畢復正面問訊叉手從東邊出亦先舉左足出門外席內觸禮一拜而退據清規所載入室例合燒香燒香之法初入方丈當面問訊轉身叉手於香倚南面向住持問訊右手上香却當面問訊方過禪倚西南角聽舉話今以滯時妨衆故不燒香就門外設席一拜而退亦恐妨衆或行古法燒香亦在住持意當於寢堂中或挂達磨頂相設香燭供養其住持當展拜了方歸室中坐侍者隨住持後拜入室弟子次第於像前燒香一炷設三拜如前鴈行而立次第入室備用清規入室云開大爐韛煆煉方來真正舉揚克盡厥責曉昏不拘時也近代三八聊應故事漸寂無聞可不痛心耶又云按大慧竹菴雲門議集入室罷住持復出達磨前炷香大展九拜仰遵遺教俯謝證明令法久住禪林寶訓云萬菴曰古人入室先令挂牌各人為生死事大踴躍來求決擇多見近時無問老病盡令求納降款有麝自然香安用公界驅之因此妄生節目賓主不安主法者當思之已下略録上古言入室者恐非用今入室規者傳燈録牛頭融禪師章云命入室上首智巖付囑法印令以次傳授又百丈海禪師章云屬大寂闡化南康乃傾心依附與西堂智藏南泉普願同號入室又禪門規式云除入室請益任學者勤怠或上或下不拘常準廣燈録大陽堅禪師章云在靈泉入室靈泉問云儞從什麼處來師云僧堂裏來泉云儞為什麼不築著露柱師於言下省悟松源嶽禪師録云上堂舉馬大師入室罷西堂百丈南泉隨侍玩月已下略録規矩入室者黃龍書尺答筠陽聖壽禪師書題注云來書勉夏中為僧入室癡絶沖禪師雪峯録云上堂舉善侍者在大愚芝入室次大愚躍出一隻履善侍者退身而立云云文字禪泐潭凖禪師行狀云師槌拂之下常三百人而宿戶外者又百餘許求入室就學師難之僧寶傳大溈哲禪師傳云遷住大溈衆二千指無所約束人人自律唯粥罷受門弟子問道謂之入室齋罷必會大衆茶諸方才月一再而哲講之無虗日大慧禮侍者斷七普説云有時入室了却上方丈見老和尚同在火爐頭坐老和尚曰或有箇禪和子得似老僧儞又如何支遣老漢曰何幸如之正如東坡説作劊子得一箇肥漢剮我却倒與老和尚入室被我拶得上壁老和尚呵呵大笑思量遮老和尚粉骨碎身亦未能報得老和尚圓悟也老漢大慧自言又大慧為蘇宜人普説云馬祖百丈已前無入室之説要識真箇入室麼尋常鐘鳴鼓響鵲噪鴉鳴盡是宣揚第一義諦大慧武庫云師云今時一般宗師為人入室三五遍辨白他不出却教他説悟處更問儞見處如何學人云某見處説不得却云儞説不得我如何見得儞去若恁麼地如何為人不見泉大道到慈明明云片雲生谷口遊人何處來泉云夜來何處火燒出古人墳明云未在更道泉便作虎聲明便打一坐具泉推明向禪牀上明却作虎聲泉云我見八十四人善知識惟師繼得臨濟宗風看他恁麼問答數句子那裏便是見他處須是如此始得隱元琦和尚録有入室每人為埀一語勘撿其中有居士二人侍者亦進已下略録入室之後行普説者破菴先禪師録云徑山西堂寮入室罷衆請就座普説雪巖欽禪師録有入室後普説大休念禪師壽福録有相模守殿府中入室升座永平元禪師曰如淨和尚入室已前行普説已下略録日本國行入室者榮西興禪護國論云入室謂遇和尚間暇之日建立之此宗一大事也聖一國師年譜云後宇多天皇建治元年乙亥師七十四歲九月藤丞相實經洎其子家經率諸官從入山請師上堂且復行入室禮約翁儉和尚塔銘序云上躬入山請師為衆入室御龍床於籌室之左顧謂侍臣曰此叢林盛典也朕深敬悅師時住南禪上後醍醐天皇也大休念禪師壽福録相模守府中入室見前又法光寺百日升座云法光寺殿休沐之暇會諸山知識茶話命僧入室下語激揚宗旨要使未信宗乘者知有自己一段大事因緣義堂日工集云府君問古人入室儀式如何余答曰日本則吾先師住天龍時有入室之儀近來不聞行之入室有每三日行之者曹源生禪師録歲夜小參云死心和尚云叢林小參謂之家訓莫是談玄説妙舉古明今五日上堂三朝入室麼錯莫是行須緩步語要低聲嚴淨律儀精持戒行麼錯入室有隔日行之者介石朋禪師柏山録上堂云柏山小小叢林安居九十日五日不升堂隔日不入室日本入室不妨人觀聽中華亦有例東坡外紀云師民瞻詩注云佛印禪師法名了元饒州人公久與之遊時住持潤州金山寺公赴杭過潤為留數月一日值師挂牌與弟子入室公便服入方丈見之師云內翰何來此間無坐處公戲云暫借和尚四大用作禪床師曰山僧有一轉語內翰言下即答當從所請如稍涉擬議所係玉帶願留以鎮山門公許之便解玉帶置几上師云山僧四大本無五蘊非有內翰欲於何處坐公擬議未即答師急呼侍者云收此玉帶永鎮山門公笑而與之師遂取衲裙相報因有二絶公次韻答之其詩今略之又見東坡詩集祖庭事苑云入室參問祖師傳云五祖大師至夜密令侍者於碓坊召盧行者入室遂傳衣法又法華云著如來衣入如來室阿含經云佛告苾芻吾欲兩月宴坐汝等不須參問唯除送食及灑地時可至於此應知佛祖當時有入室參問之儀也舊説曰大慧謂馬祖百丈已前無入室之説止此可知事苑所援可證入室文字耳其實非今之所謂入室也受牌忠曰立僧首座奉堂頭命或普説或入室堂頭先令送某牌立僧謹受之畢或普説或入室虗堂和尚靈隱立僧普説云茲蒙堂頭舉衆俾山野受牌與兄弟舉話此亦叢林任重之責既不敢寧居恐旦夕必為諸公開室相見納牌忠曰立僧奉堂頭命受入室牌為衆開室畢却納其牌於方丈也虗堂和尚立僧納牌普説云茲來至節在邇久在首座寮入室殊覺不便恐妨山門請人次第方丈納牌既緣會許時以道義故遂舉些古人履踐處以當末後殷勤第衰老出語太過望兄弟救之幸甚示衆六祖法寶壇經云師示衆云善知識我此法門以定慧為本此外壇經示衆多忠曰諸録示衆此為最古也垂示忠曰埀示即示衆也語見諸録臨濟玄禪師録云第二代德山埀示云道得也三十棒道不得也三十棒登座敕修清規受請人升座云指座有法語忠曰登座語永興祿和尚為始祿嗣玄少備傳燈録福州蓮華山永興祿和尚章云閩王請師開堂日未升座先於座前立云大王大衆聽已有真正舉揚也此一會總是得聞豈有不聞者若有不聞彼此相謾去也方乃登座垂語又是埀示也雪竇顯禪師録云雲門埀語云十五日已前不問汝十五日已後道將一句來自代云日日是好日敕修清規受請人升座云指座有法語登座埀語問答又開堂云住持埀語問答忠曰上堂埀語稱索話非也見索話處索話校定清規住持受請云次索話問答提綱虗堂愚和尚育王録云師斂衣就座索話人天交接兩得相見莫有不承言不滯句底麼備用清規云古之學者有疑未決出衆請問宗師答話貴在解粘去縛今之索話已失古意先大慧深非之清拙澄禪師録圓覺前堂首座寮銘序云古德未説法已前先埀語令學者有疑請問問以決疑一言之下超越生死之岸後來變其名曰索話此二字已庀謬矣索語索話又曰索語敕修清規秉拂云秉拂人索語問答了提綱竺仙東度語建長寺結制秉拂埀語云凡到者裏必須埀語俗曰索語去古既遠源流益別本其宗猷無有是處雖然者裏亦不妨隨例顛倒正恁麼時還有并却咽喉脣吻出來道得一句底麼釣語索話又曰釣語或曰釣話蓋釣學者問話之義禪林寶訓云萬菴曰古人上堂先提大法綱要審問大衆學者出來請益遂形問答今人杜撰四句落韻詩喚作釣話一人突出衆前高吟古詩一聯喚作罵陳俗惡俗惡可悲可痛前輩念生死事大對衆決疑既以發明未起生滅心也提綱説法曰提綱提起宗旨大綱而説又曰提要萬菴曰古人上堂提大法綱要見釣語處是也敕修清規開堂云住持埀語問答提綱又見敘謝處睦州蹤禪師録云問佛法大意請師提綱師云拈將來與儞提綱廣燈録汾州善昭禪師章云師因北地寒僧衆難立云且住小參候春暖不經旬日忽有一僧兩耳帶環手持金錫來到方丈云和尚何得住却小參衆中自有不憚寒暑為佛法者堂中見有六人是法器言訖而退不知處所師却小參乃成一頌胡僧金錫光請法照汾陽六人成大器今我為提綱又普安道禪師章提綱商量頌云若欲正提綱直須大地荒欲來衝雪刃不免碎鋒鋩又桃園朗禪師章云若是唱道門風權且強名若論祖宗提綱直下難為開口雪巖欽禪師録有乾會節提綱杜工部詩集石犀行云安得壯士提天綱再平水土犀奔茫已下略録論提綱體裁忠曰古德語録上堂提綱有押韻有不押韻有用偈頌其體不一定本無挂唇齒法何有拘章句式舊説曰提綱拈提不用押韻只據自家所見宣發道蘊滔滔地説將去為妙大慧示銛遠二禪人法語云近世前輩老衲皆已化去正宗日益淡薄叢林日益凋弊邪法日益增熾裨販之流各各自謂得上人法以無義語綺飾言詞砌鬬排疊裒糅佛祖教乘纍句荐出謂之祕密心要魔魅凡庸幻惑無識稱有道之士者如麻似粟末世光明種子未具擇法眼遭其邪毒入其心腹者不可勝數致使後生晚學隨例骨董臨濟和尚曰有一般禿兵向教乘中取意度商量成於句義如把屎塊子口中含了却吐與別人嗚呼如來正法眼藏達磨單傳之宗如以一絲引千鈞之石安得此老復出為後進針膏肓而起廢疾乎清拙澄禪師録晚參云只如馬祖百丈黃檗臨濟德山雲門諸大老宿不得已為人開口莫不直截指示根源河傾海涌汗漫無際又何曾撰述言詞逐句下語張王李趙為人注解來末代大法澆醨無此大模範大力量弄出小巧禪道製作奇言妙語攢花簇錦風月煙雲對句押韻如作詩一般當知此是做禪非説禪也説禪早是不中况禪可做乎使佛祖正法眼藏流為戲論法道下衰莫甚乎是若是大丈夫漢爭肯咂啖這般野狐涎唾竺仙仙禪師南禪録為二品太夫人普説判玉泉皓開堂兩言君不見云是又豈可與念語録習答問製造提綱對以四六藻繪文詞以悅時流者同日語哉永覺寱言云少室心印豈落文彩古人聊為接引之計始挂脣吻然皆渾朴簡真刻的示人非誇會逞能外飾觀美而已也後世即大不然雕章琢句攢花簇錦極意變弄各競新奇豈獨淫巧之意乖衲僧之本色而理因辭晦道以言喪欲其一言半句之下觸發靈機不亦難乎元叟端禪師録答慈雲玨長老書云上堂提唱務在單提箇事開悟人天前則馬祖百丈德山臨濟後則大慧應菴縱橫波辨直達心源得大自在無出曹溪盧祖皆可為法自敘忠曰敘説自不才不德常有謙遜之語大鑑清規開堂云埀語問答提綱自敘敘謝敘謝忠曰敘謝或為二所謂自敘及謝語也或為一如此所引及自敘處謂敘臨筵知識兩序侍者單寮蒙堂等之德而謝也又名謝語敕修清規小參云住持登座提綱敘謝委曲詳盡又秉拂云敘謝方丈及兩序勤舊諸寮大衆又云近時敘謝循襲繁贅使人厭聽取誚識者蓋秉拂以法為施苟徇時儀但總標名或略提過足矣結座舊説曰結座有二種一舉古拈提名結座此是提綱之後有敘謝遂以舉古結一會也二提綱語尾直為結座語此是無敘謝拈古故以此結説法也已下略録舉古拈提名結座者敕修清規小參云提綱敘謝委曲詳盡然後舉古結座又受請升座云登座提綱敘謝結座又開堂祝壽云住持埀語問答提綱敘謝結座大鑑清規云提綱自敘敘謝拈提結座已下略録提綱尾有結座語者保寧勇禪師録在蔣山受疏上堂提綱畢乃云爐治鉗鎚枉用工吹毛何必在磨礱靈光昨夜輝牛斗坐致升平宇宙中久立止此是結座語也北澗簡禪師淨慈録朝廷供羅漢禱雨禳火祈江結座有八句偈希叟曇禪師開善録郡王忌提綱畢云結座親隨彌勒下長汀一字王書奉化名輔國功成歸內院子孫恩被錦衣榮斷橋倫禪師國清録入寺次日為太師越國公上堂提綱畢結座有七言四句偈如淨和尚清涼録入寺上堂提綱畢結座云復舉三聖道逢人則便出出則不為人興化道我逢人則不出出則便為人此兩則公案驗盡衲僧難為著眼忽被我大檀越建康府主等間覷破舉似清涼可謂龍吟雲起虎嘯風生未免借尚書鼻孔為叢林出氣有箇口號舉似諸人一舉首登龍虎榜太平親到鳳凰池全生全殺超言象更透機先向上機止此此結座舉古又有頌明極俊禪師建長録入寺上堂提綱畢結座云法流東去覺花開浩劫之英道自西來慧辨瀉銀河之碧鐵網出珊瑚萬樹春金鎚敲出鳳凰五色髓縱説橫説無是不是三世諸佛沒觜六代祖師沒觜天下老和尚沒觜須彌峰頂浪滔天大洋海底塳塵起宗峰超禪師大德録入寺上堂提綱後復云昔日世尊云云此結座也已下略録普説小參之結座無學元禪師録長樂慶讚普説終有結座五言長篇偈中巖月禪師建長録入寺當晚小參提綱後結座云生緣拋離十三霜威加海內歸故鄉溪谷山川總依舊殿堂樓閣轉昌昌久立拈提拈弄古則也大鑑清規云拈提結座見結座處拈古即同拈提碧巖録第三十九則云僧問雲門如何是清淨法身門云花藥欄僧云便恁麼去時如何門云金毛獅子雪竇頌云花藥欄莫顢頇星在稱兮不在盤便恁麼太無端金毛獅子大家看圓悟評云雪竇相席打令動絃別曲一句一句判將去此一頌不異拈古之格東山外集法語云建祖禪人問東山拈古山曰拈古之法無他只要眼正有出古人手段若只到古人田地亦動他底不得先德雖謂之公案欲後人就其節文輕重而斷之使合其宜然亦不只於此汝不見世間造泥孩兒乎或揑聚擊碎或擊碎揑聚為之心肝五臟為之眼耳鼻舌衣服鮮明機關動轉見者隨其好醜愛惡而形之語言造之者方且袖手仰視而不知其為泥孩兒矣若能如是乃可於古人公案中出一隻手若見他心肝五臟不得捏聚擊碎他底不破切不可動著然則東山此語不獨施之於拈古會麼祖佇思東山曰我與麼弄泥團也不會乃喝出去代語忠曰代語有二種一代現前衆謂師家埀語令衆下語不契則自下語代衆此是代語可通別語名雲門録多代語蓋宗門代別雲門為始焉二代古人謂舉古則而他古人無語處我代他下語碧巖録云雲門埀語云人人盡有光明在看時不見暗昏昏作麼生是諸人光明自代云廚庫三門又云好事不如無評云尋常代語只一句為什麼這裏却兩句前頭一句為儞略開一線路教儞見若是箇漢聊聞舉著剔起便行他怕人滯在此又云好事不如無依前與儞掃却大慧為永大師普説云近世為宗師者老婆心切為人代語這箇最教壞人家男女未説別人如死心和尚也有這箇病痛有箇宜大頭是靈源禪子來雲嵓挂搭死心要請充維那宜不肯死心云儞與我做維那待老僧非時為儞入室宜乃受之其時參靈源底兄弟多不肯死心一日宜以職事當稟方丈上去見死心心錯認他來入室叫行者裝香宜郎忙退身借香匣坐具去燒香禮拜了倒問死心守宜非時上來請和尚答話心云恰值死心不在宜云何得當面諱却心云不好儞作老僧我却答儞宜便云恰值死心不在心云謝答話可知是難得人死殺那漢如此尊宿尚自與人代語教學者自道始得常記山僧在夷門一日送亡僧老和尚問亡僧遷化向甚麼處去山僧答一轉語老和尚云儞這語只道得八成儞問我與儞道山僧掩耳云莫惡口老和尚呵呵大笑這老子古錐有時室中見禪和子下得語不是忍俊不禁也為他代語山僧每見他挂牌愛去外頭聽一日又要為人代語望見山僧乃云風漢在外面壁聽遂休山僧在雲居秉拂曾舉有一僧辭覆船去見雪峯峯問近離甚處僧云覆船峯云生死海未渡為甚麼覆却船僧無語却回舉似覆船船云何不道渠無生死其僧歡喜復往雪峯峯問還道得也未僧云道得峯云試道看僧云渠無生死只見雪峯從禪床上走下來把住這僧云此不是汝語僧云不敢實是覆船恁麼道峯云我有二十棒打覆船二十棒老僧自喫不干闍梨事妙喜云是即是不干這僧事二十棒雪峯何須自喫當時杲上座添作四十只打覆船為甚麼如此老老大大不合與人代語老和尚聞而笑曰這漢無狀蓋師資相忘敢爾所謂代語只成教壞他於他何益別語舉古則中雖他古人有語我復別下一轉語謂之別語見於諸録與代語不同揀話五位顯訣中有別揀語是也傳燈録瑞鹿先禪師章云師有時云大凡參學佛法未必學問話是參學未必學揀話是參學未必學代語是參學未必學別語是參學未必學捻破經論中奇特言語是參學未必捻破諸祖師奇特言語是參學若也於如是等參學任儞七通八達於佛法中儻無箇實見處喚作乾慧之徒對機忠曰師家答學者問也見參請門問答處秉拂敕修清規四節秉拂詳録秉拂五頭首見職位門分座敕修清規云前堂首座表率叢林人天眼目分座説法開鑿後昆分座本迦葉緣中本起經云世尊在舍衛國祇樹給孤獨園為衆説法天龍鬼神四輩弟子嚴整具足於時摩訶迦葉埀髮弊衣而來詣佛世尊遙見歎言善來迦葉豫分半床命令就坐迦葉進前頭面作禮退跪自陳曰余是如來末行弟子顧命分座不敢承旨大衆僉念此老道士有何異德乃令世尊分座命之此人俊乂唯佛明焉於是如來察衆所念欲決所疑廣論迦葉大行齊聖書記有分座者大慧年譜云圓悟著臨濟正宗記以付之俾掌記室分座訓徒師乃握竹篦為應機之器茶話永覺晚録有晚間師學問答次師説法名曰茶話夜話佛通寺愚中和尚會裏道話曰夜話見叢軌門陪禪處佛事忠曰禪林凡託事開示佛法謂之佛事文字出淨名經復次反魔事故謂之佛事見放光説凡開光安座拈香入牌起龕秉炬等無不稱佛事維摩經菩薩行品云阿難白佛言未曾有也世尊如此香飯能作佛事佛言如是如是阿難或有佛土以佛光明而作佛事有以諸菩薩而作佛事有以佛所化人而作佛事有以菩提樹而作佛事有以佛衣服臥具而作佛事有以飯食而作佛事有以園林臺觀而作佛事有以三十二相八十隨形好而作佛事有以佛身而作佛事有以虗空而作佛事衆生應以此緣得入律行有以夢幻影響鏡中像水中月熱時炎如是等諭而作佛事有以音聲語言文字而作佛事或有清淨佛土寂寞無言無説無示無識無作無為而作佛事如是阿難諸佛威儀進止諸所施為無非佛事阿難有此四魔八萬四千諸煩惱門而諸衆生為之疲勞諸佛即以此法而作佛事是名入一切諸佛法門注肇曰佛事者以有益為事耳如來進止舉動威儀俯仰乃至動足未曾無益所以諸所作為無非佛事放光般若經不和合品説魔事畢云若有是善男子善女人書持諷誦般若波羅蜜者便具足五波羅蜜及薩云若已當知是為佛事立地忠曰佛事名立地蓋語不多故立地而成也虎關鍊禪師十禪支録序云師虎關曰豫考訂古今禪册備十門一曰開堂二曰上堂三曰小參附升座四曰拈提五曰普説六曰法語七曰對機八曰立地九曰偈贊十曰秉拂拈香舊説曰拈燒義也凡佛祖等前燒香皆是拈香也敕修清規入院云到佛殿拈香有法語止此又開堂為王臣檀越嗣法師拈香是也今以拈香為佛事名備用清規達磨忌云住持舉拈香佛事止此是也又舊説曰升座如諷經拈香佛事猶如願文也又猶如諸經之流通分也海藏紀年録云康永三年師六十七歲六月武州刺史高師直遇亡父六七日忌因金吾衛長史平氏明勸師為其拈香師諉氏明曰拈香蓋有叢規非可常用者古德未及此老僧日在衆也竊哂據師位者忽遺往哲遠業以習近圖繇是往既獲拒武州之須於府命源將軍今烏可失先拒于此邪君善為我辭焉氏明曰祖佛出興隨機赴感何常之有師曰噫蕩然無反吾誰與歸使者三反師終不可識者尚其節義也忠曰拈香蓋有叢規者蓋為佛祖拈香不待言之其為居家者如建寺檀主德業稍大則入院人為之拈香矣以習近圖者日本國俗薦亡靈忌辰請拈香佛事師僧為之屬四六文廣讚亡靈事業其間非無虗褒或以香直供靈則其德難當故説道檀家借手山僧供養十方三世佛祖大小神祇等回此功德莊嚴亡者報土此般古德未曾為之蓋虎關之所惡在于此又如寧兀菴為尤木石拈香直供其靈木石參禪徹悟人應供無愧不可以為例矣小拈香舊説曰凡升座已前有甲長老拈香此為大拈香大拈香畢次乙長老出拈香此拈香名腳踏佛事拈香畢乙長老升座若無大拈香人則長老直出拈香轉身升座則此拈香為小拈香東漸清規臨時行事升座云如本寺開山或本山前住諱日當代住持升座或就本菴安排若法堂鋪設挂真於座上對靈而設座乃至施主守塔比丘出衆真前燒香請佛事受請人出燒香先住持前問訊又至證明人前問訊巡與大衆普同問訊舉法語畢住持前問訊歸位又施主如前請住持佛事受畢離位進爐燒香徑往證明人前巡問訊驀直頭首背面透過次普同問訊據座兩班轉位排立法座左邊頭首住持方為上右邊知事排立侍者後至立住持先小拈香或云若無拈香人則謂之小拈香有拈香人則謂之腳踏佛事畢趺座已下禮與上堂同腳踏佛事見小拈香處慶懺禪苑清規看藏經云如施主於看經了日設齋供慶懺更須讀應菴華禪師録云檀越張子明裝佛慶懺請小參如淨和尚録云新起妙嚴慶懺升座忠曰碧巖録云長慶云大似因齋慶讚止此即作讚恐作懺者訛然諸録多作懺開光明忠曰凡新造佛祖神天像者請宗師家立地數語作筆點勢直點開他金剛正眼此為開眼佛事又名開光明大慧杲禪師録云江給事請開佛光明師執筆云教中道清淨慈門剎塵數共生如來一妙相一一諸相莫不然是故見者無厭足又道如來眼有大人相名自在普見雲以衆妙寶而為莊嚴摩尼寶光清淨瑩徹普見一切皆無障礙既然如是為甚麼却要他人點眼還有道得底麼若也道得非獨為黃面老子出氣亦使遍法界衆生悉沾利益若道不得聽取一頌舉頭忽覩明星現因茲眼病見空華遂以筆點云今日還渠舊光彩碧眸炯炯照塵沙應菴華禪師録希叟曇禪師録已下不遑枚舉教家開眼法黑谷語燈録云問佛之開眼及供養答開眼者本是佛匠雕開眼是事開眼次僧家誦佛眼真言而開眼誦大日真言而成就佛一切功德此謂開眼也供養者持香華燈明及珍寶等奉上佛此謂供養也安座忠曰不拘新像古像凡奉之安殿內時請宗師家立地數語此謂安座佛事或有新像未點眼則點眼安座一時講之語中自具兩意者或有雖一時講之點眼安座各別請一師者如日工集云大川濟禪師大慈録云門前七塔堅菴主造石佛請師奉安云一二三四五六七古佛不曾過去七六五四三二一妙轉如是法輪菴主向崖崩石裂處領話三十二相八十種好一時出醜直得西風陳陳高秋雨番番急塔戶鎮長開無出亦無入且道毗婆尸佛之前釋迦文佛之後還有者箇消息麼彈指一下唵毗盧枳帝挲訶鳴鐘佛事虗堂愚和尚録鳴鐘佛事云烹金鍊玉煆聖鎔凡不假鉗錘便成大器霜清月皎證圓通三昧之門雲淡天低破勞生昏迷之夢壽同空有永鎮化城最初一椎如何話會聲鐘一下云劫石有銷日洪音無盡時行新橋佛事無門開和尚録請行新橋佛事云雲根架就笑談中凡聖如今一路通箇箇腳跟親蹈著人人足下起清風不似天台滑石半巇半嶮勝如趙州略彴度馬度驢雖然欲行千里要知一步為初從茲不用頻題柱來往都乘駟馬車第十二類參請門請益傳燈録禪門規式云除入室請益任學者勤怠或上或下不拘常準敕修清規請益云凡欲請益者先稟侍者通覆住持乃至如允所請定鐘後詣侍司候方丈秉燭裝香侍者引入住持前問訊插香大展九拜乃至肅恭側立諦聽埀誨畢進前插香大展九拜謂之謝因緣免則觸禮次詣侍司致謝論語子路篇云子路問政子曰先之勞之請益曰無倦疏請益者子路嫌其少故更請益之禮記曲禮云侍坐於先生先生問焉終則對請業則起請益則起注尊師重道也起若今摳衣前請也益謂受説不了欲師更明説之引論語忠曰有所已與更復請餘分言請益禪家借儒典字以命入室請法也碧巖録云久參先德有見而未透透而未明謂之請益若是見得透請益却要語句上周旋無有疑滯久參請益與賊過梯其實此事不在言句上又雲門倒一説話評云這僧不妨是箇作家解恁麼問頭邊謂之請益僧寶傳佛印元禪師傳云嘗謂衆曰昔雲門説法如雲雨絶不喜人記録其語見必罵逐曰汝口不用反記吾語異時裨販我去今室中對機録皆香林明教以紙為衣隨所聞即書之後世學者漁獵文字語言正如吹網欲滿非愚即狂時江浙叢林尚以文字為禪謂之請益故元以是諷之祖庭事苑法英序云睦菴卿上人曰曩遊叢林竊見大宗師升堂入室之外復許學者記誦所謂雲門雪竇諸家禪録出衆舉之而為演説其緣謂之請益忠曰此是江浙叢林所謂請益也聯燈會要洞山價禪師章云師問忠國師無情説法後到溈山溈云我這裡也有些子便以拂子點一點師辭溈山直造雲巖請益前話巖云不見彌陀經云水鳥樹林悉皆念佛念法師因有省八方珠玉集云金峯和尚上堂至晚有僧請益云和尚今日埀語有僧出問為什麼不答峯云大似失錢遭罪雪巖欽禪師録普説云移單過淨慈挂搭懷香詣方丈請益謝因緣見請益處忠曰因緣者佛祖差別因緣也師家為學者説之睦菴所謂為演説其緣者詳請益處學者聽畢謝之故言謝因緣雪巖欽禪師録普説云尋常請益末上有一炷香禮三拜謂之謝因緣代衆請法敕修清規聖節上堂云侍者登座左手上香轉身提坐具問訊謂之代衆請法竺仙仙禪師録示燒香侍者法語云海印提藏主為吾侍者數以左手代為大衆燒香請吾説法於是莫不即為或拈拂子或拄杖等并口嘮舌沸無量作用其猶描畫虗空也又送輝藏主偈云如來大藏教演出復演入光明一照中眨眼覷不及手操烏號弓射落日與月拾得兔角杖撥出火中雪由是與我左手燒香轉身問訊八萬高人似鵠立三千剎界如雷震相別如九州寫作贈行句他日再相逢清風動寰宇蓋輝侍于燒香問話傳燈録瑞鹿先禪師章云師云大凡參學佛法未必學問話是參學詳揀話處廣燈録寶覺諟禪師章云師云今時師僧問話印本打就箇箇一般未有一箇本分問話者看他茱茰和尚上堂道汝諸人莫向虗空裏釘橛有僧便出來道虗空是橛茱茰便棒且道者僧出來恁麼道具眼不具眼茱茰當時便棒且道打他什麼處大家驗看緇門警訓佛眼遠禪師誡問話云近代問話多招譏謗蓋緣不知伸問致疑咨請之意後生相承多用祝贊順時語並非宗乘中建立如古人問若為得出三界去又問聲色如何透得又問此間宗乘和尚如何言論並是出衆當場決擇近時兄弟進十轉五轉沒巴鼻語或奉在座官員或莊嚴修設檀信俱不是衲僧家氣味又抽身出衆便道數句或時云某甲則不恁麼道又云和尚何不道云云夫問話者激揚玄極也不在多進語三兩轉而已貴得生人信不至流蕩取笑俗子也又見職位門禪客處問答忠曰學問師答謂之問答若唯屬師家邊則謂之對機也緇門警訓佛眼遠禪師示禪人心要云近世多以問答為禪家家風不明古人事一向逐末不反可怪可怪昔人因迷而問故問處求證入得一言半句將為事究明令徹去不似如今人胡亂問趁口答取笑達者續燈録崇福祖印禪師章云師云問在答處答在問宗一任諸人點頭忽若問不在答處答不在問宗又且作麼生摸𢱢乃展手云無遺絲髮一時分付請諸人各各子細觀瞻甚生門風甚生標格儻一念回光千聖共徹不歷僧祇豈勞修證截生死河踞祖佛位便乃高超三界永出四流萬德圓明十方獨步可不同酬佛恩共顯王化問禪見職位門禪客處出陳入陳大鑑小清規秉拂云問話禪客始謂出陳終謂入陳此皆訛謬古人胸中疑情未泯出來對衆決擇安有出陳入陳之意可削除之古來雖有法戰之語不專在禪客分上楊岐會和尚録云一日七人新到師問陳勢既圓作家戰將何不出陳與楊岐相見云云又曰一日八人新到師問一字陳圓作家戰將何不出陳與楊岐相見僧云和尚照顧話頭師云楊岐今日抱馬拖旗去也僧云新戒打退鼓師云道僧擬議師云道僧撫掌一下師云謝上座答話僧無語師云將頭不猛纍及三軍且坐喫茶出衆入衆忠曰出陳入陳大鑑已呵之則須言出衆入衆也下語敕修清規告香云參頭進椅側問訊稟云某等為生死事大無常迅速伏望和尚慈悲開示因緣住持舉話三則隨下語忠曰蓋住持自下語示學徒也敕修清規下遺書云專使進前問訊云請和尚趺坐若住持埀語須下語插香展禮傳燈録洞山價禪師章師埀語曰直道本來無一物猶未消得他衣鉢這裡合下得一轉語且道下得什麼語有一上座下語九十六轉不愜師意末後一轉始可師意師曰闍黎何不早恁麼道有一僧聞請舉如是三年執侍巾瓶終不為舉上座因有疾其僧曰某甲三年請舉前話不蒙慈悲善取不得惡取遂持刀向之曰若不為某甲舉即便殺上座也上座悚然曰闍黎且待我為汝舉乃曰直饒將來亦無處著其僧禮謝續傳燈録大慧杲禪師章云勤圓悟舉僧問雲門如何是諸佛出身處答云東山水上行令師下語師參及一年凡下四十九轉語皆不契一日勤赴一達官宅升座舉東山水上行若是天寧即不然若有人問如何是諸佛出身處只向道薰風自南來殿閣生微涼師聞舉豁然省悟癡絶沖禪師録尤木石序云癡絶師得處超軼用處灑落故平生室中不許人下語專以此著羅龍打鳳而學者鮮能湊泊廝禪忠曰問答挨拶謂之廝禪廝相也餘冬序録云唐人詩中字音有以十讀如諶相讀如廝如恰似春風相欺得如何不相離等句皆思必切老學菴筆記云世多言白樂天用相字多從俗語作思必切如為問長安月如何不相離是也然北人大抵以相字作入聲至今猶然不獨樂天老杜云恰似春風相欺得夜來吹折數枝花亦從入聲讀乃不失律俗謂南人入京師效北語過相藍輒讀其榜曰大廝國寺傳以為笑大慧答張提刑書云將心意識記取遮杜撰説底却去勘人一句來一句去謂之廝禪末後我多一句儞無語時便是我得便宜了也大慧為永大師普説云真淨和尚愛與學者廝禪或問監寺近日如何或問首座近日作麼生或問溈山水牯牛儞如何會學者便答一句看來又似好又似不好何故字經三寫烏焉成馬引得後來叢林有一般兄弟專以廝禪為事不管道理是不是末後多一句便是贏得禪行腳釋氏要覽云遊行人間今稱行腳未見其典毗奈耶律云如世尊言五法成就五夏已滿得離依止遊行人間五法者一識犯二識非犯三識輕四識重五於別解脫經善知通塞能持能誦別解脫經即戒本也祖庭事苑云行腳者謂遠離鄉曲腳行天下脫情捐纍尋訪師友求法證悟也所以學無常師遍歷為尚善財南求常啼東請蓋先聖之求法也永嘉所謂遊江海涉山川尋師訪道為參禪豈不然邪中阿含帝釋偈云我正恭敬彼能出非家者自在遊諸方不計其行止往則無所求啀無為為樂又高僧慧乘事祖強為師年十六啓強曰離家千里猶名在家沙門請遠遊都鄙以廣見聞強乃從之夫是行腳之利豈不博哉村寺清規云從上出家參學之士未有不發足超方千里求師者故永嘉云遊江海涉山川尋師訪道為參禪大慧師喜離得業偈曰古佛放光留不住鐵牛無腳也須行雖然未踏曹溪路且喜今朝離火坑古人既如是今可不然耶趙州諗禪師録云師初隨本師行腳到南泉乃至其後自携瓶錫遍歷諸方常自謂曰七歲童兒勝我者我即問伊百歲老翁不及我者我即教他年至八十方住趙州城東觀音院忠曰從諗自盛年行腳到八十歲初住院此謂趙州八十行腳世誤言八十歲而行腳者非也廣燈録興化獎禪師章云常云我南方行腳一匝拄杖不曾撥著一箇會佛法底人林間録云雲峯悅禪師見僧荷籠至則曰未也更三十年定乘馬行腳法雲秀禪師聞包腰至者色動顏面彼存心於叢林豈淺淺哉叢林盛事云密菴傑禪師初出嶺至婺州智者有老宿問曰上座此行何處去曰四明育王見佛智和尚去老宿云世衰道喪後生家行腳例帶耳不帶眼傑曰何謂也老宿云今育王一千來衆長老日逐接陪不暇豈有工夫著實與汝輩發機傑下淚曰若如此某今往何處宿云此去衢州明果有華匾頭雖後生見識超卓汝宜見之傑依教往明果依華慈受深禪師録示小師行腳語云前輩打包意在省緣無冗細無玩好如德山挾復子到大溈是也今人打包即不恁麼鉢盂以梅花衲作袋祠部用古蜀錦為囊淨瓶交枕總要光鮮拄杖戒刀莫非濟楚笠頂上間文潑字須及數斤線貼裏襪樣針筒將看一擔只要別人道好忘却自己辛勤若是脫灑衲僧必不如是草草地挈箇包子卓卓地做箇道人直似野鶴孤雲切忌無繩自縛汝等更聽一偈古人只蓄兩枚針夏葛冬裘逐旋尋汝輩盛年腳力健好携復子歷叢林汾陽昭禪師録行腳歌云發志辭親意欲何能投佛出家異俗專心慕法為僧既得尸羅具備又能法服霑身父母不供甘旨王侯不侍不臣潔白修持如氷似玉不名不利去垢去塵受人天之瞻敬承釋梵之恭勤忖德業量來處將何報答為門戶專精何行即能消唯有參尋別無路苦身心歷山水白眉作伴為參禮冒雪衝霜不避寒渡水穿雲伏龍鬼鐵錫飛銅瓶滿不問世間長與短叢林道侶要商量四句百非一齊翦探玄機明道眼入室投針須鍛鍊驅邪顯正自應知勿使身心有散亂道難行塵易漫頭頭物物須明見區區役役走東西今古看來忙無限我今行勤自辨莫教失却來時伴舉足動步要分明切忌被他虗使喚入叢林行大道不著世間虗浩浩堅求至理不辭勞剪去繁華休作造百衲衣雲水襖萬事無心離煩惱千般巧妙不施功直出輪回生死道勸同袍求正見莫似愚夫頻改變投巖立雪猛身心方得法王常照現請益勤恭敬速不避寒暄常不足只緣心地未安然不羡榮華不怕辱直教見性不從他自家解唱還鄉曲度平生實安樂蕩蕩縱橫無依托四方八面應機緣萬象森羅任寬廓報四恩拔三有問答隨機易開口五湖四海乍相逢一擊雷音師子孔悠悠自在樂騰騰大地乾坤無過咎分明報爾水雲僧記取面南看北斗領衆行腳碧巖録第七則評云韶國師久依疏山自謂得旨乃集疏山平生文字頂相領衆行腳至法眼會下他亦不去入室只令參徒隨衆入室遍參五燈會元應化聖賢云善財參五十三員善知識末後到彌勒閣前見樓閣門閉瞻仰讚歎見彌勒從別處來善財作禮曰願樓閣門開令我得入尋時彌勒至善財前彈指一聲樓閣門開善財入已閣門即閉大隋真和尚録云祇如老僧行腳時不揀叢林有供養無供養處祇要看他眼目稍似根性有些些器量方欲過一夏或一冬若是根性鄙劣者三朝兩日便行算來參六十餘員大知識有大眼目者那無一二餘者豈有真實知見祇是圖儞諸人供養欲望福報儞又有什麼福報與伊傳燈録玄沙備禪師章云雪峯召曰備頭陀何不遍參去師曰達磨不來東土二祖不往西天僧寶傳汾州昭禪師傳云剃髮受具杖策遊方所至少留不喜觀覽或譏其不韻昭嘆之曰是何言之陋哉從上先德行腳正以聖心未通驅馳決擇耳不緣山水也昭歷諸方見老宿者七十有一人皆妙得其家風尤喜論曹洞傳燈録龍會道尋遍參三昧歌云天涯海角參知識遍咨惠我全提力師乃呵余退步追省躬廓爾從茲息覩諸方埀帶直善財得處難藏匿棒頭喝下露幽奇縱去奪來看殊特趙州關雪嶺陟築廅峯前驗虗實據證靈由闢萬機橫揮祖刃開三域卷舒重重孰可委休呈識意謾猜揣衲子攢眉碧眼咦黃河倒逆崑崙觜溈山牛道吾唱馬師奮迅呈圓相執水投針作後規把鏡持幡看先匠廣陵歌誰繼唱擬續宮商調難況石人慍色下鞭撾木馬奔嘶梵天上麗水金藍田玉祝融峯攢湘浪蹙滿月澄溪松韻清雲從龍騰好觀矚辦道修行曰辦道敕修清規侍者進退云舊侍者咨稟云某等久侍和尚今欲告退隨衆辦道伏望慈悲雪巖欽禪師録普説云修兄問我在這裡作甚麼對他道辨道他云儞喚甚麼作道遂不能對永平清規有辨道法章又典座教訓章云嘉定十六年癸未五月在慶元舶裏有一老僧來問和客討買倭椹山僧請他喫茶僧云吾是西蜀人離鄉四十年今年六十一歲充阿育王山典座明日五日一供渾無好喫要做麵汁未有椹在仍特特來討椹欲供養十方雲衲山僧話次問座尊年何不坐禪辦道看古人話頭煩充典座只管作務有甚好事座大笑云外國好人未了得辨道未知得文字在山僧驚且慚便問如何是文字如何是辨道座云若不蹉過問處豈非其人麼山僧不會座云他時後日來育王與汝商量便起去七月山僧挂錫天童典座忽來相見山僧喜踊説出前日未了因緣座云學文字者要知文字所由務辨道者要會辨道所由山僧問他如何是文字座云一二三四五又問如何是辦道座云遍界不曾藏罷參了畢大事罷休參禪也傳燈録京兆草堂和尚章云自罷參大寂馬祖遊至海昌又鏡清怤禪師章云師罷參受請止越州鏡清禪苑唱雪峯之旨虗堂愚和尚録普説云則監院謂法眼曰某甲曾見青峯和尚得箇安樂法門所以罷參嗣法祖庭事苑云嗣音寺從口以言傳從册以書記記而主之必有傳嗣者矣宗門之嗣法猶諸侯之嗣國也雲外岫禪師嗣法論云參禪學道貴在乎續佛祖慧命非榮身之事也余嘗曰嗣其法者有三上士嗣怨中士嗣恩下士嗣勢嗣怨者在道嗣恩者在人嗣勢者在己在道者如大火真金在人者如歲寒松柏在己者如春風楊柳立志有殊真偽不等古今叢林皆有之余作此論自愧學陋才謭不敢褒貶是非明人之功過後必有班陽史筆作春秋者詳而補之延祐己未夏為璵書記班陽史筆本録陽作楊第十三類執務門輪番羅湖野録云雁山能仁元禪師居連江縣福嚴菴揭偈於伽藍祠曰小菴小舍小叢林土地何須八九人若解輪番來打供免教碎作一堆塵護法録朴隱禪師塔銘序云皇明龍興詔天下名桑門建會鐘阜升濟幽靈輪番説戒宋史兵志云槍手自十一月至二月月輪一番閲習凡三日一試擇其技優者先遣之輟耕録云汴梁宮人絶句曰殿前輪直罷偷去賭金叉怕見黃昏月殷勤上玉階直堂直僧堂也敕修清規坐禪云堂中有直堂牌刻云輪次直堂周而復始又見守寮處守寮忠曰看守衆寮也又曰看寮敕修清規普請云除守寮直堂老病外並宜齊赴直浴敕修清規知浴云參頭差行者直浴僉疏忠曰僉作簽為正簽書姓名也見僉押處敕修清規聖節云維那用黃紙書疏帶行僕捧盤袱爐燭香合上方丈請住持僉疏僉疏法疏首尾及可漏上三處住持比丘下空闕不書及僉疏住持於空處書兩字名維那命行者疏中及可漏使三寶印使印法見器物門三寶印處僉狀忠曰僉作簽為正見僉押處敕修清規議舉住持云兩序勤舊列名僉狀保申所司請之僉押敕修清規聖節云每日堂司行者將輪差僧簿須預先一日請住持頭首衆僧各書雙字名僉押量衆多少依戒具寫差單排定日分周而復始忠曰簽押本官吏語禪林循用僉書雙字名也押書華押也敕修清規入院云新命視篆訖就狀上先僉押次題日子使印於上三國演義云龐統拜求榜文以安宗族曹操命寫榜僉押付統建仁常菴曰禪苑清規作簽押今僉當改簽簽者書住持比丘頭首比丘等也押者打華押也古解言僉皆也僉押衆皆集書押也此解非忠曰如言新命就狀上僉押則獨押亦言僉押非皆集押義明矣又僉當作簽簽作籤為正禪苑清規庫頭云十日一次計曆先同知事簽押一月一次通計住持人已下同簽夢溪筆談云唐中書指揮事謂之堂帖子曾見唐人堂帖宰相簽押格如今之堂札子也十八史略宋英宗紀云韓琦一日出空頭敕敕出未書姓名歐陽修已僉趙槩未僉修曰第書之修勸槩次第僉署韓公必有説續通鑑綱目書之作歐陽修已簽僉簽通用正字通云簽同籤俗省從籤為正又云籤倉先切音千説文驗也通雅曰籤求猶今之僉敘也通鑑馬仙琕籤求應赴李延壽南史故事府州部論事皆籤前直敘所論之事後云謹籤具日下當時王府有典籤官今吏書承行亦以紅籤裁貼其旁以便批決故外官坐穿堂謂之籤押今作簽楊升菴外集云籤押梁書馬仙琕音駢籤求應赴李延壽南史故事府州部論事皆籤前直敘所論之事後云謹籤具日下又云某官籤此即近日僉押之僉古今字變爾品字箋云僉押僉僉日押押字也建仁常菴曰簽與檢同檢書署也説文署者位之表識也國語注簽者書住持比丘頭首比丘知事比丘等若官人書某官位職等也忠曰考韻書未見簽檢通然按十八史略注簽書姓名也韻會檢居奄切説文書署也止此則簽檢雖字別音異皆書名位也唐國史補云宰相判四方之事有堂案處分百司有堂帖不次押名曰花押宋張淏雲谷雜記云豫按東觀餘論云唐文皇令羣臣上奏任用真草惟名不得草遂以草名為花押韋陟五朵雲是也魏晉以來法書至梁御府藏之皆是朱異姚懷珍等題名於首尾紙縫間故謂之押縫或謂之押尾祇是書名耳後人花押乃以草記其自書故謂押字蓋沿襲此耳唐人及國初前輩與人書牘或只用押字與名用之無異上表章亦或爾近世遂施押字於移檄或不書己名字而別作形模非也又孫公談圃云先朝人書狀簡尺多用押字非自尊也從簡省以代名耳今人不復識見押字便怒豫頃在武陵於畢文簡公諸孫處見文簡與寇萊公一帖尾用押字押字之下劫有拜咨二字此正以押字代名也景德間士大夫質厚故此風尚存至元豐間相去方七十餘年已為罕見今固不復有矣羣談採餘云古人花押所以防偽政以名而花之凡官府文移人間私簡俱前書名姓而後押字國朝押字之製上下多用一畫蓋取地平天成之意凡釋褐入官者至吏部畫字三日以驗異時文移之真偽也經國大典注解云押署也以草書名為押古者書名破真從草取其便于書記難于模倣復有不取其名出于機巧者唐韋陟始以押字為記僉名忠曰僉作簽為正及僉名義見僉押處敕修清規告香云請客侍者預依戒次具茶狀備卓袱筆硯告香罷列法堂下間請茶各僉名僉單僉義見僉押處單帳也見文疏門敕修清規唱衣云唱衣畢結定鈔數主喪僉單鳴鐘敕修清規鐘云大鐘引杵宜緩揚聲欲長凡三通各三十六下總一百八下起止三下稍緊鳴鐘行者想念偈云願此鐘聲超法界鐵圍幽暗悉皆聞聞塵清淨證圓通一切衆生成正覺禪苑清規警衆云打大鐘之法先輕手擬鐘三下慢十八聲緊十八聲三緊三慢共一百八聲當職行者燒香禮拜誦偈訖然後擊之偈云三塗八難息苦停酸法界衆生同聞乎聲悟道念竟即時輟之羣談採餘云鐘聲晨昏叩一百八聲者一歲之義也蓋年有十二月有二十四氣又有七十二候正得此數浙杭州歌曰前發三十六後發三十六中發三十六聲急通共一百八越州歌曰緊十八緩十八六遍湊成一百八台州歌曰前擊七後擊七中間十八徐徐發更兼臨後擊三聲三通湊成一百八忠曰傳説鐘一百八聲表破百八煩惱未見經論説蓋出乎世典取一歲數之義為正如律文鳴犍稚曰作相鳴之十下三通合一百二十下也未聞百八聲之説忠曰行事鈔集僧通局篇明打犍稚法簡古難見今竊合資持記所解取意綴文直下録去貴易通解文云尋常所行始終四十下初十下漸發聲此為虗揩中間二十七下漸希漸大後三下聲盡方打一通如是至三名為三通集三乘也長打百二十下接前四十增兩四十共百二十其第二四十下虗揩漸大十八下中間四下聲盡方打此救四惡趣自二十三已去後十八下漸穊漸小乃至微末次第三四十下同前亦有少異三十六七八三下名三通末後二下名息槌圖經云念三寶存五衆衆各八輩故以四十為差三道乘之則百二十為節八輩謂四果四向三道謂三乘南山增輝記作相偈云虗揩十下漸希漸大二十七下大長三下裝香敕修清規坐禪云令供頭僧堂內裝香點燈掃地正法念處經云若掃如來塔命終生意躁天身香氣熏百由旬無垢優婆夷問經云佛告無垢優婆夷言掃佛塔地得五福報何等為五一者自心清淨他人見已生清淨心二者為他所愛三者天心歡喜四者集端正業五者命終生於善道天中毗奈耶雜事云世尊在逝多林見地不淨欲令彼樂福衆生於勝田中植淨業故即自執篲欲掃林中時舍利子大目乾連大迦葉波阿難陀等諸大聲聞見是事已悉皆執篲共掃園林時佛世尊及聖弟子遍掃除已入食堂中就座而坐佛告諸苾芻凡掃地者有五勝利云何為五一者自心清淨二者令他心淨三者諸天歡喜四者植端正業五者命終之後當生天上增一阿含經云佛言掃地之人有五事不得功德云何為五於是掃地之人不知逆風不知順風復不作聚復不除糞然掃地之處復非淨潔是謂比丘掃地之人雖有五事不成大功德復次比丘掃地之人成五功德云何為五於是掃地之人知逆風順風之理亦知作聚亦能除之不留遺餘極令淨好是謂比丘有此五事成大功德四分律云有五種掃地不得大福德不知逆風順風掃地不滅迹不除糞不復掃本處有五法得大福德知逆風順風掃地滅迹除糞復掃本處若上座在下風應語言小避我欲掃地緇門警訓杭州淨慈寺守一法真禪師掃地回向文云以此掃地功德回向法界衆生色塵清淨塵清淨故眼根清淨根清淨故眼識清淨聲香味觸法亦復如是又願一世界清淨乃至盡法界虗空界皆悉清淨同諸如來光嚴住持圓覺伽藍清淨覺地永斷習氣淨穢二邊凡聖垢染一塵不立如是願清淨智亦復清淨趙州諗禪師録云劉相公入院見師掃地問大善知識為什麼却掃塵師云從外來碧巖録云大隋真如和尚承嗣大安禪師一日溈山問云子在此數年亦不解致箇問來看如何隋云令某甲問箇什麼即得溈山云子便不會問如何是佛隋以手掩溈山口山云汝已後覓箇掃地人也無又見職位門淨頭處禮記郊特牲云掃地而祭於其質也釘挂忠曰釘挂者總言鋪設也或釘柱或挂帷幕等敕修清規迎待尊宿云寢堂釘挂帳幕排照牌又請新住持發專使云三門下釘挂帳設向裏設位講茶湯禮又方丈特為新舊兩序湯云釘挂寢堂鋪設坐位乃至燒香侍者預排照牌又方丈小座湯云寢堂釘挂排位秉燭裝香舊説曰釘挂者朱漆板書名位以釘挂之也非照牌蓋如鉢位圖者忠曰舊説謬矣若如所言則迎待尊宿豈可挂漆板既言釘挂帳幕何求異解又若挂名位為釘挂則何以下復重言排照牌耶故舊説必謬矣墨莊漫録云兩京牡丹聞於天下花盛時太守作萬花會宴集之所以花為屏帳至于梁棟柱拱悉以竹筒貯水簪花釘挂舉目皆花也喝火忠曰巡寮警火言喝火所謂照顧火燭也見唄器門火鈴處備用清規日用清規云喝火過放禪開福寧和尚録偈頌云夜深聞喝火號聲故經云即時觀其音聲而得解脫偈曰火號更深喝道來普門關捩一時開圓通大士呵呵笑不是峨嵋與五臺行益忠曰行者行食也益者益食也行猶付與也見行香處僧祇律九十二波夜提中云若比丘尼請一比丘食一比丘尼共比丘坐一比丘尼來往益食益食比丘尼去時比丘隨一一時得波夜提法顯佛國記云法顯到于闐僧伽藍名瞿摩帝是大乘寺三十僧共犍槌食入食堂時威儀齊肅次第而坐一切寂然器鉢無聲淨人益食不得相喚但以手指麾梁高僧傳佛馱跋陀羅此云覺賢傳云陳郡袁豹屆于江陵賢詣豹乞食豹素不敬信待之甚薄未飽辭退豹曰似未足且復少留賢曰檀越施心有限故令所設已罄豹即呼左右益飯飯果盡豹大慙愧太平廣記云張簡棲見狐憑几尋讀册子其旁有群鼠益湯茶送果栗皆人拱手右證益字為增益食物之義禪苑清規赴粥飯云行食之法當淨人自行僧家不得自手取食淨人行益禮合低細羹粥之類不得污僧手及鉢盂緣點杓三兩下良久行之曲身斂間手當胸粥飯多少各隨僧意又監院云非疾病官客並當赴堂所貴二時行益行者齊整敕修清規知客云僧堂前檢點行益客僧粥飯又都監寺云齋粥二時必赴堂則行僕行益自然整肅又典座云訓衆行者循守規矩行益普請不得怠慢傳燈録瑞鹿先禪師章云師有時云晨朝起來洗手面盥漱了喫茶喫茶了佛前禮拜佛前禮拜了和尚主事處問訊和尚主事處問訊了僧堂裏行益僧堂裡行益了上堂喫粥上堂喫粥了歸下處打睡忠曰言僧堂粥飯行益畢自家方粥飯也傳燈録夾山會禪師章云小師省覲師曰汝蒸飯吾著火汝行益吾展鉢什麼處是孤負汝處小師從此悟入續燈録大覺璉禪師拈雲門沙喜世界百雜碎話云山僧遮裏秖是維那白槌首座施食山僧展鉢行者行益與麼説話一任諸方裁斷大慧為秦國大夫人普説云儞諸人每日上來下去寮舍裏喫茶喫湯莊上般鹽般麵僧堂裡行益長廊下擇菜後園裏擔糞磨坊下推磨當恁麼時佛眼也覷儞不見虗堂愚和尚録普説云儞看雪峰一出嶺來先買一把杓頭綰一條手巾到處行益結緣諸祖偈頌阮中大仰山飯歌云維那白槌似雷吼十聲佛號慵開口行益才遲忿怒生第二念中都忘了供遞忠曰傳送供物也字彙云遞更迭也又傳遞也敕修清規達磨忌云住持上香三拜進爐前上湯上食請客侍者供遞又告香云住持就座副參遞大香一片與參頭同衆問訊插香化米化炭雲峯悅禪師在翠巖化炭見職位門堂司處如淨和尚録化炭偈云一刀兩段沒商量透出無明大火坑再入死灰烹得活歲寒聲價轉崢嶸化鹽雜毒海少室和尚化鹽偈云逆浪堆中淘汰出大爐鞴裡袞將來遍身潔白誰能比點著須教百味回忠曰凡化齋化浴化燈化柴化薑化茶化席化鐘等有所闕乏無不抄化不勝枚舉載在集録稟忠曰白事曰稟敕修清規聖節云維那詣書記寮通報書記出接維那觸禮一拜稟云啓建聖節煩製疏語小補韻會云稟筆錦切受命曰稟左傳稟命則不威俗作稟非毛氏曰今俗以白事為稟古無此義覆忠曰白事曰覆敕修清規聖節云行者就覆住持來早殿上啓建諷經小補韻會云覆通作復又云復房六切又白也禮記願有復也孟子有復於王者通覆忠曰白事通達其意也敕修清規湯藥侍者云或暫缺侍者客至通覆又遊方參請云到侍司通覆詣方丈禮拜守請舊説曰守請猶言內報也敕修清規兩序進退云粥罷行者守請新人至寢堂和會忠曰凡有可議則與預事人和同會論揀善行之敕修清規祈禱云維那和會堂司行者報衆挂祈禱牌又開堂祝壽云預先和會維那宣公文首座宣山門疏又都監寺云凡事必會議稟住持方行經國大典注解云和會和兩順也會相應也提調敕修清規寮主副寮云提調香燈茶湯又方丈特為新舊兩序湯云仍提調送舊人粥飯三日又尊宿出喪云庫司喪司相關提調喪儀又月分須知云六月入伏堂司提調晒薦忠曰日本禪林撰入院同門疏同門衆中一人幹蠱率衆告諭成之及疏後列衆名其人在最末此謂提調人提調者提起其事調辨之也冥樞會要卷尾云提調鋟梓萬壽耆舊比丘慧朗宋史卷頭列修史人名云提調官光祿大夫中書平章政事臣納麟等經國大典注解云提調提舉也調和也言舉一司之事而調和之也提點忠曰提振點起其事令無壅滯也敕修清規下遺書云侍者一一提點備用清規衣鉢之職云方丈一應禮節究心提點又職名有提點見職位門點對敕修清規寮舍交割什物云數日前副寺帶行者賚簿到各寮預先點對分曉忠曰總簿所記與寮舍所有物對校點撿有無也總簿詳交割處照拂敕修清規聖節云維那燒香點湯照拂律苑事規住持云叢林之設老病為先照拂矜憐猶須介念雲章曰照者鑒視也照拂點撿也忠曰照拂者照顧輔弼也拂音弼經國大典注解云照謂具見始末也前漢書蓋寬饒傳云欲以太古久遠之事匡拂天子注師古曰拂讀曰弼正字通云拂與弼通荀子諫諍輔拂鋪設敕修清規百丈忌云至日隔宿如法鋪設法堂品字箋云鋪俗以排列謂之鋪設忠曰或單言鋪亦是鋪設義敕修清規上堂云俟鋪法座畢堂司行者覆首座交忠曰相共交參取與物也敕修清規謝挂搭云堂司行者收香錢足交侍者納方丈又云侍者付大香一片與參頭交副參收交點忠曰相共交參點檢也敕修清規寮主副寮云交點本寮什物又聖僧侍者云朝夕交點被位中夜剔燈忠曰寮主共副寮點撿聖僧侍者共被位主點撿故云交點也交割敕修清規入院云交割砧基什物又退院云方丈什物點對交割具單目一樣兩本住持兩序勤舊僉押用寺記印又寮舍交割什物云庫司當置總簿具寫諸寮什物住持知事僉定仍分置小簿付諸寮兩相對同新舊相沿交割忠曰新舊人相共交參故言交分割公私之物故言割凡常住寮舍遷居人必有自己用度而雜公界物及交代與新遷人共對交分割公器私物也舊説曰如常住交割方丈及庫司各有簿如寮舍交割庫司及寮舍各有簿若簿唯一本則有改寫剽竊之疑一簿二本置兩處交代時對同照勘得無疑焉又曰交割字未見據交者交考兩簿也割一一陳列物也忠曰對勘二簿也義可爾以此解交字非也割字亦解不得交割字余下引證或不得交義而妄改校尤非大慧武庫云五祖演和尚依舒州白雲海會端和尚端令山前作磨頭每被人於端處鬬諜是非云云端咄云急退却演云俟某算計了請人交割云云戰國策曰蘇子説齊閔王曰明於諸侯之故察於地形之理者不約親不相質質子而固不趨而疾衆事而不反衆事猶其事交割而不相憎交言彼此割地俱強而加以親唐鄭還古博異志敬元穎傳云仲躬移居牙人云價直契書一無遺闕並交割訖元史河渠志云分監新官至則一一交割然後代還棠陰比事云唐李德裕鎮浙西有甘露寺主僧訴交割常住物被前知事僧隱沒金若干兩引前數輩為證遞相交付文籍在焉新受代者已伏盜取之罪未窮破用之所德裕疑其非實云云三國演義云魯肅曰前者皇叔有言公子劉琦若在荊州暫時居住今公子去世必然見還肅正為此事而來幾時可以交割又云孔明欲雲長任荊州設一宴交割印綬雲長雙手來接宋志傳云晉主命趙瑩桑維翰等寫定文字撥取十六州請契丹主差人前去交割桂苑叢談云太尉朱崕出鎮浙右有甘露知主事者訴交代得常住什物被前主事隱用却常住金若干兩引證前數輩皆有遞相交割文字分明衆詞皆指以新得替者隱用之且初上之時交領既分明及交割之日不見其金鞠成具獄伏罪昭昭然未窮破用之所由或以僧人不拘細行而費之以是無理可伸甘之死地一旦引慮之際公疑其未盡徵以意揣之髠人乃具實以聞曰居寺者樂於知事前後主之者積年已來空交分兩文書其實無金群衆以某孤立不雜輩流欲乘此擠排之因流涕不勝其冤公乃憫而惻之曰此固非難也俯仰之間曰吾得之矣乃立從召兜子數乘命關連僧入對事咸遣簾子畢令門不相對命取黃泥各令模前後交付下次金樣以憑證據僧既不知形段竟模不成公怒令刻前輩皆一一伏罪其所排者遂獲清雪楊誠齋江湖集臘裏立春蜂蝶輩出詩云嫩日催青出凍荄小風吹白落疏梅殘冬未放春交割早有黃蜂紫蝶來又朝天集和張功父園梅未花之韻詩云前夕三更月落時東風已動萬花知江梅端合先交割春色如何未探支只欠梁溪氷柱句追還和靖暗香詩張家剩有蔥根指不把瓊酥滴一枝又答劉修武詩云解道征鴻數字秋清於雪碗映氷甌老來筆底心無毒交割風光與子休收管忠曰收納管領也敕修清規副寺云掌常住金穀錢帛米麥出入隨時上曆收管支用令庫子每日具收支若干僉定飛單呈方丈謂之日單交收敕修清規聖僧侍者云同維那交收亡僧唱衣錢把帳敕修清規請喪司職事云聖僧侍者把帳又估唱單式云把帳執事人兩序典喪各書名僉押又知客云遇亡僧同侍者把帳又亡僧板帳式云把帳侍者某押知客某押幻住清規亡僧板帳式云把帳押舊説曰把帳者造帳曆也三國演義云曹操喚典韋就中軍帳房外安歇提調把帳親軍二百餘人非奉呼喚不許輒入忠曰依此非帳簿之帳而帳帷也把者把守把斷義蓋把守帳帷不濫通外人也猶言守把關隘也雲蓋本禪師録上堂云釋迦老子橫眠豎臥樓至如來把却三門孤樹裒談云今南京孝陵城西門之內有吳孫權墓在焉當時築城者奏欲去之太祖曰孫權亦一漢子也宜留以把門遂不得毀支用支分也分用錢物等也見收管處結算敕修清規副寺云或十日一次結算謂之旬單鬮拈敕修清規諸莊監收云倘得廉正勤舊輔佐住持公選區用或對衆鬮拈充之松源嶽禪師録云紹熙元年九月十五日雲居薦福專使同至對衆拈鬮得雲居乃受帖忠曰凡事理無優劣兩可難決則可用鬮拈實息爭解疑謗法也篇海類編云鬮舉有切音九手取拈鬮也品字箋云説文鬮取也憑公撥定仍復各書片紙撚紙如丸隨人自取謂之拈鬮已下録唱衣鬮拈法敕修清規唱衣云今多作鬮拈甚息喧爭其法用小片紙以千字文次第書字號每一號作三段寫於上仍用印記關防量衆多少與喪司合干人封定至期呈過主喪兩序首座開封知客分俵堂司行者捧盤隨侍者侍者剪取其半置盤內畢以盤置首座側安水盆於下抖勻維那拈衣唱價訖首座臨時呼一童行信手拈盤中半鬮遞與首座開看字號分曉説與堂司行者喝某字號衆人各開所執半鬮字號同者即應如不願唱此號衣物則不應三唱不應首座以半鬮投水盆中再令撮起半鬮復唱起應者堂司行者往收半號到首座處對同報與維那稱云某物唱與某人鳴磬一下知客上單侍者發標供頭行者遞與唱得人忠曰右且録唱衣鬮拈之法第十四類雜行門吹噓忠曰日本禪林贊成某禪士稱揚於主人而請其許達是曰吹噓聯燈會要睦州陳尊宿指臨濟參黃檗接雲門嗣雲峰皆師之力也止此此即吹噓榜樣也魏志鄭渾傳云渾兄泰字公業對董卓十事曰孔公緒能清談高論噓枯吹生杜工部集贈獻納起居田舍人澄詩云揚雄更有河東賦唯待吹噓送上天又謁文公上方詩云願聞第一義回向心地初金篦刮眼膜價重百車渠無生有汲引茲理儻吹噓山谷詩集東觀讀未見書詩云諸生起孤賤天子自吹噓輪差舊説曰輪差輪番也忠曰自上位差次第到下位復還及上位若車輪環轉故云輪差正字通云差又皆韻音叉使也唐宣宗詔每役事委令輪差敕修清規聖節云輪差僧簿依戒次各書雙字名又祈禱云輪僧十員草員或三五十員分作幾引接續諷誦雪峯存禪師録規制云衆中或有老者病者不任自取索即差了事童行終始看侍如無童行輪差沙彌如無沙彌輪差大僧始終看侍無至違越宋史食貨志云輪差壯丁忠曰輪差音訓今得正字通不復費辨古解聖節輪差者曰差叉宜切次也今謂戒臘次第也若如所解則雪峯輪差亦若何通至唐詔宋志皆在俗事豈有戒臘次第哉可笑公差公界差人也敕修清規請喪司職事云喪司公差庫子客頭茶頭一行人管辨事差定叢林盛事云混融然有小師大驥者淳熙間住衢之靈曜時朝廷方行役法二浙江淮處並差定驥乃糾率衢婺處三州僧尼道士造朝免之今天下僧由此獲安不為國家之差役者蓋驥之力耶宋史食貨志云收租掌納官吏以限外欠數差定其罰又云銅錢闌出江南塞外及南蕃諸國差定其法至二貫者徒一年五貫以上棄市募告者賞之經國大典注解云差定差擇也言差任也定安也暗封舊説曰暗封者暗昧選封也不以公舉而私請也藏叟摘稿跋趙大監請愚谷住法石書後云法石二十年間主僧更代不一類非本色寺日入於壞前守趙大監一日集諸禪主首曰法石壞於暗封久矣欲革斯弊非得江湖名衲子不可某等退而舉三人愚谷元智其一也時愚谷謝事常之芙蓉居靈隱為第一座有聲叢林間守焚香拈得之且詢其出處喜甚亟馳書招致寺僧咸謂泉取浙二千里餘如費何某諭之曰昔以暗封今以公舉計道路費視暗封不能十之一何患焉愚谷至衆果悅服未二年百廢具舉日工集云府君欲付以天龍而東歸興切也赴三會忌齋與等持物先和會退建仁事云余日者聞諸山新命暗封已定而以南禪天龍未動且期今日忌齋燒香欲告退先曰可也接待正宗贊香林遠禪師傳云師後歸蜀於水晶宮接待往來茶湯碧巖録云大隋真如和尚承嗣大安後歸川先於堋口山路次煎茶接待往來凡三年後方出世開山住大隋打給忠曰送食於別處曰打給打義飲啖門打飯處箋日用軌範云木魚響不得入堂或令行者取鉢堂外坐或歸衆寮打給禪苑清規庫頭云如遇打給即時應副又延壽堂主云堂中所用柴炭米麵油鹽醬菜茶湯藥餌薑棗烏梅什物家事皆係堂主緣化如其無力唯米麵油炭就常住打給又云有處病僧在堂並上文曆以憑庫司打給并請齋嚫隸籍六祖壇經緣起外紀云師遊境內山水勝處輒憩止遂成蘭若一十三所今曰花果院隸籍寺門字典云隸即計切音麗説文附著也後漢書馮異傳注隸屬也又孔融傳皆隸名而已宋馬縞中華古今注云牛亭問籍者何云答曰籍者一尺二寸竹牒記人之年名字物色懸之宮門案省相應乃得入也出隊忠曰小補韻會云隊群隊也止此出隊者住持出大衆之隊在外勸化財糧也又見埀説門出隊上堂處簿券門右具如前處傳燈録招福和尚嗣投子大同章云僧問東牙烏牙皆出隊和尚為什麼不出隊師曰住持各不同闍梨爭得怪一山曰東牙烏牙俱寺名出隊勸化也應菴華禪師録示章化士法語云善章禪人有志參學不憚數千里來此道集期透生死大事未肯端坐固效古為衆持鉢繼洪州出隊目録袖軸求法語揮汗聊書大槩出鄉出隊又曰出鄉見埀説門出鄉上堂處遊山忠曰已事了畢人不要參問玩覽勝槩也敕修清規裝包云如遊山到處將及門下包捧入旦過安歇處解包取鞋襪濯足更衣搭袈裟與知客相看聯燈會要巴陵鑒禪師章云師問僧為佛法來遊山來云清平世界説甚麼佛法師云好箇無事底禪客云早是多事也師云上座去年在此過夏了云不曾師云恁麼則先來不相識下去禪林類聚云茱茰禪師問僧闍梨為復遊山玩水為復問道參禪僧云和尚試道看師云雕蚶鏤蛤不𧑁之泥勞君遠至云渾身是鐵猶被一橈師云降軍不斬已下略録與上義異者聯燈會要仰山寂禪師章云師問僧近離甚處云廬山師云曾到五老峯麼云不曾到師云闍梨不曾遊山又云一日有一異僧乘空而來作禮而立師問近離甚處云早晨離西天師云何太遲生云遊山玩水師云神通妙用即不無尊者佛法須是老僧始得云特來東土禮文殊却遇小釋迦遂出西天貝多葉與師作禮騰空而去又長沙岑禪師章云師遊山歸至門首首座問和尚甚處去來師云遊山來云到甚麼處來師云始隨芳草去又逐落花回云大似春意師云也勝秋露滴芙渠日用軌範云衩袒登溷草履遊山莫踐法堂回互耆舊閉關永覺賢禪師禪餘內集示三峯泰水法師法語云余聞古之學道者博參遠訪陸沈賤役勞其筋骨餓其體膚百苦無不備嘗並求有晏坐一室閉關守寂以為學道者也自入元始有閉關之説然高峯閉死關於天目乃是枕子落地後非大事未明而畫地以自限者也自入明乃有閉關學道之事夫閉關學道其最初一念乃是厭動趨寂者也秖此一念便為入道之障况關中既不受知識鉗鎚又無師友策勵癡癡守著一句話頭如抱枯樁相似日久月深志漸糜力漸疲話頭無味疑情不起忽然轉生第二念了也甚至身坐一室百念紛飛者有之又何貴於關哉文選江文通恨賦云閉關却掃塞門不仕持齋舊説曰儒佛取齋義有異儒氏則欲先祖來歆故齊心也佛氏則過日中不食也小補韻會云經傳齋字多作齊洪武正韻云古單作齊後人於其下加立心以別之請觀音經智者疏云齋者齊也齊身口業也齊者只是中道也後不得食者表中道法界外更無別法也中前得啖而非正中此得明表前方便但似道之中得有證義故得啖也亦是表中道法界外有法也智圓闡義鈔云齊身口業者祭統云齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也嗜欲無止也及其將齊也防其邪物訖其嗜欲耳不聽樂今釋氏以不過中食為齊亦取其防邪訖欲齊不齊之義也毗羅三昧經云早起諸天食日中三世佛食日西畜生食日暮鬼神食佛制斷六趣因令同三世佛故今約理解故云齊者祇是中道後不得食者者即佛制中後不得食也今表初住初地圓證中道心外無法如中後不得食也中前得噉者佛制中前非正食皆得噉之釋氏要覽云齋起世因本經云烏脯沙陀隋言增長謂受持齊法增長善根故佛教以過中不食名齋翻譯名義集云毗婆沙論云夫齋者以過中不食為體以八事助成齋體共相支持名八支齋法又云處處經佛言中後不食有五福一少淫二少睡三得一心四無有下風五身得安穩亦不作病雜譬喻經云佛言一日持齋有六十萬歲糧復有五福少病身安少睡少淫得生天識宿命佛祖統紀天台智顗禪師傳云師曰非但步影為齋日影不過午能無緣無觀即真齋也無所緣無能觀是為境觀俱亡步影善見律云受戒已應步影步影者正立住取住腳為初隨身影長短步影步影竟教其時其時者或冬時或春時或夏時莊子人間世篇云顏回曰吾無以進矣敢問其方仲尼曰齋吾將語若有而為之其易耶易之者皡天不宜顏回曰回之家貧唯不飲酒不茄葷者數月矣若此則可以為齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虗而待物者也唯道集虗虗者心齋也又見飲啖門非時食處持鉢忠曰乞食於城市曰持鉢續燈録拈古門云臨濟持鉢到一婆子門前云家常婆子開門云太無厭生濟云飯猶未曾得何責人無厭婆子閉却門傳録燈風穴沼禪師章云師初見南院不禮拜便問曰入門須辨主端的請師分乃至南院曰三十年住持今日被黃面浙子上門羅織師曰和尚大似持鉢不得詐道不飢又漳州羅漢和尚章云始於關南常禪師拳下悟旨乃為歌曰咸通七載初參道乃至從茲蹬蹬以碣碣直至如今常快活只聞壯裏飽膨脝更不東西去持鉢普燈録懷玉用宣首座章云一日自臨川持鉢歸值泐潭景祥晚參有云一葉飄空便見秋法身須透閙啾啾宣聞領旨大慧武庫云葉縣省和尚嚴冷枯淡浮山遠參乃至省一日見遠獨於旅邸前立乃云此是院門房廊儞在此住許多時曾還租錢否令計所欠追取遠無難色持鉢於市化錢還之密菴傑禪師録示殊禪人法語云回觀此山食指既多常住不給不忍坐視發心為衆持鉢余嘉其志不凡臨行欲語故書此以贈之曹源生禪師録送聞兄持鉢偈云聞聲悟道鳥投籠秖麼無聞道未充利劍拂開慳吝穴全身輥入是非叢腳頭腳尾無虗棄山北山南有路通一笑歸來能事畢真金百鍊見全功金剛般若經云爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處首楞嚴經云阿難汝常二時衆中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中廣説廣弘明集沈約述僧設會論云出家之人本資行乞戒律昺然無許自立廚帳并畜淨人者也今既取足寺內行乞事斷或有持鉢到門便呼為僧徒鄙事下劣既是衆所鄙耻莫復行乞悠悠後進求理者寡便謂乞食之業不可復行白淨王子轉輪之貴持鉢行詣以福施者豈不及千載之外凡庸沙門躬命僕竪自營口腹者乎托鉢乞食曰托鉢或作拓正字通托同拓手承物也續傳燈録淨土院惟正禪師章云有願輸奉歲時用度俾繼加之院務亦復謝曰聞托鉢乞食未聞安坐以享聞歷謁諸祖未聞廢學自任况我齒茂氣完正在筋力為禮非從事屋廬之秋也恕中慍禪師録松巖雜言云念念無生自入微瓶中米盡腹中飢夜深月下敲門急道者蕉溪托鉢歸又粥飯時擎鉢赴僧堂曰托鉢聯燈會要雪峯存禪師章云師在德山作飯頭一日飯遲師曬飯巾次見德山托鉢至法堂前師云這老漢鐘未鳴鼓未響托鉢向甚麼處去山便歸方丈云云乞食見持鉢托鉢處佛祖統紀云善見論梵語分衛此云乞食寶雲經凡乞食為四分一奉同梵行一與窮乞一與鬼神一分自食法集經行乞食者破一切憍慢十二頭陀經食有三種一受請食二衆僧食三常乞食前二食起諸陋因緣若得請便言我有德若不請則嫌恨彼或自鄙薄是貪法則能遮道共僧食者常隨衆法斷事擯人料理僧事心則散亂妨廢行道有如是惱亂應受乞食法把針佛果擊節録云巖頭擔鋤頭行腳到處只做園頭雪峯擔笊籬木杓行腳到處作典座欽山將尉斗剪刀針線行腳到處與人做衣到箇所住處三人互為賓主作小參舉公案欽山承當不得後來却到洞山契證法嗣洞山貞和集龍巖廬山東林十題把針頌云豆花和雨落繽紛絡緯催寒徹夜聞不費機梭衣不盡白綿山頂自牽雲清拙和云千山黃落正紛紛月下村砧遠近聞寒衲一條重補綴自憐剪破半溪雲臥眠摩得勒伽云云何臥比丘不病不得晝日臥不得燈中臥若疲極者應起去不得惱第二人云何眠世尊聽比丘晝日經行坐除睡蓋初夜過四揲鬱多羅僧敷卷揲僧伽梨為枕右脅臥腳腳相纍不得散手腳不得散亂心不得散亂衣作明相正念起想思惟然後眠至後夜疾疾起經行坐除去睡蓋帶刀臥宋高僧傳百丈山懷海傳云海創意不循律制別立禪居不論高下盡入僧堂堂中設長連牀施椸架挂搭道具臥必斜枕牀脣謂之帶刀睡為其坐禪既久略偃亞而已又見僧史略別立禪居章六學僧傳唐懷海傳云坐長連牀晝夜不息倦則斜枕牀脣偃仰謂之帶刀臥使不安於寢寐也傳燈録百丈海禪師章云設長連牀施椸架挂搭道具臥必斜枕牀脣右脅吉祥睡者以其坐禪既久略偃息而已具四威儀也忠曰僧傳帶刀臥即傳燈右脅吉祥睡也蓋帶刀者於左脅故不得左脅而臥因名右脅臥為帶刀臥也白雲端禪師録雲門糊餅頌云雲門糊餅圓漠小爭似法華爐竈大飽來一任帶刀眠誰問西來間達磨續燈録澄惠詡禪師章云更有一般堪羡處長連牀上帶刀眠普燈録法真一禪師章云問如何是玄中玄曰長連牀上帶刀眠抽解敕修清規坐禪云坐定久之僧衆方可次第起身抽解又須看上下肩起止急緩免見成連單位空缺又大坐參云如坐再請禪住持後門入歸位不巡堂頭首隨衆或抽解者即歸被位又云頭首與大衆暫從後門出換衣換頭袖抽解即歸守被位備用清規坐參云與坐禪一同但促鳴板耳蓋不起抽解故也禪苑清規挂搭云維那云請某上座於某寮抽解問訊而別新到歸寮又云或自監院首座藏主退下於獨寮抽解又云新到挂搭如經本院曾作知事頭首化主並於前資寮抽解又下頭首云以次頭首合入前資寮抽解忠曰或坐禪中間出僧堂少休息或新挂搭人歸寮安息皆曰抽解也抽解者抽解袈裟也敕修清規庫司特為新舊兩序湯藥石云謝湯畢抽衣就座藥石又遊方參請云抽衣就坐藥石止此抽解義可例知也舊説曰抽解同抽脫放大小便也忠曰如坐禪坐參抽解則解衣休息時亦應行便利故可通便利義如挂搭抽解則唯是休息義不通便利故抽解不可直以放便利解之竹窗三筆云念彌陀飲食抽解皆無間斷忠曰此但言便利婉詞稱抽解矣或有蕃船抽貢貨物曰抽解者甚與前義不相涉且録廣聞見宋史食貨志互市舶法云熙寧初立市舶以通物貨舊法抽解有定數而取之不苛如犀角象齒十分抽二珠十分抽一元史食貨志市舶云每歲招集舶商於蕃邦博易珠翠香貨等物及次年回帆依例抽解於是定雙抽單抽之制雙抽者蕃貨也單抽者土貨也抽脫舊説曰放大便云抽脫抽脫上衣也忠曰如廁抽脫袈裟僧祇支故云抽脫婉辭也故行事鈔諸雜要行篇云應脫袈裟僧祇支大小便敕修清規日用軌範云若抽脫古例披五條即挂絡也以淨巾搭左手解絛繫笐竿上脫五條直裰令齊整以手巾繫定作記認不得笑語不得在外催促右手提水入廁其規如彼大慧武庫云泐潭深和尚河東人真淨之子有悟侍者偶在知客寮見掉下火柴頭忽然有省直上方丈通所悟深和尚喝出自爾失心引繩於延壽堂東司自縊夜後常在藏院知客寮東司三處出沒移鞋度瓶一衆苦之湛堂遊浙回充首座聞其事中夜故入延壽堂東司抽脫壁燈微明忽然撲滅方脫衣悟便提水瓶至湛堂云未要且待我脫衣脫衣罷便接瓶子去當時悟自縊間抽脫須又送籌子來及出喚云接瓶去悟才接捉住摸其手或似軟或似硬問曰汝是悟侍者麼汝便是當時在知客寮見掉下火柴頭有省處底麼參禪學道秖要知本命元辰下落處汝在藏殿移端首座鞋履豈不是汝當時悟得底又在知客寮移枕子豈不是汝當時悟得底逐夜在此與人提瓶度水豈不是汝當時悟得底因甚不知落處秖管在這裏惱亂大衆作麼我明日勸大衆為汝看藏經裒錢設粥追悼汝汝當別求出離不得滯著於此言訖乃推一推如瓦礫塔子倒索然有聲由是絶迹湛堂一臂冷如冰踰半月方平復蓋非人附陰而至冷氣侵人如此上廁法十誦律毗尼母論等詳説看病敕修清規延壽堂主云看視病僧湯藥油燭炭火粥食五味常備供須詳職位門延壽堂主處釋氏要覽云瞻病人五德四分律云一知病人可食不可食二不惡病人便利唾吐三有慈愍心不為衣食四能經理湯藥五能為病人説法令歡喜已增長善法瞻病人六失增一經云一不辨良藥二懈怠三喜瞋好睡四但貪衣食五不以法供養六不共病人言語談笑忠曰增一為五法以今一二合為一增一阿含經云疾病之人成就五法不得時差恆在牀蓐云何為五於時病人不擇飲食不隨時而食不親近醫藥多憂喜瞋不起慈心向瞻病人是謂比丘疾病之人成就此五法不得時差反此得差略之又云瞻病人成就五法不得時差恆在牀蓐云何為五於是瞻病之人不別良藥懈怠無勇猛心常喜瞋恚亦好睡眠但貪食故瞻視病人不以法供養故亦不與病人語談往返是謂比丘若瞻病之人成就此五法者不得時差反此得差且略之教誡律儀看和尚闍梨病法云一懷孝養心作父母想二不得嫌有臭穢三常經營湯藥四所忌之食不與食五飲食常令得所六洗濯衣裳七數除糞穢八勤燒香九常令衣被厚薄得所十常具火燭十一常須作意細心不得躁十二常念觀音菩薩願師所苦早得痊平梵網經云若佛子見一切疾病人應供養如佛無異八福田中看病福田第一福田若父母師僧弟子病諸根不具百種病苦皆養令差華嚴經淨行品偈云見疾病人當願衆生知見空寂解脫衆苦緇門警訓勉僧看病偈靈岩石刻三首云四海無家病比丘孤燈獨照破牀頭寂寥心在呻吟裡粥藥須人仗道流病人易得生煩惱健者長懷惻隱心彼此夢身安可保老僧書偈示叢林氣濕風勞猶可療不知禪病若為醫衲僧更擬論方藥便把拳頭驀口捶已下略録事緣僧祇律云佛住舍衛城按行到一破房中見一病比丘臥糞穢中不能自起佛問氣力何似所患增損答言患但有增無損復問得食不世尊我不得食來已經七日佛問此間有和尚阿闍梨不無有無比房比丘耶答言以我臭穢不喜故徙餘處去佛語比丘汝莫憂惱我當伴汝取衣來我為汝浣阿難白言我當與浣佛語阿難汝浣衣我當灌水浣已日曝阿難抱病比丘舉著露地除去糞穢出牀褥諸不淨器水灑房內掃除已巨磨塗地浣曬牀褥更織繩牀敷著本處澡浴病比丘徐臥牀上世尊以無量功德莊嚴金色柔軟手摩比丘額上問言所患增損比丘言蒙世尊手至我額上衆苦悉除世尊隨順説法發歡喜心已重為説法得法眼淨比丘差已世尊至衆多比丘所以上事具説呵責比房比丘汝等同梵行人病痛不相看視誰當看者若比丘病不看者越毗尼罪略鈔智度論亦載此緣為舍婆提國事舍婆提即舍衛也又增一阿含有佛羅閲城瞻病比丘緣與僧祇大同小異羅閲即王舍城王舍城在摩伽陀國蓋事相似而緣別也西國傳云唐三藏親至王舍城東北禮佛洗病僧塔止此然西域記以此緣係舍衛國則玄奘所禮者舍衛塔也恐西國傳訛録第十五類罪責門梵壇長阿含經云阿難白佛言闡弩比丘虜扈自用佛滅度後當如之何佛告阿難我滅度後若彼闡弩不順威儀不受教誡汝等當共行梵壇罰敕諸比丘不得與語亦勿往反教授從事梵網經法藏疏云梵壇者此翻為默擯良以非理違犯不受調伏故以此治之行事鈔云言默擯者五分云梵壇法者一切七衆不來往交言智論云若心強獷如梵天法治之以欲界語地亦通色有不語為惱故違情故不語治之此法最要資持記云梵壇者有云梵王宮前立一壇天衆不如法者令立壇上餘天不與往來交語五分因闡陀惱僧故用此治語地以語為樂故通色有者梵天行故言故違者謂特意也智度論云佛告阿難車匿比丘我涅槃後如梵天法治維摩經略疏引智度論釋云惡口車匿梵法治者其自恃王種輕諸比丘僧法事時即輕笑言如似落葉旋風所吹聚在一處何所互論佛去世後猶自不改佛令作梵壇謂默擯也亦云彼梵天治罪法別立一壇其犯法者令入此壇諸梵不得共語忠曰梵壇法藏為梵語智者元照引有義為漢言其説稍類左傳履薪事闡陀即車匿也春秋左傳僖公十五年云穆姬聞晉侯將至以太子罃弘與女簡璧登臺而履薪焉杜預注罃康公名弘其母弟也簡璧罃弘姊妹古之宮閉者皆居之臺以抗絶之穆姬欲自罪故登臺而荐之以薪左右上下者皆履柴乃得通梵壇擬世間死刑雜阿含經曰世尊告調馬聚落主調伏馬有幾法答言有三種法一柔軟二剛強三柔軟剛強佛告若猶不調當如之何言便當殺之聚落主言瞿曇無上調御丈夫者當以幾法調御丈夫佛告我亦以三法一柔軟二剛強三柔軟剛強聚落主白若三種猶不調當如之何佛言便當殺之所以者何莫令我法有所屈辱聚落主言瞿曇法中殺生者不淨而今説不調伏者亦當殺之佛告我以三種法調御丈夫彼不調者不復與語不復教授不復教誡豈非殺耶略鈔默擯即梵壇也詳于彼忠曰僧祇律雜誦跋渠法中有捨不語羯磨法恐繁不録大抵悔前過隨順五事比丘事比丘尼事眷屬事羯磨事王事一一如法學教律知罪相者應與捨擯出南本涅槃經云善男子譬如國王諸羣臣等有犯王法隨罪誅戮而不捨置如來世尊亦如是也於毀法者與驅遣羯磨訶責羯磨置羯磨舉罪羯磨不可見羯磨滅羯磨未捨惡羯磨善男子如來所以與謗法者作如是等降伏羯磨為欲示諸行惡之人有果報故又云有持戒比丘威儀具足護持正法見壞法者即能驅遣訶責糾治當知是人得福無量不可稱計忠曰經驅遣即律中驅出即今擯出也自餘訶責等義彼疏中詳釋恐繁不録又涅槃經云是菩薩擯治諸惡比丘令清淨僧得安隱住流布方等大乘經典利益一切諸天人故大方等日藏經云彼破戒人無有慚愧以劫盜心取彼僧物以為己有是如法比丘隨其住處若在林中或在伽藍不應共住應生慈愍方便示教遣令出衆語言長老汝等不應住此如是三諫是破戒人若去者善若不出衆如法比丘不得瞋罵應告國王剎利婆羅門毗舍首陀及有勢力者言此有比丘不如法行恆相擾亂不令我等安心行道惟願檢校勿令侵惱而彼國王剎利乃至聚落主等應當治之驅逐令出若彼剎利王等取彼破戒比丘飲食財物而不驅遣者如法比丘亦不應瞋莫貪住處及資生等默然捨去更求餘處無難之所若在山林窟中或阿蘭若地隨其靜處就彼而住行事鈔僧網大綱篇云擯出者謂對俗人倒説四事廣如律文又如隨戒中汙家惡行倒亂佛法汙他俗人淨善之心以非為是故須遣出本處折伏治之使世俗識非達正無復疑惑此之過罪人多有之特須禁斷資持記云擯出者佛在羈離那國因阿濕卑富那婆娑二比丘汙家惡行為緣故制羯磨罰已驅出當界故得名也釋氏要覽云瑜伽論云驅擯由三因緣一為護他故二彼不堪為上法器故三彼能令僧無威德故問今僧中有先驅出人後却容入未知可耶答亦有此理何者瑜伽論云犯下中品過為教誡餘者權時驅擯後還攝受若犯上品過罪應可驅擯盡壽不與共住十誦律云賓頭盧頗羅墮座上伸手取樹提居士栴檀鉢世尊訶責云何名比丘為赤裸外道物木鉢故於未受大戒人前現過人聖法訶責已語頗羅墮盡形壽擯汝不應此閻浮提住賓頭盧受佛教已頭面禮佛足右繞還自房所受僧臥具牀榻盡以還僧持衣鉢入如是定於閻浮提沒瞿耶尼現又見靈像門賓頭盧處迦葉命優波離擯阿難見職位門維那處興化擯克賓出院又見維那處忠曰僧祇律雜誦跋渠法中有捨擯出羯磨法大抵隨順行五事默擯處箋一一如法者應與捨是名捨擯擯罰即擯出也敕修清規尊宿入龕云或盜竊常住住持依公擯罰出院大慧武庫云撫州明水遜禪師在法雲侍者寮時道林琳禪師挂搭方丈特為新到茶遜躬至寮請之適琳不在有同行與琳聯桉曰汝去俟渠來我為汝請遜去僧偶忘之齋後鳴鼓會茶琳不到圓通問曰新到在否趣請之琳到圓通令退坐榻立衆前責曰山門特為茶以表叢林禮數因何怠慢不時至琳曰適聞鼓聲忽內逼趨赴不前圓通呵曰我鼓又不是巴豆擊著儞便屎出遜前白云是某忘記請之某當出院時同行出衆曰不干侍者與新到事是某不合承受為渠請偶忘記某當代二人出院圓通高其風義併宥之又克賓出院見職位門維那處出院出去呼若依正字通則入聲正字通云毛詩古音考曰增韻自內而外曰出凡物自出則入聲使之出則去聲書寅賓出日出納朕命皆此音又陸德明釋文出字皆直類切易繫河出圖王弼讀墜按出雖有去聲出納出圖當入聲如本音陸王説泥舊本引增韻非又去入互用康熙字典云出正韻凡物自出則入聲非自出而出之則去聲然亦有互用者滅擯削僧籍也行事鈔僧網大綱篇云言滅擯者謂犯重比丘心無慙愧不肯學悔妄入清衆濫居僧限當三根五德舉來請僧憶念示罪令自言已與白四法又足數衆相篇云滅擯者謂犯重已舉至僧中白四除棄也釋氏要覽云彌沙塞云梵罰此有二法一默擯謂一切人不與來往言話等二滅擯滅即滅名也爾雅云點滅如今勾點糊滅名字也律謂犯重罪心無慚愧衆所不容不可共住舉來僧中示罪驅出多論云但實犯罪大衆有知不須自言直爾滅擯驅出所謂貴安善人也地藏十輪經云佛言善男子如來成就善巧知根機智若諸弟子遠離福慧巧方便智及以布施調伏寂靜失念心亂來至我所歸依於我而我善知彼根意樂隨眠勝解隨其所應為説治罰毗奈耶法若諸衆生其性很戾於諸學處不能奉持為令久住我之聖教多有所作或為制立憶念治罰或以言教恐怖呵責或暫驅擯或令折伏歸誠禮拜或不與語不共同利或如草布或復滅擯忠曰滅擯者當世之死刑謂律乘犯四重者為波羅夷罪於是人方行滅擯矣所謂滅者除去名籍也行事鈔篇聚名報篇云四分云波羅夷者譬如斷人頭不可復起若犯此法不復成比丘故削籍滅擯也謂削去僧籍名世典亦有此目明通紀集略云高攀龍溺園池死有遺疏曰臣雖削籍舊屬大臣大臣不可辱辱大臣則辱國矣謹北面稽首以效屈平之遺籍義見前隸籍處誡罰僧史略別立禪居云或有過者主事示以拄杖焚其衣鉢謂之誡罰箠擯敕修清規肅衆云若僧人自相干犯當以清規律之若鬬諍犯分若污行縱逸若侵漁常住若私竊錢物宜從家訓毋揚外醜蓋悉稱釋氏準俗同親恪守祖規隨事懲戒重則集衆箠擯輕則罰錢罰香罰油而榜示之如關係錢物則責狀追陪惟平惟允使自悔艾罰錢見箠擯處又克賓罰錢見職位門維那處罰香見箠擯處罰油見箠擯處南禪規式義堂罰榜多罰油又見叢規門請假處罰茶南禪規式義堂和尚住南禪日罰榜式中云某甲上座衆寮點茶不赴行益無禮甚罰茶一斤今後不赴行益者皆準此維那照營還俗居家必用吏學指南篇云還俗謂僧道犯罪歸家者經國大典注解云還俗僧道出家曰棄俗若犯罪令其還歸本俗為民也歸俗居家必用吏學指南篇云歸俗謂僧道無罪自願歸家也第十六類報禱門聖節忠曰天子生日曰聖節敕修清規聖節云欽遇聖節必先啓建金剛無量壽道場其規詳彼小補韻會云聖武正切説文聖通也通論曰通而先識曰聖於文耳呈為聖心通萬物之情若耳之通聲尚書洪範云睿作聖傳於事無不通謂之聖正義曰鄭玄周禮注云聖通而先識也是言識事在於衆物之先無所不通以是名之為聖聖是智之上通之大也書言故事云尊稱天子曰聖皇聖帝東都賦聖皇乃握乾符注班固稱光武為聖皇文選朝錯策五帝神聖其臣莫能及前漢書朝錯傳故後人尊稱天子曰聖帝僧史略云生日為節名自唐玄宗始也魏大武帝始光二年立道場至神四年敕州鎮悉立道場慶帝生日始光中是帝自崇福之始也神麚中是臣下奉祝帝壽之始也自爾以來臣下吉祝必營齋轉經謂之生辰節道場于今盛行焉又云昔漢祖與盧綰同日生有奉酒饌相遺此為慶生之權輿也後則束帛壺酒孩兒服玩以加祝賀大則玉帛長生久視之意屬于物品以為慶生之豐禮也及聞佛法中有弭災延命之説則以佛事為慶也元魏後周隋世多召名行廣學僧與儒道對論悅視王道亦慶生之美事矣唐高宗召賈公彥於御前與道士沙門講説經義德宗誕日御麟德殿命許孟容等登座與釋老之徒講論貞元十二年四月誕日御麟德殿詔給事中徐岱兵部郎中趙需及許孟容韋渠牟與道士葛參成沙門談筵等二十人講論三教渠牟最辨給文宗九月誕日召白居易與僧惟澄道士趙常盈於麟德殿談論居易論難鋒起辭辨泉注上疑宿搆深嗟揖之莊宗代有僧録慧江與道門程紫霄談論互相切磋謔浪嘲戲以悅帝焉莊宗自好吟唱雖行營軍中亦攜法師談讚或時嘲挫每誕辰飯僧則內殿論義明宗石晉之時僧録雲辨多於誕月談讚皇帝親座纍對論義至大宋太祖朝天下務繁乃罷斯務止重僧講三學為上此無乃太厚重而貞實乎宋洪邁容齋三筆云唐德宗以誕日歲歲詔佛老者大論麟德殿并召給事中徐岱及趙需許孟容韋渠牟講説始三家若矛盾然卒而同歸于善帝大悅賚豫有差此新書列傳所載也云云國朝命僧升座祝聖蓋本於此宋喻文豹唾玉集云德宗每年生日令僧道及給事中等官大論麟德殿相與問難賚賜有差時以為上儀白樂天有三教論衡我朝聖節升座本於此居家必用云聖節唐太宗以前有宴而無節至明皇始曰千秋節歷代節名不同事物紀原云唐會要曰開元十七年八月五日源乾曜張説等請以是日為千秋節休暇三日至長慶七年十月十日穆宗誕日令天下州府置宴文宗開成二年誕日始禁屠宰此聖節禁屠置宴之始也宋朝俱循用之忠按舊唐書文宗本紀開成二年有聖節斷屠之制然實聖節斷屠始於隋高祖仁壽三年東齋紀事辦事物紀原之誤見節時門三長齋月處隋書文帝紀云仁壽三年夏五月癸卯詔曰哀哀父母生我劬勞欲報之德昊天罔極但風樹不靜嚴敬莫追霜露既降感思空切六月十三日是朕生日宜令海內為武元皇帝元明皇后斷屠周必大淳熙玉堂雜紀云錢文僖公惟演金坡遺事云舊規學士六人遇聖節共率百二十緡寺中設齋今送五十千與樞密使同開道場前一日赴宴當時所記如此近歲樞密院滿散聖節及貢院賜宴則學士待制皆與而無送錢故事六好日祝聖帝王誕生支干相當之日諷經祝讚一年有六箇本命好日故曰六好日也幻住清規云一年內有六日是本命好日此六日亦與朔望同粥前諷大悲咒祝聖切惟皇恩如天之覆林泉懦弱之者仰承帝澤而獲終身之安其贊祝之誠豈可擇日而為之蓋二六時中俯仰折旋皆是謝恩祈禱之時也今特取本命朔望而為者乃表而出之之意也又云如遇本命好日回向稱甲子令辰莊子天地篇云堯觀乎華華封人曰嘻聖人請祝聖人使聖人壽忠曰祝聖祝壽語出于此景命日祝讚天子即位之日祝讚諷經忠曰或以六好日為景命好日非也敕修清規景命祝讚云景命好日隔宿堂司行者報衆挂諷經牌忠按景命日蓋每月有祝蒲室集奉敕重修百丈清規疏語中十二箇月但除正月三月餘皆有景命日祝香語都十道詩經既醉篇云君子萬年景命有僕箋云成王女既有萬年之壽天之大命又附著於女謂使為政教也文選劉越石勸進表云高祖宣皇帝肇基景命注良曰肇始景大也每日祝讚敕修清規每日祝讚云齋粥二時下堂僧衆必須登殿維那舉無量壽咒三遍回向舊説曰每日三時祝禱皇風永扇帝道遐昌者唯有禪林而已餘所未聞之萬歲祝君敕修清規聖節黃榜式云逐日輪僧上殿披閲真詮宣持密號所萃洪因端為祝延今上皇帝聖壽萬歲萬歲萬萬歲禪林開堂祝聖有萬歲語蓋葉縣省禪師為始見叢軌門祝聖拈香處後代例有萬歲萬歲萬萬歲語虗堂愚和尚育王録入寺云師升座拈香云此一瓣香爇向爐中恭為祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願堯仁廣被舜德日新淨慈録徑山録皆有萬歲萬歲萬萬歲語無學元禪師建長録入院云驟步登座祝聖拈香云此一瓣香恭為祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願如日之明如天之普九州共貫并包有截之區三景同光申錫無疆之祚忠曰日本有萬歲萬歲萬萬歲語此為始自後大休念禪師一山寧禪師皆有此語明極俊禪師建長録入寺云祝聖拈香大日本國相模州巨福山建長興國禪寺新住持傳法臣僧入院開堂之次虔爇此香端為祝延今上皇帝聖躬萬歲萬歲萬萬歲皇帝陛下恭願統一國聖明之尊如日如月恢萬世鴻熙之祚同地同天忠曰大日本國等語似今時造語者此為始前漢書郊祀志云武帝登中嶽太室從官在山上聞若有言萬歲云祖庭事苑云呼萬歲自古至周未有此禮按春秋後語趙惠王得楚和氏璧秦昭王聞之遺王書願以十五城易之趙遣藺相如奉璧入秦秦王見相如奉璧大喜左右呼萬歲又田單守即墨使老弱女子乘城上偽約降燕軍皆呼萬歲馮瑗之薛召諸民債者合券券既合瑗乃矯孟嘗君之命所債賜諸民因燒其券民皆呼萬歲至秦始皇殿上上壽羣臣皆呼萬歲見優孟傳蓋七國之時衆所喜慶於君皆呼萬歲自漢已後臣下對見於君及拜恩慶賀以為常制又謂山呼者漢武帝至中嶽翌日親登崇高御史乘屬在廟旁吏卒盛聞呼萬歲者三山呼萬歲者自漢武始也野客叢書云東漢臣下多呼萬歲馮魴既降羣盜赦其罪各返農桑皆稱萬歲耿恭於虜圍中拜井得泉衆皆稱萬歲馬援曰今賴士大夫之力蒙被大恩紆佩青紫吏士皆稱萬歲歲旦門下掾王望請上太守壽掾史皆稱萬歲臣下往往若此不以為僭此猶可也觀漢刻中有故民吳仲山碑其銘中有子孫萬歲之語民猶稱萬歲官吏可知鮮有非之者惟竇憲為將軍至長安尚書以下議欲拜之伏稱萬歲韓稜正色曰禮無臣下稱萬歲之制議者皆慚所避忌者惟此語此語在當時不無諱避但不至如後世之切耳事物紀原云萬歲考古逮周未有此禮戰國時秦王見藺相如奉璧田單偽約降燕馮瑗焚孟嘗君債券左右及民皆呼萬歲蓋七國時衆所喜慶於君者皆呼萬歲秦漢以來臣下對見於君拜恩慶賀率以為常宋許觀東齋紀事云萬歲之稱不知起於何代商周以來不復可考呂氏春秋宋康王飲酒室中有呼萬歲者堂上悉應戰國策馮歡燒債券民稱萬歲藺相如奉璧入秦秦王大喜左右皆呼稱萬歲韓非子巫覡之祝人曰使君千秋萬歲之聲聒耳新序梁君出獵歸入廟中呼萬歲曰幸今日也紀信乘黃屋載左纛曰食盡漢王降楚呼萬歲陸賈奏新語左右皆稱善呼萬歲漢武帝登嵩高呼萬歲者三元帝送許后入太子家謂左右酌酒賀我左右呼萬歲馮異傳趙臣將兵助異并送縑軍中皆稱萬歲王望曰今日雖擊牛釃酒勞饗軍士皆稱萬歲伏王馬援封侯乃首請上雅壽掾史皆稱萬歲吳甘寧入魏營斬數十級還入營作鼓吹稱萬歲是則慶賀之際上下通稱之初無禁制不知自何時始專為君之祝也孔氏平仲雜説云人臣不嫌稱萬歲馬援傳援釀酒享軍士皆伏稱萬歲是也居家必用云萬歲大雅云虎拜稽首天子萬年始於戰國以來臣下對君慶賀呼曰萬歲又詩經大雅既醉篇云君子萬年介爾景福又小雅瞻彼洛矣及鴛鴦篇有君子萬年語宋史外國傳云勃泥國在西南大海中太平興國二年其王向打遣使齎表入貢其表以華言譯之云勃泥國王向打稽首拜皇帝萬歲萬歲萬萬歲願皇帝萬歲壽今遣使進貢云云三才圖會儀制類蕃國接詔儀云司贊唱搢笏鞠躬三舞蹈三拱手加額山呼萬歲山呼萬歲再山呼萬歲出笏俯伏興元史禮樂志云通贊贊曰搢笏曰鞠躬曰三舞蹈曰跪左膝三叩頭曰山呼曰山呼曰再山呼凡傳山呼控鶴呼譟應和曰萬歲傳再山呼應曰萬萬歲曰出笏曰就拜曰興忠曰纍言萬歲萬歲萬萬歲見宋史勃泥國事中及圖會蕃國接詔儀中其於中國見元史禮樂志然則如上纍言者本是西戎北狄之祝語歟修正義堂日工集云永和五年己未正月在報恩正旦對衆説云吾國叢林或三日或五日修正勤行亦是同國俗也吾山例定坐七日以祈國家安全亦成辦自己修行也二祖三佛忌二祖者達磨及某寺開山也或云達磨百丈二忌也三佛者涅槃忌誕生會成道會也忠曰誕生成道非忌然言二祖三佛忌隨多得名也正月十七日為百丈忌十月五日為達磨忌然日本古來不修百丈忌故加某寺開山忌以為二祖忌矣凡開山忌自常住經營之達磨百丈二忌率衆財營辨非常住措致之佛誕生會四月八日其規如清規忠按佛生日當以二月八日為正何緣作此説曰周書異記云昭王二十四年甲寅歲四月八日江河泉池忽然泛溢井皆騰涌宮殿震動其夜五色光氣貫于太微遍于西方作青虹色時王問太史蘇由由對曰有大聖出于西方故現此瑞王曰於國無損乎對曰一千年後聲教當被于此僧史略引忠以謂周書異記周時記録必當用周正則其四月建卯是夏小正二月建卯也故當定二月八日為佛生日然今例用四月是以周四月建卯謬為夏小正四月建巳而已僧史略云今東京以臘月八日浴佛言佛生日者案祇桓圖經寺中有玻黎師子形如拳許大口出妙音菩薩聞之皆超地位每至臘月八日舍衛城中士女競持香花來聽法音詳彼不言佛生日疑天竺以臘八為節日耳又疑是用多論二月八日臘月乃周之二月也東西遼敻故多差異焉薩婆多論云佛二月八日沸星現時生忠曰東京臘八稱佛生日者以余觀之周書異記四月八日佛生而周四月即夏小正二月建卯也然或以夏小正二月又謬為周二月建丑周二月即夏小正十二月故以臘八為佛生日也又薩婆多所謂二月八日佛生者取夏小正二月即合周書異記然贊寧以為周二月而以合夏小正臘月非也又自引周書異記現瑞證佛生何不主張周四月建卯佛生義耶又臘八浴佛出于譬喻經説次佛成道會處引然贊寧不得之強援祇桓圖經未足成浴佛義忠曰佛誕生或省生但言佛誕者非也趙與時賓退録云詩誕彌厥月誕大也朱文公則以為發語之辭世俗誤以誕訓生遂有降誕慶誕之語前輩辨者多矣書曰誕膺天命誕亦大也范曄贊光武乃有光武誕命之語尤不可曉殤帝紀云誕育百餘日亦誤佛成道會十二月八日其規如清規忠曰八相事略云佛成道五大院安然出五説一二月八日出因果經二四月八日出方等泥洹經三三月八日出西域記四三月十五日又出西域記五八月八日忠按佛祖統紀正宗記等取二月八日説似以因果經為正然中華日本古今用十二月八日僧史略會之云臘月乃周之二月也止此名義集引周書異記云周穆王二年癸未二月八日佛年三十成道正當今之臘八也止此忠曰周書異記者周時記録必可用周正則其二月建丑是夏小正十二月也臘八有浴佛者丹霞淳禪師録臘八上堂云屈指欣逢臘月八釋迦成道是斯辰二千年後追先事重把香湯浴淨身諸禪德古有十六開士因僧浴時隨例入室忽悟水因洞明妙觸盡入圓通境界大洪今日普請往靈濟殿上灌沐釋迦如來箇中亦有悟底消息諸人還會麼香湯瀲灔兩三杓便向如來頂上傾臘八浴僧有本緣法苑珠林云譬喻經云佛以臘月八日神通降伏六師六師不如投水而死仍廣説法度諸外道外道伏化白佛言佛以法水洗我心垢我今請僧洗浴以除身穢仍為常緣也今臘月八日洗僧唯出此經文釋氏要覽引譬喻經作請佛僧洗浴身垢注云今淮北及至三京皆用臘八浴佛又寶積經云波斯匿王女無垢施始年八歲二月八日沸星現日與五百婆羅門俱持滿瓶水出至城外浴洗天像婆羅門見諸比丘在門外立皆謂不吉廣説依之二月八日浴像本是天竺風俗佛涅槃忌二月十五日其規如清規忌義見節時門忌日處達磨忌十月初五日其規如清規百丈忌正月十七日也清拙澄禪師圓覺録百丈祖忌拈香語尾云白丈祖忌日本未曾講行今次初設此禮百丈以前無住持今之住持兩序大小職任堂宇規式皆百丈祖立之為長老者不肯設忌可謂昧本本且不知末奚取焉聞之者足以勸開山忌某寺開山入滅日修供養其規見清規嗣法師忌某寺住持之嗣法師入滅日修供養其規見清規碧巖録云巴陵衆中謂之鑒多口常縫坐具行腳深得他雲門腳跟下大事所以奇特後出世法嗣雲門先住嶽州巴陵更不作法嗣書只將三轉語上雲門如何是道明眼人落井如何是吹毛劍珊瑚枝枝撑著月如何是提婆宗銀碗裏盛雪雲門云他日老僧忌辰只舉此三轉語報恩足矣自後果不作忌辰齋依雲門之囑只舉此三轉語備用清規嗣法師忌云巴陵三轉語作忌不墮流俗後世道不及古務在廣設祭筵修營厚供可無愧乎近代大川做浙翁和尚忌橫川設天目和尚忌方丈設位置食一分燒香一炷大展九拜不許諷經二大老深有意焉愍忌誕生日曰愍忌中峯本禪師録吳江州太湖簡村順心禪菴高峯和尚愍忌拈香云順心菴裏太湖中央俄然逢愍忌世相未能忘大衆高峯老和尚來也雨蒸苗葉緑風撼稻花香岐陽曰幻住清規云三月草三日高峯和尚愍忌按高峯行狀師生宋嘉熙戊戌三月草三日申時乃知愍忌是誕生日也或云尊宿示寂後稱其誕生日為愍忌也雲章曰高峯生日中峯設愍忌齋依此誕生日亦言忌也或曰善知識為哀愍衆生出生應世故其誕生日曰愍忌忠曰此義杜撰按癡絶沖禪師録普説云為令尊堂戴氏小一太君愍忌與百日同時辨香積供止此是則婦人言愍忌非哀愍應世之義明矣亦不必局尊宿善知識也入牌祖堂入祖師牌於某寺祖師堂也敕修清規尊宿全身入塔云每日三時上茶湯集衆諷經俟迎牌位入祖堂則止或待新住持至方入祖堂有佛事有存日逆修入牌者臥雲日件録云無極和尚在世時入自牌於天龍祖堂後其孫鹿苑寺東嶽攀例又入自牌於天龍近時景南愚極皆有是舉矣千佛會圓悟勤禪師天寧録喬貴妃設千佛會上堂云千華顯瑞應萬善積靈臺廣闢解脫門大開無價藏乃至集無涯福祿祝睿算無強云云知識會忠曰供養華嚴入法界品五十三善知識也北澗簡禪師續集靈隱散知識會首求頌云無識無知五十三勞他童子遍咨參朝來靈隱羅齋去添得從前滿面慚祖師會圓悟勤禪師天寧録祖師會上堂云西天二十八祖也恁麼唐土六祖也恁麼天下列剎相望諸老宿也恁麼山僧也恁麼云云中峯本禪師廣録歷代祖師畫像讚序云臨濟十七傳而至仰山雪巖和尚先師入巖翁之室於羣弟子未造之先誤中其毒口耳俱喪既而深棲天目影不出山三十年無一法與人領荷杭之妙行寺嘗集五宗傳道之師遺像數千軸每遇歲旦展挂緇白瞻禮目之曰祖師會有好事者圖少林至天目直下相承二十八代祖師遺像歲遇少林諱日薦羞粢盛以酬遞代傳持之意退菴先禪師録有祖師會上堂雪巖欽禪師録嘯巖居士請自贊題注云入錢塘北關祖師會備用清規達磨祖師忌云住持專誠山門執事備辨維那侍者提點法堂敷陳玩具書畫忠曰祖師會在歲旦其達磨忌張列祖像亦是祖師會而已備用稱敷陳書畫似不局祖像日本東福寺每歲十月十七日聖一國師忌展挂名畫珍墨數百軸觀者如堵蓋攀中華儀也楞嚴會敕修清規云楞嚴會乃祈保安居其規詳彼又云四月十三日啓建至七月十三日滿散備用清規楞嚴會云古法放參後山門首諷誦真歇和尚住徑山謂衆不專誠則在粥罷又云普回向偈真歇和尚自製信知名行尊宿一舉四海一律也舊説曰夏中楞嚴會始於真歇了禪師真歇初住明州補陀山僧行悉病疫歇禱觀音大士大士夢中告云佛在世時有楞嚴咒須令僧行依戒臘行道誦持回向聖凡覺而依教行法果衆病平愈矣自此叢林依行但逐一回向歇後住徑山方作普回向偈天下遵用忠曰真歇作普回向文及觀音夢告誦咒脫疫沒可疑焉但如言夏中楞嚴會始于真歇為難信耳備用云古法放參後山門首諷誦真歇住徑山在粥罷既言古法則真歇已前有楞嚴會又普陀山志有十五卷第三卷云高宗紹興元年真歇清了禪師泛海結菴于山椒題曰海岸孤絶處郡請于朝易律為禪又第六卷載真歇小傳云此山禪宗蓋自師始稱開法第一世云止此不言觀音靈夢誦咒病愈事曹源生禪師録散楞嚴會上堂云將聞持佛佛何不自聞聞曼殊室利五臟心肝盡情吐露這裡薦得九十日內異口一音諷演摩訶悉怛多般怛羅無上神咒聲聲無間無見頂相無為心佛時時見前若也躊躇龜峯不免重下注腳卓拄杖一下遂高聲喚云侍者收取拄杖盂蘭盆會盂蘭盆經云大目犍連始得六通欲度父母報乳哺之恩即以道眼觀視世間見其亡母生餓鬼中不見飲食皮骨連立目連悲哀即以鉢盛飯往餉其母母得鉢飯便以左手障鉢右手摶食食未入口化成火炭遂不得食目連大叫悲號涕泣馳還白佛具陳如此佛言汝母罪根深結非汝一人力所奈何汝雖孝順聲動大地天神地祇邪魔外道道士四天王神亦不能奈何當須十方衆僧威神之力乃得解脫吾今當説救濟之法令一切難皆離憂苦佛告目連十方衆僧七月十五日僧自恣時當為七世父母及現在父母厄難中者具飯百味五果汲灌盆器香油挺燭牀敷臥具盡世甘美以著盆中供養十方大德衆僧當此之日一切聖衆或在山間禪定或得四道果或在樹下經行或六通自在教化聲聞緣覺或十地菩薩大人權現比丘在大衆中皆同一心受鉢和羅飯具清淨戒聖衆之道其德汪洋其有供養此等自恣僧者現在父母六親眷屬得出三塗之苦應時解脫衣食自然若父母現在者福樂百年若七世父母生天自在化生入天華光時佛敕十方衆僧皆先為施主家咒願願七世父母行禪定意然後受食初受食時先安在佛前塔寺中佛前衆僧咒願竟便自受食時目連比丘及大菩薩衆皆大歡喜目連悲啼泣聲釋然除滅是時目連母即於是日得脫一劫餓鬼之苦目連復白佛言弟子所生母得蒙三寶功德之力衆僧威神之力故若未來世一切佛弟子應亦奉盂蘭盆救度現在父母乃至七世父母為可爾否佛言大善快問我正欲説汝今復問善男子若比丘比丘尼國王太子大臣宰相三公百官萬民庶人行慈孝者皆應先為所生現在父母過去七代父母於七月十五日佛歡喜日僧自恣日以百昧飯食安盂蘭盆中施十方自恣僧願使現在父母壽命百年無病無一切苦惱之患乃至七世父母離餓鬼苦生人天中福樂無極是佛弟子修孝順者應念念中常憶父母乃至七世父母年年七月十五日常以孝慈憶所生父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩若一切佛弟子應當奉持是法時目連比丘四輩弟子歡喜奉行佛祖統紀云盂蘭盆經言是佛弟子修孝順者應念念中常憶父母乃至七世父母年年七月十五日以百味飲食安盂蘭盆中施佛及僧以報父母長養慈愛之恩止此盂蘭此翻解倒懸言奉盆供於三寶福田用以解飢虗倒懸之急又述曰目連託救母以興緣如來云奉盆以埀法所以教人道以報重恩也自大教東流古今帝王所以奉盆供者為多矣然今之寺舍多於此日施斛供亡如常法者雖無奉盆之儀而不失盂蘭之意忠曰依玄應意連盆字為梵語玄應一切經音義云盂蘭盆此言訛也正言烏藍婆拏此譯云倒懸按西國法至於衆僧自恣之日盛設佛具奉施佛僧以救先亡倒懸之苦以彼外書云先亡有罪家復絶嗣無人祭神請救則於鬼處受倒懸之苦佛雖順俗亦設祭儀乃教於三寶田中深處功德舊云盂盆是貯食之器此言誤也又見祭供門盂蘭盆供處雲棲正訛集云世人以七月十五施鬼神食為盂蘭盆大齋之會此訛也蘭盆緣起目連謂七月十五衆僧解夏自恣九旬參學多得道者此日修供其福百倍非施鬼神食也施食自緣起阿難不限七月十五所用之器是摩竭國斛亦非蘭盆蓋一則上奉聖賢一則下濟餓鬼悲敬異出惡可等混羣談採餘云中元七月十五日俗傳地官赦罪之辰人家多持齋誦經薦奠祖考攝孤判斛僧家建盂蘭盆會放燈水中及塔上謂之照冥官府亦登郡邑厲壇祭祀又羣談採餘云七月十五日盂蘭盆之説諸皆主佛經目連救母於是日以百味著盆中供佛然不知何謂盂蘭盆也及讀釋氏要覽云盂蘭猶華言解倒懸似有救母之説矣而盆字又無著落問之博識不知也後見老學菴筆記父老云故都於中元具素饌享先織竹為盆盂狀貯紙錢於中承之以竹逮焚倒以視方隅而占冬之寒暖謂盂蘭盆乃知風俗祀先全無佛氏之意因而考夢華録亦云以竹斫成三腳上織燈窩謂之盂蘭盆又買素食擦米飯享先以告報秋成但多目連經搬其雜劇數言反覆思之盂蘭盆實起於風俗而目連救母之事偶符是日且佛氏盂蘭盆二字之音又與之同遂訛而為盂蘭盆也或當是此箊籃盆三字亦不可知但佛教與祀先之事日崇而風俗之事日遠且微也故不復知前知義併筆記華録抄過亦錯但於三字難通因得其説贅之於稿忠曰欲通盂蘭盆字義何不讀大盆經小盆經此三字本出于佛經而燈窩為盂蘭盆告報秋成或視焚倒占寒暖皆起於俚俗謬作倪綰不言世俗訛轉佛氏盂蘭盆而為盂蘭盆實起於風俗不辨本末也要知俗儒有此説故收録釋氏通鑑唐代宗大曆元年紀云七月壬午作盂蘭盆會于禁中設高祖太宗已下七聖位建巨幡各以帝號標其上自大廟迎入內道場鐃吹鼓舞旌幢燭天是日立仗百僚於光順門迎拜導從自是歲以為常忠按唐書元載傳載此事水滸傳云七月十五日盂蘭盆大齋之日年例各處點放河燈修設好事忠曰河燈小片板樹燭流之於水上今大清僧寺七月修水懺作此其實事係水懺而不關盂蘭矣祈禱舊説曰有災則祈禱無災則不用之故祈禱無定式敕修清規祈禱云凡有祈禱須如法嚴治壇場鋪陳供養住持專心加謹僧衆各務整肅義堂日工集云余告恕義天曰禪家大尊宿病中或臨終祈禱是何義儒尚言丘之禱久矣况出家視生死如幻乎又今時例為住持本命祈禱于方丈是則取笑於有識者公他日據師位莫隨例顛倒矣祈保忠曰禱保安也敕修清規楞嚴會云楞嚴會乃祈保安居又月分須知云有處四孟月大衆行道諷經祈保祈晴敕修清規有祈晴祈雨祈雪遣蝗禳日蝕禳月蝕等疏語凡有災厲則無不禱焉舊唐書五行志云大曆四年秋大雨是歲自四月霖澍至九月京城閉坊市北門門置土臺臺上置壇及黃幡以祈晴秋末方止忠曰土臺土剋水黃亦土色剋水義也祈雨祈雪祈雨祈雪等見祈晴處法藏別傳云景雲再春時雨罕潤冬又不雪人皆籲天君命召藏禁中懇訊救農之術乃啓沃曰有經名隨求則得大自在陀羅尼若結壇淨寫是總持語投於龍湫應時必獲詔可其請遽往藍田山悟真寺龍池所作法未旬大雪禳日蝕禳月蝕見祈晴處遣蝗見祈晴處青苗會祈保田稼也敕修清規月分須知云五月端午日住持上堂次第建青苗會堂司預出諸寮看誦經單幻住菴清規云五月二十八日起青苗經會三日至六月初一日散須預備香燭供料并立疏文及預出經單請大衆結緣披閲然後聚其經目入疏回向又青苗經疏云歲遇中夏當植物長茂之時啓建青苗勝會用保田疇仰祈護祐南堂欲禪師本覺録上堂云毗盧藏中有大經卷主伴互融理事俱顯及乎點讀開科多是討頭不見山門保護青苗為汝提掇一遍卓拄杖乃合掌云稽首文殊普賢却須管取一百四十大願下座忠曰蓋青苗會轉華嚴經也介石朋禪師能仁録有保苗上堂明極俊禪師寶林録有散青苗經上堂石溪月禪師報恩録清拙澄禪師圓覺録等有青苗會上堂不斷輪敕修清規祈禱云如祈晴祈雨則輪僧十員草員或三五十員分作幾引接續諷誦每引諷大悲咒消災咒大雲咒各三七遍謂之不斷輪終日諷誦必期感應方可滿散懺謝忠曰輪者自第一引次第精修數引終則復第一引臨場如輪環然故言輪浴佛佛祖統紀云摩訶利頭經四月八日是佛生日人民念佛浴佛形像舊説曰浴佛香湯方沉香一兩白檀一兩甘松半兩丁子半兩熏陸半兩芎藭半兩鬱金一錢參分此七種盛淨布囊投於鐺內用淨水三揆煎減二揆移鐺冷之然後盛浴盆天中記云四月八日浴佛以都梁香為青色水鬱金香為赤色水丘隆香為白色水附子香為黃色水安息香為黑色水以灌佛頂誕生佛像法見靈像門傳燈録藥山儼禪師章云師見遵布衲洗佛乃問這箇從汝洗還洗得那箇麼遵曰把將那箇來師乃休臘八浴佛見佛成道會處浴聖浴聖僧也敕修清規知浴云浴頭覆維那首座住持畢鳴鼓三下浴聖桶內皆著少湯燒香禮拜想請聖浴高僧傳道安傳云安立誓願生兜率忽有異僧形甚庸陋來寺寄宿寺房既窄處之講堂時維那直殿夜見此僧從窗隙出入遽以白安安驚起禮訊問其來意答云相為而來安曰自惟罪深詎可度脫彼答云甚可度耳然須更浴聖僧情願必果具示浴法安請問來生所之處彼乃以手虗撥天之西北即見雲開備覩兜率妙勝之報爾夕大衆數十人悉皆同見安後營浴具見有非常小兒伴侶數十來入寺戲須臾就浴果是聖應也法苑珠林洗僧法云敷揚玄教已自周圓嚴儀洗具後皆備訖唯衆一心奉請三寶稽首歸依上請十方諸佛三世慈尊五分法身真應兩體九十八使惑纏已盡三十二相微妙莊嚴實無四求假同四事為衆生故有感便來唯願各各乘摩尼寶殿坐碼瑙雲中放百億光明照三千剎土梵王持蓋帝釋布華降此道場入溫室浴次請發心已上補處已還歡喜離垢之人善慧法雲之士三賢十聖一切諸菩薩惟願運天人於掌內安法界於毛端齊馭四足之靈鵬俱騁六通之神驥不見相而見不來相而來降此道場入溫室浴次請山中宴坐獨覺大人言下證真四果高士及向趣聖僧賓頭上座等惟願空中振錫戲六神通雲內持瓶具十八變發波斯之正信伏勞度之邪心及此現前和合大衆百千臘已下乃至無臘並入溫室浴次請弘慈本誓誓度四生方便善權權形六道隨聲即至如影赴身不念即彰不請之友並入溫室浴次請三界天衆四海龍王八部鬼神一切含識有形之類蠕動之流並入溫室浴又南海寄歸傳出灌沐尊儀法焚疏忠曰日本禪林修正滿散解夏滿散焚疏及經馬紙錢在諷經後而諸清規未録此化紙錢見錢財門大慧為孟宗丞普説云本朝仁宗皇帝時京師有言法華者不知從何所來常行闤闠中飲啖無所擇道俗莫能凡聖之時呂文靖公作相欲驗其真偽遂焚疏請明日就府第齋言公如期果至文靖遂釋所疑跪爐敕修清規聖節云兩序分班對立住持就跪知客跪進手爐侍者跪進香合維那白佛宣疏畢知客跪接爐住持收坐具備用清規聖節云或住持受州縣關請上首知事偏位跪爐庫司客頭跪進手爐復跪接爐庫司茶頭跪進香合又如來降誕云如或住持它緣首座偏位跪爐聖僧侍者堂司庫子跪進手爐香合方丈侍者亦得為法重也古宿公論唯佛祖忌當首座代住持為傳法故聖節知事代為山門也大慧笑翁皆行之舊説曰聖節知事代住持跪爐由山門設供矣若三佛二祖率衆財設供則首座代住持偏位跪爐聖僧侍者進手爐庫司行者進香合如今日本三佛二祖山門設供而住持不在則須都寺偏位跪爐也忠曰備用重法故首座代住持舊説則衆財設供非由山門故首座代焉若依備用意則三佛二祖雖山門設供須首座代住持也又按備用言知事代為山門也者謂聖節事係山門世諦也非謂為山門設供舊説庶於野矣敕修清規楞嚴會云原夫大衆拜與住持跪爐宣疏者以祝聖壽報佛恩當嚴其禮以示特重僧史略云據寄歸傳中曰焚香胡跪歎佛相好合是導師胡跪爾胡跪法詳禮則門忠曰跪爐亦見世禮戒環法華要解云偏右肉袒示降志尊法右膝虔跪示屈節致欽也袒跪不唯西竺之禮此方春秋鄭伯肉袒降楚示為臣僕及禱則跪爐祭則跪奠皆致欽也宋史禮志忌日云命行香羣臣班殿下宰相一員升殿跪爐而罷通揖又云宰相執政官分左右行香訖執笏俱復位次引班首升殿詣香案前俯伏跪搢笏執爐俟讀疏畢執笏俯伏興降階復位又再拜退出班上香敕修清規聖節云行者鳴鈸維那轉身爐前揖住持上香燒香侍者捧香合次東堂西堂出班上香次兩序對出向佛問訊上香畢兩兩相朝轉身歸位大衆同展三拜又兩序出班上香云凡出班上香行者鳴鈸維那出爐前向外偏立揖住持上香侍者捧合次揖兩序相朝而出轉身問訊住持謂之借香然後上香若聖節佛祖嗣法師忌無借香問訊有立班西堂當先上香或謂首座已出世當先上香者非蓋必與都寺同出班故也忠曰出班燒香亦見世禮宋史所謂宰相執政官分左右行香止此是也見跪爐處揖班上香即出班上香也敕修清規佛降誕云維那揖班上香放生佛祖統紀云放生光明經述流水長者救魚十千天子報德此緣起也智者買斷簄梁悉罷江上採捕此立法也赴計詡獄中之難報修禪堂上之恩此顯驗也此三事並見知者紀唐肅宗乾元二年詔天下置放生池凡八十一所顏真卿為碑本朝真宗天禧元年詔復天下放生池沿江淮州郡上下水五里並禁採捕二事詳見通塞志慈雲奏西湖為放生池以四月八日會郡人縱魚鳥法智於南湖以佛生日放魚鳥祝聖人壽樞密劉均奉敕撰碑此皆放生之梗槩也釋門正統曰復次精舍所踞號曰仁祠式警羣迷聿形悲濟於彼坊佐或臨江湖川澤汙沼隄防之處多有因高就下普化博施捐以為放生池者濫觴雖非於真經滲漉實推於佛隴自天台海曲買滬梁之地綿亘三百里敷奏王家全宥潛蟄因草菴曰海上漁人截流一網巨尾纖鱗皆為所有一日何止萬死耶智者嘗創放生池於海涯當其放之也則為授歸戒説大法然後縱之海中圉圉洋洋得其所也而不知日活幾千萬億乎智者沒至唐末中國台道漸息而海東諸國極熾忠法師謂智者緣在此方而道敷于海東者此必放生諸魚所致耳聞者莫不笑之以余觀之其語若誕教理有憑流水十千天子即脫魚報豈非此乎中興以來祥開延慶化廣葛川金塘大堤歌放劉禮部之頌溍潯淥浦酬於王丞相之恩故教行録金園集各有放生儀軌鱗番疊幅率土化之佛生之旦衆大和會浮泛綵蠲演唱竺墳悟流水勝因識銜珠善報者舉袂揚塵揮汗成雨固不待於百年而後勝殘去殺也况動以祝聖為名則憂國愛君顧不韙歟又利生志中廣説文繁不録放生事在外典列子説符篇云邯鄲之民以正月之旦獻鳩於簡子簡子大悅厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰然第十七類諷唱門諷經敕修清規祈禱云鳴鐘集衆諷經南禪規式夏中罰不赴諷經者法云籤書衆僧雙字名實筒每日勤行時堂司行者置籤筒於佛前諷經畢住持指筒堂司行者取筒振掉三而至住持前維那出班至住持右邊住持抽籤度之維那接之呼所書名三度若無答者則知不赴乃以籤度聽叫不赴人上方丈乞籤若懈及數回則住持小片紙書罰金式貼佛殿柱罰金一片懈者納之方丈六諷經忠曰每月兩回六諷經謂初二日土地初三日祖師初四日火德初五日韋天初六日普菴初七日晚鎮守自十六日至二十一日亦如上次第矣其初二及十六土地諷經見幻住清規自餘未得中華書所載又未知此方何人肇製也二日十六日土地諷經幻住清規云每月初二十六是衆聖衙會之辰常住營備香華燈燭茶果珍羞就土地堂鋪設供養大衆諷楞嚴咒興禪護國論云土地神事謂每月初二十六兩日諸神法施隨處不同忠曰禪林土地諷經用此日而榮西時已立規焉每日三時諷經忠曰每日粥罷齋罷放參罷此三時上殿諷經也蓋粥前坐禪不可諷經齋前亦坐禪不可諷經故敕修清規亡僧云齋粥殿堂諷經罷及放參罷首座領衆至龕前維那舉大悲呪備用清規日用清規云食訖鳴槌一下住持下地次第挂鉢出堂上殿諷經祖庭事苑云日晡念誦謂之晚參詳小參處無住雜談集云東福開山聖一常令衆早朝誦楞嚴咒日中諷尊勝陀羅尼渡宋僧啓曰若依宋地規則此山事行多矣師曰宋地僧專修坐禪四時坐禪外更有常坐者故事行少矣如日本僧疏于定坐若不修誦咒何以消信施或修禪如宋土則止諷誦亦可也尊勝咒功德消信施見于其經夢窗國師夢中問答集云唐土禪院每朝粥後唯誦大悲咒一遍耳蓋坐禪為急務故若誦楞嚴咒名為楞嚴會亦是近代始起然但於夏中矣每晚誦楞嚴咒名放參者日本始行如唐土放參別有規矩建長寺本無日中諷經弘安年中有蒙古襲我之流言日中始誦普門品以禱寧謐自此為永式遂成朝中暮三時勤行雖非宗意慣習既舊後代長老不得停罷焉雖然末世僧多懶惰不勤禪坐苟有此輩則徒略諷誦無益且當負彼重世法好祈禳檀主之意故禪院不可缺三時諷經其回向意專祈天下太平檀信安穩耳矣隊和尚和泥合水云教家未聞有誦經咒成佛道之理况乎禪宗若依看經成佛則世尊用六年端坐為什麼何禪録載事三時勤行耶原之日本弘安年中有蒙古襲我之説時官家令佛寺行祈禱此為濫觴矣山僧熟思者般實非祈禱却是佛法王法衰替因緣也其故何謂若不為如此勤行乃至俗學文筆費時日直從出家本志放下一切單單以坐禪行道為專要扶豎教外別傳宗猷則應當佛法王法繁興師檀同遊戲解脫大海然則諸神加擁護天龍生欣悅魔外悉屈伏矣現當二世祈禱何以加焉忠曰朝午諷經敕修亡僧章可以為證晡時諷經事苑文可以為證然則中華亦有三時諷經夢窗所議蓋在日本以此為專行不務坐禪乎日中諷經忠曰中華齋罷諷經可在日中見三時諷經處如日本日中諷經正在齋前義堂日工集云府君赴西芳精舍臨齋君就于僧堂聽衆僧誦金剛經云每寺如是乎余曰日本號日中諷經者昔為外國敵來襲建長寺始誦法華普門品爾來每寺或誦金剛法華圓覺等經今天龍臨川等則以南禪為準等持則讀圓覺經君信心增發形於面貌半齋諷經舊説曰早粥已過午齋未及在其中間諷經故曰半齋諷經又見節時門半齋處敕修清規達磨忌云堂司行者覆來日半齋各具威儀散忌諷經臨齋諷經舊説曰祖師半齋諷經亡者臨齋諷經臨齋者臨午齋之時也又見節時門臨齋處結緣諷經敕修清規開山歷代祖忌云或鄉人或江湖舉咒解者曰結緣諷經也念誦覺苑大日經演密鈔云梵語瞿醯此云念誦忠曰今禪林念誦謂念十佛名也三八日念誦見節時門三八日處敕修清規念誦云維那先離位至門首向住持立合掌念誦上八中八云云下八云白大衆如來大師入般涅槃至今大元重紀至元元年已得二千二百八十四載是日已過命亦隨減如少水魚斯有何樂衆等當勤精進如救頭然但念無常慎勿放逸伽藍土地護法護人十方檀那增福增慧為如上緣念清淨法身十號云云忠竊按下八念誦本於西竺法何以知之中論吉藏疏云外國祇洹精舍銘出在古涅槃經後載之云佛正法千年像法千年末法萬年天竺朝夕衆中恆唱此事云佛法若千年已過佛法欲滅老死至近宜須精進每日念誦於食時念之大鑑小清規維那須知法曰凡齋粥二時僧堂念十佛云云先出聲念逐日小回向滿堂聞回向聲次大出聲念十佛名多有維那不依唐僧説堅執日本古例不念小回向云云逐日回向如彼文繁不録傳燈録甘贄行者章云於南泉設粥云請和尚念誦南泉云甘贄行者設粥請大衆為貍奴白牯念摩訶般若波羅蜜甘乃禮拜便出去南泉却到廚內打破鍋子十佛名舊説曰凡十念之稱可通一切佛號然道安所制食時十念特稱為十念矣即今十佛名也十是存大數實佛名不到十或復除阿彌陀大勢至拘十句之數非也釋迦是穢土佛文殊普賢其弟子而表理行彌陀是淨土佛觀音勢至其弟子而表悲智此六名淨穢相待而標舉已取伴之觀音豈可去主之彌陀耶凡釋迦現穢國教衆生厭此求彼彌陀居淨邦迎衆生接取不捨此謂遣迎矣而今之揀意亦在此故彌陀勢至不可除也又彌勒是穢土東宮觀音勢至是淨土東宮也若然則可配于何位次偶覽一書彌勒次云極樂世界阿彌陀佛又觀音次云大智勢至菩薩吳尅己所録釋道安食時念三寶列次亦同此吳尅已編釋門正統今本宗鑑述多資彼釋門正統云佛圖澄有弟子曰道安令僧食時念佛取法報見未攝攝及二土四大弟子為十聲餘為結句也或者昧之溺於數而缺其所念過矣忠曰法報可知見現在釋迦未未來彌勒二土娑婆極樂四大弟子彼土觀音勢至此土文殊普賢也攝攝者何舊説曰彌陀是攝取不捨之佛故云攝也次攝總攝義謂十方三世一切諸佛也東福雲章慶和尚製十佛科圖自述意曰十佛名古來諸祖未檢得本據明國亦無明答者豫頃於道安法師傳得之仍作科線如左總念稽首薄伽婆圓滿修多羅大乘菩薩衆功德難思議忠曰上三句如次佛法僧別念佛別法清淨法身毗盧遮那佛報圓滿報身盧舍那佛應此土本師千百億化身釋迦牟尼佛補處當來下生彌勤尊佛他土西方無量壽佛總十方三世一切諸佛僧別此土弟子理大聖文殊師利菩薩行大乘普賢菩薩他土弟子悲大悲觀世音菩薩智大智勢至菩薩總諸尊菩薩摩訶薩法摩訶般若波羅蜜忠曰彌陀報身科何為應身謂勝應身也復觀音補處乎樂土見觀音授記經則彌陀當入涅槃入涅槃之佛豈非應身耶又文殊言大聖者華嚴演義鈔云言大聖者即文殊也不指其名直言大聖今山中稱念但云大聖菩薩即舉總稱別指吉祥耳忠曰山中者謂五臺山也又曰毗盧遮那此云遍一切處盧舍那此云光明遍照又翻淨滿釋迦牟尼此云能仁寂默翻譯集忠曰律苑事規載佛名十方三世一切諸佛下加大小兩乘毗尼戒藏一切法寶大勢至菩薩下加十方三世諸大菩薩南山聖師菩薩大智律師菩薩西天此土傳法祖師聲聞緣覺得道真僧而無諸尊菩薩已下兩句蓋以古來十佛名無己宗祖名所依法名為闕典矣又曰永平清規赴粥飯法舉之加大乘妙法蓮華經一句古東福寺十佛名岐陽和尚勢至下加聖一國師忠曰十佛名每日粥飯二時唱之道安云令僧食時念佛止此已言食時則粥時飯時應皆念也五觀日用軌範展鉢法云作五觀想念云一計功多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正事良藥為療形枯五為成道業故應受此食忠曰此全依釋氏要覽所載而要覽不言出處行事鈔對施興治篇云約食時立觀以開心道略作五門明了論如此分之行事鈔隨戒釋相篇云食須觀門五別一計功多少量彼來處二自忖己德行全缺多減三防心顯過不過三毒四正事良藥取濟形苦五為成道業世報非意又對施興治篇云初計功多少量他來處智論云思惟此食墾植耘除收穫蹂治舂磨洮沙炊煮乃成用功甚多計一鉢之食作夫流汗集合量之食少多須臾變惡我若貪心當墮地獄噉燒鐵丸從地獄出作諸畜生償其宿債或作豬狗常噉糞除故於食中應生猒想僧祇云告諸比丘計此一粒米用百功乃成奪其妻子之分求福故施云何棄之二自忖己身德行毗尼母云若不坐禪誦經不營佛法僧事受人信施為施所墮若無三業知故而施俱為施墮比丘強飽食施主食憍慢意或自食己食強飽過分為施所墮以其食亦從施主得故何以故佛長夜中常嘆最後限食謂末後減口食施持戒者能受能消施持戒果報大破戒果報少如是呵責如上律文足食已更強食者不加色力但增其患故不應無度食三防心離過明了論疏云律中説出家人受食先須觀食後方得噉凡食有三種上食起貪應離四事一喜樂過貪著香味身心安樂縱情取適故二離食醉過食竟身心力強不計於他故三離求好顏色過食畢樂於光悅勝常不須此心四離求莊嚴身過食者樂得充滿肥圓故二者下食便生嫌瞋多墮餓鬼永不見食三者中膳不分心眼多起癡捨死墮畜生中作諸噉糞樂糞等蟲初貪重故並入地獄且略如此反此三毒成三善根生三善道謂無貪故生諸天中下二可知四正事良藥觀分二為除故病飢渴不治交廢道業不生新病食飲減約宿食消滅又以二事為譬初如油膏車但得轉載焉問油之美惡二欲度險道有子既死飢窮餓急便食子肉必無貪味五為成道業觀三種一為令身久住故欲界之身必假摶食若無不得久住道緣無託故二為相續壽命假此報身假命成法身慧命故三為修戒定慧伏滅煩惱故持世云若不除我倒此是外道不聽受人一杯之水佛藏亦爾必厭我倒於納衣粗食不應生著佛藏經云舍利弗乞食比丘乞食得已心無染污持所得食從聚落出在淨水邊可修道處置食一面洗腳而坐以食著前應生猒離想不淨想屎尿想臭爛想變吐想塗瘡想猒惡想子肉想臭果想沈重想又於身中應生死想青想脹想爛壞想舍利弗比丘應生如是想以無貪著心然後乃食但以支身除飢渴病令得修道應作是念我食此食破先苦惱不生後苦心得快樂調適無患身體輕便行步安穩又念食此食已我應當得須陀洹果斯陀含果阿那含果阿羅漢果無生法忍舍利弗比丘如是食者我聽乞食舍利弗若乞食比丘於所得食生貪味心以為甘美而作是念我食此食當得好色氣力充盛不作是念我食此食勤行聖道如是比丘我乃不聽受一飲水何况飲食舍利弗若於食中不見過惡不見出道而便食者寧自以手割股肉噉何以故我聽行者得者受他供養不聽餘人經廣説行者得者相大意謂行道者得道者忠曰此經文中有五觀中後四觀意第一觀依智度論意又第二觀所謂德行乃佛藏得者行者也德者得也瑜伽師地論云若飲食時常當安住為療病想咒願舊説曰齋粥咒願前堂首座唱之粥時咒願云粥有十利饒益行人果報無邊究竟常樂齋時咒願云三德六味施佛及僧法界有情普同供養南本涅槃經云其食甘美有六種味一苦二醋三甘四辛五鹹六淡復有三德一者輕軟二者淨潔三者如法粥十利見飲啖門增一阿含經云世尊告諸比丘咒願有六德施主檀越成就三法信根成就戒德成就聞成就施物復成三法物色成就味成就香成就忠曰物色味香是咒願六德中三法亦可稱三德禪苑清規赴粥飯云十聲佛罷良久打槌一下首座施食粥云粥有十利饒益行人果報生天究竟常樂又云粥是大良藥能除飢渴消一本作除消飢渴施受獲清涼共成無上道齋云三德六味施佛及僧法界人天普同供養饡飯云施者受者俱獲五常色力命安得無礙辨已上並引聲高喝一本作唱也南禪規式云僧堂粥齋咒願第一座唱之若闕則書記或藏主代之後堂首座必不得代之在後堂故釋氏要覽云十誦律云佛言應為施主種種讚歎咒願若上座不能即次座能者作舊説曰凡喫食每三口咒願此名三口咒願蓋為防雜念然機劣不堪故但於初三口而已釋氏要覽云摩德伽論云若得食時口口作念凡食限三匙為一口第一匙默云願斷一切惡第二匙云願修一切善第三匙云所修善根回向衆生普共成佛準論須口口作念若省繁但初口三匙總念亦得僧史略云西域上座凡赴請咒願曰二足常安四足亦安一切時中皆吉祥等以悅可檀越之心也忠曰一切事緣皆可咒願如華嚴淨行品又法苑珠林受請篇行事鈔訃請設則篇廣明咒願無住和尚雜談集亦詳説唱食食時咒願曰唱食謂唱食之咒願也或作喝食非也喝食見叢軌門敕修清規維那云俟首座唱食至第三句將畢轉身退至立僧板頭立備用清規維那云首座唱食至有無字朝龕轉身退立板頭敕修清規後堂首座云如缺前堂住持別日上堂白衆請轉前板插單唱食又法器章椎云齋粥二時僧堂內開鉢念佛唱食遍食施財白衆皆鳴之施食唱食又名施食與施餓鬼食不同施餓鬼食見喪薦門禪苑清規云首座施食粥云粥有十利云云齋云三德六味云云施食訖行者喝食入詳咒願處傳燈録睦州刺史陳操章云一日齋僧自行食次曰上座施食上座曰三德六味陳曰錯上座無對施財禪苑清規赴粥飯云維那打槌一下首座施財喝云財法二施等無差別檀波羅蜜具足圓滿庫頭或維那次第行嚫輕手放僧前單上意在恭敬衆僧合掌受嚫不得眼覷及不得將嚫錢擲被位作聲齋畢收之敕修清規維那云若施主齋僧行嚫遍食椎後從聖僧後轉左邊朝首座問訊復鳴椎一下而出為請施財也資持記云達嚫梵言此翻財施世謂以財襯食故名嚫者不識華梵又召説法為施財者並非詳錢財門達嚫處聯燈會要甘贄行者章云甘到南泉設粥時黃蘗為第一座甘云請施財蘗云財法二施等無差別甘舁錢出去須臾復云請施財蘗復云財法二施等無差別甘便行錢懺法釋氏資鑑云梁武帝妃郗氏有三女帝為雍州刺史而妃薨其性酷妬至是化為巨蛇入于後宮通夢于帝求功德拯離苦帝閲大藏製慈悲懺法請僧禮佛懺罪尋化為天人於空中謝帝功德已得生天帝畢世不復議立后南史云武德郗皇后諱徽齊建元末嬪于武帝及武帝為雍州刺史殂于襄陽官舍年三十二及武帝踐祚追崇為皇后諡曰德后酷妬忌及終化為龍入于後宮通夢於帝或見形光彩照灼帝體將不安龍輒激水騰涌於露井上為殿衣服委積常置銀鹿盧金瓶灌百味以祀之故帝卒不置后歷代三寶紀大隋録云文帝開皇元年七月制曰伏惟太祖武元皇帝間關二代造我帝基追仰神猷事冥真寂思欲崇樹寶剎經始伽藍增長福因微副幽旨其襄陽隋郡江陵晉陽並宜立寺一所建碑頌德庶使莊嚴寶坊比虗空而不壞導揚茂實同天地以久長所以每年至國忌日廢務設齋造像行道八關懺悔奉資神靈忠曰懺悔法追薦先亡梁隋時已見焉神僧傳云悟達國師知玄與一僧邂逅京師時僧患迦摩羅疾人莫知其異也皆厭惡之知玄視候無倦色後別僧謂知玄曰子後有難可往西蜀彭州荼隴山相尋有二松為志後知玄居安國寺懿宗親臨法席賜沈香為座恩渥甚厚忽膝生人面瘡眉目口齒俱備每以飲食餧之則開口吞啖與人無異求醫莫效因憶舊言乃入山相尋見二松於煙雲間信所約不誣即趨其處佛寺煥儼僧立于山陰顧接甚歡天晚止宿知玄以所苦告之曰無傷也山有泉且濯之即愈黎明童子引至泉所方掬水間瘡忽人語曰未可洗公曾讀西漢書不曰曾讀既曾讀之寧不知袁盎殺朝錯乎公即袁盎吾朝錯也錯腰斬東市其冤何如哉纍世求報於公而公十世為僧戒律精嚴報不得其便今汝受賜過奢名利心起故能害之蒙迦諾迦尊者洗我以三昧法水自此不復為冤矣時知玄魂不住體急掬水洗之其痛徹髓絶而復蘇其瘡亦旋愈回顧寺宇莽不復見因卓菴其處遂成大寺知玄感其異思積世之冤冤非遇聖賢何由得釋因述懺法三卷蓋取三昧水洗冤業之義名曰水懺釋氏稽古略云匡宗大德諱知玄姓陳氏咸通四年制署號悟達國師總教門事十二年五月帝幸安國寺賜師沈香裝飾寶座高二丈餘珍麗絶甚僖宗中和二年駕幸蜀避黃巢至成都遣御史郭遵賚璽書召師赴行在次年師自成都行宮辭還九隴山一珠隆起于左股楚甚是曰人面瘡遇異僧引水洗瘡知為朝錯袁盎冤對也今之水懺三卷者緣起於師也師亦自知時謝右脅安然而逝師三學洞貫名蓋一時世稱陳菩薩圓通懺法六學僧傳隋智顗傳云永陽王伯智出撫吳興就山受戒且建方等懺法七日夜在郡晝治事夜習觀顗一日謂門人智越曰吾欲勸王修福禳災越以為王已勤於進道若更有所言不知者以為佞也乃止俄王出獵墮馬幾絶顗為率衆作觀音懺法因而起憑几坐見僧擎罏進慰問王時王流汗未知所答僧乃繞王一匝痛遂止續高僧傳載今愛文簡明故引六學清拙澄禪師圓覺録上堂云元正五日或演唐音修禮圓通懺法而作佛事或出日本音唱念法華懺法而作佛事又日本録鐵菴和尚七周忌升座云賢弟子出家在家同心竭力修建報恩佛事看讀五部大乘尊經修禮圓通懺法愚中及禪師年譜云曆應四年秋發博多冬到明州船中水盡數日師與同志修圓通懺摩法以祈雨水密雲忽布大雨滂注船中數百人飲之得活臥雲日件録云誠中住相國時林光院某為衣鉢侍者一日勝定相公來聽懺法於方丈及懺悔文畢俄起到茶堂召林光某曰長老不唱懺雪罪愆增延福壽之語耶明日懺法宜唱之蓋等為法界之等字下有此八字或唱或否相公試來聽果不唱故告之而已相公以叢林為念至細鎖如此轉經會臥雲日件録云寶德二年庚午九月天龍寺夢窗國師一百年忌修轉經會曰草九日早晨聞轉經鐘衆集雲居伶人作舞六長老鳴鐃一長老唱摩訶般若波羅蜜多景南引衆行道衆各手把一卷經自雲居出天龍總門到三會院院內及臨川諸堂諸廊行道旋繞無不到處却出經舊路復到雲居門外導師未及一匝而行道才畢傳燈録薦福弘辨禪師章云唐宣宗問曰禪師既會祖意還禮佛轉經否對曰沙門釋子禮佛轉經蓋是住持常法有四報焉然依佛戒修身參尋知識漸修梵行履踐如來所行之迹碧巖録云古人道手不執經卷常轉如是經法華經玄義云如此解字手不執卷常是讀經口無言聲遍誦衆典轉藏忠曰轉讀大藏經也蓋轉藏與看藏不同看者每行閲過自首徹尾轉者唯讀每卷初中後數行而已初七行中五行後三行敕修清規旦望藏殿祝讚云旦望古來轉藏祝壽今則必先侵晨登殿御座前祝讚於禮為恭圓覺會北澗續集云圓覺會首求頌頌曰大圓覺海勝伽藍七佛之師首發談引得上乘菩薩子大光明藏作同參無門開禪師録圓覺會頌云十二呆郎欲決疑瞿曇嚼飯餧嬰兒若教知有衲僧事終不人前鼓口皮華嚴會曹源生禪師録散華嚴會上堂云一多相入理事圓融一門通貫一切門一法遍含一切法云云大慧杲和尚年譜云孝宗隆興元年師七十五歲時住徑山出衣盂命闔山清衆閲華嚴經七百餘部用祝兩宮聖壽保國康民讀法華千部竺仙仙禪師南禪録左武衛將軍源公為乃母二品太夫人請普説云左武衛將軍為二品太夫人真歸以來不知已作多少功德了也今當五七之辰只於昨日一日之間命諸山僧衆同時看誦妙法蓮華經一千部讀大般若經義堂日工集云康曆三年二月四日率衆就于上府真讀大般若祈禱府君疱瘡平安轉大般若經忠曰轉讀法見轉藏處轉讀般若見蘇悉地經蘇悉地羯羅經成就具支法品云猶不成者當作此法決定成就所謂乞食精勤念誦發大恭敬巡八聖迹禮拜行道或復轉讀大般若經七遍或一百遍梁高僧傳慧皎論云天竺方俗凡是歌詠法言皆稱為唄至於此土詠經則稱為轉讀歌讚則號為梵音藥師號敕修清規聖節云如官員入山拈香鳴鐘集衆諷無量壽咒舉藥師號義堂日工集云康曆二年時住建仁五月十三日府君入山入佛殿炷香三拜余送歸特榻乃燒香歸知事班首與官榻對立行者鳴磬真珠西堂舉唱藥師如來侑藝正仁二僧和之維那舉大悲咒余炷香三拜回向畢余引君入方丈而點心詳圖牌門接官牌臥雲日件録云普明國師住南禪日以藥師如來聲明廢絶及五十年欲復興立擇山中能音者五十人習之皆不稱國師意時誠中為書狀勤舊在方丈國師命之一唱得其妙遂與梅靖梅隱同唱之四聖號如如居士録藏眼語云清辰請念四佛聖號注南無阿彌陀佛南無觀世音菩薩南無大勢至菩薩南無大海衆菩薩敕修清規尊宿遷化起龕云山門維那向內合掌中立舉往生咒或四聖號大衆齊念又病僧念誦白贊云仰憑尊衆念南無阿彌陀佛一百聲觀世音菩薩大勢至菩薩清淨大海衆菩薩各十聲解者曰清淨大海衆者總舉西方淨土諸菩薩也金剛無量壽佛忠曰祝聖回向略三寶有金剛無量壽佛無量壽者阿彌陀翻名蓋今祝天子壽考故特舉此佛名以充佛寶焉金剛者堅固義所以禱皇基鞏固也又有佛説一切如來金剛壽命陀羅尼經不空譯今祝聖回向無量壽上蒙金剛二字或取此等文乎仁王菩薩忠曰祝聖回向有仁王菩薩摩訶薩蓋非定有一人所名經有仁王護國般若今略三寶取之充僧寶矣又祝聖所以竊對配今上也仁王護國般若經吉藏疏云施恩布德故名為仁統化自在故名為王護國者仁王是能護國土是所護由仁王如法治道萬民適樂國土安穩若仁王望般若般若是能護由持般若故仁王安穩由人柄法仁王是能護般若是所護今仁王般若皆是能護國土是所護又云略簡仁王波若位地名字不同仁王者依瓔珞經云有十四王一粟散王十善下品二習種菩薩銅輪王王性種菩薩銀輪王四道種菩薩金輪王亦名轉輪王五初地菩薩四天王六二地菩薩忉利天王七三地菩薩琰魔天王八四地菩薩兜率天王九五地菩薩化樂天王十六地菩薩他化自在天王十一七地菩薩初禪王十二八地菩薩二禪王十三九地菩薩三禪王十四十地菩薩四禪王今言仁王者即是十善下品粟散王十四王內最下品也浴佛偈敕修清規佛降誕云維那宣疏畢舉唱浴佛偈云我今灌沐諸如來淨智莊嚴功德聚五濁衆生令離垢同證如來淨法身行道浴佛忠曰偈出浴像功德經唐寶思惟譯有一卷瑩山清規浴佛偈云稽首大聖薄伽梵天上天下兩足尊我等今以功德水灌浴如來淨法身止此未考出何典洞家諸剎唱此偈佛説浴像功德經云清淨慧菩薩白佛言世尊若佛在世及滅度後未來世中諸衆生等云何浴像佛言不作執空有想於諸善品心懷渴仰不生疲厭何以故為成就如來法報身故我今為汝説浴像法諸供養中最為殊勝應以牛頭栴檀紫檀多摩羅香甘松芎藭白檀鬱金龍腦沈香麝香丁香如是等妙香隨所得者以為湯水置淨器中先作方壇敷妙床座於上置佛以諸香水次第浴之用諸香水訖復以淨水淋洗其浴像者各取少許洗像水置自頭上初於像上下水時應誦以偈我今灌沐諸如來淨智功德莊嚴聚五濁衆生令離垢願證如來淨法身啓請忠曰凡諷經前奉請佛菩薩此為啓請敕修清規楞嚴會云白佛宣疏畢楞嚴頭喝楞嚴衆和忠曰喝楞嚴者即啓請也謂楞嚴會上諸菩薩之梵音是也備用清規作佛菩薩備用清規楞嚴會云楞嚴頭喝楞嚴會上佛菩薩三聲衆和東漸清規楞嚴會云維那歸位向佛宣疏畢行者鳴磬楞嚴頭舉啓請衆和忠曰瑩山清規作啓唱訛矣序引忠曰楞嚴會啓請後咒前念楞嚴經文敕修清規楞嚴會云楞嚴頭喝楞嚴衆和畢仍作梵音唱念經首序引畢方舉咒備用清規楞嚴會云楞嚴頭喝楞嚴會上佛菩薩三聲衆和了起爾時世尊云舉咒諷畢忠曰爾時世尊即楞嚴經咒前文所謂經首序引也瑩山東漸並名為佛母無義如下辨序引文云爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恆河沙金剛密迹擎山持杵遍虗空界大衆仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣説神咒咒心忠曰七月十三日楞嚴會滿散誦楞嚴經咒後文此為結咒心敕修清規楞嚴會云至七月十三日滿散禮同但楞嚴頭唱念咒尾之末章維那回向而散備用清規楞嚴會云滿散楞嚴頭須結咒心維那宣疏禮與啓建同忠曰結咒心者所謂咒尾末章也瑩山東漸並名為佛母無義如下辨咒心文云阿難是佛頂光聚悉怛多般怛羅祕密伽陀微妙章句出生十方一切諸佛十方如來因此咒心得成無上正遍知覺十方如來執此咒心降伏諸魔制諸外道十方如來乘此咒心坐寶蓮華應微塵國乃至十方如來傳此咒心於滅度後付佛法事究竟住持嚴淨戒律悉得清淨忠曰乃至字越却經文二伯字瑩山清規所載如此摩訶忠曰楞嚴咒尾唱念摩訶般若波羅蜜是也敕修清規楞嚴會云咒畢喝摩訶衆和畢維那回向佛母敕修清規旦望藏殿祝讚云鳴鐘集衆往藏殿維那舉云摩訶般若波羅蜜多乃至回向云繞旋行道稱念摩訶佛母聖號云云大品般若經云佛告須菩提般若波羅蜜是諸佛母般若波羅蜜能示世間相乃至何以故是般若波羅蜜出生諸佛又云須菩提白佛言云何諸佛從般若波羅蜜生云何諸佛説世間相佛告須菩提是深般若波羅蜜中生佛十力乃至十八不共法一切種智須菩提得是諸法因緣故名為佛仁王般若經云佛告大王般若波羅蜜應説應受是諸佛母諸菩薩母神通生處智度論云般若波羅蜜是諸佛母父母之中母功最重是故佛以般若為母般舟三昧為父忠曰敕修清規念摩訶般若畢回向言念摩訶佛母則佛母是稱般若波羅蜜明白也然東漸清規瑩山清規等指楞嚴咒前序引咒後咒心皆名為佛母且有何憑據備用但言起爾時世尊又言結咒心為經有咒心語也敕修但言經首序引咒尾末章始無名佛母豫謂楞嚴咒尾唱咒心次喝摩訶摩訶是佛母謬和咒心為佛母也是猶可辨至經序引稱佛母則都失義蓋咒尾楞嚴文謬稱佛母以謂楞嚴文在前後者皆是佛母也其訿謬有如此者猶如楞嚴會上諸菩薩是啓請語而咒後摩訶般若亦稱後啓請也試點撿摩訶般若有何啓請義又咒尾理可奉送却復啓請有何事豈非愚昧可笑者耶開啓初開法事之場也敕修清規聖節云預於某月某日啓建金剛無量壽道場一月日逐日輪僧上殿披閲金文今辰開啓滿散忠曰凡建會行法事畢臨散場諷誦曰滿散見咒心處散經忠曰轉大藏或某經畢修滿散佛事也真淨文禪師録檀越散藏經請上堂云奉佛至孝四郎及孝眷等為先考二郎終七追薦乃請真如聖壽二禪衆開轉大藏經一遍供僧一千員斯晨闔郭齋以用表懺云云應菴華禪師録檀越散藏經請小參云云散忌修忌法事滿散也敕修清規達磨忌云堂司行者報衆挂諷經牌當晚諷經并覆來日半齋各具威儀散忌諷經普回向敕修清規楞嚴會云每日粥罷乃至集衆諷咒畢楞嚴頭舉普回向偈大衆同聲念普回向偈敕修清規載備用云普回向偈真歇和尚自製止此見報禱門楞嚴會處回向忠曰諷誦之後願文以所修善業回向所願事也敕修清規聖節云維那舉楞嚴咒回向摩訶止觀云回向者回衆善向菩提一切賢聖功德廣大我今隨喜福亦廣大衆生無善我以善施施衆生已正回向菩提如回聲入角響聞則遠回向為大利知禮修懺要旨云修回向者所謂回事向理回自向他回因向果初回事向理者元由理具方有事用一切修證不出理性衆生強執計是有為今回此心向於實際回自向他者昔迷理遍凡所修善莊嚴自身及己眷屬今順本性回向衆生回因向果者一毫善種三業熏修不趣二乘寧滯三有修既順性則成緣了二因因必顯真同歸究竟三德是名回因向果此三種回向一切菩薩共修是故行人依此回向華嚴經十回向品疏云回者轉也向者趣也轉自萬行趣向三處故名回向三處謂衆生菩提及以實際上二皆隨相實際即離相疏更開三為十會十歸三今恐繁不録忠曰菩提與實際見在回向文其衆生者所謂四恩總報三有遍資法界有情同圓種智是也又華嚴出現品疏云真如語其體法界生法所依實際是窮事至實宣疏敕修清規聖節云維那白佛宣疏詳報禱門跪爐處凡祈禱三佛二祖忌皆有宣疏又見執務門僉疏處文疏門道場疏處白佛忠曰疏及回向首嘆佛語言白佛白者表白義敕修清規聖節云維那白佛宣疏又千秋節云維那舉楞嚴咒畢白佛回向又佛降誕云維那白佛云一月在天影涵衆水一佛出世各坐一華白毫舒而三界明甘露灑而四生潤嘆佛忠曰同白佛或儷語一聯或四句偈嘆佛功德也祝聖回向首巍巍金相堂堂覺皇是也敕修清規景命四齋日祝讚云維那舉楞嚴咒唱藥師號嘆佛畢回向續酉陽雜爼云平康坊菩提寺李右座林甫每至生日常轉請此寺僧就宅設齋有僧乙嘗嘆佛施鞍一具賣之材直七萬又僧廣有聲名口經數年次當嘆佛因極祝右座功德冀獲厚嚫齋畢簾下出綵篚香羅怕籍一物如朽釘長數寸僧歸失望遂攜至西市示於商胡驚曰此寶骨也直一千萬忠曰依此嘆佛之目來尚矣贊佛嘆佛又言贊佛敕修清規病僧念誦云排列香燭佛像念誦贊佛云水澄秋月現懇禱福田生惟有佛菩提是真歸仗處白贊歎佛或名白贊敕修清規病僧念誦云如病重為十念阿彌陀佛念時先白贊云阿彌陀佛真金色相好端嚴無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩衆亦無邊四十八願度衆生九品咸令登彼岸白真祖師忌回向文首唱儷語或偈文言白真備用清規達磨祖師忌云維那白真宣疏嘆真即白真也舊説曰祖師回向首語言嘆真謂寶明空海湛死生漩澓之波是也嘆靈舊説曰亡俗回向首語言嘆靈淨極光通達寂照含虗空是也忠曰嘆佛嘆真其義自存矣如亡俗則不可例佛祖以嘆其德也唯修善憑佛德而拔濟其靈耳何用嘆靈德故如施食法回向首語曰佛身充滿於法界普現一切羣生前豈是嘆亡靈德者哉故豫謂嘆靈之目杜撰也嘆經敕修清規旦望藏殿祝讚回向云大圓照中有華藏海功超造化道絶名言三光電卷而實相涵六合雷奔而湛然寂解者曰此是嘆經也略三寶舊説曰凡回向之尾必有十方三世等語此名略三寶謂十方三世一切諸佛是佛寶諸尊菩薩摩訶薩是僧寶摩訶般若波羅蜜是法寶也其鳴磬法十方一下諸尊一下摩訶般若一下分三寶也如祝聖回向金剛無量壽佛乃佛寶仁王菩薩摩訶薩乃僧寶摩訶般若波羅蜜乃法寶也鳴磬法準前可知聲明梵唄梵放忠曰稱號諷演流暢其聲此曰聲明瑜伽論説五明曰內明處醫方明處因明處聲明處工業明處止此佛家聲明亦彼攝也傳燈録聲明三藏善別音聲止此此辨五音亦是五明學流類瑜伽師地論説聲明中分六相第一法施設建立曰謂名身句身文身及五德相應聲一不鄙陋二輕易三雄朗四相應五義善忠曰所謂五德亦可用梵音聲明阿含五聲稍同此釋氏要覽云梵音梵云唄匿華言止斷也由是外事已止已斷爾時寂靜任為法事又云諸天聞唄心則歡喜故須作之十誦云比丘跋提於唄聲中第一長阿含經云其梵聲有五種一其音正直二和雅三清徹四深滿五周遍遠聞法苑云夫唄者讚詠之音也當使清而不弱雄而不猛流而不越凝而不滯遠聽則汪洋以峻雅近屬則從容以和肅此其大致也昔魏陳思王曹子建遊魚山忽聞空中梵天之音清響哀婉其聲動心獨聽良久乃摹其節寫為梵唄撰文製音傳為後式梵音茲為始也宋劉敬叔異苑云陳思王曹植字子建嘗登魚山臨東阿忽聞巖岫裏有誦經聲清通深亮遠谷流響肅然有靈氣不覺斂襟祇敬便有終焉之志即效而則之今之梵唱皆植依擬所造一云陳思王遊山忽聞空裏誦經聲清遠遒亮解音者則而寫之為神仙聲道士效之作步虗聲也法華文句疏引梁宣驗記行事鈔説戒正儀篇云彼説戒者坐已維那打靜小者供養梵唄作之若準律文唄匿如法出要律儀云如此鬱鞞國語翻為止斷也又云止息由是外緣已止已斷爾時寂靜任為法事也玄應經音義云唄匿蒲芥切梵言婆師此言讚歎言唄匿者疑訛也婆音蒲賀切又高僧傳慧皎詳論天竺此土歇讚梵唄毗尼母論云佛告諸比丘聽汝等唄唄者言説之辭佛雖聽言説未知説何等法復咨問世尊佛言從修多羅乃至優波提舍隨意所説乃至佛聽諸比丘引經中要言妙辭直顯其義梵唄亦稱梵放文字禪雨後得無象新詩次韻落句云入門庭院度飛螢梵放哀聲滿深殿又潭州開福轉輪藏靈驗記云寶坊精舍樓觀追逐煙雲蔽虧梵放酬酢如錢塘之西湖伊洛之嵩少無文印送西苑徑上人詩云西苑寶峯麓占地寬一弓梵放殷青冥與峯相長雄云云杜工部詩集大雲寺贊公房詩云梵放時出寺鐘殘仍殷牀千家注洙曰梵放蓋佛事至梵音必唱而誦之平舉敕修清規大夜念誦云知客平舉楞嚴咒解者曰送亡維那不舉啓請直舉南無薩怛多曰平舉以不舉啓請亦不舉摩訶梵蓋恐妨諸方人結緣諷經也東漸清規送亡式云維那平舉楞嚴咒不啓請曰平舉表白忠曰宣讀咒願凡表顯事以白告衆此謂表白慈受深禪師慧林録拈疏云却請表白宣過僧史略云唱導者始則西域上座凡赴請咒願曰二足常安四足亦安一切時中皆吉祥等以悅可檀越之心也舍利弗多辨才曾作上座讚導頗佳白衣大歡喜此為表白之椎輪也白槌碧巖録云世尊一日升座文殊白槌云諦觀法王法法王法如是世尊便下座廣燈録金沙禪師章曰開堂有僧問昔日梵王親請佛迦葉白槌事若何師云從古至今進云恁麼即遍天遍地也師云收舊説曰凡鳴椎白事皆是白椎耳然禪林獨於開堂稱白椎乃鳴椎一下息靜羣喧方白衆發法筵云云語也或謂為肅衆聽長老説法也忠曰後説非也敕修清規開堂祝壽云預請諸山一人白椎又云諸山上首出白椎鳴椎一下云法筵龍象衆當觀第一義乃至結座白椎人復鳴椎一下白云諦觀法王法法王法如是楊岐會禪師海會録開堂云淨行大師白槌云法筵龍象衆堂觀第一義無結座白槌五祖演禪師四面録開堂云龍門和尚白槌云法筵龍象衆云云無結座句槌大慧杲禪師育王録云於明州報恩光孝禪寺開堂天童和尚白槌云法筵龍象衆云云拈提畢天童和尚再白槌云諦觀法王法法王法如是師召大衆云記取天童和尚語便下座祖庭事苑云白椎世尊律儀欲辨佛事必先秉白為穆衆之法也今宗門白椎必命知法尊宿以當其任長老才據座已而秉白云法筵龍象衆當觀第一義長老觀機法會酬唱既終復秉白曰諦觀法王法法王法如是此蓋先德之真規皆不失佛意且見叢林多舉世尊升座文殊白椎或謂遍閲藏乘不見其緣然秉白儀範既出聖製復何區區求文殊之説以恣無益之論耶忠曰事苑以秉白為義可知白者告事也猶言謹白大衆也舊説白明白也鳴椎令衆明白知其事止此此義固不足取也品字箋云今以下告上曰稟白同輩述事陳義亦曰白又梵言羯磨此云作白言受戒三番每月自白其所犯作白者令其白也翻譯名義集云律云若作羯磨不如白法作白不如羯磨法作羯磨如是漸漸令戒毀壞以滅正法隨順文句勿令增減已下略録維那白槌于開堂説法者蓋闕尊宿當任人故如是乎傳燈録法燈泰欽禪師章云師住金陵龍光院上堂升座維那白椎云法筵龍象衆云云又慧濟禪師法安章云江南國主請入居報恩署號攝衆師上堂謂衆曰此日奉命令住持當院為衆演法適來見維那白槌了多少好令教當觀第一義且作麼生是第一義又歸宗柔禪師章云師初上堂升座維那白槌曰法筵龍象衆云云廣燈録興教守芝禪師章云師才升座僧正宣疏畢維那白槌云法筵龍象衆云云又景清居素章靈臺令岑章汾陽無德禪師録云師初開堂讀疏罷維那白槌云法筵龍象衆云云雪竇顯禪師開堂録云僧正宣疏了維那白槌云法筵龍象衆云云雲峯悅禪師翠巖録云師在上藍開堂跏趺而坐維那白槌云法筵龍象衆云云已下略録開堂外維那白槌傳燈録華嚴休靜禪師章云師曾在樂普作維那白槌普請曰上間搬柴下間鋤地時第一座問聖僧作麼生師曰當堂不正坐不赴兩頭機禮話禪苑清規挂搭云參頭曲躬近前云久響和尚道價此日獲奉尊顏下情不任喜躍之至退身依位又一展云某寒暄伏惟和尚尊體起居萬福注正月孟春猶寒二月仲春漸暄三月季春極暄四月孟夏漸熱五月仲夏毒熱六月季夏極熱七月孟秋猶熱八月仲秋漸涼九月季秋霜冷十月孟冬漸寒十一月仲冬嚴寒十二月季冬極寒忠曰某寒暄處隨時以此語也敕修清規告香云即日時令謹時共惟堂頭和尚尊候起居萬福忠曰謹時語通十二月時令處可用孟春孟夏等也如結制禮儀中云即日孟夏謹時翰黑大全通敘時令警語部正月單句類云孟春謹時春謹孟月孟春猶寒孟春漸暄等二月單句類云仲春謹時春謹仲月仲春猶寒春半漸暄等三月單句類云季春謹時春謹季月季春極暖等四月云孟夏謹時孟夏謹月孟夏漸熱首夏清和等五月云仲夏謹時仲夏謹月炎景方中等六月云季夏謹時季夏謹月季夏極熱朱夏告闌七月云孟秋謹時孟秋謹月開秋兆涼等八月云仲秋謹時仲秋漸涼素景適中等九月云季秋謹時季秋謹月三秋向杪等十月云孟冬謹時孟冬謹月小春暄妍初冬薄寒等十一月云仲冬謹時冬謹仲月冬半寒隆仲冬嚴寒等十二月云季冬謹時季冬謹月冬晚極寒等第十八類祭供門羅漢供忠曰十六羅漢見靈像門五百羅漢名莫聞藏乘説近有南宋江陰軍乾明院羅漢尊號碑一卷刊布亦不載本據矣羅漢供別有式又曰東福寺每歲修正講羅漢供昔明兆殿司妙于繪事曾畫五百應真一日遇異人授以一軸書不知所往展視之則羅漢供祭文也時人以為畫像感應至今為東福寶物故此軸不識何人書佛祖統紀云佛滅時付囑十六阿羅漢與諸施主作真福田時阿羅漢咸承佛敕以神通力延自壽量若請四方僧設無遮施或所住處或詣寺中此諸尊者及諸眷屬分散往赴蔽隱聖儀密受供具令諸施主得勝果報傳燈録翠微無學禪師章云師因供養羅漢有僧問曰丹霞燒木佛和尚為什麼供養羅漢師曰燒也不燒著供養亦一任供養又問供養羅漢羅漢還來也無師曰汝每日還喫飯麼僧無語師曰少有靈利底密菴傑禪師徑山録建會上堂云千巖釀秀萬木回春羅漢會興貫通今古一願龍王福護瑞雪快晴二願施主歸崇駢臻輻輳三願大衆同心同德扶掖叢林滴水氷生始終一致云云盂蘭盆供釋氏要覽云盂蘭盆此釋子申孝報恩救苦之要以目連救母為始也梵語盂蘭此云救倒懸也盆則此方器也此經目華梵雙舉也若梵語從聲其盂字不須從皿必執筆者誤爾若于闐等可知也義淨云盂蘭者西域之語此云救倒懸即飢虗危苦謂之倒懸也盆乃東夏之音此則救苦之器所以仰大衆之恩光救倒懸之窘急此從義以制名也古師云盆或是鉢但譯時隨俗稱盆盆之與鉢皆器故也經云七月十五日僧自恣日當為七世父母及現在父母厄難中者此文又通保安現在父母具飯百味五果汲灌盆器香油挺燭牀敷臥具盡世甘美以著盆中供養十方大德衆僧又云初受食時先安在佛前塔寺中衆僧咒願竟便自受食若供養佛食回供僧者即此日得他日不通今却於寺中設供亡人蓋誤之也法苑珠林祭祠篇云問曰七月十五日既開道俗造盆獻供未知得造寶盆種種雜珍獻佛以不答曰並得若依小盆報恩經略無寶物依大盆淨土經即有故十六國王聞佛説目連救母脫三劫餓鬼之苦生人道中母子相見時瓶沙王即敕藏臣為吾造盆藏臣奉敕即以五百金盆五百銀盆五百琉璃盆五百𤥭璖盆五百碼瑙盆五百珊瑚盆五百琥珀盆各各盛滿百一味飲食事事如法將來獻佛及僧準此定得問曰依小盆經云佛告目連十方衆僧七月十五日自恣時當為七世父母及現在父母厄難中者具飯百味五果汲灌盆器香油挺燭牀臥衆具盡世甘美以著盆中供養十方大德衆僧初受盆時先安在塔前衆僧咒願竟便自受食不論雜華供養今時諸寺有力富者廣造雜華或用雜寶或用雜繒或用米麵或用諸蠟或用鉛錫或用雜色等亦有道俗貴勝譏論此事目連為母生在餓鬼佛令設百味飯食獻佛及僧何因將此寶華雜物獻之佛僧豈得食此寶華雜色等不答曰不得以己狹劣妨他大福故大盆經云瓶沙王造五百金鉢盛滿千色華五百銀鉢盛滿千色百木香五百琉璃鉢盛滿千色紫金香五百𤥭璖鉢盛滿千色黃蓮華五百碼瑙鉢盛滿千色赤蓮華五百珊瑚鉢盛滿千色青木香五百琥珀鉢盛滿千色白蓮華王視如法即敕兵臣嚴駕十四萬衆俱到祇洹寺禮佛奉盆及僧以七寶盆鉢俱施與佛及僧僧受用竟還駕歸國七世父母超過七十二劫生死之罪其次須達居士毗舍佉母二百優婆夷波斯匿王末利夫人等頒宣國內依目連盆法為吾造盆各用五百紫金盆黃金盆盛滿百一味飲食後以五百紫金輿五百黃金輿盛滿百一物事事具足遂至王及夫人前見其如法時王即以嚴駕十八萬衆共至佛前奉千金盆千金輿等竟敬禮還歸七世父母超過七十二劫生死之罪事物紀原云今世每七月十五日營僧尼供謂之盂蘭齋者按盂蘭經曰目連母亡生餓鬼中佛言須十方衆僧之力至七月十五日具百味五果以著盆中供養十方大德後代廣為華飾乃至割木割竹極工巧也今人第以竹為圓架加其首以荷葉中貯雜饌陳目連救母畫像致之祭祀之所失之遠甚矣忠曰是亦不見大盆經者也然依之足知中華當時風俗故録之又見報禱門盂蘭盆會處入門歡大鑑清規云一代住持入祖堂新安位牌則前歷代諸住持皆相迎接問訊歡喜住持之小師當為本師修設歷代供養點心肴饌作入門歡若獨設一位新入住持自饗令歷代住持空坐看別人受供是何道理兩無面目忠曰或作勸勉之勸非也又有作款者款曲也希叟曇禪師開善録入院提綱云入門款無改換芝峯一一從公斷事涉春緣何妨花判傳供大鑑清規佛誕生云住持至燒香一炷大展三拜不收坐具侍者一班進卓排立傳供敕修清規聖節云住持上茶湯上首知事遞上忠曰遞上即傳供也貼供見職位門貼供行者處上供備佛餉祖餉也敕修清規聖僧侍者云齋粥二時上供發供斛食忠曰施食法方木函堆盛飯食備三界萬靈牌前此即斛食也漢書律歷志云斛者角斗平多少之量也敕修清規月分須知云七月盂蘭盆會預率衆財辦斛食供養釋氏要覽云若比丘各自備一斛食施者即依焦面大士經施與餓鬼也佛祖統記云六道斛淨名經云以一食施一切言一切則全收六道供養諸佛及衆賢聖然後可食南嶽隨自意三昧云凡得食應云此食色香味上供十方佛中奉諸賢聖下及六道品等施無差別天台觀心食法鳴鐘後斂手供養一體三寶次出生飯稱施六道此皆等供十界即是今人施六道修水陸供之明證也述曰妙樂云世人設六道者是梁武見江東多淫祀殺生命祭邪鬼乃以相似佛法權宜替之此蓋荊溪一往以祭祀惡法對佛法論之將以止天下之殺故未論十界等供之義焰口經令供養三寶即是四聖供婆羅門仙即是人道供焰口衆即是鬼道餘四道雖不備蓋是當時赴機未普故經文隱略耳若大乘行人圓觀法界則當依淨名經中義若慈雲謂鬼道得食餘五道不得者此等意亦是用婆沙論云丙若因祭祀唯鬼神得之餘趣不可盡得此是約人世祭祀言之耳若依出世法用平等心修無礙供則當仰觀淨名南嶽天台三處之文則理無不在今有營小斛曰散灑者或一巨斛者或至四十九斛者皆所以等供六道羣品也可不信哉阿難斛食緣見喪薦門施食法處香饌敕修清規達磨宿忌回向云率比丘衆營備香饌以伸供養忠曰説文饌具食也宿忌具九味蓋謂之香饌舊説曰不烹熟者言香饌烹熟者言羞或曰香饌此方俗所謂洗米也忠曰並杜撰九味齋忠曰或作鳩美菜蓋集美味也或作供備菜大鑑清規作九味齋今依此為正蓋果類有九味而已如今時小器長腳者金銀裝飾高餖飣饅頭羊羹等及諸珍果或十二器左右各六器或十六器左右各八器豫曾觀建仁千光祖師五百年忌其器銀碗雕華形橫列四行每行十器凡有四十器大鑑清規末後事儀云正大夜時念誦諷經九味齋略之忠曰九味齋本是宿忌供物可以之證焉雲章和尚講敕修清規到達磨忌曰兒孫者遇祖忌則須盡如在之誠以酬恩德前晚備設供具鳩美菜等者見殷勤之情也本是前晚供物故來早宜撤之然猶留之嚴飾靈筵耳或曰僧家不可晚食况祖師乎是故宿忌回向但舉茶湯到半齋回向列舉珍羞供物及茶湯也豫謂聖賢雖道高世相須同凡若諸供一時進之則匕箸難周調攝違法故宿夜進鳩美菜來早獻飯羹於理得處又當日供養尋常也若不以前晚供具則無可以表丹悃者徒不可以晚食作難而妨誠心矣但茶湯禮則以當日為本學者須知之江湖紀聞云至元歸附後胡雨巖遊學湖湘道永之境投宿敝寺有老僧背燈而坐曰客來何暮胡曰店艱乏食行路良苦僧袖中出二齋令食席地就臥僧誦偈云百補袈裟舊鉢盂幾年同我此山居寒燈夜照青蓮座得伴看添貝葉書旦覺衣濕而冷捫席乃知露宿草上青天曠野一無所有行至一寺儼然夜所宿處驚語行者以故曰此祖師葬處祖師順寂十五年矣夜供五齋訝缺其二也忠曰五齋蓋九味齋五器也此可以證九味齋書齋字及九味齋前晚供養也珍羞敕修清規佛降誕上堂云嚴備香花燈燭茶果珍羞以伸供養小補韻會云羞膳也一曰致滋味為羞周禮享人注疏牛羊豕調以五味盛之於豆謂之羞又食也禮記月令羣鳥養羞注羞謂所食也疏云若食之珍羞相似又作饈正字通云饈饈並俗字舊注音修膳也薦也義與羞同誤分為二經傳本借羞李太白詩集過汪氏別業詩云我來感意氣捶炮列珍羞生飯敕修清規日用軌範云鉢刷安第二饙子縫中出半寸許盛生飯不得以匙筯出生飯不過七粒太少為慳食凡受食則用出生或不受食却不可就桶杓內撮飯出生舊説曰施鬼界衆生之飯故曰生飯出飯不可過七粒麵不可過一寸饅及餅可指甲許生飯不可飣請菜中為受飯鬼與受菜鬼相爭也凡鬼中專受生飯者曠野鬼也專受施餓鬼食者面然鬼也或説曰生飯者人之生氣在左掌故先用右手拇指中指而撮之少點左掌熏著生氣於飯然後置鉢刷唱偈施與鬼子母故曰生飯或曰生字義古德未下解有謂生是熟之對未下筯之新飯是生義以供鬼也忠曰人生氣在左掌未得本據謂生者衆生也非生熟義佛自言出衆生食後引何不見經文生曲説而為難解哉資持記云施生不必多也出生處引乃出於施衆生之食也佛祖統紀云出生飯此有二緣一者涅槃經令施曠野鬼毗奈耶律令施鬼子母等此曹本食肉啖人佛化之受戒不殺乃囑弟子隨處施食今齋堂各各出衆生食是也此唯出家人行之二者焰口經託阿難為緣令施餓鬼食今齋堂別具小斛於食畢衆作法施之或各具小生斛夜間咒施此通道族行之曠野鬼緣涅槃經梵行品云善男子如我一時遊彼曠野聚落叢樹在其林下有一鬼神即名曠野純食肉血多殺衆生復於其聚日食一人善男子我於爾時為彼鬼神廣説法要然復暴惡愚癡無智不受教法我即化身為大力鬼動其宮殿令不安所彼鬼於時將其眷屬出其宮殿欲來拒逆鬼見我時即失心念惶怖躃地迷悶斷絶猶如死人我以慈憫手摩其身即還起坐作如是言快哉今日還得身命是大神王具大威德有慈憫心赦我愆咎即於我所生善信心我即還復如來之身復更為説種種法要令彼鬼神受不殺戒即於是日曠野村中有一長者次應當死村人已送付彼鬼神鬼神得已即以施我我既受已便為長者更立名字名手長者爾時彼鬼既白我言世尊我及眷屬唯仰血肉以自存活今已受戒當何資立我郎答言從今當敕聲聞弟子隨有修行佛法之處悉當令其施汝飲食善男子以是因緣為諸比丘制如是戒汝等從今常當施彼曠野鬼食若有住處不能施者當知是輩非我弟子即是天魔徒黨眷屬善男子如來為欲調伏衆生故示如是種種方便非故令彼生怖畏也訶利帝母緣鼻奈耶雜事云歡喜夜叉神生子至五百其最小者名曰愛兒歡喜入王舍城所有男女次第取食人民痛惱當往告佛時諸人曰此鬼噉我男女則是惡賊何名歡喜因此競呼為訶梨底母衆往白佛佛持鉢入城以鉢覆其愛兒母歸不見愛兒上從天宮下至地獄尋覓不見佛問言汝有幾子答言五百佛言五百失一何甚苦惱况他一子汝何食之乎母曰願以示誨佛言可受我戒得見愛兒母曰我依佛佛舉鉢見愛兒從佛受三歸五戒白言我今與子何所食噉佛敕聲聞弟子於食次出衆生食呼汝等名字施之略鈔佛祖統紀云訶利帝此翻惡賊蓋是鬼子母未受戒時食王城男女居人怨之故作此目又別有阿利陀因緣灌頂封印大神咒經云阿利陀復白佛言我等鬼神官屬七百常以精氣血肉為食今日歸命於佛世尊既授戒法不殺物命唯願天尊敕諸弟子法食之時惠施少少飯食之餘又與出生交看傳燈録杉山智堅禪師嗣馬祖章云師喫飯次南泉收生飯云生師云無生南泉云無生猶是末南泉行數步師召云長老長老南泉回頭云怎麼師云莫道是末逍州諗禪師録云師因見院主送生飯鴉子見便總飛去師云鴉子兒見儞為什麼却飛去院主云怕某甲師云是什麼語話師代云為某甲有殺心在出生忠曰生飯亦言出生出衆生食之略言也行事鈔訃請設則篇云明出衆生食或在食前唱等得已出之或在食後經論無文隨情安置資持記云雖通前後理合在前準寶雲經乞食分四分一與同梵行人一與乞人一與鬼神一分自食故知前出後方自食涅槃因曠野鬼云云四分僧伽藍中立鬼神廟屋傳云中國僧寺設鬼廟伽藍神廟賓頭盧廟每至二食皆僧家送三處食餘比丘不出愛道尼經令出如指甲大資持記云舊云晉法猛遊西國傳鬼廟即曠野神或鬼子母今多畫於門首本為出食祭之今人乃謂門神訛替久矣愛道下示多少下引智論鬼能變食故不在多恐費信施智論云鬼神得人一口食而千萬倍出也資持記云以鬼有通力變少為多此明施生不必多也教誡律儀云凡欲出生粥不得令淨匙拄著淨人出生器中若著處即須更受匙又云凡所出生餅當如一半錢大飯不過其七粒自餘飯食亦不得多又云凡所出生食須事事如法又云出生食不得將所棄惡食物致生中又云凡出生法須安牀邊淺處令淨人掠取不得自用手拈意在護手忠曰飯出生用右指粥出生用匙可按律儀文而知也釋氏要覽云今詳若食是米麵所成者方可出之或蔬茹不用緣物類不食翻成棄也如愛道經云出生餅如指甲大又出生偈云汝等鬼神衆我今施汝供七粒遍十方一切鬼神共以食出生時默誦此偈孤山智圓法師間居編出生圖紀序云儒禮食必祭其先君子有事不忘本也釋氏之出生具云出衆生食蓋祭曠野鬼神及鬼子母沙門用心憫異類也不忘本仁也憫異類慈也兩者同出而異名今觀後學鮮測厥由遂使出生事乖謹潔於檀越家則或雜以所棄處衆堂則盤器污雜因圖其形容紀其事迹以示來者且祭神如神在享于克誠在儒尚然况稟佛制今衆居宜以淨器聚斂安此像前良久施飛走鱗介之屬檀越家當於僧食畢取其生飯併著一器供彼形像然後散之然律亦許二食時先送食供養寄歸傳亦云復於行末安食一盤以供訶利帝母也若或先供則衆僧不須各出竊恐於時未安今宜各出然後聚而供之既人別用心則咸思佛制庶幾上士勤而行之所謂賢者之祭必受其福也涅槃南本第十五云佛遊曠野聚落云云如前引寄歸傳第一云施主初置聖僧供次乃行食以奉僧衆復於行末安食一盤以供呵利底母其母先身因事發願食王舍城所有兒童遂受藥叉身生五百兒日飱王城男女佛遂藏其稚子名愛兒云云如前引故西方諸寺每於門屋處或在食厨邊案畫母形抱一兒子於膝下或五或三以表其像每日於前盛陳供食母乃四天王部衆也大豐勢力其有疾病無兒息饗禱焉皆遂願詳説如律神州先有名鬼子母也今詳此方佛寺皆於門壁畫二神神後一女蓋其遺像既二俱受祭故并畫之或有立居士像者蓋手長者也西壁即曠野之身東壁即佛所化者今明受祭唯圖曠野之像焉三餘贅筆云古人每飲食必祭未有不祭而飲食者今之釋老食時猶祭而士大夫乃反不行古云禮失而求之野此亦可見史繩祖學齋占畢云余嘗觀張橫渠語云曾看相國寺飯僧因嗟嘆以為三代之禮盡在是矣誠哉斯言余亦曾觀成都華嚴閣下飯萬僧始盡得橫渠之所以三嘆蓋其席地而坐不設倚卓即古之設筵敷席也未食先出生蓋孔子鄉黨所謂疏食菜羹瓜祭必齊如也朱文公注云陸氏魯論釋瓜字作必謂古人飲食每種各出少許置之豆間之地以祭先代始為飲食之人不忘本也孔子雖薄物必祭祭必敬如齊嚴此聖人之誠余又於禮記及左傳有云子曰吾食於少施氏而飽少施氏遇我以禮吾祭作而曰疏食不足祭也古人以此為禮今之腐儒匪惟不能祭見有學者行之則指以溺佛為笑是不曾讀書也而反使髠徒得竊吾教而堅持之又終食之間寂然無聲此子所謂食不語也只此三者非三代之禮而何及到石室亦看士人會飯則攫拏如猿猱者有之吼詈齋僕庖人者有之打損器皿者有之褻談喧笑視飯僧為有愧匪獨士也余嘗出入制總兩幕士夫會食亦猶是也得不動橫渠之嘆耶忠曰佛氏出生非斆孔子鄉當之行自有曠野神鬼子母事緣皎在綖文史氏唯知責腐儒不曾讀書亦自不曾讀內典妄以出生為竊儒教矣嗚呼士大夫何物而不踐三代禮樂其會食招猿猱喧雜之訕耶僧人何物而致使異教發禮在是之嘆耶蓋儒佛之小大淺深於此乎見不待勞辨焉史氏遂不少轉腦反思釋迦大聖之教化薰陶倍萬於汝儒而折其慢幢猶軒軒有輕侮之言實可憫哉獻粥獻齋齋僧雲臥紀談云池州梅山愚丘宗禪師因練塘居士洪慶善持江東使節夜宿山間相與夜話洪問以飯僧見於何經其旨安在宗曰四十二章經有云飯惡人百不如飯一善人乃至飯千億三世諸佛不如飯一無住無作無證之者其無修證則是正念獨脫能飯斯人則功超諸佛然前輩知此旨者多矣洪曰其為誰乎宗曰且以近説如秦少遊滕州貶所自作挽章有誰為飯黃緇之句東坡既聞秦訃以書送銀五兩囑范元長為秦飯僧及東坡北歸至毗陵以疾不起太學生裒錢於東京慧林飯僧蘇黃門撰東坡墓志首載之洪曰嚫金有據乎宗曰公豈不見毛詩小雅鹿鳴燕群臣嘉賓也既飲食之又實幣帛筐篚以將其厚意蓋飲食不足以盡敬而加贈遺以致殷勤也於是為誦丁晉公齋僧疏曰佛埀遍智道育羣生凡欲救於傾危必預形於景貺謂白衣干祿叨家宰之重權丹陛宣恩忝先皇之優渥補仲山之袞曲盡巧心和傅説之羹難調衆口嘗於安寢忽夢清容妙訓泠泠俾塵心而早悟真儀隱隱恨凡目以那知蓋智未周身事乖遠害至禍臨而莫測成災及以非常黜向西京感聖恩而寬宥竄於南裔當忠憲以甘心咎實自貽孽非他作念一家上散地望萬里以何歸既為負國之臣永絶經邦之術程遊湘土道假靈山正當煩惱之身忽接清涼之衆方知富貴難保始終直饒鼎食之榮豈若盂羹之美特形歸命恭發精誠虔施白金充修淨供飯苾芻之高德答懶瓚之深慈冀保此行乞無他恙伏願天回南眷澤賜下臨免置邊夷白日便同於鬼趣賜歸中夏黃泉再感於天恩虔罄丹誠永繄法力洪曰向讀名臣傳只見補仲山袞和傅説羹一聯而已今獲全聞其精禱若此大慧為盧時用普説云我初到衡陽諸處道友送得千百貫錢來自家遣兩箇侍者去嶽山溈山諸處齋僧一巡衡陽人初不知有齋僧之説有來問妙喜者對他道只是把錢雇和尚喫飯過得幾時因普説方與他説齋僧功德後來稍稍知歸向唐時有箇宣律師為他持戒殊勝戒光直透天宮感得韋馱天神每日供天廚食因問天神世間功德何者最大曰齋僧功德最大梵網經不行利樂戒第九云若疾病國難賊難父母兄弟和上阿闍黎亡滅之日及三七日乃至七七日亦應讀誦講説大乘經律齋會求福夏齋忠曰結夏秉拂都寺辨齋曰夏齋見埀説門謝都寺齋上堂處冬齋忠曰冬至秉拂都寺辨齋曰冬齋南堂欲禪師本覺録謝秉拂冬齋上堂云法離見聞言詮罔及道非色相智照洞然首座用處即是藏主用處藏主用處即是都寺用處一即三三即一木馬火中嘶黃昏候日出儞諸人向箇裡著得眼便見都寺用處要且不是藏主用處藏主用處要且不是首座用處還會麼曹溪波浪如相似無限平人被陸沉罷參齋忠曰參禪了畢設齋供養大衆也傳燈録洞山價禪師章云因夜間不點燈有僧出問話退後師令侍者點燈乃召適來問話僧出來其僧近前師曰將取三兩粉來與這箇上座其僧拂袖而退自此省發玄旨遂罄捨衣資設齋忠曰是所謂罷參齋也雲棲袾宏和尚禪關策進序云警策在手疾驅而長馳破最後之幽關徐而作罷參齋未晚也罷講齋忠曰教家參禪有省悟分即罷講教辨齋供養大衆也虗堂愚和尚顯孝録拈提云良遂座主參麻谷谷見來携鉏去鉏草次日又來谷便閉却門遂因此契悟乃云和尚莫謾良遂好若不來見和尚幾被十二分教誤却一生遂將房計賣却作一罷講齋忠曰聯燈不言罷講齋事皇甫冉送陳法師赴上元詩云延陵初罷講建業去隨緣忠曰此但是休講遊方也不必參禪之謂也茶湯忠曰凡佛前祖前靈前每日供茶湯為恆禮宋劉敬叔異苑云剡縣陳務妻少與二子寡居好飲茶茗宅中先有古冢每日作茗飲先輒祀之二子患之曰古冢何知徒以勞祀欲掘去之母苦禁而止及夜母夢一人曰吾止此冢二百餘年謬蒙惠澤卿二子恆欲見毀賴相保護又饗吾佳茗雖泉壞朽骨豈忘翳桑之報遂覺明日晨興乃於庭內獲錢十萬似久埋者而貫皆新提還告其兒兒並有慙色從是禱酹愈至第十九類喪薦門遷化聯燈會要百丈海禪師章野狐因緣云師令維那白槌云食罷送亡僧衆皆怪訝云又無人遷化何得送亡僧臨濟玄禪師録云普化繞街市叫云我往東門遷化去云云玄沙備禪師廣録云雪峯舉神楚闍梨問我亡僧遷化向什麼處去我向伊道如冰歸水師云是即是某不與麼道峯云儞作麼生師云如水歸水釋氏要覽云釋氏死謂涅槃圓寂歸真歸寂滅度遷化順世皆一義也隨便稱之蓋異俗也忠曰遷化者謂遷移化滅也其實可通在家要覽且從世之偏稱而已然或設義曰尊宿出世能事畢遷化度事於他方世界也如涅槃經説如來見閻浮衆生受大苦説甘露法藥療治已復至他方有煩惱毒箭處示現作佛療其病略鈔又唐慧持臨終曰吾欲往他方教化續高僧傳又佛眼寂圓悟上堂云此方緣盡他方顯化此界身死他界出現圓悟録明極訃至竺仙上堂云前月二十七日明極和尚與三世如來把手共行轉化他國而去淨智録是遷於化之義余謂非也亡僧已言遷化固非出世尊宿何化度事之有故可知遷化之目通出世未出世出家在家矣前漢書外戚傳云李夫人卒武帝自作賦曰云云忽遷化而不反兮魄放逸以飛揚文選魏文帝典論論文云日月遊於上體貌衰於下忽然與萬物遷化斯亦志士之大痛也華嚴傳記樊玄智傳云人見龕內有光怪往觀之乃見居士久從遷化忠曰此三事並在家之死言遷化則此目不必局釋氏矣浴亡敕修清規尊宿遷化云小師侍者親隨人安排洗浴著衣淨髮人龕又亡僧云如病僧瞑目延壽堂主即報維那令堂司行者報燒湯覆首座知客侍者庫司差人擡龕浴船安排浴亡浴畢淨髮拭浴衣被酌量俵浴亡人手巾與淨髮人維那提督著衣入龕入龕敕修清規尊宿入龕云維那領小師炷香請首座入龕佛事安排寢堂置龕爐燭几筵供養又見浴亡處幻住菴清規亡僧津送云入龕之法須預備麻骨篾等類置疊亡僧兩腋之下次用乾柴四面挨排定當然後掩龕用長條合縫公界印押封閉龕門龕前立位牌一座書云新圓寂某上座覺靈忠曰麻骨乾柴等擬便火化也又有儒家入槨之法或可用全身入塔乎朱子語録喪葬云槨外四圍上下一切實以炭末須厚七八寸許避濕氣免水患截樹根槨裏用石灰又以篩過細沙相雜灰與沙相乳入其堅如石圓悟勤禪師録有為智海法真和尚入龕佛事移龕敕修清規尊宿移龕云入龕三日掩龕鋪設法堂上間乃至中間法座上挂真乃至下間置龕用麻布幃幕前列几案爐瓶素花香燭不絶二時上茶湯粥飯供養諷經仍備挑燈鐃鈸花幡鳴僧堂鐘集衆請移龕佛事鎖龕敕修清規尊宿移龕云請移龕佛事罷移龕下法堂請鎖龕佛事又亡僧大夜念誦云維那出燒香請鎖龕佛事受請人出班燒香退身問訊次住持前問訊轉東序前問訊巡至班末問訊次西序前問訊然後與大衆普同問訊從西序末過若見職頭首各依本位空處過至龕右側立堂司行者以盤托鎖候舉佛事畢行者以鎖鎖龕畢住持復位蓋棺鎖龕又曰蓋棺韻會闔轄獵切閉也通作蓋韓詩外傳云孔子曰學而不已闔棺乃止杜工部集簡蘇徯詩云丈夫蓋棺事始定佛通愚中和尚年譜云師參金山即休一日有亡僧請耆宿并頭首各演佛事衆中有忌休厚於師者俄於闍維場請蓋棺佛事師卒出唱云云一衆吐舌諸方傳譽是年二十五挂真忠曰真者真儀即遷化尊宿肖像也有兩處挂真一法堂挂真二山門首真亭挂真敕修清規尊宿挂真云移龕就法堂鎖龕已請挂真佛事又云龕至山門首請真亭挂真奠茶湯俱有佛事無門開和尚録告香普説云先師月林觀圓寂後陳提刑諱貴謙作喪主臨時令為先師挂真不容辭避山僧捧起真云老賊一喝虛空迸裂儂家當下如桶底脫連伸三拜納盡敗缺這些怨恨怎生消滅而今高挂祖堂千古號令不絶舉哀敕修清規尊宿遷化云主喪白云堂頭和尚歸寂理合舉哀舉佛事罷舉哀三聲大衆同哭小師列幕下哀泣大清曰理合舉哀者非謂舉哀佛事佛事畢唱哀哀哀三聲此為舉哀也圓悟勤禪師録有為佛眼和尚舉哀佛事語尾云要知末後句分明普請大衆齊聲舉乃云哀哀東漸清規云東福定山和尚辭世偈尾書云煩堂頭和尚舉哀時住持性海和尚為舉哀佛事論者曰定山意謂下火但忌火言故為舉哀而性海不諭本意可憾已下略録外書舉哀梁書明山賓傳云山賓卒昭明太子為舉哀賻錢十萬布百匹并使舍人三顒監護喪事又夏侯亶傳亶卒於州鎮高祖聞之即日素服舉哀奠茶湯敕修清規尊宿遷化舉哀之後有奠茶湯佛事又對靈小參之後有奠茶湯佛事又真亭挂真之次有奠茶湯佛事又見起龕處直靈守亡者龕曰直靈敕修清規亡僧云直靈行者每日上粥飯伴夜大鑑清規末後事儀云入滅第三日荼毗先第二日晚夜殷勤供養小師圍繞終夜不寐名曰伴夜唯誦金剛經鳴磬送亡敕修清規送亡云凡出喪庫司預分付監作行者辦柴化亡差撥行僕鐃鈸鼓樂幡花香燭擡龕喪儀一切齊備堂司行者隔宿覆住持兩序挂送亡牌次早行粥遍食椎後再鳴椎一下云白大衆粥罷普請送亡除守寮直堂外並當齊赴謹白大灌頂神呪經云賢者阿難問佛言閻浮提界有幾種葬法佛語阿難葬法無數吾今當為略説我此國土水葬火葬塔冢之葬其事有三乃至震旦國中人民葬法莊嚴之具金銀珍寶刻鏤車乘飛天仙人以為莊嚴衆妓鼓樂鐘鈴之音歌詠讚歎用為愛樂終亡者身衣服具足棺槨微妙香煙苾芬百千萬衆送于山野莊嚴山林樹木鬱鬱行行相對無虧盈者墳柏茂盛碑闕儼然人民見者莫不歡欣毗奈耶雜事云佛言苾芻身死應為供養苾芻不知云何供養佛言應可焚燒塢波離曰如佛所説於此身中有八萬戶蟲如何得燒佛言此諸蟲類人生隨生若死隨死此無有過身有瘡者觀察無蟲方可燒殯欲燒殯時無柴可得佛言可棄河中若無河者穿地埋之夏中地濕多有蟲蟻佛言於叢薄深處令其北首右脅而臥以草稕支頭若草若葉覆其身上送喪苾芻可令能者誦三啓無常經并説伽陀為其呪願事了歸寺應可洗身若觸尸者連衣俱洗其不觸者但洗手足行事鈔瞻病送終篇云中國四葬水葬投之江流火葬焚之以火土葬埋之岸旁林葬棄之中野為雕虎所食律中多明火林二葬亦有薶者五分云尸應薶之若火燒在石上不得草上安資持記水葬飼魚鱉林葬濟禽獸諸部文中但無水葬忠曰鈔所謂中國謂天竺也忠曰事鈔云律中多明火林二葬亦有薶者者謂其水葬稀少非謂絶無而資持云諸部文中但無水葬者失矣如豫所援毗奈耶雜事佛不聽塔下葬四分律云彼於塔下埋死人佛言不應爾彼於塔下燒死尸佛言不應爾忠曰中華亦有四葬而人不自省察却以火葬為佛氏之法列子云晏平仲曰既死豈在我哉焚之亦可沈之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可袞衣繡裳而納諸石椁亦可忠曰焚火葬沈水葬瘞及納椁土葬露及棄壑林葬又此四葬濟北集已辨周易上繫辭云古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過此亦可見漢土古葬法也津送送亡曰津送敕修清規尊宿遷化云遺戒一切佛事並免但舉無常偈同亡僧津送幻住菴清規津送云其餘袈裟鉢盂并種種行李抄札既定待出龕日估唱錢物入板帳支收以為津送正宗贊百丈大智禪師傳云老人作禮曰某已脫野狐身住在山後敢乞依亡僧津送一山曰津發也舊説曰津送不必局送亡送生人亦云津送謂送人至津而止也今謂送亡蓋準生者也忠曰津字韻書無發也訓余謂津送者人之去譬如舟發津而人送之也津字非局於送亡名今略引數證傳燈録招賢會通禪師章云師乞歸寧省帝厚其所賜敕有司津遣禪林寶訓云晦堂曰先師聞衲子省侍親老氣色穆然見於顏面盡禮津遣又云死心住翠巖聞覺範竄逐海外道過南昌邀歸山中迎待連日厚禮津送六學僧傳宋道猷傳云宋文帝問慧觀生公頓悟成佛義誰能復通者觀以猷對即詔臨川津發至都癡絶沖禪師録夏中普説云是時圓悟道尊一代子蒼先遣書探圓悟口氣然後津發妙喜歸雲居古林茂禪師録行實云省札下建康津發者再翦燈餘話芙蓉屏記云高公贈崔英奴婢各一津遣就道朱子語録云逆亮臨江朝臣震怖各津遣其家屬他走押喪舊説曰押管押也都寺殿于喪事點撿儀禮令不亂行列也又見職位門忠曰押者彈壓義殿于送喪列行鎮壓其擾亂矣正字通云押與壓通敕修清規尊宿出喪云主喪領衆兩兩分出左右俵散雪柳齊步並行毋得挨肩交語各懷悲感都寺押喪又亡僧送亡云維那隨龕都寺押喪起龕敕修清規亡僧送亡云維那出燒香請起龕佛事舉畢行者鳴鈸擡龕出山門首若奠茶湯轉龕龕則向裏安排香几首座領衆兩行排立維那炷香請佛事候舉佛事而行山菴雜録云天童西巖和尚蜀人南遊遍參至徑山見無準機語相投容入室欲授藏主職或者以力攘之次日為亡僧訥侍者起龕怯衆一辭不吐無準即令維那請惠侍者起龕惠至龕前連喚訥侍者者三人亦以為怯乃曰三喚不果然是訥頂門放出遼天鶻無準黜或者而以惠侍者代其職惠侍者即師也轉龕送亡中路有奠茶湯佛事則暫轉龕向裏見起龕處轉骨敕修清規尊宿遷化佛事云如衣鉢豐厚每日奠茶湯添轉龕轉骨等佛事忠曰轉骨者在入塔時即自寢堂起骨向塔所時中路轉回骨向裏稅下行轉骨佛事此局唯荼毗者秉炬敕修清規尊宿荼毗云喪至涅槃臺喪司維那俟都寺上香茶了進前燒香引小師拜請秉炬佛事舊説曰秉炬與下火同然因師集賢録分為二或曰秉炬語長下火語短又下火一人行之秉炬數人遞為之凡立地佛事忌語繁唯秉炬有及數句者秉炬佛事語長而復數人行之若用真火移刻易燼故刻木炬塗朱擬火狀或紅綿繒造花著炬首而不點火備更把焉是故其語落句可言火處或言花而已有弟子為師秉炬者普燈録黃龍祖心禪師入滅黃庭堅強得法上首死心秉炬詳職位門主喪處有子為母秉炬者羣玉集云黃檗運禪師得道之後忽思省侍父母一婆子出問何處曰江西婆曰我家亦有一子在江西多年不歸因借宿婆親為洗足運足心一志甚大婆失記是其子次日運辭去於三里外説與鄉人云吾母不識山僧但母子一見足矣鄉人報知其母母趕至福清渡運已登舟母一跌而終運不回但於隔岸秉炬法語云一子出家九族登天若不生天諸佛妄言擲炬火然兩岸人皆見其母於火焰中轉為男子身乘大光明上生夜摩天宮後官司改福清渡為大義渡下火見秉炬處荼毗釋氏要覽云闍維或云荼毗或耶維闍毗正梵云闍鼻多此云焚燒荼毗又作茶毗升菴外集云茶即古荼字也周詩記荼苦春秋書齊荼漢志書荼陵顏師古陸德明雖已轉入茶音而未易字文也至陸羽茶經玉川茶歌趙贊茶禁以後遂以茶易荼戒環法華經要解云佛設火化之法在已則顯三昧之力播薰練之功故化火自焚舍利迸透在人則掩臭腐之穢免螻蟻之食使其魄不滯其神清升而此方以臥淤膿於荒郊埋腐骸於朽壞為是且以火化為不忍方其穴地負土全體而坑之為可忍耶二皆出於得不已耳達者觀之一等歸盡則臥淤埋腐不若火化之愈矣自道觀之沈之可也露之可也衣薪而棄諸溝中袞文而納諸石槨無不可者奚足為焚瘞之競東都事略太祖本紀建隆三年曰三月丁亥詔曰王者設棺槨之品建封樹之制所以厚人倫而一風化也近代以來遵用夷法率多火葬甚愆典禮自今宜禁之收骨忠曰荼毗之後收拾化骨也俗作取骨訛矣敕修清規尊宿茶毗云小師鄉人法眷守化收骨齋罷鳴僧堂鐘集衆仍備儀從迎骨回寢堂安奉請安骨佛事又亡僧入塔云茶毗後執事人鄉曲法眷同收骨以綿裹袱包函貯封定迎歸延壽堂位牌上去新字安骨見收骨處起骨敕修清規尊宿靈骨入塔云鳴鐘衆集都寺上香畢請起骨佛事送至塔所請入塔佛事入塔見起骨處全身入塔忠曰不火化而以全骸入塔也敕修清規尊宿全身入塔云龕至塔所都寺上香茶畢喪司維那進燒香引小師拜請入塔佛事入骨忠曰蓋僧曰入塔居家類曰入骨西巖慧禪師録淨日行者入骨佛事云三日已前可憐甘贄到南泉五日已後堪笑盧公連夜走正今日赤骨律四顧寥寥誰委悉流水繞孤村白雲抱幽石撒骨忠曰蓋入骨撒土也北澗簡禪師録有陸氏孺人撒骨佛事撒土舊説曰撒土者全身入塔行之或曰盆內鋪紙盛土呈之佛事人接之作撒土勢或曰以米錢土三物撒之地上即是入塔佛事也或曰古者有執鍬子行之者吁唐土固不可有之可笑敕修清規尊宿全身入塔云候掩壙一切畢備然後請撒土佛事迎真回寢堂供養掩土忠曰全身埋葬也義堂日工集云凡掩土之法掘地作窖切石布底裏且隨龕樣側立其畔岸塗以泥粉塞其孔隙是俗之所謂窀穸也龕中立椅子安身跏趺坐椅前置機機上陳設筆硯水瓶平日資具龕戶鎖封鑰子折而棄之投龕於窖中覆以石蓋亦粉其罅掩土而深埋立石浮圖而為表應菴華禪師録有為留守樞密大資掩土佛事上祭敕修清規尊宿移龕云中間法座上挂真安位牌廣列祭筵用生絹幃幕以備上祭又云每日或兩次三次上祭無拘蓋檀越諸山來有先後隨時若法眷門人上祭到門知客接已即報喪司隨送孝服然後上祭忠曰上祭則有祭文見文疏門下祭碧巖録云陸亘大夫作宣州觀察使參南泉泉遷化亘聞喪入寺下祭忠曰下者猶言安置也同下嚫之下義宋高僧傳不空傳云帝詔高品劉仙鶴就寺置祭止此乃下祭義也又録下字例敕修清規聖節云燒香侍者就佛座前下茶湯又歷代祖忌云就祖堂下食一位備用清規念誦致祭云上祭人龕右上湯茶行者下龐居士録云石林一日自下茶與居士云云估唱估衣唱衣也敕修清規尊宿遷化云示疾覺沈重預請兩序勤舊點對封收衣鉢行李就留方丈差公謹行僕看守以俟估唱幻住清規津送云衣盂估唱板帳支收既無間於死生安可昧其因果估衣敕修清規亡僧估衣云維那分付堂司行者請住持兩序侍者就堂司或就照堂對衆呈過包籠開封出衣物排地上席內逐件提起呈過維那估直首座折中知客侍者上單排字號就記價直在下依號寫標貼衣物上入籠仍隨號依價逐件別寫長標以備唱衣時用唱衣敕修清規尊宿唱衣云至期僧堂前或法堂上下間設大衆坐位中間向裏橫安長卓置筆硯大磬其上鳴僧堂鐘集衆乃至維那鳴磬一下白云夫唱衣之法蓋稟常規新舊短長自宜照顧磬聲斷後不得翻悔謹白云云詳彼又亡僧唱衣云扛包籠住持兩序前巡呈封記於首座處請鎖匙呈過開取衣物照字號次第排席上空籠向內側安乃至維那解袈裟安磬中却換挂絡堂司行者依次第拈衣物呈過遞與維那提起云某號某物一唱若干如估一貫則從一伯唱起堂司行者接聲唱衆中應聲次第唱到一貫維那即鳴磬一下云打與一貫餘號並同或同聲應同價者行者喝住云雙破再唱起鳴磬為度堂司行者問定某人名字知客寫名上單侍者照名發標付貼供行者遞與唱得人供頭行者仍收衣物入籠一一唱畢鳴磬一下又唱衣鬮拈法詳執務門釋氏要覽送終云唱衣律亡僧輕物差五法比丘分與現前僧為分不均故佛聽集衆先以言白衆和許可賣共分言五法者不隨愛不隨瞋不隨癡不隨怖知得不得亦名五德十誦律云賣衣未三唱比丘益價後心悔疑奪彼衣疑是奪前剛價者佛言未三唱竟益價不犯目得迦云佛言初準衣時可處中勿令太貴太賤不應待其價極方與之若不買者故增價犯惡作罪大毗婆沙論問命過比丘衣鉢等云何得分答彼於昔時亦曾分他如是財物今時命過他還分之增輝記云佛制分衣本意為令在者見其亡物分與衆僧作是思念彼既如斯我還若此因其對治令息貪求故今不能省察此事翻於唱賣之時爭價上下喧呼取笑以為快樂誤之甚也仁者宜忌之義楚六帖云薩婆多論云估唱衣物未三唱得益價三唱已不應益衆亦不得與唱衣已不得悔得罪校定清規云唱衣昔世尊在日古佛示迹號烏波難陀比丘好聚斂衣盂身死之後佛令集衆以所畜之物盡情估唱使現前比丘觀前人慳鄙為他人所積因茲有證二果者對治他緣修己行所有法衣不唱當分留與嗣法弟子大川濟禪師淨慈録有因唱衣上堂提衣唱衣亦名提衣敕修清規尊宿遷化唱衣云開籠出衣鉢依號排席上請提衣佛事對靈小參敕修清規尊宿遷化云喪司維那同小師懷香詣客位拜請主喪人大夜對靈小參預設座候昏鐘鳴鳴鼓集衆兩序座下問訊如常式主喪人用帶行侍者燒香無則聖僧侍者代之小參下座小師羅拜致謝贈別經大鑑清規末後事儀云今晚大夜則午後道舊辨事小師諷經此名贈別經以表生死道義也又見節時門贈別夜處毗奈耶雜事云送喪苾芻可令能者誦三啓無常經并説伽陀為其呪願前送亡處詳引忠曰此即佛制有送亡諷經事龕前念誦敕修清規尊宿遷化云首廣領衆龕前上香立定請奠茶湯佛事畢山門維那念誦解者曰此即此方所謂龕前念誦也山頭念誦敕修清規尊宿茶毗云喪至涅槃臺乃至秉炬佛事山門維那念誦解者曰是即山頭念誦也古劍曰大唐火浴多在山頭故曰山頭念誦敕修清規亡僧板帳式云參拾貫維那山頭佛事解者曰即謂山頭念誦也幻住菴清規云凡對靈回向但入龕宿夜念誦山頭念誦此三遍公界回向稱亡僧兩字名追薦忠曰俗作追善非也丹鉛總録云薦者祭之名士無田則薦是也慈受深禪師慧林録云只如今日了初侍者追薦二親試問諸人且道他父母在地獄中受苦耶在人天受樂耶宋史禮志云及周朝忌日尚有追薦春渚紀聞云明皇時太真妃得白鸚鵡聰慧可愛妃每有燕遊必置之輦竿自隨一日鸚鵡忽低首愁慘太真呼問之云鸚鵡夜夢甚惡恐不免一死已而太真妃出後苑有飛鷹就輦攫之而去宮人多於金花紙上寫心經追薦之者灌頂十方淨土經云命終之人在中陰中身如小兒罪福未定應為修福願亡者神使生十方無量剎土承此功德必得往生又云普廣菩薩言衆生不信三寶不行法戒等命終墮三塗八難親族為修福得福不佛言七分之中為獲一也何故爾乎緣其前世不信道衆故使福德七分獲一若以亡者嚴身之具堂宇室宅園林浴池以施三寶此福最多功德力強可得拔彼地獄之殃便得解脫往生十方佛土略鈔法苑珠林云往生經云亡後作福死者七分獲一餘者屬現造者宗鏡録云問若言須與所熏和合一處方名能熏者且如先亡父母及先亡子孫等後人為作功德此亦是熏他識以獲福故如何不許答此有二解一云此但為增上令亡者自發心非熏他識二云七分之中許獲一分難只此所獲一分功德便是此人造福他人受果應乖唯識義答有五力唯識不判一定力二通力三借識力四大願力五法威德力優婆塞戒經云佛言或有説言子修善法父作不善因子修善令父不墮三惡道者是義不然何以故身口意業各別異故若父喪已墮餓鬼中子為追福當知即得若生天中都不思念人中之物何以故天上成就勝妙寶故若入地獄身受苦惱不暇思念是故不得畜生人中亦復如是若謂餓鬼何緣獨得以其本有愛貪慳吝故墮餓鬼中既為餓鬼常悔本過思念欲得是故得之若所為者生餘道中其餘眷屬墮餓鬼者皆悉得之是故智者應為餓鬼勤作福德大毗婆沙論云生聞婆羅門白佛言喬答摩我有親里命過欲施其食彼為得我食不世尊告言此事不定所以者何諸有情類有五趣別若汝親里生地獄中食地獄食以自存活彼不能受汝食生傍生趣天趣人趣亦復如是若汝親里生鬼趣中則能受汝所施飲食婆羅門言若我親里不生鬼趣所施飲食誰當受之佛語彼言餓鬼趣中無汝親里無有是處乃至廣説冥報記云眭仁蒨問鬼成景曰人死當分入六道那得盡為鬼景曰君縣內萬餘戶獄囚常二十人已下萬戶之內五品官無九品已上官數十人六道之內亦一如此耳其得天道萬無一人如君縣內無一五品官得人道者有數人如君九品入地獄者亦數十如君獄內囚唯鬼及畜生最為多也如君縣內課役戶就此道中又有等級因指其從者曰彼人大不如我其不及彼者尤多忠曰世尊説應為鬼道作福善而諸道中鬼畜居多之理景鬼之言盡矣審惟彼此追薦之業不可廢焉大行追嚴上堂忠曰天子追薦上堂也史記景帝紀注云服虔曰天子死未有諡稱大行又見節時門大夜處希叟曇禪師雪竇録大行追嚴上堂云統御金輪四十年拱埀衣化育黎元萬機休罷升遐去四海無思不斷魂云云水陸會釋門正統云水陸者取諸仙致食於流水鬼致食於淨地之義亦因武帝夢一神僧告曰六道四生受苦無量何不作水陸普濟羣靈諸功德中最為第一帝問沙門咸無知者唯志公勸帝廣尋經論必有因緣於是搜尋貝葉置法雲殿早夜披覽及詳阿難遇面然鬼王建立平等斛食之意用製儀文三年乃成遂於潤之金山寺修設帝躬臨地席詔祐律師宣文世涉周隋茲文不傳至唐咸亨中西京法海寺英禪師因異人之告得其科儀遂再興焉我朝蘇文忠公軾重述水陸法像贊今謂之眉山水陸供養上下八位者是也熙寧中東川楊鍔祖述舊規又製儀文三卷行於蜀中最為近古然江淮京浙所用像設一百二十位者皆後人踵事增華以崇其法至於津濟一也事物紀原云今釋氏教中有水陸齋儀按其事始出於梁武帝蕭衍初帝居法雲殿一夕夢僧教設水陸齋覺而求其儀而世無其説因自撰集銓次既成設之於金山實天監七年也大抵取救焰口經事云爾釋氏資鑑云唐高宗咸亨二年西京法海寺英禪師有異人來謁曰弟子知有水陸齋可以利益幽明自梁武歿後因循不行今大覺寺吳僧義濟藏此儀文願師往求以來月十五日於山北寺如法修設苟釋狴牢敢不知報英公尋詣濟處得儀文以歸即以所期日於山北寺修設次日曛暮向者異人與十數輩來謝曰弟子即秦莊襄王也又指其徒曰此范睢穰侯白起王剪張儀陳軫皆秦臣也咸坐本罪幽囚陰府大夜冥冥無能救護昔梁武帝於金山寺設此齋時前代弒紂之臣皆免所苦弟子爾時亦暫息苦然以獄情未決不得出離今蒙吾師設齋弟子與此輩并列國諸侯衆等皆乘善力將生人間慮世異國殊故此來謝言訖遂滅自是儀文布行天下作大利益賾師葦江集月江印禪師録朝廷金山寺建水陸會普説云大元佛心聖主於楊子江建金山萬僧之海會修水陸無礙之大齋披閲五千四十八卷之尊經講演教禪直指難思之妙法云云廣説復舉梁武帝夢神僧告曰六道四生幽囚者衆何不建水陸大齋而濟拔之帝既寤詔十大高僧披尋大藏撰成儀文始於金山建此大會於初夜分悉停燈燭帝親臨筵禱曰若此儀文理協聖凡願我拜起燈燭自明如未符聖意燭暗如故帝一拜燈燭皆明二拜宮殿震動三拜天雨寶花當時靈異不可勝數至於歷代修建顯驗猶多當今佛心天子以梁武之心為心特降御香七寶綵緞修設齋供建此大會宰相百官光臨法會諸山碩德共闡玄音凡聖混融人天交接直得娑竭羅龍王從海涌出親獻寶珠天帝釋空中雨花殷勤贊嘆佛祖統紀録梁武英師事訖述曰昔真隱史越王嘗過金山慕水陸齋法之盛乃施田百畝於月波山專建四時水陸以為報天地君親之舉且親製疏辭刻石殿壁撰集儀文刊板于寺既而孝廟聞而嘉之賜以水陸無礙道場宸翰扁于殿逮今百年修供惟謹去月波里所有梵苑曰尊教師徒濟濟率沙門族姓三千人施財置田一遵月波四時普度之法先是尊教同人有謂越王疏旨之辭專為平昔仕官報效君親之舉美則美矣而於貴賤貧富未見平等修供之意乃力挽志磐續成新儀六卷推廣齋法之盛而刻其板復依準名位繪像幀者二十六軸及今創立齋會於是儀文像軸皆得其用時主其事者寺沙門處謙清節文學師竑以法施者月波住山宗淨也以文字施者則志磐也當願十方伽藍視此為法大興普度之道悲濟會忠曰水陸會又言悲濟會蓋慈悲拯濟之義應菴華禪師報恩光孝録悲濟會水陸升堂云大智洞明體無去住明逾日月寬若太虗天地以此為覆載日月以此為照臨山嶽以此為崔嵬江河以此為流注賢聖以此為威靈凡夫以此為安養陳亡以此為超升冤讎以此為解脫諸佛以此為示現祖師以此為單傳諸人以此為悲濟乃至以拄杖卓一卓云願今得果成寶王還度如是恆沙衆施食法敕修清規月分須知云七月十五日晚設盂蘭盆會諷經施食又見施餓鬼食處幻住菴清規載普施法食文與日本禪林所行異也救拔焰口餓鬼經云阿難獨居靜處中夜忽見一餓鬼名曰焰口口中火然咽如針鋒白阿難言汝三日後死我趣中阿難惶怖問何方便餓鬼答言汝於明日若能布施百千那由他恆河沙數餓鬼并百千婆羅門仙等以摩伽陀國所用之斛各施一斛飲食并及為我供養三寶汝得增壽令我離於餓鬼之苦得生天上阿難白佛佛告阿難勿怖我能方便有陀羅尼名曰無量威德自在光明勝妙力即能充足俱胝那由他百千恆河沙數餓鬼及婆羅門仙等上妙飲食一一皆得摩伽陀國所用之斛七七斛食能食彼衆解脫苦身得生天上阿難汝今受持福德壽命皆得增長説陀羅尼曰曩謨薩縛怛他孽跢嚩路枳帝唵三跋羅三跋羅吽佛告阿難若人欲求長壽福德增榮滿足檀波羅蜜每於晨朝及一切時悉無障礙取一淨器盛以淨水置少飲及餅飯等右手按器誦前陀羅尼七遍云云廣説不能具引施餓鬼食施食具言施餓鬼食釋門正統云若夫施食之法又非一切人天所知惟如來以大慈普覆不忍一切含靈受其飢餓苦惱故假面然鬼王緣起令阿難尊者以一摶食誦咒施之今緇素通行謂之施餓鬼食經律所出有三不同一涅槃經謂之曠野鬼二焰口經謂之焰口鬼三鼻奈耶律謂之訶利帝母皆由如來善權示迹俾後之學者依而行之觀其所行用力甚約收功甚博回視夫靈輒倒戈漂母返哺之儔誠有天淵之間所謂曠野鬼并訶利帝母者今為佛弟子每食必出生飯者是也所謂焰口鬼及婆羅門仙者今為佛弟子至心所辨斛食者是也開甘露門施食法亦曰開甘露門幻住菴清規詳載其法冥陽會忠曰蓋施食法也與水陸會不同冥者謂冥界餓鬼衆陽者謂陽界婆羅門仙衆今普供施彼羣生故名冥陽會是故日本藝州佛通寺施食會之牌第二世一笑和尚書曰天地冥陽一切靈位因師集賢録云建水陸冥陽二會設大齋獻天地水府萬靈物初賸語育王植善庫記云都鈐邵君謂夫導往福存莫善於冥陽大會乃年設之斥己財千五百緡足有奇入寺之植善庫存本取息以足厥用頓寫忠曰一座疾書法華經為頓寫矣此方薦亡修之或謂昉於唐僧法僧行或謂起於日本法藏也竺仙仙禪師真如録為征夷大將軍仁山大居士預修拈香云命僧頓書妙法華經一部及仁山大居士親手躬書愚中及禪師丱餘集頓寫法華經祝語云中有純孝沙門而為一日頓寫之權輿良有深旨可不信哉乃至嚴飾齋會延之僧衆於一日內同心戮力頓書八軸以伸供養又供養頓寫法華經語云欽惟佛所護念一乘妙法蓮華經開五種行門中以書寫功德為勝書寫功德中以頓寫功德為最尊最上者久矣空谷應禪師録起峰大祥忌升座云預就西山景德開建道場敦請僧衆三日看閲五部大乘經計二百卷一日頓寫大乘妙典六萬餘言僧祥法華傳記云絳州有孤山西河造立堂舍多樹林木頗得山居形勝處也永徽中有二人僧同房而住一人名僧行行三階佛法一人名僧法行法華三昧二人要契先亡者必告生處如昔無著世親後僧行先亡雖思慕之三年無示告生處堂有觀音像斷食祈誓必有感應僧法斷食五日在堂不出戶外至五日夜夢有一沙門謂法曰汝執取我裳角將見僧行生處即執裳角須臾至地獄猛火熾然不可親近鐵網七重而覆其上鐵扉四面閉甚固百千沙門犯淨戒不調身心者在中受苦沙門謂防守羅剎曰此中有沙門僧行不答有又曰欲見答不可見沙門語羅剎昔同行思慕而來我等佛子汝如何固惜答若欲見隨意即見時羅剎以鉾貫黑炭示之曰此是僧行也僧法見黑炭流泣沙門釋子如何受重苦願欲見昔形時羅剎唱活宛如平生但身體燒爛謂法曰吾昔貢高恣犯汝將救吾苦法曰如何救之答為造法華經曰如何造答一日之中以可畢其功法曰貧道豈可一日中畢答吾苦不可忍剎那難過非一日猛利行焉得苦息爾時羅剎瞋呵以鉾貫之投地獄中法隨前沙門而出夢覺即日捨衣鉢資雇書生四十人一日寫之供養禮拜其夜又夢前沙門來告僧行早離地獄苦近生第二天元亨釋書法藏傳云天帝屈法藏慶讚紺琉璃觀自在像藏曰所生之母去閻浮久不知報生為何處乎天威嚴尊柄持此權乞令貧道詳得見知言已然於是天帝敕一天子將藏往焰王宮焰王受天敕撿罪簿藏之母在燒熱地獄乃付冥使令藏至獄所四旁焰煙叫呼音不堪聞獄卒開一鐵扉猛火迸出不可嚮邇獄卒以鐵鉾探釜底羂一物而出宛似炭頭置藏前曰是師之母也藏心神奪褫不能正視熟看似人藏白母言生平何殃受此極苦對曰只是生育兒孩癡愛之故耳藏曰修何拔濟對曰冥中資糧無過法華願子為我一日寫之母子相語之間獄卒曰獄中無間時今已移刻何其久乎便捉引母母把藏袖大叫獄卒強牽以鉾貫母擲釜中藏見之放身投地悶絶而臥冥使曰是師母自作非他所為早歸閻浮促拯濟方天使又把藏手置肩須臾在東大寺西室藏乃一日內寫妙法華回母冥資其夜夢莊服之天告曰我因經功已出苦輪生忉利宮是人命終當生忉利言不食乎哉無住和尚雜談集云南都大安寺勤操僧正曾夢一僧告曰請為我及吾母一日書寫法華經供養之則庶幾得超拔矣操覺而一如其言南都以此為一日經緣起操即弘法大師求聞持之師也又云一日經未見經文本説日本傳曰昔信州國司任滿還京一蛇相隨逐趁之不去從者太惡之曰請殺之國司曰勿殺必有故夜夢蛇啓曰我於君無禍福但君輜重內有長時怨夫願捉而與我覺後開匱見有一鼠從者曰所謂怨夫必是也欲執與蛇國司仁慈亦不許便請近寺僧一日寫妙經一部供養之以濟拔其後蛇鼠同時死復夢白衣二人來告言吾輩多生怨害輪環無窮矣今蒙君慈濟共生忉利天歡喜禮謝而升天去疾書頓寫亦曰疾書忠曰疾書法華則表猛利行又大品般若經云若欲書是般若波羅蜜時應當疾書止此此是恐魔障故也然疾書文字亦有據漸寫以數日書法華也竺仙仙禪師淨妙録足利殿觀心公周年忌升座云同音誦持祕密伽陀并其頓書漸書妙法華經云云愚中及禪師丱餘集開光禪門拈香云沼田居住某預為先考某大祥忌辰追薦漸寫法華經二部逆修灌頂隨願往生十方淨土普廣菩薩所問經云普廣菩薩白佛言若四輩男女善解法戒知身如幻精勤修習行菩提道未終之時逆修三七然燈續明懸雜高麗藏作繒幡蓋請召衆僧轉誦尊經修諸福業得福多不佛言普廣其福無量不可度量隨心所願獲其果實雲棲正訛集云世人未死先作七七小祥大祥經懺道場名曰預修此訛也言預修者令人趁色身尚在早自修持莫待臨渴掘井逼餒災田也且請他課誦孰若自我修之之為勝乎然肯破慳囊而作佛事良愈於不為者此理或通高明之士自不應爾忠曰逆修説出乎隨願往生經袾宏以為俗傳而剝其妄恣作胸臆論矣袾宏不遠考往生經尚可原之何不近覽佛祖統紀釋氏要覽所載哉所謂隨願往生經在灌頂經第十一卷又經三七統紀要覽訛寫作生七寂照堂谷響集云生七者謂纍七齋也止此從訛文無所辨亦是不閲本經之過也竺仙仙禪師真如録為征夷大將軍仁山大居士預修拈香云奉佛弟子征夷大將軍乙巳本命當於今歲謹發善念預修功課於咋三月二十七日以為初七至於七七已過百日復滿當於今月初六日為一周忌乃倩畫工圖繪大勢至菩薩聖像一尊命僧頓書妙法華經一部及仁山大居士親手躬書特命比丘某拈此信香供養盡虗空界一切三寶云云愚中及和尚年譜云應永十六年己丑八月十七日師示微疾先是相公請預修佛事涓取草四日知事因師不安屢乞前日營辨師云相公涓取某日老僧行腳有何妨乎草四日設大會齋諸般佛事畢自書香語付持實速歸京師持實迫入滅時到而不忍去日將晡師知持實未去叱曰老僧行腳決在明日預修者延壽之善也這回以慶而復命豈可兼凶而聞乎速去速去物故劉熙釋名云漢以來謂死為物故言其諸物皆就朽故也前漢書蘇武傳物故注云師古曰謂死也言其同於鬼物而故也一説不欲斥言但云其所服用之物皆已故耳而説者妄欲改物為勿非也後漢書牟長傳物故注云按魏臺訪問物故之義高堂隆答曰聞之先師物無也故事也言死者無復所能於事故也第二十類言語門尊候敕修清規告香云參頭云即日時令謹時共惟堂頭和尚尊候起居萬福又謝挂搭云參頭云移刻恭惟堂頭和尚尊候起居多福舊説曰候者脈之證候也又曰八刻為一辰十二辰為一日夜五日為一候三候為一氣六氣為一時四時為一歲每候人脈變換故問人起居曰尊候如何言無有病惱也否也馬祖一禪師録云馬祖示疾院主問和尚近日尊候如何師曰日面佛月面佛不審忠曰不審禮話也其義見僧史略須與珍重交看困學紀聞云不審出韓詩外傳止此此但原語本據不必拘禮話敕修清規訓童行云參頭入方丈請住持出就坐參頭進前插香退身歸位緩聲喝云參衆低聲同云不審齊禮三拜又寮元云每日粥罷乃至茶頭喝云不審大衆和南僧史略云如比丘相見曲躬合掌口曰不審者何此三業歸仰也曲躬合掌身也發言不審口也心若不生崇重豈能動身口乎謂之問訊其或卑問尊則不審少病少惱起居輕利不上慰下則不審無病惱乞食易得住處無惡伴水陸無細蟲不後人省其辭止曰不審也大如歇後語乎舊説曰單言不審猶是歇語日本禪林但合掌低頭而不審二字亦不唱母乃太簡乎已下略舉事證臨濟玄禪師録云麻谷拽師下座麻谷却坐師近前云不審雲門偃禪師録室中語要云舉夾山語云百草頭上薦取老僧師合掌云不審不審珍重敕修清規訓童行云屏息拱聽規誨畢又三拜參頭喝云珍重衆齊低聲和問訊而退僧史略云臨去辭曰珍重何此則相見既畢情意已通囑曰珍重猶言善加保重請加自愛好將息宜保惜同也釋氏要覽云釋氏相見將退即口云珍重如此方俗云安置也言珍重即是囑云善加保重也若卑至於尊所尊長命坐及受經後去即不云珍重但合掌俯首示敬也已下略舉事證傳燈録瑞鹿先禪師章云初夜唱禮了僧堂前喝珍重僧堂前喝珍重了和尚處問訊又國清院奉禪師章云如何是出家人本分事師曰早起不審夜間珍重續燈録香林遠禪師章云問如何是平常心師云早朝不審晚後珍重傳燈録無等禪師嗣馬祖一章云師住武昌大寂寺一日大衆晚參師見人人上來師前道不審乃謂衆曰大衆適來聲向什麼處去也有一僧豎起指頭師云珍重又巖頭豁禪師章云夾山會下一僧到石霜入門便道不審石霜曰不必闍梨僧曰恁麼即珍重又到巖頭如前道不審師曰噓僧曰恁麼即珍重方回步師曰雖是後生亦能管帶續燈録天衣懷禪師章云上堂大衆集定云上來打箇不審能消萬兩黃金下去打箇珍重亦消得四天下供養若作佛法話會滴水難消若作無事商量眼中著屑且作麼生即是良久云還會麼珍重忠曰或問已言早起不審却晚參道不審何也答曰凡上來見師主則不拘早晚言不審下去則言珍重若常隨者早起見時可言不審夜間退時可言珍重而已降重敕修清規迎待尊宿云請客侍者具狀詣客位稟云方丈拜請和尚今晚就寢堂特為獻湯伏望慈悲降重舊説曰請和尚則言降重請首座則言光降蓋分尊卑也忠曰按庫司頭首特為新挂搭茶云衆慈同埀降重敕修故降重語不局請和尚也品字箋云重物之不輕者也又慎重厚重遲重持重皆不輕舉妄動之意論語君子不重則不威光降敕修清規庫司四節特為首座大衆湯云都寺令客頭行者備盤袱爐燭詣前堂首座前稟云今晚就雲堂特為首座大衆點湯伏望慈悲特埀光降又見降重處拜覆敕修清規謝挂搭回禮榜云堂司行者某拜覆禪居附録云希陵頓首拜覆澱山堂上和尚月江禪師席前忠曰覆申覆也俗訛為反覆酬答之義非也前漢書馮唐傳云賞賜決於外不從中覆也注師古曰覆謂覆白之也音芳目反正字通云又官府吏文之申請于上者曰申曰覆馮唐傳云云承準敕修清規謝挂搭回禮榜云客頭行者某承準忠曰承受堂頭命而依準其所命也居家必用云承受納其事也又云準法則也一中敕修清規新首座特為後堂大衆茶狀云今晨齋退就雲堂點茶一中特為後堂首座大衆又方丈特為新挂搭茶狀云今晨齋退就庫司點茶一中特為伏望衆慈同埀降重聯燈會要洞山價禪師章云師於咸通十年三月一日剃沐端然坐逝大衆號慟移時師忽開眼云夫出家之人心不附物是真修行勞生息死於悲何有乃令主事辨愚癡齋一中蓋貴其戀情也至八日方坐逝曰傳燈作一普一普者普及一堂也一山曰表衆人愚癡不了生死本空之理故曰愚癡齋一中一堂之謂也舊説紛紜解一中或謂中字平呼盞有大中小三品而茶湯用中盞即如馬上盞者故云一中矣或謂一座之義或謂中者滿也誠齋詩有齋一中語或謂夢語集云近入唐人問彼土尊宿答曰中與鍾音同鍾盞也一中即是一盞義止此忠謂數説皆未是忠曰一中者中坐一筵之義也臥雲夢語集云常光國師曾講傳燈録及法眼傳中中坐茶筵未起之語國師曰中者如茶湯榜一中之中也豫謂蓋特為座必在中央故謂一中也止此瑞溪所解得中正矣已下略舉中坐之證敕修清規迎待尊宿云若法眷尊長至先講諸山相見禮送客位請居中座住持插香禮拜講法眷禮方丈內坐當讓中位又云若嗣法辦事法姪相訪當躬至方丈住持即令鳴僧堂鐘集衆人事先請住持中坐行弟子法眷禮解者曰中位主人所居請令居之示尊敬也住持讓自中位尊法眷也傳燈録清涼益禪師章云初開堂日中坐茶筵未起四衆先圍繞法座南禪規式開堂中座云寢堂有上中下三座中座為上傳燈清涼章中坐茶筵是也忠曰可言寢堂有左右中三座已有上座復言中座為上造語拙矣瑩山清規云半夏或法堂或方丈齋立中座接名德等此謂中筵齋或施主接之忠曰中筵齋儀見禪苑清規但未辨中義而今瑩山以立中座解中筵則亦可以證一中也俗儀亦以中座為崇賓湖海新聞云海東伯視浙西憲洪起畏曰是我前生父母若不遇此恩人安能有今日富貴掖憲中坐把盞周密問勞浹洽又徽宗畫題一中字事雖不涉且録之臥雲日件録云在鹿苑寺看宋徽宗畫題曰宣和殿御製一中未知何義也忠曰蓋惟精惟一允執厥中大禹謨之語用為廋名也歐陽文忠公全集內制集云開寶寺福勝院開啓道場於乾元節日支散袈裟并設大會齋一中江湖紀聞前集秦檜陰獄章云就城隍廟建水陸一中中峯雜録示衆云前日之晚首座與維那到菴言結夏在近請為衆道話一中忠曰此一中似一座義然且隨俗談耳未必求正義梁高僧傳法莊傳云元嘉初出都止道場寺性率素止一中而已忠曰此言日中一食也諸色忠曰猶言種種也敕修清規月分須知云歲終結呈諸色簿書公用忠曰凡公界器物等不可妄私用此謂公用元經世大典賦典有公用錢篇眼同舊説曰衆眼一同觀而為事也忠曰蓋元朝俗語或謂眼同者如兩眼不可闕一凡一具一雙之物若闕一不全則令之完備此云眼同忠曰此解可笑固不足取敕修清規寮主副寮云或有遺忘什物者眼同收拾付還幻住清規攝養云或抱病之人藥餌不靈勢將順寂須宛轉與首座鄉人眼同抄札行李佛祖通載云元世祖聖旨曰應有收藏道家一切經文本處乃至分曉分付差去官眼同焚毀差撥忠曰又作差發差役人發命令也品字箋云差初皆切差遣役使也篇海類編云撥轉之也發也敕修清規直歲云差撥使令賞罰惟當又亡僧送亡云庫司預分付監作行者辨柴化亡差撥行僕禪苑清規亡僧云庫司知事預前差撥行者宋史食貨志云必無肯就招者勢須差撥敕修清規卷首聖旨云不揀甚麼差發休當合用忠曰所欲用之物也敕修清規副寺云病僧合用供給之物即時應付合行忠曰合行者宜作為之之事也敕修清規副寺云常住財物如非寺門外護官員檀越賓客迎送慶弔合行人事並不可假名支破侵漁經國大典注解云合行移關行猶為也言合為移關也合干忠曰干關也可關係其事之人也敕修清規尊宿唱衣云喪司合干人貴在公心主行又云與喪司合干人封定作聲敕修清規坐禪云撑簾下牌輕撼作聲住持頭首出堂又日用軌範云摺被不得抖擻作聲解者曰作聲者俗話也生疏忠曰生者未熟也疏荒疏也生疏謂居動糙也小補韻會云生熟之對山谷詩集謝送銀茄詩云蜀人生疏不下箸注生疏蓋用俗語敕修清規兩序進退云受職新知事云某等乍入叢林諸事生疏過蒙使令下情不勝恐懼之至又日用軌範云鄰單生疏當以善言誘喻不得生嫌惡心劉仕義新知録云歐陽文忠公曰富醫之至人家也僕馬鮮明進退有禮為人診脈按醫書述病證口辨如傾聽之可愛然病兒服藥云無效則不如貧醫貧醫無僕馬舉止生疏為人診脈不能對病兒服藥云疾已愈矣則便是良醫第草一類經録門大藏經宋景濂護法録寶積三昧集序云釋氏之書有三法藏焉曰經曰律曰論經則佛與菩薩等所説論則諸賢聖僧所著唯律必佛口親宣而非諸大弟子之得與聞也然而三藏之間統為十二部分為大小中三乘廣大殊勝無所不攝其文久流中國至秦而絶漢遣郎中蔡愔及秦景往使天竺受其書以歸自是譯師疊至代有所增以卷計者梁則五千四百隋則六千一百九十八唐承隋亂之後稍有廢逸開元之目則五千四十八至貞元中則又增二百七十五宋太平興國以來或翻譯或編纂或收貞元未附藏者又增七百七十五逮元有國又增二百八十六其中頗不能盡知今以千文紀之自天至遵為號者五百八十六通為六千二百二十九卷噫嘻其廣矣哉舊説曰大藏以千字文命函未知始於何人智升開元目録猶未言天地玄黃等忠按唐智升撰開元釋教録略出四卷自大般若經六百卷已下以千字文天等字命函帙直到羣字都四百七十九字舊説云智升未命之蓋不核及略出也釋氏通鑑唐開元十八年紀云沙門智升撰開元釋教録二十卷銓次大藏經律論凡五千四十八卷自天地玄黃字號止笙字函後數十函系傳録及唐宋新譯經又護法録贈令儀藏主序云三藏靈文琅函玉軸世所嚴奉者凡五千四十八卷六百億三萬一千八百八十八言其刊定因果窮究性相則謂之經埀範四儀嚴制三業則謂之律研真顯正核偽摧邪則謂之論三者莫不具焉應菴華禪師録有散藏經小參五部大乘經法華玄義云究竟大乘無過華嚴大集大品法華涅槃忠曰大乘經揀出五部正從智者大師説隋文帝時又曰相傳此五部華嚴則取六十經蓋智者時無八十經大集六十卷大集三十卷日藏月藏地藏十輸各十卷大品三十卷法華八卷涅槃則取四十經是亦智者時經總一百九十八卷若以法華為七卷則一百九十七卷雲棲正訛集云世人相傳誦五大部謂是華嚴涅槃心地觀報恩金光明五經此訛也五大部者一大藏之總名所謂般若部華嚴部寶積部大集部涅槃部部統所屬諸經如六曹為總而統所屬諸職也若云五部中各取其一則般若部一經不取何名五部忠曰五大部可謂五部大乘也雲棲正世傳之訛則可尚矣惜乎不原智者之説私擇五名以為大藏總名焉又惟雲棲不取阿含部豈可為大藏總名哉若如此則更重一訛何能正訛蘭溪隆禪師建長録有檀越寫五部大乘經上堂南浦明禪師録有大通忌讚五部大乘經升座相國空谷應禪師録有升座數篇皆能言五部綱領天境和尚無規矩小笠原泰山居士拈香云爰有海東宗師證公抽出華嚴方等般若法華涅槃等名為五部大乘經忠曰不辨五部智者抽出乃是三尺之暗也忠按法華經二譯一西晉時竺法護譯為十卷題云正法華經二東晉時鳩摩羅什譯為七卷題云妙法蓮華經然世唯用羅什譯焉如法護譯語意艱澀利益不饒故世不用之捫蝨新話亦論二譯短長忠又按智者擇出五部而其華嚴經智者之時但有六十經矣然今時五部取八十經者何蓋六十經竺法護之譯而語意不圓利益惟少故取八十經而已四大部經敕修清規祈禱云或看藏經或四大部經或三日五日七日隨時而行佛祖統紀云馮楫問道於杲佛日頓悟心旨南渡之後所在經藏殘闕楫以奉資造大藏經四十八所小藏四大部者亦如其數注云世以華嚴涅槃寶積珠林為四大部忠曰珠林二字訛當作般若見物初賸語及北澗文集物初賸語資壽教院經藏記曰今所匭藏特雜華般若寶積涅槃四大部與夫珠林之文而已如不足何北澗文集江東延慶院經藏記云教有半滿藏無小大般若寶積華嚴涅槃合八百四十一卷自五千四十八卷出忠曰蓋世俗以五千四十八為大藏以四部八百四十一卷者為小藏北澗欲辨此訛故云藏無小大也金剛經忠曰禪家專誦此經弘忍慧能二大師有勸獎語又依慧能初聞誦此經心即開悟又忍大師為説此經至應無所住而生其心慧能言下大悟一切萬法不離自性如壇經説法寶壇經六祖自説行由云見一客誦經慧能一聞經語心即開悟遂問客誦何經客曰金剛經復問從何所來持此經典客云我從蘄州黃梅縣東禪寺來其寺是五祖忍大師在彼主化門人一千有餘我到彼中禮拜聽受此經大師常勤僧俗但持金剛經即自見性直了成佛又般若品云善知識若欲入甚深法界及般若三昧者須修般若行持誦金剛般若經即得見性當知此經功德無量無邊經中分明讚嘆莫能具説楞嚴咒首楞嚴經長水疏云首楞嚴者梵語也涅槃云首楞者名一切事竟嚴者名堅即一切事究竟堅固也得此三昧觀法如幻於法自在又咒末疏云此咒四百二十七句前諸句數但是歸命諸佛菩薩衆賢聖等及敘咒願加被離諸惡鬼病等難至四百十九云跢姪他此云即説咒曰從四百二十唵字去方是正咒如前云六時行道誦咒每一時誦一百八遍即正誦此心咒耳如或通誦更為盡善大明仁孝皇后勸善書云白傘蓋者二千一百三十字首楞嚴經圓通疏云臨川克立曰昔天台智者大師聞西域有是經夙夜西望願見而未及見也唐武后長安末般剌密帝三藏始持梵本自南海至廣州會宰相房融知南銓在廣請就制止寺譯出而筆受之中宗神龍元年乙巳五月念三日經成謄寫入奏適朝廷多故未遑頒行有神秀禪師入內道場見所奏本傳寫歸荊州度門寺時慧振法師訪度門而得之經始傳天寶十年西京興福寺惟愨法師復於故相房融家得其筆受之本始作疏解而廣傳之舊説曰禪剎誦楞嚴咒始自唐北宗神秀大師忠曰克立但言神秀傳寫此經歸度門寺未得神秀始誦此咒之證舊説附會此類不一然既寫得則理可誦咒榮西興禪護國論云楞嚴經云佛言阿難持此四種律儀皎如氷霜一心誦我般怛羅咒要當選擇戒清淨者以為其師著新淨衣燃香間居誦此心佛所説神咒一百八遍然後結界建立道場求於悉地速得現前於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令誦持衆生火不能燒水不能溺乃至心得正受一切咒詛一切惡星不能起惡阿難當知是咒常有八萬四千那由他等金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍設有衆生於散亂心心念口持是金剛王常隨從何况決定菩提心者阿難是娑婆界有八萬四千災變惡星二十八大惡星出現世時能生災異有此咒地悉皆消滅十二由旬成結界地諸惡災障永不能入是故如來宣示此咒於未來世保護初學諸修行者文禪院恆修此是白傘蓋法也鎮護國家之義明矣僧史略曰灌頂壇法始於不空代宗永泰年中敕灌頂道場處選二七人為國長誦佛頂咒及免差科地稅云釋氏資鑑云唐代宗大曆九年甲寅道士史華以術得幸因請立刃梯與沙門粗法有旨兩街選僧剋日較勝負沙門崇惠常誦楞嚴咒表請挫之帝率百僚臨觀史華革履刃梯而上命惠躡刃而升往復無傷惠乘勝命聚薪於庭舉烈焰惠入火聚呼華入華慚汗不敢正視帝大悅賜崇惠號護國三藏紫衣白傘蓋神咒楞嚴咒稱白傘蓋神咒即八句陀羅尼也首楞嚴經曰一心誦我佛頂光明摩訶薩怛多般怛囉無上神咒斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所説心咒溫陵會解云摩訶薩怛多般怛囉此云大白傘蓋即藏心也量廓沙界曰大體絶妄染曰白用覆一切曰傘蓋神咒從此流演故名心咒智廣編密咒圓因往生集載大佛頂白傘蓋心咒云捺麻廝怛二合達引須遏怛引也阿囉訶二合矴薩滅三莫𭊁薛怛涅達引唵阿捺令覓折寧覓引囉末唧囉二合𭊁呤末舌齒𭊁末舌齒𭊁禰末唧囉二合鉢引禰癹怛吽𠹌二合引癹怛莎引訶大悲咒敕修清規旦望藏殿祝讚云維那舉大悲咒千手千眼觀世音菩薩廣大圓滿無礙大悲心陀羅尼經一卷唐西天竺伽梵達摩譯經咒功德如彼説大慧普説云如大悲咒云阿遊孕杜撰者輒敢易遊字為逝且言是鬼名因鬼告以名阿逝孕由是易之此由可怪既云祕密伽陀又是古聖師譯豈可信鬼語而誣先聖耶信知學不經師豈免邪解叢林公論云乾道間伊菴權和尚董天台平田有士人陳德夫訪之曰大悲神咒舊本作阿遊孕新改為阿逝孕謂神人現而正之如何菴曰咒乃如來祕密之言十師未嘗譯也字或可改咒已譯矣消災咒敕修清規祈禱云如祈晴祈雨則諷大悲咒消災咒大雲咒佛説大威德金輪佛頂熾盛光如來消除一切災難陀羅尼經一卷施護譯佛説熾盛光大威德消災吉祥陀羅尼經一卷經云我今説過去娑羅王如來所説熾盛光大威德陀羅尼除災難法乃至受持讀誦此陀羅尼者能成就八萬種吉祥事能除滅八萬種不吉祥事詳如經説尊勝陀羅尼宋高僧傳唐五臺山佛陀波利傳云釋佛陀波利華言覺護北印度罽賓國人忘身徇道遍觀靈迹聞文殊師利在清涼山遠涉流沙躬來禮謁以天皇儀鳳元年丙子杖錫五臺虔誠禮拜悲泣雨淚冀覩聖容倐焉見一老翁從山而出作婆羅門語謂波利曰師何所求耶波利答曰聞文殊大士隱迹此山從印度來欲求瞻禮翁曰師從彼國將佛頂尊勝陀羅尼經來否此土衆生多造諸罪出家之輩亦多所犯佛頂神咒除罪祕方若不齎經徒來何益縱見文殊亦何能識師可還西國取彼經來流傳此土即是遍奉衆聖廣利羣生拯接幽冥報諸佛恩也師取經來至弟子當示文殊居處波利聞已不勝喜躍裁抑悲淚向山更禮舉頭之頃不見老人波利驚愕倍增虔恪遂返本國取得經回既達帝城便求進見有司具奏天皇賞其精誠崇斯祕典下詔鴻臚寺典客令杜行顗與日照三藏於內共譯譯訖嚫絹三十匹經留在內波利埀泣奏曰委棄身命志在利人請帝流行是所望也帝愍其專切遂留所譯之經還其梵本波利得經彌復欣喜乃向西明寺訪得善梵語僧順貞奏乞重翻帝俞其請波利遂與順貞對諸大德翻出名曰佛頂尊勝陀羅尼經與前杜令所譯者咒韻經文少有同異波利所願既畢却持梵本入于五臺莫知所之無住和尚雜談集云聖一國師住東福日行事稠於餘禪院朝誦楞嚴咒日中諷尊勝陀羅尼七遍有渡宋老僧啓國師曰若欲行宋樣則何不一隨彼事例國師曰宋土僧則如法坐禪四時坐禪外猶有常坐者凡彼國無道無俗多務坐禪故省於行事耳矣如日本禪僧不然不專於禪定若復疏略乎行事誦咒何以消信施若汝輩修禪如同宋僧則廢行事亦可也其僧無以答焉尊勝經説消信施功能復令魔外遠潛一時天狗魔憑人言我亦欲往東福但怖他尊勝陀羅尼無量壽咒敕修清規聖節云諷無量壽咒舉藥師號佛祖通載云弘教集云元世祖命僧念無量壽王陀羅尼經能念者賜匹帛稱賞聖節誦無量壽咒必是此經陀羅尼也非謂往生咒佛説大乘聖無量壽決定光明王如來陀羅尼經一卷那爛陀寺法天譯經云佛言今此閻浮提世界中人壽命百歲於中多有造諸惡業而復中夭若有衆生得見此無量壽決定光明王如來陀羅尼經功德殊勝及聞名號若自書寫若教他人書是經竟或於自舍宅或於高樓或安精舍殿堂之中受持讀誦遵奉禮拜種種妙華燒香粖香塗香華鬘等供養無量壽決定光明王如來陀羅尼經如是短壽之人若能志心書寫受持讀誦供養禮拜如是之人復增壽命滿於百歲觀音聰明咒村寺清規云童行方入寺乃至宜教觀音聰明咒久而漸漸聰明忠曰陀羅尼集經有觀世音説咒藥服得一聞持陀羅尼又有觀音聞持不忘陀羅尼又續觀音感應集有觀音智慧咒所謂聰明咒是乎續觀音感應集云趙師炳事觀音大士甚虔行徽嚴道中壁間有大士所説智慧咒語且云若人受持滿二百萬遍智慧不與我等我誓不成正覺咒曰唵婆囉婆囉三婆囉三婆囉印涅唎野彌輸陀尼唵嚕唵嚕折唎曳鎖訶經馬忠曰日本禪剎祈禱或盂蘭盆會等印造心經及馬圖加之紙錢先挂殿柱經罷而焚化未知何時起必是宋國禪林之法此方傳習而已蓋人鬼道異若火化之則得他受用詳錢財門紙錢處今繪馬火化之則鬼得取而乘亦如此豐後州大分郡真萱村松岡有松岡山長興寺東福門派要翁綱禪師為開基祖其扁額寧一山書寺有馬經之印板是要翁時物經則心經馬圖亦如今所繪也要翁即圓爾之第四世已下略引事證空谷尚直編云浙右有人印造佛天三界紙馬開張店業店屋楣間平鋪閣板作臥室於閣上一夜觸翻尿器淋漓污馬仍將此馬晒乾賣之本年從店中提出此人雷打死於門前王同軌耳談云蘄水薛府尹均永樂時人往巴河鎮平生清苦上亦甚稱之橐無一錢在任積俸置紙馬板數副以貽子孫今巴河薛鋪紙馬獨易售人猶稱薛府尹紙馬可謂厚於貽矣博異志云開元中琅邪王昌齡自吳抵京國舟行至馬當山屬風便而舟人云貴賤至此皆合謁廟以祈風水之安昌齡不能駐乃命使賚酒脯紙馬獻于大王而以一首詩曰青驄一匹崑崙牽奉上大王不取錢直為猛風波裏驟莫怪昌齡不下船宋史禮志云大中祥符二年十二月北朝皇太后凶訃遣使來告云云焚紙馬皆舉哭再拜歸元直指臨終四關云不求出世善根為愛家園長旺以致臨終遭病怕死貪生信受童兒呼神喚鬼燒錢化馬殺戮衆生緣此心邪無佛攝護忠曰此是責貪生諂鬼不求出纏非必言燒錢化馬是邪業元亨釋書云釋道公居天王寺持法華有年矣嘗詣熊野安居夏終還本寺暮過一村無居宅宿大樹下夜半有騎馬者三十餘人至樹下一人呼曰翁在乎答曰在曰何不前去答曰馬足損不任乘齡又衰老不能徒步諸騎過去明旦公怪巡見樹下有小神祠其像朽弊前有片板上圖馬形前足之處其板破裂公便以絲繫補欲試神言次夜猶宿樹下中夜前騎又來呼翁乘馬而出向曉更翁歸來謝曰承師賜治馬腳不堪幸也乃出甘膳餉公公曰數騎何人翁曰行疫神也神巡管內我為前驅若不出必受笞罵今蒙師惠嘉慶深矣忠曰焚馬多見本據焚經難得其證適得焚尊勝咒施鬼事是可以證焚心經也異聞總録云李泳子永平生常印尊勝陀羅尼幡焚施鬼道淳熙六年為坑冶司幹官分局信州次年十二月被檄至弋陽邑宰招飲歸已侵夜臥驛堂睡未交睫見二婦人一冠一髻徘徊往來於室中知其為異物不及問少焉微寤則已逼床下李祝之曰若有所言可明告我不然托諸夢可也展轉間復睡夢兩人來拜曰見公無所求只欲得常印尊勝幡耳李曰吾在役固未嘗携來奈何曰候公歸信州見贈未晚扣其姓氏曰無用問當自知之明旦訪諸人其從行虞候能言云比年廣州盧彝通判之妾以産終此室今頂髻者是矣其冠者不知何人李還舍為印數十本焚與之語録忠曰禪祖語要不事華藻以常談直説侍者小師隨而筆録此名語録正字通云録音鹿謄寫曰録又書篇名梁阮孝緒七録云云宋諸儒有語録名臣言行録文心雕龍云録者領也古史世本編以簡策領其名數故曰録也話則丹鉛總録云佛書以一條為一則洪景盧容齊隨筆史繩祖學齋占畢用之品字箋云則法則凡制度品式之有法者皆曰則祖庭事苑云宗門因緣不言一節一段而言一則者蓋則以制字從貝從刀貝人所寶也刀人所利也所發之語若刀之制物以有則也故人皆寶之以為終身之利焉是知謂一則者不無深意也忠曰佛祖説話可為學者法則故言話則又言話幾則不必用事苑鑿説矣公案中峯山房夜話云或問佛祖機緣世稱公案者何耶幻曰公案乃喻乎公府之案牘也法之所在而王道之治亂實係焉公者乃聖賢一其轍天下同其途之至理也案者乃記聖賢為理之正文也凡有天下者未嘗無公府有公府者未嘗無案牘蓋欲取以為法而斷天下之不正者也公案行則理法用理法用則天下正天下正則王道治矣夫佛祖機緣目之曰公案亦爾蓋非一人之臆見乃會靈源契妙旨破生死越情量與三世十方百千開士同稟之至理也聯燈會要黃檗運禪師章云次日升堂云昨日尋羚羊僧出來其僧便出師云昨日公案老僧休去作麼生僧無語師云將謂是本色衲子元來是義學沙門拈拄杖即時打出蓋禪帖公案之言始見于此廣燈文異碧巖録三教老人序云嘗謂祖教之書謂之公案者倡於唐而盛於宋其來尚矣二字乃世間法中吏牘語其用有三面壁功成行腳事了定槃之星難明野狐之趣易墮具眼為之勘辨一呵一喝要見實詣如老吏據獄讞罪底裏悉見情款不遺一也其次則嶺南初來西江未吸亡羊之岐易泣指海之針必南悲心為之接引一棒一痕要令證悟如廷尉執法平反出人於死二也又其次則犯稼憂深繫驢事重學奕之志須專染絲之色易悲大善知識為之付囑俾之心死蒲團一動一參如官府頒示條令令人讀律知法惡念才生旋即寢滅三也具方册作案底陳機境為格令與世間所謂金科玉條清明對越諸書初何以異祖師所以立為公案留示叢林者意或取此虎關鍊和尚曰公案者寄世事而立名唐土有六省日本有八省省者俗云奉行者武士訴武家刑罰事則屬兵部省刑部省決之民訴田壤事則民部省決之判文事則治部省決之凡諸奉行者以自古公界所定法式聚置之於案上仍擬于今之所訟而理之日本法家人以延喜式目弘仁式目沙汰而理之即是也宗門公案亦爾提撕古人相師所定之法是非一人之私法便天下公共之理也雲棲正訛集云公案者公府之案牘也所以剖斷是非而諸祖問答機緣亦只為剖斷生死故以名之總其問答中緊要一句則為話頭如一歸何處因甚道無念佛是誰之類是也千七百則乃至多種皆悉如是居家必用吏學指南册籍類云公案謂公事始末也又埀説部拈古處東山外集説偈頌翻譯名義集云伽陀此云孤起妙玄云不重頌者名孤起亦曰諷頌西域記云舊曰偈梵本略也或曰偈他梵音訛也今從正音宜云伽陀唐言頌又云祇夜此云重頌妙玄云重頌上直説修多羅也亦曰應頌頌長行也忠曰禪宗偈頌尋源二十八祖有傳法偈慧能神秀呈偈見己所解爾降倡於趙宋而熾於胡元汾陽作廣智歌雪竇圓悟鏗訇埀模範矣禪林寶訓云萬菴曰頌始自汾陽暨雪竇宏其音顯其旨汪洋乎不可涯後之作者馳騁雪竇而為之不顧道德之奚若務以文彩煥爛相鮮為美使後生晚進不克見古人渾淳大全之旨烏乎山菴雜録云竺元先師謂做頌須事理俱到譬如打索兩股緊緩不同則不堪矣大川和尚作蜘蛛頌固好但其中三字於理固無害於事則不然其頌云一絲挂得虗空住百億絲頭殺氣生上下四圍羅織了待無漏網話方行末後三字於蜘蛛却無交涉又題出山相云龍姿鳳質出王宮垢面灰頭下雪峯誓願欲窮諸有海不知諸有幾時窮以雪峯易雪山拘韻耳而此地有雪峯其名既顯似覺有妨所以不純也竺仙疑問云宗門偈頌唯是發明佛祖大事非達佛祖之知見孰能為之頌者誦也稱述也美盛德之形容歌誦盛德也謂以偈言稱頌其事以美其德也所謂遊揚德業褒讚成功是矣而佛菩薩正當宣揚之時皆以寶音梵唄演而為微妙清雅之韻悠揚諷咏優遊彬蔚婉而成章乃涵不盡深長之意令人樂聞今茲翻譯莫能寫之唯掇其大意耳是故經偈亦無有押韻也東土諸祖始稍體之是皆悟明通達衝口而成非假造作法滋既久華竺兩狎人心轉巧機變迭出遂寄調於風雅之音播揚西來不傳而傳之意也且詩者止乎六義而已宗門玄唱則有儼若含於六義者有超然於六義之表而絶去世間翰墨畦徑之外來不知蹤去不知迹非意可求非情能測若或體其所翻經偈之作則逼似之唯其達人千變萬化所謂青出於藍冰寒於水而成亹亹者歟自古至今代不乏賢然雖近今而能超於前作者時亦有之第不多耳夢巖旱霖集跋北澗詩集云詩也者人之情性也因感觸而生云云吾釋偈頌據彼之方有祇夜者焉有伽陀者焉昔人曰偈或偈他蓋梵音之訛略也按梁僧史羅什語慧睿曰天竺國俗甚重文製其宮商體韻以入絃為善凡見佛覲王詠歌功德經中偈頌皆其式也但改梵為秦失其藻蔚傳譯大意以詔後世有如嚼飯與人非特失味乃令嘔噦也什輒製偈贈沙門法和曰心山育明德流薰萬由延哀鸞孤桐上清音滿九天此土之偈濫觴于此自爾以降達磨對揚衒之作偈以至汾陽雪竇或古或律偈頌獨盛于吾門向所謂情性之本發為玄言奇唱蓋詩律特其寓也耳卿睦菴曰詩而非詩乃此也然悠悠後學不本宗猷肆筆而成全無羞愧如峨嵋鴉臭十倍隱之何其多耶至若黃龍之由有沒二字服其妙密則蓋寡矣其末流甚者聞云秋雲秋水共依依則曰此詩也聞云倒騎佛殿上天台則曰此頌也欲不笑而得乎夫內無所得語言惟貴則雖咸池三百首金薤千萬篇竟何補於吾道之萬一耶北澗老子從涵養醞藉之中獲超然自得之妙離文字之縛脫筆墨之畛畦文章巨公與交則寂寥乎短章舂容乎大篇謂之詩也亦得衲子與酬唱則痛快過乎棒喝之用事謂之頌也亦得與夫休己島可之徒雕肝鏤腎抽黃對白以詩著名者不亦邈乎舊説曰妙喜中巖月和尚云詩與頌別頌者倒騎佛殿出山門等活語是也詩者秋雲秋水共依依等細調柔和語也忠曰野哉斯言此必逐弊風文字禪者之説非中巖也縱作倒騎佛殿等語若不具眼則非頌亦非詩無可名焉縱作秋雲秋水等語若具禪意則可為頌也昔麟一菴頌於應無所住而生其心用司空曙詩全篇曰罷釣歸來不繫船江村月落正堪眠縱然一夜風吹去只在蘆花淺水邊絶海特賞之可知頌與詩之辨在意旨而不在言語頌古小補韻會宋韻云頌似用切説文頌貌也廣韻歌也子夏毛詩大序云頌者美盛德之形容以其成功告於神明者也周禮大師六詩注云頌之言誦也容也誦今之德廣以美之毛詩注疏周頌正義云頌之言容歌成功之容狀也詩經周頌朱熹注云頌者宗廟之樂歌大序所謂美盛德之形容以其成功告于神明者也蓋頌與容古字通用故序以此言之唐賈島二南密旨云頌者美也美君臣之德化忠曰頌名本起于六詩風賦比興雅頌歌誦盛德以告于神明者也如禪家頌古則舉古則為韻語而發明之以為人亦是歌誦佛祖之盛德而揚其美故名頌古汾陽無德禪師録有頌古一百篇禪家頌古以此為權輿禪林寶訓云萬菴曰頌始自汾陽暨雪竇宏其音顯其旨汪洋乎不可涯又云心聞賁和尚曰天禧間雪竇以辨博之才美意變弄求新琢巧繼汾陽為頌古籠絡當世學者宗風由此一變矣碧巖録云大凡頌古只是繞路説禪拈古大綱據款結案而已雲臥紀談云大溈佛性禪師為其嗣者潭州惠通旦公嘗頌覺鐵觜先師無此語話曰誰道先師無此語焦尾大蟲元是虎胡蜂不戀舊時窠猛將不歸家裏死急著眼勿回顧若會截流那下行匝地清風隨步武佛性見而諭之曰頌古拈古要奢儉得所如人解使錢不必多也及頌黃檗示衆噇酒糟話曰荊棘林中宣妙義蒺䔧園裏放毫光千言萬語無人會又逐流鶯過短墻佛性頷之竺仙疑問云頌古之作譬之儒家則猶詠史也復幾數百載矣蓋始於宋國初汾陽是時尊宿皆悉渾厚蘊藉不尚浮靡天禧間雪竇以辨博之才恢宏其音莫不卷舒抑揚縱橫得妙後之作者莫出其右然亦有以其美意變弄求新琢巧變其宗風失古淳全之作矣至於景定咸淳之間所謂大道衰變風變雅之作於是雕蟲篆刻競之倣效晚唐詩人小巧聲韻思惟煉磨而成二十八字曰道號頌時輩相尚逮今莫遏於中雖有深知其非而深欲絶去之者然以久弊不能頓除勉隨其時曲就其機亦復不拒來命時或秉筆覿面信手賦塞所需聊為方便接引之意也然以其音律諧和與夫事理句意俱到而脫者使或哦之誠亦可人然譬如食蜜中邊皆甜宜乎人其愛之若夫欲濟飢餒不可得也道號頌竺仙和尚説見頌古處贊叢林盛事云前輩贊佛祖偈句并自贊語各有矜式今之例多杜撰如自贊亦如贊佛祖之語良可笑耶唯密菴最得其體贊云在家不讀書行腳不參禪隨流間打閧掘地覓青天如今老大空追悔捻人痛處力加鞭塗毒亦云眼瞎耳恆聾鼯鼠技已窮要見巖中主白雲千萬重咄具眼者宜辨之法語東明日禪師録示嗣芳侍者語云法語之作為進道勉勵之助先輩是皆不得已而出一言半句示一機一境如穿楊之箭不發而已發則必中近習師法不嚴以法語為稱己長發越胸中不平何益於本分事况復發越己長不平之者其亦鮮矣希叟曇禪師録示日本平將軍法語云昨承建長鄉老禪師賜書為閣下需語三思前輩大老與士大夫交遊未深不知造蘊不敢輕易通信恐誤於人况小僧耶東山空禪師法語云今時一種風範直是好笑如袖紙燒香求偈頌覓法語之類是也更有一般瞎老師不辨來機便向他雪色紙上屙一堆學家珍藏以為護身符子苦哉苦哉癡絶沖禪師録示巽升維那語云所謂法語者蓋前輩有道之士提持佛祖不傳之妙警悟學者余之不敏烏足以能之寂室光禪師録示真源禪者語云法語者道眼明白底本色宗匠事業以其宗説俱通意句圓活而衲子取為參禪之標式而已是故得之者如袖隋珠卞璧而歸家也實非單見淺識之流容易所議縱使勉強而作非唯無益於他恐招謗乎己之必矣恕中慍禪師録題無準書浮山遠録公語後云昔玉山癡翁凡有學者求警訓往往伸紙絲墨作斗方書般若心經及古德語以酬之於紙尾惟記年月署己名而已更不別加一字蓋其與佛祖同一舌頭同一宣説貴在控人入處實不在馳騁翰墨且與古人述而不作之意合大集經云佛言法語者凡所演説依法而語觀法念法奉行於法行至處法求法欲法樂法修法法幢法仗莊嚴法器法燈法明法念法意法有法所莊嚴瓔珞法床法儀法護法財法無窮盡廣大無邊法事法身法口法意菩薩具足成就如是等法是名法語法語者真實之語守護法語云云廣説又云法者則不可獲無有文字而無言説亦無辭無色無見亦無所趣無言誨亦無所教無心意識無有塵垢無明無暗云云廣説智度論云菩薩知能利益者皆是佛法若不能利益雖種種好語非是佛法譬如種種好藥不能破病不名為藥趣得土泥等能差病者是名為藥行狀忠曰狀書名德行業曰行狀正字通云狀形象也又形容之也文選文宣王行狀注云良曰述其德行之狀文心雕龍云狀者貌也體貌本原取其事實先賢表諡並有行狀狀之大者也第草二類文疏門敕黃敕修清規書記云古之名宿多奉朝廷徵召及名山大剎凡奉聖旨敕黃住持者具謝表示寂有遺表或所賜所問俱奉表進而住持專柄大法無事文字特請書記以職之山堂肆考云唐太宗用黃麻紙寫詔敕文故杜詩紫詔仍兼綰黃麻似六經唐玄宗別置學士院掌內命凡拜免將相皆用白麻注云黃麻詔紙用黃蘗染成取其辟蠹也似六經者謂詔誥之詞渾厚如六經之文也野客叢書云敕舊用白紙唐高宗上元間以施行之制既為永式白紙多蠹遂改用黃除拜將相制書用黃麻紙其或學士制不自中書出故獨用白麻紙所以有黃麻白麻之異也又見經單處聖節黃榜處謝表見敕黃處公文忠曰知府所降公憑文也居家必用云公文謂官遣文字故曰公文敕修清規開堂祝壽云先呈公文舉法語畢接付維那宣白次山門諸山江湖疏一一遞上有法語分送宣讀雪竇顯禪師開堂録小參云僧問四明侯伯遠降公文未涉程途請師速道師云札大慧武庫云洪州奉新縣慧安院偶法席久虗太守移書寶峰真淨禪師命擇人主之時有淵首座向北人孤硬自立白真淨曰惠淵去得否真淨曰汝去得遂復書舉淵淵得公文即辭去隱山璨禪師録云入院指座云隱山無量罪過復被公文追到要得重整頽綱不免再升此座已下略記外典公文語魏書高祖紀云二年夏四月癸酉詔沙門不得去寺浮遊民間行者仰以公文春渚紀聞云江淮發運使盧秉元祐初發解赴闕至泗州夜夢肩輿詣郡守而回過漕司有頂帽執撾而督視工役丹飾門墻者問之云修此以俟新官也盧曰新官為誰執撾者厲聲而對曰盧秉云云既覺未及盥濯而郡將公文一角至即除盧領大漕事為善陰隲曰王縉為兩路提刑每斷死囚必焚香奏天然後行下一日暮坐恍見一玉女長披大袖手持一角公文立于簷前遙告縉曰此汝平生所奏事目一一皆合情法無有枉濫上帝嘉汝已為汝父延壽一紀兼為汝倍增福矣汝之子孫異日亦皆當作監司更宜自勉言訖而歿後果如其言府帖公文也校定清規新住持入院云都寺預請維那首座宣疏帖等人注先讀敕黃省札或府帖山門疏諸山疏次第宣讀諸疏帖文體明辨云疏者布也正字通云疏去聲暮韻音數條陳也忠曰疏者條暢布陳其所蓄望也禪苑清規請尊宿云具合用錢物行李人轎等或舟船要用之物官疏院疏僧官疏諸院長老疏施主疏間居官員疏住持帖本州縣開報彼處州縣文牒官員書信院門茶榜並須子細備辨如法安置舊説曰士大夫為僧製請疏泛論之則南北朝時沈休文發講疏為始禪林請住持疏韶州防禦使何希範等製請疏令雲門偃禪師住靈樹為始其疏載在雲門語録後也僧疏則九峯韶公作疏請大覺璉和尚住阿育王山此為始矣官府疏舊説曰凡請住持有官府疏山門諸山道舊法眷江湖勤舊等疏官府疏者宣政院選舉之也又曰古者官府疏有祝聖壽之語今則山門疏有祝語蓋無官府疏時如此而已若有官府疏則山門疏非必作祝天子語也路疏忠曰某州路官府請住持疏也古林茂禪師永福録有拈路疏語縣疏虗堂愚和尚録續輯云府疏已刊前集縣疏知府陸盤隱撰府僚疏忠曰僚官僚也府中官僚薦住持疏也居頂圓菴集有青遠禪師住昌國普慈府僚疏蓋居頂代府僚製也山門疏舊説曰請住持山門疏敘勸請諸山疏敘促駕江湖疏道舊疏敘展賀又見官府疏法眷疏處敕修清規請新住持云庫司會兩序勤舊茶議發專使修書頭首知事勤舊蒙堂前資僧衆製疏山門諸山江湖茶湯榜同門疏新命同門人製疏賀其入院也見法眷疏處同門義見稱呼門同門處諸山疏本寺鄰封之諸山製新住持入寺疏也見山門疏處江湖疏忠曰江湖上禪剎人製新命入寺疏也見山門疏處有東江湖西江湖二疏南禪規式入院云首座宣山門疏行者兩人扛疏住持在椅其餘疏以次頭首宣讀道舊疏書記諸山疏後堂東江湖西江湖疏東西藏主宣之但道舊同門等疏頭首出衆向法座立定讀之蓋無可宣揚位也忠曰江湖者江外湖邊蕞剎也凡禪剎名山大剎之外者稱江湖矣然舊説援江西馬祖湖南石頭學者憧憧往來之説實無交涉如今此方江湖疏題名銜曰平沙某甲遠浦某乙等是足粗知江湖義莊子云魚相忘於江湖蓮社高賢傳云周續之曰心馳魏闕者以江湖為柣梏文選劉孝標廣絶交論云寄通靈臺之下遺迹江湖之上止此此等江湖其義相通又見稱呼門江湖處道舊疏忠曰新住持道舊製其入寺疏也見官府疏山門疏處道舊者道友也詳稱呼門道舊處法眷疏忠曰新命法屬製其入寺疏也見官府疏處天隱曰今時山門疏語如上表文例祝天子如山門疏以山門事為發端以祝天子終之同門疏以同門事終之江湖疏以江湖事終之道舊疏以道舊事終之法眷疏以兄弟故事終之竺仙來來禪子集有杭州大慈成止巖住西興明化法眷疏蒙頭云時止時行何用隔江招手難兄難弟倒却門前剎竿收結云歡協人天光增法社法親疏法眷疏又名法親疏見義堂空華集方外疏在家士大夫為新住持製疏也居頂圓菴集有方外交疏其柄語云竊聞今浙東天童木菴禪師靖退已久一旦虗席其徒失依遂勸師以輕車熟路復鎮其虗人謂師之此舉足以崇重天童而師固無加損也凡吾薦紳所尚在道道由人興故疏以賀元叟端禪師杭州靈隱録拈方外疏又抗州徑山録拈方外疏語云言言見諦句句朝宗西天昔日淨名老東土今朝龐蘊公江湖友社疏相國寺香渚和尚告忠曰江湖疏外復有江湖友社疏但新命傑出人而敢當之非尋常用之居頂圓菴集有青遠禪師住昌國普慈友社疏又有應中法師住延慶禪林友社疏蓋今為教家發故有禪林目也林泉友社疏舊説曰山門諸山江湖疏外有林泉友社疏但非尋常有之香渚和尚告忠曰林泉友社疏例江湖友社疏必新命傑出人而敢製之義堂空華集有芳少室住淨智友社疏鄉曲疏居頂圓菴集有元素住開壽鄉曲疏淋汗疏忠曰為化柴燒浴製疏也曾聞五嶽學製疏者必先製之試手琳汗義見叢軌門清拙澄禪師録化琳汗頌云陝府鐵牛遭日炙嘉州大象汗交流有人浴得這箇佛萬兩黃金也合收化疏忠曰凡叢林化米化炭等皆造疏化主齎之去一展示其意二證非假竊也已下略録誹僧好化笑隱蒲室集與友人書云不肖多與士大夫交嘗聞其言與僧往來每懼其袖中有物便殺風景謂其持疏也故五年於此修造已十成七八忍貧自力未嘗妄造人門頗似倔強雲棲竹窗三筆云有道者告豫曰我輩冠簪公等剃削夫剃削者應離世絶俗奈何接踵於長途廣行募化者罕遇道流而恆見緇輩也有手持緣簿如土地神前之判官者有魚擊相應高歌唱和而談説因緣如瞽師者有扛擡菩薩像神像而鼓樂喧填贊勸捨施如歌郎者有持半片銅鐃而鼓以竹箸如小兒戲者有整衣執香沿途禮拜挨家逐戶如里甲抄排門册者清修法門或者有玷乎豫無以應草疏忠曰疏語多四六成之而間有散文者此名草疏禪月集上新定宋使君詩云水疊山層擎草疏砧清月苦立霜風已下略録古今草疏九峯韶禪師請大覺住育王疏圓菴作竺芳住道場江湖疏見圓菴集又作性初住雪竇諸山疏見圓菴集又作岱宗住中竺京剎疏見圓菴集笑隱欣禪師請虗谷住徑山江湖疏見蒲室集清拙澄禪師請明蒙山住聖福山門疏見清拙録又請夢窗住建仁疏見清拙録袁中疏集多草疏又有以詩準疏宣讀者義堂日工集云建長中山入寺以余所寄禪詩擬疏付西藏主令讀拈云鐔津語脈筠溪詞源華袞之贈感佩何言蓋日本以詩準疏讀者始於此柄語忠曰山門同門等疏小序名柄語蓋如器有柄也山門疏柄語造語多一律同門疏等柄語有語意不同者瑞溪臥雲日件録云普廣院僧持本寺同門疏來疏語意句不到柄語亦冗甚今時后生不依師授叨作文往往如此道場疏舊説曰道場疏多滿散用之然啓建亦有之凡啓建有疏則滿散必亦有疏啓疏發頭用儒典語散疏發頭用釋典詞又與諷唱門宣疏交看僉疏法見執務門僉疏處文體明辨附録云按道場疏者釋老二家慶禱之詞也慶詞曰生辰疏禱詞曰功德疏二者皆道場之所用也右語忠曰道場疏首敘某州某寺某甲值某事諷某經等畢次正有四六疏語故疏語首必蒙右伏以三字是以疏語稱右語也右者指已前事緣諷誦等伏以已下詳述其志趣禱願等事也東漸略清規佛降誕云維那宣疏至右語住持跪爐忠曰住持跪爐必在右伏以時東漸言右語跪爐則以右伏以為右語正同余所解也文體明辨附録云按右語者宋時詞臣進呈文字之詞也謂之右語者所進文字列于左方而先之以此詞實居其右故因而名之蓋變進書表文之體而別其稱耳然考之諸集唯歐陽修王安石等有進功德疏右語豈其特用於此等文字而他皆不用歟詞皆儷語而短簡特甚忠曰徐氏言所進文字在左此詞居右故名右語者失矣余謂功德疏先列數般功德品目在右方而次之以述其志趣之疏語在左方而此疏語之首必加右伏以三字故以駢儷疏文名為右語耳非為此詞在右矣徐氏見諸家文集唯載右伏以已下儷語未見功德疏全文故謬以謂疏前詞在疏語右故名右語然則不名于本疏為右語而却以前序為右語也夫一篇文字題不題本體却題前序豈有此理耶忠按山門同門等疏凡有右伏以者皆當稱右語然古來右語名唯於道場疏不可稱於餘疏矣舊説曰祈禱等疏語名右語書記製之其文四六也凡右方為尊故右語猶言尊語也非疏文在右方之義忠曰此亦一重臆解固不足取也歐陽文忠公集云太祖皇帝忌辰道場功德疏右語九月八日右伏以當天開運聿隆創始之功繼統承休方罄奉先之孝爰戒徹昔之日用資作善之祥嚴法會於金園啓靈文於貝葉伏願超登妙果高證真乘瞻不動以常存祐無疆而永固下均氓庶咸獲又寧白玉蟾集懺謝朱表云上清大洞寶籙弟子五雷三司判官知北極驅邪院事臣白某右某言伏以紫鸞嘯月青皇埀羽葆於樞宮白鶴呼雲赤帝降霓旌於璣舍已下文繁故略榜品字箋云説文榜木片也古無紙凡有示告皆用板言簡懸之牌文繁列之榜後雖有紙而牌榜之名猶昔焉敕修清規肅衆云大慧禪師住育王時榜示堂司僧爭無明決非好僧有理無理並皆出院南堂欲禪師録大慧和尚墨迹跋云參學兄弟未有正見而務外學故先德有雜毒入心之誡老妙喜榜之於門罰及鄰案在洋嶼一夏打發一十三人夫豈偶然雪峯龍巖翁得此榜時以示人不為無補死心揭榜于門見殿堂門三門處茶湯榜文體明辨云張于食所者曰茶湯榜詳道場榜處敕修清規請新住持云庫司會兩序勤舊茶議發專使修書製疏茶湯榜專使署名請書記為之如缺書記擇能文字者分為之用絹素寫榜解者曰山門疏及茶湯榜書記作之分為之者一人作茶榜一人作湯榜也忠曰新住持茶湯榜有入寺前者有入寺後者敕修清規專使特為新命煎點云茶湯榜張于堂外兩側是即專使與請疏共持去於新命本居處設煎點時所張也又敕修清規山門特為新命茶湯云茶湯榜預張僧堂前上下間是即新命入寺之後煎點所張也回禮榜敕修清規謝挂搭云當日侵早方丈客頭堂司行者各寫回禮榜貼衆寮前方丈榜貼上間兩序榜貼下間榜式云堂頭和尚粥罷回禮新歸堂首座今月日客頭行者某承準頭首知事粥罷回禮新歸堂首座今月日堂司行者某拜覆免告香小榜敕修清規告香云侍者預出小榜貼法堂柱上云奉堂頭和尚慈旨名德西堂首座並免告香侍司某謹白免人事榜敕修清規庫司四節特為首座大衆湯云方丈預出免人事榜云某節並就來日法堂上人事例免到方丈伏希衆悉舊説曰榜有古式今式敕修所載今式也古式免人事榜云結制解制冬節歲節禮數併就來日法堂人事頭首知事耆舊法眷私下往復不必講切希悉及住山某咨白新式免人事榜云某節禮數並就來日法堂上人事例免到方丈幸希衆悉免人事頌禪苑清規冬年人事云節前一日堂頭有免人事頌貼僧堂前貞和集天衣懷禪師元旦免人事頌云休把僧儀混俗情江頭野草幾回青無角鐵牛眠少室當初豈是賀新正又云日日相逢日日新何須特地致殷勤百年三萬六千日祇是南柯夢裏人芙蓉楷禪師録歲旦免人事頌云日出東方夜落西急須著眼莫遲疑新年不用來相賀江月松風是舊時圓照本禪師別録山中歲旦免人事頌云報爾玄徒休賀歲出家弗比在家同老僧自看生來事七十年過一夢中又云自謂居山且免間豈勞心力賀新年百千萬歲今朝事成住壞空彈指間間人不輒入榜臥雲日件録云察堂省西堂入寺據室有間人不輒入之語問之省答曰唐土尊宿之室例揭間人不輒入之榜諸寮報榜敕修清規大挂搭歸堂云維那發諸寮報榜榜式云挂搭一僧某甲上座某州人氏某戒某甲上座某甲上座今月日堂司某報報侍司曰申尊住持也前堂首座侍司衆寮必具戒次州名餘皆不具挂搭報榜敕修清規遊方參請云求住如允仍觸禮一拜就求帖子到侍司附名云適奉方丈慈旨令就上寮附名侍者次第發榜頭下堂司詳帖子處又大相看云次早赴方丈茶求挂搭候發榜下堂司送歸堂榜式云奉方丈慈旨挂搭一僧某甲上座某甲上座今月日侍司某報謝挂搭率香錢小榜見錢財門謝挂搭香錢處參榜參榜即門狀也見門狀處翰墨大全云凡榜子用白紙濶四寸許就中心寫一行橫卷之平常見人添取覆兩字其餘賀謝辭違並臨時於名下改之寫榜子式云僧家某院住持僧某參無頭榜鏡堂圓禪師録示作無頭榜者偈云白壁無頭榜字濃不知虗費半宵功損他常住惡徒黨盡付伽藍掌握中義堂日用工夫集云石室出示無頭榜一卷大槩舉叢林辨事不公之論又云石屏寮有無頭榜之嗤蓋以余不黨門徒之議獨立弗移也一休順和尚年譜云岐嶽請師題無頭榜忠曰李肇國史補云匿名造謗謂之無名子止此無頭榜者所謂無名子也蓋無頭名也若人無頭則不可認其人今作榜謗人者藏己姓名故言無頭榜張湯傳言蜚變亦此類也寂照堂谷響集作無住方素無據堯山堂外紀云唐魏扶太和中進士知禮闈入貢院題詩云梧桐葉落滿庭陰鎖閉朱門試院深曾是當年辛苦地不將今日負初心及放榜無名子削其梧桐鎖閉曾是不將二字為五言詩以譏之忠曰所譏只在削不將二字史記張湯傳云河東人李文嘗與湯有卻湯有所愛史魯謁居知湯不平使人上蜚變告文姦評林云劉奉世曰蜚變謂如無姓名上變者嶽珂裎史云熙寧七年四月王荊公罷相鎮金陵是秋江左大蝗無名子題詩賞心亭曰青苗免役兩妨農天下嗷嗷怨相公惟有蝗蟲感恩德又隨鈞旆過江東荊公一日餞客至亭上覽之不悅命左右物色竟莫知其為何人也道場榜文體明辨附録云按道場榜者釋老二家修建道場榜示之詞也品題不同而施用亦異其迎神馭者曰門榜淨壇場者曰監壇榜亦曰衛壇燃燈者曰燈榜戒孤魂者曰戒約榜限孤魂者曰結界榜浴孤魂者曰浴堂榜施法食者曰施斛榜施水燈者曰水燈榜張于造齋之所者曰監齋榜張于設供之所者曰供榜張于食所者曰茶湯榜已上數榜二家錯陳而互有遺闕其或用或不用亦不可知聖節黃榜敕修清規聖節云啓建之先一日堂司備榜張于三門之右用黃紙書之又黃榜式云某道某路某寺某月某日欽遇天壽聖節本寺預於今月某日恭就大佛寶殿啓建金剛無量壽道場一月日逐日輪僧上殿披閲真詮宣持密號所萃洪因端為祝延今上皇帝聖壽萬歲萬歲萬萬歲右恭惟佛日洞明龍天昭格某年某月日都監寺臣僧某言住持臣僧某幻住清規云榜用黃紙書如臣僧之名用紅紙貼可高四尺闊三尺此亦隨屋大小為挂之佛殿上俟道場滿散收起榜用木作骨子春明退朝録云唐日曆正正字犯仁宗嫌名觀十年十月詔始用黃麻紙寫詔敕又曰上元三年閏三月戊子敕制敕施行既為永式比用白紙多有蟲蠹自今已後尚書省頒下諸司及州下縣宜並用黃紙魏志劉放孫資勸明帝召司馬宣王帝納其言即以黃紙令放作詔舊説曰聖節榜及經單用黃紙防𧉓也或謂一月日間豈怕𧉓災哉但是敬之至也黃紙以黃蘗染遁齋間覽云古人寫書皆用黃紙以蘗染之所以辟蠹故曰黃卷看經榜忠曰七月十五日盂蘭盆會維那預於朔日發看經榜榜語左方列寫經咒名題張之僧堂衆僧隨意讀誦某經咒幾卷訖書己名於某經咒目下維那依所誦列寫之疏中至十五日臨會宣讀榜式云山門宓以衲子自恣之日乃是蘭盆救苦之辰鵝護雪清調御之真規不墜蠟人氷冷目連之報勞有效真讀至教課持祕咒所鳩良因仰贊常住三寶果海聖賢專祈亡沒七世父母親眷心鏡初拭照破萬劫之昏迷慧劍忽磨斫開千生之羈鎖四恩總報三有齊寶法界含靈均登覺道者具列功課品目于後大乘妙典圓覺了義經金剛般若經梵網經盂蘭盆經般若心經普門品壽量品楞嚴神咒大悲咒提婆品尊勝陀羅尼光明真言隨求陀羅尼八句陀羅尼破地獄咒一字金輪咒阿彌陀名號右具在前伏希衆悉今月日堂司某甲榜右經咒名一行一名正月修正或亡僧結緣等皆有看經榜經單忠曰單者紙片也經目録單紙故云經單單有數種見名單處及座位門單位處敕修清規聖節云啓建之先一日堂司備榜及上殿經單俱用黃紙書之用黃義見聖節黃榜處舊説曰經單式似看經榜敕修清規經單式云今具經文品目于后大方廣佛華嚴經大佛頂萬行首楞嚴經大乘妙法蓮華經大乘金光明經大方廣圓覺修多羅了義經大乘金剛般若波羅蜜經大仁王護國經右具如前今月日綱維臣僧某具茶狀舊説曰請于茶之狀子也敕修清規告香云請客侍者預依戒次具茶狀備卓袱筆硯告香罷列法堂下間請茶各僉名又方丈特為新挂搭茶云次日庫司客頭行者依戒單字名具茶狀列衆寮前請僉名書云某甲敬依來命新挂搭茶狀式云新挂搭某甲上座列名堂頭和尚今晨齋退就寢堂點茶特為伏希雲集今月日侍司某拜請庫司頭首式云新挂搭某上座列名右某等今晨齋退就庫司點茶一中特為伏望衆慈同埀降重今月日庫司比丘某等拜請頭首當列名止於知客就照堂餘同前門狀敕修清規月分須知云正月初一日有處四孟月大衆行道諷經祈保次具門狀官員檀越諸山賀歲舊説曰門狀者謁見人時所呈單狀也紙濶六七寸內不書文字自在方卷之用絲束分中少已上題姓名於其上又名參榜或曰參狀翰墨大全云凡名刺門狀用好紙濶三四寸左卷如箸大用紅線束刺腰須真楷細書或倉卒無絲線則剪胚紅紙一小條就名上束定亦得若辭人則於名下書拜辭謝人則於名下書拜謝送人則於名下書拜違又寫門狀式云具銜姓某右某謹祇候參某官稱呼伏候台旨月日具銜姓某狀凡門狀用大白紙一幅前空二寸真楷小書字疏密相對如前式武官不用全幅紙但濶四五寸後不用具年但云某月日姓某狀公吏同武官式僧道同官員式尤貴細書太平老人袖中錦云古者未有紙削竹木以書姓名故謂之刺後以紙書故謂之名紙唐李德裕為相貴盛人務加禮改具銜候起居之狀謂之門狀李濟翁資暇録云門狀文宗朝以前無之自朱崕李相貴盛於武宗朝且近代稀有生一品百官無以希取其意以為舊刺輕刺則今之名紙相扇留具銜候起居狀而今又益競以善價紙如出印之字巧諂曲媚猶有未臻之遺恨井丹禰正平生於今日其亦如是乎丹鉛總録云古以通名為謁至漢猶然晉人謂之門箋唐人謂之投刺今人謂之拜帖史記酈生踵單門上謁案劍叱使者使者懼而失謁跪拾謁還走入報漢徐稚傳弔喪醊酒畢留謁則去注謁刺也忠曰門狀辭別則主還之見寇準事古今詩話云寇萊公寫刺訪魏仲先議論騷雅相得甚歡將別謂萊公曰盛刺不復還留為山家之寶參狀門狀又名參狀見門狀處目子忠曰凡人名或事條等其數多而不可諳記者列寫其品目於片紙以備遺忘此名目子敕修清規入院當晚小參云提綱畢敘謝行者秉燭侍者呈目子庶得詳盡忠曰清規上文云或有相送官客諸山留宿者逐一條列預用呈稟止此今所呈目子列其名者敕修清規兩序進退云住持以擇定人名目子并西堂勤舊令客頭行者請粥罷會茶又挂鉢時請知事云維那至住持前問訊側立住持付所請人名目子忠曰又叢林請入牌祖堂等語於住持人其孝子詳録其入牌祖師屋裏緣語等呈之住持以充造語之用此亦云目子矣又請禪師號等於朝廷時列書其祖師行狀緣語等呈之內記以備造文之資此亦云目子矣故目子之名廣焉批子忠曰敕修清規兩序進退云擇定人名目子詳目子處校定清規書之目子作批子然批子少異目子笑隱改名固有意批者小片紙書事要示人也舊説曰批者但書事簡要者如禪林批子曰誰某挂搭或充某職等也有首尾語復用年月日日本俗言折紙者類此莊子庖丁解牛説云依天理批大却導大窾林氏曰大卻骨肉交際之處也批擊也止此蓋以刀背擊其骨肉間戞戞然骨肉自分離書要者類之故云批凡詩文批語亦此義如注語多批則評至要僅下三五字品字箋云批手書評隲曰批進學解手不停批於六藝之編正字通云批示也唐李藩傳藩遷給事中制敕有不便者黃紙後批之帝稱其有宰相器已下略録批式亦文有長短華嚴經玄談云藏和尚開講忽然震動具以表聞則天大聖皇后親運御筆批云省狀具云皆因敷演微言弘揚祕賾初譯之日夢甘露以呈祥開譯之辰感地動而標異斯乃如來降迹用符九會之文豈朕庸虗敢當六種之應披覽來狀欣暢盈懷堯山堂外紀云唐中宗內出綵花賜近臣武平一應制賦詩云云中宗手敕批云平一年雖最少文甚警新悅紅蕊之先開訝黃鶯之未囀循環吟咀賞歎兼懷今更賜花一枝以彰其美宋史張方平傳云方平進詔草帝親批之曰卿文章典雅煥然有三代風又云新法鬻河渡坊場司農并及祠廟宋閼伯微子廟皆為賈區方平言宋王業所基閼伯封於商丘以主大火微子為始封之君是二祠者亦不得免乎帝震怒批牘尾曰慢神辱國無甚於斯於是天下祠廟皆得不鬻宋李忠定公奏議多御批皆書議後或云依奏或云不允所乞今封還卿奏勿復有請王梅溪集御試策卷末云御批任賢輝經學淹通議論醇正可作第一人免遠迎批敕修清規入院云專使預當計稟住持必先發批免衆遠迎送榻位批敕修清規諸方名勝挂搭云凡欲求挂搭云云住持如允隨職名高下送蒙堂前資云云受送人懷香詣方丈拜謝榻位或方丈發榜頭煩首座請送則首座令堂司行者請知事一人維那侍者及受送人同至寮首座燒香獻茶白住持發批山門相送之意請侍者批敕修清規侍者進退云住持批下堂司請新侍者維那令行者照批請帖子敕修清規遊方參請云不拘早晚不擇處所各知進退伺候住持求住方丈近事人毋得呵禁如允仍觸禮一拜就求帖子到侍司附名云適奉方丈慈旨令就上寮附名侍者次第發榜頭下堂司維那令行者請新到喫茶畢出度牒上床曆忠曰舊説言帖子即目子也差矣但小片紙書挂搭一僧某甲煩侍者附名之語也又敕修清規亡僧云用小片白紙寫帖子云新圓寂某甲上座某州人秉炬佛事堂頭和尚堂司比丘某拜請其餘佛事並準此寫舊説曰祖東傳入元國求挂搭於龍翔寺輝東陽拋出剪刀令試頌祖即時呈頌殺人刀矣活人劍一句當機不讓師自此豁開門戶了喪身失命在斯時東陽親書帖云挂搭一僧煩侍者附名有住持躬書帖如此者檢子校定清規侍者職事云凡上堂及法語當隨即編録預呈檢子臻志書寫正字通云檢程式今俗謂文書為檢子日子敕修清規入院云行者進卓筆硯知事具狀備盤袱捧呈寺印新命看封付知事開封新命視篆訖就狀上先僉押次題日子使印於上知事收狀衣鉢侍者收印退卓忠曰日子子非助詞乃十二支之子也餘冬解見于次題日子者書朔日子二日子等也岐陽和尚曰狀上者狀尾也寺印是山門重寶不可容易但入寺事繁不暇別紙造收納狀即就送來狀子尾僅題日子使印於其上年月已詳于彼狀故今只書某日甲子而已使印於上者謂日子字上也或曰僉押下日子上之中間使印也忠曰岐陽言書某日甲子者岐陽意謂若入寺朔日甲子則押下書甲子字若二日乙丑則押下書乙丑字而其支干上使住持私印也是訛矣但既書某月下書某日子而日子上使印而已餘冬序録何孟春撰云年月稱某年月日有云日子者或謂此俗語按文選陳孔璋檄吳將校文年月朔日子云云則日子之稱有自來矣南史劉之遴與張纘等參校古本漢書稱永平十六年五月二十一日己酉郎班固而今本無上書年月日子隋袁充上表寶曆之元改年仁壽歲月日子還共誕聖之時日十二時每日必起子日子之稱其是乎孔氏雜説宋孔平仲云俗所謂日子亦有所出文選曹公檄吳將校部曲文年月朔日子注發檄時也然則日子日時也忠曰陳孔璋為曹公作此檄文忠曰文選注以子為發檄時則與餘冬解子較異也夜半子時恐非發檄時余謂餘冬之解得理也葉子奇草木子云北人無識字使之為長官或缺正官要題判署事及寫日子七字鈎不從右七轉而從左七轉見者為笑標敕修清規唱衣云行者瞻顧前後喝定名字知客寫名上單侍者依名發標又亡僧估衣云排字號就記價直在下依號寫標貼衣物上入籠正字通云標表也立木為表繫采于上為標記忠曰發者發遣也發紙片標記與買人後時以此標照之而取某物也長標忠曰聯紙列寫故言長標敕修清規亡僧估衣云隨號依價逐件別寫長標以備唱衣時用引標黃檗清規梵行章第五云三師七證共十條第一引票上某下某某宗師為得戒大和尚第二引票上某下某某宗師為羯磨阿闍黎第三引票上某下某某宗師為教授阿闍黎第四引票上某下某某宗師為尊證阿闍黎至第十引票俱倣此票用紅紙長二尺餘闊五寸忠曰票標俗省上某下某者檗山僧稱隱元言上隱下元老和尚之類也單名單忠曰以名書單片紙故言單也凡清規稱單者數種名同物別有名單有單板單位見座位門眠單見服章門並但言單又有經單差單簿單單帳等見簿券門今此即名單也又曰僧堂單者紅紙小片書各位名一紙一名以貼各位床上壁外面今太清僧寺如此別源東歸集賀太虗侍者侍聖僧偈云五湖四海堂內客一單一鉢標一名止此是也又見座位門單位處敕修清規坐禪云大衆歸堂向裏坐止此解者曰面己坐牌坐止此依此似名單在後壁如東福僧堂後壁當對面處各畫一圓相藝州佛通寺僧堂亦後壁當坐可對面處畫圓相圓相中次第書竺土大仙心東西密相付云云參同契語一圓一字即是第二世一笑和尚親迹忠親覽敕修清規請喪司職事云喪司合干人僕排單揭示單票叢林兩序須知費隱撰知客須知云在寺及新到僧衆有懇求進堂者預先引拜方丈給出單票然後送入白維那安單花押見執務門僉押處遺囑書敕修清規尊宿遷化遺囑式云某寺住持某世緣報謝風燭不停所有隨身衣鉢檀信施利非常住物煩兩序抄札端請某人主行喪事餘俵衆僧看經行喪毋致繁多侵用常住幸察此意伏希悉及年月日住山某押遺書敕修清規尊宿遷化云有官員檀越諸山法眷遺書即當遣送遺書式云早忝遊從奈合離之有數繼承推挽遂黽勉於微緣電露俄空雲山益渺敢祈保護以壽斯文拜檮不備鄰封式云住山無補每依鄰壁之光夢境元空幸謝世緣之幻莫諧面別惟切心馳冀佛日以流輝俾宗風而益振伏惟珍重法眷式云叨濫住山有愧同門之友因循抱疾將為畢世之人敬奉手書聊伸面別光昭先師之令德道在吾屬之力行無任傾勤伏惟珍重可漏子書云書拜某人稱呼某寺比丘某謹封病僧口詞敕修清規病僧口詞云抱病僧某右某本貫某州某姓幾歲給到某處度牒為僧某年到某寺挂搭今來抱病恐風火不定所有隨身行李合煩公界抄札死後望依叢林清規津送年月日抱病僧某甲口詞又見幻住菴清規訃狀敕修清規尊宿入龕云首座同兩序勤舊商議發訃狀狀式云某寺喪司比丘某右某山門不幸堂頭和尚今月某日遽爾歸真謹以訃聞謹狀年月日某寺喪司比丘某狀可漏子書云訃告某處堂頭和尚禪師具位謹封祭文敕修清規尊宿遷化云凡祭文皆喪司書記為之東漸清規送亡式云祭文不拘時節若為師為父則倒展讀之可也諡號僧史略云僧循萬行故有迹焉善行則諡以嘉名惡行則人皆不齒是以六羣比丘終非杜多之號六和勝士方旌所易之名自漢魏晉宋無聞斯禮後魏重高僧法果生署之以官死幸之而臨去聲乃追贈胡靈公此僧諡之始也果為沙門統封公爵追贈胡靈諡也原此出於太常寺矣後周隋世唐初皆不行至天后朝有北宗神秀居荊州神龍二年詔賜諡大通禪師矣日本禪林諡號始於大覺見稱呼門禪師處可漏子忠曰納文疏紙筒也書柬袋亦名可漏子可漏即是殼漏殼漏者卵㲉也比人身骸又言封皮可殼唐音相近故假用猶如弄引作弄胤此類甚多敕修清規迎待尊宿請狀云可漏子狀請某處堂頭和尚禪師具位謹封又山門請新命齋狀云可漏子狀請新命云云尊座前具位謹封容齋三筆云蔡京盜弄威柄有一兵齎一雙緘及紫匣來乃福建轉運判官直龍圖閣鄭可簡以新茶獻即就可漏上書祕撰運副四字授之潛確居類書云敕黃用蜀中麻紙為之其可漏子又長於敕黃一尺可漏子注云封皮孤樹裒談云內閣題本用小揭帖楷書斜摺內封外則可漏封以文淵閣印方銀鑄五筯篆大如御史印忠曰書柬可漏糊封上下啓之之法截開其底如疏可漏上下不封如竹筒然行者度疏於維那時維那亦自底抽取之或曰可漏者上下通透可脫漏之義余謂若然則上下糊封者亦名可漏當如何解之故此義不足取也已下録可漏即是殼漏之證圓悟勤禪師録普説云先師常云莫學琉璃瓶子禪輕輕被人觸著便百雜碎參時須參皮可漏子禪任是向高峯頂上撲下亦無傷損碧巖録舉之作但參皮殼漏子禪已下録身骸稱殼漏子傳燈録洞山價禪師章云師將圓寂謂衆曰離此殼漏子向什麼處與吾相見衆無對掌珠故事載此注云殼漏子身尸也傳燈録長慶稜禪師章云保福遷化人問師保福拋却殼漏子向什麼處去也師曰且道保福在那箇殼漏子裏又南陽忠國師語云有知識示學人但自識性了無常時拋却㲉漏子一邊著靈臺智性迥然而去名為解脫是外道量已下録衣稱可漏又殼可通用之證恕中慍禪師録云洪祐和尚送歸源法衣至上堂拈衣示衆云者箇是先歸源向異類中遺下皮可漏子日炙風吹而不壞刀斫鋸解而不開舊説云疏可漏貼小黃紙者為防蠹災也雖少時用之表其謹至忠曰此義不然余謂可漏貼黃紙者引黃之遺範也施食法疏可漏貼黑紙者蓋黑北方水色取救渴義也引黃者正字通云貼黃即古之引黃唐制詔敕有更改以紙貼之曰貼黃其表章略舉事目見于前封皮者謂之引黃後世即以引黃為貼黃不用黃紙龍川志曰富鄭公上章貼黃言臣與韓琦言不當起復是以引黃為貼黃也李肇曰貼黃或曰押黃第草三類簿券門憑由居家必用云憑由謂敘其事因也敕修清規聖節云聖節啓散古規所載堂僧堂司給由暫到客司給由隨身照證蓋往時僧道歲一供帳納免丁錢官給由為憑故遊方道具度牒之外有每歲免丁由有何處坐夏由有啓散聖節由以備徵詰各亦畏慎今雖不用存其事以見古也解者曰古規校定備用也由者公憑也謂敘其事因由也論語云觀其所由張籍內宴詩云共喜拜恩侵夜出金吾不敢問行由皆謂來歷也鐔津文集上仁宗皇帝萬言書云其徒苟欲求師訪道千里之遠有司不以憑由而阻之使人無迫戚之心往來裕如也然憑由之制本用防惡及其小吏侮之而返更防善此又在百執事而宜深察之免丁由敕修清規云往時僧道歲一供帳納免丁錢官給由為憑詳憑由處忠曰僧人免民丁役故納錢於官所官收錢了與憑文此為免丁由又與供帳處及錢財門免丁錢處交看小補韻會云丁民丁唐志男子二十為丁一説二十以上為丁人壽百年為期一幹十年則丁當四十強壯之時故曰丁忠曰十歲甲二十歲乙三十歲丙四十歲丁也杜氏通典食貨篇丁中云晉武帝平吳後有司奏男子年十六以上至六十為正丁十五以下至十三六十以上至六十五為次丁十二以下六十六以上為老小不事宋孝武大明中王敬弘上言云云十五至十六且為半丁十七為全丁帝從之北齊武成清河三年乃令男子十八以上六十五以下為丁十六以上十七以下為中六十六以上為老十五以下為小隋文帝頒新令男女三歲以下為黃十歲以下為小十七以下為中十八以上為丁以從課役六十為老乃免開皇三年乃令人以二十一成丁云云大唐武德七年定令男女始生為黃四歲為小十六為中二十一為丁六十為老玄宗天寶三載十二月制自今以後百姓宜以十八以上為中男二十三以上成丁通鑑綱目唐武德七年集覽云三宗史編解曰黃謂稚幼髮黃也四歲為小小謂細弱也十六為中中者謂上下通也二十為丁丁者當也當強壯之時坐夏由忠曰行腳僧在某寺過夏者本寺給由文敕修清規云有何處坐夏由詳憑由處啓散聖節由見憑由處備用清規聖節路由式云暫到一僧某甲上座今月幾日恭遇天壽節已於本寺啓散訖憑此為照者年月日某寺知客某押給公驗忠曰自官出與證據文也廣燈録三聖然禪師章云師參德山參衆堂中踢天太為首座問云夫行腳人須具本道公驗作麼生是本道公驗師云嗄首座再問師以坐具便打云者漆桶前後觸忤多少賢良首座自後更不勘僧虗堂愚禪師興聖録知府吳狀元蠲蘆租公據立石上堂云云云且道有何憑據卓拄杖公驗分明祠部牒康熙字典云牒達協切音疊説文札也廣韻書板曰牒又增韻官府移文謂之牒忠曰祠部給度牒故度牒稱祠部牒釋氏要覽云祠部牒自尚書省祠部司出故稱祠部編年通論云天寶五年五月制天下度僧尼並令祠部給牒今謂之祠部者自是而始僧史略云案會要曰則天延載元年五月十五日敕天下僧尼隸祠部不須屬司賓知天后前係司寶也此乃隸祠部之始也義取其善攘惡福解災之謂也又云案續會要天寶六年五月制所度僧尼仍令祠部給牒給牒自玄宗朝始也忠曰往時依試經得度鬻祠部牒起於後代困學紀聞云治平末年始鬻度牒考之唐史肅宗時裴冕建言度僧道士收資濟軍興此鬻牒之始也又見後供帳處又按淮南子齊桓公欲征伐甲兵不足乃令輕罪者贖以金刀訟不勝者出一束箭依此收資濟軍興亦有所本容齋三筆云唐末帝後唐潞王清泰二年二月功德使奏每年誕節諸州府奏薦僧道其僧尼欲立講論科講經科表白科文章應制科持念科禪科聲贊科道士經法科講論科文章應制科表白科聲贊科焚修科以試其能否從之此事見舊五代史記不知曾行與否至何時而罷也蓋是時猶未鬻賣祠部度牒耳周世宗廢併寺院有詔約束云男年十五以上念得經文一百紙或讀得五百紙女年十三以上念得經文七十紙或讀得三百紙者經本府陳狀乞剃頭委録事參軍本判官試驗兩京大名京兆府青州各起置戒壇候受戒時兩京委祠部差官引試其三處秖委判官逐處聞奏候敕下委祠部給付憑由方得剃頭受戒其防禁之詳如此非若今時只納錢于官便可出家也念經讀經之異疑為背誦與對本云忠曰鬻度牒自唐肅宗洪邁失考度牒即祠部牒也與祠部牒交看敕修清規沙彌得度云凡行者初受度牒以盤袱托呈本師兩序各處插香禮三拜選日設供剃頭又維那云堂僧挂搭辨度牒真偽又亡僧唱衣云拈度牒於亡僧名字上橫剪破云亡僧本名度牒一道對衆剪破虗堂愚和尚録示行者智潮法語云自唐以來設官置局試經得度其間獲中僧科者官給黃牒剃度為僧舊説曰中華人為僧不易必可受度牒若未得買度牒則只有髮而隨僧修學而已謂之行者如中峯本禪師二十四歲而方得度牒剃落陸遊渭南文集為行者雷印定求度牒疏云故鄉踰八千里路空手要七十萬錢江湖紀聞云真西山帥潭州時有裎二者開旅店有子年二十餘屢謀於所厚者欲弒其父時西山以精明稱所厚者恐纍己赴官首之喚其父母問之亦云逮其子赴左院推勘隨即準伏索到鼠尾刀解官但問其故則卒無説云云獄已成西山疑之云云西山一夕穿秉炷香告之天地神祇夢神告之曰此毋怪其然乃是二十年前事了旦起喚裎二屏去左右曰爾二十年前做什麼事來此事我知已悉爾其無隱裎乃啞然曰然二十年前有溈山行者在店安歇欲買度牒某貪其財物殺而有之所殺尸見瘞廚中西山委官籍其家産可千緡并掘其尸果在遂將裎二送左院禁審其子準伏與前詞無異云云西山曰儞若做甚生計我自與儞一千貫錢去其子曰若得千貫錢我買本度牒溈山出家去西山遂將所籍家産千緡與之裎二編管建昌軍時嘉定壬午年也忠曰度牒不易買可以此知今録中華度牒式行在禮部撿會到大明律內一若僧道不給度牒私自簪剃者杖八十若由家長家長當罪寺觀住持及受業師私度者與同罪還俗除欽遵外本部今填釋字玖千陸百捌拾玖號度牒給付靈珍收執憑照須至出給者釋字玖千陸百捌拾玖號靈珍參拾捌歲係日本國向州人熊谷長男永樂年間憑父捨送前住南禪禪寺出家披剃為僧投禮中和德輝為師習經宣德柒年捌月內蒙本國差來朝貢請給度牒右給付僧人靈珍收執準此宣德捌年伍月二拾伍日資善太夫行在禮部尚書胡一押右侍郎章一押奉政太夫祠祭清史司郎中鄭一押奉直太夫員外郎易一押承德郎主事馬駿一押沈餘慶一押都吏徐政一押令史張壽一押日本國度牒式聖一國師度牒治部尚書駿州有渡郡久能寺沙彌圓爾俗姓氏平見年十八投於當寺住持堯辨禮為本師賜度僧牒剃髮受具者右被太政官符稱右大臣宣奉敕件度者姓平宜仰治部省與剃度牒至準敕故牒承久元年乙卯十月草日左大史小槻宿禰國宗給參議郎兼治部郎藤原信行押典主宰事官闕鴻臚丞正六位上行平貞弘押鴻臚少卿闕典客郎中署令正五位上橘成恆押治部主事正六位闕治部郎中正六位上行源盛慶押治部侍郎從五位紀賴成押右度牒白紙紙高一尺一寸捌分濶一尺陸寸陸分文字皆板刊蓋出牒繁故省寫功也但所新加者初駿州有度等細字又件度者姓平之平一字元年之元一字乙卯字年號亦刊十月草日之十字草字人名花押此等筆書耳三大印字不可辨蓋治部省印也三印皆同綾牒虗堂愚和尚録示行者智潮語云南渡之後出綾紙易楮幣詳行者處佛祖統紀法運通塞志云南宋高宗紹興三年八月自治平末北宋英宗年號始鬻度牒舊以黃紙印造偽為者多戶部朱異始奏令僧道用敕綾牒述曰唐明皇天寶中度牒已用綾素本朝太宗初年普度十七萬真宗天禧普度二十三萬應此時但用紙牒使之易辨今既汙賣欲重其價故用敕綾比同品官之告身亦見朝廷之重僧也供帳敕修清規云往時僧道歲一供帳納免丁錢官給由為憑詳由處佛祖統紀云唐玄宗開元十七年敕天下僧尼令三歲一造籍供帳始此志磐曰出家學道要以從師受戒為之制初未嘗挂名於官籍自漢明至唐初莫不然至則天延載始令二衆隸祠部而明皇正觀始令三歲造籍肅宗至德復令鬻牒謂之香水錢逮我本朝南渡則又創免丁之賦謂之清間錢嘻律言非我所制餘方為清淨者不得不行豈如來以佛眼觀末世為吾徒者當勉順國法乎嘻忠曰正觀字訛當作開元僧史略云夫得果之人且無限劑出家之士豈有司存既來文物之朝須設糾繩之任其有見優間競入懼徭役而奔來輒爾冒名實非高士僧之內律豈能御其風牛佚馬邪故設僧局以綰之立名籍以紀之周隋之世無得而知唐來主張方聞附麗文宗太和四年正月祠部請天下僧尼冒名非正度者具名申省各給省牒以憑入籍時入申名者計七十萬造帳入籍自太和五年始也若然者前豈無籍帳耶監福曹昭玄寺崇玄署將何統斷僧務乎對曰勘造僧帳體度不同或逐寺總知或隨州別録或單名轉數或納牒改添故不同也然則出時君之好惡乃入籍之解張今大宋用周顯德條貫三年一造著于律令也事物紀原曰僧帳唐會要曰舊制僧尼簿三年一造其籍一本送祠部一本留州縣又開元十七年八月十日敕僧尼宜依十六年舊籍則僧尼供帳始於此耳僧史略曰唐文宗大和四年正月祠部請天下僧尼具名申省以憑入籍入籍造帳自太和始也二文不同以會要為正本朝用周顯德事三年一造帳定著於令籍前漢書功臣表注師古曰籍謂名録也琅邪代醉編云籍者一尺二寸竹牒記人之年名字物色懸之宮門簿篇海類編云簿去聲讀如步籍也帳也正字通云簿薄故切蒲去聲籍也又手版也周禮司書注疏古以簡策記事若對君以笏記之後代用簿簿今手版戒臘簿舊説曰戒臘簿者小僧籍也敕修清規維那云或有他緣或暫假出入將戒臘簿假簿堂司須知簿親送過客司令攝之又謝挂搭云侍者先期取堂司戒臘簿檢看新挂搭戒臘在上者一人為參頭輪差僧簿敕修清規聖節云輪差僧簿依戒次各書雙字名又見差單處堂司須知簿見戒臘簿處假簿見戒臘簿處舊説曰假簿即請假帳也砧基簿敕修清規交割砧基什物云入院後須會兩序勤舊茶詳細詢問山門事務砧基契書什物逐一點對交割中峯本禪師録擬寒山詩云十册古傳燈轉作砧基簿舊説曰砧基礎石也南海寄歸傳結淨地法謂初造寺時定基石已止此是也砧基簿者始建寺所定殿堂廊廡柱礎之圖雖後日無用物然住持人不可不知故入寺後詢問兩序勤舊矣今中峯意謂今時參徒泥語不徹本源故傳燈不益人猶如砧基簿無用於後年也日黃總簿舊説曰常住總簿黃蘗染成紙避蠹災故言黃簿也敕修清規副寺云收管支用令庫子每日具收支若干僉定飛單呈方丈謂之日單或十日一次結算謂之旬單一月一結一年通結有無見管謂之日黃總簿山菴雜録云提點彝正堂云今歲庫司知事人懶慢常住日黃簿未成詳職位門提點處雪巖欽禪師賀梅溪副寺頌云匱頭一面日黃簿列祖玄關無少差詳職位門匱頭處衣鉢簿僧家錢財曰衣鉢見錢財門西巖惠禪師録行狀云忽索衣鉢簿大書其後緘付寺之執事者趣辨後事單簿單單偏紙列寫目録也敕修清規尊宿唱衣云行者瞻顧前後喝定名字知客寫名上單侍者依名發標又亡僧抄札衣鉢云收拾經匱函匱衣物抄札具單差單舊説曰差單者差帳也敕修清規聖節云每日堂司行者將輪差僧簿須預先一日請住持頭首衆僧各書雙字名僉押量衆多少依戒具寫差單排定日分周而復始差單式云用白紙書今具逐日輪僧上殿名員于后某日住持臣僧某甲首座某甲書記某甲藏主某甲知客某甲西堂某日某甲稱呼某甲上座某甲都寺右具如前今月日堂司某具草單敕修清規夏前出草單云叢林以三月初一日出草單方丈止挂搭草單式云戒次朱書名字墨書又見圖牌門戒臘牌衆戒臘威音王戒陳如尊者堂頭和尚至元幾戒元貞幾戒某甲上座某甲上座大德幾戒至大幾戒某甲上座某甲上座右具如前恐有差誤請自改正伏幸衆悉今月日堂司某具忠曰至元元貞等修撰敕修清規在此年間故笑隱權書示例而已實可依某人受戒年曆號第幾年而已余昔遊一寺仰觀貼草單題曰文明戒蓋往時文明年間草單沒意智次第寫將去素不曉文明何義余拍同遊肩語言此間一衆非凡同遊怪問為甚得知余指言文明戒人猶不死在茲却後必可與仙真爭年庚矣同遊大笑絶倒單目忠曰簿單記品目也敕修清規退院云方丈什物點對交割具單目一樣兩本住持兩序勤舊僉押用寺記印月單舊説曰副寺收管支用一月一結曰月單忠曰敕修清規云一月一結詳日黃總簿處是也或清規脫謂之月單四字旬單副寺十日一算謂之旬單詳日黃總簿處日單副寺每日僉定收支謂之日單詳日黃總簿處飛單日單呈方丈此謂飛單詳日黃總簿處忠曰飛單者蓋一日所記條目不多數紙往來如飛故名之床曆舊説曰床者僧堂床也曆者記其著床僧籍之帳也凡堂僧依戒臘次第而定位以首座為首敕修清規維那云戒臘資次床曆圖帳凡僧事內外無不掌之僧寶傳雪竇顯禪師傳云顯與學士會公會厚善曰靈隱天下勝處珊禪師吾故人以書薦顯顯至靈隱三年陸沈衆中俄曾公奉使浙西訪顯於靈隱無識之者時堂中僧千餘使吏檢床曆物色求之乃至曾公問向所附書顯袖納之曰公意勤然行腳人非督郵也曾公大笑珊公以是奇之文曆簿帳曰文曆也禪苑清規退院云如常住錢物僧供之類須與知事結絶文曆分明及堂頭公用合行交割亦具文曆拘管用院印印押通知事知之人天寶鑑云通明集南嶽讓和尚有院主二十年管執常住不置文曆一日有司磨勘囚禁在獄乃自惟曰我此和尚不知是凡是聖二十年佐助伊今日得此苦毒之報馬祖於寺中覺知令侍者裝香端然入定院主於獄中忽爾心開二十年用過錢物一時記得令書司口授筆寫計算無遺帳正字通云今俗會計事物之數曰帳又云具來歲課役以報度支為計帳即今之文簿册籍舊唐書食貨志云每歲一造計帳三年一造戶籍周祈名義考云今俗謂簿籍曰帳目韻書帳幬也帷也無有以簿籍為義者按漢制郡國歲時上計顏師古曰計若今諸州之計帳是師古亦用帳字其來久矣忠曰計數記曰帳唐書已見師古亦唐人正字通云今俗非也丹鉛總録云吏胥下流市井米鹽帳簿則用省訛俗字如錢作聖作聖盡作盡是也單帳敕修清規尊宿唱衣云造單帳單式云堂頭和尚示寂謹具衣物估唱鈔數收支于后一收鈔若干係某件唱到一收鈔若干係某項收到一支鈔若干係某項用度一支鈔若干係某項支使逐一列寫已上共收鈔若干共支鈔若干除支外見管鈔若干準齋七追修僧行經資用右具如前年月日喪司行者某具呈把帳執事人兩序典喪各書名僉押圖帳敕修清規拋香相看云若圖帳已定則詣堂司稟添名入圖或人多列戒次後又謝挂搭云既曰隨衆當依戒臘依戒佛制也況諸圖帳及衆寮戒臘牌不以名字分高下忠曰圖與帳二物也圖謂楞嚴會圖念誦巡堂圖被位圖鉢位圖等也見圖牌門戒臘牌處帳謂諸記名帳也又曰舊解者謂圖者戒臘牌等圖也止此此説非也已言圖帳及衆寮戒臘牌可知圖不攝戒臘牌矣火帳忠曰飯頭計人口打飯之帳也雪巖欽禪師録仰山普説云莫教被一陳業風吹入十八重無間地獄中去被閻羅老漢與儞打算火帳問儞索飯錢板帳敕修清規亡僧板帳云板帳之設蓋古者凡立成式必書諸板示不可移易也故叢林亡僧有板帳焉凡僧亡以其所有衣物對衆估唱懲貪積也估唱得錢必照板帳板帳式詳彼契書入院後詢問契書什物詳砧基簿處忠曰契書和俗所謂手形也田産等買收之證狀或無盡財等證文也正字通云契約也今謂之券印紙忠曰禪林以小片紙朱印其寺號謂之印紙凡俵嚫金先俵散印紙後日受嚫人各持印紙自書己名來收嚫去朝廷亦有印紙目宋史選舉志考課云太宗勵精圖治云云諸州掾曹及縣令簿尉皆戶部南曹給印紙曆子俾州郡長吏書其績州愆過秩滿送有司又職官志都官郎中云以役之輕重均其勞逸給印紙書其功過展減磨勘歲月俵子忠曰俵子蓋印紙之類湖海新聞云張居士宋朝都吏也諱道純好道甚堅至元庚辰常齋僧道一日先散俵子一百箇至日憑此赴齋臨期收俵子只九十九箇不見一箇居士付之不問徑支齋九十九分此心終不滿次夜夢一道人來告曰俵子在我拐上覺而細思其日並無策拐者想是道院鐵拐先生亟於井亭下覓舟往道院叩門觀之果見拐上有俵子題得四句云特來赴齋見我不采空腹且歸俵縛我拐因知仙亦赴凡齋矣開具忠曰具者詳舉物數列記也正字通云具者物數可目見故從目物具可收持以克用故從廾會事物兼備意敕修清規亡僧板帳式云開具內幾貫文云云江湖紀聞云蘇州張烈卿孫剝廬於桷角得板尺餘篆書云此屋某年某月某日毀某人買去某間某人買去其料該得價錢若干開具甚悉造屋時都料尚在其孫問之但云當造屋時有貧子求役月餘告去酬價不受人皆異之由今思之必此人所為東都事略徽宗本紀曰宣和七年詔曰有司凡有侵漁蠧耗之事理宜裁抑應不急之務無名之費令講議司條具以聞右具如前凡開具尾書此四字為結語敕修清規聖節經單式云今具經文品目于后經名云云右具如前詳文疏門經單處又見此單帳處或曰右具在前北澗續集圓悟和尚出隊疏跋云圓悟老人還鄉昭覺産薄亦有廣文飯不足之態發一先馳葛藤如許尋常教人信口道則右具在前若信腳行則未敢相許第草四類圖牌門舊説以敕修清規念誦巡堂圖西為上頭書為非曰凡造圖挂之壁則北方可在上頭蓋挂之必於北壁也若書籍中造圖反此須南方在上頭蓋看書者倚南取明則圖南成南方也忠按行事鈔結界圖律苑事規戒壇圖皆南方在上頭又文獻通考宗廟考大夾圖南方在上頭又三才圖會七廟圖及公劉相陰陽圖並以南為上頭故清規圖實背本式如余此書中但隨便不拘本式準古圖而已覽者須知之楞嚴圖敕修清規出圖帳云堂司依戒臘寫楞嚴圖念誦巡堂圖被位圖鉢位圖戒臘牌念誦巡堂圖見楞嚴圖處告香圖敕修清規告香云住持允從即報堂司出告香圖告香圖詳彼入室圖入室見埀説門其規詳敕修清規忠曰解敕修者造圖多謬余今依舊圖改正茶湯問訊圖見經匱圖處忠曰衆寮一切茶禮湯禮爐前三巡問訊等圖也夏中行茶湯瓶盞圖見經匱處敕修清規注云兄弟結緣隨意書名解者曰結緣行禮也然今日本預差人定之僧堂圖見殿堂門僧堂處僧堂出入板圖見殿堂門出入板處鉢位圖十六板首舊説曰被位圖平僧排僧堂圖也鉢位圖蒙堂排僧堂圖也敕修清規出圖帳云惟鉢位圖當分十六板餘隨僧堂大小不拘除單寮西堂首座勤舊排板頭外其餘並依戒臘舊以送蒙堂者排副鉢後因爭競不排又與被位圖交看敕修清規僧堂十六板首鉢位圖云按永平赴粥飯法聖僧侍者位在侍者最末又律苑事規僧堂圖云被位圖舊説曰被位圖者僧堂大衆位也又見鉢位圖處敕修清規鉢位圖云被位倣此不分板首見鉢位圖處忠曰被位不分板首如今所録備用清規甲乙丙丁次第坐是被位也板首者第一首座第二西堂第三後堂第四後堂分手第五第六七八如圖是鉢位也板首側一位是副鉢位也且第一副鉢位首座右側是也第二副鉢位西堂左側是也已下例知備用清規被位鉢位圖云副鉢位非備用圖忠因加之令易曉衆寮圖見殿堂門衆寮處經匱圖忠曰衆寮排位圖也僧堂曰函匱衆寮曰經匱見器物門敕修清規衆寮結解特為衆湯云堂司圖帳已定寮元依戒排經匱圖茶湯問訊圖清衆戒臘牌入寮資次牌淨髮牌夏中行茶湯瓶盞圖三牌三牌排列於佛殿本尊前元朝禪剎三牌式云左皇后齊年齊年者齊等皇帝萬歲也中皇帝萬歲右太子千秋建仁寺禪居菴大鑑禪師所建三牌云南方火德火部聖衆今上皇帝聖壽無疆檀那本命福祿壽星品字箋云廣韻牌榜也以張官府之諭言者也詞之長者列于榜其短者則書之牌即今榜文牌票之謂續燈録淨因道臻禪師章云如何是淨因境師云法廣殿牌仁宗親寫位牌義堂日工集云位牌古無有之自宋以來有之敕修清規尊宿移龕云法座上挂真安位牌廣列祭筵朱子語録云主牌荀勗禮據隋煬帝所編禮書有一篇荀勗禮乃是云濶四寸厚五分八分大書某人神座不然只小楷書亦得忠曰八分者八分字也據此位牌自宋已前有之三界萬靈牌牌云三界萬靈十方至聖六親眷屬七世父母大鑑小清規月中每日粥時念文草九日云祝獻三界萬靈十方至聖古德曰或謂先萬靈後至聖倒語非也有深義在善月牌敕修清規善月云預先一日維那令堂司行者覆住持報庫司挂善月牌于殿門前祈禱牌敕修規清祈禱云維那和會堂司行者報衆挂祈禱牌夢夢中問答云弘安年中有蒙古來寇之流言時法光寺禪門時宗無驚懆色但日日請建長長老佛光禪師及諸宿達法談而已其奇特事業具載佛光普説中其後創立圓覺寺大興禪宗蒙古不復來寇父子保世清平臨終亦自在矣爾後子孫相續崇敬佛法雖然其見世法也重信佛法也輕故天下大禍未現數數命禪剎行禳祓於是乎禪剎禱事稠故皆挂祈禱牌其衆僧唯以誦經諷咒為日用而禪床工夫廢而不做如諸小院復有小檀主例請祈禳僧家專利名者亦以此為第一義遂忘失本分一大事豈非禪法破滅因緣耶諷經牌敕修清規聖節云行者覆住持來早殿上啓建諷經仍報諸寮挂諷經牌念誦牌敕修清規聖節云節內遇三八日堂司行者覆住持兩序諸寮挂念誦牌報衆戒臘牌敕修清規戒臘牌云堂司侍司衆寮預依戒臘寫造至十四日午後堂司牌列僧堂前上間侍司牌列法堂下間衆寮牌列寮內各備香几爐燭供養大衆各炷香展拜畢仍各收牌挂起又見楞嚴圖經匱圖處舊説曰如蒙堂勤舊則位不依戒次但侍者以戒臘為次第矣又蒙堂中勤舊者不上戒臘牌也永平道元禪師戒臘牌式云草單是也某國某州某山某寺今夏結夏海衆戒臘如後陳如尊者堂頭和尚建保元戒某甲上座某甲藏主某甲上座某甲上座建保二戒某甲西堂某甲維那某甲首座某甲知客某甲上座某甲浴主建曆元戒某甲直歲某甲侍者某甲首座某甲首座某甲化主某甲上座某甲典座某甲堂主建曆三戒某甲書記某甲上座某甲西堂某甲首座某甲上座某甲上座右謹具呈若有誤錯各請指揮謹狀某年四月三日堂主比丘某甲謹狀入寮資次牌見經匱圖處舊説曰入寮資次義未詳接住持牌敕修清規入院云隔宿挂接住持牌報衆東漸清規入院儀式云凡入院前日挂接住持牌於堂前下間當日挂上間用黃紙又東漸清規云夢窗國師粥罷挂接和尚牌清規隔宿挂之愚謂鄰封名德江湖尊宿來訪則挂接和尚牌考鐘伐鼓耳若入院則挂接住持牌不可言接和尚也又見接尊宿牌處書言故事延接注云延引也接迎也接和尚牌敕修清規報謝出入云住持出入則知事探伺歸期令堂司挂接和尚牌報衆鳴鐘門迎住持先令傳語免之舊説曰住持外出經四五日或十日歸則挂接和尚牌而迎之忠曰東漸曰鄰封江湖尊宿來則挂接和尚牌詳接住持牌處余謂雖本寺住持已入院後外歸則亦可挂接和尚牌但入院時不可挂接和尚牌耳已下略舉門迎因緣聯燈會要長沙岑禪師章云師遊山歸至門首首座問和尚甚處去來師云遊山來云到甚麼處來師云始隨芳草去又逐落花回云大似春意師云也勝秋露滴芙渠接尊宿牌敕修清規迎待尊宿云尊宿相訪須預挂接尊宿牌鳴鐘集衆門迎彼若尚簡則潛入寺住持必於寢堂具香燭相接義堂和尚曰接尊宿牌可書和尚接住持牌可但言住持也忠曰即書接尊宿和尚也接官牌義堂日工集云康曆二年五月十三日時義堂住建仁挂接官牌奉迎府君義滿公臨期大小鐘鼓皆鳴余率兩班大衆出迎三門鈞旆入門余引自正門入佛殿府君炷香三拜罷余送歸特榻乃燒香歸知事班首與官榻相對而立行者鳴磬真珠西堂舉唱藥師如來侑藝正仁二僧和之維那舉大悲咒余炷香三拜回向畢余引君入方丈點心官伴管領一人僧伴普明國師東堂蘭洲天龍大清等持物先燒香清祖侍者點心罷余引君歸歇處道話少頃鳴鼓上堂府君特榻諸山列在座下釣語問答提綱自敘謝辭拈提罷齋會會罷還駕上堂牌敕修清規上堂云凡旦望侍者分付客頭行者挂上堂牌報衆小參牌舊説曰小參牌入院則小片紙書今晚兩字貼牌左肩四節則書昏鐘鳴三字貼之敕修清規入院當晚小參云侍者令客頭報衆挂小參牌普説牌敕修清規普説云侍者令客頭行者挂普説牌報衆若告香普説牌左肩貼告香兩字校定清規云侍者寮行者粥後挂普説牌小書告香二字告香牌敕修清規告香云堂司行者預逐一報衆挂告香牌備用清規告香云堂司預晚挂告香牌牌左云告香罷普説入室牌敕修清規入室云遇開室時粥前侍者令客頭行者僧堂前諸寮挂入室牌秉拂牌敕修清規四節秉拂云秉拂人令行者僧堂前挂秉拂牌坐禪牌永平清規辨道法云早晨坐禪挂坐禪牌餘時坐禪不挂坐禪牌忠曰餘時者晡時黃昏後夜三時也靜牌坐禪牌又言靜牌靜者靜慮也諸祖偈頌慈受深禪師示衆云靜牌才挂宜各默然縱不挂時豈可談笑坐參牌敕修清規坐參云齋罷堂司行者覆首座僧堂衆寮前各挂坐參牌放參牌永平清規辨道法云放參時挂放參牌昏鐘鳴收放參牌照牌敕修清規赴茶湯云先看照牌明記位次免致臨時倉遑忠曰看照牌明記位次照義解得過半矣凡照者二物相照而鑒識也如照牌座間早有座牌貼各位了然著座人不得入席預見之故於外面別設牌造座間樣式小片紙書衆名貼各位著位人審視之記己所著位畢然後入座間照看外牌位而坐貴免致倉遑敗闕矣舊説曰照牌者座間不排名牌只門外設木坐牌造排坐位圖而樹之大衆審照視己之上下位及時著席而已其照視左右者為能知鄰位則於己位不迷也是以照視上下為照義或曰能明視己位故云照或曰就照牌能視己位在某人下某人上故云照或曰照視己位在自上幾位自下幾位故云照皆解不得照字故今不取之忠曰今時照牌用紙數十幅連接令方上橫題第一筵照牌圖等字其下圖席樣以小片紙書名以糊排貼一如本席衆及時入席照依外牌著坐敕修清規迎待尊宿云寢堂釘挂帳幕排照牌又方丈特為新舊兩序湯云燒香侍者預排照牌至時鳴鼓又方丈管待新舊兩序云寢堂設位排照牌客集報住持出接各入座依照牌立定又方丈特為新挂搭茶云各依照牌歸位立定又尊宿遷化管待主喪等云排照牌都寺行禮又嗣法師忌云若講特為伴真湯齋罷方丈客頭請西堂兩序晚間對真相伴喫湯排照牌位禪林照牌似朝廷混榜事物紀原云宋朝會要曰大中祥符四年五月朝迥等奏引試進士預令於貢院納案子試前一日貢院出榜曉示逐人排坐位處所則引試之有坐位榜自此為始今亦為之混榜坐牌忠曰日本叢林行禮用小紙片書一衆名位而隨二出四出等座逐位次排之牌首以糊少許貼床大衆未著座已前先入認記己位畢而出及時次第著其牌位貴免顛沛矣傳燈録金州操禪師章云一日請米和尚齋不排座位米到展坐具禮拜師下禪床米乃就師位而坐師却席地而坐齋訖米便去侍者曰和尚受一切人欽仰今日座位被人奪却師曰三日若來即受救在米果三日後來云前日遭賊僧問鏡清古人遭賊意如何清云只見錐頭利不見鑿頭方木座牌舊説曰小木牌書衆名牌首穿小穴別設大板板上列植小釘而以小牌逐位次排挂定之又有板上直書名者敕修清規方丈特為新舊兩序湯云釘挂寢堂鋪設坐位解者曰是非紙座牌又非木座牌但朱漆板上書衆名位而釘挂其板也猶如鉢位圖煎點牌敕修清規受嗣法人煎點云法嗣令客頭請兩序單寮諸寮挂煎點牌點茶牌敕修清規方丈特為新首座茶云客頭報衆挂點茶牌點湯牌敕修清規庫司四節特為首座大衆湯云都寺分付客頭請勤舊蒙堂諸寮各挂點湯牌備用清規寮元云朔望係寮元自燒香令挂點湯牌燒湯出盞特為照牌敕修清規方丈四節特為首座大衆茶云請客侍者巡堂請茶堂前排特為照牌特為位見座位門特為牌敕修清規方丈特為新挂搭茶云侍者令客頭依戒列名寫特為牌或作四出六出首座光伴諸方名勝必與住持對面位若有異議則於名勝內推戒最高者坐之參頭與光伴對面位蓋受送者先謝榻位此同赴茶耳解者曰書照牌以名勝排定之特為位此謂特為牌特為位即是住持對面位也特為位見座位門巡寮牌見叢軌門巡寮處直堂牌敕修清規坐禪云堂中有直堂牌刻云輪次直堂周而復始住山押兩面刻照依被位資次每日五更鐘絶後交下次人終日看守開浴牌見叢軌門開浴處浴室內小牌敕修清規知浴云室內挂小板旁釘小牌書云鳴板一聲添湯二聲添水三聲則止以此為節備用清規知浴云室內小牌白字一湯二水三滿打小板三滿有作三止者入浴資次簡板敕修清規知浴云其入浴資次當刊揭浴室外解者曰資次者第一通僧衆第二通頭首第三通行者第四通人力監作行者知事等如此書鐫板挂浴室外也普請牌見叢軌門普請處淨髮牌見經匱圖處拾遺牌禪林寶訓云山堂住黃龍日有智恩上座為母修冥福透下金二錢兩日不尋聖僧才侍者因掃地而得之挂拾遺牌一衆方知蓋主法者清淨所以上行下效也鏡堂圓禪師録示兄弟拾得物不挂拾遺牌者偈云叢林百丈古清規遺者應須挂拾遺若也便將為己有亦名偷盜罪無疑孔子家語相魯篇云孔子初仕為中都宰男女別塗路無拾遺史記田敬仲完世家云梁王曰若寡人國小也尚有徑寸之珠照車前後各十二乘者十枚威王曰寡人之所以為寶與王異云云吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉淮南子覽冥訓云昔者黃帝治天下而力牧太山稽輔之云云田者不侵畔漁者不爭隈道不拾遺市不豫賈觸落牌敕修清規淨頭云稍有狼藉隨即淨治解者曰廁有觸落牌若有狼藉自不洗之則挂牌報淨頭令洗淨焉或曰牌一面書觸字一面書落字觸是不淨義落是遺落義若有不淨穢汙則挂觸牌而報淨頭若鞋履等落廁內則挂落牌而告淨頭也唱衣牌敕修清規亡僧唱衣云荼毗後堂司行者覆住持兩序侍者齋罷僧堂前唱衣仍報衆挂唱衣牌送灰牌敕修清規亡僧入塔云堂司行者預報衆挂送灰牌忠曰送煆骨入塔兼其荼毗時餘灰故曰送灰也過渡牌江湖集敬叟莊和尚送人之污水頌云小朵峰前絆草鞋奯公帆挂待君來風休水面平如鏡下却江頭過渡牌聯燈會要巖頭豁禪師章云師因沙汰遂於鄂州湖邊作渡子兩岸各挂一板有人過渡打板一聲師云阿誰或云要過那邊去師乃舞棹迎之第草五類飲啖門粥四分律云毗舍佉母白佛言世尊聽阿那頻頭國諸比丘食粥若世尊當聽比丘食粥者我當盡形壽供給十誦律云佛言毗舍佉汝見何因緣故欲常與比丘僧粥答言大德若比丘不食粥有飢渴惱或時腹內風起我常與粥故則無衆惱釋氏要覽云讀五部律文粥之緣起有三初僧祇律云佛住舍衛國難陀母令作釜飯逼上汁自飲覺身中風除食消便作念闍梨是一食人應當食粥乃取多水少米煎去二分然後入胡椒蓽撥末盛滿罌持詣佛所白言唯願世尊聽諸比丘食粥佛許仍為説偈云持戒清淨人所奉恭敬隨時以粥施十利饒益於行者色力壽樂辭清辨宿食風除飢渴消是名良藥佛所説欲得人天長受樂應當以粥施衆僧次四分律云佛在那頻頭國因䨲沙施粥佛許之後十誦律云婆羅門王阿耆達施八般粥謂乳酪胡麻豆摩沙荏蘇等佛許之又云粥不正食攝僧祇律云粥出釜劃不成字始名不正食是名良藥佛所説欲得人天長受樂律作是名為藥佛所説欲生人天常受樂忠曰依寄歸傳四分律等五噉食謂飯麥豆飯肉餅此為正食五嚼食謂根莖葉華果此為不正食若已食前五必不合餐後五先食後五則隨意噉前五忠曰肉者初聽三種淨肉至楞伽涅槃方斷肉食又釋氏要覽云今析粥十利者一色二力三壽四樂五詞清俱舍云詞謂訓釋言詞也六辨俱舍云辨謂展轉言無滯礙也七宿食消八風除九消飢十消渴辨當作辨守千崆洞記附法數中載粥十利云一僧徒安樂二施主長壽三不闕修道四不生飢饉五當來勝報六佛果現前七衆善莊嚴八先云離苦九不值刀兵十當生淨土八先云先云二字可疑四分律云食粥有五事善除飢除渴消宿食大小便調適除風患食粥者有此五善事義堂和尚日工集云因雪示衆大雪人民凍餒薪貴如玉洗面湯不用燒湛堂準和尚以小杓湯洗面尚餘用濯足古人用心如此況斯時乎又粥羹宜暫停之凡粥貼羹湯日本風俗而已中華但用鹽豉韲等如今建長寺每日堂中粥菜用七紋錢買胡麻鹽是也因舉神鼎諲和尚住山十年始有醬食訖曰古人住山安衆不論粥飯精粗唯道是行幸諸人不患暫時粥無羹矣小食忠曰和訓古豆計釋氏要覽云增輝記云小食者粥是海龍王經請佛品云爾時海龍王白佛言唯佛加哀詣我宮中屈神小食野客叢書云漫録謂世俗例以早晨小食為點心或謂小食亦罕知出處僕謂見昭明太子傳曰京師穀貴改常饌為小食小食之名本此忠曰小食本出佛經律文蓋昭明時王公好佛學故用其目王儒考出未盡原五味粥大慧武庫云葉縣省和尚嚴冷浮山遠在衆時特往參扣請遠充典座衆苦其枯淡省偶出莊遠竊鑰匙取油麵作五味粥粥熟省忽歸赴堂粥罷坐堂外令請典座遠至首云實取油麵煮粥情願乞和尚責罰省令算所直估衣鉢還訖打三十拄杖出院事文類聚云南方專用臘月八日灌佛皇朝東京十二月初八日都城諸大寺作浴佛會并送七寶五味粥謂之臘八粥忠曰雜穀衆味隨意合造言五味粥而已月令廣義云宋元臘八日都城諸寺作浴佛會併送七寶以諸果品五穀煮粥謂之臘八粥春渚紀聞云湖州孫略教授家婢名呂媼者服勤孫氏有年矣性謹朴無他能但常日晨起就廚中取食器潔之聚所棄餘粒間有落溝渠者亦拾取淘濯再於釜中或加五味煮食之未嘗一日廢也年七十餘一日微疾即告其家人曰為我髠髮著五戒衣我將去矣家人從之因起以左手結印而化家人遂龕置開元寺中觀者餘月了無穢氣而髮漸生因與剃之後一月一剃紅糟敕修清規月分須知云十二月初八日佛成道庫司預造紅糟解者曰昔佛成道隨牧牛女乞牛乳喫今紅糟學牛乳者也未知加何紅物矣紅糟或作溫糟忠曰按紅唐音俱牟而和字俱似宇故錯為字牟仍作溫糟溫糟訛音而訛字者義堂日工集云十二月八日喫紅糟有人問紅糟緣起余曰牧牛女獻乳糜於世尊今紅糟其遺意也忠曰紅糟即五味粥也臘八噉之見五味粥處下學集云紅調粥正月十五日所食赤豆粥也止此然則紅是赤豆色下學糟作調訛矣余又謂果品五穀雜和造粥米白色為之變故言紅數味相合故言糟而已劉侗帝京景物略云十二月八日家效菴寺豆果雜米為粥供而朝食曰臘八粥菊坡叢話云陸放翁臘八日詩云臘月風和氣已春時因散策過吾鄰草煙漠漠柴門裏牛迹重重野水濱多病所須唯藥物差科未動是間人今朝佛粥更相餽更覺江村節物新纓絡粥永覺賢禪師禪餘外集山中有感詩云春墾半畝畦秋收一擔粟每挑野菜根和儞纓絡粥忠曰粥糜品不載纓絡粥蓋糝野菜加米造菜牽連如纓絡也梅山歷然禪師普説云見秖對次的即浩浩作得主的作得主的即喫瓔珞粥的蔣簿粥五燈嚴統金陵蔣山曇芳忠禪師章云梁王至建康王詣寺問曰衲子所謂蔣簿粥者何也師曰將謂殿下忘却王曰衲子所謂三隻襪者何也師曰國內山川都踏遍今朝親到帝王家晚粥敕修清規坐參云堂司行者候晚粥熟覆首座云放參乃至歸衆寮藥石虎關和尚曰唐樣非時煮粥二百年來事也無準範和尚録解夏小參云徑山寺裏每日兩粥一齋是汝諸人九十日內捧鉢盂向長連牀上恣意咂啖於中還有知飽底麼忠曰兩粥者朝粥晚粥也齋佛祖統紀云毗婆沙論齋者以過中不食為體又云請觀音疏齋者齊也齊身口業也齊者祇是中道後不得食者表中法界外更無別法也釋氏要覽云起世因本經云烏脯沙陀隋言增長謂受持齋法增長善根故佛教以過中不食名齋又云齋正時毗羅三昧經云佛為法慧菩薩説四食時一旦時為天食二午時為法食時佛斷六趣因令同三世佛故制日午為法食正時也僧祇律云午時日影過一髮一瞬即是非時齋字和訓登幾即是時字也經律往往請佛者先請而再請白時至薩婆多毗尼云問曰先已請佛何以重請答曰欲生增上功德故先日以請今更重請又欲成三堅法故又佛時到自行何由得知一居士在靜處燒香遙供養請佛香來繞佛三匝又云佛自知時不須外緣草飯忠曰草飯者粗飯也史記陳丞相世家云更以惡草具進楚使注草粗也戰國策云左右以君賤之也食以草具注草不精也具饌具正曰草菜也陳平傳惡草具注去肴肉敕修清規請立僧首座云方丈備草飯請特為湯藥石水飯敕修清規迎待尊宿請狀云當寺住持比丘某右某輒以來日就寢堂聊備水忠曰水以水澆飯如日本湯食和語由豆計也然舊説曰飯味淡如水也蓋謙詞者訛甚本草綱目云飱飯飱音孫即水飯也正字通云飱蘇昆切音孫食也字林水澆飯也禮雜記孔子曰少施氏食我以禮吾飱作而辭曰疏食也不敢以傷吾子注禮食竟更作三飱以助飽飱謂以飲澆飯也鄭康成釋飱為勸食誤字彙云飱以飲澆飯也古者食後更飱以盡主情禮雜記孔子食於少施氏曰吾飱正字通云飰同飯六書故曰陸德明飰扶萬切食飰曰飯扶晚切謂二字不同非也飯與飰一字而二音也老學菴筆記云集英殿宴金國人使九盞第一肉鹹豉第二爆肉雙下角子第三蓮花肉油餅骨頭第四白肉胡餅第五羣仙𮌉太平畢羅第六假圓魚第七奈花索粉第八假沙魚第九水飰鹹豉施鮓瓜薑看食棗錮子膸餅白胡餅䬼餅睦州蹤禪師録云師云後園生菜熟水淘飯黑飰敕修清規月分須知云四月初八日佛誕浴佛庫司預造黑飰本草綱目云陶隱居登真隱訣載太極真人青精乾石䭀飯法䭀音信䭀之為言飱也謂以酒蜜藥草輩溲而曝之也亦作䭀凡內外諸書並無此字惟施於此飯之名耳陳藏器本草名烏飯登真隱訣飯法文繁今略之藏器曰烏飯法取南燭莖葉搗碎清汁浸粳米九浸九蒸九曝米粒緊小黑如醫珠袋盛可以適遠方也時珍曰此飯乃仙家服食之法而今之釋家多於四月八日造之以供佛耳造者又入柿葉白楊葉數十枚以助色或又加生鐵一塊者止知取其上色不知乃服食家所忌也潛確類書云青精一名南天燭又曰黑飯草以其可染黑飯也道家謂之青精飯故仙經云服草木之王氣與神通食青燭之精命不復隕謂此也忠曰南燭異名云草木之王見本草又與桐飯交看桐飯雲臥紀談云真淨和尚偈云元符二年三月三春餅撮餤桐飯兼詳叢軌門暫假處舊説曰以桐葉染成飯言桐飯其色黑故又名黑飯但未知桐染飯是何義忠曰以南燭葉汁染飯色青黑故名黑飯南燭異名楊桐見本草故又言桐飯舊説為梧桐葉染飯太誤欲知染義即仙家服餌也見黑處山堂肆考云零陵總記楊桐葉細冬青居人遇寒食採其葉染飯色青而有光食之資陽道道家謂之青精乾石杜詩豈無青精飯使我顏色好鄭畋詩圓明青飯光潤碧霞漿音信饡飯玉篇云饡子旦切以羹澆飯一山和尚曰饡飯古多用之川僧最好造之乃五味飯也或曰日本所謂芳飯是也聯燈會要克賓禪師章云興化云克賓維那法戰不勝罰錢五貫設饡飯一堂詳職位門維那處普菴肅禪師録舉克賓話作纂飯特為飯校定清規迎待尊宿云次日特為飯係具狀作都寺名請非時食敕修清規沙彌得度章沙彌十戒第十云不非時食薩婆多毗尼毗婆沙云非時者從日中至後夜後分名為非時從晨至日中名時何以故以日初出乃至日中明轉盛中則滿足故名為時從中至後夜後分明轉減沒故名非時又從晨至日中世人營救事業作飲食是故名為時從中至後夜後分燕會嬉戲自娛樂時比丘遊行有所觸惱故名非時又從晨至日中俗人種種事務淫惱不發故名為時從中至後夜後分事務休息淫戲言笑若比丘出入遊行或時被誹謗受諸惱害名為非時又比丘從晨至中是乞食時應入聚落往來遊行故名為時從中至後夜後分應靜拱端坐誦經坐禪各當所業非是行行或往乎來入聚落時故名非時五分律云佛在王舍城爾時未為比丘制非時食迦留陀夷著雜色衣面黑眼赤暗中乞食懷妊婦人電光中見大驚喚言毗舍遮毗舍遮迦留陀夷言我是沙門非毗舍遮便罵言汝何冥夜乞食餘沙門婆羅門一食便足汝云何食無晝夜長老比丘白佛佛呵責結戒若比丘非時食波逸提非時者從正中以後至明相未出名為非時法苑珠林云毗羅三昧經世尊為惠法菩薩説云食有四種旦天食時午法食時暮畜生食時夜鬼神食時佛斷六趣因令同三世佛故日午時是法食時也過此已後同於下趣非上食時故曰非時也又薩婆多論云釋時有四一始從日出乃至日中其明轉熾名之為時從中已後至後夜分其明滅沒故名非時二從旦至中是作食時乞不生惱故名為時從中已後至於夜分是俗人宴會遊戲之時入村乞食多有觸惱故名非時三從旦至中俗人作務淫亂未發乞不生惱故名為時從中已後事務休息淫戲言笑入村乞食喜被誹謗故名非時四從旦至中是乞食時得食濟身寧心修道事順應法故名為時從中已後宜應修道非乞食時故名非時佛祖統紀云僧祇律時食若午時日影過一髮一瞬即是非時四分戒本若比丘非時食者波逸提十誦律波逸提義翻為墮墮在燒煮地獄法苑珠林云僧祇律云食已若渴佛令取一切穀豆麥煮不破者非時取汁得飲若酥油蜜及石蜜諸生果汁等要以水淨得飲若器底殘水被雨湔亦名為淨善見論云舍樓伽果漿澄汁使清非時得飲謂藕根是摩德勒伽論沙糖漿亦得非時飲老學菴筆記云佛經戒比丘非時食蓋其法過午則不食也而蜀僧招客草食謂之非時董仲舒三年不窺園謂勤苦不遊嬉也館中著庭有園每會飯罷輒相語曰今日窺園乎此二事甚相類放參飯竹窗二筆云越地安禪夜作齋其名曰放參飯競為侈靡勝於午齋相沿成習久矣昔有尊宿聞鄰房僧午後作食不覺泣下悲佛法之凌夷也故僧禁過午食况夜食耶律言人間碗鉢作聲餓鬼咽中起火乃於漏深人靜而砧几盤盂音響徹其耳根又煎煮烹炮馨香發其鼻識忘慈悲之訓恣口腹之欲於心安乎或曰中夜飢如之何則代以果核餅餌之類不煩鍋銚者可也况持過午者午後至明不食纖物我等晚有藥石何不知足之甚蒙山和尚録云我從在家不喫放參解者曰喫放參者謂喫非時食也蓋諱非時之言也此方亦有此稱其喫食在放參鐘時故云爾此鄰近釋藥石敕修清規達磨忌曰念誦畢或請就坐藥石又告香云當晚方丈請參頭維那侍者藥石又遊方參請云當晚特為湯乃至湯罷起就爐前謝湯須兩展三禮抽衣就坐藥石又大坐參云若住持晚參則不鳴堂前鐘乃至開示畢衆散歸寮藥石若不晚參則堂司行者進首座前問訊云堂頭和尚今晚放參乃至衆各出全單歸衆寮藥石舊説曰藥石謂晚間之粥蓋隱語也凡禪林清規所舉戒相止沙彌十戒而已不舉具足戒故禪僧行事於此十支無缺漏足矣可謂簡易然猶不堅持過午食可耶抑喫晚粥為養體療病進修道業故稱為藥石也粥咒願所謂粥是大良藥是也黃檗清規云藥石晚食也比丘過午不食故晚食名藥石為療飢渴病也玄應經音義云攻病曰藥石古人以石為針今人以鐵皆謂療病者也春秋左氏傳云臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也杜預曰常志相違戾猶藥石之療疾唐書高季輔傳云數上書言得失辭誠切至帝賜鐘乳一劑曰而進藥石之言朕以藥石相報居家必用云圓散曰藥針砭曰石藥食古刊古尊宿録睦州録云問大衆云三乘十二分教成得箇什麼邊事有僧云今日大衆普請不易師云不要將出來僧云打鼓喫藥食新刊作藥石雲門偃禪師録云師歲夜問僧餅餤是羅漢藥食還將得饆饠䭔子來麼無對代云今日東風起今本作藥石蓋依事苑改春渚紀聞云龔彥和正言自貶所歸衛城縣寓居一禪林日持鉢隨堂供暇日偶過庫司見僧雛具湯餅問其故云具殿院晚間藥食龔自此不復晚餐云祖庭事苑辨雲門録羅漢藥食云食當作石取療病義故曰藥石夫攻病曰藥劫病曰石古以砭石為針也全元起欲注素問訪以砭石王僧孺答曰古人當以石為針必不用鐵説文有此砭字許慎云以石刺病也東山經高氏之山多針石郭璞云可以為砭針春秋美疢不如惡石服子慎注云石砭石也季世無復佳石故以鐵代之爾又以服石子止飢如高僧僧善傳善疾篤將殛告弟子曰吾患腹中冷𦀽者昔在少年山居服業糧粒既斷懶往追求噉小石子用充日夕因覺為病死後可破腹看之果如所言愚竊詳二意皆不然也又神仙傳或以藥煮石而食之又非先聖之意今叢林習以為常未有非之者焉又况四果真人詎肯輒違佛制來享非時之餐雲門欲以誘接學者而正言似反後世或資以為口實豈不誤乎疢音趁熱病也忠曰竊惟雲門示衆不在定盤星睦菴欲辨藥石強言正言似反可笑是他時世早有晚食耳但藥食當作藥石音近訛也虎關和尚曰中華二百年來煮晚粥今自虎關寂年遡算雲門寂年得三百九十八年故知虎關只言煮粥而已如餅𩝐為藥石雲門時已有之送食忠曰此方俗稱送膳者敕修清規四節秉拂云方丈請秉拂人藥石免赴當送往忠曰往者遺藥石也陪貼忠曰本飯本菜外陪增貼附也正字通云貼音帖依附又增益贈人又黏置敕修清規尊宿遷化云計會所遺衣鉢多少默作三分一分準喪司孝服諷經燈燭之費一分歸常住陪貼供養一分俵大衆看經并佛事板帳等用貼菜常住所飰菜外自別貼附表供養意曰貼菜日用軌範云如有菜滓安鉢後屏處素問藏氣法時論云五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五者有辛酸甘苦鹹各有所利忠曰按素問五菜謂葵甘韭酸薤苦藿鹹蔥辛格致餘論云凡人飢則必食彼粳米甘而淡者土之德也物之屬陰而最補者也惟可與菜同進經以菜為充者恐於飢時頓食或慮過多因致胃損故以菜助其充足取其疏通而易化此天地生物之仁也禮記曲禮云羹之有菜者用梜其無菜者不用梜注梜猶箸也再請舊説曰請受食也再請者兩受食也忠曰俗作再進訛日用軌範云未再請不得刷鉢盂請折舊説曰請受食也折韻會毀棄也請折者捨所受飯羹等餘殘也日用軌範云隨量受食不得請折打飯鶴林玉露云陸象山家人計口打飯歐陽修歸田録云今世俗言語之訛而舉世君子小人皆同其繆者惟打字爾打丁雅反其義本謂考擊故人相毆以物相擊皆謂之打而工造金銀器亦謂之打可矣蓋有槌檛作擊之義也至於造舟車者曰打船打車網魚曰打魚汲水曰打水役夫餉飯曰打飯兵士給衣糧曰打衣糧從者執傘曰打傘以糊黏紙曰打黏以丈尺量地曰打量舉手試眼之昏明曰打試至於名儒碩學語皆如此觸事皆謂之打而遍檢字書了無此語丁雅反者其義主考擊之打自音謫疑當作滴耿以字學言之打字從手從丁丁又擊物之聲故音謫耿為是不知因何轉為丁雅也俗呼小録云俗牽連之辭如指其人至某人物及某物皆曰打丁晉公詩所謂赤洪崖打白洪崖是也煎點敕修清規受嗣法人煎點云若法嗣到寺煎點令帶行知事到庫司會計營辨合用錢物送納又遊方參請云參頭云某等重承煎點特此拜謝又方丈特為新挂搭茶云特為人謝茶云某等此日重蒙煎點特此拜謝忠曰煎點者謂煎熬煎熟食物以點於心也正字通云煎音箋熬也方言有汁而乾之曰煎今俗凡以水煮物亦曰煎舊説曰煎點者但是謂點煎茶也然日本以點心為煎點非也縱有點心亦以茶為本謂若請人進唯茶則太簡故先進點心次進茶矣點心本為茶故稱點心為煎點失辭五燈會元芙蓉楷禪師章云新到相見茶湯而已更不煎點詳米湯處忠曰凡進茶湯時可有煎食果等之供喫畢方進茶湯矣茶湯外別有煎點以芙蓉章可為證焉故舊説言但點煎茶為煎點者非也點心敕修清規聖節云庫司嚴設香燭備點心又告香云半齋請參頭維那侍者點心更半齋點心者多詳節時門半齋處舊説曰點心謂點于空心也早旦陰陽未分時少喫食此攝養法文公家禮云婦具農羞俗謂點心農疑晨煎燈新話注云點心之點與點茶之點同義蓋少食鎮心也忠按點心之點與點茶之點義別點茶用茶筅點湯又點冷水之義見文公家禮點茶處箋點心以食點空腹耳宋吳曾能改齋漫録云世俗例以早晨小食為點心自唐時已有此語按唐鄭傪為江淮留後家人備夫人晨饌夫人顧其弟曰治妝未畢我未及餐爾且可點心其弟舉甌已罄俄而女僕請飯庫鑰匙備夫人點心傪詬曰適已給了何得又請輟耕録云今以早飯前及飯後午前午後晡前小食為點心引鄭傪此語唐時已然俗呼小録云午前午後小食謂上晝點心下晝點心唐鄭傪為江淮留後夫人曰爾且點心昭明太子別傳曰京師穀貴改常饌為小食即點心之説也糍果舊説曰糍果者攪𩝐和語加為毛知之類忠曰本木實曰果然餅𩝐之類亦通稱故武林舊事市肆記中果子部多列糖餅之名敕修清規庫司四節特為首座大衆湯云惟冬節湯罷行果方行藥石油竺仙和尚出油之法白雲端禪師禪録慧超問佛頌云一文大光錢買得箇油餈喫向肚裏了當下便不飢忠曰碧巖録載之作油而韻書不收字正字通云餈才時切音慈説文稻餅也周禮籩人羞籩之實糗餌粉餈注皆粉稻黍米為之餌言糗餈言粉互足其義也合蒸曰餌餅之曰餈疏云今餈糕之名出于此湯果敕修清規嗣法師忌云諷經罷備湯果解者曰湯稱入麵果稱果子凡食有汁者言湯也又解湯藥侍者曰湯藥者湯果藥石也湯果者凡稱食有汁者此方所謂入麵是也忠曰後説以湯果為一物蓋初説近是敕修清規迎待尊宿云湯罷藥石又客頭詣客位請云方丈請和尚今晚湯果又西堂頭首受請云晚請新命專使特為湯藥石湯果糟雞忠曰撮裂蒟蒻澆淡醬汁煎者日本禪林煎點用之然未識所以名之若以似在家糟藏雞肉名之則改換其目可也昔在玉泉皓和尚責藥石米麵假作驢腸膳生羊骨鱉臛餵飼八萬四千戶蟲通載大通本禪師伊蒲塞饌以魚胾名者不食僧寶誰不矜式耶菖蒲茶敕修清規月分須知云五月端午日早晨知事僧堂內燒香點菖蒲茶忠曰居家此日飲菖蒲酒僧家以茶代之準世禮也瞿佑四時宜忌云五月五日午時飲菖蒲雄黃酒辟除百疾而禁百蟲月令廣義五月令云神農書曰午日以菖蒲或縷或屑泛酒助陽氣延年以山澗九節者佳笑談録五日菖蒲末酒服亦解酒痛飲不醉茱萸茶忠曰世典有九日佩茱萸飲菊花酒之説其點茱萸於茶却見于禪策敕修清規月分須知云九月重陽日早晨知事燒香點茱萸茶北澗簡禪師詩集九日詩云瓦鼎松聲漲苦荼替杯中物泛茱萸白衣不識緇衣客自擷寒英插古壺西巖慧禪師開善録重陽上堂云孟嘉已前淵明去後誰家籬畔欠黃花那箇杯中無白酒重陽只是九月九阿呵呵始信茱萸茶苦澀展眉人少皺眉多南堂欲禪師靈巖録上堂云今朝九月九萬物隨時候滿泛茱萸茶何用菊華酒畢竟醉兀兀不似長醒醒云云鏡堂圓禪師建仁録重陽上堂云紫萸滿泛趙州茶清香直透頂門烈西京雜記云戚夫人侍兒賈佩蘭後出為扶風人段儒妻説在宮內時九月九日佩茱萸食蓬餌飲菊花酒令人長壽琅邪代醉編云重陽佩茱萸囊相傳費長房故事然武帝宮人賈佩蘭佩茱萸食蓬餌飲菊花酒則西漢時已有此俗不自長房始也見西京雜記茶末敕修清規日用軌範云不得包藏茶末忠曰細末茶也言不可未行湯已前包末茶而懷之也文公家禮云古人飲茶用末所謂點茶者先置末茶于器中然後投以滾湯詳點茶處雲門偃禪師録云因園頭請師喫茶師云儞若煎茶我有箇報答儞處園頭云請師報答師云多著水少著末點茶敕修清規新命辭衆上堂茶湯云山門首預釘挂帳設中敷高座向內首座向外攝居主位乃至上首知事行禮揖坐揖香歸位點茶收盞再起燒香揖香歸位點湯湯罷起謝上轎文公家禮云主婦執茶筅執事者執湯瓶隨之點茶蓋以神主櫝前先設盞托至是乃注湯于盞用茶筅點之耳古人飲茶用末所謂點茶者先置末茶于器中然後投以滾湯點以冷水而用茶筅調之今人燒湯煎葉茶而此猶云點茶者存舊也宋蔡襄茶録曰點茶茶少湯多則雲腳散湯少茶多則粥面聚建人謂之雲腳粥面鈔茶一錢七先注湯調令極勻又添注入環回擊拂湯上盞可四分則止視其面色鮮白著盞無水痕為絶佳建安鬬試以水痕先者為負耐久者為勝故較勝負之説曰相去一水兩水宋徽宗大觀茶論曰點茶不一而調膏繼刻以湯注之手重筅輕無粟文蟹眼者謂之靜面點蓋擊拂無力茶不發立水乳未浹又復增湯色澤不盡英華淪散茶無立作矣有隨湯擊拂手筅俱重立文泛泛謂之一發點蓋用湯已故指腕不圓粥面未凝茶力已盡雲霧雖泛水腳易生妙于此者量茶受湯調如融膠環注盞畔勿使侵茶勢不欲猛先須攪動茶膏漸加擊拂手輕筅重指繞腕旋上下透徹如酵櫱之起麵疏星皎月燦然而生則茶之根本立矣第二湯自茶面注之周回一線急注急上茶面不動擊拂既力色澤漸開珠璣磊落三湯多置如前擊拂漸貴輕勻周環旋復表裏洞徹粟文蟹眼泛結雜起茶之色十已得其六七四湯尚嗇筅欲轉稍寬而勿速其清真華彩既已煥發雲霧漸生五湯乃可少縱筅欲輕勻而透達如發立未盡則擊以作之發立已過則拂以斂之結浚靄結凝雪茶色盡矣六湯以觀立作乳點勃結則以筅著居緩繞拂動而已七湯以分輕清重濁相稀稠得中可欲則止乳霧洶湧溢盞而起周回旋而不動謂之咬盞宜勻其輕清浮合者飲之桐居録曰茗有餑飲之宜人雖多不為過也特為茶忠曰特為此人點故曰特為茶敕修清規堂司特為新舊侍者茶湯云請新舊侍者特為茶普茶忠曰點茶普及一衆故曰普茶黃檗清規云常住設普茶入寮茶忠曰新入衆寮為衆點茶也敕修清規新挂搭人點入寮茶云新挂搭人入寮後照例納陪寮錢若干候寮元輪排當在何日挂點茶牌報衆云云候點入寮茶畢寮元逐日依戒具名點戒臘茶戒臘茶見入寮茶處忠曰寮元依衆戒臘自上位次第請于衆寮點茶蓋衆多不可一時講故逐日行之也米湯芙蓉楷禪師録云示衆云夫出家者為厭塵勞求脫生死乃至山僧行業無取忝主山門豈可坐費常住頓忘先聖付囑今者輒欲效古人住持體例與諸人議定更不下山不赴齋不發化主唯是本院莊課一歲所得均作三百六十分日取一分用之更不隨人添減可以備飯即作飯作飯不足即作粥作粥不足即作米湯新到相見茶湯而已更不煎點唯置一茶堂自去取用務要省緣一向辦道忠曰與淫湯交看醉菩提濟顛曰王婆與我喫粉湯止此亦是米湯淫湯舊説曰或謂淫湯飲之則能折薄淫心故名此義非也淫當作飲僧堂鳴開鉢槌時唱飲湯而行之忠曰續字彙云淫王粲七哀詩何為久滯淫文選注留也止此蓋米粉點湯混濁滯留故言淫湯即米湯也舊説曰洞山價禪師辭母出家母愛惜遺書不許既而隨其志告曰汝須如目連救母後其母憶價不已躬往尋求四方遂斃于道路洞山適知之為收遺骸荼毗母囊中蓄米粒少許山欲行大衆結良緣則米少而不及便投之釜中以湯普進大衆此淫湯之始也林間録云叢林相傳洞山悟本禪師見母行乞佯為不識母竟死於路旁往視之有米數合為投大衆粥鍋中以薦冥福悟本獨菴寒溪百結最有年至住新豐已六十餘自巖頭雪峯欽山三人相尋而至於是積衆幾千人則母蓋不翅八十歲矣借使聞其子顯著自東吳孤行來不亦難乎此直不情者記之以自藏安知誣毀先德為罪逆必有任其咎者不可不慎也忠曰依寂音之議則淫湯為洞山事緣妄矣七香湯東福寺入寺記云五侍者交代名小官代除侍衣餘四人賓位立班新命主位對立各問訊觸禮畢坐此名胡亂坐茶禮復各立定客頭取香案上目子渡與新命新命開讀之客頭接之安卓上四人轉位侍香植香歸班新命答香與四人對觸禮畢復坐入盞行七香湯入湯瓶喫畢撒盞各起小問訊退七香湯方陳皮中茯苓中地骨皮小肉桂小當歸小枳殼小甘草少敕修清規知殿云佛誕日浴佛煎湯供大衆忠曰蓋此亦七香湯之類歟凡中華俗早朝喫湯如水滸傳宋江五更從縣前過遇賣湯藥王公趕早市為夜來傷酒便進醒酒二陳湯是也律家有甘露湯早朝喫之居家必用載湯藥法自天香湯至沃雪湯凡有三十品律家甘露湯未知其方古杭高濂法製品載甘露丸法云百藥煎一兩甘松訶子各一錢二分半麝香半分薄荷二兩檀香一錢六分甘草末一兩二錢五分水撥丸晒乾用甘草膏子入麝香為衣粗湯忠曰粗不精好也為人點湯謙所稱也敕修清規庫司四節特為首座大衆湯云都寺行禮初展云此日粗湯特沐慈悲降重下情不勝感激之至點湯見點茶處特為湯特為義見特為茶處敕修清規迎待尊宿云請客侍者具狀詣客位插香拜請特為湯小座湯敕修清規衆寮結解特為衆湯云鳴寮內小板先講小座湯亦設照牌特為寮主副寮楞嚴頭行瓶盞人也解者曰小座湯名行藥忠曰行瓶盞人者行瓶盞兄弟也清規上文云夏中行茶湯瓶盞圖注兄弟結緣隨意書名東福清規云小座湯者衆寮諷經時先但為夏中執役人進湯也寮元坐主位寮頭坐賓位敕修清規方丈小座湯云東西堂前堂首座都寺係請客侍者各詣寮觸禮拜請云云餘頭首辦事名勝方丈客頭行者請云云大座湯忠曰敕修清規庫司四節特為首座大衆湯是也東福清規云四月十四日大座湯都寺所點故都寺自以榜詣首坐寮又云凡大座湯則有揖坐揖香揖湯三度巡堂其規詳于彼舊説曰小座湯長擊內板大座湯長擊外板三巡湯舊説曰四節湯名三巡湯忠曰四節大小座湯皆有三巡問訊謂揖坐揖香揖湯也故曰三巡湯三巡問訊見禮則門陪食敕修清規達磨忌云次日早住持上香禮拜上湯上粥座下側坐陪食舊説曰達磨忌住持不赴僧堂粥於法堂與祖師相伴喫粥此曰陪食蕭師曾遇達磨忌伴祖喫粥曰月中巖講此禮矣義堂東漸住南禪皆準敕修清規行陪食焉品食備用清規達磨祖師忌云山門設供無嚫有品食三拜者恐禮過成諂忠曰品食亦是陪食也相陪如品字故曰品食也伴真湯敕修清規嗣法師忌云若講特為伴真湯齋罷方丈客頭請西堂兩序晚間對真相伴喫湯排照牌位列座右住持揖就座燒香上湯并下相伴人湯退身燒香展拜起身問訊謝相伴鳴鼓三下退座送湯備用清規衆寮楞嚴云寮元親送方丈湯分送諸寮湯忠曰日本僧家有送飯果者亦有所據羅齋忠曰羅猶如羅欲之羅也品字箋云包羅若綱羅之無不包今羅齋乞食于四方無遺餘之義破菴先禪師録上堂舉普化大悲院裏有齋云者風顛漢不妨令人疑著及至被人窮詰將來却只道得箇羅齋打供也似熟處難忘又舉臨濟同普化赴齋踢倒飯床因緣云世諦門中羅齋打供則無可不可若是少室門風未夢見在北澗簡禪師散知識會頌云朝來靈隱羅齋去添得從前滿面慚詳報禱門知識會處有作囉者韻書不見義冷齋夜話云豫往臨川景德寺與謝無逸輩升閣得禪月所畫十八應真像甚奇而失第五軸豫口占嘲之曰十八聲聞解埵根林叢林漢亂山門不知何處囉齋去不見雲堂第五尊云云有作邏者字彙邏巡也止此有次第乞食義月江印和尚録羅漢贊云不為自己邏齋供只要衆生破吝慳山菴雜録云杭下天竺鳳山儀法師教門少有齟齬必整理之高麗駙馬瀋王被旨禮寶陀觀音過杭就明慶寺設齋云云師後至竟趨座上問王曰今日齋會為何王曰齋諸山師曰大王既言齋諸山主人今無位而王自處尊位諸山列兩廡至有席地而坐者與邏齋何異於禮恐不然王聞之惶愧請謝即下法座貞和集葛無懷謝少林蒲鞋偈云四稜踏地老無懷正好重新買草鞋成現送來雖著了諸方無處可邏齋普菴蕭禪師録訓行童云三家村裏邏茶湯十字街頭覓飯喫又示小師圓契語云向野狐口邊邏些骨頭喫了又東覷西覷第草六類服章門義堂日工集云本覺菴主曰日本禪苑創於千光禪僧衣服禮數始於般若房法印了心了心亦曾入宋袈裟釋氏要覽云袈裟者蓋從色彰稱也梵音具云迦羅沙曳此云不正色四分律云一切上色衣不得畜當壞作迦沙色今略梵語也又名壞色業疏云本作迦沙至梁葛洪撰字苑下方添衣言道服也法衣敕修清規受法衣云專使送法衣至云云詞云某人和尚法衣表信專此奉上忠曰禪林所謂法衣者金襴衣而以表傳法之信也但説法時披此衣故言法衣也須是大衣自九條至二十五條矣與傳衣交看舊説曰凡法衣上堂升座可披之如小參五參上堂立地佛事拈香皆不可披之達磨忌百丈忌開山忌拈香猶不可披也况在家拈香耶翻譯名義集云西域記云僧迦胝舊訛云僧伽梨此云合又云重謂割之合成義淨云僧迦胝唐言重復衣靈感傳云每轉法輪披僧伽梨南山云此三衣名諸部無正翻今以義譯大衣名雜碎衣以條數多故若從用為名則曰入王宮聚落時衣乞食説法時著忠曰禪林金襴大衣獨説法時著之今靈感傳及南山所言少通之但我局金襴又金襴不用於乞食耳又曰凡釋法衣作可通三衣之義者非禪林所謂法衣義故今不取之但暫録之令識者擇焉祖庭事苑云法衣者如法之衣也忠曰三衣皆如法裁之睦菴以此釋禪宗傳法之衣恐失辭釋氏要覽云西天出家者衣律有制度應法而作故曰法衣又云蓋法衣有三也一僧伽梨即大衣也二鬱多羅僧即七條也三安陀會即五條也此是三衣也若呼七條編衫裙為三衣者誤之也釋門章服儀云或經云法衣者謂懷道者服之名法衣也應法記云此就所學法立號指經云者如雜含云修四無量服三法衣業疏云四分亦名三法衣法是軌用之名被則心行正法頗同此釋也業疏云世稱福田衣以法畦畔之相世田用畦盛水長嘉苗養形命也法衣之田彌弘四利之益增三善之心養法身慧命也濟緣記云四利即四等慈悲喜捨又名四無量心三善謂無貪瞋癡也傳衣忠曰即是法衣謂表傳法信之衣也最澄將來六祖慧能大師傳法宗旨云忍大師即將所傳袈裟付能大師遂頂戴受之大師問和上曰法無文字以心傳心以法傳法用此袈裟何為忍大師曰衣為法信法是衣宗從上相傳更無別付非衣不傳於法非法不傳於衣衣是西國師子尊者相傳令佛法不斷法是如來甚深般若知般若空寂無住即而了法身見佛性空寂無住是真解脫汝可持衣去遂則受持不敢違命然此傳法袈裟是中天布梵云婆羅那唐言第一好布是木綿花作時人不識謬云絲布舊説曰達磨大師法衣以木綿布裁青黑色有裏七條也名屈眴以傳于二祖又楊岐和尚法衣青色也忠曰達磨傳于二祖是屈眴則傳衣不必局金襴也忠曰釋迦衣傳彌勒佛説彌勒成佛經云爾時彌勒佛與娑婆世界前身剛強衆生及諸大弟子俱往耆闍崛山到山下已安詳徐步登狼迹山到山頂已舉足大指躡於山根是時大地十八相動既至山頂彌勒以手兩向擘山如轉輪王開大城門爾時梵王持天香油灌摩訶迦葉頂油灌身已擊大犍椎吹大法螺摩訶迦葉即從滅盡定覺齊整衣服偏袒右肩右膝著地長跪合掌持釋迦牟尼佛僧伽梨授與彌勒而作是言大師釋迦牟尼多陀阿伽度阿羅訶三藐三佛陀臨涅槃時以此法衣付囑於我令奉世尊乃至爾時彌勒持釋迦牟尼佛僧伽梨覆右手不遍才掩兩指復覆左手亦掩兩指諸人怪歎先佛卑小皆由衆生貪濁憍慢之所致耳忠曰迦葉授彌勒即瞿曇彌奉釋尊金縷衣也金襴袈裟傳燈録釋迦牟尼佛章云世尊告迦葉吾將金縷僧伽梨衣傳付於汝轉授補處至慈氏佛出世勿令朽壞又摩訶迦葉章云迦葉持僧伽梨衣入雞足山俟慈氏下生聯燈會要二祖阿難尊者章云祖問迦葉云師兄世尊傳金襴袈裟外別傳箇甚麼迦葉召阿難祖應諾迦葉云倒却門前剎竿著忠曰今禪宗傳衣必用金襴原于此中阿含經云佛遊釋羇瘦在迦鞞羅衛尼拘類樹園爾時摩訶波闍波提瞿曇彌持新金縷黃色衣往詣佛所稽首佛足却住一面白曰世尊此新金縷黃色衣我自為世尊作慈愍我故願埀納受世尊告曰瞿曇彌持此衣施比丘衆施比丘衆已便供養我亦供養大衆大生主瞿曇彌至再三白云云願埀納受世尊亦至再三告曰瞿曇彌持此衣施比丘衆施比丘衆已便供養我亦供養衆智度論曰摩訶憍曇彌以金色上下衣寶奉佛佛知衆僧堪能受用告憍曇彌以此上下衣與衆僧以是故知佛寶僧寶福無多少西域記摩揭陀國部云如來化緣斯畢埀將涅槃告迦葉波曰我於曠劫勤修苦行為諸衆生求無上法昔所願期今已果滿我今將欲入大涅槃以諸法藏囑纍於汝住持宣布勿有失墜姨母所獻金縷袈裟慈氏成佛留以傳付乃至迦葉承旨住持正法結集既已至第二十年將入寂滅乃往雞足山乃至既入三峯中捧佛袈裟而立以願力故三峯斂覆慈氏世尊興世至迦葉所慈氏彈指山峯自開時大迦葉授衣致辭禮敬已畢身升虗空示神變化火焚身入寂略鈔毗奈耶雜事云大迦攝波欲涅槃往雞足山中於三峯內敷草而坐作如是念我今宜以世尊所授糞掃納衣用覆於身令身乃至慈氏下生彼薄伽梵以我此身示諸弟子及諸大衆令生厭離即便入定三峯覆身猶如密室不壞而住忠曰釋迦傳慈氏之衣西域記為金縷袈裟毗奈耶雜事及付法藏傳為糞掃納衣又毗奈耶雜事及大毗婆沙論智度論等無以釋迦衣轉付於彌勒之文但增一阿含付法藏傳並云彌勒取迦葉僧伽梨著之菩薩瓔珞經云菩薩露形求袈裟時有天子名曰福蓋知菩薩所念奉八萬四千金縷織成袈裟菩薩自念過去諸佛法服云何進趣行來斯用何法虗空神天叉手白言過去諸佛皆著織成金縷袈裟亦如今日諸天所獻菩薩即受八萬四千織成金縷袈裟以道神力而合為一袈裟著體三十二相八十種好盡皆外現舊説云迦葉捧而入雞足山轉授于彌勒者金襴十三條也下品下衣也忠曰金襴事見于西域記十三條無本據蓋依元照妄説元照芝園集送衣鉢獻淨慈圓照本禪師書云昔者迦葉如來授我釋迦本師智論所謂十三條粗布僧伽梨是也洎至埀滅遣飲光尊者持之於雞足山以待彌勒有以見佛佛之所尊也忠檢智度論無十三條布僧伽梨文智度論第三云迦葉即著從佛所得僧伽梨持衣鉢捉杖如金翅鳥現上升虗空乃至與衣鉢俱作是願言令我身不壞彌勒成佛我是骨身還出以此因緣度衆生如是思惟已直入耆闍崛山石頭中如入軟泥入已還合乃至彌勒佛以足指扣開耆闍崛山是時長老摩訶迦葉骨身著僧伽梨而出禮彌勒足上升虗空現變即於空中滅身而般涅槃又第六十四略説云彌勒以足指開山頂摩訶迦葉骨身著僧伽梨執杖持鉢而出并無以釋迦衣轉付彌勒文增一阿含經云世尊告大迦葉不應般涅槃要須彌勒出世乃至摩竭國界毗提村中大迦葉於彼山中住彌勒如來將衆至此山中見迦葉禪窟伸右手指告人民過去久遠釋迦文佛弟子名曰迦葉今日現在人民歎末曾有諸塵垢盡得法眼淨乃至彌勒當取迦葉僧伽梨著之是時迦葉身體奄然星散彌勒取華香供養付法藏傳云迦葉至雞足山於草敷上跏趺而坐作是願言今我此身著佛所與糞掃之衣自持己鉢乃至彌勒令不朽壞使彼弟子皆見我身而生厭惡乃至阿難言彌勒出時當將徒衆九十六億至此山上見迦葉時衆作是念釋迦如來弟子身形卑陋若此彼佛亦當無異於是迦葉踊身虗空作十八變變為大形充滿世界時彌勒佛即就迦葉取僧伽梨時大衆見神力除憍慢心成阿羅漢上經傳並言彌勒取迦葉僧伽梨著之祖庭事苑云如西域記云商那和修九條衣絳赤色入滅時以智願力留待遺法盡方壞奘云今已少有損詳此傳法大士所被絳色衣乃紹傳授之風又云碧色衣者或謂則天嘗取曹溪衣入內供養以碧絹裱之故後世當位者尚之又法眼傳通記云衲衣或青絹者或貼相者始於唐肅宗詔南陽國師入內衲衣損壞宮嬪以青絹幫紫絹貼相國師多著由此相承矣裱篇海音俵領衣也幫六書故裨帖也貼相於衣上安貼見釋氏要覽又有留衣非付法者備用清規當代住持涅槃云先輩遷化紙袋封留法衣一頂備請住持非付法也以表世尊付衣待彌勒應世説法後之來者審所自也屈眴衣祖庭事苑云按寶林傳達磨所傳屈眴衣此云第一布正青黑色義楚六帖云屈眴寶林傳云唐言第一布紡木綿華心為之即達磨所傳之衣七條也碧裏自師子尊者傳與釋門正統亦作第一布獨名義集云屈眴音舜此云大細布忠曰虎關作屈眴辨以達磨屈眴為佛衣引劉眴舊唐書云達磨自釋迦相傳有衣鉢劉禹錫曹溪第二碑云達磨與佛衣來以為證焉又立總衣別衣説謂總衣屈眴正傳表信別衣自衣師子付斯多斯多不傳密多止此噫世尊所傳迦葉國師所謂總衣者金襴白矣非屈眴布衣抑專於成辦偶遺之乎又凡外俗之敘佛家多取乎傳聞而言其大略雖云通書間有訛謬矣不足以為憑據余今於二劉言亦云大衣釋氏要覽云大衣有三品九種薩婆多論云僧伽梨有三品自九條十一條十三條名下品衣皆兩長一短作十五條十七條十九條名中品衣皆三長一短作二十一條二十三條二十五條名上品衣皆四長一短作九條衣大衣分三品下品之一也大衣處詳箋名僧伽梨翻譯名義集云僧伽梨西域記云僧伽胝舊訛云僧伽梨此云合又云重謂割之合成義淨云僧伽胝唐言重復衣靈感傳云每轉法輪披僧伽梨南山云此三衣名諸部無正翻今以義譯大衣名雜碎衣以條數多故若從用為名則曰入王宮聚落時衣乞食説法時著前法衣處引全同玄應經音義云僧伽𦙆陟尸切舊言僧伽梨此云合謂割之合成也又云重謂重作也王宮聚落著之伏外道衣毗奈耶雜事云佛言僧伽胝者是衣中主是故不應隨處著用作諸事業苾芻不知何處應著佛言入聚落時行乞食時隨噉食時入衆食時禮制底時聽佛法時晝夜聽法時禮拜二師及同梵行者時如是等處可披大衣嗢多羅僧伽應於淨處披著及食等事其安怛婆娑住於何處隨意著用悉皆無犯七條衣翻譯名義集云鬱多羅僧或郁多羅僧此譯上著衣即七條也南山云七條名中價衣從用云入衆時衣禮誦齋講時著大寶積經菩薩藏會云時長老阿難陀既覩世尊微笑光明以七條衣覆左肩已偏袒右肩右膝著地合掌禮足以頌問云云雲門偃禪師録云上堂因聞鐘鳴乃云世界與麼廣濶為什麼鐘聲披七條五條衣日用軌範云開浴以五條手巾挂笐竿上忠曰禪家稱挂絡是五條衣也大慧為政信寺如山主普説云舊時佛光無礙禪師一生袈裟常不離身若大小二事時便摺疊放淨處事畢洗漱了依前披在身上睡時也須披箇五條就寢空谷尚直編云宋理宗時靈隱癡絶沖禪師令門下之僧常衣直裰等服晝夜不釋其身臨睡則披五條袈裟囊佩大衣而臥三事衲三衣同忠曰五條七條九條三種衲也或為袈裟鉢拄杖者杜撰傳燈録瑞鹿先禪師章見色便見心頌云若是見色便見心人來問著方難答更求道理説多般孤負平生三事衲大慧杲禪師録自讚云身著如來三事衣口中謗佛法僧寶云云世尊制但三衣緣四分律云爾時世尊在淨處思惟心自念言諸比丘在道路行多擔衣有頭上戴有肩上擔有帶著腰中寧可為制衣多少時世尊初夜在露地坐著一衣至中夜覺身寒即著第二衣至後夜覺身寒著第三衣世尊念畜三衣足夜過已集比丘僧告如上緣言我聽諸比丘畜三衣不得過畜略鈔忠曰律家有糞掃一衣三衣諍論資持記云欲令節儉少欲省事一衲之外更無餘物止此三衣師曰三衣各一衲故云一衲亦無相違悲華經云當出家時即得成就糞掃三衣常在樹下獨坐思惟止此故糞掃三衣不可復疑緇門警訓載大智律師三衣賦云吾有三衣古聖真規粗踈麻苧為其體獸毛蠶口害命傷慈青黑木蘭壞其色五正五間涉俗生譏其奉持也如鳥兩翼其敬護也如身薄皮信是恆沙諸佛之標幟賢聖沙門之軌儀九十六道起信之首二十五有植福之基是以堅誓獸王忍死而頻加稱嘆蓮華色女作戲而盡斷貪癡弘誓甚重至德難思龍披免金翅之禍人得息戰敵之危末流浮薄正教衰遲競貿亂朱之服率遭濫吹之嗤壯大於貢高我慢欺壓於碩德厖眉習以成俗愚不知非汝當敬遵彝範仰荷恩慈時時自慶步步勿離潛神樂國兮銖衣自被埀形忍界兮報服常隨劫石可銷想斯言而不泯太空有盡諒此志以難移挂絡敕修清規日用軌範披五條注云即挂絡也舊説曰挂絡何義謂挂而絡身也或曰上中下衣皆挂而絡身獨稱此何也答曰唯絡子通挂左右肩故言挂絡餘衣不然曰若以通挂左右肩則須名通絡也若但稱挂絡則可三衣通名矣然今敕修清規解五條言挂絡也則不可復名於餘衣可以弭紛説矣但此注見于敕修清規餘處未見也又舊説曰律家呵絡子曰禪僧通肩搭袈裟此不如法也通肩者凡袈裟偏披左肩然今通披左右肩故云通肩天台遵式曰此挂絡不如法須焚棄之忠曰昧者字作挂羅謂以羅紗造又作挂落謂挂而落胸前皆杜説也釋氏要覽云絡子或呼挂子蓋此先輩僧創之後僧效之又亡衣名見挂絡在身故因之稱也今南方禪僧一切作務皆服以相不如法諸律無名幾為講流非之豫因讀根本百一羯磨第十卷云五條有三品上者豎三肘橫五肘下者減半二內名中又佛言安陀會有二種一者豎三肘橫五肘二者豎二肘橫四肘此謂守持衣最後之量限蓋三輪上蓋臍下掩膝因詳頗是今絡子之量也若作之但五幅一長一短或褶或貼呼安陀會即免謗一切處著合律無過實勝空身矣今詳律言肘但用自肘蓋度身而衣也若用尺八之肘者下文即無臂短不及之言也祖庭事苑引之云豫每觀此説益見法師之公議而嗟乎叢林禪人凡所制作未嘗取此為則而又不更挂絡之名復何意邪世典尚云必也正名況釋氏乎挂子挂絡也見挂絡處傳燈録慧日大師章云姓黃氏生而有異及長名文矩謁萬歲塔談空禪師落髮不披袈裟不受具戒唯以雜彩為挂子忠曰慧日嗣長慶大安唐乾寧中示滅乾寧唐十九主昭宗曆號可知彼時已有挂絡鉤紐忠曰今時禪林例代鉤以環代紐以絛釋氏要覽云鉤紐僧祇云紐緤集要云前面為鉤背上名紐先無此物因佛制尼師壇安左臂衣下則肩上無鎮衣不整齊乞食時被風吹落佛遂許安鉤紐佛制一切金銀寶物不得安鉤紐上惟許牙骨香木之屬四分律云舍利弗入白衣舍患風吹割截衣墮肩諸比丘白佛佛言聽角頭安鉤紐毗奈耶雜事云佛在室羅伐城時有苾芻入城乞食上衣墮落置鉢于地整理上衣居士婆羅門見已生嫌佛言為護衣應安𢂁紐於肩上安𢂁胸前綴紐紐有三種一如櫻薁子二如葵子三如棠梨子應於緣後四指安𢂁應重作帖以錐鑽穴𢂁出其內繫作雙𢂁其紐可在胸前緣邊綴之疊衣三褶是安𢂁紐處音釋櫻伊盈切薁於六切櫻薁草名舊説曰觀唐王摩詰畫僧形其袈裟無絛環蓋唐時僧猶不用絛環絛者五代時始有環者宋朝始有袈裟袋毗奈耶雜事云苾芻作三衣在肩上路行汙霑佛言應以袋盛置肩而去袋可長三肘闊一肘半其一肘半中疊縫之當中開口安鉤紐常用者在上非常用者在下略鈔帽子敕修清規聖節云欽遇聖節粥罷上堂乃至住持至法座前行者趲近知事後立冬月則衆去帽問訊四分律云世尊在舍衛國爾時比丘裹頭至佛所白言大德此是頭陀端嚴法願佛聽佛言比丘不得裹頭是白衣法若裹頭如法治時諸比丘頭冷痛白佛佛言聽以毳若結貝作帽裹頭西域亦脫帽為禮大比丘三千威儀云有五事應相入室一者當於外彈指二者入當脫帽三者當作禮四者當正住人教坐乃坐五者不得妄持經入又云事師有五事一者朝暮往問訊安否二者往當著袈裟脫帽三者往至戶當三彈指不得縱橫入四者當頭面著地作禮前長跪問消息五者若師言賢者某人來説卿所作不如法汝自知犯過不設有即當悔過言某實愚癡若無有不得還語云云忠曰著帽時隨山有別如南禪自十月五日著相國自九月晦日夢窗忌著大德有四重前住自九月九日著前堂自九月草一日大燈宿忌著後堂藏主自十月朔日著侍者自十月四日達磨宿忌著妙心前住自十月朔日著前堂已下自十月四日達磨宿忌著至大清僧黃檗派下常時著之無復脫著之禮大違清規如清規則夏月不著帽故無脫著禮冬月著帽有敬住持而脫去帽之禮矣虎關濟北集帽子頌云六稜一貫一絲通機事機心本不同可惜眼中羅縠隔又安頭上幾重重頭巾日本洞家帽子名頭巾其制異于濟家如濟家行者所披者忠謂相傳濟家六稜帽者自夢窗國師始焉然則夢窗已前濟家帽亦同今洞家帽而已傳燈録疏山仁禪師章云問如何是和尚家風師曰尺五頭巾曰如何是尺五頭巾師曰圓中取不得頭袖敕修清規大坐參云四鼓鳴住持出鐘鳴首座出以次頭首與大衆暫從後門出換衣換頭袖抽解即歸守被位禪苑清規上堂云大衆赴參不得戴帽子頭袖住持人同備用清規聖節升座云行者列知事後衆去頭袖問訊忠曰頭巾形似衣袖故言頭袖也蓋即是帽子故備用清規聖節頭袖敕修清規作帽或曰與帽子別故禪苑清規帽子頭袖並呼余謂頭袖之目本國一乎徑山無準範禪師録入內引對升座云唐代宗嘗宣召本山國一祖師每加禮敬適遇天寒代宗以銷金龍袖覆其頂後竟以龍袖為帽至今祖師遺像儼然猶存西巖惠禪師録國一見代宗來起立頌云立在威儀外全身在裏頭重重賜龍袖難掩面門羞無門開禪師録頭袖頌云四海英靈俱套下銅頭鐵額總兜來莫怪無門施毒手揭翻腦蓋頂門開教家有縹帽子燕南紀談云台家密家有縹帽子又名裹頭宗鳳雜集云隋煬帝請天台智顗大師受菩薩戒時祁寒帝解御衣縹袖令裹大師頭又日本桓武帝請睿山傳教大師受圓頓菩薩戒帝準隋帝故事賜縹帽自此台家得其位者披之未得位則不得著之忠曰煬帝解衣袖裹智者頭中華記傳未見所載禪巾忠曰亦是頭巾畫維摩所被者大休念禪師録送禪巾越後守殿仍舉文殊問疾話偈云頭載禪巾居丈室當機一默坐千差文殊舉衆同聲讚天女空中雨寶花菩薩巾忠曰菩薩巾俗謂觀音帽子法苑珠林云慧振法師於寺後山上起頭陀屋二間恆有善神衛護乃至中大同元年二月五日攝山神現形著菩薩巾披袈裟形貌極端正偏衫忠曰合祇支覆肩二物名偏衫資持記作褊衫説文褊衣小也釋氏要覽云偏衫古僧依律制只有僧祇支此名覆膊亦名掩腋衣此長覆左膊及掩右掖蓋襯三衣故即天竺之儀也竺道祖魏録云魏宮人見僧袒一肘不以為善乃作偏袒縫於僧祇支上相從因名偏衫今開脊接領者蓋遺魏制也忠曰偏袒疑字訛當作偏袖六物圖云此方往古並服祇支至後魏時始加右袖兩邊縫合謂之偏衫截領開裾猶存本相故知偏衫左肩即本祇支右邊即覆肩也贊寧僧史略云後魏宮人見僧自恣偏袒右肩乃一施肩衣號曰偏衫全其兩扇襟袖失祇支之體自魏始也忠曰諸文説偏衫有繆戾惑人者余試論辨如下文西域記云沙門法服唯有三衣及僧却崎泥縛些桑箇反那三衣裁製部執不同或緣有寬狹或葉有小大僧却崎唐言掩腋舊曰僧祇支訛也覆左肩掩兩腋左開右合長裁過腰泥縛些那唐言裙舊曰涅槃僧訛也既無帶襻其將服也集衣為褶束帶以絛褶則諸部右異色乃黃赤不同忠曰法苑珠林法服篇出五部服色襻正字通俗襻字襻普玩切音盼衣襻衣下系也唐義淨南海寄歸傳云其僧腳崎衣即是覆膊更加一肘始合本儀其披著法應出右肩交搭左膊房中恆著唯此與裙出外禮尊任加餘服又云準檢梵本無覆肩衣名即是僧腳崎衣此乃祇支之本號既不道裙多是傳譯參差資持記云僧祇支經音義翻為掩腋衣謂覆左腋著帶繫右腋下長七尺二廣四尺五次加覆肩忠曰覆右肩也次文謂褊衫右邊即是覆肩是又云但世人不識褊衫即是祇支覆肩二物故復於其上重更覆耳當知褊衫右邊即是覆肩但順此方縫合兩袖截領開裙猶存本相道宣律師章服儀云大聖本制三衣西方但有此衣餘無別服故文云但三衣也後有覆肩裿支之服相亦畟方故僧祇云長四肘廣二肘是也元制所興本唯尼衆今僧服著僭通下位而裿支上狹下廣壞絶淳源元照應法記云覆肩覆右膊也裿支梵語上有僧字正云僧却踦此翻掩腋衣掩左腋以襯袈裟祇律約量可驗畟方元下示本制尼弱故須僧非所用阿難美貌女見心迷故獨開耳住法圖贊云今僧服者濫矣即今褊袖左是裿支右是覆肩二衣綴合非本制耳而下別點裿支相本畟方而世謂是上狹下廣故壞淳源也然律云得上狹下廣聽作裿支謂裁作耳忠曰元照在資持應法中辨祇支覆肩如此詳悉矣或曰元照云僧祇支覆左腋著帶繫右腋下以襯袈裟語路未明若言覆左腋又繫右腋則衣總不在左右肩上豈得襯袈裟耶故疑謂左腋之腋字恐膊字乎膊音博肩膊篇海乃是僧祇支覆左膊著帶繫右腋下則方得襯袈裟耳余曰不然祇支覆左肩則左腋亦隱亦應言覆左腋也非衣不在左肩之上也祇支梵言翻云掩腋故元照言覆左腋而解掩腋之義也又按西域記僧却崎覆左肩掩兩腋左開右合止此其制可知先覆左肩出右肩而繞掩右腋著之則自左腋亦掩其開處在左也忠又曰要覽云祇支覆左膊掩右腋足以大顯襯袈裟之義或疑資持應法左腋為左膊者蓋自此來矣但要覽以覆膊為僧祇支翻名者訛矣西域記及應法師音義僧祇支唯翻掩腋衣事鈔從相翻上狹下廣衣耳六物圖云覆肩華語未詳梵言止此夫覆膊即覆肩也而覆肩是別物非掩腋衣矣忠又按古有謬為僧祇支名覆膊而搭右肩覆右臂之説者要覽不正此濫名却隨同於其訛謬矣根本百一羯磨唐義淨三藏注云僧腳欹迦即是掩腋衣也古名覆膊長蓋右臂定匪真儀向使掩右腋而交搭左臂即是全同佛制虎關和尚直裰辨云律者來謁曰禪拒律律拒禪如枘鑿之不相入是大患也豫曰相拒者庸流也真僧不爾曰律家屢言形服曰形服何異之有夫三衣者兩家皆同直裰偏衫雖似異亦一物耳曰忌其連綴而不合梵裁曰子惑也今之偏衫不必梵製矣我今詳説所由梵語僧祇支此云覆腋衣用覆右肩右開左合忠曰西域記云僧却崎左開右合與此反是梵製也然魏時請梵僧自恣於宮內宮人見僧偏袒體露不以為善遂作此衣忠曰宮人所作覆肩衣非僧祇支施僧覆肩通著兩袖是偏衫之起也梵語涅盤僧此云裙衫裙亦二物也連綴而稱直裰焉變製相同何贊彼毀此忠曰濟北祇支之翻云覆腋衣覆亦掩也同西域記資持應法翻掩腋衣但其云用覆右肩者謬矣覆右肩者覆肩衣也非僧祇支僧祇支實覆左肩耳辨寄歸傳如下蓋濟北卒見資持應法等祇支覆左腋之文以為衣覆左腋則其掩肩之宜右也終曰用覆右肩不知陷以祇支覆肩混為一物之謬矣又或見要覽以覆膊掩腋同為祇支翻名遂從其錯歟又按濟北語自矛盾夫梵僧偏袒者左肩有袈裟而偏露右肩耳若祇支素覆右肩則兩肩皆掩宮人見何體露而醜焉故濟北語自不成義或曰覆肩衣若已在竺制則魏宮梵僧何不著之而招露裸之惡耶答覆肩雖已在梵制本是為尼衆制是故梵來比丘不服也已或救要覽云僧祇支此名覆膊衣者依寄歸傳傳云其僧腳崎衣即是覆膊更加一肘始合本儀其披著法應出右肩交搭左膊止此所謂覆膊即覆肩也何謬之有忠曰寄歸云僧腳崎衣即是覆膊者謂覆左肩而已故寄歸次文云披著法應出右肩交搭左膊又寄歸云即是覆膊者非以覆膊為僧腳崎翻語故寄歸傳言準檢梵本無覆肩衣名止此言未見有覆肩衣之梵語如僧祇支泥洹僧等定稱呼也非謂未翻梵本中不言覆肩衣事也今已翻諸律中皆有覆肩衣事豈謂諸律中無覆肩衣事耶僧腳崎已翻掩腋衣非翻覆肩矣元照六物圖亦云覆肩華語未詳梵言止此若復覆膊是僧腳崎翻名則是為覆肩衣有梵語也義淨元照豈浪言妄説哉故要覽僧祇支此名覆膊之𠍴不可救焉直裰辨祇支覆右肩之謬不費彈斥而自破昔教者難虎關曰律談五衣祇支覆肩五條七條九條也然師直裰辨云梵語僧祇支此云覆腋衣蓋祇支覆腋二也而今合為一如何忠曰嘗時早有疑僧祇支覆右肩者但難問誤以覆腋為覆肩而詰其二物為一蓋僧祇支翻掩腋衣掩亦覆也故此翻語未必訛祇支覆腋名分梵漢元是一物是故教家唯可難他言僧祇支覆右肩耳關答曰凡四分五分十誦摩訶僧祇諸律其説非一途或以祇支覆腋為一或以為二吾辨只取大意為一物忠曰答話迂濶欠分曉祇支覆腋是一物何律以為二耶蓋問者答者皆以覆腋衣謬為覆肩衣而交輥相難酬若其覆肩衣則何律以祇支覆肩為一物耶正須明文引證以斥他疑難焉然但言諸律異説吾取大意為一豈莫不飾過遁辭耶四分律僧祇律等皆僧祇支覆肩衣為二物如余所引證四分律比丘尼戒中云彼人當往受戒人所語言妹此是安陀會此是鬱多羅僧此是僧伽梨此是僧祇支此是覆肩衣忠嘗訪宗覺律師於久修園質僧祇支覺曰僧祇支三衣之襯也先著之左肩如著袈裟法次加覆肩衣於右肩為左腋有僧祇支不可繞著故祇支左腋處穿穴而覆肩衣施紐貫其穴而結定次著袈裟焉覺又曰有左衽右袵異義先著僧祇支後著覆肩則為左袵左袵天竺儀相也其右袵師先著覆肩後披僧祇支右袵義不過言順中華風俗耳矣六物圖云尼女報弱故制祇支披於左肩以襯袈裟又制覆肩掩於右膊用遮形醜是故尼衆必持五衣忠前後引四分僧祇皆明五衣南海寄歸傳云東夏諸尼衣皆涉俗所有著用多並乖儀乃至南海諸國尼衆別著一衣雖復制匪西方共名僧腳崎服長二肘寬二肘兩頭縫合留一尺許角頭刺著一寸舉上穿膊貫頭拔右肩更無腰帶掩腋蓋乳下齊過膝若欲此服著亦無傷線則唯費兩絛彌堪掩障形醜若不樂者即可還須同大苾芻著僧腳崎服其寺內房中俱蘇洛迦及僧腳崎兩事便足準檢梵本無覆肩衣名即是僧腳崎衣此乃祇支之本號既不道裙多是傳譯參差應捨違法之服著順教之衣僧腳崎取一幅半或絹或布可長四肘五肘如披五條反搭肩上即其儀也尼衆露醜佛製僧祇支覆肩衣緣僧祇律云佛住舍衛城比丘尼年少端正著衣道行時兩乳現出男子笑之佛言從今已後比丘尼應作僧祇支乃至長四修伽陀磔手廣兩磔手又云佛住舍衛城爾時偷蘭難陀比丘尼大乳著一僧祇支於閣上經行俗人遙見言是似如水上浮瓠佛言從今日後當作覆肩衣覆肩衣者襞疊他覆肩上若不作不著越毗尼罪五分律云有諸貴姓女出家不著覆肩衣諸白衣見其肩臂共調弄之皆懷慚恥諸比丘尼以是白佛佛言聽著覆肩衣忠曰章服儀所謂元制所興本唯尼衆前引者是也十誦律比丘尼壇文受持三衣次云覆肩衣長四肘廣二肘半是覆肩衣持又云僧伽梨鬱多羅僧安陀會覆右肩衣俱修羅此文加右字智度論云阿難端正清淨如好明鏡老少好醜容貌顏狀皆於身中現其身明淨女人見之欲心即動是故佛聽阿難著覆肩衣趙州諗禪師録十二時歌云雞鳴丑愁見起來還漏逗裙子褊衫箇也無袈裟形相些些有裩無腰袴無口頭上青灰三五斗比望修行利濟人誰知變作不唧溜裙子釋氏要覽云裙此方之名周文王制也西域記云泥縛些那唐言裙些字桑箇切根本百一羯磨云梵語泥伐散那唐言裙諸律舊譯或云涅槃僧或云泥洹僧或譯為內衣或云圌衣圌音船即貯米圓器似圌而無蓋蓋取圓義西域記説詳偏衫處行事鈔二衣總別篇云十誦作時著小泥洹僧三千云泥洹著法一不持下著上二使四邊等三襞頭近左面四結帶於右面五當三繞不埀兩頭南海寄歸傳云準如律説尼有五衣一僧伽知二嗢呾羅僧伽三安呾婆娑四僧腳崎五裙四衣儀軌與大僧不殊唯裙片有別處梵云俱蘇洛迦譯為篅衣以其兩頭縫合形如小篅也長四肘寬二肘上可蓋臍下至踝上四指著時入內擡使過臍各蹙兩邊雙排擪脊繫絛之法量與僧同胸腋之間迥無擊抹行事鈔云十誦云泥洹僧破應權作俱修羅若軟體比丘揩𬧅破下開五寸許應受之此似裙周縫合五分有著俱修羅衣者俗人訶言何異我等著貫頭衣便不許著之資持記云俱修羅經音義云此翻為圌像其衣形而立名也謂如圌鄣若準注文即周圓縫合而無兩頭名俱修羅耳五分俗呵則知俱修本同俗服故並權開貫頭衣古云南海人開衫竇著之穿頭先出次出兩袖謂之貫頭直裰忠曰以偏衫與裙子直綴合故曰直裰敕修清規云直裰相傳前輩見僧有偏衫而無裙有裙而無偏衫遂合二衣為直裰然普化索本直裰大陽傳革履布裰古亦有矣虎關和尚直裰辨見偏衫處忠曰敕修清規尊宿遷化孝服云方丈行者麻布巾裰止此巾裰二物頭巾直裰也余謂行者雖亦著直裰其相須與僧直裰有異焉何以知之沙彌得度章云聖僧案前置袈裟直裰度牒於上又云拜父母即更僧衣止此此時未及披袈裟故知僧衣僧之直裰而初置案上者今脫行者裰而更僧裰也故余謂行者裰相須異僧裰焉臨濟玄禪師録云普化一日於街市中就人乞直裰人皆與之普化俱不要師令院主買棺一具普化歸來師云我與汝做得箇直裰了也普化便自擔去繞街市叫云臨濟與我做直裰了也我往東門遷化去云云僧寶傳浮山遠禪師傳云至大陽機語與明安延公相契延嘆曰吾老矣洞上一宗遂竟無人耶以平生所著直裰皮履示之遠曰當為持此衣履求人付之如何延許之曰他日果得人出吾偈為證偈曰楊廣山前草憑君待價焞異苗翻茂處深密固靈根其尾云得法者潛衆十年方可闡揚遠拜受辭去在家有著直裰者談寶云富鄭公致政歸西都嘗著布直裰跨驢出郊琅邪代醉編云至如上衣下衣各為長短之制衣才至膝裳乃裙也今之祭服是也後魏胡服便於鞍馬遂施裙於衣為橫幅而綴於下謂之欄今之公裳是也則戎狄之服也忠曰今時明僧裙下橫綴一幅左右作斜摺此所謂欄乎汗衫日用軌範開浴云取出浴具放一邊解上衣忠曰中華人上下二衣上衣如此方羽蔽為汗衫又名中單下衣如此方前埀是名裙也慈受深禪師慧林録壽春府檀越就天清寺散千僧汗衫升座云娘生袴子脫體皆空逍州布衫更無樣度袖頭打領腋下剜襟自然縫罅難尋直是針鋒不露然雖如是説食終不飽著衣方免寒爭似者箇衫子是檀越段時升向清淨心中流出布施諸人正當恁麼時一句作麼生道良久云一片信心清似水滿天和氣暖如春廣燈録林溪徹禪師章云問如何是祖師西來意師云著體汗衫事文類聚引炙轂子云燕朝兗冕有白紗中單有明衣皆汗衫之象以行祭接神至漢與項羽交戰汗透中單改名汗衫貴賤通服衲衣忠曰文字雖出經論禪僧常著之故稱有衲僧問有衲衣下事類書纂要云衲補縫也衲本作納佛祖統記慧思尊者傳云平昔禦寒唯一艾納注法華經納衣在空間律文謂之五納衣謂納受五種舊弊以為衣也俗作衲字失義五納衣者釋氏要覽云糞掃衣有五種一道路棄衣脫厄衣也二糞掃處衣三河邊棄衣四蟻穿破衣五破碎衣又有五種一火燒衣二水漬衣三鼠咬衣四牛嚼衣五妳母棄衣已上衣天竺人諱忌故棄之以不任用義同糞掃故共納成衣名糞掃衣也又應法記云五納謂五色鬬成也止此此亦一解異要覽智度論云佛意欲令弟子隨道行捨世樂故讚十二頭陀如轉法輪時五比丘初得道白佛言我等著何等衣佛言應著納衣釋氏要覽云十誦云若納衣不貼田相不許披入聚落此衣有十利一在粗衣數二少所求索三隨意可坐四隨意可臥五浣濯易六少蟲壞七染易八難壞九更不餘衣十不失求道又云體是賤物離自貪故不為盜所貪常得資身故少欲者須濟形苦故上士著之諸善根經云世尊告諸比丘大迦葉常修阿蘭若行乞食衲衣粗弊三衣邊外遠住少欲知足樂遠離行於一切法心不與合聲聞功德皆悉具足傳燈録多福和尚章云問如何是衲衣下事師曰大有人疑在曰為什麼如此師曰月裡藏頭糞掃衣即衲衣也又見衲衣處行事鈔云納衣者四分云捨檀越施衣著糞掃衣十住婆沙云以有十利故一慙愧二障寒熱毒蟲三表示沙門儀法四一切天人見法衣尊敬如塔五厭離心著染衣非貪好六隨順寂滅非為熾然煩惱七由著法衣有惡易見八更不須餘物莊嚴故九隨八聖道故十我當精進行道不以染汙心於須臾間四分律云世尊在波羅奈國鹿野苑中時五比丘白佛我等當持何等衣佛言聽持糞掃衣及十種衣拘舍衣劫貝衣欽跋羅衣芻摩衣叉摩衣舍衣麻衣翅夷羅衣拘攝羅衣嚫羅鉢尼衣如是十種衣應染作袈裟色持又云糞掃衣有十種牛嚼衣鼠嚙衣火燒衣月水衣産婦衣神廟中衣若鳥銜風吹雜處者得取冢間衣求願衣受王職衣往還衣是謂十種糞掃衣磨衲六祖法寶壇經云神龍元年九月三日有詔曰朕積善餘慶宿種善根值師出世頓悟上乘感荷師恩頂戴無已并奉磨衲袈裟及水晶鉢東坡全集磨衲贊并序云長老佛印大師了元遊京師天子聞其名以高麗所貢磨衲賜之客有見而歎曰嗚呼善哉未曾有也嘗試與子攝其齋袵循其鈎絡舉而振之則東盡嵎夷西及昧谷南被交趾北屬幽都紛然在吾針孔線蹊之中矣佛印聽然而笑曰甚矣子言之陋也吾以法眼視之一一針孔有無量世界一一世界滿中衆生所有毛竅所衣之衣針孔線蹊悉為世界如是展轉經八十反吾佛光明之所照與吾君聖德之所被如以大海注一毛竅如以大地塞一針孔曾何嵎夷昧谷交趾幽都之足云乎當知此衲非大非小非短非長非重非輕非薄非厚非色非空一切世間折膠墮指此衲不寒爍石流金此衲不熱五濁流浪此衲不垢劫火洞然此衲不壞云何以有思惟心生下劣想於是蜀人蘇軾聞而贊之曰匣而藏之見衲而不見師衣而不匣見師而不見衲惟師與衲非一非兩眇而視之蟣蝨龍象別本齋作被齋作放雞林志云高麗僧衣磨衲者為禪法師衲甚精好紫衣忠曰僧賜紫服中華以唐法朗等為始日本以建仁寺榮西永平寺道元為始僧史略云古之所貴名與器焉賜人服章極則朱紫緑皂黃綬乃為降次故曰加紫綬必得金章今僧但受其紫而不金也方袍非綬尋諸史僧衣赤黃黑青等色不聞朱紫案唐書則天朝有僧法朗等重譯大雲經陳符命言則天是彌勒下生為閻浮提主唐氏合微故由之革命稱周新大雲經曰終後生彌勒宮不言則天是彌勒法朗薛懷義九人並封縣公賜物有差皆賜紫袈裟銀龜袋其大雲經頒於天下寺各藏一本令高座講説賜紫自此始也延寶傳燈録建仁寺明菴榮西禪師章曰建仁二年金吾大將軍賴家源公施地於洛東營大禪剎先是平侍郎奏賜紫衣永平道元和尚行狀云後嵯峨帝聽師道譽賜紫方袍號佛法上人禪師師力辭不許作偈奉謝曰永平雖山淺敕命重重重却被猿鶴笑紫衣一老翁僧史略云東觀奏記曰大中中大安國寺釋修會能詩嘗應制才思清拔一日聞帝乞紫衣帝曰不於汝吝耶觀若相有缺然故未賜也及賜歸寺暴疾而卒資持記云今時沙門多尚紫服按唐紀則天朝薛懷義亂於宮庭則天寵用令參朝議以僧衣色異因令服紫袈裟帶金龜袋後偽撰大雲經結十僧作疏進上復賜十僧紫衣龜袋由此弊源一泄于今不返無知俗子濫迹釋門不務內修唯誇外飾矧乃輒預耆年之上僭稱大聖之名國家之所未詳僧門之所不舉致使貪婪嗇吝之輩各逞奢華少欲清淨之風於茲墜滅且儒宗人倫之教則五正為衣釋門出世之儀則正間俱離故論語云紅紫不以為褻服文中子云君子非黃白不衣尚非俗禮所許豈是出世正儀况律論明文判為非法苟不信受安則為之六物圖云輕紗紫染體色俱非佛判俗服全乖道相何善之有或云分宗途者佛教但以三學分宗而謂形服異者未之聞矣忠曰則天何因以紫服為貴而賜法朗耶杜預注在傳曰紫衣君服止此即以君服色寵之也杜預注見哀公十七年而僧賜紫以此發揮者少又僧殊意癡撰白河燕談云日本玄昉道鏡淨家然阿賜紫始也蓋言教家賜紫耳黃衣僧史略云後周忌聞黑衣之讖悉屏黑色著黃色衣起於周也山堂肆考云僧舊著黑衣元文宗寵愛僧欣笑隱賜以黃衣其徒後皆衣黃故歐陽原元題僧墨菊詩苾芻元是黑衣郎當代深仁始賜黃今日黃花翻潑墨本來面目見馨香按今制禪僧衣褐講僧衣紅瑜伽僧衣蔥白瑜伽今應赴僧也忠曰羣談採餘堯山堂外紀亦載此事然豫按龍源清禪師録有謝杭州賜黃衣師號上堂源則元成宗第六主大德年中人此時已有賜黃衣非始於文宗第十二主也又天隱筠溪牧潛集初改黃衣詩云宣詔亭前受牒還御黃新賜滿城看臣僧記得沙彌日齊著青衣上戒壇止此至公亦元世祖第五主成宗間人也又按僧史略云尋諸史僧衣赤黃黑青等色止此可知黃衣非始於元朝但元朝盛賜之耳續文獻通考云洪武十四年令凡僧道服色禪僧茶褐常服青絛玉色袈裟講僧玉色常服緑絛淺紅袈裟教僧皂常服黑絛淺紅袈裟僧官皆如之道士常服青法服朝服皆用赤色道官亦如之惟僧録司官袈裟道録司官法服朝服皆緑紋飾以金忠曰教僧恐當作律僧雲棲竹窗二筆云如吾郡則淨慈虎跑鐵佛等禪寺也三天竺靈隱普福等講寺也昭慶靈芝菩提六通等律寺也衣則禪者褐色講者藍色律者黑色字彙褐黃黑色今俗謂之茶褐色禪帶忠曰修禪定時以帶繞束腰便於澄慮矣五分律云諸比丘廣作禪帶以是白佛佛言不應過人八指諸比丘復狹作禪帶以是白佛佛言不應減五指諸比丘復作雜色禪帶以是白佛佛言應一種色作若雜種色應浣壞色然後聽畜平江絛日用軌範抽脫法云解絛繫笐竿上解者曰絛者平江絛也篇海類編云絛他刀切香滔纓飾編絲繩亦作縚縧忠曰絛兩頭有總繞絛束腰而總下乘右左腋下名平江絛然支那書未見平江絛名方輿勝覽潼川府有平江縣湖北嶽州有平江大明一統志南京蘇州平江嶽州平江縣並無出絛之説忠按臨安亦有平江見湖海新聞余謂禪林平江絛恐出於此且何以言之彼土五山多在臨安府府中平江出此絛而日本渡唐禪人取其樣式而傳於斯乎臥雲日件録云永安和尚住相國寺時勝定相公賜金襴袈裟平江絛及錢二百貫以助開堂之儀也徹書記紀談云前探題了俊歲八十餘嘗著墨色無裳衣以平江帶總長者束腰矣有懸平江帶以裝賓席者太平記云佐佐木道譽拉衆客遊大原野賞花挂平江帶於紫藤枝炷雞舌香於螭頭爐忠曰曾觀相國寺修夢國師三百五十年忌方丈室中北壁左右柱上懸同心結兩條矣毗奈耶雜事云佛在室羅伐城苾芻乞食之時下衣墮地置鉢于地整理下裙乃至佛言應用腰絛絛有三種一匾二方三圓坐具釋氏要覽云梵云尼師壇此云隨坐衣根本毗奈耶云尼師但那唐言坐具淨法師注云文言坐具此乃敷具坐臥皆得佛制者本為襯替臥具恐有所損不擬餘用也五分律云為護身護衣護僧床褥故蓄坐具僧祇云若在道行得長疊中疊安衣囊中至本處當敷而坐律應量作長佛二搩手廣一搩手半佛一搩手長二尺四寸此合長四尺八寸廣三尺六寸律云更增者即向四邊各益如今坐具四緣有貼即象也不許單作若新物作當用故物貼中蓋壞其好也若自無故物又無求處不貼無過記云佛先許安左肩上鎮衣因有外道問一比丘曰汝肩上片布何名何用比丘答云名尼師壇是坐具又問汝所披衣何名有何功德答忍辱衣三寶之相上制天魔下降外道又問此衣既有是功德可貴豈得以所坐之布居其上若汝自為師何不教若師教者此法不足可尊比丘白佛佛因制移安左臂衣下衣即三衣也以此證是觸不得淨用慧琳一切經音義云尼師壇梵語略也正梵音具足應云𩕳史娜曩唐譯為敷具今之坐具也𩕳音寧頂反四分律云世尊聽諸比丘作新坐具取故者縱廣一磔手貼新者上以壞色故又云若故坐具未壞未有穿穴當取浣染治牽挽令舒裁割取縱廣一磔手貼新者上若貼邊若中央壞色故忠曰今於坐具四邊別貼布或絹紗者所謂貼邊之象乎南山感通傳云天人黃瓊云元佛初度五人及迦葉兄弟並制袈裟左臂坐具在袈裟下後度諸衆徒侶漸多年少比丘儀容端美入城乞食多為女愛由是制衣角在左肩後為風飄聽以尼師壇鎮上後外道達摩多問比丘肩上片布持將何用答曰擬將坐之達摩多云此衣既為可貴有大威靈豈得以所坐之布而居其上比丘白佛由此佛製還以衣角居于左臂坐具還在衣下但不得埀尖角如象鼻羊耳等相南海寄歸傳云禮拜敷其坐具五天所不見行致敬起為三禮四部罔窺其事凡為禮者拜數法式如別章所陳其坐具法割截為之必須復作制令安葉度量不暇詳悉其所須者但擬眠臥之時護他氈席若用他物新故並須安替如其己物故則不須勿令污染虧損信施非為禮拜南海諸僧人持一布巾長三五尺疊若食巾禮拜用替膝頭行時搭在肩上西國苾芻來見咸皆莞爾而笑也湛堂律師六物圖依釋坐具下云問今每作禮必敷者何答壇經明阿難結集時迦葉敷尼師壇禮阿難等則知為法中定式耳關中創立戒壇圖經南山道宜撰云案別傳云迦葉結集來戒壇上使小目連鳴鐘召百億四天下凡聖衆乃至大迦葉從座而起披粗布僧伽梨捉尼師壇至阿難前敷尼師壇禮阿難已右繞三匝大梵天王執大寶蓋覆阿難上忉利天主進七寶案置阿難前乃至迦葉禮拜已至阿難前問訊起居如世尊在時不異廣説如彼忠曰祇園圖經亦是南山感靈出之説大同此法苑珠林七百結集部所説亦同忠又按僧史略云昔梵僧到此皆展舒尼師壇就上作禮禮拜部兩展三禮處詳引乃合大迦葉禮阿難舊軌然南海寄歸傳云禮拜敷其坐具五天所不見行止此大不與上所援數説同恐義淨疏漏耳已下録坐具搭臂及展開法大鑑小清規云坐具搭手須在袈裟之下坐具開展處向外搭之多見誤以坐具背向外又妄言前輩一大尊宿以坐具背向外堅執此説殊不知初與客人相見時便相背也又展時亦顛倒反逆大非禮法前輩豈不知禮法如此乃知作此説者齊東之人也坐具展時須從衣袖內邊拈起坐具角展開此為順也今時多從衣袖外邊倒拈坐具展開此為逆也順則吉逆則凶知禮人皆從吉也村寺清規云禮佛披大袈裟展坐具不得不具威儀搭坐具摺口向外拜則先以右手拈起向裏一頭略側身牽開展拜忠曰觀自大清來僧皆坐具背向外日本從他者例學之可謂愚矣已下録坐具不得令他人展開釋氏要覽云凡禮佛須自展尼師壇不得令他人展或至塔殿上先有地席便就上禮先無不得立佇布席不得於低床上禮須脫屣履勿以無儀自招深罪矣釋門歸敬儀云行事之時既脫足已可踐土地應在坐具尋討經律無敷坐具之文但云脫屣禮足今據事用理須坐具故制坐具緣云為身為衣為僧臥具既為身衣明知前設又坐具之目本是坐時之具所以禮拜之中無文敷者故如來將坐如常自敷準此比丘自敷而坐不合餘人為敷今見梵僧來至佛前禮者必先褰裙以膝拄地合掌長跪口讚於佛然後頂禮此乃遺風猶在可準用之無坐具明矣比有行敬在佛僧前仍令侍者為敷坐具此乃行憍未是致敬又有要待設席方始禮者亦不可也如見尊長即須下拜安待覓席耶以事詳準隨時設禮不可待席有則從席無則從地可也如在清廟闕庭公衙之所何有設席以此準例則敬慢兩分忠按尋討經律已下全依法苑珠林致敬篇敷座部忠曰此中如來自敷者大般若經第一第四百一第四百七十九皆云爾時世尊於師子座上自敷尼師壇結跏趺坐止此夫三界獨尊尚自敷矣然今觀清國僧規主者跨立佛前令侍者展具敢乃作禮日本僧出於其下者亦效尤矣夫佛之所為而尚不為憍高自大亦極焉緇門警訓載大智律師坐具賦云吾有坐具裁量有據其色相則一類袈裟其物體則兩重踈布長四廣三壞新揲故彼形之大者可用開增吾身之小兮從初制度好大惡小但責他非反制為開焉知自誤嘗聞比丘身者五分之塔也尼師壇者四方之基也是則道者所資豈宜身之為護安禪講法敷之喜失於威儀入聚遊方持之勿離於跬步不然諸律有違制刑科一生無如法坐處襪釋名云襪末也在腳末也釋氏要覽云鈔云襪亦是衣四分律云寒聽著襪敕修清規裝包云下裳鞋襪有袋繫於後日用軌範云不得赤腳著僧鞋忠曰言須著襪而方著皮鞋也解者曰清規言可著襪之義唯在此耳凡著襪者非為禮也蓋僧鞋皮造若跣而著則具膩污腳故誡赤腳著鞋而已非赤腳為無禮如天竺風俗皆赤腳也但日本國以赤腳為失禮支那國則士庶皆著襪褁足蓋其俗據床埀足故血下令足大故褁之防其鄙醜復非為禮也舊説曰佛通寺愚中和尚不帶坐具不著襪子馬縞中華古今注云三代及周著角襪以帶繫於踝至魏文帝吳妃乃改樣以羅為之後加以綵繡畫至今不易至隋煬帝宮人織成五色立鳳朱錦襪靿羣談採餘云襪實録曰自三代有之謂之角襪魏文帝吳妃裁縫以綾羅紬絹為之洛神賦云羅襪生塵是也後漢崔駰集襪銘云襪衡建子萬物含滋黃鍾育化以養元基長履景福至于億年皇靈既祐祉祿來臻本枝萬世子子孫孫腳絣入衆日用云寒月向火不得炙鞋臭焙腳絣衣裳等敕修清規亡僧云須留裝亡衣服直裰挂絡內外衣裳數珠香合腳絣鞋襪淨髮巾收骨綿子等篇海類編云絣補緋切音崩布名祖庭事苑云腳絣律所謂護腨衣也僧祇云我弟子著三衣足遮寒苦若性不忍寒者弊故衣隨意重著五分云三衣襯身衣被衣雨浴衣護髀衣護踝護腨衣等皆禦寒故許畜之然此衣最為凡下趣得不破足矣今見禪人行界細刺動廢時序而又煩暑如焚高裙緊禮自謂雅合禪規豈知佛為禦寒而設忠曰緊禮之禮必字訛字典肉部云腨市兖切音踹正字通俗曰腳肚篇海云腨又柱兖切音篆又脛腨也足肘也忠曰腨和訓古武羅行纏忠曰亦名行滕禮記內則名逼日本俗曰腳絆聯燈會要雲居舜禪師章云夜間脫襪打睡早朝旋繫行纏東坡詩集答寶覺詩云芒鞋竹杖布行纏又寄吳德仁詩云我遊蘭溪訪清泉已辦布襪青行纏打眠衣舊説曰夜間須著打眠衣到天曉方換好衣永平清規辨道法云若換直裰莫離被位在位而換先將日裏者先蓋身上潛解打眠直裰之兩帶脫肩袖而落于背後之與膝邊譬如繞蒲團次結日裏者之兩帶著定了收打眠直裰窖在于被位之後脫日裏者著打眠衣須準之而知東福清規正月懺法云期日維那者先著打眠衣赴方丈請導師等諸職大悲咒畢至一心時歸寮改威儀至觀音經更赴方丈被忠曰臥息以蓋身章服儀所謂被單是也馬縞中華古今注云被語云必有寢衣長一身有半日用軌範云摺被之法先尋兩角以手理伸向前先摺一半次摺身前一半不得橫占鄰單亦不得抖擻作聲不得以被扇風永平清規辨道法云摺被之法因聞開大靜以兩手執被兩角而把合縱折而作兩重次又縱折而作四重次向內橫折而作四重都計十六重也以安眠單之奧頭次疊斂眠單於被下插枕子於被裏安被之時有重之頭向身以安之紙被希叟曇禪師廣録禪房十事紙被頌云通身不挂寸絲單明一色邊事要知結角羅紋徑問床子枕子眠單舊説曰臥時鋪之或謂坐時鋪之本是坐具也忠曰或以眠單為章服儀被單非也又和俗以眠單稱蒲團訛蒲團以蒲造與眠單不涉日用軌範云上被位眠單收一半坐定祖庭事苑云時佛在給孤園有一比丘赤體而睡不護旃褥臥具人皆譏嫌佛言宜令著臥具即今禪家所用眠單是矣寄歸傳云禮拜敷坐具五天所不見行其所須者但擬眠護它旃席也若用它物新故並須安替不令汙染虧損信施禪苑清規首座云堂司行者打放參鐘展單下帳罷歸寮問訊喫湯隨意如遇念誦歸寮問訊喫湯罷然後入堂展單下帳昏鐘下窗簾明即捲之堂中大衆未開靜前不得令捲單疊被上帳恐喧大衆敕修清規念誦云堂司行者往首座前覆云放參乃至供頭鳴堂前鐘三下衆普同和南各出全單而散又坐參云堂司行者候晚粥熟覆首座云放參乃至衆下床各出半單忠曰此中言單皆眠單也舊説曰凡出半單為坐禪矣日用軌範云眠單收一半坐定是也初夜坐禪畢出全單為偃息也所謂單者可鋪而坐臥之物要不損壞常住床席也傳燈録白水仁禪師章云鏡清行腳到師謂之曰時寒道者清曰不敢師曰還有臥單得蓋否曰設有亦無展底功夫師曰直饒道者滴水滴凍亦不干他事曰滴水冰生不相涉師曰是浴具日用軌範云如開浴浴具携右手入下間門內忠曰浴裙腳布等總稱浴具也浴裙日用軌範云以腳布圍身方可繫浴裙忠曰雖言裙而非腳布類但是浴衣耳故軌範又云以腳布摺浴裙內恐濕浴袱止此依此知浴裙非濕水物也繫者挂之笐竿也舊説曰浴裙以單綿布造浴衣也腳布見浴裙處入衆日用作腳巾忠曰腳布圍肚腰入浴之具與備用清規云知浴鋪腳布者別物也見器物門腳布處故日用軌範云以腳布摺浴裙內止此可知浴衆隨身者而非浴主所鋪設矣忠曰此腳布律稱洗裙者毗奈耶雜事云苾芻洗已濕體披衣佛言應畜拭身巾無巾可得洗已片時蹲地以洗裙拭體然後披衣義淨注言洗裙者可用絹布一幅半長六尺許橫繞腰髁擫勿令脫更不安帶是西國法也履日用軌範抽脫云古云入廁用籌分觸淨出時脫履忌縱橫行事鈔二衣總別篇云五百問云淨潔靴鞋履得著禮拜四分聽為護身護衣護臥具故在寺內著一重革屣歸敬儀云此土羣臣朝謁之儀皆在殿庭故履屣不脫有時上殿則劍履皆捨此古法也天竺國中地多濕熱以革為屣制令服之如見上尊即令脫却自餘寒國隨有履之行事之時既脫足已可踐土地應在坐具羣談採餘云履屨舄履者禮也飾足以為禮屨拘也所以拘足也草履曰屝單底曰履復底曰舄麻履謂之不借言賤者易有不相假借也舄以木置履下言乾臘不畏泥濕也黃帝臣于則作屝屨魯國孔民尚有仲尼車輿冠履狼跋美周公曰赤舄几几鞋日用軌範云不得拖鞋咳嗽作聲敕修清規裝包云下裳鞋襪有袋繫於後羣談採餘云鞋實録曰夏商皆以草為之周以麻晉永嘉中以絲或云唐馬周始以麻為之名鞋也馬縞古今注云麻鞋起自伊尹以草為之草屩周文王以麻為之名曰麻鞋至秦以絲為之令宮人侍從著之庶人不可至東晉又加其好公主及宮貴皆絲為之祖庭事苑云皮鞋央掘經云施主買施不見殺故如有施主牛死賣與屠生轉買皮令人作革屣施許受用著拖鞋舊説曰拖鞋木鞋也浴室及西淨用之忠曰拖鞋鞋名鞋首植一小椿上開下狹用將指第二指插持之拖曳而得步故言拖鞋敕修清規知浴云出面盆拖鞋腳布日用軌範開浴云其所脫衣作一袱覆轉方換拖鞋拖鞋又名木舄見殿堂門浴室處衩衣諸祖偈頌慈受深禪師示衆云衩衣登殿草履遊山莫踐法堂回互耆舊忠曰殿字恐訛當作廁入衆日用全引此永平衆寮清規云寮中兄弟在案頭之時見他人來先下床立地或著衣或衩衣須隨來者之儀或問訊或觸禮永平清規辨道法云後夜晡時不挂袈裟但坐禪耳晡時衩衣入室就單位出蒲團而用坐禪未展單矣或者有半展單之古法脫衩衣疊安被上而坐禪矣篇海類編云衩楚懈切音瘥衣衩也博雅䘯結䙞謂之褸衩又丑亞切音詑注同䘯篇海音梢衣袵䙞音登毛帶也褸音婁裳際也正字通云衩舊注楚懈切音瘥引博雅䘯結衽謂之褸衩又衣袒也按褻服謂之衩衣唐僖宗乾符元年王凝崔彥昭同舉進士凝先及第嘗衩衣見彥昭宋太祖召竇儀入禁闈問事儀行至屏障間覘見上衩衣因卻退中宮趣出見儀曰聖上衩衣必未知儀來但奏云宣到翰林學士竇儀太祖聞之起索衫帶著後方召見之據此説衩在𧜗韻讀若吒舊本音訓並非忠曰衩衣義自古欠分曉近及正字通來一掃舊滯矣竇儀事見代醉編康熙字典云衩唐韻集韻韻會並楚懈切差去聲玉篇衣衩也又篇海衣袒也又類篇楚嫁切音汊義同山堂肆考云宋帳文定公安道平生未嘗不衣冠而食嘗暑月與其壻王鞏同飯命鞏褫帶而已衫帽自如鞏不敢公曰吾自布衣諸生遭遇至此一飯皆君賜也享君之賜敢不敬乎子自食某之食雖衩衣可也衩音瘥衩袒衩衣又言衩袒康熙字典云袒音但儀禮注袒左免衣也備用清規日用清規云古云衩袒不許登殿草履莫踐法堂日用軌範云古云衩袒登溷草履遊山莫踐法堂回互耆舊羣談採餘清逸類云清晨燒香食罷便可岸巾衩袒舊説曰義堂信和尚曾觀唐畫人形屏開衣襟於背後曰此所謂衩袒也謂胸前襟迫吭似叉字亦有袒容故曰衩袒乃懶放之貌俗言錢持頸蓋懸錢於頸者屏襟以膚受防損衣也卸衣忠曰日本禪林僧摺斂七條九條等挂在左臂此言卸衣蓋卸下在肩衣也或作叉衣者非也又與衩衣義不涉楊慎千里面談云詩有出于率易而神妙者如西子洗籹巫娥卸服固勝于羅紈綺繢也字彙云卸司夜切寫去聲舍車解馬脫衣解甲皆曰卸孝服忠曰尊宿遷化法眷會裏著凶服也敕修清規尊宿遷化孝服云侍者小師麻布裰兩序苧布裰主喪及法眷尊長生絹裰勤舊辦事鄉人法眷諸山生絹腰帛檀越生絹巾腰帛方丈行者麻布巾裰衆行者苧布巾方丈人僕作頭麻布巾衫甲幹莊客諸僕麻布巾六祖壇經云師曰吾滅度後莫作世情悲泣雨淚受人弔問身著孝服非吾弟子亦非正法但識自本心見自本性六物圖云今時縱怠加復無知反以如來正制之衣用為孝服且僧無服制何得妄行釋氏要覽輔教孝論相循訛説慎勿憑之近見白布為頭經者斯又可怪法滅之相代漸多有識者宜為革之則法得少留矣腰帛忠曰尊宿遷化孝服者白帶圍腰言腰帛見孝服處或作腰白枯崖漫録岊翁淳禪師語云二月初一好箇消息桃花煞紅李花煞白劍池邊楊大伯笑中打失攔腰白直至如今尋不得喝云有甚交涉三才圖會文公家禮有腰帛圖第草七類唄器門諸法器敕修清規入院云至時鳴大鐘諸法器大衆門迎又法器章云新住持入院諸法器一齊俱鳴忠曰舊説以之為大開靜非也大開靜但鳴廚前諸堂版而已不鳴鐘鼓如今入院接住持則鐘板鼓一同鳴故云諸法器也犍椎敕修清規維那云十誦律云以僧坊中無人知時打楗椎乃至衆亂時無人彈壓等佛令立維那忠曰須知叢林鳴器維那掌之玄應經音義云犍椎直追切經中或作犍遲案梵本臂吒犍椎臂吒此云打犍椎此云所打之木或檀或桐此無正翻以彼無鐘磬故也但椎稚相濫所以為誤已久也釋氏要覽云五分律云隨有瓦木銅鐵鳴者皆名犍稚經音疏云犍虔音稚直利切此云擊木聲五分比丘問以何木作犍稚佛言除漆樹餘木鳴者聽作智論云迦葉於須彌山頂撾銅犍稚增一經云阿難升講堂擊犍稚者此名如來信鼓也今詳律但是鐘磬石板木板木魚砧槌有聲能集衆者皆名犍稚也業疏云犍槌者梵本聲論云犍巨寒切地此云磬亦曰鐘也乃金石二物耳故五分云隨鳴者作之意取聞聲來集召僧法也行事鈔集僧通局篇云出要律儀引聲論翻犍巨寒反稚音地此名磬也亦名為鐘資持記云若諸律論並作犍槌或作犍椎如字而呼乃是梵言訛轉唯獨聲論正其音耳今須音槌為地又羯磨疏中直云犍地未見稚字呼為地也後世無知因茲一誤至於鈔文前後以及一宗祖教凡犍槌字並改為稚直呼為地請尋古本寫鈔及大藏經律考之方知其謬但以稚椎相濫容致妄改今須依律論並作犍槌至呼召時自從聲論或作椎亦爾世有不識梵語云是打鐘之槌及砧槌等此又不足議也若準尼鈔云西傳云時至應臂吒犍槌臂吒此云打犍槌此云所打之木或用檀桐木等彼無鐘磬故多打木集人此則與今全乖不可和會且依鈔疏鐘磬翻之謂金石二物也應法師經音義大同尼鈔然祇桓圖中多明鐘磬而云彼無者或恐少耳音義又云舊經云犍遲亦梵言訛轉宜作稚直致反明知稚字不呼為地此迷久矣故為辨之正字通云椎俗作槌鎚忠曰元照意須字從草木之木而其音地也大比丘三千威儀云揵稚有五事一者常會時二者旦食時三者晝飯時四者暮投槃時五者一切無常復有七法一者縣官二者大火三者大水四者盜賊五者會沙彌六者會優婆塞七者呼私兒當復知十二時揵椎常會時先從小起稍至大大下擊二十稍小二十一下小小十下復大三下旦食大下八晝食一通投槃亦一通無常者隨視時縣官水火盜賊亦隨時會沙彌三下會優婆塞二下呼私兒一下持一通至比丘楗稚無後音教乘法數圖五事七法七法易知今略之一常會時説四羯磨講法等集五十四下謂之一通二旦食時八下即小食時也三晝食時同上一通即中食時四暮投盤時同上一通如今昏鐘投盤疑是梵語五無常多少隨時謂人臨終聞鐘聲生善馬鳴菩薩傳云比丘鳴揵椎外道即問今日何故打此木耶大鐘忠曰禪剎鐘有三大鐘殿鐘堂鐘也大鐘者號令闔山諸堂者敕修清規聖節云鳴大鐘及僧堂前鐘集衆列殿上向佛排立又法器章云大鐘叢林號令資始也曉擊則破長夜警睡眠暮擊則覺昏衢疏冥昧引杵宜緩揚聲欲長凡三通各三十六下總一百八下起止三下稍緊鳴鐘行者想念偈云願此鐘聲超法界鐵圍幽暗悉皆聞聞塵清淨證圓通一切衆生成正覺仍稱觀世音菩薩名號隨號扣擊其利甚大遇聖節看經上殿下殿三八念誦佛誕成道涅槃建散楞嚴會諷經齋粥過堂人定時各一十八下如接送官員住持尊宿不以數限庫司主之行事鈔集僧通局篇云增一阿含云阿難升講堂擊犍稚者此是如來信鼓也續高僧傳釋智興傳云亡者通夢其妻曰不幸病死生於地獄賴蒙禪定寺僧智興鳴鐘響震地獄同受苦者一時解脫有問興曰何緣鳴鐘乃感斯應興曰余無他術見付法藏傳罽膩吒王劒輪停事及增一阿含鐘聲功德敬遵此轍苦力行之鳴鐘之始願諸賢聖同入道場然後三下將欲長打如先致敬願諸惡趣聞此鐘聲俱時離苦如斯願行志常奉修豈唯微誠遂能遠感衆服其言增一阿含經曰阿難即升講堂手執楗椎並作是説我今擊此如來信鼓諸有如來弟子衆者盡當普集爾時復説此偈降伏魔力怨除結無有餘露地擊揵稚比丘聞當集諸欲聞法人度流生死海聞此妙響音盡當雲集此百八鐘附百二十下忠曰大鐘一百八下昏曉鳴之敕修清規云大鐘曉擊則破長夜警睡眠暮擊則覺昏衢疏冥昧引杵宜緩揚聲欲長凡三通各三十六下總一百八下起止三下稍緊禪苑清規云打大鐘之法先輕手擬鐘三下慢十八聲緊十八聲三緊三慢共一百八聲羣談採餘云鐘聲晨昏叩一百八聲者一歲之義也蓋年有十二月有二十四氣又有七十二候正得此數浙杭州歌曰前發三十六後發三十六中發三十六聲急通共一百八越州歌曰緊十八緩十八六遍湊成一百八台州歌曰前擊七後擊七中間十八徐徐發更兼臨後擊三聲三通湊成一百八劉氏鴻書云四季須知五更鳴鐘前十八緩後十八急緩急每三轉共一百零八擊者蓋應十二月與二十四氣七十二候之數亦按陰陽也忠曰俗説佛寺朝暮百八鐘醒百八煩惱睡非也天竺作相本一百二十下見事鈔及資持記未聞百八下其百八數出中華世典所謂十二月二十四氣七十二候合成百八乃應知覺百八煩惱眠者舉燭燕説也或曰慈照相公時命京師五山擊二十五點其曉鐘先鳴九十下遺十八下及開靜時鳴之詳二十五點處未知何據也百二十下附道宣撰釋門集僧軌度圖經云念三寶存五衆衆各八輩故以四十為差三道乘之則一百二十為節也資持記引圖經注云八輩謂四果四向三通謂三乘殿鐘忠曰佛殿鐘也敕修清規楞嚴會云鳴大鐘僧堂鐘殿鐘住持至佛前燒香又法器章云殿鐘住持朝暮行香時鳴七下凡集衆上殿必與僧堂鐘相應接擊之知殿主之僧堂鐘忠曰僧堂前鐘其製稍小或單稱堂前鐘敕修清規請立僧首座云堂司行者鳴僧堂鐘大衆同送歸寮又法器章云僧堂鐘凡集衆則擊之遇住持每赴衆入堂時鳴七下齋粥下堂時放參時旦望巡堂喫茶下床時各三下住持或不赴堂或在假則不鳴堂前念誦時念佛一聲輕鳴一下末疊一下堂司主之雲門偃禪師録云師在僧堂前問僧這箇鐘子是什麼物作無對師云儞問我僧便問師云衲僧作代但打鐘一下云摩訶般若波羅蜜又云衆僧堂前集衆鐘舊説曰僧堂鐘謂之集衆鐘敕修清規國忌云至期鳴僧堂鐘集衆又法器章云僧堂鐘凡集衆則擊之詳僧堂鐘處首楞嚴經云此祇陀園中食辦擊鼓衆集撞鐘釋氏要覽云犍稚今詳律但是鐘磬石板木板木魚砧槌有聲能集衆者皆名犍稚也斂鐘禪苑清規念誦云住持知事以下上間立首座以下下間立維那斂鐘念誦校定清規新住持入院云挂搭之法斂僧堂前鐘大衆先歸鉢位云云又兩序進退云首座領大衆人事送出庫堂門云云又斂鐘首座入寮占西手與住持人事又四節堂中三日點茶云行者斂鐘七下住持歸位備用清規尊宿相訪云若法眷尊長即斂僧堂前鐘隨至方丈人事忠曰謂住持人法眷也宗門統要云台州幽棲道幽禪師一日斂鐘上堂大衆才集乃問什麼人打鐘僧云維那師云近前來僧便近前師遂打一掌却歸方丈忠曰蓋是念誦斂鐘教誡律儀二時食法云待斂鐘聲發即如法夾巾把鉢令匙柄向身又云入堂未斂鐘聲禮拜且收坐具上床坐解者曰食時初後各鳴雲版今斂鐘者謂初雲版也或曰長板是也泉涌開山俊仍作相式云先三下鐘撞鐘三下大小食時俱用此鐘次三鼓擊鼓三下次雲版撾板三通少急打之次長板三三連打但後一緩打也此時衆僧具儀入堂至所坐處放巾置鉢於牀前席各展坐具三拜已即上床坐次雲鼓擊鼓三通少急打之此時長老入堂衆從座起次雲版撾板三通極急打之諸僧同時上床前席各展坐具次直日打靜維那鳴槌唱十佛名衆僧隨唱同禮佛名禮已收具上床而坐次引唄如來妙色身等次誦展鉢偈開鉢行飯次誦此食色香味等偈及作五觀誦食偈等次衆僧正食食已行水用盥漱口次後唄處世界如虗空等次食竟偈次雲版一通急打此時衆僧下坐出堂敕修清規念誦云大板鳴方歸圖位住持入堂供頭鳴堂前鐘七下又維那云每日二時赴堂堂前鐘鳴離位入堂聖僧前左手上香又庫司四節特為首座大衆湯云都寺從聖僧後右出堂外迎住持入堂供頭緩鳴堂前鐘七下送住持入位又法器章云僧堂鐘遇住持每赴衆入堂時鳴七下解者曰堂前七下鐘此名斂鐘齋粥二時住持將自外堂入僧堂稍到明樓邊時正鳴之及入堂少緊打與庫前下鉢鼓同時交鳴其實九下起盡二下疊鳴此觸鐘而不與數故言七下斂收也以其緊撞之也忠曰舊説緊鳴為斂義二十五點圖亦以斂為緩反言撿韻書斂字無緊急訓但律家食前雲版急鳴此云斂鐘前引解者依之以名於清規齋粥住持入堂七下鐘然清規却有云緩鳴堂前鐘七下者此引則緊打義不當也不宜名斂鐘仍知敕修清規但言堂前鐘七下而不言斂鐘固有以也忠按行事鈔集僧通局篇説長打鐘法云如是漸漸斂椎漸穊漸小乃至微未止此資持記斂謂收聲止此由是觀之長打鐘及漸斂收乃緊其打此云斂也而今七下亦緊鳴故例長打之斂聲而亦云斂鐘乎入堂鐘忠曰堂者僧堂也齋時大衆入僧堂時鳴大鐘十八下謂之入堂鐘一説十八鐘住持入堂如下文永平清規赴粥飯法云粥時開靜已後齋時三鼓已前先於食位就坐齋時三鼓之後鳴大鐘者報齋時也城隍先齋鐘山林先三鼓此時若面壁打坐者須轉身正面而坐若在堂外者即須息務洗手令淨具威儀赴堂次鳴板三會大衆一時入堂已下詳説入堂法恐繁不録敕修清規法器章云大鐘齋粥過堂十八下薩婆多毗尼毗婆沙云若僧祇食時應作四種相一打揵椎二吹貝三打鼓四唱令令界內間知此四種相必使有常限不得或時打揵椎或復打鼓或復吹貝令事相亂無有定則不成僧法若不作四相而食僧祇食者不清淨名為盜食忠曰今鳴鐘入僧堂而食出于佛制下堂鐘敕修清規上堂云挂上堂牌報衆粥罷不鳴下堂鐘三下舊説曰粥罷下堂鐘三下是罷參之鐘也尋常鳴之若有祝聖更復鳴之若旦望上堂則不鳴下堂三下蓋有大參上堂故不可鳴罷參鐘也永平清規赴粥飯法云大坐茶湯罷住持人聖僧前問訊出即打下堂鐘三下如監院首座入堂煎點送住持人出却來堂內聖僧前上下間問訊罷盞托出方打下堂鐘三下粥罷鐘舊説曰粥了後打鐘三下此名粥罷鐘或曰此是展單鐘也非為粥罷忠曰此三下但是下堂鐘也放早參鐘校定清規五參上堂云粥後更不鳴下堂放早參鐘舊説曰粥罷三下鐘謂之放早參鐘若旦望五參上堂日不鳴忠曰放早參鐘即罷參鐘也古法每日粥後有早參早參住持説法也今亡之故粥罷鳴鐘三下此報無早參猶如晚間放參鐘也然今有上堂故不鳴早放參鐘也小開靜或曰開猶放也靜靜慮也開靜謂大衆自四更一點入堂坐禪到此放禪故曰開靜矣忠謹按鳴庫前版為小開靜行者齊起固不關堂僧坐禪者到大開靜庫前板諸堂板一齊鳴亦起闔寺大衆也固不局堂僧坐禪者故余謂開靜者開覺靜睡也開言發覺靜是睡眠之婉辭也瑩山清規云五更四點後庫前版鳴三會名小開靜行者齊起也卯時將終五更五點後鼓版擊動長打三會也名大開靜大衆摺被禪苑大開靜但一會忠曰五更三點之後鳴百八鐘次戞鼓磉了次鼓五聲五更版四下四點如此三反次小開靜打雲版三會也次大開靜先戞鼓磉直打鼓五聲五更版五下五點次又戞鼓磉了版鼓一時和鳴自緩漸到急如此三通按禪苑清規大開靜長打一會古來相傳二十五點圖到百八鐘但云然後開靜鼓版俱鳴止此後得一圖詳説如上禪苑清規擊法小靜二會大靜一會詳次下異此開小靜小開靜又稱開小靜禪苑清規警衆云凡聞鐘鼓魚板須知所為五更鳴大鐘者警睡眠也次廚前打小鐘子者開小靜也諸寮供過行者及燈頭等並皆先起次擊廚前雲板者開大靜也衆僧齊起方得摺疊單被及上蚊廚次打長板者衆僧下鉢也衆僧一時入堂次打木魚衆僧集定也後至者更不得入堂三通鼓鳴者住持人赴堂也堂前小鐘子鳴者衆僧下床祇候問訊住持人也又云開小靜之法先擊板三聲漸漸高大令聲調暢從慢至緊從重至輕為一會至二會殺聲徐徐打三下日用軌範云開小靜方摺被拗枕子忠曰軌範所言與敕修大坐參及禪苑永平瑩山諸規説相違焉諸規皆以謂開大靜摺被然今云開小靜摺被余謂恐小字訛當作大也校定清規日用小清規開小靜注云鐘絶後版忠曰摺被者開大靜時也此時大鐘百八方絶矣若開小靜五更四點則鐘未絶也可知小清規所謂開小靜方摺被者可作開大靜也竺仙和尚曰日本人以下鉢長板稱小開靜非也長擊三通者當名小開靜而已忠曰下鉢長板者火鼓後長擊三通者也大板今竺仙所言長擊三通者五更四點廚下小鐘三會者也禪苑為二會校定下鉢長板亦言長擊三通故今當加廚下小鐘四字而揀其濫也解日用軌範者曰開靜後長擊板三通名長板此謂開小靜或為大鑑語或為竺仙語皆是妄説忠曰是即竺仙所非下鉢長板稱開小靜者全不可取之若又依此説似小開靜在大開靜之後太非也小靜小開靜也校定清規進退兩班云次早五更小靜鳴堂司請舊首座都寺喫湯大開靜忠曰大開靜者庫前鼓板長打三會禪苑一會是也此時諸堂前板一齊鳴起闔寺大衆又見小開靜處或和俗聞百八曉鐘為開靜鐘鳴者非也然舊説曰慈照相公命京師五山擊二十五點及三更尋擊四更五更次鳴鐘九十下遺十八下及開靜時鳴之詳二十五點處此十八鐘與開靜鼓版同時鳴故有此濫禪苑清規云次擊厨前雲板者開大靜也詳開小靜又云開大靜之法如開小靜之法但只長打一會也敕修清規大坐參云四鼓鳴住持出鐘鳴首座出乃至鐘絶開靜板鳴衆方摺被又赴齋粥云早晨聞開靜板後齋時候巡火板鳴先歸鉢位又法器章云方丈庫司首座寮及諸寮各有小版開靜時皆長擊之忠曰敕修清規不出大小名所謂開靜者皆大開靜也擊法見小開靜處開大靜大開靜又稱開大靜見禪苑開小靜引永平清規辨道法云未開靜前不得收單摺被方候開大靜所謂廚前雲版及諸堂前板一時俱擊放參鐘敕修清規晚參云若住持至晚不參則堂司行者稟命住持覆首座鳴僧堂鐘三下謂放參鐘也如住持入院或官員檀越入山或受人特請或為亡者開示或四節臘則移於昏鐘鳴而謂之小參然亦不鳴放參鐘謂猶有參也昏鐘初更一點後大鐘百八下此名昏鐘敕修清規大坐參云每日如有緣故不坐參時供頭行者代首座出半單與大衆同至晚衆寮前鳴板三下衆出寮歸堂昏鐘鳴如居城市則候鼓鳴頭首入堂首座待鐘鳴入燒香巡堂次住持入燒香巡堂候定鐘鳴住持出堂次頭首出定鐘敕修清規云候定鐘鳴住持出堂詳昏鐘處又法器章云大鐘人定十八下忠曰人定亥時也瑩山清規云打一更三點三遍後鳴大鐘十八聲是稱定鐘是時主人出堂舊説曰初更五點之後經少時鳴鐘十八下此名定鐘又名十八鐘正當亥時其後少時打二更也凡坐禪到定鐘而止衆便出僧堂今日本禪林衆出僧堂則鳴鼓一板五畢即時鳴十八鐘者略規也若欲更坐禪則報言定鐘坐禪乃再入堂也定鐘後鎖前門衆皆自後門出入忠曰舊説言初更五點後鳴定鐘如二十五點圖亦言初更五點後然瑩山言一更三點後鳴定鐘也蓋大鐘一通半總五十四下可經一點時乃自第一點打鐘五十四下而至第二點更鐘五十四下而至第三點總一百八下畢未到四點直鳴定鐘也又見一圖有初更二點後鳴定鐘者蓋鐘百八下畢次鳴定鐘次打初更第三點也蓋早打定鐘懈怠之相不可尚焉余又按若初更打第三點則可省第一點第二點方合中華省點法余於二十五點處有辨之義堂日工集云定鐘乃今初夜坐禪鐘也謂之坐鐘忠曰坐禪到定鐘而止非定鐘鳴方坐禪或定鐘後坐禪者陪修也此名再請禪見敕修又曰俗言初夜鐘者正是定鐘也舊説曰大鑑竺仙皆怒鳴定鐘之早蓋定鐘鳴則罷坐禪故怒其早也忠曰舊説言定鐘之制大半於大鐘止此此恐謂定鐘鳴堂前鐘故作此説謬矣敕修法器章云大鐘人定十八下止此瑩山云鳴大鐘十八聲是稱定鐘止此可知定鐘直鳴大鐘非別設焉亦非用堂前鐘如堂前鐘制小見僧堂鐘處觸鐘忠曰凡鳴鐘法其起止一聲名觸鐘見斂鐘處法鼓舊説曰法堂設二鼓其東北角者為法鼓西北角者為茶鼓敕修清規法器章云法鼓凡住持上堂小參普説入室並擊之擊鼓之法上堂時三通先輕敲鼓磉三下然後重手徐徐擊之使其緊慢相參輕重相應音聲和暢起復連環隱隱轟轟若春雷之震蟄第一通延聲長擊少歇轉第二通連聲稍促更不歇聲就轉第三通一向纏聲擊之候住持登座畢方歇聲雙椎連打三下小參一通普説五下入室三下皆當緩擊忠曰纏聲者一大二小相交長擊則如繩纏木一顯一隱之狀故言纏也然昧者妄改作緩大失意義續燈録偈頌門甘露舒禪師法鼓頌云一擊隆隆遍九垓雲奔雨驟盡趨來須知不是尋常韻惺得人天醉眼開登座鼓敕修清規法鼓云上堂候住持登座畢方歇聲詳法鼓處忠曰住持登須彌時每蹈一階鼓一聲古德云蹈鼓而登止此是也余謂此可得名節步鼓也慈恩三藏玄奘傳云戒日王行時每將金鼓數百行一步一擊號為節步鼓獨戒日王有此餘王不得同也茶鼓見法鼓處敕修清規法器章云茶鼓長擊一通侍司主之忠曰祖忌獻茶湯時鳴之又茶禮湯禮鳴之故言茶鼓敕修清規迎待尊宿云請客侍者具狀詣客位插香拜請特為湯乃至寢堂釘挂帳幕排照牌設特為光伴位鳴鼓行禮又專使特為新命煎點云俟折水出鳴鼓又山門特為新命茶湯云齋退鳴鼓集衆知事揖住持入堂云云又方丈特為新舊兩序湯云燒香侍者預排照牌至時鳴鼓客集又方丈特為新挂搭茶云至日齋罷鳴鼓集衆侍者揖入又方丈小座湯云寢堂釘挂排位秉燭裝香畢客頭行者覆侍者次覆方丈鳴鼓忠曰所謂鳴鼓皆是用茶鼓也舊説曰頭首秉拂得借茶鼓以代法鼓蓋恐濫住持上堂也齋鼓忠曰齋鼓在庫司前備用清規僧堂特為湯云鳴庫堂前齋鼓一通敕修清規法器章云齋鼓三通如上堂時但節會稍促而已忠曰節會者一通為一會節裁節也言齋時鼓不可如上堂鼓長久繫也雲鼓忠曰蓋齋鼓也此鼓在庫前瑩山清規云午時魚鼓後雲版長打一會大衆下鉢次庫前雲鼓三會第三會堂前小鐘合鳴報主人入堂也問訊鼓忠曰鳴庫司前齋鼓即瑩山謂雲鼓三會者舊説曰住持問訊鼓可入堂詳早晨鳴器品次處禪苑清規警衆云三通鼓鳴者住持人赴堂也堂前小鐘子鳴者衆僧下床祇候問訊住持人也忠曰問訊鼓蓋言此三通歟依舊説問訊鼓鳴下鉢問訊鼓際鳴斂鐘詳早晨鳴器品次處下鉢鼓即問訊鼓也見斂鐘處放參鼓首山念禪師廣教録云問如何是學人自己師云放參三下鼓喫粥五更鐘昏鼓忠曰初更一點已前鳴鼓三通此為昏鼓見二十五點處敕修清規法器章云鼓早晚平擊三通舊説曰擊昏曉鼓法先戞鼓磉三通每通一百二十撾三通合三百六十撾次鳴鼓三通復每通一百二十撾三通合三百六十撾蓋表一歲日數矣昏鼓初大擊大聲後漸小擊小聲以象日沒曉鼓反之初小擊小聲後漸大擊大聲以象日出焉陳繼儒書蕉云撾鼓鼓三百三十三槌為一通鼓止角動十二聲為一疊昏鼓四通為大夜半三通為晨戒旦明三通為發昫篇海云七迹切音戚夜戒守鼓者禮昏鼓四通為大鼓夜半三通為晨旦三通為發明今作又云昫許御切音酗日出溫也亦與煦同曉鼓見昏鼓處更鼓詳二十五點處周祈名義考云更鼓鼓謂之更者率更官名師古曰掌刻漏故曰率更以漏籌更易為義更鼓義又祖此敕修清規法器章云更鼓早晚平擊三通餘隨更次擊庫司主之解者曰更鼓早晚平擊三通者早者大開靜三通與板同鳴此時處處板亦同時鳴也晚者昏鐘鳴之先鼓三通是也江湖風月集九峰升和尚鞔更鼓偈云爛木頭邊釘釘著死牛皮有活機關須彌槌子輕拈出撼動一天星斗寒浴鼓敕修清規法器章云浴鼓四通次第候衆擊其詳見知浴章知浴主之普請鼓敕修清規法器章云普請鼓長擊一通火鼓校定清規云長板者火鼓後長擊三會者詳長板處鼓磉敕修清規云輕敲鼓磉見法鼓處忠曰現見戞鼓兩耳而磉韻書但有柱礎之訓與今全無交涉余竊按磉當作顙或𣞙音近訛寫耳鼓顙者即鼓額也引楞嚴證之楞嚴經云因名身體如腰鼓顙解蒙云熏聞云顙或作𣞙埤蒼云鼓𣐎也補遺顙息朗切額也𣞙桑朗切鼓匡也字書鼓材也字彙云𣐎音瓦博雅鼓𣞙謂之𣐎篇海云𣞙蘇朗切音顙鼓匡木玉篇鼓材瑩山清規云戌時打鐘三會終後庫前打鼓三會先以鼓槌擬鼓脣三下後以左槌小打以右槌大打緩聲三打又以左槌小打以右槌連打如此三打後自緩至緊為一會如前三會終又擬鼓唇三下一打名為一更打版為一點大板敕修清規聖節云節內遇三八日佛殿念誦乃至參前巡廊鳴板集衆向佛排立住持至鳴大板三下雲章曰庫司前板言大板以其製大於餘堂板也板又作鈑鏡堂圓禪師禪興録舉善哉三下鈑知識盡來參話作鈑續字彙云鈑與版同莊子金鈑六韜雲版庫司大版又稱雲版雲章曰版形鑄作雲樣故云雲版瑩山清規云巳香欲了時聖僧侍者問訊首座是稟放禪也即庫前雲版三下鳴是稱火版詳火版處俗事考云宋太祖以鼓多驚寢遂易以鐵磬此更鼓之變也或謂之鉦即今之雲板也三才圖會云雲板即今之更點擊鉦唐六典皆擊鐘也大史門有典鐘二百八十人掌擊編鐘即此是也鐵板叢林盛事云廣教會和尚川人嗣石頭回初依此菴于護國因行者幹鐵版皆有頌送行會曰空奮雙拳與麼去打成一片早回頭歸來挂在三峰頂惱亂春風卒未休兄弟皆愛之方丈版敕修清規聖節云堂司行者報方丈客頭先覆住持次覆侍者鳴方丈板三下鳴鼓又念誦云先鳴方丈板照堂板次巡廊鳴板又法器章云方丈庫司首座寮及諸寮各有小版庫堂板此小板也見方丈板處與前庫堂大板異敕修清規方丈特為新挂搭茶云次日庫司云云庫堂排位首座光伴鳴庫堂板上首知事與維那行禮照堂板敕修清規方丈特為新挂搭茶云次日首座衆頭首具狀請僉乃至照堂排位都寺光伴鳴照堂板云云首座寮板敕修清規坐禪云鳴首座寮前板三聲初聲出門二聲約到半途三聲入堂又坐參云不鳴首座寮前板若大坐參時却鳴三下又大坐參云堂司行者鳴首座寮前板三下大衆轉身向外坐首座下地從後門出復轉從前門入聖僧前燒香衆寮前板敕修清規聖節云堂司行者預鳴衆寮前板三下集衆坐堂衆寮外板衆寮前板稱外板其內板小外板大也敕修清規法器章云衆寮內外各有版外版每日大衆問訊時三下坐禪坐參時各三下候衆歸堂次第鳴之點茶湯時長擊之內板挂搭歸寮時三下茶湯行盞二下收盞一下退座三下小座湯長擊之衆寮中小板敕修清規入寮出寮茶云齋退鳴寮中小板點茶人門外右立揖衆入衆寮內板衆寮中小板稱內板詳衆寮外板處敕修清規大挂搭歸堂云行者引至衆寮鳴內板三下寮主相接入門諸寮小板敕修清規法器章云方丈庫司首座寮及諸寮各有小板開靜時皆長擊之報衆時各鳴三下坐禪板敕修清規月分須知云六月初一日隆暑首座免鳴坐禪板又法器章云衆寮外版坐禪坐參時各三下候衆歸堂次第鳴之見衆寮外板處齋板忠曰庫司大板齋時鳴之此名齋板敕修清規受嗣法人煎點云厨司方鳴齋板就行飯下鉢板忠曰粥時長板名下鉢板齋時三下板為下鉢板禪苑清規云開大靜乃至次打長板者衆僧下鉢也衆僧一時入堂次打木魚衆僧集定也打法見長板處忠曰下鉢板有異説禪苑清規校定清規則以木魚已前長擊三通為下鉢板校定説見長板處入衆日用敕修清規則以木魚之後三下疊疊者為下鉢板如詳辨長板處又按禪苑下鉢板粥時則以長擊三通板為下鉢齋時則以三下板為下鉢但打三下非三下疊疊皆在木魚已前禪苑清規赴粥飯云早晨開靜之後齋時三下已前先於食位就坐候長板鳴及打三下即起身下鉢忠曰禪苑粥飯雙説謬解者多今言早晨開靜之後先於食位就坐候長板鳴即起身下鉢此為粥時也齋時三下板已前先於食位就坐及打三下即起身下鉢此為齋時也又禪苑清規警衆云齋前聞三下板鳴者衆僧下鉢也次鳴大鐘者報齋時也自餘長板魚鼓堂前小鐘維那打槌食畢下堂並同晨粥之法舊説曰板方二下時可下鉢或曰第三下可下鉢舊説曰一説下鉢板七下此或可然何以言之云第三下起身故忠曰下鉢七下何從得此説蓋轉訛斂鐘七下而已固不足論矣又第三下起身者蓋謬解禪苑及打三下起身下鉢之語耳彼所謂三下者齋時板名又非言第三下也長板忠曰下鉢板言長板長擊三會故名長板日本俗訛為板通名而稱鑄長板挂長板等非也其通名雲板也舊説以三下疊疊板為長板其義曰三下非但三擊以三下為一疊疊疊擊之及住持入僧堂其擊之久長故云長板忠曰此因擊得名雲章以齋時三下板為長板令其聲長故云長板詳三下板處忠曰此因聲得名忠曰長板異説須以禪苑清規為正禪苑清規警衆云擊廚前雲板者開大靜也次打長板者衆僧下鉢也衆僧一時入堂次打木魚衆僧集定也後到者更不得入堂又云打長板木魚之法並輕手引聲漸漸高大令音聲調暢然後緊慢相參輕重相應凡至一會略歇少時所貴節會分明令聽者不誤至三會殺聲徐打三下校定清規云長版者火鼓後長擊三會者是也非木魚後三下者今叢林皆以三下板為長板方行禮今只隨時可也忠曰三下者三下疊疊也行禮者下鉢也隨時者本當火鼓後板下鉢然今時諸方例訛不得行獨故但隨時世以三下疊疊為下鉢而已入衆日用云木魚響不得入堂乃至聞長板鳴下鉢敕修清規日用軌範作聞木魚後長板鳴下鉢敕修清規法器章云大版齋粥二時長繫三通木魚後三下疊疊擊之謂之長板舊説曰齋粥二時十八鐘後所擊下鉢之板此名長板竺仙和尚曰此説非也開靜後長擊三通者名長板忠曰十八鐘後鳴木魚次鳴三下疊疊故知舊説依入衆敕修竺仙本禪苑及校定蓋大開靜後火鼓三下次長擊板三通衆僧下鉢次鳴木魚忠曰如禪苑以火鼓已後十八鐘已前之長擊三通者名長板下鉢然壽無量時叢林早訛故入衆日用以木魚後三下疊疊為長板校定雖識其非而循習難為輒革故只隨時焉敕修亦以三下疊疊為長板蓋同校定意敕修清規山門特為新命茶湯云近時有齋時聞長板鳴知事入堂炷香展拜巡堂一匝請茶又新首座特為後堂大衆茶云長板鳴僧堂內巡請茶長擊板忠曰下鉢長板外又有長擊者雖可通名長板餘長擊不受長板名敕修清規法器章云方丈庫司首座寮及諸寮各有小版開靜時皆長擊之又云衆寮內外各有板外板點茶湯時長擊之內板小座湯長擊之三下板禪苑清規云齋時三下已前先於食位就坐及打三下即起身下鉢又云齋前聞三下板鳴者衆僧下鉢也雲章稱此三下板為長板其説曰每下令其擊聲長緩蓋欲有少時刻使衆遲速齊一故云長板忠曰早粥本長擊三通下鉢禪苑後訛木魚後三下疊疊下鉢余竊推其轉謬源如齋時則單三下板下鉢是即三下板下鉢也終以三下名訛為三下疊疊之三下至此下鉢歟傳燈録般若啓柔禪師章云師上堂聞三下板聲大衆始集師因示一偈曰妙哉三下板諸德盡來參既善分時節今吾不再三聯燈作知時節忠曰上堂者食時上僧堂也凡板打三下者皆當稱三下板然特名齋時者為三下板矣火板齋前三下板也舊説曰火板挂在庫司竈上及飯熟飯頭打之三下則火頭滅火故名火版矣但今食前三鐘蓋擬火板也敕修清規受嗣法人煎點云火板鳴大衆赴堂日用軌範云仍嚼楊枝歸堂坐禪火板未鳴不得先歸寮忠曰及火板鳴坐禪罷今言火板未鳴者坐禪未了也若火板鳴後則與長板有少時此時須歸寮矣瑩山清規云己香欲了時聖僧侍者問訊首座是稟放禪也即庫前雲版三下鳴是稱火板是坐禪罷也巡火板舊説曰掉火鈴擊板巡諸寮舍而向僧堂意報衆警火災也敕修清規赴齋粥云齋時候巡火板鳴先歸鉢位忠曰蓋寮衆赴僧堂齋粥諸寮人少故警之令埋火慎災也與火板別也須與火鈴交看敕修清規法器章云版警戒火燭三下報廊板敕修清規聖節云節內遇三八日佛殿念誦乃至參前巡廊鳴板集衆向佛排立雲章曰巡廊鳴板者先鳴方丈板次鳴照堂板次鳴衆寮首座寮等板謂之報廊板也敕修清規念誦云先鳴方丈板照堂板次巡廊鳴板止此解者曰照堂在僧堂之後亦可在衆寮之後而今可言衆寮之照堂也忠曰但是僧堂之照堂也不用復曲説今見雲章所説照堂板次有衆寮板可知雲章亦是為僧堂之照堂也又曰巡廊鳴諸寮所挂板也非持版巡諸寮鳴之日用軌範入浴法云古云三通鼓響入堂時觸淨須分上下衣解者曰浴時雖聽鼓聲可有惑第幾浴者故巡廊鳴板以報浴之第一次鳴板每一下第二次二下第三次三下第四次四下名報廊板忠曰浴第一次板一下等又是一法如敕修知浴中言但是巡廊鳴板三下止此又云鳴板三下遍鳴鼓止此然舊解言聽鼓後方鳴板恐謬説巡廊板即是報廊板也敕修清規知浴云次第巡廊鳴板三下遍鳴鼓解者曰諸餘清規但鳴庫司板今怕有不聞者故巡諸寮而鳴板此名巡廊板亦云報廊板每寮鳴三下也忠曰遍者遍于諸寮也浴室內小板敕修清規知浴云室內挂小板旁釘小牌書云鳴板一聲添湯二聲添水三聲則止以此為節備用清規知浴云室內小牌白字一湯二水三滿打小板洗腳板日用軌範云洗腳板鳴不得爭奪腳桶其規詳彼圓板覺浪大師尊正規鐘板云舊來鐘板有橫板直板而方其式者豫茲獨以圓板如滿月輪相蓋以取諸從上圓相之儀此圓相不特溈仰家用究其源來自忠國師徒六祖已上遽相傳授即五家亦何嘗不用亦非曹洞寶鏡與五位有圓相也世傳臨濟打板則有一二三板之殊打鐘則直是一槌以表單行曹洞則一板一鐘二板二鐘三板三鐘以表兼帶此亦世諦流布無可不可也雖然如是祇如今以圓板挂諸堂中畢竟是箇甚麼意旨聻梆沙彌律儀入浴云湯冷熱依例擊梆不得大喚忠曰即是浴室內小板也三才圖會有梆圖龍頭魚形余辨見木魚處正字通云梆博康切音邦斫木三尺許背上穿直孔今官衙設之為號召之節或以竹截作筒兩頭留竹節旁鑿小孔擊之有聲亦曰梆似古之用柝六書故因字從邦謂聲邦邦肰三才圖會云梆即柝易繫辭曰重門擊柝以待暴客蓋取諸豫説文柝夜行令擊木為聲以待更籌者是俗曰蝦蟇更柝即柝乃古今字耳椎正字通云椎直回切音錘擊物具俗作槌鎚集韻作桘北涼涅槃經云世法有五種名世句世縛世法世執著世乃至云何法世如鳴椎集僧嚴鼓誡兵吹貝知時是名法世敕修清規維那云鐘鼓絶鳴椎一下衆展鉢云云又法器章云椎齋粥二時僧堂內開鉢念佛唱食遍食施財白衆皆鳴之維那主之下堂時聖僧侍者鳴之禪苑清規警衆云維那最初打槌一下者衆僧開鉢也隨槌聲白念心經三卷次打槌一下者白設粥意也或表歎讀疏次打槌十下者念十佛名也次打槌一下者首座施粥也又打槌一下者粥遍也粥罷打槌一下者衆僧下堂也齋時維那打槌同晨粥之法又赴粥飯云清淨法身等下槌太疾即打著佛腳下槌太慢則打著佛頭聯燈會要鄧隱峯禪師章云師在襄州破威儀堂只著襯衣於砧槌邊立拈起槌云道得即不打衆默然師便打一下正宗贊大通本禪師贊曰沒巴鼻處拋出八稜槌解者曰造槌為八角像須彌八方也忠曰有須彌為椎之語故作此説槌砧舊説曰承槌打之木言槌砧拈打小木言槌矣槌為本器為槌而有砧然交割簿言椎砧附槌子可笑敕修清規維那云左手按砧云云右手鳴椎高不過五寸聲絶方下椎急緩合度舊説曰天竺那蘭陀寺衆多堂廣故七處設槌方得其聲及衆龍龕手鑑云砧砧通正陟林切搗衣石也又跗也又鐵砧等忠曰打椎言打靜行事鈔説戒正儀篇云維那至上座前打靜處立左手捉籌右手捉打靜椎其柄亦須香水淨已乃至維那打靜一下云云云又諸雜要行篇云打靜法維那先戶外具儀斂掌傍門面入已至打處立合掌右手取椎舉起擬砧訖然後打一聲不得有重響方乃臥椎手從柄處捋之然後合掌有所啓白若有施與咒願唱告等得等維那口陳其緣不得打椎以為事用除為衆亂等資持記云傍門面者隨左右頰而舉足也擬砧使椎砧相當也等得亦云等供即大小食時唱食平等不下制非法準知打椎止為白告靜衆不同鐘磬打為事用也舊説曰槌砧又名槌靜忠曰事鈔云打靜聞律家言曰靜有南北異義北京曰靜是能打謂打椎靜衆之義南都曰靜是所打謂靜即砧也止此按舊説是南都義也槌墩槌砧又曰槌墩備用清規維那云至清淨法身處左手作蓋勢側按槌墩右手打槌高不過五寸詳如彼正字通云墩音敦平地有堆者爾雅注江東呼地高為墩墩同墩遍粥椎校定清規兩序進退云堂中遍粥槌後知事從後門入都寺打槌一下云云遍食槌忠曰通食名通齋粥舊説曰遍食椎者衆將揖上下肩而喫三口食已前所擊一下是也禪苑清規警衆云十佛名次打槌一下者首座施粥也又打槌一下者粥遍也敕修清規聖節云早粥遍食椎後再鳴椎一下云白大衆云云白啓建事又維那云若施主齋僧行嚫遍食椎後從聖僧後轉左邊朝首座問訊復鳴椎一下而出為請施財也又新戒參堂云至期早粥遍食椎後新戒參頭領衆入堂聖僧前列問訊下堂椎禪苑清規警衆云粥罷打槌一下者衆僧下堂也住持人出堂衆僧方可上鉢齋時下堂同晨粥之法敕修清規法器章云椎下堂時聖僧侍者鳴之詳槌處解者曰維那鳴遍食椎後出堂故齋粥罷衆下堂之椎聖僧侍者擊之戒尺敕修清規沙彌得度云設戒師座几與住持分手几上安香燭手爐戒尺教苑清規剃髮儀云凡上安香燭花瓶戒尺忠曰兩小木一仰一俯仰者在下稍大把上者擬下者擊而鳴之受戒專用之故得戒尺之稱余得古德受戒之具其戒尺在下者長七寸六分厚六分闊一寸一分餘下面四邊有縷面在上者長七寸四分厚五分餘闊一寸上面四邊有縷面上木正中豎安木鈕鈕長二寸五分高七分把鈕擊之尺戒尺或單稱尺幻住清規開甘露門法云入座鳴尺一下忠曰傅大士以尺揮桉者界尺也見器物門界尺處磬敕修清規沙彌得度云作梵闍梨鳴大磬作梵又法器章云磬大殿早暮住持知事行香時大衆看誦經咒時直殿者鳴之唱衣時維那鳴之行者披剃時作梵闍梨鳴之祇園圖經云佛衣服院阿難所止常護佛衣有一銅磬可受五升磬子四邊悉黃金縷作過去佛弟子又鼻上以紫磨金為九龍形背上立天人像執玉槌用擊磬聞三千世界音中亦説諸佛教誡弟子法磬是梵王造之及佛滅度娑竭羅龍王收入海宮石湖梅譜云蠟梅凡三種云云經接花疏雖盛開花常半含名磬口梅言似僧磬之口也忠曰僧磬與樂器磬其形全別樂器磬板樣曲折考工記所謂倨勾一矩有半者僧磬如鉢形祇園圖經云可受五升可知天竺磬亦如鉢器矣又梅譜以梅花半含比僧磬支那僧磬之制可知焉文獻通考云銅磬梁朝樂器也後世因之方響之制出焉今釋氏所用銅鉢亦謂之磬蓋妄名之耳齊梁間文士擊銅鉢賦詩亦梵磬之類胡人之音也宋祁筆記云樂石有磬今浮屠持銅鉢亦名磬世人不識樂石而儒者往往不曉磬折義故不獨不識磬又不能知鉢手磬敕修清規達磨忌云行者鳴手磬維那出班又法器章云小手磬堂司行者常隨身遇衆諷誦鳴之為起止之節解者曰手磬日本禪林所謂鈴也忠曰小磬手捧桴鳴者日本禪林此名鈴矣然鈴本木舌內懸倒掉鳴之與所謂手磬全別未知手磬何因得鈴名耶引磬忠曰大清禪剎小磬如桃大底有竅貫緒連縛小竹枝為柄以小鐵桴擊之名為引磬蓋因導引衆故名忠義水滸傳云宋江參五臺山智真長老鳴鐘擊鼓合寺衆僧都披袈裟坐具到於法堂中坐下宋江魯智深并衆頭領立於兩邊引磬響處兩碗紅紗燈籠引長老上升法座忠曰羅貫作此傳是時有引磬目敕修清規沙彌得度云引請收坐具起鳴手磬引剃頭人入堂又亡僧云齋粥殿堂諷經罷及放參罷堂司行者即鳴手磬前引首座領衆至龕前住持燒香畢維那舉大悲咒忠曰敕修清規云小手磬行者常隨身見手磬處其制似極小已言鳴手磬前引則即是可引磬矣鐃鈸敕修清規法器章云鐃鈸凡維那揖住持兩序出班上香時藏殿祝贊轉輪時行者鳴之遇迎引送亡時行者披剃大衆行道接新住持入院時皆鳴之忠曰清規鐃鈸非為二物然按杜氏通典文獻通考三才圖會等金鐃與銅鈸全二物諸韻書亦爾到正字通初得鐃鈸為一物之解正字通云鈸蒲括切音拔銅鈸今鐃鈸也江湖紀聞后集云宋咸淳乙丑年汀州范宅鑿畦為沼得鐃鈸一面鈴杵無舌方悟荒畦元廢寺也杜氏通典云銅鈸亦謂之銅盤出西戎及南蠻其圓數寸隱起如浮漚貫之以韋相擊以和樂也南蠻國大者圓數尺或謂齊穆王素所造文獻通考云銅鈸亦謂之銅盤本南齊穆士素所造其圓數寸中間隆起如浮漚出西戎南蠻扶南高昌疏勒之國大者圓數尺以韋貫之相擊以和樂唐之燕樂清曲有銅鈸相和之樂今浮屠氏清曲用之蓋出於夷音然有正與和其大小清濁之辨歟湖海新聞云宋徽宗宣和元年降手詔曰按先天紀鈸乃黃帝戰蚩尢之兵器胡人之凶具中國自不合用云云開封尹盛章奏本府所納銅鐃鈸一萬六千六百三十六隻計二萬六百二十斤一兩忠曰三才圖會有金鐃其制大異銅鈸今附録解惑圖會云金鐃如火斗有柄以銅為匡疏其上如鈴中有丸執其柄而搖之其聲譊譊然以止鼓又曰文獻通考有銅鐃與金鐃制全別其形如銅鈸小日本名登比與宇志者巫覡輩嗚之大清來朝寺用之日本古禪剎無此器今亦附録通考云銅鐃浮屠氏所用浮漚器小而聲清世俗謂之鐃其名雖與四金之鐃同其實固異矣四言對相有鐃圖大似鈸通考所謂銅鐃也銅鑼忠曰日本教家用之搓布帛以為桴正字通云鑼郎何切音羅築銅為之形如盂大者聲揚小者聲殺樂書有銅鑼自後魏宣武以後好胡音銅鈸沙羅沙羅即䤬鑼六書故曰今之金聲用于軍旅者亦以為盥盆按鑼非獨軍行用之盥用鑼尤迂泥火鈴忠曰齋時振火鈴見巡火板處又二更一點四更一點並振火鈴見二十五點處警戒火燭故得火鈴名瑩山清規云火版鳴從庫下諸寮前繞寺振火鈴又云二更二點後振火鈴呼照顧火燭繞寺自三門至方丈還庫下打二更三點忠曰瑩山云二點與二十五點圖少異矣又照顧火燭者告衆警火之詞破菴先禪師秀峯録上堂云開口即錯擬心即差倒攜席帽翻著襴衫看看暮天欲雪普請各宜照顧且道照顧箇什麼自云照顧火燭巡更鈴火鈴又稱巡更鈴普燈録道宣知藏章云久侍天衣法聰無所契衣叱之宣忘寢食者月餘一夕聞巡更鈴聲忽猛省曰住住一聲直透青霄路寒潭月皎有誰知泥牛觸折珊瑚樹衣聞命職堂司後住投子凡有所問以拂子作搖鈴勢忠按巡更鈴本官家有傳夜鈴之法而叢林擬之乎史記李廣傳刀斗注云荀悅云刀斗小鈴如宮中傳夜鈴也止此又文獻通考云漢書舊儀中宮衛宮城門擊刀斗纂文曰刀斗特時鈴也止此又揚子方言云無升謂之刁斗注謂小鈴也音貂見漢書木魚日用軌範云木魚響不得入堂或令行者取鉢堂外坐敕修清規法器章云木魚齋粥二時長擊二通普請僧衆長擊一通普請行二通宋孟元老東京夢華録云每日交五更諸寺院行者打鐵牌子或木魚循門報曉亦各分地方日問求化諸趨朝入市之人聞此而起忠曰鐵牌子蓋謂鐵板也已下録象魚義敕修清規法器章木魚云相傳云魚晝夜常醒刻木象形擊之所以警昏惰也釋氏要覽云今寺院木魚者蓋古人不可以木朴擊之故刻魚象也又必取張華相魚之名或取鯨魚一擊蒱勞為之大鳴也劉斧托遺云僧舍木魚者魚晝夜不合目修行者忘寐修道魚可化龍凡可入聖教苑清規云木魚婆沙云有僧違師毀法墮魚身背上一樹風濤搖擺出血苦痛本師渡海魚遂作孽云汝不教我致墮魚報今欲報怨師曰汝名甚麼魚曰某甲師令懺悔復為設水陸追拔夜夢魚曰已脫魚身可將我樹捨寺以親三寶師果見魚樹刻魚形懸挂警衆又或引玄奘指歸曲云玄奘自天竺歸經蜀道有一長者喪妻有兒甫三歲後母惡之伺長者出獵樓上擲兒投水中長者悲哀為設齋僧適遇奘至喜迎請第一座奘不食語曰我歷長途疲矣欲得魚肉喫之一座大驚長者欲出買之奘囑云非大魚不可也長者如教求獲而回方上爼割之所沒之兒啼在魚腹中長者大歡奘曰此兒夙世持不殺故今雖被魚吞不死長者曰如何報魚恩奘曰木雕魚形懸之佛寺齋時擊之可以報魚德今之木魚是也元本和語忠今改綴忠曰余曾撿阿毗達磨大毗婆沙論二百卷阿毗曇毗婆沙論八十卷並無木魚緣五百問經有師不教誡弟子死墮龍中害昔師蓋妄漢依託搆説玄奘魚腹得兒事慈恩傳不載亦恐以薄拘羅事揑合今故録標其妄矣三才圖會云木魚刻木為魚形空其中敲之有聲釋氏謂閻浮提乃巨鰲所戴身常作癢則鼓其鬐川山為之震動故象其形擊之此荒唐之説然今釋氏之贊梵唄皆用之忠曰巨鼇戴山出乎列子湯問釋氏本無此説釋氏説世界有水輪金輪風輪而已且道何經律論説鼇戴閻浮提哉然則荒唐之咎歸于汝矣大抵腐儒誣罔如此者不一又按圖會木魚圖魚頭尾自相接其形團圞今清國僧稱木魚者作龍二首一身鱗背兩口相接銜一枚珠之形