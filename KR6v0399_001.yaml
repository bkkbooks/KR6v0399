板忠曰敕修已前日用清規時已謬校定亦只隨時敕修亦從流傳乎竺仙曰十八鐘後三下板名長板非也忠曰竺仙説合禪苑校定問訊鼓三通禪苑此鼓在庫前又名下鉢鼓禪苑云三通鼓鳴者住持人赴堂也堂前鐘七下與問訊鼓同時鳴禪苑敕修舊説此名斂鐘禪苑云堂前小鐘子鳴者衆僧下床祗候問訊住持人也敕修云僧堂鐘住持入堂時鳴七下瑩山云庫前雲鼓三會及第三會堂前小鐘同鳴報主人入堂也舊説曰竺仙曰住持十八鐘可入堂或曰住持問訊鼓可入堂何故曰十八鐘時未下鉢忠曰此依敕修至問訊鼓方下鉢為鉢妨下床且屏之禪苑云放鉢須當上肩及住持入堂即下床迎住持住持上床畢衆却就座安鉢正面按二説住持問訊鼓入堂者近理蓋堂前斂鐘與問訊鼓同時鳴之而清規每云堂前鐘七下住持入堂故忠曰敕修清規赴齋粥云近時諸方住持大鐘鳴時先入堂坐止此乃知竺仙謂十八鐘入堂者諸方異規何校是非又或謂十八鐘未下鉢只依敕修三下疊疊下鉢也然竺仙固主張開靜後長擊三通板下鉢故十八鐘已前既下鉢而已齋前鳴器巡火板敕修赴齋粥云齋時候巡火板鳴先歸鉢位三下板禪苑衆僧下鉢是名火板忠曰單三下也日本此謂三鐘按禪苑如晨粥時以長擊三通下鉢齋時以三下板下鉢長板長擊三通敕修法器章云大版齋粥二時長擊三通大鐘十八下禪苑報齋時木魚二通敕修木魚云齋粥二時長擊二通三下疊疊板敕修云大版齋粥云云木魚後三下疊疊問訊鼓三通又名下鉢鼓禪苑云三通鼓鳴者住持人赴堂也堂前小鐘子鳴者衆僧下床祇候問訊住持人也堂前小鐘禪苑云齋前聞三下板鳴者衆僧下鉢也次鳴大鐘者報齋時也自餘長板魚鼓堂前小鐘維那打鎚食畢下堂並同晨粥之法第草八類器物門常住物碧巖録云洞山和尚一生住院土地神覓他蹤迹不見一日厨前拋撒米麵洞山起心曰常住物色何得作踐如此土地神遂得一見便禮拜忠曰常住物謂四方僧物也釋氏要覽云律有四方僧物鈔言十方常住有師釋云四則攝彼方隅十則該乎凡聖謂此一住處所有之物雖局一界而體屬十方一切僧伽又云鈔云僧物有四種一者常住常住謂衆僧舍宇什物樹木田園僕畜米麥等物以禮局當處不通餘界但得受用不通分賣故重言常住也二者十方常住謂如一寺中供僧成熟飲食等以體通十方唯局本處善見律云不打鐘食犯盜罪今諸寺同食食既成熟乃打鐘鼓者此蓋召十方僧故以此物十方有分故三現前常住此有二種一物現前二人現前但此物唯施此處現前僧故四者十方現前常住謂亡僧輕物施體通十方唯局本處現前僧得分故大毗婆沙論問云盜亡僧物於誰處得根本業道答若已作羯磨者於羯磨衆處得若未作羯磨者普於一切善説法衆得今詳分亡僧物十方來僧在羯磨數即得羯磨後來不得忠曰所援行事鈔在隨戒釋相篇要覽依彼文取意潤刪太便於辨相故今却引用又與區宇類常住交看大寶積經寶梁聚會云佛言若所用物所謂常住僧物及與佛物若招提僧物彼營事比丘應當分別常住僧物不應與招提僧招提僧物不應與常住僧常住僧物不應與招提僧物共雜招提僧物不應與常住僧物共雜常住僧物招提僧物不與佛物共雜佛物不與常住僧物招提僧物共雜十誦律云佛迦尸國遊行迦羅山諸比丘聞之以僧房作四分避藏諸客比丘諸處立待臥具分佛告阿難約敕舊比丘言此處僧房作四分與四比丘非是僧物佛不聽分僧房略鈔什物敕修清規當代住持受請云知客引專使巡寮畢次第呈納本寺須知儀從什物又交割砧基什物云入院後須會兩序勤舊茶詳細詢問山門事務砧基契書什物逐一點對交割華嚴經入法界品天主光女章云我憶念過去供養恆河沙數諸佛造僧伽藍營辨什物瑜伽師地論明十種身資具第八云什物之具玄應一切經音義云什物時立切三蒼什十也什聚也雜也亦會數之名也又謂資生之物也今人言家産器物猶云什物物即器也江南名什物北土名五行史記舜作什器於壽丘漢書貧人賜田宅什器並是也慧琳一切經音義云什物音十舊音義云什衆也雜也會數之名也資生之物謂之什物也字鏡云物即萬物也牛為大物天地之起牽牛故物字從從牛勿聲也史記五帝本紀云舜作什器於壽丘索隱云什器什數也蓋人家常用之器非一故以十為數猶今云什物也經國大典注解云什物什數也所用之物非一故曰什舉成數也猶言若干也後漢書宣秉傳云秉性節約常服布被蔬食瓦器帝見而歎賜布帛帳帷什物章懷注軍法五人為伍二五為什則共其器物故通謂生生之具為什物忠曰此本前漢平帝紀師古解什器字者也傳燈録甘贄行者章云有住菴僧緣化什物甘曰若道得即施乃書心字問是什麼字僧云心字又自問其妻什麼字妻云心字甘云某甲山妻亦合住菴其僧無語甘亦無施文中子云邳公好古物鐘鼎什物圭璽錢具不具調度傳燈録蘇溪和尚牧護歌云一條百納瓶盂便是生涯調度永平清規典座教訓云盤桶并什物調度精誠淨潔洗灌行事鈔鉢器制聽篇注云房舍衆具五行調度資持記云謂調養具度即衆物之通名史記五帝本紀云舜作什器於壽丘正義云顏師古云軍法伍人為伍二伍為什則共器物故為生生之具為什器亦猶從軍及作役者十人為火共畜調度也道具忠曰凡三衣什物一切資助進道之身物具名為道具則此目齊于僧家然和俗通稱度世器物為道具失義遠矣叢林諺語亦名羅紗直裰為道具衣道具名豈獨在茲哉傳燈録禪門規式云施椸架挂搭道具詳椸架處敕修清規辦道具云將入叢林先辦道具清規所列三衣坐具偏衫裙直裰鉢錫杖拄杖拂子數珠淨瓶濾水囊戒刀華嚴經入法界品寶髻長者章云如諸菩薩得不思議功德寶藏乃至修無分別功德道具又觀自在章云善財作如是念善知識者至一切智助道之具釋氏要覽云道具中阿含經云所蓄物可資身進道者即是增長善法之具菩薩戒經云資生順道之具摩訶僧祇律云隨物者三衣尼師壇覆瘡衣雨浴衣鉢大犍鎡小犍鎡鉢囊浴囊漉水囊二種腰帶刀子銅匙鉢支針筒軍持澡罐盛油皮瓶錫杖革屣傘蓋扇及餘種種所應畜物是名隨物十八物者一楊枝二澡豆三大衣四七條衣五五條衣六瓶七鉢八坐具九錫杖十香爐十一漉水囊十二手巾十三刀子十四火燧十五鑷子十六繩床十七經律十八佛菩薩像詳楊枝處百一物者釋氏要覽云百一物大槩之辭也薩婆多論云百物各可蓄一也行事鈔二衣總別篇云薩婆多云百一物各得蓄一百一之外皆是長物俱舍論遁麟記解百一雜寶云有餘云百者凡義謂凡是諸物皆一故言百一傳燈録雲居道簡禪師章云師久入雲居道膺之室密受真印以臘高居堂中為第一座屬膺和尚將臨順寂主事僧問誰當繼嗣曰堂中簡主事僧雖承言而未曉其旨謂之揀選乃與衆僧僉議舉第二座為化主然且備禮先請第一座必若謙讓即堅請第二座焉時簡師既密承師記略不辭免即自持道具入方丈攝衆演法主事僧等不愜素志罔循規式師察其情乃棄院潛下山其夜山神號泣詰旦主事大衆奔至麥莊悔過哀請歸院衆聞山神連聲唱云和尚來也公用忠曰公界器具不得私用者曰公用也非器別名敕修清規亡僧估衣云不許以公用為名分去物件東都事略祖無擇傳云無擇與王安石同為知制誥時詞臣許受潤筆物安石因辭一人之饋不獲義不受以其物置舍人院梁上安石既以母憂去無擇取為本院公用安石聞而惡之以無擇為不廉剎竿忠曰剎表居處義近剎土此方剎竿者長竿上有寶珠焰形皆用金銅造植之于寺前蓋與塔上表剎異矣如四天王殿前樹剎柱見大寶積經玄應經音義云梵言差多羅此譯云土田經中或言國或云土者同其義也或作剎度者存二音也即剎帝利名守田主者亦是也案剎書無此字即㓼字略也㓼音初一切浮圖名剎者訛也應言剌瑟胝剌音力割切此譯云竿人以柱代之名為剎柱以安佛骨義同土田故名剎也以彼西國塔竿頭安舍利故也止觀輔行云言佛剎者具存應云剎摩此云田也即一佛所王土也或云表剎者以柱表剎表所居處故也聯燈會要阿難尊者章云祖問迦葉云師兄世尊傳金襴袈裟外別傳箇甚麼迦葉召阿難祖應諾迦葉云倒却門前剎竿著傳燈録資福邃禪師章云師謂衆曰隔江見資福剎竿便回去腳跟也好與三十棒豈况過江來水磨佛祖通載云牧菴忠禪師聞佛眼遠禪師居淮西龍門於是出蜀兼程至彼造次不忘提撕其未至處適縱步水磨歘睹牌額書法輪常轉師於是礙膺之疑泮然氷釋遂説偈曰轉大法輪目前包裹更問如何水推石磨而作圓相呈佛眼眼曰其中事作麼生師曰澗下水長流眼曰必竟如何師曰水推石磨眼曰歸堂歇去切不得舉著後五日來却向女道一句子曰這一句子也不消得佛眼為之解頤師遂作禮羅湖野録云馮給事濟川嘗有請忠住勝業疏略曰佛眼磨頭悟法輪之常轉死心室內容慧劍以相揮世以為實録云慧劍事詳彼湛堂準和尚水磨記見大慧武庫江湖風月集石橋思首座水碓磨頌云得如飛雪下千巖下處如流上未甘劈箭一機能兩斷磨推西北碓東南葛籠日本禪林入寺視篆納寺印器也經匱舊説曰衆僧貯衣服道具之器其在僧堂曰函匱其在衆寮曰經匱忠曰衆寮是看經之所故曰經匱備用清規寮主云公界坐禪看經看守經匱夜間同寮元巡視經桉敕修清規亡僧抄劄衣鉢云直病者同執事人收拾經匱函匱衣物抄劄具單又衆寮結解特為衆湯云寮元依戒排經匱圖等詳圖牌門經匱圖處函匱見經匱處舊説曰函匱僧堂之衆貯衣服等之器也禪苑清規裝包中挂搭云如堂中有函匱即收行李安函匱中鎖之笠子拄杖歸寮如堂中無函匱收行李赴寮日用軌範云粥前齋前放參後不得開函匱如有急切白主事人寮中白寮主僧堂白聖僧侍者人天寶鑑云德山密禪師會下有一禪者用工甚鋭看狗子無佛性話久無所入一日忽見狗頭如日輪之大張口欲食之禪者畏避席而走鄰人問其故禪者具陳遂白德山山曰不必怖矣但痛加精彩待渠開口撞人裏許便了禪者依教坐至中夜狗復見前禪者以頭極力一撞則在函匱中於是霩然契悟後出世文殊道法大振即真禪師也鑰匙敕修清規兩序進退云舊知事一班詣方丈插香告稟觸禮一拜納庫記鑰匙而退寺印如天童有玲瓏巖主印詳叢軌門視篆處日本禪剎皆有某山印住持人不得為私用玲瓏巖主印見備用雲外跋三寶印鐫佛法僧寶四篆字故名三寶印忠曰道場疏使三寶印其法初南瞻部州行使三一正一斜一正第二行使一正第三行使一正自下每至紙接處使一正接處必有疏文一行至尾三寶證明行使一正次諸天洞鑑行使一正次年月日行使三一正一斜一正可漏亦使三同疏中法皆窮行上位使使三法正斜間闕一字斜正間闕二字可漏皆但闕一字已下係莊嚴具廚子忠曰安像匱也校定清規云暫到隨大衆後巡半堂至後門對聖僧廚立侍者接暫到後巡堂至聖僧廚後龕敕修清規結制禮儀云侍者暫到巡半堂侍者於聖僧龕後立暫到向侍者立定忠曰安像之匱即廚子也正字通云龕克憨切音堪增韻浮圖塔廣韻塔下室唐褚遂良書久棄塵世與彌勒同龕東坡詩集自金山放船至焦山詩云老僧下山驚客至迎笑喜作巴人談自言久客忘鄉井只有彌勒為同龕花亭敕修清規佛降誕云至日庫司嚴設花亭中置佛降生像於香湯盆內安二小杓佛前忠曰造小亭以紅白衆花交覆學甍瓦之樣寶蓋埀幡亦皆纍葩萼巧成之名為花亭義堂日工集云本寺時住南禪每至佛生之辰紀綱預命沙喝裝花亭一時沙喝行力俱走山野採衆色草花而斆朱甍碧瓦之樣擬華鬘幡蓋之莊嚴各爭優劣遂及鬪諍雖似敬重供養實末世荒本勤末之所致也於是余捨私資命工新造花亭五色彩畫金碧光耀繒蓋幢幡寶珠瓔珞不假生華凡所可有者悉備焉乃歸之常住以充每歲浴佛之設矣自是諸剎皆倣此毗藍園忠曰花亭亦名毗藍園備用清規如來降誕云庫司預令行者嚴設毗藍園內安太子銅像律苑事規如來降誕所云全同備用毗藍園額忠曰花亭當陽揭額題毗藍園三字大鑑小清規浴佛云幡四首四柱每柱一幡額一毗藍園義成殿額花亭或揭義成殿額東福寺清規佛誕生云花堂額義成殿也翻譯名義集云西域記云薩婆曷剌他悉陀唐言一切義成舊云悉陀訛也此乃世尊小字耳幡觀心論灌頂法師疏云圓壇者即實相不動地也繒幡即翻法界上迷生動出之解幡壇不相離即動出不動出不相離也摩訶止觀輔行記云五色幡者總舉五色繡畫間色亦應無在字應作幡幡者旌旗之總名也經中多作此幡幡帤字耳今佛法供具相狀似彼故云幡耳凡造幡法切不得安佛菩薩像幡是供具供於所供如何復以形像為之忠按幢幡不妨書法文華嚴經十回向品菩薩施上妙幢幡回向云願一切衆生常以寶繒書寫正法護持諸佛菩薩法藏疏就幢幡書字故已下録薦亡幡釋門正統云黃白幡者釋氏類苑云或薦亡黃幡者灌頂經云若四輩男女若命終時若已命過於其亡日造作黃幡懸著剎上使獲福德離八難苦得生十方諸佛淨土幡蓋供養隨心所願至成菩提幡隨風轉破碎都盡至成微塵其福無量幡一轉時轉輪王位乃至吹塵小王之位其報無量諸經要集問曰何故經中為亡人造作黃幡挂於冢塔上者答曰雖未見經釋可以義求此五大色中黃色居中用表忠誠盡心修福為引中陰不入惡趣莫生邊國釋氏要覽云齋七幡子北俗亡纍七齋日皆令主齋僧剪紙幡子一首隨紙化之按正法念處經有一十七種中有謂死時若生天者即見中有如白㲲埀下其人識神見已舉手攬之便受天人中有身故今七七日是中有死生之日以白紙幡子勝幢之相示之故北人招魂帛皆用白練甚合經旨也蓋摩訶止觀云五色蓋者觀五陰免子縛起大慈悲覆法界也義楚六帖云本行經云摩納童子以花供養定光佛其花乃於上化成華蓋佛行即行佛住即住斗帳忠曰帳形如覆斗故名其以組成飾即是同心結也隋書宣華夫人陳氏傳云太子齎金合子署封賜夫人發見有同心結數枚漢劉凞逸雅云帳張也張施於床上也小帳曰斗形如覆斗也三才圖會衣服部結帛式云用白絹一匹結如世俗所謂同心結者朱子所謂結絹蓋如此云佛本行集經路逢死尸品云作瓶天子化作一尸臥在床上衆人輿行復以種種妙色芻衣張施其上作於斗帳起世經云婦女丈夫命終作種種斗帳幰蓋而普周匝卓圍見卓子處忠曰鬬綵金襴等周圍卓四面到地者言卓圍也與卓袱不同大鑑已言袱子并卓圍二物可知也水滸傳云香車龍亭擡放忠義堂上中間設著三箇几案都用黃羅龍鳳卓圍圍著正中設萬歲龍牌將御書丹詔放在卓袱忠曰鬬綵錦繡之類縫合令方而覆卓上或覆時其角在正中與左右埀下此言卓袱此物正在卓圍之上面字彙云袱房六切音伏包袱敕修清規告香云請客侍者預依戒次具茶狀備卓袱筆硯又受嗣法人煎點云至日僧堂住持位嚴設敷陳及卓袱嚫幣之具備用清規告香云請客侍者預日令客頭至堂司具新到戒次寫茶狀客頭備卓袱和俗用亡者衣物等作佛祖位前莊嚴卓袱斗帳等亦有據隨願往生十方淨土經云佛言若以亡者嚴身之具堂宇室宅園林浴池以施三寶此福最多功德力強可得拔彼地獄之殃以是因緣便得解脫憂苦之患長得度脫往生十方諸佛淨土已下係供養具爐瓶燭臺忠曰香爐華瓶燭臺三物也敕修清規謝挂搭云法堂設住持位排列香几罏瓶燭臺大鑑清規達磨忌云前列爐瓶燭臺或問佛經有列三器者耶忠曰陀羅尼集經云當設二十一種供養之具作般若波羅蜜多法會乃至若不能具二十一種五種亦得何等為五一者香水二者雜華三者燒香四者飲食五者然燈止此此中具三物也四板頭香爐見四板頭香几處衆寮香爐忠曰衆寮行禮安七箇香罏見圖牌門茶湯問訊圖處敕修清規新挂搭人點入寮茶云進中爐上下間爐前燒香手爐敕修清規聖節云知客跪進手爐詳報禱門跪爐處又沙彌得度云几上安香燭手爐戒尺乃至戒師秉爐白幻住清規開甘露門云執手爐戒香定香云云釋氏要覽云法苑云天人黃瓊説迦葉佛香爐略云前有十六師子白象於二獸頭上別起蓮華臺以為爐後有師子蹲踞頂上有九龍繞承金華華內有金臺寶子盛香佛説法時常執此爐比觀今世手爐之製少有倣法焉虗堂愚和尚育王録云朱行軍一日入南禪寺齋僧行香次以手爐搖曳云直下是直下是時有僧云直下是箇甚麼行軍便喝云云廣燈聯燈此緣無手爐字但云有朱行軍設齋入僧堂內顧視上下云直下是又作麼生行香次口不住道云云香盤希叟曇禪師廣録禪房十事香印頌云要識分明古篆一槌打得完全燒炷旃檀牛糞衲僧鼻孔校穿四板頭香几忠曰僧堂內首座板後堂板分手板聖僧板各安香几行禮炷香詳禮則門四處問訊處校定清規特為住持煎點云如就僧堂上下間內外不用設香爐為主者一人大衆光伴也如節臘朔望設香案者為大衆故也堂外香几忠曰外堂有二香几在上下間行禮炷香詳禮則門四處問訊處香合敕修清規聖節云維那用黃紙書疏帶行僕捧盤袱爐燭香合上方丈請住持僉疏又云知客跪進手爐侍者跪進香合又念誦云燒香侍者捧香合三才圖會儀制門有圖大香合空谷尚直編云虎丘行中仁禪師凡得沈檀異香則以小合貯之置於大香合中每旦持以行香至世尊前於小合中別取好香一炷進之除外不復他用客至惟爇常香而已忠曰叢林現有此法而人不知祖行中矣小香合敕修清規告香云衆集依圖位立各備小香合坐具又見大香合處香增一阿含經云須摩提女手執香火上樓向如來説偈唯願尊屈神爾時香如雲在空中遍滿祇桓住在如來前阿難白世尊言此是何等香世尊曰此香是佛使滿富城中須摩提女所請廣説如彼僧史略云香也者解穢流芬令人樂聞也香為信心之使也詳叢軌門行香處觀心論云燒香者亦非世間有相之香乃是無為正法之香薰諸臰穢斷無明惡業悉令消滅其正法香有五種一者戒香所謂能斷諸惡能修諸善二者定香所謂深信大乘心無退轉三者慧香所謂常於身心內外觀察四者解脫香所謂能斷一切無明結縛五者解脫知見香所謂覺察常明通達無礙如是五香名最上香世間無比佛在世日令諸弟子以智慧火燒如是無價寶香供養十方一切諸佛今時衆生愚癡鈍根不解如來真實之義唯將外火燒世間沈檀薰陸質礙之香希望福報云何可得瓣香敕修清規祈雪疏云庸致瓣香之誠願集六花之瑞祖庭事苑云古今尊宿拈香多云一瓣瓣皮莧切瓜瓣也以香似之故稱焉或作𤖭步還切片也後世相襲皆為此言何必爾也當云一片一炷庶免薄俗之譏小補韻會云瓣皮莧切説文瓜中實從瓜辡聲廣韻瓜瓠瓣也又薄間切瓜中實也又片也詩碩人注瓠瓣詩人有學禪者瓣香語者陳后山詩集觀袞文忠公家六一堂圖書詩云向來一瓣香敬為曾南豐注諸方開堂至第三瓣香推本其得法所自則云此一瓣香敬為某人云云曾鞏子固建昌南豐人於歐公猶宗門中嫡子而后山又師南豐乃其孫也楊誠齋朝天集雙峯定水璘老送木犀香詩云傳語雙峯老汝師是如來如何一瓣香却為楊誠齋又退休集禱雪響應詩云老夫與雪亦久別滕六參儂求普説為渠拈此一瓣香今身胡姓前身黃云云忠曰瓣香之製上圓下方表裏條條豎雕畦上如指頭然蓋像枯枿之狀以作文而已然或處直雕造人之手而指掌宛然施爪甲謂是形二祖斷臂之手也豫曾在周州覩之尤為可笑也大香瓣香曰大香也敕修清規尊宿遷化下遺書云專使起爐前謝茶再插大香一片中香校定清規告香云一大二中解者曰謂大香一片中香二片也箋香大鑑清規末後事儀云龕內滿安箋香忠曰恐訛線香線香忠曰或言仙香雜抹衆香加糊粘造之其炷煙長久故稱仙香又云長壽香其製纖長如線故稱線香線又作線信香忠曰開法出世齎香寄師通嗣法之信此言信香大慧杲禪師答鼓山逮長老書云專使來收書并信香等知開法出世唱道於石門不忘所從來為嶽長老拈香續楊岐宗派忠曰逮公於杲師是師祖也亦可通信逮嗣蒙菴嶽嶽嗣大慧杲石門慈照禪師鳳巖集云師開堂拈香云西天二十八祖唐土六祖過去聖人盡得傳衣付法至唐代六祖之後得道者如稻麻竹葦不傳其衣只傳其法皆以香為信今日一瓣香為什麼人通信某甲雖不言大衆已委悉爇此一炷香也慈照嗣首山念祖庭事苑云託香而表信詳叢軌門嗣法拈香處長明燈敕修清規亡僧云夜點長明燈觀心論云長明燈者正覺心也覺知明了喻之為燈是故一切求解脫者常以身為燈臺心為燈盞信為燈炷增諸戒行以為添油智慧明達喻如燈光常然如是覺燈照破一切無明癡暗能以此法轉相開悟即是一燈然百千燈以燈續明終無盡故故號長明過去有佛名曰然燈義亦如是愚癡衆生不會如來方便之説專行虗妄執著有為遂然世間蘇油之燈以照空室乃稱依教豈不謬乎傳燈録長慶稜禪師章云有人問僧點什麼燈曰長明燈曰什麼時點曰去年點曰長明何在僧無語師代云若不如此爭知公不受人謾法眼別云利動君子本事詩云宋考功遊靈隱寺夜月極明長廊吟行且為詩曰鷲嶺鬱岧嶤龍宮隱寂寥第二聯搜奇思終不如意有老僧點長明燈生大禪床問曰少年夜夕久不寐而吟諷甚苦何耶之問告故僧曰何不云樓觀滄海日門聽浙江潮之問愕然寺僧有知者曰此駱賓王也隋唐嘉話云江寧縣寺有晉長明燈歲久火色變青而不熱隋文帝平陳已訝其古至今猶存法苑珠林云五百問事云續佛光明晝不得滅佛無明暗以本無言念齊限故滅有罪諸祖偈頌高邁長明燈序云離婁之目處暗室或不能覩燈處之皎如也澄公之掌在玄夜或不能照燈在之了如也故大雄氏以方便力救黑暗界藉其光誘其人佛所有燃燈明法所有傳燈義大抵長明燈是其蘊乎夫日主晝太陽之精中則吳吳則沒我長明燈不沒月主夜太陰之精滿則虧虧則盡我長明燈不盡日月尚爾況小光小明哉要自積苦為海舉足見溺積邪為山舉足見礙竟不能髣佛之或髣佛之不剋成就之言之可為長嘆我邑中有俊傑主此燃燈精進成就於寶融寺經藏院且夫蘭炷爇火吾見其盛未見其微也鐵盆盛膏吾見其增未見其減也一籠而四時長春滿室而終歲不夜人見之一作禮眼蒙利再作禮心蒙美心眼自相照了內外由是洞徹然則終日見燈未嘗不見燈終日不見燈未嘗不見燈夫達觀者乃如是也意者不獨於此直上照一天二天乃至三十三天無門不闢河沙善人由茲而入直下照一地二地乃至一十八地獄有獄皆開多劫罪人由茲而出若然者四維上下虗空可思量而不可思量耶我長明燈寶相功德亦復如是邁之數年內願銘頌之間迫賤事未搆一朝染目疾朦朧不自審從何得也遂夢神人語邁曰子於長明燈其有負乎邁應聲而悟悟而起起而作頌明日目愈頌曰見外燈長明見內燈長明萬惡自光中滅萬善自光中生不見一燈百千萬億燈乃至於無窮不見一人百千萬億人歸之於大同空即是色色即是空弟子作頌允執厥中長命燈忠曰長明燈也太平廣記引本事詩載駱賓王事作長命燈必訛寫耳無盡燈忠曰晚近稱長明燈為無盡燈廣燈録石門徹禪師章云問如何是學人用心處師云晝夜常然無盡燈續燈録拈古門云僧問投子歷劫來來無盡燈不曾挑剔鎮長明時如何投子云歷劫來來無盡燈不曾挑剔鎮長明北澗文集瑞巖開田然無盡燈記云淨名大士既授萬二千天女無盡燈法門從而諭之曰冥者皆明明終不盡伊尹所謂以先覺覺後覺也後世焚膏繼晷號無盡燈非淨名心也日夜相代為明者日月也大廈既夕風雨如晦瞭然者將眊然待燈而見燈亦豈無待焉惟有待故連行於人日月則運行於天運之之殊不息則一也瑞巖丹丘勝處燈失常運貨殖取贏使此燈不夜莫知幾興廢住山道全謀諸衆曰貨殖取贏乎墾土收穫乎智紹曰是或一道也顧主之何如主之有常則皆永傳不然則勺海為膏伐山為炬徒爾為也僉曰善紹則請命出山旋浙絶淮積錙纍銖閲四年而歸僦工闢荒視歲入為無盡光明茁霜蕭蕭隻影婆娑焦心勞思恐蹈貨殖取贏之轍求余記其成為將來之勸維摩經持世菩薩章云維摩詰語諸天女言諸姊有法門名無盡燈汝等當學無盡燈者譬如一燈然百千燈冥者皆明明終不盡如是諸姊夫一菩薩開導百千衆生令發阿耨多羅三藐三菩提心於其道意亦不滅盡隨所説法而自增益一切善法是名無盡燈也佛祖統紀云賢首法藏師為則天以十鏡置八隅中安佛像然燈照之則鏡鏡現像以表剎海重重無盡之意忠曰淨名約理法藏顯事悉是橫無盡亦兼豎無盡真歇了禪師佛燈明禪師各著無盡燈記而敘此鏡燈重重無盡之旨是也然世呼長明燈為無盡燈唯是豎無盡耳矣非淨名康藏之義然北澗時已有此目頗辨斥可知由來復淹矣挑燈敕修清規開堂祝壽云鐃鈸幡花挑燈迎引至法堂位前立又尊宿出喪云提調龕前傘椅湯爐挑燈燈籠毗奈耶雜事云緣在室羅伐城如世尊言夜暗誦經者彼誦經時有蛇來至少年見已驚忙大喚唱言長脊長脊凡夫苾芻悉皆驚怖遂令聽者因斯廢闕以緣白佛佛言當可然燈以誦經典苾芻夏月然燈損蟲佛言應作燈籠苾芻不知云何應作佛言應以竹片為籠薄㲲遮障此若難求用雲母片此更難得應作百目苾芻不解如何當作佛言令瓦師作如燈籠形傍邊多穿小孔普燈録保福權禪師章云上堂舉寒山吾心似秋月偈云老僧即不然吾心似燈籠點火內外紅有物堪比倫來朝日出東傳者以為笑黃龍死心見之歎曰權兄提唱若此誠不負先師所付囑也葉縣省禪師録燈籠偈云一盞金燈號玲瓏四方八面不施工照破乾坤黑暗處山河大地是家風長檠忠曰長檠高可五尺上安木盞植立鐵釘而燃蠟燭凡禪林法堂佛殿等用之韓昌黎集短燈檠歌云長檠八尺空自長短檠二尺便且光已下係儀物罣罳舊説曰罣罳遮背後板屏在椅子後者篇海類編云罣古畫切音卦罣礙也或曰罣罳即法被也忠曰此蓋依蘇鶚以罘罳為網之義然今禪林稱罣罳者只是木屏耳敕修清規告香云至日侍者令客頭於寢堂或法堂鋪設罣罳椅子又四節秉拂云堂司行者排辦法座左手敷罣罳設住持位忠曰敷者排辨也品字箋云俗以排列謂之鋪設非鋪展義又曰韻書小説但釋罘罳今且録之小補韻會云説文罘罳屏也從网思聲博雅罘罳謂之屏又漢未央宮東闕罘罳災師古曰罘罳連闕曲閣也以覆重刻垣墉之處其形罘罳然釋名罘復也罳思也言臣將入請事於此復思也通作思漢五行志罘思又考工記宮隅城隅闕門皆有之禮記明堂位注疏云以諸文參之則桴思小樓也唐蘇鶚曰漢師古注釋名所釋罘罳二説皆誤按罘罳從网是形不思是聲罘浮也罳絲也謂織絲之文輕疏浮虗之貌蓋宮殿簷戶之間也唐文宗實録甘露之變出殿北門裂斷罘罳而去溫庭筠補陳武帝書罘罳晝捲閶闔晨開皆非曲閣屏障之意相如子虗賦罘網彌山此亦謂羅鳥之網即罘罳為網不謬矣宋馬縞中華古今注云罘罳屏屏之遺象也孰門外之舍也臣來朝君至門外當就舍更詳其所應應對之事也孰之者言孰也行至門內屏外復應思惟也罘罳復思也漢西京罘罳合板為之亦築土為之每門闕殿舍皆有焉如今郡國廳前亦樹之也陳繼儒枕談云段成式云士林多稱雀網為罘罳其誤如此按漢書罘罳屏也復也臣朝君至屏所奏之事于下又按劉熙釋名曰罘罳在外門罘復也臣將入請事于此復重思也今之照墻也忠曰罘罳板屏而在廳前今禪林罣罳亦板屏制似罘罳雖在椅後亦受罳之名法被覆裹椅子之被也大法被忠曰法堂座上挂下大罣罳當面之被也北澗續集趙郡主施鬬綵法被薦女偈云空王座上一片如織善哉命婦巧思精究勸化諸女如出一手僧堂帳禪苑清規首座云行者於首座前問訊低聲云和尚放參乃至打放參鐘展單下帳罷歸寮問訊忠曰展眠單而下帳帷也帳幕敕修清規迎待尊宿云寢堂釘挂帳幕正字通云帳知亮切音障帷幔通稱又今人以寢幄為帳東方朔造甲乙帳程皓本傳皓知扶溝縣內侍王中正按閲保甲鄰邑競侈供帳悅之主吏來請皓曰吾邑貧獨有令故青帳可用耳暖簾忠曰綿布覆簾面防風氣故言暖簾敕修清規月分須知云四月候天氣僧堂內下暖簾上涼簾涼簾見暖簾處江湖風月集率菴琮和尚涼簾偈云絲開渭水蒼龍骨織就炎天片雪寒六用門頭才放下節紋一點不相瞞座頭屏風忠曰或單呼座頭小屏高可三尺設戶口左右座首太嶽清和尚曰座頭小屏又是名隔板舊説曰座有四出六出八出等如中華叢林雖諸寮舍制亦如僧堂衆寮此方鎌倉叢林隨處設座頭屏風此日本樣也其座頭則唯特為人得坐之其餘位則縱但一人亦只用曲盆行盞蓋為異於特為也忠曰隔板亦有所原後漢書鄭弘傳云弘為太尉時舉將第五倫為司空班次在下每正朔朝見弘曲躬而自卑帝問知其故遂聽置雲母屏風分隔其間由此為故事香臺禪苑清規入室云侍者入方丈當面問訊轉身禪椅東邊香臺後面南立供臺忠曰大卓言供臺東福清規上堂節禮云法堂觸禮畢住持轉身從安香爐供臺東入南面立受沙喝行者三拜敕修清規達磨忌云嚴設祭筵解者曰祭筵郎供臺也又僧堂之外堂有二供臺如圖卓子大鑑清規接諡號儀式云於山門爐前安卓子莊嚴袱子并卓圍盤袱忠曰盤與袱二物也盤上鋪小袱盛疏印等物敕修清規聖節云維那書疏帶行僕捧盤袱爐燭香合上方丈請住持僉疏又受法衣云以盤袱托呈法衣信物又山門特為新命茶湯云庫司仍具請狀備盤袱爐燭詣方丈插香拜請又大挂搭歸堂云堂司行者用盤袱托度牒衣裓忠曰僧家散花器名衣裓其器小竹籠以貯花而散之蓋襲大通佛故事也法華經化城喻品云大通智勝佛得阿耨菩提大光普照爾時東方五百萬億國土中諸梵天王與宮殿俱各以衣裓盛諸天華共詣西方推尋是相東南方南方西南方乃至下方亦復如是雪竇顯禪師祖英集送暹首座詩云我恐逃之逃不得大方無外皆充塞茫茫擾擾知何極八面香風惹衣裓忠曰此用法華事祖庭事苑解云裓古得切衣前襟也慧琳法華音義云衣裓説文宗廟奏戒衣從衣戒聲玉篇衣部古來反戒也相傳從衣戒孤得反襟也今時女人衣前裓是也天衣類同未詳字所出也小補韻會云裓訖得切衣裙也梵典有衣裓忠曰韻會之梵典指法華也所謂衣裓者諸天聚衆華盛衣裙以擬散佛上今人摘果芽亦為之故范希文鬬茶歌云終朝采掇未盈襜唯求精粹不敢貪止此襜篇海音覘韍也衣蔽前拜席敕修清規告香云須用香几三隻燭臺三對當椅前一字間列外設小拜席傳燈録百丈海禪師章云馬祖上堂大衆雲集方升座良久師乃卷却面前禮拜席祖便下堂已下係道具竹篦敕修清規尊宿出喪云提調竹篦拄杖拂子香合法衣等物已下略録事緣廣燈録葉縣省禪師章云參見汝州省念禪師師見來豎起竹篦子云不得喚作竹篦子喚作竹篦子即觸不喚作竹篦子即背喚作什麼師近前掣得擲向階下云在什麼處念云瞎師言下大悟大慧杲禪師年譜云師三十七歲圓悟著臨濟正宗記以付之分座訓徒師乃炷香為誓曰寧以此身代衆生受地獄苦終不以佛法當人情乃握竹篦為應機之器於是聲譽藹著又本録云師室中常舉竹篦問學者曰喚作竹篦則觸不喚作竹篦則背衆下語皆不契因僧請益復成五頌示之頌云雲門舉起竹篦開口知君話墮上方香積不餐甘伏食人涕唾一雲門舉起竹篦禪和切忌針錐鸞鳳不棲荊棘𮭗𮭗偏守空池二雲門舉起竹篦通身帶水拖泥奉報參玄上士撒手懸崖勿遲三雲門舉起竹篦擬議知君亂統直饒救得眼睛當下失却鼻孔四雲門舉起竹篦露出心肝五臟可憐猗死禪和猶自魂飛膽喪五禪鎮忠曰坐禪警睡具也十誦律云有比丘衆中睡佛言聽水洗頭乃至若故睡不止聽以毱擲若故睡不止佛言聽用禪杖取禪杖時應生敬心云何生敬心言以兩手捉杖戴頂上應起看餘睡者以禪杖築築已還坐若無睡者還以禪杖著本處已坐諸比丘故睡佛聽用禪鎮作孔已以繩貫孔中繩頭施紐挂耳上去額前四指著禪鎮時禪鎮墮故睡佛言禪鎮墮者應起行行時來往相亂佛言應如鵝法次第行略鈔資持記鉢器篇云禪鎮如笏坐禪時鎮頂須作孔施紐串耳上睡時即墮地佛言一墮聽舒一足二墮舒二足三墮應起經行釋氏要覽云禪鎮木版為之形量似笏中作孔施紐串於耳下頭戴去額四指坐禪人若昏睡頭傾則墮以自警止觀證真私記云四分抄批云禪鎮者用骨牙角者可方一寸許若有睡者放著頂上頭若正時則不落若睡時頭動則落膝上禪帶釋氏要覽云禪帶此坐禪資具也經云用韋為之熟皮曰韋廣一尺長八尺頭有鈎從後轉向前拘兩膝令不動故為乍習坐禪易倦用此檢身助力故名善助用罷屏處藏之禪杖釋氏要覽云禪杖以竹葦為之用物包一頭令下座執行坐禪昏睡以軟頭點之十誦律説見禪鎮處禪毱釋氏要覽云禪毱毛毬也有睡者擲之令覺十誦律説見禪鎮處智度論云菩薩供給坐禪者衣服飲食醫藥法杖禪毱禪鎮令得好師教詔令得好弟子受化與骨人令觀與禪經令人為説禪法如是等三十七助道法因緣禪板舊説曰禪板者坐禪時安手或靠身器也臨濟玄禪師録云師一日辭黃檗檗問什麼處去師云不是河南便歸河北黃檗便打師約住與一掌黃檗大笑乃喚侍者將百丈先師禪板機案來師云侍者將火來黃檗云雖然如是汝但將去已後坐却天下人舌頭去在希叟曇禪師録禪板頌云要成片段工夫須是全身倚靠雖然只見一邊未許睦州擔荷忠曰禪板者倚版也上頭穿小圓穴此名向上一竅蓋此穴貫索縛著繩床背後橫繩令板面斜以靠身也希叟頌意可見然今時夏月橫安膝上定印乎其上或支頤與助老同用而已復別有倚板余於一古寺見中峯和尚禪板之模長一尺七寸八分濶一寸九分餘厚參分半上有小竅一面鐫萬法歸一一歸何處乃峯親書之模也別有小板即所謂倚板長一尺八寸濶三寸九分厚三分餘上下施竅蓋是禪板本制而其上下穴一貫索縛著床面橫繩一貫索縛著床底橫繩其板之斜勢令起倒得稱意焉今之禪板槩濶不過二寸則不便安躬但可手攜耳倚版釋氏要覽云倚版今呼禪版毗奈耶攝頌曰倚版為除勞僧私皆許畜僧即衆私即己忠曰倚版坐繩床時倚之所以安背也余曾獲之於古寺其制斫版厚三分半長一尺八寸橫三寸九分上下穿小竅用時以紐縛定床之橫繩而其斜之急不急隨意而已詳禪版處數珠釋氏要覽云牟梨曼陀羅咒經云梵語鉢塞莫梁云數珠此乃是引接下根牽課修業之具也木槵子經云昔有國王名波流梨白佛言我國邊小頻年寇疫穀貴民困我常不安法藏深廣不得遍行惟願埀示法要佛言大王若欲滅煩惱當貫木槵子一百八箇常自隨身志心稱南無佛陀南無達磨南無僧伽名乃過一子如是漸次乃至千萬能滿二十萬遍身心不亂除諂曲捨命得生炎摩天若滿百萬遍當除百八結業獲常樂果王言我當奉行百八結者要覽云小乘見修合論煩惱共有一百八數且明見惑三界四諦下煩惱共有八十八謂苦下具一切即十使貪瞋癡慢疑身邊見邪見見取戒禁取也集滅離三見謂集滅二諦下各除身邊邪三見也道除於二見謂道諦除身邊二見也上界不行恚謂上界四諦下各除瞋一已上三界四諦共有八十八也修道所斷惑欲界有四謂貪瞋癡慢上二界各除瞋共有六已上成十計九十八也更加十纏謂無慙無愧昏沈惡作惱嫉掉舉睡眠忿覆合前都有一百八也佛説校量數珠功德經大唐寶思惟譯云曼殊室利告大衆言汝等諦聽受數珠校量功德差別如是若用鐵為數珠者誦掐一遍得福五倍若用赤銅為數珠者誦掐一遍得福十倍若用真珠珊瑚等為數珠者誦掐一遍得福百倍若用木槵子為數珠者誦掐一遍得福千倍若求往生諸佛淨土及天宮者應受此珠若用蓮子為數珠者誦掐一遍得福萬倍若用因陀羅佉叉為數珠者誦掐一遍得福百萬倍若用烏盧陀羅佉叉為數珠者誦掐一遍得福千萬倍若用水精為數珠者誦掐一遍得福萬萬倍若用菩提子為數珠者或用掐念或但手持此珠不能依法誦佛名算數難可拔是諸善男子若復有人手持此珠不能依法念誦佛名及陀羅尼此善男子但能手持隨身行住坐臥所出言語若善若惡斯由此人以持菩提子故得福等同如念諸佛誦咒無異得福無量其數珠者要當須滿一百八顆如其難得或為五十四顆或二十七或十四顆亦皆得用此即數珠法相差別諸善男子以何因緣我今獨讚用菩提子獲益最勝諸人善聽我為汝等重説昔日過去有佛出現於世在此樹下成等正覺時一外道信邪倒見毀謗三寶彼有一男忽被非人打殺外道念言我今邪盛未審諸佛有何神力如來既是在此樹下成等正覺若佛是聖樹應有感即將亡子臥著菩提樹下作如是言佛樹若聖我子必蘇以經七日誦爾佛名其子即得重蘇外道讚言諸佛神力我未曾見佛成道樹現此希奇甚大威德難可思議諸外道等悉皆捨邪歸正相共發菩提心信知佛力不可思議諸人咸號為延命樹以是因緣有其二名應當知之我為汝等現其所要佛讚善哉文殊如汝所説為異云耳陀羅尼集經云佛説作數珠法云有其四種何者為四一者金二者銀三者赤銅四者水精其數皆滿一百八珠或五十四或四十二或二十一亦得中用古今原始云東漢章帝時僧西域人時作念珠以象一年十二月二十四氣七十二候之義共一百單八忠曰象十二月等百八鐘也詳百八鐘處如念珠經有明文儒家不知之作此妄説忠按專念宗用三十六珠者三分於百八之一也便易攜矣近自支那來禪僧用十八珠者六分於百八之一也掐六遍而滿百八耳數珠母珠陀羅尼集經云作是相珠一百八顆造成珠已又作一金珠以為母珠又更別作十顆銀珠以充記子數珠記子忠曰百八顆外有十顆小珠為記子詳母珠處籌忠曰算人數器布薩等用之宗覺律師曰籌長周尺而一尺八寸周尺準今尺可八寸參分許其大如小指行事鈔説戒正儀篇云十誦云行籌者為檀越問僧不知數佛令行籌不知沙彌數行籌數之又云五分籌極短並五指極長拳一肘極粗不過小指極細不得減箸有客來不知行籌收取數之一人行一人收乃至收已數之知數已唱言比丘若干沙彌若干出家人和合若干人資持記云並五指者謂中人五相指乎相並當五寸也拳一肘謂尺八也舒手則二尺故然不明物體今時多以竹木為之又行事鈔云四分云聽行舍羅此云籌也資持記云準聲論翻之疏云舍羅草名以為籌計釋氏要覽云梵音舍羅此云籌律因有婆羅門問比丘逝多林現住幾人比丘不知佛言應可行籌祇園圖經云最初成道於鹿野苑中度五拘倫便説法答戒壇初上集佛諸佛之中須彌登王最為長宿釋迦佛問往古諸往坰方法教諸比丘登壇布薩用何作籌往古諸佛布薩之時金剛為籌乃至籌相者當用檀等諸香木作之內外寶者竹草中空皆不可作又不得畫繪及以漆塗為損衆生迦之飾好應以素函盛之籌極長如佛一搩手半短者一搩手付法藏因緣傳云憂波毱多化度無量衆生皆悉獲得阿羅漢果其得道者一人一籌籌長四寸滿一石室室高六丈縱廣亦爾於是名稱滿閻浮提世皆號為無相好佛乃至尊者於無餘涅槃而取滅度以室中籌而用耶旬已下係資身細器錫杖佛説得道梯隥錫杖經云佛告比丘汝等應受持錫杖所以者何過去未來現在諸佛皆執故又名智杖彰顯聖智故亦名德杖行功德本故聖人之表幟賢士之明記道法之正幢迦葉白佛何名錫杖佛言錫者輕也倚依是杖除煩惱出三界故錫明也得智明故錫醒也醒悟苦空三界結使故錫疏也謂持者與五欲疏斷故經廣説錫義今略之是杖有三錞念三塗苦惱則修戒定慧念三災老病死則除三毒貪瞋癡云云復有四股者用斷四生念四諦修四等入四禪云云通中高五用斷五道苦惱修五根云云十二環者用念十二因緣通達無礙修行十二門禪云云三重四股以念如來七覺意法云云通錞鑽八用念八正道云云或有二股或有四股環數無別但我今用四股十二環二股者迦葉如來所制立也令諸衆生記念二諦世諦第一義諦以立其義音釋錞徒對切銅鐏也彼經更有持錫杖二十五事並説表相功德毗奈耶雜事曰苾芻乞食入人家作聲警覺拳打門扇家人怪問佛言應作錫杖苾芻不解佛言杖頭安鐶圓如盞口安小環子搖動作聲而為警覺狗便出吠用錫杖打佛言不應以杖打狗應舉怖之時有惡狗怖時瞋劇佛言取一抄飯擲地令食至不信家久搖錫時遂生疲倦而彼家人竟無出問佛言不應多時搖動可二三度搖無人問時即須行去南海寄歸傳云言錫杖者梵云喫棄羅即是鳴聲之義古人譯為錫者意取錫作聲鳴杖錫任情稱就目驗西方所持錫杖頭上唯有二股鐵棬可容三二寸安其錞管長四五指其竿用木粗細隨時高與眉齊下安鐵纂可二寸許其鐶或圓或匾屈合中間可容大指或六或八穿安股上銅鐵任情元斯制意為乞食時防其牛犬何用辛苦擎奉勞心而復通身總鐵頭上安四股重滯將持非常令澀非本制也忠曰義淨説似未讀錫杖經也釋氏要覽云梵云隙棄羅此云錫杖由振時作錫聲故十誦云聲杖三千威儀經云持錫不得入衆日中後不得復持日中即午不得擔於肩上五百問云持錫有多事能警惡蟲毒獸故忠曰要覽云二股六環是迦葉佛製止此按錫杖經無六環説但言二股四股環數無別學者須知四分律云諸比丘道行見蛇蛆蜈蚣百足未離欲比丘見皆怖白佛佛言聽投錫杖搖已下略録事緣唐高僧傳僧稠傳云稠詣懷州西王屋山修法聞兩虎交鬬咆響震巖乃以錫杖中解各散而去六祖法寶壇經云永嘉玄覺禪師來參繞師三匝振錫而立詳如彼傳燈録章敬惲禪師章云有一僧來繞師三匝振錫而立師曰是是其僧又到南泉亦繞南泉三匝振錫而立南泉云不是不是此是風力所轉始終成壞僧云章敬道是和尚為什麼道不是南泉云章敬即是是汝不是碧巖統要等僧為麻谷傳燈録五臺隱峯禪師鄧氏章云師以冬居衡嶽夏止清涼唐元和中荐登五臺路出淮西屬吳元濟阻兵違拒王命官軍與賊交鋒未決勝負師曰吾當去解其患乃擲錫空中飛身而過兩軍將士仰觀事符預夢鬬心頓息師既顯神異慮成惑衆遂入五臺於金剛窟前示滅拄杖釋氏要覽云十誦律云佛聽蓄杖其𥎞用鐵為堅牢故斯蓋行李之善助也言𥎞用鐵即小拄杖子非今擔衣鉢大者毗奈耶云佛聽蓄拄杖有二因緣一為老瘦無力二為病苦嬰身故隋煬帝在邸時送法藏禪師靈壽杖書云每策此杖時賜相憶毗奈耶雜事云佛在鷲峯山有老苾芻登山上下腳跌倒地佛言應畜拄杖聞佛許已六衆即便以金銀雜綵等物雕飾其杖俗旅嫌賤苾芻白佛佛言苾芻有二種緣應畜拄杖一為老瘦無力二為病苦嬰身略鈔祖庭事苑引毗奈耶雜事文畢云正如今禪家遊山拄杖或乘危涉險為扶力故以杖尾細怯遂存小枝許串鐵汞者是也行腳高士多攜粗重堅木持以自衒且曰此足以禦寇防身往往愚俗必謂禪家流固當若是不薄吾佛之遺訓乎已下略録事緣續燈録蓮華峯祥菴主臨示疾時舉拄杖問衆云汝道古佛到遮裡為什麼不肯住衆無對師云為他途路不得力復云作麼生得力去乃橫肩拄杖云楖𣗖橫擔不顧人却入千峯萬峯去言畢圓寂百丈以拄杖拂子付溈山見拂子處希叟曇禪師廣録禪房十事拄杖頌云格外叢林選出生緣不在天台雖然烏律卒地力扶多少人來拄杖觸頭淨頭禪苑清規裝包云拄杖之法有枝者為觸頭無枝者為淨頭行時淨頭在前右手携之如下笠時在左手內路上逢人如略問訊仰左手把拄杖仰右手下笠斂杖笠當胸探水忠曰拄杖下頭可二尺別存小枝撓纏繞本幹向下名為探水蓋路行過水則先下杖驗之水到小枝上下而量其深淺然後敢渡故名探水碧巖録云玉將火試金將石試劍將毛試水將杖試止此是也然事苑云以杖尾細怯遂存小枝見拄杖處依此只為護細弱也無復探水之用已下略録拄杖探水因緣趙州諗禪師録云師一日將拄杖上茱萸法堂上東西來去萸云作什麼師云探水萸云我者裏一滴也無探箇什麼師將杖子倚壁便下去洞山初禪師録云問如何是洞山圓鏡師云人將語試水將杖試續燈録天衣在和禪師嗣雪竇明覺章云問祖祖相傳傳祖印師今得法嗣何人師云人將語試水將杖探希叟曇禪師正宗贊永明智覺禪師贊云迅瀑千尋不停纖粟探水杖痕深虗堂愚禪師淨慈後録舉趙州斷却命話云趙州過頭杖子到處探水當時者僧若與本分草料管取別甑炊香古林茂禪師拾遺録送敬上人偈云參方須具參方眼法戰須諳法戰機探水烏藤好牢把莫同趙老到茱萸拂子毗奈耶雜事云佛在廣嚴城獼猴池側高閣堂中時諸苾芻為蚊蟲所食身體患癢抓搔不息俗人見已問言聖者何故如是以事具答彼言聖者何故不持拂蚊子物答言世尊不許以緣白佛佛言我今聽諸苾芻畜拂蚊子物是時六衆聞佛許已便以衆寶作柄犛牛尾為其拂俗人既見曰此是何物答言佛令苾芻畜拂蚊子物是故我持彼言聖者仁雖剃髮貪染未除以緣白佛佛言有五種袪蚊子物一者撚羊毛作二用麻作三細裂㲲布四用故破物五用樹枝梢若用寶物得惡作罪事苑引用釋氏要覽云僧祇云佛聽線拂裂㲲拂芒拂樹皮拂制若犛牛尾馬尾拂并金銀裝柄者皆不得執三才圖會儀制類有圖已下略録事緣碧巖録云百丈當時以禪板蒲團付黃檗拄杖拂子付溈山溈山後付仰山仰山既大肯三聖聖一日辭去仰山以拄杖拂子付三聖聖云某甲已有師仰山詰其由乃臨濟的子也希叟曇禪師廣録禪房十事拂子頌云才得柄入手便要呵佛罵祖還他本色真棕不比尋常談麈如意釋氏要覽云梵云阿那律秦言如意指歸云古之爪杖也或骨角竹木刻作人手指爪柄可長三尺許或脊有癢手所不到用以搔抓如人之意故曰如意誠嘗問譯經三藏通梵大師清沼字學通慧大師雲勝皆云如意之制蓋心之表也故菩薩皆執之狀如雲葉又如此方篆書心字故若局爪杖者只如文殊亦執之豈欲搔癢也又云今講僧尚執之多私記節文祝辭於柄備於忽忘要時手執目對如人之意故名如意若俗官之手版備於忽忘名笏也若齊高祖賜隱士明僧紹竹根如意梁武帝賜昭明太子木犀如意石季倫王敦皆執鐵如意此必爪杖也因斯而論則有二如意蓋名同而用異焉忠曰如意之制心之表也如此方篆書心字止此此義不通印度焉又曰文殊豈欲搔癢也止此是亦不然世尊尚示有圊便疾病既同凡受五蘊色身何無復背癢耶余竊謂凡佛菩薩所執器物動有所表蓋説法到人疑處令彼能通曉猶如爪杖搔癢處痛快故執此表其相若復依此義則文殊雖執亦何妨焉義楚六帖云淨名經義抄云牛呞羅漢説法時以有口病恐大衆生輕龍現爪以遮口因作如意猶象龍爪佛祖統紀智者大師紀云南嶽造金字般若命師代講唯三三昧及三觀智用以咨審餘悉自裁南嶽手持如意臨席讚之曰可謂法付法臣法王無事又云師有疾口授遺書略云蓮華香爐犀角如意是王所施今以仰別願德香遠聞長保如意也釋氏資鑑云周建德三年五月武帝雍惑於道士張賓等妖言惡黑衣之讖乃欲偏廢釋教命沙門道士辨其優劣且云長留短廢云云襄城公何妥自行如意座首少林寺行禪師發憤而起諸僧止曰師為佛法大海衆咸仰知可令末座對揚共推如意付智炫安詳而起徐升論座坐定執如意折張賓理屈詳如彼忠曰論議執如意可以證焉三才圖會器用部云如意吳時秣陵有掘得銅匣開之得白玉如意執處皆刻螭彪蠅蟬等形胡綜謂秦始皇東遊埋寶以當王氣則此也蓋如意之始非周之舊當戰國事爾事物初略云胡綜別傳曰時有掘地得銅匣長二尺七寸開之得白玉如意所執處皆刻螭蟬等形時人莫知其由吳大帝以綜多識乃問之答云昔秦始皇東遊以金陵有王者氣乃鑿諸山岡起處埋寶物以當王者之氣此抑是乎則是如意始于戰國顧元慶十友圖贊如意為直友曰右如意煉鐵為之長二尺有奇上有銀錯或隱或見識者知其宣和舊物平時以剛直自持山房呼為直友癢和子忠曰如意言癢和子希叟曇禪師廣録禪房十事癢和子頌云既就良工雕琢何妨出手扶持抓著衲僧癢處賞伊一枚荔枝印毗奈耶雜事云時有賊來盜僧庫藏并及私物為無記驗苾芻不知何時失物佛言苾芻可畜其印應用五種物為印所謂鍮石赤銅白銅牙角佛言凡印有二種一是大衆二是私物若大衆印可刻轉法輪像兩邊安鹿伏跪而住其下應書元本造寺施主名字若私印者刻作骨鎖像或作髑髏形欲令見時生厭離故輟耕録云周禮璽節鄭氏注云璽節者今之印章也按許慎説文云印執政所持信也徐鍇曰從爪手以持信也衛宏曰秦以前民皆以金玉為印龍虎鈕惟其所好然則秦以來天子獨以印稱璽獨又以玉群臣莫敢用也七雄之時臣下璽始稱曰印漢制諸侯王金璽璽之言信也古者印璽通名漢舊儀云諸侯王黃金璽槖他鈕又曰璽謂刻曰某王之璽列侯黃金印龜鈕文曰某侯之章丞相太尉與三公前後左右將軍黃金印龜鈕文曰章中二千石銀印龜鈕文曰章千石六百石四百石至二百石以上皆銅印鼻鈕文曰印建武元年詔諸侯王金印綟綬公侯金印紫綬中二千石以上銀印青綬千石至四百石以下銅印黑綬及黃綬陳制金章或龜鈕貔鈕獸鈕豹鈕銀章或龜鈕熊鈕羆鈕羔鈕鹿鈕銀印或圭鈕兔鈕銅印率環鈕吾衍云漢有摹印篆其法只是方正篆法與隸相通後人不識古印妄意盤屈且以為法大可笑也多見古家藏得漢印字皆方正近乎隸書此即摹印篆也玉球嘯堂集古録所載古印正與相合凡屈曲盤回唐篆始如此今碑刻有魯公官誥尚書省印可考其説漢晉印章皆用白文大不過寸許朝爵印文皆鑄蓋擇日封拜可緩者也軍中印文多鑿蓋急於行令不可緩者也古無押字以印章為官職信令故如此耳唐用朱文古法漸廢至宋南渡絶無知此者故後宋印文皆大繆白文印皆用漢篆平正方直字不可圓縱有斜筆亦當取巧寫過三字印右一邊一字左一邊兩字者以兩字處與一字處相等不可兩字中斷又不可十分相接四字印若前二字交界有空後二字無空須當空一畫別之字有有腳無腳故言及此不然一邊見分一邊不分非法度也軒齋等印古無此式唯唐相李泌有專居堂白文玉印或可照例終是白文非古法不若只從朱文朱文印或用雜體篆不可太怪擇其近人情免費辭説白文印用崔子王寫張平子碑上字及漢器上并碑蓋印章等字最為第一凡姓名表字古有法式不可用雜篆及朱文白文印必逼於邊不可有空空便不古朱文印不可逼邊須當以字中空白得中處為相去庶免印出與邊相倚無意思耳字宜細四旁有出筆皆帶邊邊須細於字邊若一體印出時四邊虗紙皆昂起未免邊肥於字也非見印多不能曉此黏邊朱文建業文房之法多有人依款識字式作印此大不可蓋漢時印法不曾如此三代時却又無印學者慎此周禮雖有璽節及職金掌其微惡揭而璽之之説注曰印其實手執之印也正面刻字如秦氏璽而不可印印則字皆反矣古人以之表信不問字反淳朴如此若戰國時蘇秦六印制度未聞淮南子人間訓曰魯君召子貢授以大將軍印劉安寓言而先辭耳道號唐人雖有不曾有印故不可以道號作印用也三字屋扁唐印有法凡印文中有一二字忽有自然空缺不可映帶者聽其自空古印多如此凡印僕有古人印式二册一為官印一為私印具列所以實為甚詳不若嘯堂集古録所載只具音釋也凡名印不可妄寫或姓名相合或加印章等字或兼用印章字曰姓某印章不若只用印字最為正也二名者可回文寫姓下著印字在右二名在左是也單名者曰姓某之印却不可回文寫名印內不得著氏字表德可加氏字宜審之表字印只用二字此為正式近人或并姓氏於其上曰某氏某若作姓某父古雖有此稱係他人美己却不可入印人多好古不論其原不為俗亂可也漢人三字印非復姓及無印字者皆非名印蓋字印不當用印字以亂名漢張安字幼君有印曰張幼君右一字左二字唐呂溫字化光有印曰呂化光此亦三字表德式諸印下有空處懸之最佳不可妄意伸開或加屈曲務欲填滿若寫得有道理自然不覺空也字多無空不必問此李陽冰曰摹印之法有四功侔造化冥受鬼神謂之神筆畫之外得微妙法謂之奇藝精于一規矩方圓謂之工繁簡相參布置不紊謂之巧趙彥衛云古印文作白文蓋用以印泥紫泥封詔是也今之米印及倉敖印近之矣自有紙始用朱字間有為白字者通典云北齊有木印長一尺廣二寸五分背上為鼻鈕長九寸厚一寸廣七分腹下隱起篆文曰督攝萬幾惟以印籍縫今齪合縫條印蓋原於此秦有八體書三曰刻符印古所謂繆篆五曰摹印蕭子良以刻符摹印合為一體徐鍇謂符者竹而中刻之字形半分理應別為一體摹印屈曲填密則秦璽文也子良誤合之宣和譜四卷楊克一圖書譜一卷又名集古印格王厚之復齋印譜顏叔夏古印譜二卷薑夔集古印譜一卷吾衍古印文二卷趙孟俯印史二卷正字通云漢官儀吏秩比二千石以上銀印龜紐其文曰章刻曰某官之章二百石以上銅印鼻紐其文曰印刻曰某官之印今士大夫私用姓名圖記曰某章某印又云刻之印章則陽文曰朱文陰文曰白文蓋右今金石同一例也客窗隨筆云古人印章元自圓整有殘缺處乃沙土久蝕而然今人乃以新製者故擊碎而摸糊之以為古大非也且以施於泛印猶可若自己姓字必殘缺磨滅而使之古何為者哉忠曰趙世顯是論最確矣印名人見存而其印却為古物之狀違理之甚明僧獨立印章説云印章之作由國璽符篆而別士民得用自漢而興但紀姓名無引首別號表字悉用銅鑄在公者用龜鈕曰之印大夫者稱之章私記者用瓦鈕曰私印不刻朱文槩用小篆白文今稱漢白文焉宋始興齋居別號字氏至我明國人爭尚間文詩句遂分籕文小篆繆篆署書方朱圓朱玉箸切玉急就之體井井不紊取諸金玉凍石以飾珍玩成弘之際由用犀象刻印今鄙棄之萬曆初有何雪漁文三橋者益新秦漢篆法曰鑄體曰鑿體曰半鑄半鑿體曰飛走流動體中鋒正筆鐵畫銀鈎舉説文應正用其道始光從元吾衍子説以詳其制豫居關門竺印師以青田印石索豫篆字奈何筆尖綿藐畫不從心脫稿于石在鐵筆者繩之正之豫昔曾與陳文叔鄭正叔梁千秋丁秋屏諸名公校酬精核是得金石心傳不與刊梨鐫棗同工而語但豫情厭操刀不及其好是爾捐棄今日本但曰刻印不知配字合道奏刀有訣玄玄至理豈是鹵莽滅裂可為是特紀此數言以付雕蟲者作明眼壬寅姤月草有四日天間野衲獨立氏識真本在龍華書剪敕修清規尊宿遷化下遺書云行者備書剪托書物乃至住持熏爐送與維那行者度剪開緘宣讀界尺忠曰界尺文具以畫界罫線兼鎮紙幅與戒尺不同戒尺見唄器門禪林類聚云梁武帝請傅大士講經大士升座以界尺揮案一下便下座帝愕然志公問帝云陛下會不帝云不會志云大士講經竟聯燈會要但作尺是界尺可依類聚而知也幻住菴清規言尺戒尺也見唄器門北澗文集界尺銘云惡圓曲尚方正直而剛重以填輟耕録裱背十三科之一曰界尺裁版桿帖五代史唐趙光逢傳云趙光逢字延吉在唐以文行知名時人稱其方直溫潤謂之玉界尺三才圖會器用類云尺以鎮紙錐以刺書針筒見戒刀處世尊不聽作象牙骨角針筒緣見于僧祇律雲門偃禪師録云或云佛法還有變易也無代云鉢盂鞋履拄杖針筒又云紐半破三針筒鼻孔裏道將一句來代云海裏使風山上船續燈録天衣懷禪師章云上堂云須彌頂上不扣金鐘畢鉢巖中無人聚會山僧倒騎佛殿諸人反著草鞋朝遊檀特暮到羅浮拄杖針筒目家收取佛果擊節録云欽山將針線行腳到處與人做衣詳雜行門把針處鏡資持記云坐禪處多懸明鏡以助心行詳靈像門寫照處釋氏要覽云僧祇云若病差若新剃頭若頭面有瘡照無罪若為好故照者得越毗尼罪已下略録因緣傳燈録僧伽難提章云一童子持圓鑑直造尊者前師曰汝手中者當何所表童曰諸佛大圓鑑內外無瑕翳兩人同得見心眼皆相似尊者受具戒訖名伽耶舍多聯燈會要仰山寂禪師章云師住東平溈山寄鏡子一面并書至師升堂受書畢提起鏡子示衆云大衆且道是溈山鏡是東平鏡若道是東平鏡又是溈山寄來若道是溈山鏡又在東平手裏若道得即留取若道不得即撲破去也如是三説衆皆無對師遂撲破剃刀敕修清規沙彌得度云戒師用淨瓶灌頂以指滴水於頂上執刀剃頭傳燈録南院寶應和尚章云思明和尚未住西院時到參禮拜後白曰別無好物人事從許州買得一口江西剃刀來獻和尚師曰汝從許州來什麼處得江西剃刀明把師手掐一下師曰侍者收取明拂袖而去師曰阿剌剌戒刀敕修清規辦道具云僧史略云戒刀皆是道具表斷一切惡故僧史略云及持澡罐漉囊錫杖戒刀斧子針筒此皆為道具也釋氏要覽云戒刀按律許蓄月頭刀子為割衣故今比丘蓄刀名戒者蓋佛不許斫截一切草木壞鬼神村故草木尚戒况其它也祖庭事苑云戒刀根本雜事云佛在室羅伐城苾芻欲裁三衣便以手裂衣財損壞佛言可刀子裁六衆便以雜寶飾之加以太長佛制不聽此是大刀不是刀子汝等應知有三種刀子謂大中小大者可長六指小者四指二內名中其狀有二一如鳥羽曲二似雞翎不應尖直五分律云諸比丘無刀用竹蘆片割衣衣壞佛言聽畜割截物刀諸比丘便作大刀賊來得以害比丘佛言不聽作大刀犯者突吉羅聽長一指一邊作刃以木作柄除漆樹梵網經十八物中有刀子見楊枝處古迹記云刀子割甲行事鈔鉢器制聽篇云毗尼母聽畜刀子六種一用割皮剪甲破瘡裁衣割衣上毛縷六用淨果乃至食時種種須故希叟曇禪師廣録禪房十事戒刀頌云惡鉗鎚下翻身未必鋒芒發露不惟斬得貓兒也解殺佛殺祖法瓶舊説曰布薩時所用瓶名法瓶乃盛香湯及香水也又見濾水囊處淨瓶敕修清規辦道具云淨瓶梵語捃稚迦此云瓶釋氏要覽云淨瓶梵語軍遲此云瓶常貯水隨身用以淨手寄歸傳云軍持有二若瓷瓦者是淨用若銅鐵者是觸用忠曰余曾問久修園宗覺律師曰今律士但携一瓶未審是觸是淨覺曰一瓶貯淨水觸淨兼用義淨受用三水要行法云舊律十誦五十九云有淨澡罐廁澡罐四十一云有淨水瓶常水瓶又新譯有部律文淨瓶觸器極分明此並金口親言非是人造寧容唯一銅瓶不分淨觸雖同告語不齒在心豈可以習俗生常故違聖教祖庭事苑云淨瓶四分律云有比丘遇無水處水或有蟲渴殺佛知制戒令持觸淨二瓶以護命故傳燈録溈山祐禪師章云百丈召師入室囑云吾化緣在此溈山勝境汝當居之嗣續吾宗廣度後學時華林聞之曰某甲忝居上首祐公何得住持百丈云若能對衆下得一語出格當與住持即指淨瓶問云不得喚作淨瓶汝喚作什麼華林云不可喚作木棎也百丈不肯乃問師師踢倒淨瓶百丈笑云第一座輸却山子也遂遣師往溈山濾水囊篇海類編云濾良據切音慮漉去滓也敕修清規辦道具云濾水囊增輝記云為器雖小其功甚大為護生命故中華僧鮮有受持準律標示根本百一羯磨云水羅有五種一方羅用絹三尺或二尺隨時大小作絹須細密不透蟲者若用疏絹薄紗紵布者無護生之意二法瓶陰陽瓶也三軍遲以絹繫口以繩懸沈於水待滿引出四酌水羅五衣角羅言衣角者非袈裟角也但取密絹方一搩手或繫瓶口或安鉢盂中濾水用也慈覺大師賾公集經律凡三十一偈文多不録末謂世云濾羅難安多衆宗賾崇寧元年於洪濟院厨前井邊安大水檻上近檻脣別安小檻穿角傍出下安濾羅傾水之時全無迸溢亦乃大衆沾足浴院後架倣此僧行東司亦皆濾水出家之本道也後住長蘆諸井濾水二十餘處常住若不濾水罪歸主執之人普冀勉而行之行事鈔二衣總別篇云漉水袋法物雖輕小所為極大出家慈濟厥意在此薩婆多凡用水法應清淨者如法漉水置一器中足一日用取上細㲲一肘作囊令持戒審悉者漉水竟著淨器中向日諦視看四分作漉水袋如杓形若三角若作宏槨不得無漉袋行半由旬無者僧伽梨角漉此國多用絹作者余親取已漉竟水內黑色器中微小細蟲無數後取緻練作袋漉之方盡已下略録事緣傳燈録牛頭智巖禪師章云師姓華氏弱冠智勇過人身長七尺六寸隋大業中為郎將常以弓挂一濾水囊隨行所至汲用纍從大將征討頻立戰功唐武德中年四十遂乞出家六學僧傳唐僧竭傳云竭每以復帛為漉水囊日漉水投蟲井中井恆盈未嘗涸世因以護生井目之丹鉛總録云唐人白行簡以濾水羅賦得名其警句云焦螟之生必全有以小為貴者江漢之流雖大蓋可一以貫之靈一詩曰濾泉侵月起掃徑避蟲行濾水蓋僧家戒律有此欲全水蟲之命故濾而後飲今蜀中深山古寺猶有此規白居易送文暢詩山宿馴溪虎江行濾水蟲手巾忠曰手巾二種一隨身攜手者一公界者或在僧堂內或在浴室內或在後架皆長丈二挂之轆轤令牽轉就其乾處拭用已下録隨身手巾梵網經十八物中有手巾詳器物門楊枝處行事鈔二衣總別篇云又開鉢囊革屣囊針筒禪帶腰帶帽拭腳巾攝熱巾裹革屣巾等及拭面巾拭身巾捫淚巾續燈録龍潭圓禪師章云師辭汾陽汾陽云別無送路與子一條拄杖一條手巾師云手巾與和尚受用拄杖不用得昭云但將去有用處在師便收昭云又道不用師喝一喝便下去昭云已後不讓臨濟師云正令已行師嗣汾陽善昭事物紀原云禮浴用二巾上絺下綌雖上下異用而無異名此三代之制也漢王莽之斥逐王閎也閎伏泣元后親以手巾拭之於是始見手巾之目其事雖出於三代而制名當自漢世也已下録公界手巾大比丘三千威儀云當用手巾有五事一者當拭上下頭二者當用一頭拭手以一頭拭面目三者不得持拭鼻四者以用拭膩污當即浣之五者不得拭身體若澡浴各當自有巾忠曰若澡下説隨身巾敕修清規大坐參云聖僧侍者牽堂內手巾轆轤驚酣眠者日用軌範云拭面不得爭扯手巾不得以巾拭頭用畢須攤挂或焙火上永平道元和尚曰手巾一幅布長一丈二尺也不可白色已上僧堂巾敕修清規知浴云鋪設浴室挂手巾出面盆拖鞋腳布日用軌範開浴云公界手巾係著衣後淨手拭之以披五條也已上浴室巾緇門警訓登廁規式云後架手巾須多備三兩條頻頻洗換莫令垢染以污淨手人衆處五日一洗人少處十日一洗已上後架巾忠少時聞古老説謂行腳人以手巾束腰其巾取一幅布長丈二一頭豎折橫縫定其脣若道路遇亡骸則不空見過便以巾縫首納亡人一腳自骸背過肩負之於己背上尋可瘞處稅下葬之諷誦而去余按毛詩云行有死人尚有墐之止此仁儒秉心猶若是况為度生大士乎淨巾舊説曰淨巾即手巾也日用軌範抽脫云以淨巾搭左手面盆敕修清規水頭云手巾面盆燈燭牙藥毋令缺少枕子日用軌範云五更鐘未鳴輕輕擡身先起將枕子安腳下未要拗恐驚鄰單祖庭事苑云寄歸傳云南海十島西國五天並皆不用木枕支頭神洲獨有斯事西方枕囊樣式其類相似或取帛或布染色隨意縫為直袋長一肘半寬半肘中間財者隨處所出或可填毛或盛麻縕或蒲黃柳絮等或決明麻豆隨時冷熱量意高下斯乃取適安身實無堅強之患然為木枕疏硬頭下通風致使時人多苦頭疼既而軟物除風麻豆明目且能有益用實無爽又為寒鄉凍頂多得傷風冬月鼻流斯其過也今禪人多畜木橋枕蓋便於行腳收拾易然故利時之用亦不可革也法華文句記云南山注經音云西方無木枕皆以赤皮內著綿毛用倚臥也靈源拾遺云昔哲侍者夜半不睡以圓木為枕小睡時枕轉覺而後安坐如故傳燈録仰山寂禪師章云僧問法身還解説法也無師曰我説不得別有一人説得曰説得底人在什麼處師推枕子出溈山聞云寂子用劍刃上事橋枕忠曰橋枕日本名摺枕者其制兩小板內安細木柱兩頭有機令可開闔開則柱斜撑起板一左一右任安頭摺則小柱臥填兩板凹處太便于收藏敕修清規大坐參中再請禪云更深住持出聞首座開枕響衆方偃息止此乃開枕以備臥用也祖庭事苑説見枕子處扇釋氏要覽云西天多用如阿含經云阿難羅云皆執扇侍佛優波離結集律藏時波斯匿王與象牙裝扇令執誦律古高僧慧榮講時執扇隋煬帝賜高僧敬脫大竹扇濶三尺入內講經論大慧為如山主普説云我老和尚圓悟曾説五祖師翁每於盛暑中常披袈裟禪床上坐更不使扇先師便問和尚何不使扇祖云儞理會不得我是順時保愛因問其故祖云天地之氣既有四時便有寒暑既在寒暑中須與他受些子儞若逃寒畏暑便是逆其時候了也這箇便是老僧順時保愛鹽官齊安禪師索犀牛扇子見傳燈録忠曰中華所謂扇多是團扇而已如此方言扇皆是摺疊扇也春風堂隨筆云今世所用摺疊扇亦名聚頭扇吾鄉張東海先生以為貢於東夷永樂間始盛行於中國豫見南宋以來詩詞咏聚扇者頗多豫收得楊妹子所寫絹扇面摺痕尚存東坡謂高麗白松扇展之廣尺餘合之止兩指許正今摺扇蓋自北宋以有之倭人亦製為泥金面鳥竹骨充貢出自東夷果然徐氏筆精云國朝大明不用團扇用摺扇頭末紅扇忠曰日本禪林兄弟者所執金面中啓扇子上頭繪深紅雲容名言頭末紅扇子已下係資身粗器法蓋忠曰法蓋者葫蘆頂繡羅三簷大傘新住持入院行者執面覆之水滸傳云梁中書出階前坐定交椅左右祇候兩行喚打傘的撑開那把銀葫蘆頂茶褐羅三簷涼傘來蓋定在梁中書背後忠曰禪林法蓋之制正是也增一阿含經云世尊受須摩提女請至滿富城廣説乃至是時梵天王在如來右釋提桓因在如來左手執拂密迹金剛力士在如來後手執金剛杵毗沙門天王手執七寶之蓋處虗空中在如來上恐有塵土坌如來身忠曰蓋之用在防塵穢此文可為證釋氏要覽云律云跋難陀比丘持大蓋行似今涼傘也諸居士遙見謂是官人皆避道及近元是比丘乃譏嫌之佛乃制戒不應持大蓋若天雨即聽涼傘忠曰日本禪林長老者行路執傘覆之遮日製小於法蓋以油紙造之餘冬序録云按宋人私録京城士人舊通用青絹涼繖大中祥符間惟許親王用之餘並禁止後又許中書樞密院依舊用繖堯山堂外紀云劉子儀名筠侍郎三入翰林希望大用意頗不懌賦詩云蟠桃三竊成何味上盡鼇山迹轉孤移疾不出朝士問候者繼至詢之云虗熱上攻石中立在坐云只消一服清涼散意謂兩府始得用青涼傘也忠曰僧家涼傘有所擬也笠敕修清規入院云古人腰包頂笠到山門首下笠入門炷香有法語又裝包云古者戴笠笠內安經文茶具之類釋氏要覽云蓋律有二種一竹蓋二葉蓋寄歸傳云西域僧有持竹蓋或持傘者梁高僧惠韶遇有請則自攜杖笠也今僧戴竹笠棕笠乃竹蓋之遺製但去柄爾今又加油絹於上郎唐馬周製在席帽以禦雨故效之也傳燈録金華山俱胝和尚章云初住菴有尼名實際到菴戴笠子執錫繞師三匝云道得即拈下笠子三問師皆無對尼便去後天龍和尚到菴竪一指師當下大悟轎字彙云轎渠妙切橋去聲肩行之車也品字箋云轎肩輿也漢淮南王安諫擊閩越輿轎踰嶺注今竹輿嚴助傳注服虔曰隘路車也容齊四筆云漢書淮南王安諫武帝伐越書曰輿轎而踰領服虔曰轎音橋謂隘道輿車也臣瓚曰今竹輿車也江表作竹輿以行項昭曰陵絶水曰轎音旗廟反顏師古曰服音瓚説是也項氏謬矣此直言以轎過領耳何云陵絶水乎旗廟之音無所依據豫謂項音轎字是也而云陵絶水則謬蒲龕希叟曇禪師廣録禪房十事蒲龕頌云百匝千重包裹未免黑山裏坐古今多少生盲引得全身入草蒲義見蒲團處溫蒲蒲龕又言溫蒲江湖集月庭忠和尚溫蒲頌云業履人亡肉未寒滿汀柔緑帶春煙全身入草重扶起門掩昭州二十年蒲團忠曰坐物以蒲編造其形團圓故言蒲團和俗稱眠單為蒲團大失義埤雅云蒲水草也似莞而褊有脊生於水崖柔滑而溫可以為席永平清規辨道法云晡時衩衣入堂就單位出蒲團而用坐禪未展單矣忠曰單謂眠單可知蒲團眠單二物也大慧杲禪師書答曾侍郎云公既與竹椅蒲團為侶希叟曇禪師廣録禪房十事蒲團頌云百草頭邊薦得何妨打塊成團直下千差坐斷無心猶隔重關聯珠詩格注云蒲團僧房坐具東坡詩後夜當獨來不煩主與賓蒲團坐紙帳自要觀我身椸架毗奈耶雜事云緣在室羅伐城苾芻隨處而安衣服便多垢膩被蟲蟻穿佛言不應隨處而置衣服當作衣架苾芻即便穿壁安衣令壁損壞佛言不得穿壁初造寺時應出木坎上置衣竿時諸苾芻房內置竿簷前不作佛言簷前亦作勿令闕事正字通云椸音移衣架曲禮男女不同椸架又方言榻前几趙魏間謂之椸凡直植曰椸橫架曰桁禪門規式云僧堂設長連床施椸架挂搭道具詳叢軌門挂搭處几案詳禪板處正字通云案几屬經案敕修清規遊方參請云古規首到客司相看次往堂司挂搭送單位經案定然後到侍司通覆詣方丈禮拜舊説曰衆寮案位言經案蓋衆寮是看經之處故以名之牀僧祇律云佛住舍衛城制戒不聽過量作牀乃至作牀腳應量作高修伽陀八指乃至修伽陀者如來應供正遍知八指者佛八指忠曰翻譯集曰佛指濶二寸止此即八指一尺六寸也繩床聯燈會要百丈海禪師章云師再參馬大師侍立次大師目顧繩床角拂子師云即此用離此用祖云汝向後開兩片皮將何為人師取拂子豎起祖云即此用離此用師挂拂子舊處祖震威一喝師直得三日耳聾摩訶止觀云安一繩床傍無餘座五車妙選云杜詩花影在繩床注云以繩穿為坐具即今之交椅也一云胡床隋惡胡改名交床唐改繩床事文類聚云今之交床制本自虜來始名胡床桓伊下馬踞胡床取笛三弄是也隋以讖有胡改名交床胡瓜亦改黃瓜唐柴紹擊西戎據胡床使兩女子舞則唐史臣追本語以書也唐穆宗長慶二年十二月見羣臣禮紫宸殿御大繩床則又名繩床矣琅邪代醉編云古者席地而坐未嘗有椅至晉乃有繩床即今上馬交床之類此用椅之漸也椅子敕修清規告香云鋪設罣罳椅子見罣罳處琅邪代醉編云古未有椅詳繩床處正字通云椅音倚借高坐具後有倚者今俗呼椅子品字箋云桌椅桌几之高者椅人所倚坐者此後世之借用非古音義椅子又作倚子傳燈録羅漢琛禪師章云玄沙嘗問曰三界唯心汝作麼生會師指倚子曰和尚喚這箇作什麼玄沙曰倚子曰和尚不會三界唯心玄沙曰我喚這箇作竹木汝喚作什麼曰桂琛亦喚作竹木玄沙曰盡大地覓一箇會佛法底人不可得參椅忠曰參椅者交椅也腳木乂字交加令可折疊參亦交也或云學者參問時師家坐此椅故云參椅也敕修清規遊方參請云凡寢堂中必設參椅示尊師道也事物紀原云搜神記曰胡床戎翟之器也風俗通曰漢靈帝好胡服景師作胡床此蓋其始也今交椅是三才圖會儀制類有交椅及椅踏圖竹椅忠曰以竹所造椅子也大慧杲禪師書答曾侍郎云公既與竹椅蒲團為侶不異善財見最寂靜婆羅門曲彔五祖演禪師録云上堂云行者不報來打鼓曲彔木頭上不免將錯就錯參碧巖録評龍牙參臨濟話云他致箇問端不妨要見他曲彔木床上老漢亦要明自己一段大事普燈録應菴華禪師章云虎丘忌日拈香曰平生沒興撞著這無意智老和尚做盡伎倆湊泊不得從此卸却干戈隨分著衣喫飯二十年來坐曲彔木懸羊頭賣狗肉知他有甚憑據雖然一年一度燒香日千古令人恨轉深虗堂愚和尚録示如足首座法語云以平等大心待四方衲子方可據曲彔床雪巖欽禪師録普説云凡遇五參見曲彔床上箇漢胡説亂道何不也歷在耳根篇海類編云彔盧谷切音祿刻木也正字通云説文彔別為部刻木篆篆也象形以篆形推之與互別舊本附互部非忠曰曲彔蓋刻木屈曲貌今交椅製曲彔然故異名曲彔木遂省木單稱曲彔也又有作曲録者依音同訛寫碧巖録云古人行腳遍歷叢林直以此事為念要辨他曲録木床上老和尚具眼不具眼又有作曲𩓪者亦依音同訛續燈録興化仁嶽章云問如何是和尚家風師云曲𩓪禪床又上方日益章上堂云五葉芬芳千燈續焰向曲𩓪木裡唱二作三五燈會元作彔晦菴光狀元録云行到汝州葉縣被一陳業風吹上首山曲𩓪木床上見箇老和尚云云曲木忠曰曲彔木床也雲門偃禪師録云上堂云諸方老禿奴曲木禪床上坐地求名求利問佛答佛問祖答祖屙屎送尿也三家村裏老婆傳口令相似識箇什麼好惡總似這般底水也難消祖英集送勝因長老偈云韶陽間出多慷慨權要雄雄曾絶待曲木據位知幾何利刀翦却令人愛長連床見椸架處傳燈録香林遠禪師章云問如何是玄師曰今日來明日去如何是玄中玄師曰長連床上南海寄歸傳云西方房迮居人復多臥起之後牀皆舉攝或內置一邊或移安戶外牀闊二肘長四肘半褥席同然又云西國講堂食堂之內元來不置大床多設木枮并小牀子聽講食時用將踞坐斯其本法矣神州則大牀方坐其事久之雖可隨時設儀而本末之源須識踏床禪苑清規赴粥飯云上床之法云云提面前袈裟次併以左手提之即踏床近裡而坐然後棄鞋保寧勇禪師録上堂云森羅及萬像皆於鏡中現以杖指云北面是廚庫南面是僧堂中間是佛殿直下指云者裏是什麼乃云踏床子也不識大慧武庫云張無盡至兜率語及宗門事曰疑香嚴獨腳頌德山托鉢因緣悅曰既於此有疑其餘安得無耶只如言末後句是有耶是無耶無盡曰有悅大笑遂歸方丈閉却門無盡一夜睡不穩至五更下牀觸翻踏床忽然省得忠曰踏床椅子前承足小几也又言腳凳竺原證道歌注舉張無盡因緣云至五更起來踏翻腳凳忽然大悟踏牀律名承足牀毗奈耶雜事云緣在室羅伐城佛言應誦經者可升高座其人坐師子座下埀雙足致有勞倦佛言應作承足牀苾芻不解佛言若座不移動應以甎作若移轉者可用版為雖以版作移舉時難可於四角各安鐵鐶隨意擎去僧祇律作承足機凳子忠曰椅子前承腳小几也大慧正法眼藏云法眼指凳子云識得凳子周匝有餘雲門云識得凳子天地懸殊天衣云識得凳子梌楠木做僧寶傳華嚴隆禪師傳云乘侍者曰禪門親見石門如何却嗣廣慧隆曰我初見廣慧渠方欲剃髮使我擎橙子來廣慧曰道者我有橙子詩聽取詩曰放下便平穩我時便肯伊禪門恐禪師乎正字通云凳舊注丁鄧切登去聲牀凳正韻橙几屬字林作凳品字箋云高而可憑者為几為桌低而可坐者為椅為凳三才圖會云機凳皆胡床之別名但機之制方凳之制修皆後人以意為之者卓凳忠曰卓前之凳子也或卓凳二物也敕修清規亡僧云或勤舊有田地米房舍床榻卓凳當盡歸常住腳凳踏床也見踏床處腳踏忠曰凳子也備用清規聖節升座云住持上腳踏問訊斂衣趺坐已下係行裝具祠部筒敕修清規裝包云衣被束前後包插祠部筒戒刀禪苑清規裝包云先插戒刀於右腋下次插祠部筒於左腋下祠部袋用絛或帶絡肩上更用絛帶一條橫繫腰間如未打後包以前繫挂定倒翻起祠部筒然後上為包更是便舊説曰自唐已來度牒外有祠部牒見簿券門牒以竹筒盛之行腳人隨身復子臨濟玄禪師録云大策子上抄死老漢語三重五重復子裹不教人見道是玄旨以為保重圓悟心要示圓上人語云刻意息心擇真正具頂門宗眼知識放下復子靠取成辦聯燈會要德山鑑禪師章云師到溈山挾復子於法堂從西過東從東過西顧視方丈溈山不顧師云無無便出去忠曰復當作袱字彙云袱房六切音伏包袱止此又云復方六切音幅重也説文重衣也止此非今義蓋二字音同袱字訛作復也敕修清規裝包云裝包之法用青布袱二條止此布袱即復子也已下係飲食器鉢玄應衆經音義云鉢盂補沫切鉢多羅又云波多羅此云薄謂治厚物令薄而作此器也鉢亦近字下羽俱切又説文云飯器也又律文作釪敕修清規辦道具云梵云鉢多羅此云應量器今略云鉢又呼云鉢盂即華梵兼名佛本行集經云北天竺有二商主一名帝利富婆二名跋利迦奉世尊酪蜜揣世尊思惟往昔諸佛悉皆受持鉢器我今當以何器受商主食時四天王疾共持四金鉢奉上世尊不受以出家人不合蓄此彼四天王更將四銀鉢玻𭹳鉢琉璃鉢赤珠鉢瑪瑙鉢𤥭璖鉢奉上悉皆不受時北方毗沙門天王告三天王言我念往昔青色諸天將四石器來奉我等可用受食時別有一天子名毗盧遮那白言仁等慎勿於此石器受食但供養如塔當有如來號釋迦牟尼出世宜將此四石鉢奉彼如來時四天王共將四石鉢奉佛世尊念四天王以信淨心奉我四鉢若我於一人邊受餘各有恨我今總受四鉢持作一鉢次第相重安置左手右手按下合成一鉢外有四脣而説偈言我昔功德諸果滿以發哀愍清淨心是故今四大天王清淨牢固施我鉢勝天王般若經云或有衆生見此菩薩今始成道或見菩薩久遠成道或見一世界四天王獻鉢或見十方恆河沙世界四天王獻鉢菩薩爾時度衆生故即受衆鉢重疊掌中合而為一其諸天王各不相見皆謂世尊獨用我鉢菩薩摩訶薩行般若波羅蜜以方便力示現此事忠曰三世佛法得道時皆四天王上自然石鉢見大智度論六物圖云梵云鉢多羅此名應器有云體色量三皆應法故若準章服儀云堪受供者用之名應器故如鉢是梵言此方語簡省下二字明體者律云大要有二泥及鐵也五分律中用木鉢犯偷蘭罪僧祇云是外道標故又受垢膩故祖師云今世中有夾紵漆油等鉢並是非法義須毀明色者四分應熏作黑色赤色僧祇熏作孔雀咽色鴿色者如法善見鐵鉢五熏土鉢二熏律中聽作熏鉢爐等此間多用竹煙色則易上明量者四分中大鉢受三斗姬周三斗即今唐斗一斗小者受斗半即今五升中品可知大小之間宗覺律師纂注云此方古德傳説昔者南京有唐朝升以日本弘安年中所定升計之唐一升即弘安六合五勺仍量下品五升正得參升二合五勺以弘安一升校今寬永年中所定升正是七合即弘安參升二合五勺當寬永二升二合七勺五撮也今時行事家為深防故更增二勺五撮而以二升參合為下品鉢量加受之行事鈔鉢器制聽篇云四分大鉢受三斗小者受斗半中品可知此斗升不定此律姚秦時譯彼國用姬周之斗此斗通國準用一定不改量法俗算有八圭抄撮勺合升斗斛謂因增法名也準唐斗上鉢受一斗下者五升資持記注指俗法者孫子算經十粟為圭十圭為抄十抄為撮十撮為勺十勺為合十合為升十升為斗十斗為斛相因增法示可準據云云唐朝雜令用姬周三斗為一斗今此俗中例用唐斗宜準為量毗尼母論説鉢中云齊量應者升半已上至二升半是名應不應者不滿升半過二升半是名不應希叟曇禪師廣録禪房十事鉢盂頌云做處全無滲漏用時開口向天盡大地人飫飽只圖箇不知恩緇門警訓載大智律師鐵鉢賦云吾有鐵鉢裁製合轍斗半為量不大不小竹煙熏治唯光唯潔似二分之明珠若將圓之皎月清晨入聚羣心發越黃粢傾散有若金沙白淅高堆宛如積雪與香積之變現無殊比自然之天供何別咨爾同舟宜自櫽括不耕不耘不鋤不割有生之命自何而活且夫口腹無厭貪源叵竭正念微乖羅剎已奪嗜一時之甘美為萬劫之飢渴萬金可受保君未徹杯水難堪聖教明説是宜五觀無違三匙有節慎勿枉彼信施以養穢軀會須藉此資緣早求自脫已下録禪律辨難虎關濟北集木鉢辨云或問禪家持木鉢律輩多生謗如何答曰禪門古德知佛意故不忌木鉢耳曰佛意如何曰佛制木鉢有三意一垢二簡三因其垢者木鉢用已洗濯垢穢不除木之性爾也蓋印度俗王臣貴族用金玉寶器賤庶之者多用木器之不漆者沙門法棄寶器若用不漆木器垢不除故薰瓦鐵二鉢而用耳雖瓦鐵不薰有垢薰即無垢木鉢不堪薰故制焉其簡者天竺梵志種古來用木器如來後出為異也故立瓦鐵而為簡也其因者佛在王舍城時樹提居士客從海還持栴檀段與之居士作檀鉢置高杙上作是言沙門婆羅門不以梯杖能得者取時富樓那迦葉尼犍陀等諸外道挑頭皆去賓頭盧尊者現神足取鉢便示諸比丘言汝等看是鉢可愛佛種種呵責云何一木鉢故現過人法汝不應此閻浮提住賓頭盧自此到瞿耶尼起僧坊畜弟子宣佛法佛集比丘語從今不聽畜八種鉢金銀琉璃摩尼銅白蠟木石畜者突吉羅聽二種鐵瓦鉢是知佛制寶物不必在木以檀鉢寶木併制衆木也佛意若嫌八種鉢自鉢何用石耶明知制戒皆有事因不啻木鉢矣唐朝禪門古德以謂支那無梵志種不必欲簡異木漆器易洗無垢亦非檀鉢三種制意支那不干况隨方毗尼何有拘忌支那本朝木鉢賤於鐵鉢矣言其易辨而非寶者木鉢勝於鐵鉢矣然此三義且就三藏小教而言大乘方廣不必爾也文殊師利根本儀軌經第十曰若是瓦鉢洗已薰乾其餘木鉢金銀等鉢洗淨無垢即得受用又蘇婆呼童子經上曰復次童子念誦人須持四種應器木鐵瓦匏等鉢極須團圓細密無缺勿使破漏以此等而言菩薩比丘大乘正業不必拘三藏偏軌也禪門古德不謾立規矣梵網經云袈裟皆使壞色一切國人所著衣服比丘皆應與其俗服有異是亦如來簡異之意也非獨鉢也服已無定色鉢何拘木乎是以禪家持木鉢知佛意故耳矣忠曰大智海無為元公辨木鉢援蘇婆呼經早在虎關前義堂日工集云前代律家難禪宗木鉢曰是外道制也時有東福無為和尚稱博洽答曰大藏中有蘇婆呼童子經聽比丘蓄鐵木瓦匏四鉢今檢極樂寺藏中有此經爾後虎關和尚作木鉢辨其謗遂止余聞淨智芳庭和尚説云近久修園院律師宗覺覆破木鉢辨云支那無梵志種不必欲簡異矣此言不然既為簡異外俗也支那本朝俱用木漆器是方土風俗今欲異於此者何奚可畜木鉢乎忠曰覺之辨爽矣夫世尊之簡異者材兼形也支那日本之俗雖通用木器材然未曾用其如佛制應器形者汝若言不取形唯取材者彼章服田衣豈非亦為簡俗耶俗服用布材綿材而佛徒亦著綿材布材則何以為簡異哉但其簡異在田相與非田相而已覺又云虎關引二經為憑據然此經中唯是説持真言行者律儀則非出家之五衆通制是則密乘不共之教典自非修瑜伽者孰敢依行忠曰吁覺公何不見虎關能別語曰禪家持木鉢知佛意故止此是以禪家語揀於汝也又誰言汝律家自今當輟瓦鐵而從吾木鉢耶世尊既聽於修瑜伽者夫到禪家專業見性者則劇於修瑜伽律拘言迹禪知佛意復次世尊豈教修密者用不應律儀之器耶此是佛之密意固非博地容測矣已二經聽木鉢而餘小乘律不聽則濟北曰捨小乘偏軌有何咎覺又云汝若棄捨三藏別求菩薩具足律儀請問何者是耶忠曰噫嘻覺乎我指桃則汝罵李又誰言大乘行者詳細行事當捨小乘律儀而別求之耶正今所論木鉢耳謂須丙捨三藏制木鉢者而依大乘聽木鉢者則濟北所援二經是也又覺鼓怒於三藏偏軌之言廣明大小通戒之義豫別有辨今不與木鉢故不繁于此忠曰傳説東福開山興法之日泉涌寺差一僧到慧峰詰曰禪家用木鉢何違佛制請聞其説一衆相顧以為難酬遂欲告聖一時維那者出衆曰者般不足煩國師唇吻即對使曰汝須回言東福維那聊答來問禪家十二時以此事為念有何間工夫到噇合子邊使回反命聞者以為得體忠謂雞胤部引頌云隨宜覆身隨宜處住隨宜飲食疾斷煩惱有三衣覆身佛亦開許無三衣覆身佛亦許之僧伽藍內住佛亦開許界外亦許時食佛隨許非時午前食佛亦許故衣處食皆名隨宜唯言疾斷煩惱止此準此教律家若專證淨則瓦鐵木鉢應許隨宜矧破相者耶或徒人我是非忘本競末則恐扶律教主不以儞餤乎瓦鐵為善住威儀焉忠又曰濟北和尚辨木鉢太有條理唯其言佛意若嫌八種鉢自鉢何用石耶止此者失辭夫佛自用石鉢而不聽弟子畜石鉢在大智度論問難決擇焉濟北適遺之乎又四分律云瓶沙王以石鉢施諸比丘比丘白佛佛言不應畜此是如來法鉢若畜得偷蘭遮又五分律云若畜金銀七寶牙銅石鉢皆突吉羅若畜木鉢偷羅遮已下辨無底雲門偃禪師録云師因喫茶次云茶作麼生滋味僧云請和尚鑑師云鉢盂無底尋常事面上無鼻笑殺人智門祚禪師録云問如何是無底鉢盂師云挂向壁上進云未審將何齋粥師云瓦碗竹筯普燈録冶父川禪師章云上堂曰群陰剝盡一陽生草木園林盡發萌唯有衲僧無底鉢依前盛飯又盛羹忠曰律家鉢無足云無底禪語所謂無底鉢者底脫不可盛物也與律家無底義別章服儀云袈裟無領標解脫之衣鉢盂無底表難量之器應法記云相傳是廬山遠師語合云袈裟無領非朝宗之服鉢盂無足非廊廟之器今又易之難量謂無盡也止此可知鉢制本無底今時禪家之鉢多上濶下窄而有環足甚非法好古之士宜復其正矣更鉢支處詳辨梁高僧傳廬山慧遠傳云遠答桓玄書曰袈裟非朝宗之服鉢盂非廊廟之器沙門塵外之人不應致敬王者傳無無領無足之字應量器鉢多羅翻應器詳鉢處行事鈔鉢器制聽篇資持記云準下加法云應量受則是應量之器對法為名又云言應量者明合法也體色少濫品量多乖故特標之忠曰應義三一對法如此引二對人鉢處引章服儀三對食資持記云或處説云量腹而食故云應器即對食為名頭鉢忠曰應量器又名頭鉢日用軌範云不得將頭鉢盛濕食頭鐼第一鐼子曰頭鐼十誦名半鉢四分名次鉢詳鐼子處日用軌範云鉢刷安第二鐼子縫中舊説曰第一鐼子稱頭鐼盛羹者三箇鐼中最大故名頭鐼今以刷安頭鐼與第二鐼之間也鐼子忠曰應量器內纍三箇小鉢自大到小總名鐼子世尊成道受四天王四鉢重作一鉢外有四脣見鉢處今鐼子三與應器重成四脣蓋本世尊故事五分律音釋云犍瓷梵語也此云淺鐵鉢今之鐼子也犍渠焉切瓷音茨鐼音訓釋氏要覽云鉢器大小數十誦律云鉢半鉢大鍵𨩲鍵音虔𨩲音咨經音疏云鉢中之小鉢助鉢用故小鍵𨩲僧祇同四分律云鍵𨩲入小鉢小鉢入次鉢次鉢入大鉢此律言小鉢即十誦大鍵𨩲也次鉢即半鉢也淮諸律四事可見也今呼為鐼子鐼音訓切韻云鐵類也非器故五分律云諸比丘於鉢中啜粥苦熱不可捉佛言聽別作啜粥器忠曰如今粥受鐼子而啜蓋當啜粥別器子湖神力禪師録云問法身還喫飯也無師云鉢盂鐼子什麼人受持云云廣燈録洞山聰禪師章云僧問學人進又不得退又不得時如何師云抱頭哭蒼天學人無語師又云汝還知鉢盂鐼子落處麼續燈録慈明圓禪師章上堂云鉢盂粗鐼子細字脫匙筯短長無一截注鐼許運切翻譯名義集云鍵𨩲經音疏云鉢中之小鉢今呼為鐼音訓子康熙字典云鐼唐韻火運切集韻吁運切並音訓説文鐵屬又集韻逋昆切音奔平木器鍵𨩲忠曰大鍵𨩲即第二鐼子小鍵𨩲第三鐼子見鐼子處雜阿含經云譬如一器有一處人名為揵茨有名鉢有名匕匕羅有名遮留有名毗悉多有名婆闍那有名薩牢如彼彼所知我亦如是説音釋云揵茨梵語亦云鍵𨩲母論譯為淺鐵鉢今呼為鐼子是也揵巨言切茨才資切四分律云欲分粥不知何器分佛言若以鍵𨩲若小鉢若次鉢若杓作分又四分律云乞食比丘得飯乾飯等并著一處佛言不應爾雜著一處若是一鉢應以物隔若樹葉皮若鍵𨩲若次鉢若小鉢應手巾裹出要律儀云鍵𨩲者為助食器毗奈耶云鍵𨩲者淺鐵鉢也翻譯名義集云鍵𨩲音虔咨母論譯為淺鐵鉢或作揵茨建鎡並梵音輕重鉢支四分律云鉢若不正應作鉢支五分律云比丘以鉢盛食著地翻之佛言聽作鉢支用銅鐵牙角瓦石竹木除漆樹乃至結草著下亦聽又作鉢枝十誦律云鉢枝法者佛聽用鍮石銅鐵錫白鑞瓦作應好掌護莫令失更求覓妨行道是名鉢枝法又作鉢鈙僧祇律云雜物者鉢鉢鈙匙腰帶刀子等蓋鉢支也然字書不通支集韻鈙語綺切音蟻玉篇釜也又作鉢搘傳燈録衛國道禪師章云師因疾有人來問疾師不出其人云久聆和尚道德忽承法體違和請和尚相見師將鉢鐼盛鉢搘令侍者擎出呈之其人無對忠曰近來禪家鉢上濶下窄底平有淺環足本不傾動又加以鉢支已為無用余竊推之古製下圓而無底別有鉢支停其轉動後以鉢支形直貼鉢底而造今猶有直貼鉢支造即於鉢支脣處少輪起而象鉢支者若如今製則鉢支已貼本鉢不用更造鉢支承本鉢展轉訛謬有如此者楪日本禪家稱鉢支為楪雲門偃禪師録云師拈一楪果子與一僧其僧接得便去事始云崔寧女以金盞無儲病其尉指取楪子承盛之詳托子處鉢單日用軌範云先展鉢單仰左手取鉢安單上忠曰鉢單之製柿汁纍合厚紙造之橫摺三之一更豎三摺如乙字展鋪以承鐼子展時埀短摺方在床外匙南海寄歸傳云西方食法唯用右手必有病故開聽畜匙其筯則五天所不聞四部亦未見而獨東夏共有斯事俗徒自是舊法僧侶隨情用否筯既不聽不遮即是當乎略教用時衆無譏議東夏即可行焉若執俗有嗤嫌西土元不合捉略教之旨斯其事焉西域記云食以一器衆味相調手指斟酌略無匙箸至於老病乃用銅匙永平清規赴粥飯法云遐尋西天竺之佛儀如來及如來弟子右手摶飯而食未用匙筯佛子須知矣諸天子及轉輪聖王諸國王等亦用手摶飯而食當知是尊貴之法也西天竺病比丘用匙其餘皆用手矣筯未聞名未見形矣筯者偏震旦以來諸國見用而已今用之順土風方俗矣既為佛祖之兒孫雖應順佛儀而用手以飯其儀久廢無師溫故所以暫用匙筯兼用鐼子矣事物紀原云方言曰匕謂之匙説文曰匕所以取飯文王之贊易至震曰不喪匕鬯大東之詩曰有救棘匕注云匕所以載鼎實則匕三王之制也已下録手摶食支竺法五分律云諸比丘以食手捉淨飲器肥膩汙穢餘比丘惡之佛訶責告諸比丘食時不應以右手捉淨飲器應淨洗手捉飲器忠曰可知右手摶食故有肥膩行事鈔訃請設則篇云僧祇食時應護右手當以左手受資持記云彼國用手摶食此土餅果亦多用手禮記曲禮云共飯不澤手注為汗手不潔也澤謂捼莎也禮飯以手正義曰潔淨也若澤手手必汗生則不潔淨一本汗生不圭圭潔也言手澤汙飯也疏共飯不澤手者亦是共器盛飯也澤謂光澤也古之禮飯不用箸但用手既與人共飯手宜潔淨不得臨食始捼莎手乃食恐為人穢也筯與匙交看篇海類編云筯治據切與箸同事物紀原云禮記曰飯黍無以箸韓子曰紂為象箸觀之明箸前有商紂始以象為之耳筯淨頭入衆日用云入則先匙出則先筯手把處為淨頭向上肩匙筯袋日用軌範云鉢拭摺令小并匙筯袋近身橫放入則先匙出則先筯匙筯籠匙筯袋又名匙筯籠拈八方珠玉集云佛海云雖則匙筯籠橫且圖得碗飯喫普燈録卍菴顏禪師章上堂云粥足飯足俯仰隨時筯籠不亂攙匙老鼠不咬甑山家活計淡薄長情鉢刷日用軌範云鉢刷安第二鐼子縫中出半寸許盛生飯小補韻會云刷所劣切説文刮也爾雅清也忠曰刷者小板一頭圓形漆髹刷清鉢內粒粘之器楊枝忠曰十八物之一也梵網經云若佛子常應二時頭陀冬夏坐禪結夏安居常用楊枝澡豆三衣瓶鉢坐具錫杖香爐漉水囊手巾刀子火燧鑷子繩床經律佛像菩薩形像而菩薩行頭陀時及遊方時行來百里千里此十八種物常隨其身頭陀者從正月十五日至三月十五日八月十五日至十月十五日是二時中此十八種物常隨其身如鳥二翼華嚴經普賢行願品甘露火唐經作無厭足章云嚼楊枝具功德者一銷宿食二除痰癊三解衆毒四去齒垢五發口香六能明目七澤潤咽喉八脣無皴裂九增益聲氣十食不爽味晨朝食後皆嚼楊枝諸苦辛物以為齒木細心用之具如是德永平道元禪師曰嚼楊枝先右手取楊枝咒願可誦華嚴淨行品偈云手執楊枝當願衆生心得正法自然清淨及嚼復誦偈云晨嚼楊枝當願衆生得調伏牙噬諸煩惱楊枝長四指或八指十二指或十六指摩訶僧祇律云齒木應量用極長十六指極短四指大如手小指或更細無妨形如手小指一頭粗一頭纖古云如如來指形嚼其粗頭令如縷須揩磨齒表裡諸經要集云十誦律云佛言嚼楊枝有五利益一口不苦二口不臭三除風四除熱病五除痰癊復有五事利益一除風二除熱三別味四能食五眼明三千威儀云用楊枝有五事一斷當如度二破當如法三嚼頭不得過三分四梳齒當中三齒五當汁澡自用刮舌有五事一不得過三反二舌上血出當止三不得大振手污僧伽梨若足四棄楊枝莫當人道五當著屏處十誦律云佛聽嚙木三種枝上中下上者尺二寸下者六寸餘者是中是名齒木枝法擲齒法者不應用利物擲齒不應強擲不應破齗是名擲齒法刮舌法者不應用利物刮令傷舌是名刮舌法南海寄歸傳云每日旦朝須嚼齒木揩齒刮舌務令如法盥漱清淨方行敬禮若其不然受禮禮他悉皆得罪其齒木者梵云憚哆家瑟詑憚多譯之為齒家瑟詫即是其木長十二指短不減八指大如小指一頭緩須熟嚼良久淨刷牙關若也逼近尊人宜將左手掩口用罷擘破屈而刮舌或可別用銅鐵作刮舌之篦或取竹木薄片如小指面許一頭纖細以剔齗牙屈而刮舌勿令傷損亦既用罷即可俱洗棄之屏處凡棄齒木若口中吐水及以洟唾皆須彈指經三或時謦咳過兩如不爾者棄便有罪又云少壯者任取嚼之耆宿者乃推頭使碎其木條以苦澀辛辣者為佳嚼頭成絮者為最粗胡葈根極為精也即蒼耳并截耳入地二寸堅齒口香消食去癊用之半月口氣頓除牙疼齒憊三旬即愈要須熟嚼淨揩令涎癊流出多水淨漱斯其法也次後若能鼻中飲水一抄此是龍樹長年之術必其鼻中不慣口飲亦佳久而用之便少疾病又云齒木名作楊枝西國柳樹全稀譯者輒傳斯號佛齒木樹實非楊柳那爛陀寺目自親觀既不取信於他聞者亦無勞致惑檢涅槃經梵本云嚼齒木時矣釋氏要覽云嚼楊枝僧祇律名齒木嚼一頭碎用剔刷牙齒中滯食若口有熱氣及生瘡應嚼楊枝咽汁百一羯磨云嚼楊枝須在屏處不得顯露及往還潔淨處或棄齒木先以水洗乃謦咳戒彈指警覺方可棄於屏處若其異者得越法罪鉢拭鉢巾也日用軌範云鉢拭摺令小并匙筯袋近身橫放永平清規赴粥飯法云鉢拭長一尺二寸注布一幅也鉢袱日用軌範云展鉢之法想念偈然後解袱帕展淨巾覆膝帕摺轉三角莫令出單外蓋膝巾日用軌範喫食法云不得先收蓋膝巾不得以膝巾拭汗淨巾蓋膝巾亦名淨巾日用軌範展鉢法云展淨巾覆膝鉢囊毗奈耶雜事云佛在江豬山施鹿林中時有苾芻手擎鉢去在路腳跌鉢墮遂破因斯闕事以緣白佛佛言苾芻不應手擎其鉢便以衣角裹鉢而去廢闕同前佛言應作鉢袋盛去苾芻手携招過如上佛言不應手持而去應可作襷挂膊持行若異此者得越法罪音釋襷普患切衣系也膊伯各切肩膊也又毗奈耶雜事云鉢袋襻應闊作內安㲲以線絡之勿令卷縮又毗奈耶雜事云佛言乞食應持鉢絡掩蓋而去應作方尺布袋提上兩角置鉢在中角施短襻將行乞食得遮塵土復易擎持注神州比來無此鉢袋下留尖角鉢不動搖不同平巾轉動流溢作時應取布小尺二尺宜使正方傍邊剪却衣橫襻用時極理安穩也四分律云手捉鉢難護持佛言聽作鉢囊盛不繫囊口鉢出佛言應繫手捉鉢囊護持佛言應作帶絡肩十誦律云佛言從今行時不聽捉杖絡囊犯者突吉羅佛自恣後人間遊行有一羸瘦比丘手捉鉢行佛知故問汝何以手捉鉢行答言無物可盛佛言從今羸瘦老病比丘僧羯磨聽捉杖絡囊盛鉢行碧巖録云或若有箇漢信得及把得住不受人瞞祖佛言教是什麼熱碗鳴聲便請高挂鉢囊拗折柱杖管取一員無事道人有一般漢受人商量祖佛言教如龍得水似虎靠山却須挑起鉢囊橫擔柱杖亦是一員無事道人碗敕修清規庫司四節特為首座大衆湯云頭首不下鉢庫司備碗楪忠曰碗字韻書不出蓋俗訛正字通云碗與碗同又云碗烏捲切剜上聲説文小盂俗作碗溈山警策云碗鉢作聲食畢先起去就乖角僧體全無禪林寶訓云雪堂曰高菴住雲居用姪為監寺用姪處己雖儉與人甚豐叢林有用大碗之稱忠曰蓋餉人以大碗無其吝食之意也楪子忠曰日本禪林碗具有楪子與鉢支稱楪者別敕修清規云庫司備碗楪見碗處文公家禮祭器有碗楪子忠曰楪字韻書無器皿訓於演繁露初得解程大昌演繁露云酉陽雜爼劉録事食鱠數疊今俗書楪字誤以其可疊故名為疊也然牒字乃疊札為之則以疊為楪亦有理也忠曰楪子淺而底平環足便于纍疊也周祈名義考云今俗言楪以代籩豆也楪本無此字俗書也碧巖録云碗子落地楪子成七八片聯燈會要睦州陳尊宿章云示衆云裂開也在我捏聚也在我時有僧問如何是裂開師云三九二十七菩提涅槃真如解脫即心即佛我且與麼道汝又作麼生僧云某甲不恁麼師云盞子落地楪子成七片朝野僉載云婁師德有鄉人姓婁者為屯官犯贓師德切責之曰汝辭父娘求覓官職不能謹潔知復奈何將一楪鎚餅與之曰噇却作箇飽死鬼去飯桌敕修清規方丈管待新舊兩序云燒香侍者與請客侍者巡揖坐畢燒香進卓侍者一班列住持前問訊入位行湯下食畢至行飯時燒香侍者離位燒香下嚫飯畢退卓鳴鼓講茶禮忠曰當作桌韻書卓注無器物訓正字通云桌竹角切音卓俗呼几案曰桌四分律云佛言若為和尚阿闍黎有所取與聽用銅槃若案若機飲食所須之物盡持置其上一時授與五分律云諸比丘擎食患重佛言聽安機忠曰機蓋今飯桌也果桌忠曰安果𩝐之几也聯燈會要洞山價禪師章云師與泰首座喫果子次師問有一物上拄天下拄地黑如漆常在動用中動用中收不得儞道過在甚麼處泰云過在動用中師便喝掇却果卓和桌忠曰和國樣之桌子也排碗楪之案日本俗呼曰膳大德寺此稱和桌湯瓶忠曰銅瓶盛滾湯以為點茶點湯之用敕修清規專使特為新命煎點云行茶遍瓶出如前問訊收住持盞又新挂搭人點入寮茶云行茶遍瓶須從穿堂入文公家禮云執事者執湯瓶隨之點茶詳飲啖門點茶處茶筅字彙云筅同箲箲蘇典切音鮮箲飯具正字通為筅與箲別止此然則筅俗用正作箲文公家禮云茶筅之制不見於書傳惟元謝宗可有詠茶筅詩味其所謂此君一節瑩無瑕夜聽松風漱玉華萬縷引風歸蟹眼半瓶飛雪起龍牙之句則其形狀亦可倣佛見矣或謂茶筅即蔡氏茶録所謂茶匙非是陸羽茶經有茶具十六事其中有歸潔注云竹筅也宋徽宗大觀茶論云茶筅以斤竹老者為之身欲厚重筅欲疏徑本欲壯而末必眇當如劍瘠之狀蓋身厚重則操之有力而易于運用筅疏徑如劍瘠則擊拂雖過而浮沫不生漁隱叢話云韓子蒼謝人寄茶筅子詩云看君眉宇真龍種猶解橫身戰雪濤盧駿元亦有此詩云到底此君高韻在清風兩腋為渠生皆善賦詠者然盧優於韓建盞忠曰中華建安所造茶盞此方學製者皆亦名建盞宋蔡襄茶録云茶色白宜黑盞建安所造者紺黑紋如兔毫其柸微厚熁之久熱難冷最為要用出他處者或薄或色紫皆不及也其青白盞鬬試自不用約翁儉禪師録次西澗和尚謝太守惠建盞韻頌云提起玻𭹳已再三分明埀釣在深潭舌頭若具通方眼一啜方回苦口甘空盞舊説曰不盛茶湯之盞曰空盞非器通名敕修清規大挂搭歸堂云寮主相接入門對觸禮一拜敘寒溫畢分手坐獻空盞托子忠曰托子承茶碗器也李濟翁資暇録云茶托子始建中蜀相崔寧之女以茶杯無襯病其尉指取楪子承之既啜而杯傾乃以蠟環楪子之央其杯遂定即命匠以漆環代蠟進於蜀相蜀相奇之為製名而話於賓親人人為便用於代是後傳者更環其底愈新其製以至百狀焉貞元初青鄆油禬為荷葉形以襯茶碗別為一家之楪今人多云托子始此非也蜀相即今升平崔家訊則知矣呂毖事物初略云唐德宗建初中崔寧之女以金盞啜茶盞熱痛其指乃取楪子承其盞既啜而傾又以蠟環楪子中坐之盞遂定穩不搖因遣匠者以漆環易蠟寧奇之乃制為托子以行于世此托子之始也托子亦作橐子蓋假字非正聯燈會要松山和尚章云師與龐居士喫茶次士拈起橐子云人人盡有分因甚麼道不得師云只為人人有分所以道不得云云又趙州諗禪師章云僧問如何是佛法大意師云這橐子是大王送來五燈會元扣冰澡先古佛章云應閩主之召延居內堂敬拜曰謝師遠降賜茶次師提起橐子曰大王會麼曰不會曰人王法王各自照了曲盆忠曰大圓盆盛茶盞數箇日本禪林此名曲盆凡特為之外用此器行茶盞也圓盤忠曰蓋曲盆也大鑑清規栴檀林須知曰凡取點茶之湯只沙彌喝食入取茶盞及臺并圓盤盆湯瓶係副寮管領折水桶忠曰棄鉢水餘殘器名折水桶蓋飲半棄半故言折減損之義敕修清規專使特為新命煎點云行食遍燒香下住持嚫次行大衆嚫畢歸位伴齋俟折水出鳴鼓日用軌範云未折鉢水不得先收蓋膝巾傳燈録五雲山華嚴道場志逢大師嗣天台韶國師章云一日因入普賢殿中宴坐倐有一神人跪膝于前師問曰汝其誰乎曰護戒神也師曰吾患有宿愆未殄汝知之乎曰師有何罪唯一小過耳師曰何也曰凡折鉢水亦施主物師每常傾棄非所宜也言訖而隱師自此洗鉢水盡飲之積久因致脾胃疾十載方愈注云凡折退飲食及涕唾便利等並宜鳴指默念咒發施心而傾棄之僧祇律衆學法云不得以鉢中殘食棄地應當學小補韻會云折之列切毀棄也戰國策云戰折兵之半注云折閲之折減損也食列反優婆塞戒經雜品云善男子無財之人自説無財是義不然何以故一切水草人無不有雖是國主不必能施雖是貧窮非不能施何以故貧窮之人亦有食分食已洗器棄蕩滌汁施應食者亦得福德飯巾雪峯在德山作飯頭曬飯巾詳雜行門托鉢處忠曰蓋掩飯桶上布巾也生盤忠曰撤生飯器禪林類聚云南泉願禪師一日因齋次乃自將生盤去首座前云出生𡁠時杉山堅和尚為首座乃云無生師云無生猶是未師才行數步首座乃召云長老長老師回顧云作麼首座云莫道是未又生臺曰生盤宗鏡録云寶堅和尚云我見老鴉在生槃上回頭轉腦便全體見渠法身生臺忠曰靜僻人稀處設臺案聚著大衆生飯而恣禽蟲噉啄此名生臺又名生盤見生盤處石屋珙禪師録山居詩云烏來索飯生臺立僧去化糧空鉢還已下係浴具浴室屏風敕修清規知浴云第三通行者入浴此時住持方入以屏風遮隔而浴又云如住持有故欲同頭首先浴則不用設屏障浴室笐竿日用軌範開浴云先以五條手巾挂笐竿上展浴袱字彙云笐同𥮕𥮕曬衣竿康熙字典云笐又集韻胡降切音巷挂衣架也一曰竹列浴室淨竿教誡律儀入溫室法云入浴室內脫淨衣安淨竿上脫觸衣安觸竿上浴室觸竿見浴室淨竿處浴袱日用軌範開浴云展浴袱取出浴具放一邊腳布舊説曰浴室之階鋪布而防滑此云腳布與服章門腳布不同備用清規知浴云出面盆拖鞋鋪腳布已下係廁具廁笐竿日用軌範抽脫云解絛繫笐竿上笐義見浴室笐竿處廁籌敕修清規淨頭云換籌洗廁燒湯添水須是及時日用軌範云不得多用籌子古云浴湯少使籌子休拈有者使了以水洗之安廁邊空處諸經要集云毗尼母經云若上廁去時應先取籌草至戶前三彈指作聲若人非人令得覺知若無籌不得壁上拭不得廁板梁杙上拭不得用石不得青草土塊軟木皮軟葉奇木皆不得用所應用者木竹葦作籌度量法極長一搩手短者四指已用者不得振令污淨者不得著淨籌中是名上廁用籌法輟耕録云今寺觀削木為籌置溷圊中名曰廁籌北史齊文宣王嗜酒淫泆肆行狂暴雖以楊愔為相使進廁籌然則愔所進者豈即此與正字通云廁同厠厠七四切雌去聲清也溷厠也謂之清者以其不潔當除之也釋名雜也言人雜厠其上也廁簡子廁籌又名廁簡子南唐書浮屠傳云南唐有國蘭若精舍漸盛於烈祖元宗之世後主即位好之彌篤輒於禁中崇建寺宇延集僧尼後主與周后頂僧伽帽披袈裟課誦佛經跪拜頓顙至為瘤贅親削僧徒廁簡試之以頰少有芒刺則再加修治江南野録又云李後主親為桑門削作廁簡子試之腮頰少有澀滯者再為治之淨籌忠曰已使厠籌為觸籌未使厠籌為淨籌日用軌範云古云入厠用籌分觸淨觸籌見淨籌處厠紙忠曰天竺皆用籌支那僧依竺法又有間用紙者今引用紙數證唐高僧傳惠寬傳云綿竹宋尉云我不信佛唯信周孔寬聞之致書曉喻宋曰此道人徵異者當試有靈不取書名處用拭大便當即糞門裂腳起不得自唱我死即召寬來雖悔過造經像盈月便卒東坡問答録云東坡與佛印最厚往來不常一日去訪佛印語言酬答不覺坐久東坡倉皇登廁有一行者會意便隨後送些茅紙與之東坡喜其會事次日以一本度牒捨與披剃一寺僧行駭然才知其因送茅紙之有功也真臘風土記元周達觀撰述真臘國人風俗云凡登溷既畢必入池洗淨止用左手右手留以拿飯見唐人登廁用紙揩拭者笑之甚至不欲其登門婦女亦有立而溺者可笑可笑宋濂護法録桐江大公行業碑銘序云嘗患滯下疾拭淨不忍用廁紙摘菽葉充之其刻苦蓋人之所不能堪胡應麟甲乙剩言云有客謂余曰嘗客安平其俗如廁男女皆用瓦礫代紙殊為嘔穢余笑曰安平晉唐間為博陵縣鶯鶯縣人也為奈何客曰彼大家閨秀當必與俗自異余復笑曰請為君盡廁中二事北齊文宣帝如廁令楊𢄈執廁籌是帝皇之尊用廁籌而不用紙也三藏律部宣律師上廁法亦用廁籌是比丘之淨用廁籌而不用紙觀此廁籌瓦礫均也不能不為鶯鶯要處掩鼻耳客為噴飯滿案淨桶日用軌範抽脫法云安淨桶在前鳴指三下驚噉糞鬼舊説曰淨桶又名觸桶元是觸器却名淨桶者凡厠是觸穢處故令極淨潔為要以西淨東淨為名是也到器亦爾故名淨桶又見殿堂門西淨處觸桶淨桶又名觸桶見淨桶處香木舊説曰香木出廁去穢之木以香材造之懸笐竿端兩手摩擦為淨如今削作八角矣或漆塗者非也後架手巾緇門警訓云後架手巾須多備三兩條詳資身細器中手巾處已下係喪具靈龕敕修清規尊宿入龕云小師侍者親隨人安排洗浴著衣淨髮入龕龕義見莊嚴具龕處又入龕法見喪薦門浴船忠曰浴船即浴槽之類浴亡軀器也敕修清規亡僧云如病僧瞑目延壽堂主即報維那令堂司行者報燒湯覆首座知客侍者庫司差人擡龕浴船安排浴亡真亭敕修清規尊宿出喪云庫司喪司相關提調喪儀香亭真亭幢幡唄樂龕前傘椅湯爐挑燈竹篦拄杖拂子香合法衣等物舊説曰真亭挂亡尊宿真影之器忠曰真亭製四柱四字其形如亭四傍皆張薄紗透視玲瓏前擔扁真亭兩字而影前安牌或真影有贊辭自書名則不復用牌喪赴化壇時此器在龕前扛而進發續文獻通考皇后喪禮云明穆宗隆慶元年孝潔肅皇后遷祔永陵儀云云執事官進龍輴于享殿下設真亭神位輿諡册寶輿于殿前香亭見真亭處忠曰器形如亭四傍紗籠前扁香亭兩字大同真亭製內安大香爐尊宿之喪赴化壇時香亭在真亭前舁而進前雪柳舊説曰雪柳者凡生人相別折柳綰作環而送其行蓋寓期再還之意如今送亡者以雪柳亦惜別之義也因唱聖號投之棺上只喪禮事素故雖有柳名而不做青乃截白紙象枝葉故云雪柳敕修清規亡僧云堂司行者預造雪柳幡花又送亡云大衆兩兩次第合掌而出各執雪柳幻住庵清規亡僧云雪柳兩瓶供養東漸清規云中巖曰數所投棺中雪柳知衆多少後時依數俵嚫山堂肆考云長安東灞陵有橋漢時送行者多至此折柳送別又云折柳亭在金陵城上賞心亭下宋張詠建為餞送之所三體詩張喬寄維陽故人詩云離別河邊綰柳條千山萬水玉人遙云云解者曰綰還也取速還之義也溫庭筠折柳枝詞云御陌青門拂地埀千條金縷萬條絲如今綰作同心結贈與行人知不知潛確類書云李白詞年年柳色灞陵傷別又云折柳贈行折梅寄遠見古今注素花敕修清規尊宿移龕云下間置龕用麻布幃幕前列几案爐瓶素花香燭不絶忠曰縷截白紙纏柴枝如花今多用四枝蓋可大於雪柳之製也娑羅華釋氏要覽云若應之大師五杉集頗合禮式或堂有三間即置龕於西間面向南前設一燈一香而已中一間用白幕自南達北金城柱而東洎南三面幃之於中設繩床挂真影香華供養以時設食用白紙作娑羅華八樹以簇繩床表雙林之相牀西別設一儀牀置平生道具之屬繩宋後正北幕內名子位即是弟子受弔之位也柴枝備用清規尊宿出喪云主喪領衆兩兩排行送喪左右分雪柳柴枝毋得挨肩交語舊説曰中巖曰柴枝助火化之義遺物忠曰亡人遺囑以平居所蓄器具書畫等贈與親舊法眷此言遺物校定清規云通呈遺書及送遺物第草九類錢財門衣鉢敕修清規尊宿遷化云示疾覺沈重預請兩序勤舊點對封收衣鉢行李就留方丈差公謹行僕看守以俟估唱忠曰僧錢帛總言衣鉢蓋錢財元非僧可蓄者故婉詞言之衣鉢耳解清規衣鉢侍者者曰衣鉢者住持三衣一鉢也又謂私財此侍者司之圭峯盂蘭盆經疏云分減衣鉢元照新記云今世俗謂僧長物以為衣鉢或恐疏主隨俗為言寶積經寶梁聚會云當來比丘多畜衣鉢多有諸物忠曰經謂畜數種衣數種鉢乎若復總稱僧財帛則當以此經為二字本據也免丁錢敕修清規聖節云住時僧道歲一供帳納免丁錢免丁義詳簿券門免丁由處佛祖統記云宋高宗紹興十五年敕天下僧道始令納丁錢自十千至一千三百凡九等謂之清間錢年六十已上及殘疾者聽免納道法師致書於省部曰大法東播千有餘歲其間汙隆隨時暫厄終奮特未有如今日抑沮卑下之甚也自紹興中年僧道征免丁錢大者十千下至一千三百國四其民士農工商也僧道舊籍仕版而得與儒分鼎立之勢非有經國理民之異以其祖大聖人而埀化為善故耳至若天災流行雨暘不時命其徒以禱之則天地應鬼神順抑古今耳目所常聞見者也夫苟為國家禦災而來福祥亦宜稍異庸庶之等夷可也若之何遽以民賦賦且數倍今天下民丁之賦多止緡錢三百或土瘠民勞而得類免者為僧反不獲齒於齊民以其不耕不蠶而衣食於世也夫耕而食蠶而衣未必僧道之外人人耕且蠶也云云志盤述曰目僧道同丁夫而出征賦以免之豈獨道之耻亦國家不知尊尚二教之耻也今州家征免丁則必舉當年多額以責之而不顧僧之存亡去住既又欲以虧額均賦諸寺者其為患皆此類嘗考郡志云僧道免丁歲無定額官吏曾不省此王荊公創新法當年後世誰不知為民患然今之為政者語安石則目之小人追民賦則仍用其立法蓋利源一開雖有聖人之治所不能革以人心好利者同然耳然則為利創法者未嘗不為後世患悲夫已下録論增免丁錢物初賸語笑翁堪禪師行狀云廷臣奏端嘉以後牒廉僧雜欲增免丁三分之一荊湖總司亦奏僧道買紫衣師號且俾以衣號住持師曰審是則主法者徒以貨取吾道委地矣力言于廟堂議遂寢枯崖漫録云雙杉元禪師嘉熙間乃石田堂中第一座上丞相書言朝廷新指揮買師號金環象簡不便書云正月十三日景德靈隱禪寺前堂首座前住持嘉興府天寧寺僧中元謹熏沐獻書樞使大丞相國公竊以為佛老之教救世計也其所以與儒道相參於天地間以能開悟性真不墮邪見其功未易量也我朝太宗皇帝嘗曰釋氏之道有補教化孝宗皇帝亦曰以佛修心以老治身以儒治世斯可也張文定謂儒道淡薄一時聖賢盡歸釋氏而關洛諸公亦必玩味釋氏之書而後能接續洙泗不傳之祕然教必有主必有師國家以度牒許人承買凡有僧者各尋師以為依歸師苟有道行則可使迷者悟塞者通其裨助世教要非小補近世貨賂公行求為住持者吾教之罪人若以例傳天下之賢者必深藏遠遁而已其肯出而為師夫師廢則正法微正法微則邪法熾以清淨之門而為利欲交征之地非國家之福也譬如家孰黨庠不能無師不求其能傳道解惑者為之而惟賄是視則弟子何以仰孔門之教亦幾乎熄佛老之道何以異是若謂佛老之徒身居大廈日享膏腴不蠶而衣不耕而食為世所嫉然天下之人有無用於世而坐享膏腴之奉者尤衆何特僧道寺觀創立常住供養非官與之也以衆人樂施而與之也寺觀有田稅賦尤倍又有非泛不時之需正與大家相似今既買度牒以錢免丁又增以錢官府無絲毫之給而徒重責其利於無窮則僧道可謂不幸矣國家愛惜名器泛濫何以勸勵天下僧道若以賄得金環象簡得諸處住持則嚚頑無賴之徒皆以賄進何以整齊風俗况寺觀雖多其常住闕乏者甚多縱使此令一行第能率斂寺觀之大者其小者亦豈能應其求如此則所得能幾况僧道非能自出己財求為住持必將取之寺觀師徒相殘常住必壞所謂膏腴將見蕪穢所謂大廈將見為丘墟所謂溫飽將見為凍餒部雖有牒誰將請之歲雖有丁誰將輸之今日軍需糴本稱提諸券無非鬻爵鬻爵之者或纍於國牒之多者無病於官乃循一時不恤之事斫喪千萬載之利源殆非理財之長策也伏覩近降旨揮增錢鬻爵識者病之事不果行總所今來陳請正亦類此伏望鈞慈詳酌利害特有敷奏盡行寢罷服號之命令僧道不勝幸甚伏惟鈞慈俯賜鑒念不備時江西璨無文亦有書先是朝省因總領嶽珂奏乞降紫衣師號二等賜金環象簡并四字禪師法號以住大寺觀每賜服師號綾紙出賣三百緡仍附品官條制非有官不得差注非有賜服不得住持此書上事果寢豈非祕護大法者之用情乎瑩山清規云七月十八日起單諸人就維那寮可請免丁抄小榜頭式云某年夏中免丁抄某甲上座能州洞谷安居忠曰優免丁役是朝省勾當僧家何得僭行之蓋洞谷所出于起單僧者坐夏由耳見簿券門元不識免丁義強為謬事又抄與鈔通錢鈔也免丁抄即免丁錢也又訛免丁由益無義因録民間丁錢鶴林玉露云廣右深僻之郡有所謂丁錢蓋計丁輸錢于官往往數歲之兒即有之有至死而不與除豁者甚為民病故兩人之謠曰三歲孩兒便識丁更從陰府役幽魂讀之可為流涕無盡財忠曰無盡財者以金財假貸逐利焉本生息息復為本故云無盡釋氏要覽云寺院長生錢律云無盡財蓋子母展轉無盡故兩京記云寺中有無盡藏又則天經序云將二親之所蓄用兩京之舊邸莫不總結招提之宇咸充無盡之藏十誦律云以佛塔物出息佛聽之僧祇云供養佛華多聽轉賣買香油猶多者轉賣入佛無盡財中詳諸律三寶皆有無盡財宋高僧傳唐圓觀傳云李源父憕居守天寶末陷於賊中遂將家業捨入洛城北慧林寺即憕之別墅也以為公用無盡財也長生錢無盡財名長生錢見無盡財及庫質錢處橘洲文集寶雲院長生庫記云住持瑩公坐席未溫首斂巾盂以估於衆得錢一十萬內外道俗又得錢十萬太師魏國史公捐國太夫人簪珥以施之合為利益長生庫以備歲時土木鐘鼓無窮之須後五年建大講堂半取其羸以助工役實其志也庫質錢老學菴筆記云今僧寺輒作庫質錢取利謂之長生庫至為鄙惡豫按梁甄彬嘗以束苧就長沙寺庫質錢後贖苧還於苧束中得金五兩送還之則此事亦已久矣庸僧所為古今一揆可設法嚴絶之也忠曰陸遊言雖出於護法意然不多讀經律而致此臆斷律有無盡財事稍相類未可槩為庸僧之作但防其鄙猥而可也敕修清規首載聖旨所謂解典庫亦是取典物貸財而逐利以賑寺用也陪寮錢敕修清規新挂搭人點入寮茶云新挂搭人入寮後照例納陪寮錢若干候寮元輪排當在何日挂點茶牌報衆舊説曰僧堂挂搭之外衆寮亦挂搭故納陪寮錢暖席錢忠曰凡借他寺院房舍或修法會或辨齋供則納暖席錢於本院暖席字出于文子文子云墨子無黔突孔子無暖席琅邪代醉編云文子云孔無暖席墨無黔突淮南子云墨子無暖席然則席不暇暖墨子亦然謝挂搭香錢敕修清規謝挂搭云堂司行者具名數率香錢寫小榜云新歸堂首座各率錢若干買香謝挂搭一堂司行者某取覆貼衆寮前收香錢足交侍者納方丈教苑清規謝挂搭云令堂司行者率各人香錢五伯文煩侍者到方丈回香抽分錢敕修清規亡僧板帳云估唱得錢必照板帳支用外其錢作三七抽分歸常住百貫抽參拾貫不滿百貫則不抽分餘則均俵僧資忠曰亡僧估唱所得錢除板帳支行外拆作十分十分中抽三分以歸常住此名抽分錢但不滿百貫則不復抽分矣餘七分俵秉炬等嚫居家必用云抽分即解取其物也已下略録外典抽分字元史食貨志市舶云至元二十年遂定抽分之法二十一年設市舶都轉運司於杭泉二州官自具船給本選人入蕃買易諸貨其所獲之息以十分為率官取其七所易人得其三續文獻通考征榷考云太祖洪武二十六年定凡龍江大勝港俱設立抽分竹木局有三分取一三十分取一十分取二等衆財人天寶鑑云靈源清禪師門榜其略曰清名曰住持實同客寄但以領徒弘法仰助教風為職事爾若其常住所管財物既非己有理不得專一委知事僧徒分局主執明依公私合用支破惟清止同衆僧齋襯隨身瓶鉢任緣去住而已伏想四方君子來有所須顧寢食祇接之餘別難供應蓋以彼所管者世法則屬官物佛教則為衆財偷衆財盜官物以買悅人情而取安己有實非素志之所敢當預具白聞冀埀恕察石刻在天章率財敕修清規佛降誕云先期堂司率衆財又月分須知云七月預率衆財辦斛食供養居家必用云制衆建議謂之率假如勢要之人獨建計謀妄托名目斂衆人之物或饋與人或自入己之類是名制衆建議率斂也小補韻會云率朔律切廣韻募也正字通云率山律切音蟀約數也周禮太宰注賦口率出錢徐劉音類焦氏云督率之率音朔算法約數之率音類並非舊説曰令大衆均出錢財言率財也或曰二祖三佛會率比丘衆財每人五百錢以辨香華燈燭供物率錢即率財也敕修清規告香云堂司行者率衆錢買香大小三片及紙作圖之費付參頭收五代史補云趙在禮在宋州所為不法百姓苦之一日制下移鎮永興百姓相賀曰眼中拔却釘矣可不快哉在禮聞之上表乞還鎮朝廷許之在禮每口率錢一千號拔釘錢遂獲百萬戴埴鼠璞云唐宋遺史載張崇帥廬州不法民苦之既入覲人謂渠伊必不來崇計口率渠伊錢再入覲人不敢言捋鬚相慶崇率捋鬚錢續酉陽雜爼云五娘死其妨率錢葬之折錢敕修清規請喪司職事云如無布絹隨宜折錢俵之舊説曰以錢折中當布絹之價而俵之此名折錢月令廣義云大明會典國初寶鈔與銅錢兼使每鈔一貫折錢一千文銀一兩收鈔忠曰所收納之錢財也敕修清規尊宿唱衣云收鈔若干係某件唱到舊説曰鈔者紙造印天子印以代錢但價賤於銅錢鈔一貫文當銅錢一佰文品字箋云鈔楮貨名宋史紹興二十四年徼外以銅少循宋交子法造鈔引一貫二貫三貫五貫十貫五等謂之大鈔一百二百三百五百七百五等謂之小鈔與錢並用以七年為限納舊易新諸路置交鈔庫官受之每貫取工墨錢十五文公私便焉明丘濬曰元以來鈔制始此宋之交會其制無考金史交鈔之制外為闌作花紋其衡書貫列外書禁條闌下備書經由交換之法及印章花押元承其舊沿用之中雖小異大槩實同也宋交會猶與錢相為輕重而有稱提之法此後則錢自錢鈔自鈔各與物相為輕重矣大明會典云國初寶鈔與銅錢兼使每鈔一貫折錢一千文銀一兩其等凡六曰一貫曰五百文曰四百文以至百文每一百文以下只用錢其後不行鄭所南大義略敘云寶祐丙辰韃始僭年號曰中統次曰至元襲亡金僭效大宋楮幣之法易名曰鈔以通貿易支鈔忠曰分支所費用錢財也鈔義見收鈔處敕修清規尊宿唱衣云支鈔若干係某項用度品字箋云支支取支給謂取其所應取給其所應給也又度支度其所宜支而支給之也見管鈔忠曰現前所有錢財也幻住菴清規亡僧唱衣云除支外見管無文獻通考市糴考云漸東提舉朱熹言熹請於府得常平米六百石賑貸夏受粟於倉冬則加二計息以償凡十有四年得息米以元數六百石還府見管米三千一百石以為社倉癸辛雜識云是歲積兩年租米未糶見管五六十石下嚫敕修清規佛降誕云住持上香下嚫點茶又三拜舊説曰下嚫者用布施物薰于爐上安置佛祖前也嚫或作嚫或作𭣋以手受所施故從手口發施事故從口所施錢寶類故從貝忠曰但從手義見名義集餘未見據品字箋云嚫齋嚫也亦作嚫忠曰下者安下義凡有所措辨言下敕修清規聖節云就佛座前下茶湯歷代祖忌云下食一位碧巖録云陸亘入寺下祭皆同此義嚫義詳達嚫處備用清規云佛誕涅槃成道常住設供無嚫禪苑清規校定清規同備用説上嚫舊説曰下嚫又云上嚫上下語無深意忠曰此説漫漶上嚫者獻上嚫財也下嚫者安下嚫財也達嚫增一阿含經云是時迦葉從佛受教往至梵志婦舍已就座而坐是時彼婆羅門婦便供辦肴饌種種飲食以奉迦葉是時迦葉即受食欲度人故而向彼人説此噠嚫祠祀火為上衆書頌為最王為人中尊衆流海為上衆星月為首照明日為先四維及上下於諸方域境天與世間人佛為最尊上欲求其福者當歸於三佛是時彼梵志婦聞此語已即歡喜踊躍乃至得法眼淨又增一阿含經云世尊告尸婆羅曰汝今可受此長者白千兩金使蒙其福此是宿緣之業可受其報尸婆羅對曰如是世尊是時尊者尸婆羅即時而説噠嚫施衣及餘物欲求其福德往至天世人五欲自娛樂從天至人中度有無疑難涅槃無為處諸佛之所樂施惠無難者蒙此獲福祐當起慈惠心作福無有懈悲華經云太子不眴供養如來及比丘僧竟三月已所奉達嚫八萬四千金龍頭瓔音釋云達嚫梵語也此云檀施嚫初槿切羅摩伽經云如來為一切衆生説功德噠嚫三輪化度一切衆生玄應衆經音義云達嚫差覲切案尊婆須蜜論亦作檀嚫此云財施解言報施之法名曰達嚫導引福地亦名達嚫復次割意所愛成彼施度於今所益義是檀嚫又西域記云正言達嚫拏或云馱器尼以用右手受他施為其生福故從之立名也釋氏要覽云梵語達嚫拏此云財施今略達拏但云嚫五分律云食後施衣物名達嚫轉輪五道經云轉經不得倩人乃至齋食以達嚫為常法得福翻譯名義集云達嚫字或從手西域記正云達嚫孥者古也或云馱器尼以用右手受人所施為其生福故行事鈔訃請設則篇云大嚫法五分食後施衣物名為噠嚫也資持記云達嚫大嚫梵言少異亦云檀嚫此翻財施謂報施之法名曰達嚫文約施衣準應不局世謂以財襯食故名嚫者不識華梵又召説法為施財者並非問為召施物為目説法答據名召物今謂行施之時必為説法因名説法以為達嚫準理具云達嚫説法事義方全問此與咒願何別答約事似同究義須別咒願則別陳所為達嚫則通為説法今或營齋事須雙用玉耶經云佛告玉耶當信布施常得其福後世當復生長者家玉耶言諾佛飯畢訖達嚫咒願五十善神擁護汝身四分律云佛言不應食已默然而出應為檀越説大嚫乃至為説一偈若為利故施此利必當得若為樂故施後必得快樂時人人皆説佛言應令上座説若上座不能説應語能者説愚丘宗禪師答洪慶善問嚫金本據見祭供門齋僧處嚫資嚫金也敕修清規管待專使云知事預稟住持議專使宣疏帖人嚫資輕重方丈備貼嚫須令合節俵嚫敕修清規歷代祖忌云舉大悲咒乃至或有俵嚫則舉楞嚴咒正字通云俵悲廟切標去聲俵散六書故分𢌿也品字箋云俵俵散也以應得之物而照人分散為俵又印紙言俵子見簿券門堂嚫忠曰施僧堂僧之金也備用清規煎點西堂頭首新命云專使詣新命前議定方丈嚫施引座謝禮堂嚫貼嚫宣疏帖人陪嚫貼嚫忠曰修法會等有特勞者加增其施物此謂貼嚫篇海類編云貼天叶切音帖裨也依附也又粘置也敕修清規迎待尊宿云請客侍者具狀請特為管待山門置食備嚫方丈備貼嚫又專使特為新命煎點云專使先與新命議定齋嚫輕重合宜兩序勤舊鄉人法眷辦事貼嚫陪嚫忠曰功勞非常者一陪其嚫也見堂嚫處篇海類編云陪重也二也加也益也隨年錢忠曰蓋隨其人年數多少施與錢也聯燈會要亡名尊宿章云昔有施主入寺行衆僧隨年錢知事云聖僧前著一分施主云聖僧年多少僧無對法眼代云心期滿處即知虗堂愚和尚録云代僧倒指示之十誦律三歸五戒法云爾時應問汝幾年隨年答何時出家冬春夏有閏無閏隨問應答喪嚫忠曰送亡山頭嚫言喪嚫日本俗稱野布施敕修清規出喪挂真云喪司維那知客聖僧侍者俵行喪嚫忠曰布施之目六度之隨一布者散也鋪也然日本豐州民俗以為布帛之布義凡新喪則持麻布而施于僧寺故寺多檀主者布匹倚疊可笑昔唐莊宗為晉王時擒滅劉守光命書記王緘草露布緘不知故事書之於布遣人曳之為議者所笑止此謬解布字復有類似矣賻儀忠曰他家有新亡則我贈錢財助其喪此謂賻儀日本俗稱香奠然香奠賻儀義別篇海類編云賻符遇切音父以貨財助喪敕修清規挂真舉哀云所有賻儀用餘當歸常住補犒諸山人從支費香奠翰墨大全謝送香財狀云杖期孫姓某奠儀如目右某茲者某親隨人改易喪亡乃蒙尊慈特賜香奠焚帛外下誠不勝哀感之至謹具狀申謝謹狀壒囊鈔云日本俗香錢字作香奠非也錢唐音近奠故有此訛忠曰香奠字出翰墨大全但香錢香奠義意稍別文獻通考郊社考云非時而祭曰奠紙錢忠曰日本禪林祈禱及盂蘭盆會等雕紙如錢形數十相連與繪馬心經共之挂之堂柱會畢則設銅鉢就內點火焚化之所以饗鬼神也或以錫箔鍮箔粧紙為銀錢金錢則滋殷重也順和名類聚云紙錢俗云加美勢邇一云勢邇加太新樂府云神之來兮風飄飄紙錢動兮錦繖搖釋門正統云今之施食亦施財者事祖廣記云寓錢今楮鏹也唐王璵傳云玄宗時璵為祠祭使專以祠解中帝意有所禳祓大抵類巫覡漢以來葬者皆有瘞錢後世俚俗稍以紙寓錢為鬼事至是璵乃用之則是喪祭之焚紙錢起于漢世之瘞錢也其禱神而用寓錢則自王璵始耳今巫家有焚羹禳謝之事亦自此也忠曰所授王璵傳即新唐書也佛祖統紀云唐以前無紙錢為用者自王璵盛行此法於是冥中藏積緡鏹金銀繒綵與世間所用無少異由心法之能變造故天府冥關亦隨人心而轉世有用紙鏹寄庫者有鬼神用紙鏹入人間買物者有見泰山堆積蠟錢無用云人間化財用油炷度火為汙者此等顯驗不一心生則種種法生不特紙錢一法而已也大慧為盧時用普説云宣律師問韋馱天神世人奉鬼神以紙錢還可用否曰用矣蓋古時無紙錢漢魏已前多埋錢冥冥之中亦能享受唐高宗已後方有紙錢後來有智之人去藏教中搜出化財雨寶真言使人持誦能令一財變無量財已下録焚紙錢法茅亭客話云孫處士名知微字太古眉州彭山人也因師益部攻水墨僧令宗俗姓丘氏導江縣有一女巫知微嘗問其鬼神形狀欲資其畫女巫曰今見有王三郎有冥中足知鬼神之事處士請自問之知微曰敢問三郎鬼神形狀俄有應者云云知微曰今欲酬君君欲希我何物應者曰望君濟我資鏹數百千貫知微辭之應者曰所求者非世間銅錢為者乃楮貨爾知微乃許之應者曰燒時慎勿使著地可以薪草薦藉之向一處以火爇不得攪剔其錢則不破碎一一可達也遂依教燔紙錢數百千貫噫昔漢世以前未知幽冥以何為賂遺之物爾已下録焚紙錢自唐時舊唐書王璵傳云王璵少習禮學博求祠祭儀注以干時開元末玄宗方尊道術靡神不宗璵抗疏引古今祀典請置春壇祀青帝於國東郊玄宗甚然之因遷太常博士侍御史充祠祭使璵專以祀事希幸每行祠禱或焚紙錢禱祈福祐近於巫覡由是過承恩遇肅宗即位纍遷太常卿以祠禱每多賜賚新唐書王璵傳云王璵者方慶六世孫少為禮家學玄宗在位久推崇老子道好神仙事廣修祠祭靡神不祈璵上言請築壇東郊祀青帝天子入其言擢太常博士侍御史為祠祭使璵專以祠解中帝意有所禳祓大抵類巫覡漢以來葬喪皆有瘞錢後世里俗稍以紙寓錢為鬼事至是璵乃用之肅宗立纍遷太常卿又以祠禱見寵已下證鬼用紙錢事唐唐臨冥報記云永徽二年六月九日尚書都官令史王璹暴病死經二日而蘇自言初死時見四人來至其所云官府追汝云云大官謂璹曰汝無罪放去璹拜辭云云見向所訊璹之吏從門出來謂璹曰君尚能待我甚善可乞我千錢璹不應內自思曰吾無罪官放我來何為有賄吏乎吏即謂曰君不得無行吾向若不早將汝過官令二日受縛豈不困頓璹心然之因愧謝曰謹依命吏曰吾不用汝銅錢欲得白紙耳期十五日來璹許諾因問歸路吏曰但東行二百步當見一故牆穿破見明可推倒之即至君家也璹如其言行至牆推良久乃倒容人璹從倒處出即至其所居隆政坊南門矣於是歸家家人哭泣入戶而蘇至十五日璹忘不與錢明日復病困絶見吏來怒曰君果無行期與我錢遂不與今當復將汝去因驅行出含光門令入大坑璹拜謝百餘并請作錢乃放歸又蘇璹告家人買紙百張作錢送之明日璹又病困復見吏曰君幸能與我錢而惡不好璹復辭謝請更作許之又至二十一日璹令以六十錢市紙百張白紙作錢并酒食自於隆政坊西渠水上燒之既而身體輕健遂愈又冥報記云左監門校尉馮翊李山龍以武德中暴病亡而心上不冷如掌許家人未忍殯斂至七日而蘇自説云當死時被冥官收録至一官曹云云有三人語山龍曰王放君去可不少多乞遺我等山龍未言吏謂山龍曰王放君不由彼三人者是前收録君使人一是繩主當以赤繩縛君者一是棒主擊君頭者一是袋主吸君氣者見君得還故乞物耳山龍惶懼謝三人曰愚不識公請至家備物但不知於何處送之三人曰於水邊若樹下山龍許諾辭吏歸家見親眷正哭經營殯具山龍入至尸傍即蘇後日剪紙作錢帛並酒食自送於水邊燒之忽見三人來謝曰蒙君不失信重相贈遺愧荷言畢不見太平廣記云韓徹者以乾元中任隴州吳山令進士宇文覿辛稷隨徹讀覿稷掘令廳大槐樹孔得冢徹至命佐史收骨髮以新棺斂葬諸野靈託巫語云己是晉將軍契苾鍔明府恩及幽壤然創造此謀是宇文七及辛四幽魂珮戴豈敢忘之辛侯不久自當擢祿足光其身但宇文生命薄無位且多厄難我當救其三死以至會岐州土賊欲僭偽號署置百官覿有名被署中書舍人賊尋被官兵所殺覿等七十餘人繫州獄十人鍔復至覿妻所語云七郎犯事我在地中大為求請然要三千貫錢妻辭貧家實不能辦鍔曰地府所用是人間紙錢妻云紙錢當力辦之焚畢復至獄中謂覿曰我適於夫人索三千貫為君屬請事亦解矣有劉使君至者即當得放飽食無憂也尋而詔用劉晏為隴州刺史辭日奏曰點污名賢曾未相見所由但以為逆所引悉皆繫獄臣至州日請一切釋免上可其奏晏至州上畢悉召獄囚宣敕放之廣異記已下録成長史黃色塗錫作金鬼用之冥報記云眭仁蒨者趙郡邯鄲人也少有經學不信鬼神常欲試其有無就見鬼人學之十餘年不能得見後徙家向縣於路見一人如大官衣冠甚偉乘好馬從五十餘人騎視仁蒨而不言後數見之常如此經十年凡數十相見後忽駐馬呼蒨曰比頻見君情相眷慕願與君交遊蒨即拜之問公何人耶答吾是鬼耳姓成名景本弘農人西晉時為別駕今任胡國長史仁蒨問其國何在王何姓名答曰黃河已北總為臨胡國國郡在樓煩西北沙磧是也其王是故趙武靈王今統此國總受太山控攝每月各使上相朝於太山是以數來過此與君相遇也以至時大業初江陵岑之象為邯鄲令子文本年未弱冠之象請仁蒨於家教文本書蒨以此事告文本仍謂曰成長史謂曰我有一事羞君不得道既與君交亦不能不告君鬼神道中亦有食然不能飽苦飢若得人食便得一年飽衆鬼多偷竊人食我既貴重不能偷之從君請一餐蒨既告文本文本即為具饌備設珍羞蒨曰鬼不欲入人屋可於外邊張幕設席陳酒食於上文本如其言至時仁蒨見景兩客來坐從百餘騎既坐文本向席再拜謝以食之不精亦傳意辭謝初文本將設食仁蒨請有金帛以贈之文本問是何等物蒨云鬼所用物皆與人異唯黃金及絹為得通用然亦不如假者以黃色塗大錫作金以紙為絹帛最為貴上文本如言作之及景食畢令從騎更代坐食文本以所作金錢絲絹贈之景深喜謝曰因眭生煩郎君供給郎君頗欲知壽命乎文本辭曰不願知也景辭而去法苑珠林鬼神部引之釋氏要覽云冥報記云唐眭仁蒨為鬼成景設酒食復以錢綵為好辭曰鬼所用錢即紙錢也若綵絹亦紙為之銀即錫紙金即黃塗之也忠曰要覽所言多謬妄矣釋門正統一承要覽之謬按冥報記眭仁蒨事中但云以黃色塗大錫作金以紙為絹帛止此未初言鬼所用即紙錢也銀即錫紙等亦非彼言冥報記言鬼用紙錢唯在彼王璹及李山龍記中耳釋門正統云法苑珠林云紙錢起于殷長史也忠曰珠林引冥報記載眭仁蒨事但云成景為胡國長史初不言殷長史豫謂成字上殘缺下似殷字下畫或填補者誤作殷字然自此妄一出諸説雷同以鬼用紙錢為成景事復訛成長史為殷長史儒家不能多覽釋典遂有紙錢起於殷長史之説實珠林無此説耳矣已下録儒家辨紙錢就日録云焚紙錢之説唐王璵傳曰漢以來葬者皆有瘞錢後世里俗稍以紙寓錢為鬼事至是璵乃用為禳祓則是喪葬之焚紙錢起於漢世之瘞錢也其禱神而用寓錢則自王璵始矣康節先生春秋祭祀約古今禮行之亦焚楮錢程伊川怪問之曰冥器之義也脫有益非孝子順孫之心乎徽廟朝高峯廖用中奏乞禁焚紙錢有云嘗怪世俗鑿紙為錢焚之以徼福於鬼神者不知何所據依非無荒唐不經之説要皆下俚之所傳耳使鬼神而有知謂之慢神欺鬼可也李珂松窗百記云世既是妄人死而為鬼其妄又可知無身心耳目口鼻之實而六習常不斷顛倒沈迷豈復覺悟方其具酒殽列冥器鑿楮象錢印繪車馬而焚之以妄塞妄也蓋嘗原其本初恐瘞錢為死者之禍及世艱得錢易以紙錢自後沿襲至唐而焚之其來久且遠而廖高峯遽欲絶之以塞妄費且夫子謂死葬之以禮又曰敬鬼神而遠之是夫子不欲遽絶而以有無之中言之惟邵康節云脫有益非孝子順孫之心最為通議忠曰康節竊信釋氏輪回鬼神之説者故有此言康節信輪回見于聞見前録戴埴鼠璞云法苑珠林載紙錢起於殷長史唐王璵傳載漢來皆有瘞錢後里俗稍以紙寓錢王璵乃用於祠祭今儒家以為釋氏法於喪祭皆屏去豫謂不然之死而致死之不仁之死而致生之不知謂之明器神明之也漢之瘞錢近於之死而致生以紙寓錢亦明器也與塗車芻靈何以異俗謂果資於冥塗則可笑忠曰禮記檀弓云孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也止此夢溪筆談云先王之於死者以之為無知則不仁以之為有知則不智文公家禮全載鼠璞説家禮為朝氏説云按此則用紙錢代幣帛似亦無害宋葉愛日齋藂抄云事林廣記考論寓錢之始云今楮鏹也以至自王璵始耳與前引釋門正統全同法苑珠林云紙錢起于殷長史也按此則里俗以紙寓錢璵始用之非創于璵矣朱文公云紙錢起玄宗時王璵蓋古人以玉幣後來易以錢玄宗惑于王璵之術而鬼神事繁無許多錢來埋得璵作紙錢易之文字便是難理會且如唐禮書載范傳正言唯顏魯公張司業家祭不用紙錢易之文字便是難理會且如唐故衣冠效之而國初言禮者錯看遂作紙衣冠而不用紙錢不知衣冠紙錢有何間別近世戴氏鼠璞云法苑珠林載紙錢起于殷長史以至謂果資于冥塗則可笑全同前引鼠璞是説雖異亦有文公紙衣冠何別之呂南公有錢鄧公不燒楮鏹頌有云古用幣以禮神祇後之罪士為多則假之以請禳禱祈假之不已則翻楮代焉而弗支是故罪士滿世而莫救其非大抵深惡夫寓錢以徼福者也豫觀洪慶善杜詩辨證載文宗備問云南齊廢帝東昏侯好鬼神之術剪紙為錢以代束帛至唐盛行其事云有益幽冥又牛僧孺云楮錢唐初剪紙為之此是以補事林廣記之未及已下略舉機緣大慧武庫云汾陽無德禪師一日謂衆曰夜來夢亡父母覓酒肉紙錢不免徇俗置以祀之事辦於庫堂設位如俗間禮酌酒行肉化紙錢訖令集知事頭首散其餘盤知事輩却之無德獨坐筵中飲啖自若衆僧數曰酒肉僧豈堪為師法耶腰包盡去惟慈明大愚泉大道等六七人在耳無德翌日上堂云許多間神野鬼秖消一盤酒肉兩陌紙錢斷送去了也法華經云此衆無枝葉唯有諸貞實下座陰錢紙錢又名陰錢羣談採餘云王勃過長廬為神焚陰錢十萬寓錢忠曰紙錢言寓錢謂鏤紙寓錢義也見紙錢處瘞錢唐書云漢以來葬喪皆有瘞錢詳紙錢處大慧普説云漢魏已前多埋錢冥冥之中亦能享受詳紙錢處忠曰日本俗送亡柩內著銅錢六紋名六道錢即瘞錢義也寄庫錢忠曰蓋漢魏瘞錢也寄者猶如託人寄物於化方即託新亡人寄錢於冥庫請免亡者之罪也佛祖統紀云世有用紙鏹寄庫者紙錢處詳引龍舒淨土文云豫遍覽藏經即無陰府寄庫之説奉勸世人以寄庫所費請僧為西方之供一心西方則必得往生若不為此而為陰府寄庫則是志在陰府死必入陰府矣譬如有人不為君子之行以交結賢人君子乃寄錢於司理院獄子處待其下獄則用錢免罪豈不謬哉橫川育王録施主寄庫上堂云堅牢庫藏各各有珍寶且非金與銀今日婆婆須認取將來免得問他人香錢敕修清規知殿云施主香錢不得互用忠曰此即佛前資助香費之錢也余謂與香奠義不同又見香奠處回祭敕修清規亡僧大夜念誦云預報庫司造祭食差人鋪排祭筵鄉人法眷作祭文納庫司錢回祭解者曰先報庫司造祭食後還其費用此名回祭回財舊説曰施主就寺修薦或未納支費見錢且借常住財營辨後時施主如數償之此言回財忠曰但是回祭訛言回財耳追加第二十八類器物門行裝具油單敕修清規裝包云頂包裝包之法用青布袱二條先以一條收拾衣被之屬仍用油單裹於外復用一條重包於外四角結定用小鎖鎖之忠曰日本雲水僧稱袱子為油單其實油單以桐油塗紙造之如油衣之材以防雨露浸犯蓋油單包袱子故呼袱子為油單耳包裝包法詳清規又略見油單處祖庭事苑云打包毗奈耶維事云時有苾芻作三衣竟置在肩上隨路而行遂被汙霑并塵土汙佛言應以袋盛其袋可長三肘闊一肘半所置之衣常用者在上非常用者在下今禪人腰囊雖裝束小異亦乃承佛之制遊方之人束囊之時亦當念佛祖遺德之重無自忽也言肘者準佛肘也尺則用姬周尺為準人長八尺佛長丈六今言三肘即六尺也包鉤敕修清規裝包云包用小鎖鎖之仍繫包鉤於上解者曰包上繫鉤者到處若依住則以鉤挂搭衣鉢袋也忠曰包鉤者蓋便裝包於身之具非必挂搭之用也無著禪師一代撰述其數六百餘卷多達而禪師畢生精力傾注編述實本書本書原本本文二十卷目録一卷合二十一卷今次上梓際纏一册書中間間題目存注釋缺是漏脫非偏原本憑據故蓋是禪師晚年至其力盡能由歟明治四十二年四月開版日志
