front:
  text: 禪林象器箋序五葉結果之後稟承祖胤者多附居律寺而已矣百丈和尚創意而設禪居震耀儀表規矩以謀令法久住乃覩有師徒焉有堂舍焉有禮則焉有器服焉以義定各論云語於名轉名於義轉止此名義既穊矣須是紬繹其義而發明其名也忠顓蒙有志于茲大凡佛教儒典諸子歷史詩文小說目之所及意之所詣遠搜近羅或對斜陽或挑殘燈多纍歲月稍覺無遺漏焉且輟簡而題其稿以禪林象器箋矣易曰見乃謂之象形乃謂之器如今所謂象器者名義之所競趣也寬保元年辛酉秋九月日葆雨堂主八十九翁道忠無著題
